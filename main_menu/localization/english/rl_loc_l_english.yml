 # Community Mod Menu settings
 europa_survivors__general_name: "Roguelike Universalis"
 europa_survivors__general__sources_name: "Roll Sources"
 europa_survivors__roll_on_research_name: "Rolls from Research"
 europa_survivors__roll_on_research_desc: "Gain an upgrade selection each time you research an advance."
 europa_survivors__roll_on_battle_name: "Reroll Tokens from Battles"
 europa_survivors__roll_on_battle_desc: "Winning a great battle grants a banked reroll token you can spend on future upgrade selections."
 europa_survivors__roll_on_new_age_name: "Rolls from New Ages"
 europa_survivors__roll_on_new_age_desc: "Gain an upgrade selection when a new age begins (guaranteed legendary)."
 europa_survivors__general__gameplay_name: "Gameplay"
 europa_survivors__enable_reroll_name: "Allow Rerolls"
 europa_survivors__enable_reroll_desc: "Adds a Reroll option to each selection, letting you replace the three offers once per roll."
 europa_survivors__enable_cursed_name: "Cursed Rolls"
 europa_survivors__enable_cursed_desc: "Rare and legendary rolls can become cursed: the upgrade is stronger, but taking any option also inflicts a lasting drawback."
 europa_survivors__enable_sets_name: "Synergy Sets"
 europa_survivors__enable_sets_desc: "Upgrades are tagged Military / Naval / Economic / Administrative. Collecting 4, 8, and 12 of a theme grants escalating set bonuses."
 europa_survivors__enable_threat_name: "Escalating Threat"
 europa_survivors__enable_threat_desc: "The more upgrades you take, the more the world distrusts your rising power: a growing Notoriety penalty to reputation and antagonism."
 europa_survivors__enable_banish_name: "Allow Banishing"
 europa_survivors__enable_banish_desc: "Adds a Banish action to each offered upgrade: spend a reroll token to remove it from your pool permanently, then redraw."