 l_english:
  STATIC_MODIFIER_NAME_modifier_manufactories_advance: "Manufactories"
  STATIC_MODIFIER_DESC_modifier_manufactories_advance: "Recent technological advances in mechanization have facilitated the rise of concentrated production facilities in the form of manufactories. These businesses have helped us greatly improve the rate and quality of production."
  STATIC_MODIFIER_NAME_modifier_lead_ore_dressing: "Lead Ore-Dressing"
  STATIC_MODIFIER_DESC_modifier_lead_ore_dressing: "Through the dressing process, lead ore is washed and crushed to remove impurities and separate the ore from rocks, clay and other minerals."
  STATIC_MODIFIER_NAME_modifier_powerful_statues: "Impressive Statuary"
  STATIC_MODIFIER_DESC_modifier_powerful_statues: "A prosperous country is the true sign of a strong ruler, but the people will only believe that a ruler is strong if they are depicted as such. To that effect, many rulers commission statues of themselves, often made out of stone or bronze, to project an image of strength and power to any who look upon their rendered visages. However, these displays of ego are not always effective, and sometimes only result in great amounts of materials being moved around."
  STATIC_MODIFIER_NAME_modifier_ostentatious_clothing: "Ostentatious Clothing"
  STATIC_MODIFIER_DESC_modifier_ostentatious_clothing: "It is the right and duty of the ruling classes to display their power through their appearance. As such, they are wearing increasingly flamboyant attire, making use of the latest techniques to achieve vibrant and luxurious colors and patterns."
  STATIC_MODIFIER_NAME_modifier_artists_advance_absolutism: "Artistic Currents"
  STATIC_MODIFIER_DESC_modifier_artists_advance_absolutism: "Art has always been created in a number of different ways, but recent advances have allowed it to develop even further into a myriad of manifestations, as artists explore new media and techniques."
  STATIC_MODIFIER_NAME_modifier_absolutist_court: "Absolutist Court"
  STATIC_MODIFIER_DESC_modifier_absolutist_court: "Authority has become increasingly centralized in the person of the ruler. Courtiers and officials now serve as extensions of royal will rather than autonomous actors. This concentration of authority allows rulers to enact their wishes more quickly and efficiently."
  STATIC_MODIFIER_NAME_modifier_absolute_rulership: "Absolute Rulership"
  STATIC_MODIFIER_DESC_modifier_absolute_rulership: "Many people demand to be given a role in the government, but mostly because they want to be rewarded without expending much effort. The idea of absolutism has recently piqued our interest, as adopting it would empower us to dispose of those self-serving parasites and rule alone..."
  STATIC_MODIFIER_NAME_modifier_government_size_absolutism: "Loyal Subordinates"
  STATIC_MODIFIER_DESC_modifier_government_size_absolutism: "Concentrating power in the hands of the rulers allows them to take direct action, but they still need people under them to help carry out those actions. Giving those subordinates no real power, while making them unfailingly loyal to the ruler, allows the $crown_estate$ to host more of them without fear of infighting or discontent."
  STATIC_MODIFIER_NAME_modifier_town_rights_abs_advance: "Splendorous Court"
  STATIC_MODIFIER_DESC_modifier_town_rights_abs_advance: "As the place of our court, our capital should also bask in the glory and magnificence of our rule. No other town or city should come close to it in majesty and grandeur."
  STATIC_MODIFIER_NAME_modifier_cork_stoppers: "Cork Stoppers"
  STATIC_MODIFIER_DESC_modifier_cork_stoppers: "Developments in bottle manufacturing have allowed wine producers to create bottles in standardized sizes, and as a result, they have been able to reintroduce the use of cork bottlestoppers. This is a much more efficient way to seal in the wine than with cloth stoppers, and means that it can now be transported much farther away than was previously possible. Perhaps we are now seeing the birth of a worldwide $wine$ trade..,"
  STATIC_MODIFIER_NAME_modifier_sanitation_advance: "Sanitation"
  STATIC_MODIFIER_DESC_modifier_sanitation_advance: "Settlements are investing in improved sanitation measures, such as waste disposal and clean water systems. This will reduce the spread of disease, and improve the overall health of the population. The development of modern sanitation practices will make it possible for people to live in closer proximity without succumbing to disease."
  STATIC_MODIFIER_NAME_modifier_construction_speed_absolutism: "Architectural Engineering"
  STATIC_MODIFIER_DESC_modifier_construction_speed_absolutism: "Building construction has become more sophisticated over time, incorporating methods and techniques from a wide range of disciplines, commonly considered a type of engineering."
  STATIC_MODIFIER_NAME_modifier_pop_promotion_speed_age_5: "Bureaucratic Promotions"
  STATIC_MODIFIER_DESC_modifier_pop_promotion_speed_age_5: "The bureaucracy is expanding to meet the needs of the expanding bureaucracy, which correspondingly increases our need for educated officials to join the administrative ranks."
  STATIC_MODIFIER_NAME_modifier_rgo_size_advance_absolutism: "Physiocracy"
  STATIC_MODIFIER_DESC_modifier_rgo_size_advance_absolutism: "Recent developments in economic thought have shifted the focus from the mercantilist ideals of value lying in trade towards the notion that value lies in the production process itself. As a result, production has been steadily improving and increasing."
  STATIC_MODIFIER_NAME_modifier_lumber_improvements_absolutism: "Wind-Powered Sawmills"
  STATIC_MODIFIER_DESC_modifier_lumber_improvements_absolutism: "With the introduction of wind power to our sawmills, we are able to process timber into planks at a much faster rate than we could previously."
  STATIC_MODIFIER_NAME_modifier_coal_improvements_absolutism: "Improved Coking"
  STATIC_MODIFIER_DESC_modifier_coal_improvements_absolutism: "By streamlining the coal refining process, we can use it more effectively as fuel while eliminating side effects that would negatively impact other industrial products."
  STATIC_MODIFIER_NAME_modifier_food_advance_absolutism: "Closed Fields"
  STATIC_MODIFIER_DESC_modifier_food_advance_absolutism: "Until recently, land ownership and use was relatively common and free. However, there is now an increasing tendency to start a process of specific land delimitation, clearly determining the borders and size of fields exclusively dedicated to agriculture. With this kind of specified use, their production and exploitation can be greatly increased."
  STATIC_MODIFIER_NAME_modifier_scientific_revolution_advance: "Scientific Revolution"
  STATIC_MODIFIER_DESC_modifier_scientific_revolution_advance: "Recent developments in mathematics, physics, astronomy, biology and chemistry have not only challenged, but completely changed our view of the world around us. Society is progressing at a greater speed than ever before, and more scientific breakthroughs are made every day."
  STATIC_MODIFIER_NAME_modifier_scientific_mapping_advance: "Cartographic Mapping"
  STATIC_MODIFIER_DESC_modifier_scientific_mapping_advance: "Recent improvements in the sciences of geography and cartography have allowed for more accurate depictions of land masses and natural features, both in terms of their relative sizes and their exact positions."
  STATIC_MODIFIER_NAME_modifier_coke_blast_furnace: "Coke Blast Furnace"
  STATIC_MODIFIER_DESC_modifier_coke_blast_furnace: "This is a new type of blast furnace, which uses coke instead of charcoal as its fuel. It is cheaper and allows us to build larger furnaces, although coke has the disadvantage of being less pure than charcoal, which is a problem yet to be addressed."
  STATIC_MODIFIER_NAME_modifier_merchant_power_from_maritime_absolutism_advance: "Chamber of Commerce"
  STATIC_MODIFIER_DESC_modifier_merchant_power_from_maritime_absolutism_advance: "With the emergence of new ideas about commerce and economics, the local businesses have joined together to form a business network that can further their interests and protect their rights against political entities and foreign influences."
  STATIC_MODIFIER_NAME_modifier_hollander_beater: "Hollander Beater"
  STATIC_MODIFIER_DESC_modifier_hollander_beater: "For centuries, paper mills have relied on mechanical hammers to beat lumpen paper pulp, crushing the fiber to create the raw material needed to then create paper. Using local windmills for power, enterprising artisans have now devised a more efficient solution: the 'Hollander Beater', a vat containing a wind-powered horizontal roller with blades. These blades can shred as much pulp in hours as the old hammers did over days."
  STATIC_MODIFIER_NAME_modifier_maritime_advance_age_5: "Convoys"
  STATIC_MODIFIER_DESC_modifier_maritime_advance_age_5: "As maritime trade expands, with our ships ferrying goods back and forth in greater quantities and to more distant shores than ever before, the need to maintain a consistent flow of commerce also increases. Organizing convoy trade fleets will allow a more stable circulation of trade ships."
  STATIC_MODIFIER_NAME_modifier_the_constitution: "The Constitution"
  STATIC_MODIFIER_DESC_modifier_the_constitution: "A new philosophical concept called constitutionalism has been developed, wherein the government accepts legal limits to its power through established law rather than ruling by arbitrary decree. While some may find this idea intriguing, it is obviously not popular with monarchs..."
  STATIC_MODIFIER_NAME_modifier_ship_building_techniques_absolutism: "Wet Dock"
  STATIC_MODIFIER_DESC_modifier_ship_building_techniques_absolutism: "The development of the wet dock, or floating dock, will allow our shipwrights to construct ships much faster than before."
  STATIC_MODIFIER_NAME_modifier_power_projection_advance_5: "Absolutist Ambitions"
  STATIC_MODIFIER_DESC_modifier_power_projection_advance_5: "As state power becomes increasingly centralized, rulers across the world have begun to envision themselves as absolute sovereigns over their respective territories. Like the sun that illuminates the entire world, they seek to be the sole source of authority, their will extending unchallenged across every corner of their domain."
  STATIC_MODIFIER_NAME_modifier_jesuits_bark: "Jesuit's Bark"
  STATIC_MODIFIER_DESC_modifier_jesuits_bark: "Some native population of South America have been observed to use the bark of a specific tree to treat shivers. Thanks to the experiments of a Jesuit apothecary, this bark has been proven also effective for the treatment of malaria, and it is already known as 'Jesuit's Bark'. Distributing it to the affected population will greatly decrease the effects of the disease."
  STATIC_MODIFIER_NAME_modifier_national_sovereignty: "National Sovereignty"
  STATIC_MODIFIER_DESC_modifier_national_sovereignty: "The many long wars in the first half of the 17th century have led to an international diplomatic system for which the territorial integrity of states is a cornerstone. States, rather than individual rulers or supra-national groupings, are the actors in the international arena, and no state has the right to intervene in the internal affairs of another."
  STATIC_MODIFIER_NAME_modifier_naval_professionalism: "Naval Professionalization"
  STATIC_MODIFIER_DESC_modifier_naval_professionalism: "Until the beginning of the 17th century, permanent navies were quite small, and even notable martitime powers mostly maintained only enough of a naval force to meet their immediate needs. Over time, however, many states have started moving in the direction of establishing larger professional navies. Unless we want to see our rivals overtake us in naval matters, we must strive to create a larger permanent navy with the proper administrative structures to support it. We should also ensure that a naval career can be a lifelong occupation for our officers."
  STATIC_MODIFIER_NAME_modifier_measuring_the_world: "Measuring the World"
  STATIC_MODIFIER_DESC_modifier_measuring_the_world: "The new sciences have given us a number of different ways to describe and measure the world around us. However, we cannot know all of the resources that could be at our disposal until we have thoroughly searched all our lands for minerals, counted every last subject, and assessed every last enterprise. Let us command out scholarly experts to conduct a thorough survey — first of our nation, then of the entire world!"
  STATIC_MODIFIER_NAME_modifier_diplomatic_range_age_5: "Diplomatic Missions"
  STATIC_MODIFIER_DESC_modifier_diplomatic_range_age_5: "The complexity of modern politics can no longer be handled by single envoys. To expand our influence even further and protect our interests in those faraway places, we will send skilled teams of expert diplomats to each country."
  STATIC_MODIFIER_NAME_modifier_spy_construction_absolutism: "Expand Global Spy Networks"
  STATIC_MODIFIER_DESC_modifier_spy_construction_absolutism: "As the various empires and institutions that make up our world continue to expand, we shall need to maintain and perhaps increase espionage if we wish to stay one step ahead of our rivals."
  STATIC_MODIFIER_NAME_modifier_subject_loyalty_absolutism: "Absolute Loyalty"
  STATIC_MODIFIER_DESC_modifier_subject_loyalty_absolutism: "We tolerate no dissent or revolt. Absolute loyalty is demanded from all subjects, whether they are part of the core citizenry or a conquered group."
  STATIC_MODIFIER_NAME_modifier_improve_relation_impact_absolutism: "Permanent Foreign Affairs Ministry"
  STATIC_MODIFIER_DESC_modifier_improve_relation_impact_absolutism: "Our ever-growing diplomatic corps necessitates our creating a permanent Foreign Affairs Ministry to manage and coordinate our many envoys and coordinate their efforts."
  STATIC_MODIFIER_NAME_modifier_relations_absolutism_advance: "Threaded Politics"
  STATIC_MODIFIER_DESC_modifier_relations_absolutism_advance: "As the world around us shifts to accommodate the wider scope of a truly global theater, so too must our diplomatic efforts keep up with this ever-growing need for security against foreign threats."
  STATIC_MODIFIER_NAME_modifier_military_revolution_advance: "Military Revolution"
  STATIC_MODIFIER_DESC_modifier_military_revolution_advance: "War never changes, but the manner of waging it does. Recent arms developments have proved that the old ways of fighting are obsolete, and armies have experienced a full paradigm shift. Adapting to those changes is the only way to continue being a strong military power."
  STATIC_MODIFIER_NAME_modifier_improved_supply_lines: "Improved Supply Lines"
  STATIC_MODIFIER_DESC_modifier_improved_supply_lines: "Modern warfare demands more and more resources for our armies, especially since the development of salvo fire and the widespread use of artillery on the battlefield."
  STATIC_MODIFIER_NAME_modifier_artillery_vs_fort_age_5_absolutism: "Siege Cannons"
  STATIC_MODIFIER_DESC_modifier_artillery_vs_fort_age_5_absolutism: "Gunpowder has made way for the creation of multiple different types of weapons. Cutting through lines of infantry does not require the same power as breaking down castle walls, and so a specialized type of cannon has to be deployed in sieges."
  STATIC_MODIFIER_NAME_modifier_army_movement_speed_absolutism: "Magazines"
  STATIC_MODIFIER_DESC_modifier_army_movement_speed_absolutism: "Field magazines are not new technology, but their use has been greatly popularized by the unparalleled growth of modern armies. The steady supply of ammunition they provide facilitates ease of army movement, and extends their operational range."
  STATIC_MODIFIER_NAME_modifier_regiment_reinforcement_speed_absolutism: "Marshal of Lodgings"
  STATIC_MODIFIER_DESC_modifier_regiment_reinforcement_speed_absolutism: "Standing armies have become the new standard of warfare, which in itself brings its share of challenges. The Marshal of Lodging, a new position within our military, shall focus on overcoming these challenges by organizing the logistics of our ever-growing forces."
  STATIC_MODIFIER_NAME_modifier_war_score_absolutism_advance: "Aggressive Demands"
  STATIC_MODIFIER_DESC_modifier_war_score_absolutism_advance: "The power of the state is directly tied to its military capacity. The more populous a country is, the grander its army can become. We must take an aggressive approach toward annexing as much land as possible in peace treaties to seize the advantage over our neighbors."
  STATIC_MODIFIER_NAME_modifier_correct_box_advance_absolutism: "Flexible Battle Formations"
  STATIC_MODIFIER_DESC_modifier_correct_box_advance_absolutism: "New tactics have developed, making for more flexible and coordinated infantry, cavalry, and artillery units on the battlefield, usually grouped as brigades."
  STATIC_MODIFIER_NAME_modifier_anti_piracy_warfare: "Merchant Convoys"
  STATIC_MODIFIER_DESC_modifier_anti_piracy_warfare: "The rise of cutthroat, lawless buccaneers in the New World — and along the maritime routes leading to it — had made a great impact on our merchants and our trade. From now on, our merchant ships will form convoys with an accompanying warship to protect them, and will have on board a small military contingent to further ensure their survival on the high seas."
  STATIC_MODIFIER_NAME_modifier_absolutism_agressive_advance: "State Above All"
  STATIC_MODIFIER_DESC_modifier_absolutism_agressive_advance: "As various regions of the world are formally consolidated and resources become more limited, it is the right of the state to exercise an aggressive policy to satisfy the material needs of its people and expand its power. And while war should be seen as the last act of diplomacy, it is still a diplomatic play, as the state is above human restrictions such as morality and law."
  STATIC_MODIFIER_NAME_modifier_supply_depot_advance_age_5_absolutism: "Forward Depots"
  STATIC_MODIFIER_DESC_modifier_supply_depot_advance_age_5_absolutism: "Armies can now penetrate deeper into enemy territory and sustain themselves there for longer periods, making it necessary to build and maintain forward depots closer to them while being linked to rear supply lines."
  STATIC_MODIFIER_NAME_modifier_line_infantry: "Line Infantry"
  STATIC_MODIFIER_DESC_modifier_line_infantry: "With the invention of bayonets, each musketeer could also function as a pikeman. This allowed pikes to be removed from infantry equipment, and provided infantry formations with more firepower."
  STATIC_MODIFIER_NAME_modifier_naval_morale_advance_5: "Permanent Fleets"
  STATIC_MODIFIER_DESC_modifier_naval_morale_advance_5: "The global expansion of trade and commerce demands permanent naval forces to protect national interests. Maintaining an established, ever-present standing navy will allow ships to operate more effectively together as a fleet."
  STATIC_MODIFIER_NAME_modifier_gustavian_infantry: "Gustavian Infantry"
  STATIC_MODIFIER_DESC_modifier_gustavian_infantry: "Gustavus Adolphus, ruler of $SWE$, made several innovations to his infantry that improved their performance. His formations were narrowed and made rectangular to increase the number of muskets that could fire in each volley, and the attachment of small artillery pieces further increased their firepower."
  STATIC_MODIFIER_NAME_modifier_country_unification_advance: "Subject Supervision"
  STATIC_MODIFIER_DESC_modifier_country_unification_advance: "The earlier we start integrating the administration of our subjects to follow the rules of our own, the easier the integration of other matters will be. Creating a permanent liaison with our subjects will make this process significantly smoother."
  STATIC_MODIFIER_NAME_modifier_new_world_advance: "New World"
  STATIC_MODIFIER_DESC_modifier_new_world_advance: "As the $FLO_ADJ$ navigator Amerigo Vespucci says, the lands discovered by Columbus are not the Indies but, in fact, a whole New World unknown to our ancients and waiting to be mapped and claimed."
  STATIC_MODIFIER_NAME_modifier_explorer_commisions_advance: "Explorer Commissions"
  STATIC_MODIFIER_DESC_modifier_explorer_commisions_advance: "Beyond our shores lie uncharted lands, ripe for the taking! We shall recruit brave explorers to set course for the unknown and bring back exotic goods. This is a vital — and possibly very lucrative — opportunity for us."
  STATIC_MODIFIER_NAME_modifier_open_sea_exploration: "Overseas Exploration"
  STATIC_MODIFIER_DESC_modifier_open_sea_exploration: "The vast seas promise us great riches and new opportunities for trade on distant shores."
  STATIC_MODIFIER_NAME_modifier_repair_at_sea_aod: "Professional Crews"
  STATIC_MODIFIER_DESC_modifier_repair_at_sea_aod: "While the latest advances in naval craftsmanship are pushing the boundaries of sailing as we know it, we need any crewmen on said ships to know how to fully exploit these new capabilities. Only training permanent professional sailors will allow them to correctly perform the necessary tasks to maintain these cutting-edge new ships."
  STATIC_MODIFIER_NAME_modifier_merchant_power_from_maritime_discovery_advance: "Merchant Guilds"
  STATIC_MODIFIER_DESC_modifier_merchant_power_from_maritime_discovery_advance: "The confraternities of merchants allow our traders to organize, share profitable trade route information, and join forces when buying and selling in foreign markets."
  STATIC_MODIFIER_NAME_modifier_maritime_decay_advance_disc: "Established Routes"
  STATIC_MODIFIER_DESC_modifier_maritime_decay_advance_disc: "The seas are constantly crossed by eager merchants searching for the best profit. This naturally evolves into certain routes becoming more established and frequented than others, with the most popular ones seeing a steady steam of ships sailing back and forth."
  STATIC_MODIFIER_NAME_modifier_rgo_logistics_discovery: "Local Storehouses"
  STATIC_MODIFIER_DESC_modifier_rgo_logistics_discovery: "If merchants and artisans can access the products they need locally, that would not only ease the burden of their work, but keep prices from being excessively high. To that effect, storehouses will serve as local distribution hubs to supply everyone's needs."
  STATIC_MODIFIER_NAME_modifier_colonial_charters: "Colonial Charters"
  STATIC_MODIFIER_DESC_modifier_colonial_charters: "These new documents will ensure the rights of our countrymen when they settle the untamed New World. They give our colonies the exclusive right of governing these new lands and regulate their relationship with the mother country."
  STATIC_MODIFIER_NAME_modifier_maritime_advance_age_3: "Exploration Fleets"
  STATIC_MODIFIER_DESC_modifier_maritime_advance_age_3: "As our knowledge of the world grows, so does the need to learn even more about it. From the far seas to the east to the new coasts in the west, the length at which we must sail has increased, and thus so has the need for a bigger fleet."
  STATIC_MODIFIER_NAME_modifier_trade_range_advance_age_3: "Improved Trade Ships"
  STATIC_MODIFIER_DESC_modifier_trade_range_advance_age_3: "We have developed larger ships that require a smaller crew to sail, and which can travel farther without needing to stop. This should greatly increase the range of our trade efforts as a result."
  STATIC_MODIFIER_NAME_modifier_coastal_trade_routes_advance: "Coastal Expansion"
  STATIC_MODIFIER_DESC_modifier_coastal_trade_routes_advance: "The safest way for any ship to sail is to do it close to the coast. Unless they actually have to cross the sea, there is no real need for our ships to sail away from the protective coastline, and it is still quicker traveling by ship than by land. As such, maintaining a constant flow of ships along our coasts will allow for easier circulation of goods and people."
  STATIC_MODIFIER_NAME_modifier_ship_building_techniques_discovery: "Improved Shipbuilding"
  STATIC_MODIFIER_DESC_modifier_ship_building_techniques_discovery: "New building techniques for our ships will help us produce them faster."
  STATIC_MODIFIER_NAME_modifier_port_cost_distance_from_capital_advance: "Experienced Captains"
  STATIC_MODIFIER_DESC_modifier_port_cost_distance_from_capital_advance: "Not every scallywag is worthy of being a captain; only the most experienced and skillful of them will lead our vessels. Such salty seadogs should be capable of safely finding their way back to port even in the fiercest of storms."
  STATIC_MODIFIER_NAME_modifier_exploration_maintenance_advance: "Sturdy Construction"
  STATIC_MODIFIER_DESC_modifier_exploration_maintenance_advance: "The key factor when building a ship is its capacity for resisting inclement weather and the relentless pounding of waves. By developing sturdier methods of ship construction, we can ensure that our vessels can sail for longer periods of time."
  STATIC_MODIFIER_NAME_modifier_beat_to_windward_advance: "Beat to Windward!"
  STATIC_MODIFIER_DESC_modifier_beat_to_windward_advance: "Lateen-rigged caravels are highly maneuverable, allowing them to easily tack against the wind. This makes sailing through unfavorable weather and hostile seas much quicker."
  STATIC_MODIFIER_NAME_modifier_green_vitriol: "Green Vitriol"
  STATIC_MODIFIER_DESC_modifier_green_vitriol: "Although not technically the same substance as $alum$, $green_vitriol$ has been traditionally conflated with it in alchemical writings, and both have similar properties. As such, it is not uncommon to use one as a substitute for the other."
  STATIC_MODIFIER_NAME_modifier_naval_ambitions: "Naval Ambitions"
  STATIC_MODIFIER_DESC_modifier_naval_ambitions: "With an extra boost to naval morale, our sailors will conquer the waves and rule the seas. Meanwhile, our colonists will be able to brave the darkest corners of the world, founding new settlements farther from home than ever before."
  STATIC_MODIFIER_NAME_modifier_diplomatic_range_age_2: "Diplomatic Network"
  STATIC_MODIFIER_DESC_modifier_diplomatic_range_age_2: "Maintaining an established network of skilled diplomats around us allows us to send envoys to countries even further away."
  STATIC_MODIFIER_NAME_modifier_new_world_crops: "New World Crops"
  STATIC_MODIFIER_DESC_modifier_new_world_crops: "The bountiful lands of the New World have provided many treasures to our country. One of the most important discoveries is that of the strange, exotic plants cultivated as food and spices by the natives of those lands. Growing those crops in our fields will provide our population with the dietary variety and novelty they crave."
  STATIC_MODIFIER_NAME_modifier_pop_promotion_speed_age_3: "Nobility by Service"
  STATIC_MODIFIER_DESC_modifier_pop_promotion_speed_age_3: "Traditionally, our artistocrats achieved their status through military service to their ruler. However, the demands of a growing state now necessitate members of the lower nobility being promoted to higher ranks, while people from other classes, such as merchants, are elevated as nobles."
  STATIC_MODIFIER_NAME_modifier_blast_furnace: "Blast Furnace"
  STATIC_MODIFIER_DESC_modifier_blast_furnace: "A more expensive method than traditional metallurgy, the use of blast furnaces allows us to further refine pig iron into cast iron by re-melting it with different quantities of iron, steel, limestone, and charcoal. Cast iron made into wrought iron this way creates an excellent material for making complex products such as cannon."
  STATIC_MODIFIER_NAME_modifier_saiger_process_discovery: "Refined Saiger Process"
  STATIC_MODIFIER_DESC_modifier_saiger_process_discovery: "Improved processing and work methods will allow our $silver$ and $lead$ mines to prosper."
  STATIC_MODIFIER_NAME_modifier_new_currency_demands: "New Currency Demands"
  STATIC_MODIFIER_DESC_modifier_new_currency_demands: "The discovery of new lands has also led to an increased flow of trade. This has in turn caused a rise in the demand for coins, and although the noble metal currencies made of $goods_gold$ and $silver$ remain the main values, other lesser metals like $copper$ and its alloys have seen their use and circulation increased."
  STATIC_MODIFIER_NAME_modifier_rgo_size_advance_discovery: "Advanced Extraction Techniques"
  STATIC_MODIFIER_DESC_modifier_rgo_size_advance_discovery: "The discovery of new minerals and the invention of new tools has resulted in more efficient resource gathering and production line acceleration."
  STATIC_MODIFIER_NAME_modifier_surgery_advance: "Surgery"
  STATIC_MODIFIER_DESC_modifier_surgery_advance: "Barber-surgeons are developing more sophisticated techniques for treating injuries and illnesses, and the invention of new surgical instruments makes procedures safer and more effective. As a result, patients are surviving injuries and illnesses that would have been fatal just a few years ago."
  STATIC_MODIFIER_NAME_modifier_construction_speed_discovery: "Standardized Planks and Bricks"
  STATIC_MODIFIER_DESC_modifier_construction_speed_discovery: "The standardization of plank and brick production using more modern techniques aims to enable easier construction."
  STATIC_MODIFIER_NAME_modifier_printing_press_advance: "Printing Press"
  STATIC_MODIFIER_DESC_modifier_printing_press_advance: "The popularization of printing techniques this century has resulted in the wider spread of knowledge, as well as easier exchange of information, by speeding up the duplication of important manuscripts."
  STATIC_MODIFIER_NAME_modifier_spy_construction_discovery: "Improved Spy Organization"
  STATIC_MODIFIER_DESC_modifier_spy_construction_discovery: "By hiring trustworthy individuals as informants and strategically positioning them in situations where clandestine information is shared, we can improve our capability to gather information about our enemies and their activities."
  STATIC_MODIFIER_NAME_modifier_diplomatic_training: "Diplomatic Training"
  STATIC_MODIFIER_DESC_modifier_diplomatic_training: "Our diplomatic playbook has been refined, and as a result, we have added excellent diplomats to our entourage in an attempt to bolster our foreign efforts."
  STATIC_MODIFIER_NAME_modifier_formalized_relations: "Formalized Relations"
  STATIC_MODIFIER_DESC_modifier_formalized_relations: "Establishing formal relations with neighboring countries of interest is crucial if we are to maintain a balance of power and promote our interests."
  STATIC_MODIFIER_NAME_modifier_faceting: "Faceting"
  STATIC_MODIFIER_DESC_modifier_faceting: "Master gemcutters have made a breakthrough in diamond-cutting by experimenting with diamond dust suspended in oil on their scaifs. This allows the artisans to cut stones in entirely new shapes, and to a much higher brilliance. The resulting technique, known as faceting, produces a stone of a pleasing geometric shape and with better optical qualities. As the new stones, and the technique for cutting them, spreads across courts and workshops, the demand for jewelry and precious stones increases greatly."
  STATIC_MODIFIER_NAME_modifier_print_culture: "Print Culture"
  STATIC_MODIFIER_DESC_modifier_print_culture: "With the invention of the printing press, the spread of knowledge has never been easier. New techniques and advances will reach every corner of our nation and make it grow stronger and richer."
  STATIC_MODIFIER_NAME_modifier_artists_advance_discovery: "Artistic Prints"
  STATIC_MODIFIER_DESC_modifier_artists_advance_discovery: "Widespread usage of the printing press has created new opportunities for our people to share their artistic skills, and to distribute this art faster and more widely than ever before."
  STATIC_MODIFIER_NAME_modifier_improved_book_binding: "Improved Bookbinding"
  STATIC_MODIFIER_DESC_modifier_improved_book_binding: "The blossoms of thought and knowledge must be watered by a steady supply of books if we are to prosper and cultivate as a people."
  STATIC_MODIFIER_NAME_modifier_lumber_improvements_discovery: "Dedicated Forestry"
  STATIC_MODIFIER_DESC_modifier_lumber_improvements_discovery: "By dedicating a portion of land to the cultivation and harvesting of strong trees, we can increase the quality and quantity of our lumber production."
  STATIC_MODIFIER_NAME_modifier_regulate_court_procedures: "Regulate Court Procedures"
  STATIC_MODIFIER_DESC_modifier_regulate_court_procedures: "By applying a strict regimen and routine to our operations, we will reduce any potential excess cost, and run a frugal and efficient court."
  STATIC_MODIFIER_NAME_modifier_crown_power_advance_discovery: "Statecraft"
  STATIC_MODIFIER_DESC_modifier_crown_power_advance_discovery: "As our ruler's authority becomes the dominant power in our domain, it highlights the need for a comprehensive government structure, as well as a proper bureaucratic corpus to manage it."
  STATIC_MODIFIER_NAME_modifier_government_size_discovery: "Early Administrative Capacity"
  STATIC_MODIFIER_DESC_modifier_government_size_discovery: "Our domain consists of many administrative sectors, and as we expand it, we must make the necessary adjustments to our government to account for this growth. "
  STATIC_MODIFIER_NAME_modifier_town_rights_aod_advance: "Capital Primacy"
  STATIC_MODIFIER_DESC_modifier_town_rights_aod_advance: "From all settlements of our country, both rural and urban, none is more important than our capital. Being the place of our court and the source of our power, it clearly deserves some preferencial treatment compared to other settlements."
  STATIC_MODIFIER_NAME_modifier_trade_through_owned_disc_advance: "Merchant Trails"
  STATIC_MODIFIER_DESC_modifier_trade_through_owned_disc_advance: "Merchants rarely stay still in one place, always trying to find the most profitable trades. Their constant coming and going is a common sight in our lands, and over time they have beaten their own paths to shorten the journey to their destinations."
  STATIC_MODIFIER_NAME_modifier_naval_morale_advance_2: "Navigation Techniques"
  STATIC_MODIFIER_DESC_modifier_naval_morale_advance_2: "Our sailors are becoming accustomed to longer journeys, using a new set of techniques and instruments, such as dry compasses, to improve their mastery of navigation."
  STATIC_MODIFIER_NAME_modifier_basic_financial_instruments: "Basic Financial Instruments"
  STATIC_MODIFIER_DESC_modifier_basic_financial_instruments: "Overseas trade is very risky, but also highly profitable. The development of financial instruments like letters of credit will help reduce that risk and increase our profits."
  STATIC_MODIFIER_NAME_modifier_hire_artist_cost_modifier_advance_disc: "Land of Culture"
  STATIC_MODIFIER_DESC_modifier_hire_artist_cost_modifier_advance_disc: "Culture and the arts define the identity of any country. By proudly promoting our cultural achievements, we will leave a lasting impression on the entire world."
  STATIC_MODIFIER_NAME_modifier_gov_reform_discovery_a: "Early Administrative Reformation"
  STATIC_MODIFIER_DESC_modifier_gov_reform_discovery_a: "Our people stand at the threshold of a new era. In order to harness our internal capabilities, we must adapt our government and refine our administrative domain."
  STATIC_MODIFIER_NAME_modifier_rural_rgo_disc_advance: "Developing Settlements"
  STATIC_MODIFIER_DESC_modifier_rural_rgo_disc_advance: "Any settlement, no matter how small, will thrive as long as the land is rich and there are people willing to work it. Even the smallest village can become prosperous and bustling with activity over time."
  STATIC_MODIFIER_NAME_modifier_power_projection_advance_4: "Domineering External Influence"
  STATIC_MODIFIER_DESC_modifier_power_projection_advance_4: "Our presence at the diplomatic tables always conveys an air of grandeur and prestige. Our voice and influence shall resonate with all those with whom we engage."
  STATIC_MODIFIER_NAME_modifier_pike_and_shot_advance: "Pike and Shot"
  STATIC_MODIFIER_DESC_modifier_pike_and_shot_advance: "A new type of warfare has emerged on the battlefield: Pikemen form a defensive square, while arquebusiers fan out to the sides and front, retreating behind or inside the square in case the formation enters close combat."
  STATIC_MODIFIER_NAME_modifier_matchlock_gun: "Early Hunting Guns"
  STATIC_MODIFIER_DESC_modifier_matchlock_gun: "Improvements to the weapons produced by our gunsmiths will also provide our hunters with better tools to bring home ample furs and wild game."
  STATIC_MODIFIER_NAME_modifier_supply_depot_advance_age_3_discovery: "Army Depots"
  STATIC_MODIFIER_DESC_modifier_supply_depot_advance_age_3_discovery: "The development and deployment of standing armies have increased the demands for weaponry, uniforms, and other military supplies, which should be stored in close proximity to our soldiers."
  STATIC_MODIFIER_NAME_modifier_regiment_reinforcement_speed_discovery: "Early Military Logistics"
  STATIC_MODIFIER_DESC_modifier_regiment_reinforcement_speed_discovery: "Logistics are half the battle. As soldiers fight, their weaponry and armor will lose their durability, and possibly even break under the enemy onslaught. Establishing local supply depots, as well as employing other logistic methods, allows us to re-equip our soldiers in record time."
  STATIC_MODIFIER_NAME_modifier_correct_box_advance_discovery: "Lieutenants"
  STATIC_MODIFIER_DESC_modifier_correct_box_advance_discovery: "As our professional armies grow, the commissioned officers that lead them are commanding increasingly bigger formations. To assist them, we will create the rank of lieutenant. These officers take charge of transmitting orders from command, and also lead smaller units on the battlefield."
  STATIC_MODIFIER_NAME_modifier_pike_square: "Pike Square"
  STATIC_MODIFIER_DESC_modifier_pike_square: "Throughout the Middle Ages, the dominance of cavalry was challenged by disciplined pikemen. In battles such as Bannockburn or the Golden Spurs, the pikemen decimated the cavalry. A combination of improved training and discipline, and the addition of swordsmen to provide close combat support, has raised this formation to the peak of its efficiency."
  STATIC_MODIFIER_NAME_modifier_supply_lines: "Supply Lines"
  STATIC_MODIFIER_DESC_modifier_supply_lines: "The development of professional armies has changed the way war is waged. Logistics are now essential, and supply lines are absolutely necessary to keep armies fed and supplied with ammunition."
  STATIC_MODIFIER_NAME_modifier_land_morale_attrition_cost_advance: "March Training"
  STATIC_MODIFIER_DESC_modifier_land_morale_attrition_cost_advance: "It is common for armies to have to march great distances in order to reach their enemy. As such, long marches are a staple of our military training regimen, accustoming our fighters to walking long distances and still arriving fresh for the battle."
  STATIC_MODIFIER_NAME_modifier_linked_armies_advance: "Message Relays"
  STATIC_MODIFIER_DESC_modifier_linked_armies_advance: "Good coordination between the different units of an army is crucial for it to function well. Having an organized system to relay messages between our generals and their unit officials allows all our troops to work more cohesively and respond faster to any situation."
  STATIC_MODIFIER_NAME_modifier_land_morale_movement_cost_advance_disc: "Coordinated March"
  STATIC_MODIFIER_DESC_modifier_land_morale_movement_cost_advance_disc: "An army on the move is vulnerable, and prone to disorganization. Training our troops to march in an organized and coordinated manner ensures that they will retain their battle formations, even if attacked while moving."
  STATIC_MODIFIER_NAME_modifier_confessionalism_advance: "Confessionalism"
  STATIC_MODIFIER_DESC_modifier_confessionalism_advance: "There are a myriad of different interpretations of what the Faith should be, and as such, there has been an increased interest among religious and secular authorities alike to clearly define the methodology of their specific confessions, enforcing their particular rules and views on all aspects of faith and life."
  STATIC_MODIFIER_NAME_modifier_power_projection_advance_3: "Regional Ambitions"
  STATIC_MODIFIER_DESC_modifier_power_projection_advance_3: "The ability to project power beyond our borders is of vital importance to maintaining relevance on the regional stage. By studying the strategies of great powers past and present, we can elevate our nation's prestige everywhere and leverage that reputation to exert power."
  STATIC_MODIFIER_NAME_modifier_gov_reform_reformation_a: "The Prince"
  STATIC_MODIFIER_DESC_modifier_gov_reform_reformation_a: "Current events have determined that rulers need to approach the management of the state more systematically, taking into account both the different estates of the country, and the distinct diplomatic actors that surround them."
  STATIC_MODIFIER_NAME_modifier_crown_power_advance_reformation: "'Cuius Regio, Eius Religio'"
  STATIC_MODIFIER_DESC_modifier_crown_power_advance_reformation: "While our ruler has a firm grasp over matters mundane, it is becoming a necessity that they also take control of heavenly concerns. Church and state must become one."
  STATIC_MODIFIER_NAME_modifier_confessional_court: "Confessional Court"
  STATIC_MODIFIER_DESC_modifier_confessional_court: "Court expenses can easily bankrupt even the richest nation. In order to achieve a good balance between luxury and sensible expenses, we can adopt small measures to reduce those costs without reducing the magnificence of our court."
  STATIC_MODIFIER_NAME_modifier_artists_advance_reformations: "Development of Secular Art"
  STATIC_MODIFIER_DESC_modifier_artists_advance_reformations: "In the wake of the Reformation, new forms of art flourish like blossoms on a vine. It has become easier for artists to gain recognition in their field, and also to find employment in the courts of the world."
  STATIC_MODIFIER_NAME_modifier_war_score_reformations_advance: "Divine Right to Conquer"
  STATIC_MODIFIER_DESC_modifier_war_score_reformations_advance: "Victory on the battlefield is the result of more than just good execution of battle plans and war strategies — it is a divine intervention in our favor. Therefore, our right to conquer and annex new territories for which we have spilled blood is an extension of the divine will that champions our supremacy."
  STATIC_MODIFIER_NAME_modifier_reformation_subject_opinions_advance: "Economic Overlords"
  STATIC_MODIFIER_DESC_modifier_reformation_subject_opinions_advance: "Contracts that define suzerainty over another state cover many different aspects. One such is the domestic trade obligations of the subject to their overlord. As global trade becomes more and more prominent, the expansion of these obligations becomes increasingly important."
  STATIC_MODIFIER_NAME_modifier_early_modern_administation: "Early Modern Administration"
  STATIC_MODIFIER_DESC_modifier_early_modern_administation: "Over time, it became apparent that a more centralized bureaucracy, with administrative bodies run by educated officials employed directly by the state, was a necessity to complete the ambitious projects of the Early Modern rulers."
  STATIC_MODIFIER_NAME_modifier_town_rights_ref_advance: "Developed Capital"
  STATIC_MODIFIER_DESC_modifier_town_rights_ref_advance: "As our country grows, so does our capital, requiring constant revision and update of the laws affecting it. Only with a functioning capital, with laws and privileges perfectly suited to its size and importance, can our country continue growing."
  STATIC_MODIFIER_NAME_modifier_pharmacology_advance: "Pharmacology"
  STATIC_MODIFIER_DESC_modifier_pharmacology_advance: "Alchemists and physicians are exploring new compounds and chemical mixtures in their search for remedies. Some of these early pharmacists have developed treatments for common illnesses like fevers, colds, and digestive problems, and their methods show promise for the future. However, there is still much to be learned, and many of these new remedies can be dangerous if not prepared correctly."
  STATIC_MODIFIER_NAME_modifier_pan_amalgamation_advance: "Pan Amalgamation"
  STATIC_MODIFIER_DESC_modifier_pan_amalgamation_advance: "The $pan_amalgamation_advance$ is an improvement of the $patio_process_advance$ that speeds up processing."
  STATIC_MODIFIER_NAME_modifier_naval_morale_advance_3: "Overseas Expeditions"
  STATIC_MODIFIER_DESC_modifier_naval_morale_advance_3: "The recent rise of long-range overseas commerce has accustomed our sailors to being at sea for long periods of time, making them resistant to the adverse effects of long journeys."
  STATIC_MODIFIER_NAME_modifier_road_advance_1: "Road Network"
  STATIC_MODIFIER_DESC_modifier_road_advance_1: "The importance of trade and commerce is becoming more and more relevant, and so is the establishment of more complex road networks to facilitate and increase the movement of people and goods."
  STATIC_MODIFIER_NAME_modifier_construction_speed_reformation: "Architectural Treatises"
  STATIC_MODIFIER_DESC_modifier_construction_speed_reformation: "The writing of architectural treatises, which often compile centuries-old knowledge, allows for faster learning and dissemination of effective construction techniques."
  STATIC_MODIFIER_NAME_modifier_lumber_improvements_reformation: "Improved Sawblades"
  STATIC_MODIFIER_DESC_modifier_lumber_improvements_reformation: "Thanks to recent advances in toolmaking, our sawblades are sturdier than ever before and require less maintenance. This will make supplying adequate lumber for economic activities far easier than before."
  STATIC_MODIFIER_NAME_modifier_generic_bureaucracy_4_advance: "Executive Bureaucracy"
  STATIC_MODIFIER_DESC_modifier_generic_bureaucracy_4_advance: "As governments grow, so too does the need for a more complex and efficient bureaucracy. By creating specialized departments to handle specific aspects of governance, we can ensure that our administration runs smoothly and effectively."
  STATIC_MODIFIER_NAME_modifier_global_trade_advance: "Global Trade"
  STATIC_MODIFIER_DESC_modifier_global_trade_advance: "Goods have been moved across continents since antiquity, but all trade is now increasingly becoming part of a greater world network. It may still be early to speak of a truly global economy, but surely the first seeds have been sown."
  STATIC_MODIFIER_NAME_modifier_merchant_power_from_maritime_reformation_advance: "Merchant Companies"
  STATIC_MODIFIER_DESC_modifier_merchant_power_from_maritime_reformation_advance: "The expansion of markets overseas — and the associated expenses and risks — require the creation of merchant associations that share the burden of trading in these new lands."
  STATIC_MODIFIER_NAME_modifier_bole_smelting: "Bole Smelting"
  STATIC_MODIFIER_DESC_modifier_bole_smelting: "A method where lead is smelted in the open air using the constant strong winds at the top of hills to blow fresh air into the melting ore."
  STATIC_MODIFIER_NAME_modifier_slitting_mills: "Slitting Mills"
  STATIC_MODIFIER_DESC_modifier_slitting_mills: "These are a new type of watermills developed for slitting bars of $iron$ into rods. This allows for more efficient development of $iron$ tools and machinery, as it allows casters to use rods that more appropriate for their needs compared to bigger bars, wasting less byproduct in the forging process."
  STATIC_MODIFIER_NAME_modifier_maritime_advance_age_4: "Global Fleets"
  STATIC_MODIFIER_DESC_modifier_maritime_advance_age_4: "Given the advances of the last century, it seems like the world has become smaller rather than bigger. Countries that had no contact until now are instead engaging in constant diplomatic and commercial relations. As a result, bigger and better fleets are needed to be able to maintain all those overseas connections."
  STATIC_MODIFIER_NAME_modifier_global_trade_routes_advance: "Overseas Trade Routes"
  STATIC_MODIFIER_DESC_modifier_global_trade_routes_advance: "The world has become larger, thanks to so many new discoveries, but it has also grown smaller with the proliferation of international trade routes. With ships constantly carrying goods and people to and from far away lands, those distant shores actually seem closer than before."
  STATIC_MODIFIER_NAME_modifier_pop_promotion_speed_age_4: "Confessional Clerics"
  STATIC_MODIFIER_DESC_modifier_pop_promotion_speed_age_4: "The Age of Reformation and Confessionalism have renewed interest in organized confessions, and there is demand for more clerics willing to guide their flocks through these troublesome times. These confessional clergy make religious offices much more appealing to those people seeking certainty and spiritual guidance."
  STATIC_MODIFIER_NAME_modifier_leader_recruit_cost_advance: "Officer Schools"
  STATIC_MODIFIER_DESC_modifier_leader_recruit_cost_advance: "Leading troops is not an easy task. Strategy, tactics, mental insight — these are just some of the skills a successful leader must have. Founding officer training schools will ensure that more of our fighting men develop good leadership skills, and give us a bigger pool of expert commanders to draw from as well."
  STATIC_MODIFIER_NAME_modifier_letters_of_marque: "Letters of Marque"
  STATIC_MODIFIER_DESC_modifier_letters_of_marque: "Piracy is an appalling act. They are naught but worthless thieves looking to profit from the suffering of others! Formally authorizing ships to raid our enemies, however, is another matter entirely, and could be extremely profitable for us."
  STATIC_MODIFIER_NAME_modifier_sturdy_privateers: "Sturdy Privateers"
  STATIC_MODIFIER_DESC_modifier_sturdy_privateers: "Privateers are always in the line of fire. If we wish to utilize their full potential, we must ensure they are not sunk after the first round of cannon fire! Making sure they only sail on the sturdiest vessels will be beneficial to us in the long run — and to the privateers themselves, of course, as they will live longer."
  STATIC_MODIFIER_NAME_modifier_safe_exploration_techniques_advance: "Lessons of Exploration"
  STATIC_MODIFIER_DESC_modifier_safe_exploration_techniques_advance: "Heading into the unknown is always scary, but nowadays, there are few places that are truly undiscovered. While many places around the world have still not been fully explored, they are nonetheless known to us, and we have the knowledge and experience to reach them. With the wealth of knowledge our explorers have collected over their many journeys, we can confidently venture into uncharted territory."
  STATIC_MODIFIER_NAME_modifier_imperial_ambitions: "Imperial Ambitions"
  STATIC_MODIFIER_DESC_modifier_imperial_ambitions: "The great empires of the past are a source of inspiration for artists and poets alike, always spoken of with awe and admiration. If we want to generate the same reaction towards our own country, we should aspire to the same grandeur."
  STATIC_MODIFIER_NAME_modifier_spy_construction_reformation: "Advanced Cryptography"
  STATIC_MODIFIER_DESC_modifier_spy_construction_reformation: "If we want to gather intelligence on our enemies, we must improve our skill in cracking and devising secret codes. We shall lull our enemies into a false sense of security by sending what appear to be only ordinary communications, which shall actually contain hidden, encoded information. A pity our enemies will not be clever enough to understand it!"
  STATIC_MODIFIER_NAME_modifier_chartered_companies: "Chartered Companies"
  STATIC_MODIFIER_DESC_modifier_chartered_companies: "The world is a big place, and in order to develop our global trade, we must take some serious risks. Luckily there are merchant in our country willing to do so, using mostly their own capital. By sanctioning such companies with a government charter giving them special rights to exercise government powers as well as monopolies in certain areas, we can control and encourage commercial development of everything from foreign trade networks to our colonial possessions overseas."
  STATIC_MODIFIER_NAME_modifier_development_of_maritime_law: "Development of Maritime Law"
  STATIC_MODIFIER_DESC_modifier_development_of_maritime_law: "With more and more countries sending their subjects or citizens abroad on various trading ventures and with so many living so close to each other for so long times it has become absolutely essential to have at least a basic concept of common laws of the seas. With publications such as 'Mare Liberum' or the later 'De Dominio Maris Dissertatio', the foundations to an international law of the seas have been laid."
  STATIC_MODIFIER_NAME_modifier_diplomatic_range_age_3: "Embassies"
  STATIC_MODIFIER_DESC_modifier_diplomatic_range_age_3: "The current international situation requires that we set up permanent offices for our diplomats in neighboring countries. It is the only way to ensure that our interests are upheld in our region while we extend our reach beyond it."
  STATIC_MODIFIER_NAME_modifier_trade_envoys: "Trade Envoys"
  STATIC_MODIFIER_DESC_modifier_trade_envoys: "With the recent increase in trade to and from faraway lands, our envoys have started joining trade expeditions to establish diplomatic contacts with countries that were previously out of our reach."
  STATIC_MODIFIER_NAME_modifier_shared_products_procedures: "Shared Products and Procedures"
  STATIC_MODIFIER_DESC_modifier_shared_products_procedures: "The world has become smaller, and we have encountered a plethora of new peoples and undiscovered territory. Along with these discoveries, we have also come into contact with many new products and ways of utilizing them. Even the most specialized goods, like $alum$, can be used in other ways in other places."
  STATIC_MODIFIER_NAME_modifier_riches_of_foreign_coasts: "Riches of Foreign Coasts"
  STATIC_MODIFIER_DESC_modifier_riches_of_foreign_coasts: "Distant lands have brought to us many resources, but not only the lands themselves are rich. Coasts and seas are also plentiful, and the knowledge we have gained from foreign pearl divers allows ours to be more successful in their catches."
  STATIC_MODIFIER_NAME_modifier_foreign_mining_techniques: "Foreign Mining Techniques"
  STATIC_MODIFIER_DESC_modifier_foreign_mining_techniques: "Precious stones have been appreciated by humanity for millennia. By coming into contact with foreign peoples from faraway lands, we can learn not only about the types of $gems$ they value most, but also about the techniques they use to obtain them."
  STATIC_MODIFIER_NAME_modifier_subject_income_reformation_advance: "Firmer Financial Control"
  STATIC_MODIFIER_DESC_modifier_subject_income_reformation_advance: "The financial responsibilities our subjects have towards us are clearly defined. However, tightening these contracts will ensure timely payments and lead to a healthier treasury."
  STATIC_MODIFIER_NAME_modifier_rgo_size_advance_reformation: "Spinning Wheels"
  STATIC_MODIFIER_DESC_modifier_rgo_size_advance_reformation: "As we learn new and better methods of resource extraction, our production will skyrocket, making us richer in the process!"
  STATIC_MODIFIER_NAME_modifier_food_advance_reformation: "Market Agriculture"
  STATIC_MODIFIER_DESC_modifier_food_advance_reformation: "New and improved crops can be introduced to increase agricultural productivity. Whether through selective breeding of existing varieties or importing superior foreign cultivars, we can significantly boost our food production."
  STATIC_MODIFIER_NAME_modifier_scientific_experimentation: "Scientific Experimentation"
  STATIC_MODIFIER_DESC_modifier_scientific_experimentation: "Things happen for a reason. By understanding the explanation behind everything, we can learn what to expect when similar situations arise."
  STATIC_MODIFIER_NAME_modifier_military_administration: "Military Administration"
  STATIC_MODIFIER_DESC_modifier_military_administration: "The ever-increasing armies of the 16th century have imposed equally heightened demands on national administrations. By creating a permanent organization charged with military supply strategy and operation, and by keeping more troops on the rolls even during winter or peacetime, we will ultimately be able to field large armies more cheaply and to support those armies more efficiently."
  STATIC_MODIFIER_NAME_modifier_artillery_institution_advance: "Siege Artillery"
  STATIC_MODIFIER_DESC_modifier_artillery_institution_advance: "The invention of gunpowder in Sòng $CHI$ has led to the development of a new device that employs its firepower in warfare: the artillery. These weapons pose a serious threat to stone-built castles and other fortifications."
  STATIC_MODIFIER_NAME_modifier_flintlock_gun: "Improved Hunting Guns"
  STATIC_MODIFIER_DESC_modifier_flintlock_gun: "With the development of improved flintlock guns and special ammunition for hunting, our hunters will be even more capable of bagging their prey."
  STATIC_MODIFIER_NAME_modifier_correct_box_advance_reformation: "Regimental Organization"
  STATIC_MODIFIER_DESC_modifier_correct_box_advance_reformation: "Professional armies have made it possible to create a new type of unit, the regiment, which not only is a permanent position for soldiers, but also a useful battle formation."
  STATIC_MODIFIER_NAME_modifier_spanish_square: "Spanish Square"
  STATIC_MODIFIER_DESC_modifier_spanish_square: "The Spanish Square evolved organically from the $pike_and_shot$ formation. At its core was a traditional pike square, and at each corner, it had a group of arquebusiers. This way, they maintained the staying power of the traditional pike square and enhanced it with the firepower of the arquebus."
  STATIC_MODIFIER_NAME_modifier_combined_arms_advance_reformation: "Combined Arms"
  STATIC_MODIFIER_DESC_modifier_combined_arms_advance_reformation: "Warfare is becoming increasingly complex, driven by the widespread adoption of standing armies composed of soldiers hired for permanent service. The introduction of new weapons, such as firearms and cannons, encourages an approach that balances and combines light and heavy infantry, cavalry, and artillery, supported by auxiliary units."
  STATIC_MODIFIER_NAME_modifier_assault_ability_reformation: "Reformed Breach Sorties"
  STATIC_MODIFIER_DESC_modifier_assault_ability_reformation: "By delegating the responsibility of assaulting breaches to our finest and most disciplined troops, we will penetrate even the most formidable fortifications that our foes may hide behind."
  STATIC_MODIFIER_NAME_modifier_regiment_reinforcement_speed_reformation: "Powder Flask"
  STATIC_MODIFIER_DESC_modifier_regiment_reinforcement_speed_reformation: "Use of gunpowder weaponry has become increasingly prevalent among our fighting forces. However, gunpowder is a troublesome material to work with due to its vulnerability to weather and external impact. A specialized flask will protect our gunpowder from the elements, allowing us to supply our troops more easily."
  STATIC_MODIFIER_NAME_modifier_recruitment_improvements_reformation: "Recruitment Offices"
  STATIC_MODIFIER_DESC_modifier_recruitment_improvements_reformation: "For our country to create a formidable army, we must improve our recruitment efforts. With increased time and money spent on recruitment centers and activities, we will attract able soldiers with haste."
  STATIC_MODIFIER_NAME_modifier_supply_depot_advance_age_4_reformation: "Ammunition Depots"
  STATIC_MODIFIER_DESC_modifier_supply_depot_advance_age_4_reformation: "Generalized deployment of artillery for battlefields and sieges has created a high demand for the ammunition and gunpowder to fuel them, increasing the importance of storage depots."
  STATIC_MODIFIER_NAME_modifier_mercenaries_reformation_advance: "Ensure Mercenary Payments"
  STATIC_MODIFIER_DESC_modifier_mercenaries_reformation_advance: "It is well understood that mercenaries do not work for free. By promising fair compensation and a share of the plunder, we can assure their loyalty more easily, and ensure the most skilled companies will be willing to work for us"
  STATIC_MODIFIER_NAME_modifier_maurician_infantry: "Maurician Infantry"
  STATIC_MODIFIER_DESC_modifier_maurician_infantry: "The size and depth of the $spanish_square$ gave it staying power, but made it slow and cumbersome to maneuver on the battlefield. It also led to a large percentage of troops being inactive during battles. Maurice of Nassau, the Stadtholder of the $NED$, reduced the total number of men in the formation to make it more mobile and reduced its depth, so it maintained the same firepower and shock value."
  STATIC_MODIFIER_NAME_modifier_renaissance_advance: "Renaissance"
  STATIC_MODIFIER_DESC_modifier_renaissance_advance: "The waves of innovative thought and discoveries that permeate our realm must be harnessed and utilized if we are to remain at the forefront of technological innovation."
  STATIC_MODIFIER_NAME_modifier_patron_of_art: "Patron of the Arts"
  STATIC_MODIFIER_DESC_modifier_patron_of_art: "Our quest towards cultivating a culturally sophisticated society begins here. Our artistic creations will go down in history as the most marvelous wonders of this era."
  STATIC_MODIFIER_NAME_modifier_renaissance_sculptures: "$renaissance$ Sculptures"
  STATIC_MODIFIER_DESC_modifier_renaissance_sculptures: "The $renaissance$ has brought with it greater interest in arts in all forms. It seems that nowadays no one is anybody if they do not have a piece of art adorning their homes! Sculptures are one of the most prolific forms of artistic expression, which has led to an increase in the number of quarries as demand for $stone$ has risen dramatically among the artistically inclined."
  STATIC_MODIFIER_NAME_modifier_renaissance_thought: "$renaissance$ Thought"
  STATIC_MODIFIER_DESC_modifier_renaissance_thought: "The notion of a noble oligarchy ruling over society is hardly new, having existed since at least Roman times. This system remains entrenched in the structure of many nations, and the idea is regaining popularity among those who matter..."
  STATIC_MODIFIER_NAME_modifier_government_size_renaissance: "Permanent Cabinet"
  STATIC_MODIFIER_DESC_modifier_government_size_renaissance: "Rulers traditionally had a council of advisors to counsel them through making important decisions. Over time, our government has grown so complex that we need to establish more permanent advisory positions to help us deal with day-to-day governance."
  STATIC_MODIFIER_NAME_modifier_chancery_records: "Chancery Records"
  STATIC_MODIFIER_DESC_modifier_chancery_records: "The growing apparatus of chanceries requires another level of administration, since their bureaucracy is becoming even more complex to manage. This comes in the form of chancery records, an office established to keep all letters received at the chancery, as well as a copy of all the documents issued by its scribes and notaries."
  STATIC_MODIFIER_NAME_modifier_crown_power_advance_renaissance: "Sovereignty"
  STATIC_MODIFIER_DESC_modifier_crown_power_advance_renaissance: "Traditional governance required rulers to negotiate with estates and balance competing powers. Modern theories of government, however, establish the ruler as supreme authority within the realm — above all other institutions, estates, and subjects, while bowing to no earthly power."
  STATIC_MODIFIER_NAME_modifier_renaissance_court: "$renaissance$ Court"
  STATIC_MODIFIER_DESC_modifier_renaissance_court: "The $renaissance$ has spread far and wide, and as a result, our court is attracting dedicated artists and scholars, creating the most splendid works ever made."
  STATIC_MODIFIER_NAME_modifier_power_projection_advance_2: "Supranational Ambitions"
  STATIC_MODIFIER_DESC_modifier_power_projection_advance_2: "Although the old ideas about forging empires still linger in the minds of the rulers in this age, they have also begun to crystallize new ways of establishing their dominance over other countries and peoples."
  STATIC_MODIFIER_NAME_modifier_anatomy_advance: "Anatomy"
  STATIC_MODIFIER_DESC_modifier_anatomy_advance: "Physicians are developing a more advanced understanding of the human body, which is leading to more effective treatments for injuries and diseases. This knowledge, largely gleaned from practical dissections of human cadavers, is also helping to improve surgical techniques and reduce the risks of medical procedures."
  STATIC_MODIFIER_NAME_modifier_vibrant_court_advance: "Vibrant Court"
  STATIC_MODIFIER_DESC_modifier_vibrant_court_advance: "Great minds flock to our court from across the known world, bringing with them diverse languages, fashions, and art. As a result of this exposure, we have grown more accommodating of their foreign 'manners'."
  STATIC_MODIFIER_NAME_modifier_banking_advance: "Banking"
  STATIC_MODIFIER_DESC_modifier_banking_advance: "Moneylending is old as time, but it is not without risks. We can minimize said dangers if we institutionalize those practices and see that money is loaned under controlled and fair stipulations."
  STATIC_MODIFIER_NAME_modifier_merchants_and_trade: "Merchants and Trade"
  STATIC_MODIFIER_DESC_modifier_merchants_and_trade: "The patterns of trade had been seriously disrupted, possibly due to plagues and pandemics. Now trade is slowly beginning to recover."
  STATIC_MODIFIER_NAME_modifier_standardized_coins: "Standardized Coins"
  STATIC_MODIFIER_DESC_modifier_standardized_coins: "As wealth is created, more and more mints appear. While we have lived with many different currencies for years, official standards have to be set in order to avoid fraud caused by using lesser quantities of precious metals, or by rasping the edges of those coins."
  STATIC_MODIFIER_NAME_modifier_pop_promotion_speed_age_2: "Favorable Social Mobility"
  STATIC_MODIFIER_DESC_modifier_pop_promotion_speed_age_2: "The dream of most peasants — to escape poverty and climb the social ladder — is a reality within our society. By rewarding hard work, meticulousness, and the proper embodiment of our ideals, we will never have a shortage of capable and influential people."
  STATIC_MODIFIER_NAME_modifier_trade_range_advance_age_2: "Distant Markets"
  STATIC_MODIFIER_DESC_modifier_trade_range_advance_age_2: "As our economy grows, new opportunities arise. Whereas before short-distance trade routes were very profitable, longer-distance routes have recently started to bring in more money. Our merchant vessels are now sailing farther away for the best offers."
  STATIC_MODIFIER_NAME_modifier_rudimentary_coastal_ship_repair: "Makeshift Repairs"
  STATIC_MODIFIER_DESC_modifier_rudimentary_coastal_ship_repair: "It is unavoidable that ships deteriorate while sailing. The beating of the waves and the bite of saltwater accumulate over time, damaging both the hull and ropes no matter how well-constructed the vessel. To alleviate this, sailors are used to performing regular maintenance on their ships to keep them in prime condition, and when more significant damage is received, even being able to keep it afloat until they reach a safe harbor."
  STATIC_MODIFIER_NAME_modifier_maritime_advance_age_2: "Trade Fleets"
  STATIC_MODIFIER_DESC_modifier_maritime_advance_age_2: "As commerce grows, so does the need to more quickly and efficiently transport greater quantities of goods. As such, those invested in maritime trade will spare no expense in building the bigger fleets they can afford."
  STATIC_MODIFIER_NAME_modifier_diplomatic_range_age_1: "Foreign Envoys"
  STATIC_MODIFIER_DESC_modifier_diplomatic_range_age_1: "Diplomacy between countries has always been important. However, the art of diplomatic maneuvering is growing in intensity and complexity, and it has become common to send our envoys ever further afield than before to expand our foreign relations."
  STATIC_MODIFIER_NAME_modifier_spy_construction_renaissance: "Spy Networks"
  STATIC_MODIFIER_DESC_modifier_spy_construction_renaissance: "Espionage has been a valuable tool for empires since ancient times. Spycraft allows us to become better informed about both internal and external threats, and to monitor the activities of potentially dangerous states and actors. The Mongols were masters of this art, using espionage to prepare for and secure the success of their military campaigns."
  STATIC_MODIFIER_NAME_modifier_route_to_the_indies_advance: "Route to the Indies"
  STATIC_MODIFIER_DESC_modifier_route_to_the_indies_advance: "Trade with the Far East is essential to maintaining our way of life. However, the land route is slow and costly. If we could find a route over the seas, it would open up many business opportunities for our merchants."
  STATIC_MODIFIER_NAME_modifier_pound_lock_canals_advance: "Pound Lock Canals"
  STATIC_MODIFIER_DESC_modifier_pound_lock_canals_advance: "We have carved into the very face of Earth in order to gain access to food, affluence, and better circulation of goods. The invention of special gates, called 'Mitre Gates', will assist us in providing the necessities for our people to grow and prosper."
  STATIC_MODIFIER_NAME_modifier_expanded_aqueduct_system: "Expanded Aqueduct Systems"
  STATIC_MODIFIER_DESC_modifier_expanded_aqueduct_system: "The growth of our urban centers has created an increasing demand for reliable fresh water. If our towns and cities are to flourish, we must commit to greater feats of engineering and expand our aqueduct networks."
  STATIC_MODIFIER_NAME_modifier_professional_armies_advance: "Professional Armies"
  STATIC_MODIFIER_DESC_modifier_professional_armies_advance: "The modernization of our armies is largely dependent upon the maintenance of our recruitment and organization centers. We must strive towards preserving a clear and robust military organization, cutting waste and redundancy."
  STATIC_MODIFIER_NAME_modifier_gunpowder_advance: "Gunpowder"
  STATIC_MODIFIER_DESC_modifier_gunpowder_advance: "The usage of gunpowder on the battlefield will certainly have a positive impact on our performance and allow us to excel in military engagements."
  STATIC_MODIFIER_NAME_modifier_recruitment_improvements_renaissance: "Organized Recruitment"
  STATIC_MODIFIER_DESC_modifier_recruitment_improvements_renaissance: "The development of professional armies has increased our military capabilities. To sustain this, the state will need to improve its capacity for recruiting soldiers as well."
  STATIC_MODIFIER_NAME_modifier_regiment_reinforcement_speed_renaissance: "Permanent Field Training"
  STATIC_MODIFIER_DESC_modifier_regiment_reinforcement_speed_renaissance: "Professional armies are shifting the way warfare is conducted, as now it is based on permanent units that serve for long periods of time. Maintaining a regular flow of trained soldiers into those units is a challenge, but very much needed for their optimal operation."
  STATIC_MODIFIER_NAME_modifier_supply_depot_advance_age_2_renaissance: "Supply Depots"
  STATIC_MODIFIER_DESC_modifier_supply_depot_advance_age_2_renaissance: "No army can survive without supplies. Establishing permanent supply depots dedicated to providing for our fighting forces allows for a continuous feeding of the supply lines, keeping our armies always in peak condition."
  STATIC_MODIFIER_NAME_modifier_correct_box_advance_renaissance: "Commissioned Officers"
  STATIC_MODIFIER_DESC_modifier_correct_box_advance_renaissance: "The development of professional armies has led to the appointment of permanent command positions, offices granted by direct commission from the ruler."
  STATIC_MODIFIER_NAME_modifier_renaissance_development: "Scholarly Treatises"
  STATIC_MODIFIER_DESC_modifier_renaissance_development: "This era of thought, arts, and science will bring forth new waves of discoveries and inventions, allowing us to optimize our adoption of foreign institutions."
  STATIC_MODIFIER_NAME_modifier_improve_relation_impact_renaissance: "Lavish Diplomatic Gifts"
  STATIC_MODIFIER_DESC_modifier_improve_relation_impact_renaissance: "Diplomatic gifts have been exchanged since ancient times, as a measure of impressing or persuading foreign rulers by emphasizing the high status and enviable wealth of the giver. Gifts could range from fine cloth, to splendid jewelry, to astonishing animals such as giraffes or elephants."
  STATIC_MODIFIER_NAME_modifier_late_feudal_relations: "Late Feudal Relations"
  STATIC_MODIFIER_DESC_modifier_late_feudal_relations: "Feudalism is built upon the concepts of #italic auxilium#! and #italic consilium#!, or military aid and counsel, owed by vassals to their lords. Over this, this has created an intricate hierarchy of rank, privilege, and reciprocal duties."
  STATIC_MODIFIER_NAME_modifier_medieval_military: "Medieval Military"
  STATIC_MODIFIER_DESC_modifier_medieval_military: "Over the past centuries, land armies have become more professional and well-organized. Better systems are in place to support the mix of levies and professional soldiers that now dominate the battlefields, and the infantry is slowly but steadily gaining power, poised to overtake that of the cavalry arm."
  STATIC_MODIFIER_NAME_modifier_naval_morale_advance_1: "Medieval Sailing"
  STATIC_MODIFIER_DESC_modifier_naval_morale_advance_1: "The advancements made in the field of sailing in recent decades have increased the expertise and confidence of our sailors, allowing them to navigate with confidence in coastal waters."
  STATIC_MODIFIER_NAME_modifier_renaissance_subject_opinions_advance: "Cultural Overlords"
  STATIC_MODIFIER_DESC_modifier_renaissance_subject_opinions_advance: "In recent years, matters of culture, humanism, and natural philosophy have risen in prominence. This cultural influence extends not only to our own people, but also to states who have sworn allegiance to us, making our position as cultural overlords a valuable diplomatic tool."
  STATIC_MODIFIER_NAME_modifier_grant_privilege_cost_modifier_renaissance_advance: "Codified Privileges and Duties"
  STATIC_MODIFIER_DESC_modifier_grant_privilege_cost_modifier_renaissance_advance: "By formally codifying the societal roles of each estate in written law, we will clarify their exact privileges and obligations. When rights and responsibilities are clearly defined, each estate knows exactly what it is owed and what it owes in return, and therefore it will be easier for us to grant new privileges without sparking rivalries."
  STATIC_MODIFIER_NAME_modifier_rgo_size_advance_renaissance: "Mills"
  STATIC_MODIFIER_DESC_modifier_rgo_size_advance_renaissance: "Mills have been used since ancient times. However, we are now able to develop more modern and efficient wind and water mills, which in turn improve our production."
  STATIC_MODIFIER_NAME_modifier_food_advance_renaissance: "Intensive Agriculture"
  STATIC_MODIFIER_DESC_modifier_food_advance_renaissance: "Agriculture is the foundation of most societies. Recent advances have improved the productivity of our fields and farms, creating valuable food surpluses."
  STATIC_MODIFIER_NAME_modifier_war_no_cb_cost_modifier_renaissance_advance: "Recurrent Warfare"
  STATIC_MODIFIER_DESC_modifier_war_no_cb_cost_modifier_renaissance_advance: "The nature of war is strongly influenced by which actors are involved. Those with superior capabilities can wage war for longer periods, and thus inter-state wars are becoming increasingly more common."
  STATIC_MODIFIER_NAME_modifier_global_nobles_max_literacy_advance: "Nobiliary Literature"
  STATIC_MODIFIER_DESC_modifier_global_nobles_max_literacy_advance: "The nobles are increasingly changing their primary function from being warriors to courtiers in the direct service of their ruler, leading them to give more importance to intellectual matters than military concerns. This has created a demand for engaging literature that appeals to their aristocratic sensibilities."
  STATIC_MODIFIER_NAME_modifier_global_burghers_max_literacy_advance: "Merchant Literature"
  STATIC_MODIFIER_DESC_modifier_global_burghers_max_literacy_advance: "Members of our merchant class rely on their abilities to make a living, and those abilities in turn depend on their having had a thorough education in certain fields. Their increased wealth also increases their demand for any literature that might broaden their written culture."
  STATIC_MODIFIER_NAME_modifier_global_clergy_max_literacy_advance: "Clerical Literature"
  STATIC_MODIFIER_DESC_modifier_global_clergy_max_literacy_advance: "Clerics are required to be literate by the nature of their occupation, which centers around learning, interpreting, and spreading their religious doctrine. Therefore, their spiritual formation and overall efficacy relies heavily on their access to religious doctrine and teachings."
  STATIC_MODIFIER_NAME_modifier_land_morale_recovery_renaissance_advance: "Organized Army March"
  STATIC_MODIFIER_DESC_modifier_land_morale_recovery_renaissance_advance: "Managing armies becomes increasingly more complex as they become less reliant on levies. A key aspect of this is improved organization of armies on the march, which helps the troops to be more prepared if a battle occurs."
  STATIC_MODIFIER_NAME_modifier_merchant_power_from_maritime_renaissance_advance: "Merchant Partnerships"
  STATIC_MODIFIER_DESC_modifier_merchant_power_from_maritime_renaissance_advance: "The rising prominence of long-distance trade has led merchants to innovate new ways of making the most of their activities through partnerships. The most common kind is having one partner invest a sum of money in the trading expedition, while the other does the traveling and procurement of goods to be sold after their return."
  STATIC_MODIFIER_NAME_modifier_renaissance_urbanisation: "$renaissance$ City Planning"
  STATIC_MODIFIER_DESC_modifier_renaissance_urbanisation: "Accounting for dedicated areas for resource exploitation during the planning phase will allow our urban centers to produce more goods than before."
  STATIC_MODIFIER_NAME_modifier_renaissance_city_rights: "Formal City Rights"
  STATIC_MODIFIER_DESC_modifier_renaissance_city_rights: "By establishing that only our ruler can grant city rights, we centralize control over urban development and give our administration a clear overview of the state of our country."
  STATIC_MODIFIER_NAME_modifier_blockade_tactics: "Blockade Tactics"
  STATIC_MODIFIER_DESC_modifier_blockade_tactics: "Employing effective formations and patrols near enemy ports will make it easier for us to cut off their supply lines, shortening sieges."
  STATIC_MODIFIER_NAME_modifier_recovery_efforts: "Recovery Efforts"
  STATIC_MODIFIER_DESC_modifier_recovery_efforts: "War is a cruel mistress that leaves behind naught but wreckage and devastation. By concentrating our efforts on assisting our people as they return to ordinary life after so much horror, we can hasten recovery across the realm."
  STATIC_MODIFIER_NAME_modifier_naval_initiative_ren: "Deployment Tactics"
  STATIC_MODIFIER_DESC_modifier_naval_initiative_ren: "It is true that victory often comes to those who draw first blood. Exhaustive study and effective implementation of deployment tactics will permit us to mobilize quickly and take initiative in combat situations, helping us achieve that victory."
  STATIC_MODIFIER_NAME_modifier_army_initiative_ren: "First Strike"
  STATIC_MODIFIER_DESC_modifier_army_initiative_ren: "The element of surprise, combined with landing the first strike, often determines the ultimate victor in an armed conflict. Boosting our military initiative is an excellent way to maintain a competitive advantage."
  STATIC_MODIFIER_NAME_modifier_law_making_renaissance: "Legal Scrutiny"
  STATIC_MODIFIER_DESC_modifier_law_making_renaissance: "New times mean new situations, and the laws that have been in place for generations may not be applicable to these new contexts. We should assign legal experts to continuously scrutinize and revise our laws, so that we can adapt them to our current times and needs."
  STATIC_MODIFIER_NAME_modifier_subject_integration: "Consolidation of Titles"
  STATIC_MODIFIER_DESC_modifier_subject_integration: "Although having many countries serving us can be beneficial, only by gathering their different titles under our own will we be able to best utilize their resources. In the end, it is clear that a ruler with only one title will pale in comparison to us, with our splendid array of impressive-sounding titles."
  STATIC_MODIFIER_NAME_modifier_rgo_construction_ren: "Infrastructure Efforts"
  STATIC_MODIFIER_DESC_modifier_rgo_construction_ren: "Our country is nothing without its land and its people. Improving the infrastructure of our nation will benefit the common folk as much as it benefits us."
  STATIC_MODIFIER_NAME_modifier_naval_repair_ren: "Tighter Joints"
  STATIC_MODIFIER_DESC_modifier_naval_repair_ren: "Everyone knows that a hole in a ship's hull will inevitably lead to its sinking. With better building techniques, we can build a hull with more tightly jointed planks, making the ships less prone to leakage and holes in the hull much easier to repair."
  STATIC_MODIFIER_NAME_modifier_construction_speed_renaissance: "Mason Guilds"
  STATIC_MODIFIER_DESC_modifier_construction_speed_renaissance: "Freemasons rely on broader associations, known as guilds, to share and preserve their knowledge and experience in a system where veteran masons teach younger apprentices."
  STATIC_MODIFIER_NAME_modifier_enlightenment_advance: "Enlightenment"
  STATIC_MODIFIER_DESC_modifier_enlightenment_advance: "The last century has seen Rationalism and Empiricism gain ever-increasing popularity among the greatest minds of the age. The Light of Reason has been lit, and many will not rest until it has been brought to all corners of the earth."
  STATIC_MODIFIER_NAME_modifier_artists_advance_revolutions: "Enlightened Art"
  STATIC_MODIFIER_DESC_modifier_artists_advance_revolutions: "With the rise of the Enlightenment, the arts are flourishing in all forms and at all levels of society. New publications of music and literature are in particular leading to a broad developing interest in these arts."
  STATIC_MODIFIER_NAME_modifier_war_score_revolutions_advance: "Arguments of Reason"
  STATIC_MODIFIER_DESC_modifier_war_score_revolutions_advance: "Wars are always ugly affairs that bring suffering to both sides. Emphasizing this fact, and appealing to our opposition's reason and logic, will surely give us a significant advantage when negotiating the inevitable border changes."
  STATIC_MODIFIER_NAME_modifier_spy_construction_revolutions: "Contact with Dissidents"
  STATIC_MODIFIER_DESC_modifier_spy_construction_revolutions: "As new ideas and political systems raise their heads around the world, there must logically also arise those who protest the status quo. We will need to allocate resources to support these dissenting voices in our rival nations in order to extract valuable information and contribute to their destabilizing effects."
  STATIC_MODIFIER_NAME_modifier_separation_of_powers: "Separation of Powers"
  STATIC_MODIFIER_DESC_modifier_separation_of_powers: "An incendiary, anonymous treatise on political theory has emerged. Despite efforts to suppress the text, it is spreading quickly across the world. It analyzes the nature of various forms of government, be they monarchies, despotisms, or democracies, and argues for a strict separation of the executive, legislative, and judiciary branches.\n\nThis separation would protect the people and limit monarchical, which is understandably a very popular prospect for many of our subjects. Despite the unfortunate implications for the ruler's authority, these ideas may well benefit our nation greatly."
  STATIC_MODIFIER_NAME_modifier_power_projection_advance_6: "Global Ambitions"
  STATIC_MODIFIER_DESC_modifier_power_projection_advance_6: "Consolidation of countries into bigger nations has resulted in the formation of major powers that dominate huge portions of their homelands, and have every intention of extending their power even further."
  STATIC_MODIFIER_NAME_modifier_enlightened_court: "Enlightened Court"
  STATIC_MODIFIER_DESC_modifier_enlightened_court: "The values of the Enlightenment are ever-present in any modern court, and with them comes the presence of the most intellectual and learned people. Thanks to these illustrious and enlightened courtiers, much more can now be achieved with far less effort."
  STATIC_MODIFIER_NAME_modifier_crown_power_advance_revolutions: "Nation"
  STATIC_MODIFIER_DESC_modifier_crown_power_advance_revolutions: "After unifying all the powers under the iron fist of our leader, subjects across the nation have suddenly become aware of a sense of belonging. Whatever region our monarchs rule, they are part of the nation and its people all the same."
  STATIC_MODIFIER_NAME_modifier_rights_of_man: "Rights of Man"
  STATIC_MODIFIER_DESC_modifier_rights_of_man: "At the forefront of current revolutionary thought is the radical notion of equality for all. Philosophers from around the world have collaborated to create a document entitled the 'Declaration of the Rights of Man and of the Citizen', proclaiming that these rights are universal and should be enforced by law. It is likely that this will be ample fuel for popularizing the concepts of freedom and democracy, and we would do well not to lag behind other nations."
  STATIC_MODIFIER_NAME_modifier_government_size_revolutions: "Modern Representation"
  STATIC_MODIFIER_DESC_modifier_government_size_revolutions: "With the establishment of official forms of popular representation, the government is better able to address important issues than ever before."
  STATIC_MODIFIER_NAME_modifier_town_rights_rev_advance: "Heart of a Nation"
  STATIC_MODIFIER_DESC_modifier_town_rights_rev_advance: "As the source of our government, our capital is the heart of the nation itself. This fact alone makes it special, and more privileged than the rest."
  STATIC_MODIFIER_NAME_modifier_rgo_size_advance_revolutions: "Steam Engine"
  STATIC_MODIFIER_DESC_modifier_rgo_size_advance_revolutions: "Steam as a means to power a machine has been understood since antiquity. However, its potential had never been fully realized until recently, when the latest advances in physics and mathematics allowed the creation of more sophisticated steam engines, which in turn can power more complex machines. This allows for increased productivity in all fields."
  STATIC_MODIFIER_NAME_modifier_rotherham_plough: "Rotherham Plough"
  STATIC_MODIFIER_DESC_modifier_rotherham_plough: "The basic plow in use in $europe$ has been unchanged since Roman times. Now, thanks to an improved design, the same plow can be made much lighter, reducing the strain on draft animals and thereby getting more work out of them."
  STATIC_MODIFIER_NAME_modifier_diplomatic_range_age_6: "Global Embassies"
  STATIC_MODIFIER_DESC_modifier_diplomatic_range_age_6: "With every nation trying to expand its reach even farther, the world has become more interconnected than ever before. Only establishing permanent embassies all over the globe can allow this interconnectivity to sustain itself."
  STATIC_MODIFIER_NAME_modifier_modern_bureaucracy: "Modern Bureaucracy"
  STATIC_MODIFIER_DESC_modifier_modern_bureaucracy: "In order to best utilize the lands and subjects we control, we must enlarge, reorganize, and professionalize our bureaucracy. We shall create organizations dedicated to administering specific aspects of the state, and thus eliminate the need for ad hoc solutions.\n\nLet us consult with our universities to determine how to most efficiently rule and govern. Meanwhile, we shall encourage our young nobles to serve the state with a pen rather than a sword in hand."
  STATIC_MODIFIER_NAME_modifier_vaccination_advance: "Vaccination"
  STATIC_MODIFIER_DESC_modifier_vaccination_advance: "With the development of vaccines, physicians are able to provide the populace with immunity against deadly diseases. These vaccines are helping to reduce the spread of disease and prevent epidemics. By injecting a small amount of weakened or dead bacteria or virus into the body, the immune system is able to recognize and fight off the disease if it ever encounters it again."
  STATIC_MODIFIER_NAME_modifier_quinine: "Quinine"
  STATIC_MODIFIER_DESC_modifier_quinine: "Although the 'Jesuit's Bark' has been effective in treating malaria in the past, its consumption as dried bark powder leaves much room for improvement. By isolating and extracting the actual healing component from the bark, we can substantially increase the effectiveness of the treatment."
  STATIC_MODIFIER_NAME_modifier_construction_speed_revolutions: "Cast Iron Structures"
  STATIC_MODIFIER_DESC_modifier_construction_speed_revolutions: "The development of more advanced metallurgy of wrought and cast iron allows for more elaborate metallic structures, such as pillars and columns, which makes building construction much faster."
  STATIC_MODIFIER_NAME_modifier_coal_improvements_revolutions: "Improved Beehive Ovens"
  STATIC_MODIFIER_DESC_modifier_coal_improvements_revolutions: "For the production of coke, a vital part of iron processing, we need many beehive ovens. With improved construction techniques and better usage of bricks, we will be able to accordingly raise the quality of the produced coke."
  STATIC_MODIFIER_NAME_modifier_industrialization_advance: "Industrialization"
  STATIC_MODIFIER_DESC_modifier_industrialization_advance: "The Industrial Revolution has brought about permanent change — not just to commerce and business, but to the social fabric of many nations. Inventions such as the power loom and steam engine shall push the capabilities of mankind to its highest zenith yet."
  STATIC_MODIFIER_NAME_modifier_hot_blast_furnace: "Hot Blast Furnace"
  STATIC_MODIFIER_DESC_modifier_hot_blast_furnace: "The problems posed by the coke blast furnaces, especially the amount of impurities the coke creates in the final cast iron, has led to the development of the hot blast. It not only greatly reduces the use of coke, therefore improving the quality of the $iron$, but also allows the use of raw mineral coal as fuel if available, which is a great step forward in $iron$ metallurgy."
  STATIC_MODIFIER_NAME_modifier_repair_at_sea_aorev: "Parliamentary Heel"
  STATIC_MODIFIER_DESC_modifier_repair_at_sea_aorev: "This advanced form of careening is performed in deep coastal waters. Heavy cargo is shifted to one side of the ship to make it heel, allowing the crew to access the opposite side of the hull for repairs without needing to beach the vessel and wait for low tide as with regular careening."
  STATIC_MODIFIER_NAME_modifier_merchant_power_from_maritime_revolutions_advance: "Limited Companies"
  STATIC_MODIFIER_DESC_modifier_merchant_power_from_maritime_revolutions_advance: "The frequent failures of chartered companies have led to the development of a new business model: limited companies, where shareholder liability is limited to their initial investment. This protection from unlimited debt makes such partnerships far less risky and more attractive to potential investors."
  STATIC_MODIFIER_NAME_modifier_cupola_smelting: "Cupola Smelting"
  STATIC_MODIFIER_DESC_modifier_cupola_smelting: "Using a cylinder-shaped furnace, this method provides a cheap and efficient process of smelting iron, with the unique ability of continuous smelting."
  STATIC_MODIFIER_NAME_modifier_pop_promotion_speed_age_6: "Capitalist Social Mobility"
  STATIC_MODIFIER_DESC_modifier_pop_promotion_speed_age_6: "The expansion of capitalism has given birth to a new age of social mobility, in which wealth is replacing the traditional hierarchies as means of determining social status. Everyone, from business moguls to clerks to industrial laborers, is eager to buy their way into the upper strata."
  STATIC_MODIFIER_NAME_modifier_maritime_advance_age_6: "Armed Convoys"
  STATIC_MODIFIER_DESC_modifier_maritime_advance_age_6: "Trade convoys are obviously a very juicy target for any pirate. Ships full to the brim with goods and coins are a booty that few will let pass through. Thus, providing those trade convoys with defense armament to deter those attacks is vital. Having the trade fleets be accompanied by frigates or any other armed vessel ensures their safety."
  STATIC_MODIFIER_NAME_modifier_revolutions_subject_opinions_advance: "Benign Overlords"
  STATIC_MODIFIER_DESC_modifier_revolutions_subject_opinions_advance: "The fires of revolution are no trifling threat. If we wish to guarantee the loyalty of our subjects, we must suffocate any notion of uprising in its cradle by appointing trustworthy governors and removing any cause for unrest."
  STATIC_MODIFIER_NAME_modifier_revolutions_agressive_advance: "Justified Conflicts"
  STATIC_MODIFIER_DESC_modifier_revolutions_agressive_advance: "The international diplomatic theater thrives on a balance of power between the nations. Wars of aggression are frowned upon and, if won, might lead to coalitions forming and uniting against the winner.\nThrough clever usage of diplomacy and interpretation, however, we can make our enemies appear as the aggressors against us, justifying our warmongering and gains from it in the eyes of the public."
  STATIC_MODIFIER_NAME_modifier_subject_income_revolutions_advance: "Paid Sovereignty"
  STATIC_MODIFIER_DESC_modifier_subject_income_revolutions_advance: "The world around us is undergoing tremendous change in all sectors. We can capitalize on this instability by formalizing tributary arrangements with subject nations in exchange for supporting them. Sovereign protection, it turns out, has a price."
  STATIC_MODIFIER_NAME_modifier_urbanization: "Urbanization"
  STATIC_MODIFIER_DESC_modifier_urbanization: "The new opportunities and security offered by life in our emerging cities are drawing more and more people off of rural farms and into cities, where they are eager to take up industrial jobs created by the new, modern factories."
  STATIC_MODIFIER_NAME_modifier_joint_stock_companies: "Joint Stock Companies"
  STATIC_MODIFIER_DESC_modifier_joint_stock_companies: "As trade grew, so did the associated risk. New ways of accumulating capital and managing this risk needed to be developed. In joint stock companies, the burden of enterprise was shared among their many shareholders."
  STATIC_MODIFIER_NAME_modifier_insurance_companies: "Insurance Companies"
  STATIC_MODIFIER_DESC_modifier_insurance_companies: "A further reduction of risk came with the development of insurance. By paying a small fee to an insurance broker, merchants could protect themselves against catastrophic losses. This reduced risk of investment led to a subsequent flourishing of trade."
  STATIC_MODIFIER_NAME_modifier_the_gold_standard: "The Gold Standard"
  STATIC_MODIFIER_DESC_modifier_the_gold_standard: "The ongoing trade deficit between $europe$ and $CHI$ has caused a shortage of silver bullion not only in $europe$, but all over the world. Switching from silver to gold coinage will allow new coins to enter circulation and encourage trade to flow in ever greater amounts."
  STATIC_MODIFIER_NAME_modifier_superior_ship_design: "Superior Ship Design"
  STATIC_MODIFIER_DESC_modifier_superior_ship_design: "Building ships that are slightly faster than those of our opponents, even if the amount of this extra speed is so negligible that it is of no military significance, can still fill our crews with confidence and make our enemy wary of taking us on in an even fight."
  STATIC_MODIFIER_NAME_modifier_road_advance_2: "Basic Roads"
  STATIC_MODIFIER_DESC_modifier_road_advance_2: "We have constructed rudimentary road networks, but those are quickly showing us why we need to advance our transportation systems. By expanding our road network, we will be able to circulate goods within our territory more easily."
  STATIC_MODIFIER_NAME_modifier_levee_en_masse_advance: "Levée en Masse"
  STATIC_MODIFIER_DESC_modifier_levee_en_masse_advance: "Warfare is an ever-evolving concept, having been studied and improved upon for generations and generations. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted. We shall raise armies of young, unmarried recruits, the size of which will leave an indelible mark upon history."
  STATIC_MODIFIER_NAME_modifier_long_rifle: "Long Rifle Hunting"
  STATIC_MODIFIER_DESC_modifier_long_rifle: "With specific long rifles designed for hunting, our hunters will have a reliable tool for procuring food and furs."
  STATIC_MODIFIER_NAME_modifier_military_tactics_advance_6: "Field Artillery"
  STATIC_MODIFIER_DESC_modifier_military_tactics_advance_6: "With artillery being mobile enough to accompany the rest of the army on the battlefield, its influence is no longer limited to whatever is in firing range. Semi-autonomous artillery formations led by artillery officers can instead be deployed where they are most needed."
  STATIC_MODIFIER_NAME_modifier_napoleonic_warfare: "Napoleonic Warfare"
  STATIC_MODIFIER_DESC_modifier_napoleonic_warfare: "Sieges are a costly and time-consuming occupation for our army. Instead of focusing on every fortification in our way, we need to dedicate our tactics entirely to landing the decisive blow that will win us the war."
  STATIC_MODIFIER_NAME_modifier_combined_arms_advance_revolutions: "Advanced Combined Arms"
  STATIC_MODIFIER_DESC_modifier_combined_arms_advance_revolutions: "The regular use of combined arms over several centuries has led to the dominance of this type of warfare. Light infantry and cavalry have the role of weakening and disorganizing enemy forces, while simultaneously screening and protecting their own. Heavy infantry and cavalry bear the brunt of the fighting, seeking decisive charges to rout the enemy, while artillery and auxiliary forces support them from a distance at the rear."
  STATIC_MODIFIER_NAME_modifier_corps_organisation: "Esprit de Corps"
  STATIC_MODIFIER_DESC_modifier_corps_organisation: "Traditional armies relied on furious discipline to maintain order in the ranks. By appealing to unit pride, however, we can reach even higher levels of discipline."
  STATIC_MODIFIER_NAME_modifier_recruitment_improvements_revolutions: "Extensive Recruitment"
  STATIC_MODIFIER_DESC_modifier_recruitment_improvements_revolutions: "With potential threats emerging from across a wider geographical expanse than ever before, we need to expand our military recruitment accordingly. By offering incentives to volunteers while also pressing criminals into service, we can rapidly mobilize forces to meet any danger."
  STATIC_MODIFIER_NAME_modifier_regiment_reinforcement_speed_revolutions: "Mass Training"
  STATIC_MODIFIER_DESC_modifier_regiment_reinforcement_speed_revolutions: "Modern standing armies are grander than any military force of the past. Tactics are executed by the tens of thousands, and the casualties pile up in unprecedented numbers. Our new military training techniques should offset the high death toll of modern warfare by readying hundreds of soldiers for battle at the same time."
  STATIC_MODIFIER_NAME_modifier_army_movement_speed_revolutions: "Supply Contracts"
  STATIC_MODIFIER_DESC_modifier_army_movement_speed_revolutions: "Paying fair prices for the food and supplies our army needs while moving through a region instead of raiding accelerates our movement through the area, as the peasants themselves will bring their goods to the collection points we establish."
  STATIC_MODIFIER_NAME_modifier_siege_ability_revolutions: "Artillery Officers"
  STATIC_MODIFIER_DESC_modifier_siege_ability_revolutions: "Artillery has become so central to modern warfare that specialized officers trained in gunnery techniques and tactical deployment are now essential on the battlefield."
  STATIC_MODIFIER_NAME_modifier_assault_ability_revolutions: "March Against Fire"
  STATIC_MODIFIER_DESC_modifier_assault_ability_revolutions: "Our armies willingly march into the mayhem of cannon fire and dust, carving a path for our troops to take the enemy's forts. Despite advances in artillery and new fortification techniques, our skill in assaulting enemy walls remains unrivaled."
  STATIC_MODIFIER_NAME_modifier_artillery_vs_fort_age_6_revolutions: "Advanced Howitzers"
  STATIC_MODIFIER_DESC_modifier_artillery_vs_fort_age_6_revolutions: "The need for a weapon that fills the niche between the direct fire of siege cannon and the indirect one of the mortars has led our military to develop new howitzers."
  STATIC_MODIFIER_NAME_modifier_supply_depot_advance_age_6_revolutions: "Campaign Depots"
  STATIC_MODIFIER_DESC_modifier_supply_depot_advance_age_6_revolutions: "The operation of multiple armies on longer campaigns has put extra stress on our supply systems, making bigger, rapidly constructed depots even more important to sustain them."
  STATIC_MODIFIER_NAME_modifier_correct_box_advance_revolutions: "General Staff"
  STATIC_MODIFIER_DESC_modifier_correct_box_advance_revolutions: "The growth of armies and their deployment in longer campaigns has created a need to assign designated officers to planning and logistics, focused on effectively coordinating the different corps on the battlefield."
  STATIC_MODIFIER_NAME_modifier_advanced_anti_piracy_warfare: "Renunciation of Privateering"
  STATIC_MODIFIER_DESC_modifier_advanced_anti_piracy_warfare: "In our age of discovery and humanism, there is no longer a place for the thievery and violence that pirates inflict on the high seas. More and more nations are banding together to face this common threat to the well-being and prosperity of all, and have sworn to put an end to this scourge."
  STATIC_MODIFIER_NAME_modifier_public_punishments: "Public Punishments"
  STATIC_MODIFIER_DESC_modifier_public_punishments: "Life at sea is full of dangers, and thus the punishments need to be harsh. If wrongdoing is not thoroughly deterred, we will quickly run into trouble. Over time, a system of highly public punishments has evolved, and now the time has come to formalize those proceedings. This will greatly enhance discipline at sea."
  STATIC_MODIFIER_NAME_modifier_impulse_warfare: "Impulse Warfare"
  STATIC_MODIFIER_DESC_modifier_impulse_warfare: "The introduction of light infantry troops has led to a significant change in warfare. Skirmishers are deployed forward in loose order to distract and harass the enemy before the main infantry attack, which is typically delivered in either a line or a column formation."
  STATIC_MODIFIER_NAME_modifier_local_governor_advance: "$local_governor$"
  STATIC_MODIFIER_DESC_modifier_local_governor_advance: "$local_governor_desc$"
  STATIC_MODIFIER_NAME_modifier_fort_limit_2_advance: "Border Wardens"
  STATIC_MODIFIER_DESC_modifier_fort_limit_2_advance: "Regional wardens coordinate multiple castles along frontier marches, establishing supply routes, reporting chains, and mutual defense between neighboring strongholds."
  STATIC_MODIFIER_NAME_modifier_fort_limit_3_advance: "Defense Bureau"
  STATIC_MODIFIER_DESC_modifier_fort_limit_3_advance: "The $crown_estate$ centralizes oversight of fortifications under a formal bureau in the capital, consolidating records, funds, and maintenance orders into a single administrative authority."
  STATIC_MODIFIER_NAME_modifier_fort_limit_4_advance: "Inspectors General"
  STATIC_MODIFIER_DESC_modifier_fort_limit_4_advance: "Professional inspectors travel the realm to evaluate garrisons, stores, and walls, enforcing consistent standards and ensuring the reliability of each fortified place."
  STATIC_MODIFIER_NAME_modifier_fort_limit_5_advance: "Standardized Engineering"
  STATIC_MODIFIER_DESC_modifier_fort_limit_5_advance: "National standards for construction and repair are introduced, enabling efficient planning, shared designs, and predictable maintenance across our network of fortresses."
  STATIC_MODIFIER_NAME_modifier_fort_limit_6_advance: "Ordnance Surveys"
  STATIC_MODIFIER_DESC_modifier_fort_limit_6_advance: "Comprehensive mapping and logistical integration link every fortress into a coherent defensive system; an achievement of bureaucracy, science, and state power working in unison."
  STATIC_MODIFIER_NAME_modifier_bureaucracy_law_advance: "$bureaucracy_law$"
  STATIC_MODIFIER_DESC_modifier_bureaucracy_law_advance: "$bureaucracy_law_desc$"
  STATIC_MODIFIER_NAME_modifier_global_supply_limit_modifier_advance_2: "Supply Lines"
  STATIC_MODIFIER_DESC_modifier_global_supply_limit_modifier_advance_2: "Land warfare is becoming more dependent on supplying bigger and bigger armies. Therefore, better organization of our supply carts would lead to an increased operational capacity."
  STATIC_MODIFIER_NAME_modifier_standardized_pikes: "Standardized Pikes"
  STATIC_MODIFIER_DESC_modifier_standardized_pikes: "A pike is a remarkably simple weapon to make, but to get the full benefit from their use, the entire formation must be wielding weapons of similar length and blade."
  STATIC_MODIFIER_NAME_modifier_standardisation_of_calibre: "Caliber Standardization"
  STATIC_MODIFIER_DESC_modifier_standardisation_of_calibre: "With artillery's growing importance on the battlefield, the number of firearms kept increasing. But because each gun was made separately, it also required great effort to resupply. In 1544, in an effort to mitigate this, Emperor Charles V declared that there would be only five calibers of guns, while King Henry II of $FRA$ set the standard of calibers at six."
  STATIC_MODIFIER_NAME_modifier_global_supply_limit_modifier_advance_5: "Army Logistics Planning"
  STATIC_MODIFIER_DESC_modifier_global_supply_limit_modifier_advance_5: "How far an army can march is a consequence of its logistics. With proper study and planning, armies can withstand longer and more distant campaigns."
  STATIC_MODIFIER_NAME_modifier_global_supply_limit_modifier_advance_6: "Campaign Logistics Planning"
  STATIC_MODIFIER_DESC_modifier_global_supply_limit_modifier_advance_6: "Planning the logistics of warfare has become increasingly complex, as the growth in average army size has made it possible to field several armies at once for long-term campaigns, involving hundreds of thousands of soldiers for multiple years."
  STATIC_MODIFIER_NAME_modifier_innovativeness: "Thirst for Knowledge"
  STATIC_MODIFIER_DESC_modifier_innovativeness: "Natural curiosity, and the desire to understand our world and how it functions, is what pushes us forward. Our people are eager to gain knowledge, and it is this spark in their minds that will ignite progress for our nation."
  STATIC_MODIFIER_NAME_modifier_empiricism: "Empiricism"
  STATIC_MODIFIER_DESC_modifier_empiricism: "Things are what they are because we can feel them, see them, and overall experience them with our senses. It is by using this empirical evidence that we come up with newer ideas."
  STATIC_MODIFIER_NAME_modifier_court_accounting: "Court Accounting"
  STATIC_MODIFIER_DESC_modifier_court_accounting: "The court is the symbol of our country, and its prosperity shall represent that of the nation. However, this does not mean that the court can spend more than the country can sustain; there should be proper accounting for what is spent at court."
  STATIC_MODIFIER_NAME_modifier_debt_and_loans: "Debt and Loans"
  STATIC_MODIFIER_DESC_modifier_debt_and_loans: "Debt is sometimes simply unavoidable. However, an organized debt market will allow us to float loans at a lower interest rate."
  STATIC_MODIFIER_NAME_modifier_benefits_for_mercenaries: "Benefits for Mercenaries"
  STATIC_MODIFIER_DESC_modifier_benefits_for_mercenaries: "Mercenaries will always look out for themselves first, so we need to ensure that any we hire remain with us. By properly looking after our mercenary companies, they will stay loyal for longer and require less direct monetary compensation."
  STATIC_MODIFIER_NAME_modifier_organised_mercenary_recruitment: "Mercenary Recruitment"
  STATIC_MODIFIER_DESC_modifier_organised_mercenary_recruitment: "Money is not the only limiting factor when it comes to recruiting mercenaries. The other bottleneck is finding mercenary companies who actually wish to serve with us. Thus, we must ensure our system allows every company to join us."
  STATIC_MODIFIER_NAME_modifier_state_efficiency: "Local Infrastructure"
  STATIC_MODIFIER_DESC_modifier_state_efficiency: "Despite our focus on country-wide affairs, we must not neglect our local state legislators and bailiffs."
  STATIC_MODIFIER_NAME_modifier_church_attendance_duty: "Church Attendance Duty"
  STATIC_MODIFIER_DESC_modifier_church_attendance_duty: "Adopting a mandatory church attendance policy will emphasize the importance of our religious values and beliefs, and will minimize the costs of maintaining law and order."
  STATIC_MODIFIER_NAME_modifier_early_anti_piracy_warfare: "Anti-Piracy Leagues"
  STATIC_MODIFIER_DESC_modifier_early_anti_piracy_warfare: "The proliferation of pirates, brigands, and robbers in the waters along our trade routes has forced our merchants to band together and form Merchant Leagues, which facilitate the protection of their boats during long journeys."
  STATIC_MODIFIER_NAME_modifier_dynamic_court: "Dynamic Court"
  STATIC_MODIFIER_DESC_modifier_dynamic_court: "A truly innovative court is one where any person may rise to prominence. We must strive to make sure that old traditions, as well as prejudices around one's birth or level of wealth, do not hinder the development of our court or act as a barrier to talented people wishing to serve our state."
  STATIC_MODIFIER_NAME_modifier_missionary_schools: "Missionary Schools"
  STATIC_MODIFIER_DESC_modifier_missionary_schools: "Although there is no shortage of people willing to spread the word of the true faith, most of them ultimately do more harm than good. However, establishing specialist schools to properly train missionaries will ensure we have more people who cannot only spread the faith, but do so successfully."
  STATIC_MODIFIER_NAME_modifier_preaching_missions: "Preaching Missions"
  STATIC_MODIFIER_DESC_modifier_preaching_missions: "Establish missionary expeditions that will ensure that our population worships the one true faith."
  STATIC_MODIFIER_NAME_modifier_organised_construction: "Organized Construction"
  STATIC_MODIFIER_DESC_modifier_organised_construction: "Upgrading our government's infrastructure is a costly business. However, if we structure the process correctly, we can do it for less expense."
  STATIC_MODIFIER_NAME_modifier_organised_mercenary_payment: "Organized Mercenary Payments"
  STATIC_MODIFIER_DESC_modifier_organised_mercenary_payment: "Mercenary captains are a canny lot. They will try to coax two commanders in the same army into a bidding war over their services. We must streamline our mercenary recruitment process to prevent this sort of trickery, and to ensure we are always in the best position during negotiations."
  STATIC_MODIFIER_NAME_modifier_expansionism: "A Seed Among Thorns"
  STATIC_MODIFIER_DESC_modifier_expansionism: "The world is huge, and we should not grow complacent with our position in it, for our neighbors will not necessarily do the same. We shall set our sights on expanding our borders and making ourselves stronger, lest we risk being swallowed up by growing neighbor states."
  STATIC_MODIFIER_NAME_modifier_faster_colonists: "Faster Colonists"
  STATIC_MODIFIER_DESC_modifier_faster_colonists: "You cannot simply send colonists out to the New World and expect them to just build a colony. There is first a time-consuming process of preparing the expedition with everything they will need to survive in their new home. We can speed this process up, now that we have some prior experience."
  STATIC_MODIFIER_NAME_modifier_additional_merchants: "Additional Merchants"
  STATIC_MODIFIER_DESC_modifier_additional_merchants: "Colonies are no good to us unless we can bring their riches home to the mother country. We must expand our merchant class to ensure that this happens."
  STATIC_MODIFIER_NAME_modifier_efficient_mining: "Efficient Mining"
  STATIC_MODIFIER_DESC_modifier_efficient_mining: "We shall issue a decree to refine every aspect of metal mining within our domain, in an effort to regulate its presence in our markets. "
  STATIC_MODIFIER_NAME_modifier_efficient_construction_plans: "Efficient Construction Plans"
  STATIC_MODIFIER_DESC_modifier_efficient_construction_plans: "Our efficient building strategy allows us to complete complex work orders without taking any half measures."
  STATIC_MODIFIER_NAME_modifier_expanded_infrastructure_network: "Expanded Infrastructure Network"
  STATIC_MODIFIER_DESC_modifier_expanded_infrastructure_network: "Our national road network is a vital part of our commercial and administrative success. As such, we should care to maintain and improve it."
  STATIC_MODIFIER_NAME_modifier_divine_supremacy: "Divine Supremacy"
  STATIC_MODIFIER_DESC_modifier_divine_supremacy: "It is of the utmost importance that we rid our nation and its surrounding borders of the non-believers that plague our lands."
  STATIC_MODIFIER_NAME_modifier_devoutness: "Devotion"
  STATIC_MODIFIER_DESC_modifier_devoutness: "Religion is one of the most important bulwarks of our rulership. By making grand displays of our religious devotion in public, we will inspire the people to follow suit, and this proliferation of piety amongst our people will strengthen our rule."
  STATIC_MODIFIER_NAME_modifier_religious_tradition: "Religious Tradition"
  STATIC_MODIFIER_DESC_modifier_religious_tradition: "The strength of our faith, and the impressive public displays of piety and worship we stage, are admired by other countries both near and far. This is a clear reflection of the prestige and glory of our realm."
  STATIC_MODIFIER_NAME_modifier_advanced_bureaucracy: "Advanced Bureaucracy"
  STATIC_MODIFIER_DESC_modifier_advanced_bureaucracy: "Allows us to increase our tax revenues by adopting a more bureaucratic administrative system governed by state officials."
  STATIC_MODIFIER_NAME_modifier_national_bank: "National Bank"
  STATIC_MODIFIER_DESC_modifier_national_bank: "By establishing a central authority for financial matters, we will have better control over our nation's economy."
  STATIC_MODIFIER_NAME_modifier_competetive_merchants: "Competitive Merchants"
  STATIC_MODIFIER_DESC_modifier_competetive_merchants: "To bring the focus of our trade home, we must be able to beat competition from other countries. We need to ensure that our legal system gives our merchants every possible advantage."
  STATIC_MODIFIER_NAME_modifier_humanist_tolerance: "Humanist Tolerance"
  STATIC_MODIFIER_DESC_modifier_humanist_tolerance: "By striving to create a more tolerant society, and attempting to solve our social and religious problems in more rational ways, the risk of civil disorder will be diminished."
  STATIC_MODIFIER_NAME_modifier_cultural_ties: "Cultural Ties"
  STATIC_MODIFIER_DESC_modifier_cultural_ties: "Different cultures have different customs, and for some reason, they tend to resist attempts from their rulers to change said customs. We can turn this weakness into a strength by incorporating local leaders into our system of government and having them carry out our will in a way that will be palatable to their people."
  STATIC_MODIFIER_NAME_modifier_ecumenism: "Ecumenism"
  STATIC_MODIFIER_DESC_modifier_ecumenism: "Determining how to deal with the heretics in our realm is always tricky. Although the good, old-fashioned fire-and-sword approach will solve most problems eventually, diplomacy can also succeed. By encouraging dialogue between the various sects, we can reduce misunderstandings and promote peace in the realm."
  STATIC_MODIFIER_NAME_modifier_formalized_officer_corps: "Formalized Officer Corps"
  STATIC_MODIFIER_DESC_modifier_formalized_officer_corps: "Traditionally, our military officers come from the nobility, but we do not have enough people in that estate to fill the necessary roles. However, there are many skilled members of the lower classes in our armies who would do nicely — we should consider promoting some of them as professional officers."
  STATIC_MODIFIER_NAME_modifier_religious_unification: "Religious Unification"
  STATIC_MODIFIER_DESC_modifier_religious_unification: "There is only one religion that is true, and thus it is our duty to unite all the faithful under the sole guidance of God."
  STATIC_MODIFIER_NAME_modifier_centralized_government: "Centralized Government"
  STATIC_MODIFIER_DESC_modifier_centralized_government: "If we centralize the state, then we will find it easier to advance the ideas and agenda of the center over the other regions."
  STATIC_MODIFIER_NAME_modifier_economic_ideas: "Subservient Economy"
  STATIC_MODIFIER_DESC_modifier_economic_ideas: "The economy and wealth of a country should serve the government, not the opposite way around. As such, it is in the state's best interests to accumulate the lion's share of resources, both as a show of our power and in order to better carry out our will. Only with this system can our nation truly prosper."
  STATIC_MODIFIER_NAME_modifier_additional_colonists: "Additional Colonists"
  STATIC_MODIFIER_DESC_modifier_additional_colonists: "The New World is many things, but the most important thing of all is that it is empty. Well, no one important lives there, at any rate. By letting people know of the boundless opportunities that await them in the New World, we will encourage more people to go forth and settle there."
  STATIC_MODIFIER_NAME_modifier_additional_diplomats: "Additional Diplomats"
  STATIC_MODIFIER_DESC_modifier_additional_diplomats: "The drive to expand our country means we must also expand our diplomatic reach. We must ensure that our diplomatic service is properly staffed."
  STATIC_MODIFIER_NAME_modifier_bookkeeping: "Bookkeeping"
  STATIC_MODIFIER_DESC_modifier_bookkeeping: "Sometimes money is short, and we need to borrow. Lenders always worry that they will not be paid back. By maintaining meticulous records, we will be able to ensure that everyone gets reimbursed, which will allow us to negotiate lower rates of interest."
  STATIC_MODIFIER_NAME_modifier_civil_servants: "Civil Service"
  STATIC_MODIFIER_DESC_modifier_civil_servants: "Establishing a civil service of eager young bureaucrats will ensure that we can quickly adapt to new advances in administration and governance."
  STATIC_MODIFIER_NAME_modifier_local_traditions: "Local Traditions"
  STATIC_MODIFIER_DESC_modifier_local_traditions: "Governing a large nation means ruling over diverse peoples, each with their own customs and traditions. By incorporating these traditions into our official code of laws, we will create a happier and more loyal populace."
  STATIC_MODIFIER_NAME_modifier_humanism: "Humanism"
  STATIC_MODIFIER_DESC_modifier_humanism: "Mankind is the highest creation of our Lord, and thus it is natural to place it in the center of Creation. Every aspect of human nature has to be preserved and encouraged, from its well-being to its propensity for free will and exploration."
  STATIC_MODIFIER_NAME_modifier_formal_administration: "Formal Administration"
  STATIC_MODIFIER_DESC_modifier_formal_administration: "Correct procedures and a well-oiled administrative apparatus result in a prosperous country, for without a proper administration, anything that the state attempts to accomplish will just remain fruitless. We will formalize and standardize our administration, so that the will of the state flows through it naturally to all corners of the nation."
  STATIC_MODIFIER_NAME_modifier_optimism: "Optimism"
  STATIC_MODIFIER_DESC_modifier_optimism: "Victory is not just won on the battlefield, but also in the drawing rooms. Our advancement of reason helps our people shrug off the effects of temporary setbacks, and prepare instead for our inevitable victory."
  STATIC_MODIFIER_NAME_modifier_indirect_rule: "Indirect Rule"
  STATIC_MODIFIER_DESC_modifier_indirect_rule: "Sometimes the best way to get people to do what you want is to let them believe that they have had a choice in the matter. A system of indirect rule like that will reduce the unrest in newly acquired provinces, giving them the impression that they have more self-determination than they truly do."
  STATIC_MODIFIER_NAME_modifier_smithian_economics: "Smithian Economics"
  STATIC_MODIFIER_DESC_modifier_smithian_economics: "By opposing mercantilism and restricting the state's influence in economic matters, we shall support a free market that will increase our overall production efficiency."
  STATIC_MODIFIER_NAME_modifier_nationalistic_enthusiasm: "Nationalistic Enthusiasm"
  STATIC_MODIFIER_DESC_modifier_nationalistic_enthusiasm: "Giving our troops adequate support is vital to national defense. With our excellent administration, we are able to secure generous discounts on our military supplies."
  STATIC_MODIFIER_NAME_modifier_improved_shipyards: "Improved Shipyards"
  STATIC_MODIFIER_DESC_modifier_improved_shipyards: "To defend our interests around the globe, we will require a strong [navy|e]. We must ensure our shipyards can produce ships as quickly as possible to replace any losses we may suffer."
  STATIC_MODIFIER_NAME_modifier_legislative_efficiency_idea: "Efficiency in Administration"
  STATIC_MODIFIER_DESC_modifier_legislative_efficiency_idea: "The most important factor in efficient government is getting the right advice. We must ensure that we are as inclusive as possible when it comes to advisors, so we can maximize the number of different viewpoints we are presented with."
  STATIC_MODIFIER_NAME_modifier_benevolence: "Benevolence"
  STATIC_MODIFIER_DESC_modifier_benevolence: "Our nation is a bastion of tolerance and enlightenment. By ensuring that all other nations know this, we can foster better relations abroad."
  STATIC_MODIFIER_NAME_modifier_fort_logistics: "Fortification Logistics"
  STATIC_MODIFIER_DESC_modifier_fort_logistics: "By ordering our system of fortifications in an organized manner, both construction-wise and logistically, we may save some coin on maintaining it in the long term."
  STATIC_MODIFIER_NAME_modifier_regulation_bureau: "Regulation Bureau"
  STATIC_MODIFIER_DESC_modifier_regulation_bureau: "A legislative body whose jurisdiction involves the maintenance and promotion of inflation-related laws as well as the local administration of our provinces."
  STATIC_MODIFIER_NAME_modifier_integrated_elites: "Integrated Elites"
  STATIC_MODIFIER_DESC_modifier_integrated_elites: "By bringing the ruling elite of our subject nations into our government, we can significantly streamline the process of integrating their provinces."
  STATIC_MODIFIER_NAME_modifier_claim_fabrication: "Claim Fabrication"
  STATIC_MODIFIER_DESC_modifier_claim_fabrication: "Claiming something as yours is easy; persuading everyone else that your claim is valid is much harder. By spreading our diplomatic net wide, we can ensure that the people who matter know that we have staked this claim."
  STATIC_MODIFIER_NAME_modifier_shrewd_commerce_practice: "Shrewd Commerce"
  STATIC_MODIFIER_DESC_modifier_shrewd_commerce_practice: "Allows us to make use of more refined trading practices, giving our merchants the upper hand over our competitors."
  STATIC_MODIFIER_NAME_modifier_merchant_traditions: "Merchant Traditions"
  STATIC_MODIFIER_DESC_modifier_merchant_traditions: "A steady flow of trade and commerce is a sure sign of a healthy economy. With our merchants focusing on keeping the trade flowing, we can establish a tradition of and reputation for lively commerce, making it easier to attract foreign trade to our nation."
  STATIC_MODIFIER_NAME_modifier_privateers: "Privateers"
  STATIC_MODIFIER_DESC_modifier_privateers: "Waging war on enemy commerce is at the apex of naval warfare. We shall encourage the crustiest, saltiest seadogs we can hire to strike at the heart of the enemy's trade, which should help refill our own coffers quickly."
  STATIC_MODIFIER_NAME_modifier_experienced_diplomats: "Experienced Diplomats"
  STATIC_MODIFIER_DESC_modifier_experienced_diplomats: "Sometimes it is simply enough for people to #italic believe#! that we are powerful. We have worked hard on our diplomatic service to ensure that our word carries extra weight."
  STATIC_MODIFIER_NAME_modifier_benign_diplomats: "Benign Diplomats"
  STATIC_MODIFIER_DESC_modifier_benign_diplomats: "The art of diplomacy is an intricate one. Being good with words is not enough, as one's overall presence and demeanor are crucial to how the words themselves are interpreted. By having our diplomats focus on making a good impression, we will be seen more favorably by other countries."
  STATIC_MODIFIER_NAME_modifier_tribute_system: "Tribute System"
  STATIC_MODIFIER_DESC_modifier_tribute_system: "Strengthen our income by establishing a formalized system of yearly tribute from our vassals."
  STATIC_MODIFIER_NAME_modifier_influence: "Pressuring Diplomacy"
  STATIC_MODIFIER_DESC_modifier_influence: "Ending a war requires negotiations between the two opposing parties, and sometimes one party proves itself too stubborn to accept defeat. In such cases, the art of diplomatic pressure — and gently reminding them of their potential imminent annihilation — shall motivate them to accept our generous terms more easily."
  STATIC_MODIFIER_NAME_modifier_quest_for_the_new_world: "Quest for the New World"
  STATIC_MODIFIER_DESC_modifier_quest_for_the_new_world: "Allows us to join the nations set to explore the world outside their borders, or strive to be the first nation to circumnavigate the globe, by commencing a quest for the New World."
  STATIC_MODIFIER_NAME_modifier_overseas_exploration: "Fortune-Seekers"
  STATIC_MODIFIER_DESC_modifier_overseas_exploration: "Establishing colonies in distant lands is nearly always a one-way trip for those involved. Even if strange new diseases do not take you or unforgiving terrain does not starve you, the amount of time it takes to sail back means you will most likely never come home. While these realities are discouraging to some, if we remind people of the potential riches to be gained from colonial life, we can encourage them to settle lands further afield despite the dangers."
  STATIC_MODIFIER_NAME_modifier_overseas_trade: "Overseas Trade"
  STATIC_MODIFIER_DESC_modifier_overseas_trade: "News of the discovery of distant lands has reached our nation, and our merchants are already preparing to expand their trading operations. These unexplored territories are filled with prosperous markets dripping with wealth, like so much ripe fruit waiting to be collected."
  STATIC_MODIFIER_NAME_modifier_colonial_ventures: "Colonial Ventures"
  STATIC_MODIFIER_DESC_modifier_colonial_ventures: "Enables us to send more colonists to uncharted lands."
  STATIC_MODIFIER_NAME_modifier_exploration: "Exploration Ideas"
  STATIC_MODIFIER_DESC_modifier_exploration: "Our naval superiority allows us to project power well past our own horizons, extending a natural claim to distant lands as our own by right of discovery."
  STATIC_MODIFIER_NAME_modifier_foreign_embassies: "Foreign Embassies"
  STATIC_MODIFIER_DESC_modifier_foreign_embassies: "Diplomacy is a delicate balancing act that requires us to balance the needs and desires of multiple entities at the same time. Maintaining embassies in other countries that report to us on a regular basis will give us the information needed to better weigh our diplomatic options."
  STATIC_MODIFIER_NAME_modifier_efficient_spies: "Efficient Spies"
  STATIC_MODIFIER_DESC_modifier_efficient_spies: "Most peasants would happily sell their own mother for gold, but there are some with skills and talents that we in the government might find very useful for...ah, #italic statecraft#!. Although finding these worthy commoners is difficult, through experience we are learning to separate the wheat from the chaff."
  STATIC_MODIFIER_NAME_modifier_vetting: "Vetting"
  STATIC_MODIFIER_DESC_modifier_vetting: "Because so many of our government positions are held by those seeking to advance themselves, we sometimes find that those who run our administration are susceptible to bribes from foreign powers. Running some simple background checks will weed out the officials most prone to corruption."
  STATIC_MODIFIER_NAME_modifier_merchant_adventures: "Merchant Adventures"
  STATIC_MODIFIER_DESC_modifier_merchant_adventures: "This allows us to make use of the numerous traders lusting for fame and fortune, eager to offer their services for a chance to search and explore new trade routes."
  STATIC_MODIFIER_NAME_modifier_ships_penny: "Ship's Penny"
  STATIC_MODIFIER_DESC_modifier_ships_penny: "Ships are expensive to build and maintain. By imposing a ship's penny — a small tax levied on trade or port activities — we can ensure our fleet remains strong without draining our treasury."
  STATIC_MODIFIER_NAME_modifier_audit_checks: "Audit Checks"
  STATIC_MODIFIER_DESC_modifier_audit_checks: "While we work to infiltrate other nations, we must be vigilant of poisonous ideas spreading around our own courts. Assembling an audit team to ensure our ministers are acting in the state's interest should help root out any rotten elements."
  STATIC_MODIFIER_NAME_modifier_cabinet: "Cabinet"
  STATIC_MODIFIER_DESC_modifier_cabinet: "By establishing an executive council, we are able to assemble our most skilled diplomats."
  STATIC_MODIFIER_NAME_modifier_grand_banquets: "Grand Banquets"
  STATIC_MODIFIER_DESC_modifier_grand_banquets: "No important matter can be discussed without an accompanying meal, and the more important the matter is, the more indulgent the meal should be. Having regular grand banquets allows us to constantly and properly discuss all matters that need consideration."
  STATIC_MODIFIER_NAME_modifier_fast_negotiations: "Fast Negotiations"
  STATIC_MODIFIER_DESC_modifier_fast_negotiations: "Sometimes the key to closing a trade deal is to be the quickest one. We must ensure that our merchants can always successfully close their deals."
  STATIC_MODIFIER_NAME_modifier_trade_manipulation: "Trade Manipulation"
  STATIC_MODIFIER_DESC_modifier_trade_manipulation: "At those key choke points where trade supremacy could go one way or another, edging out the regional competition is crucial to expanding our trade income."
  STATIC_MODIFIER_NAME_modifier_diplomatic_influence: "Diplomatic Influence"
  STATIC_MODIFIER_DESC_modifier_diplomatic_influence: "By focusing on diplomacy, we can increase the power we wield on the world stage, and win many friends and potential allies."
  STATIC_MODIFIER_NAME_modifier_free_trade: "Free Trade"
  STATIC_MODIFIER_DESC_modifier_free_trade: "Our leading merchant families wish to secure trade privileges as their exclusive preserve, but we are unwilling to do so, and will therefore allow the growth of the merchant class."
  STATIC_MODIFIER_NAME_modifier_land_of_opportunity: "Land of Opportunity"
  STATIC_MODIFIER_DESC_modifier_land_of_opportunity: "By portraying our colonies and the surrounding unclaimed lands as places where anyone can make their fortune, we will rapidly increase emigration to our colonial holdings. This means the nation will spend less money encouraging people to go there."
  STATIC_MODIFIER_NAME_modifier_free_colonies: "Free Colonies"
  STATIC_MODIFIER_DESC_modifier_free_colonies: "Only so many people are willing to move abroad to expand our great colonial empire. However, the promise of a plot of land to farm in freehold will encourage many more people to seek their fortunes abroad. The nice thing about this is that there is plenty of land for everyone!"
  STATIC_MODIFIER_NAME_modifier_grand_navy: "Grand Navy"
  STATIC_MODIFIER_DESC_modifier_grand_navy: "Allows us to create one of the largest and most powerful navies the world has ever seen."
  STATIC_MODIFIER_NAME_modifier_agent_training: "Agent Training"
  STATIC_MODIFIER_DESC_modifier_agent_training: "We have many covert operations planned, but lack sufficient agents to carry them out. Establishing a training method for our spies will help bolster the ranks of operatives available for dangerous missions."
  STATIC_MODIFIER_NAME_modifier_dip_choice_subject_opinions: "Subject Emissaries"
  STATIC_MODIFIER_DESC_modifier_dip_choice_subject_opinions: "Continued communication with our subject nations through dedicated emissaries will positively impact our relations, strengthening the core of our domain and ensuring the loyalty of all countries that stand under our banner."
  STATIC_MODIFIER_NAME_modifier_state_propaganda: "State Propaganda"
  STATIC_MODIFIER_DESC_modifier_state_propaganda: "As with a man, a nation's reputation is everything, and the establishment of an official propaganda service will ensure our good name is not smeared by the lies of our enemies."
  STATIC_MODIFIER_NAME_modifier_formal_diplomacy: "Formal Diplomacy"
  STATIC_MODIFIER_DESC_modifier_formal_diplomacy: "At a time where power is shifting from the hands of powerful individuals towards control by a centralized authority, it is wise to build bridges and open channels of communication between us and our neighbors. Diplomacy is key, and more so than ever in the face of these rising powers."
  STATIC_MODIFIER_NAME_modifier_diplomatic_corps: "Diplomatic Corps"
  STATIC_MODIFIER_DESC_modifier_diplomatic_corps: "Through the establishment of a professional diplomatic corps, we will ensure that the hard-earned knowledge of senior diplomats is passed on to the younger generation."
  STATIC_MODIFIER_NAME_modifier_national_trade: "National Trade"
  STATIC_MODIFIER_DESC_modifier_national_trade: "Cloth, wool, and other sought-after commodities have made their way across the world. At an age where a nation's commerce reaches faraway shores, we must make sure our merchants always have the advantage!"
  STATIC_MODIFIER_NAME_modifier_national_trade_policy: "National Trade Policy"
  STATIC_MODIFIER_DESC_modifier_national_trade_policy: "By adopting a national trade policy, we can strengthen our commercial presence and increase the effectiveness of our trade."
  STATIC_MODIFIER_NAME_modifier_vice_roys: "Viceroys"
  STATIC_MODIFIER_DESC_modifier_vice_roys: "Makes it possible for us to establish Viceroys, therby improving the administration of our colonies and increase the amount of money they generate."
  STATIC_MODIFIER_NAME_modifier_sheltered_ports: "Sheltered Ports"
  STATIC_MODIFIER_DESC_modifier_sheltered_ports: "It is an unfortunate fact that ships tend to be damaged during battle, and equally unfortunate that the damage can rarely be repaired at sea. To alleviate this problem, we will create a system of sheltered ports along our coastline where our ships can patch themselves up."
  STATIC_MODIFIER_NAME_modifier_naval_fighting_instruction: "Naval Fighting Instruction"
  STATIC_MODIFIER_DESC_modifier_naval_fighting_instruction: "Allows our naval veterans to devise new methods to improve our navy's efficiency in blockades."
  STATIC_MODIFIER_NAME_modifier_merchant_marine: "Merchant Marine"
  STATIC_MODIFIER_DESC_modifier_merchant_marine: "Let every merchant ship fly our emblem with pride and know that our navy will always be there to protect them, if needed."
  STATIC_MODIFIER_NAME_modifier_global_empire: "Global Empire"
  STATIC_MODIFIER_DESC_modifier_global_empire: "Our commitment to our colonial empire has transformed attitudes towards working in the colonial administration. No longer seen as a haven for fortune-seeking freebooters, it is now regarded as a prestigious career for the brightest and best. This shift is reflected in more efficient tax collection."
  STATIC_MODIFIER_NAME_modifier_buffer_states: "Buffer States"
  STATIC_MODIFIER_DESC_modifier_buffer_states: "There is nothing worse than arguing with one's neighbor. If we want to avoid border tensions, having other states act as a buffer between us and our potential enemies will allow us some breathing room."
  STATIC_MODIFIER_NAME_modifier_flexible_negotiation: "Flexible Negotiation"
  STATIC_MODIFIER_DESC_modifier_flexible_negotiation: "You can never quite predict what could be gained during peace talks, so we should enter with all options open."
  STATIC_MODIFIER_NAME_modifier_overseas_merchants: "Overseas Merchants"
  STATIC_MODIFIER_DESC_modifier_overseas_merchants: "To expand trade, we need to extend the rights of citizenship to people who live abroad, support our trade, and are of the right social class."
  STATIC_MODIFIER_NAME_modifier_postal_service: "Postal Service"
  STATIC_MODIFIER_DESC_modifier_postal_service: "With communications being what they are, it is difficult to ensure that our diplomatic dispatches arrive in a timely fashion. Creating a network of post offices and courier rest stops will make it easier for our voice to be heard in distant lands."
  STATIC_MODIFIER_NAME_modifier_additional_loyalist_recruitment: "Additional Loyalist Recruitment"
  STATIC_MODIFIER_DESC_modifier_additional_loyalist_recruitment: "Naturally, there are those within our subject nations who recognize our divine right to rule. By recruiting and aiding these enlightened individuals, we can strengthen our grasp on these territories."
  STATIC_MODIFIER_NAME_modifier_morale_recovery_rev_dip_choice: "Established Rest"
  STATIC_MODIFIER_DESC_modifier_morale_recovery_rev_dip_choice: "No army can exist in a permanent state of action; all soldiers need time for rest and recovery. By establishing guidelines and procedures for them to rest, without permitting any laziness, we can keep our troops in prime condition."
  STATIC_MODIFIER_NAME_modifier_merchant_power_from_maritime_rev_dip_choice: "Merchant Fleets"
  STATIC_MODIFIER_DESC_modifier_merchant_power_from_maritime_rev_dip_choice: "Merchant ships have become a common sight in our waters. Our traders have so many vessels going back and forth that they have effectively formed their own fleet."
  STATIC_MODIFIER_NAME_modifier_sea_hawks: "Seahawks"
  STATIC_MODIFIER_DESC_modifier_sea_hawks: "Allows us to focus heavily on military advancements, and thereby increase our Naval Tradition."
  STATIC_MODIFIER_NAME_modifier_tolerance_idea: "Ideas of Tolerance"
  STATIC_MODIFIER_DESC_modifier_tolerance_idea: "Every human was created equal to the Creator, and therefore we understand that their beliefs, even if wrong, can be accepted as a means to eventual conversion to the one true faith."
  STATIC_MODIFIER_NAME_modifier_glorious_arms: "Glorious Arms"
  STATIC_MODIFIER_DESC_modifier_glorious_arms: "The sight of our glorious and prestigious army will make all adversaries tremble in fear."
  STATIC_MODIFIER_NAME_modifier_battlefield_commisions: "Battlefield Commissions"
  STATIC_MODIFIER_DESC_modifier_battlefield_commisions: "Allows us to focus heavily on military advancements and thereby increase our Army Tradition."
  STATIC_MODIFIER_NAME_modifier_finest_of_horses: "Finest of Horses"
  STATIC_MODIFIER_DESC_modifier_finest_of_horses: "How steadily those troops take the ground! How beautifully those cavalry form! Fine horses with well-trained riders are a hallmark of any modern fighting force, and ours are particularly impressive."
  STATIC_MODIFIER_NAME_modifier_regular_levy_training: "Designated Instruction"
  STATIC_MODIFIER_DESC_modifier_regular_levy_training: "Levies are by definition not the best-trained troops, but that does not mean that we have to send a bunch of untrained rabble to war. Assigning them proper instructors from our most proficient units will allow them to learn from the best, and a mandatory training period with them will make them ready — and eager — to fight."
  STATIC_MODIFIER_NAME_modifier_open_levy_standards: "Open Levy Standards"
  STATIC_MODIFIER_DESC_modifier_open_levy_standards: "What makes a man willing to fight and die for his country? Is it his faith? Loyalty to his nation? Or is it simply a desire to protect his family? In the end, the answer does not matter, as everyone has the duty of serving under our banner."
  STATIC_MODIFIER_NAME_modifier_enforced_service: "Enforced Service"
  STATIC_MODIFIER_DESC_modifier_enforced_service: "The principle of volunteering underpins our whole army structure, but sometimes there are simply not enough willing conscripts. We should force — erm, #italic encourage#! people to volunteer."
  STATIC_MODIFIER_NAME_modifier_naval_glory: "Naval Glory"
  STATIC_MODIFIER_DESC_modifier_naval_glory: "The awesome sight of our glorious navy will make all adversaries tremble in fear!"
  STATIC_MODIFIER_NAME_modifier_boarding_parties: "Boarding Parties"
  STATIC_MODIFIER_DESC_modifier_boarding_parties: "By teaching our naval officers to lead boarding actions against enemy ships, we can gain an edge in naval combat even when fighting superior enemy [navies|e]."
  STATIC_MODIFIER_NAME_modifier_marine_regiments: "Marine Regiments"
  STATIC_MODIFIER_DESC_modifier_marine_regiments: "Marines are military units that specialize in amphibious operations. They can be used in raiding shores and boarding enemy vessels, while still seeing action on land."
  STATIC_MODIFIER_NAME_modifier_military_drill: "Military Drill"
  STATIC_MODIFIER_DESC_modifier_military_drill: "Allows us to invest in military training and thereby improve battle formations, weapon handling, and our army's morale."
  STATIC_MODIFIER_NAME_modifier_administrative_leadership: "Administrative Leadership"
  STATIC_MODIFIER_DESC_modifier_administrative_leadership: "A military leader must not only know about military matters. Logistics, supply administration and allocation, monetary expenses, and similar topics are all also critical concerns for any successful military campaign."
  STATIC_MODIFIER_NAME_modifier_improved_manuever: "Improved Maneuver"
  STATIC_MODIFIER_DESC_modifier_improved_manuever: "Tactical positioning is a vital skill for any commander. The ability to maneuver troops effectively around the battlefield will give us a significant edge."
  STATIC_MODIFIER_NAME_modifier_quality_education: "Well-Trained Forces"
  STATIC_MODIFIER_DESC_modifier_quality_education: "The most crucial time for any army comes after battle. Win or lose, troops are most vulnerable when they are exhausted. We must ensure that our troops are highly trained and can recover easily from combat, lest our enemies take advantage of us in moments of weakness."
  STATIC_MODIFIER_NAME_modifier_naval_drill: "Naval Drill"
  STATIC_MODIFIER_DESC_modifier_naval_drill: "The confusion of combat can leave a warship unfit for action for a long time. A well-drilled crew will recover much faster than an ordinary one."
  STATIC_MODIFIER_NAME_modifier_the_old_and_infirm: "The Old and Infirm"
  STATIC_MODIFIER_DESC_modifier_the_old_and_infirm: "Our veteran sergeants are some of the most despicable and corrupt men imaginable, but that does not mean they are useless. Rather than leave them to be beggars on our streets when their service ends, we can put these old dogs to work. We shall make them into drill sergeants and quartermasters so that their unique skills can be put to use."
  STATIC_MODIFIER_NAME_modifier_improved_rams: "Improved Rams"
  STATIC_MODIFIER_DESC_modifier_improved_rams: "The concept of outfitting warships with rams goes back thousands of years, but great advancements in metallurgy have been made since then, and we should take advantage of these to create sturdier rams."
  STATIC_MODIFIER_NAME_modifier_oak_forests_for_ships: "Oak Forests for Ships"
  STATIC_MODIFIER_DESC_modifier_oak_forests_for_ships: "The more punishment our ships can take, the more they can dish out. Let us ensure that we have a ready supply of the finest seasoned oak for our warships."
  STATIC_MODIFIER_NAME_modifier_naval_cadets: "Naval Cadets"
  STATIC_MODIFIER_DESC_modifier_naval_cadets: "By promoting the navy as the ideal career choice for second and third sons of the aristocracy, we can create a professional corps of naval officers to oversee our gunnery crews."
  STATIC_MODIFIER_NAME_modifier_adaptability: "Adaptability"
  STATIC_MODIFIER_DESC_modifier_adaptability: "There is what is ours, and what is part of our ancestral domain that will never be surrendered. A bit of flexibility in defining these 'ancestral' borders will lead to more land being accepted as our rightful territory, and should the worst happen, the whole world will know our crusade to recover it will be just."
  STATIC_MODIFIER_NAME_modifier_defensive_mentality: "Defensive Mentality"
  STATIC_MODIFIER_DESC_modifier_defensive_mentality: "There are those who think that attack is the best form of defense, but that is foolish. Let our enemies come to us instead; we shall counter with incredible zeal. Our troops will defend their homes tenaciously, and our fortresses will withstand sieges for longer."
  STATIC_MODIFIER_NAME_modifier_cultures_capacity_mil_choice: "Multicultural Ambitions"
  STATIC_MODIFIER_DESC_modifier_cultures_capacity_mil_choice: "A country's expansion will inevitably result in it bringing other cultures into its fold. Thus, if we want to further expand our borders, we need to be prepared to become more multicultural."
  STATIC_MODIFIER_NAME_modifier_supply_trains: "Supply Trains"
  STATIC_MODIFIER_DESC_modifier_supply_trains: "While on campaign, attrition is our most formidable foe, and the key to defending our men against it is a well-planned and efficiently run logistic network capable of providing ample support and supplies."
  STATIC_MODIFIER_NAME_modifier_expanded_supply_trains: "Expanded Supply Trains"
  STATIC_MODIFIER_DESC_modifier_expanded_supply_trains: "Investing more resources into our supply trains will allow our army to operate for longer periods of time in hostile territory."
  STATIC_MODIFIER_NAME_modifier_camp_followers: "Camp Followers"
  STATIC_MODIFIER_DESC_modifier_camp_followers: "Warriors obviously make up the bulk of our armies, but no army can consist of fighters alone. Without the extra entourage of people transporting food and equipment for the army, it would not be able to feasibly go anywhere. By organizing and structuring these camp followers, we can greatly increase their usefulness and efficiency."
  STATIC_MODIFIER_NAME_modifier_engineer_corps: "Engineer Corps"
  STATIC_MODIFIER_DESC_modifier_engineer_corps: "Allows us to gather the greatest technological minds our nation has to offer, and make use of their unrivaled services."
  STATIC_MODIFIER_NAME_modifier_defensive_army: "Defensive Army"
  STATIC_MODIFIER_DESC_modifier_defensive_army: "The rise of many powerful states around us has hastened our need for a robust defensive force, as we intend to maintain our territorial integrity. Knowledge of our homeland's native terrain, hidden paths, and regional tactics will see us through this turbulent period."
  STATIC_MODIFIER_NAME_modifier_garrison_conscription: "Conscripted Garrisons"
  STATIC_MODIFIER_DESC_modifier_garrison_conscription: "By conscripting our able young citizens for our garrisons, we can ensure that we have enough guards to defend our borders."
  STATIC_MODIFIER_NAME_modifier_copper_bottoms: "Copper Bottoms"
  STATIC_MODIFIER_DESC_modifier_copper_bottoms: "Wood may be the ideal material for shipbuilding, but it tends to deteriorate over time. By fitting our ships with copper sheathing below the waterline we can reduce this deterioration, allowing them to better withstand long journeys."
  STATIC_MODIFIER_NAME_modifier_rgo_logistics_mil_choice: "Improved Storehouses"
  STATIC_MODIFIER_DESC_modifier_rgo_logistics_mil_choice: "Having proper storehouses to hold the products required by local businesses is a must if we want those enterprises — to say nothing of the entire economy — to function smoothly."
  STATIC_MODIFIER_NAME_modifier_repair_at_sea: "Coastal Careening"
  STATIC_MODIFIER_DESC_modifier_repair_at_sea: "Ships are undertaking longer voyages than ever before, made possible by new technical advances. This means more complex repairs are needed, but ports with adequate equipment and skilled craftsmen are not always available. Our sailors must be trained in the art of careening — deliberately beaching vessels to expose the parts that need cleaning or repair. This is the only way our fleets can maintain seaworthiness far from their home ports."
  STATIC_MODIFIER_NAME_modifier_improved_foraging: "Improved Foraging"
  STATIC_MODIFIER_DESC_modifier_improved_foraging: "Traditionally, we were unable to fight effectively in lands that did not supply enough food. However, our troops have become better at acquiring food in the wild, making it possible for larger armies to fight."
  STATIC_MODIFIER_NAME_modifier_discipline_drills: "Disciplined Drills"
  STATIC_MODIFIER_DESC_modifier_discipline_drills: "During combat, only three things matter: firepower, manpower, and the discipline to combine the two. Regular military drills and exercises shall elevate our to a new standard."
  STATIC_MODIFIER_NAME_modifier_absolutism_control_decline_advance: "Absolutist Administration"
  STATIC_MODIFIER_DESC_modifier_absolutism_control_decline_advance: "Absolutist rulers not only demonstrate their power in court, but also through an administrative apparatus that may spread throughout the country."
  STATIC_MODIFIER_NAME_modifier_offensive_army: "Offensive Army"
  STATIC_MODIFIER_DESC_modifier_offensive_army: "The era of gunpowder and military innovations is upon us, and with it comes a renewed interest in and vitality to the conduct of warfare. To further our glory, we must diligently ensure high standards for our offensive armed forces."
  STATIC_MODIFIER_NAME_modifier_superior_firepower: "Superior Firepower"
  STATIC_MODIFIER_DESC_modifier_superior_firepower: "The use of massed firepower to disrupt the enemy before delivering a coup de grâce is one of our army's strengths, and we will make sure that our leaders know this."
  STATIC_MODIFIER_NAME_modifier_grand_army: "Grand Army"
  STATIC_MODIFIER_DESC_modifier_grand_army: "Allows us to create one of the largest and most powerful armies the world has ever seen."
  STATIC_MODIFIER_NAME_modifier_regimental_system: "Regimental System"
  STATIC_MODIFIER_DESC_modifier_regimental_system: "By organizing our armies into regiments tied to distinct geographical areas, we allow them to put down roots in local communities. Then, we need to raise additional battalions for these regiments, recruitment will be faster thanks to these regional ties."
  STATIC_MODIFIER_NAME_modifier_private_to_marshal: "Private to Marshal"
  STATIC_MODIFIER_DESC_modifier_private_to_marshal: "Every private has a marshal's baton in his back. Well, perhaps not exactly, but for those who distinguish themselves in battle, promotion and rewards will follow. The troops know this and are inspired by it."
  STATIC_MODIFIER_NAME_modifier_escort_ships: "Corvettes"
  STATIC_MODIFIER_DESC_modifier_escort_ships: "Corvettes are a class of small warships that are designed to escort friendly vessels and harass the enemy, relying on speed and maneuverability rather than massed firepower."
  STATIC_MODIFIER_NAME_modifier_bayonet_leaders: "Bayonet Leaders"
  STATIC_MODIFIER_DESC_modifier_bayonet_leaders: "Men who are well-led will follow, so we must ensure that our officers lead from the front."
  STATIC_MODIFIER_NAME_modifier_national_conscripts: "National Conscripts"
  STATIC_MODIFIER_DESC_modifier_national_conscripts: "Increases our military numbers by making military service compulsory for those eligible."
  STATIC_MODIFIER_NAME_modifier_massed_battery: "Massed Battery"
  STATIC_MODIFIER_DESC_modifier_massed_battery: "Let us mass our artillery in a single grand battery. Its destructive power will blast a hole in the enemy lines!"
  STATIC_MODIFIER_NAME_modifier_mass_army: "Mass Army"
  STATIC_MODIFIER_DESC_modifier_mass_army: "We have, up to now, been very selective about who can serve as an enlisted member of our military. We only took the poorest and most desperate — basically, the people no one else would miss. Now, though, we shall open up the ranks to everyone who wishes to serve and has no significant wealth to speak of."
  STATIC_MODIFIER_NAME_modifier_the_young_can_serve: "The Young can Serve"
  STATIC_MODIFIER_DESC_modifier_the_young_can_serve: "How old does a boy have to be before he is a man? How old must he be before he can die for his country? Some rulers are squeamish; We, on the other hand, are an equal opportunity butcher."
  STATIC_MODIFIER_NAME_modifier_press_gangs: "Press Gangs"
  STATIC_MODIFIER_DESC_modifier_press_gangs: "Life at sea is hard and unforgiving, and not everyone is keen on a naval career. By legalizing the impressment of sailors and other skilled seafarers, it will be easier to crew our ships, speeding up the process of commissioning ships as well."
  STATIC_MODIFIER_NAME_modifier_superior_seamanship: "Superior Seamanship"
  STATIC_MODIFIER_DESC_modifier_superior_seamanship: "Enables us to transform our navy into a supreme naval force with top-class vessels and highly skilled captains and crew."
  STATIC_MODIFIER_NAME_modifier_improved_logistics: "Improved Logistics"
  STATIC_MODIFIER_DESC_modifier_improved_logistics: "The modern art of war nowadays clearly differentiates between amateur officers who talk about tactics, and professional officers who actually study logistics."
  STATIC_MODIFIER_NAME_modifier_land_morale_movement_cost_rev_choice_mil: "Unrelenting Advance"
  STATIC_MODIFIER_DESC_modifier_land_morale_movement_cost_rev_choice_mil: "Our armies on the march is a sight to behold. Their training and discipline shines when they march in unison into battle, unfazed by any previous long march."
  STATIC_MODIFIER_NAME_modifier_port_cost_distance_from_capital_choice_mil: "Coastal Patrols"
  STATIC_MODIFIER_DESC_modifier_port_cost_distance_from_capital_choice_mil: "Maintaining regular patrols along all our coasts will ensure that our administrative authority is felt everywhere, even in the farthest regions."
  STATIC_MODIFIER_NAME_modifier_pis_the_university_of_pisa: "The University of $PIS$"
  STATIC_MODIFIER_DESC_modifier_pis_the_university_of_pisa: "One of the oldest centers for higher learning in $ITA$ and indeed all of $europe$, the University of $PIS$ has a near-legendary reputation for excellence in both teaching and research."
  STATIC_MODIFIER_NAME_modifier_sie_council_priori: "The Council of Priori"
  STATIC_MODIFIER_DESC_modifier_sie_council_priori: "Following a series of failed republican and royal governments, we have established a Council for the People of $SIE$, one which hopefully shall not fall to highborn maneuverings and corruption like so many before it have. Though the exact number of representatives in the Council and how they are elected is somewhat in flux, decentralizing our government in this way will prevent $SIE$ from sinking into aristocratic control ever again."
  STATIC_MODIFIER_NAME_modifier_heirs_of_rum: "Scions of Rûm"
  STATIC_MODIFIER_DESC_modifier_heirs_of_rum: "After surviving a turbulent period, and winning the struggle to dominate our neighboring Beyliks, the time has finally come for us to restore the borders of the once-great Sultanate of Rûm!"
  STATIC_MODIFIER_NAME_modifier_seljuk_roots: "Seljuk Roots"
  STATIC_MODIFIER_DESC_modifier_seljuk_roots: "We are surrounded by enemies on all sides, making a strong military an absolute necessity. Fortunately, we are not weak people. From the irregular Ġuzāt and the Akıncılar raiders to the Sipâhi of the $TUR$, the world has come to fear and respect our military might. Let us build an army worthy of an empire, inspired by our glorious traditions and history, honing our might through the ages."
  STATIC_MODIFIER_NAME_modifier_splendor_of_anatolia: "Splendor of $anatolia_region$"
  STATIC_MODIFIER_DESC_modifier_splendor_of_anatolia: "Our region is home to some of the most impressive madrasas and mosques in the entire $muslim_ADJ$ world. With their meticulous attention to detail and abundant talent, our artisans shine with unmatched prowess."
  STATIC_MODIFIER_NAME_modifier_persian_in_the_court: "$IRA_ADJ$ in the Court"
  STATIC_MODIFIER_DESC_modifier_persian_in_the_court: "Persian has served as our administrative language for quite some time, a legacy stemming from our ancient roots. This has helped us transcend the social and cultural barriers that often arise in highly diverse nations like ours."
  STATIC_MODIFIER_NAME_modifier_crossroads_of_commerce: "Crossroads of Commerce"
  STATIC_MODIFIER_DESC_modifier_crossroads_of_commerce: "Our $caravanserais$ support the flow of commerce, information, and people from $china$ to $europe$ across our lands. This proximity to important trade routes has unleashed a flood of affluence throughout our nation."
  STATIC_MODIFIER_NAME_modifier_founding_fathers: "Founding Fathers"
  STATIC_MODIFIER_DESC_modifier_founding_fathers: "This refers to all the politicians, soldiers, diplomats, and others who played an influential role in establishing their nation by winning their country's independence and creating a new system of governance."
  STATIC_MODIFIER_NAME_modifier_colonial_militia: "Colonial Militia"
  STATIC_MODIFIER_DESC_modifier_colonial_militia: "In the absence of regular garrisons, colonial militias played an important role in local conflicts and border raids against native tribes and other colonies. They were typically made up of adult male citizens who were usually expected to provide their own weapons and equipment."
  STATIC_MODIFIER_NAME_modifier_new_frontiers: "New Frontiers"
  STATIC_MODIFIER_DESC_modifier_new_frontiers: "The movement to push the colonial frontier further and further inland in the New World, by establishing everything from small trade stations to full settlements with large areas of cultivated land."
  STATIC_MODIFIER_NAME_modifier_continental_trade: "Continental Trade"
  STATIC_MODIFIER_DESC_modifier_continental_trade: "While the New World colonies had to import a lot of manufactured products, they also became a major supplier of raw materials for markets in $europe$."
  STATIC_MODIFIER_NAME_modifier_free_thinkers: "Free Thinkers"
  STATIC_MODIFIER_DESC_modifier_free_thinkers: "The belief that every man is entitled to both freedom of thought and freedom of speech is widely held in our colonies. Without these rights in place, there could be no such thing as civil liberty."
  STATIC_MODIFIER_NAME_modifier_manufacturing_center: "Imperial Manufacturing Center"
  STATIC_MODIFIER_DESC_modifier_manufacturing_center: "Our citizens are the power base of our overlord's trade empire. Foreign goods are delivered to us, which we then mold into finished products."
  STATIC_MODIFIER_NAME_modifier_colonial_assembly: "Colonial Assembly"
  STATIC_MODIFIER_DESC_modifier_colonial_assembly: "Much of the legislative power over taxes and government spending has been moved into colonial administrations."
  STATIC_MODIFIER_NAME_modifier_liberty_heroes: "Sons of Liberty"
  STATIC_MODIFIER_DESC_modifier_liberty_heroes: "Many leaders of the New World independence wars possessed not only the necessary military skills, but also the charisma needed to encourage morale, hold the army together, and be an inspiration to the people."
  STATIC_MODIFIER_NAME_modifier_colonial_ambition: "Colonial Ambition"
  STATIC_MODIFIER_DESC_modifier_colonial_ambition: "Many of our people settled in the New World to start a new life; to discover the wonders beyond the sea and make an untamed continent their home. Their ambition is ours as we push further and further into the unknown."
  STATIC_MODIFIER_NAME_modifier_ara_a_mediterranean_trade_power: "A Mediterranean Trade Power"
  STATIC_MODIFIER_DESC_modifier_ara_a_mediterranean_trade_power: "The Mediterranean Sea's gentle embrace caresses our shores, beckoning our people to engage trade endeavors from generation to generation. Our bustling commercial centers and strategic trade posts scattered throughout the Mediterranean will play a crucial role in realizing our ambition to become a dominant force in trade."
  STATIC_MODIFIER_NAME_modifier_ara_fleet_ordinances: "Fleet Ordinances"
  STATIC_MODIFIER_DESC_modifier_ara_fleet_ordinances: "In the bustling Mediterranean, fleets gather from around the world, prompting the need for a legal system to address crimes in the crowded land and sea. #italic Ordinacions sobre lo fet de la mar#!, or #italic Ordinances on What Happens in the Sea#!, is one of the earliest military codes of justice, created to govern fleets. This unique response to the post-Black Death era recruits crew members, including criminals, from outside $ARA$, resulting in a harmonized code formed from diverse traditions rather than a mere codification of existing naval customs."
  STATIC_MODIFIER_NAME_modifier_ara_valencian_golden_age: "$VAL_ADJ$ Golden Age"
  STATIC_MODIFIER_DESC_modifier_ara_valencian_golden_age: "The realm we inhabit has ascended to literary heights as yet unattained by many neighboring nations, thanks to the remarkable contributions of esteemed authors such as Joanot Martorell, Ausiàs March, and Isabel de Villena. Their profound literary works have elevated our culture to unparalleled levels, instilling a sense of pride within our people. Undeniably, our nation stands as a radiant beacon of culture, shining brightly for all to behold."
  STATIC_MODIFIER_NAME_modifier_ara_remenca: "Remença"
  STATIC_MODIFIER_DESC_modifier_ara_remenca: "The #italic Remença#! system, particular to $CAT$, has close equivalents in other territories of the Crown, fostering a collective drive towards greater raw goods production. Through this framework, our lands experience a surge in wealth, igniting the potential for substantial progress towards fulfilling our objectives. By harmonizing these systems, we will cultivate an environment where our endeavors are fortified by the abundance of resources, fueling a path of growth and prosperity for our realm."
  STATIC_MODIFIER_NAME_modifier_ara_chartered_merchant_companies: "Chartered Merchant Companies"
  STATIC_MODIFIER_DESC_modifier_ara_chartered_merchant_companies: "Our traders are wasting resources competing with each other. This is silly; we should focus all our efforts on taking trade from others instead! Let us charter companies who will be given temporary monopolies on trade from certain regions and whose renewal will be dependent on giving the Crown its rightful due."
  STATIC_MODIFIER_NAME_modifier_ara_stronger_united: "Stronger United"
  STATIC_MODIFIER_DESC_modifier_ara_stronger_united: "Since the merger of between us and the County of Barcelona in 1164, $ARA$ has functioned as a Confederation, comprising distinct realms under a central ruler. These differences have fostered prosperity and maintained individual identities, yet have also given rise to an illusion of disunity. This has led to the need for administrative reforms to strengthen our union while honoring the unique characteristics of each territory."
  STATIC_MODIFIER_NAME_modifier_ara_constellation_cities: "Constellation of Cities"
  STATIC_MODIFIER_DESC_modifier_ara_constellation_cities: "Since its inception, our nation has consisted of diverse realms brought together under a single ruler. However, each realm retains its unique traditions and laws. Consequently, numerous major cities have emerged as regional metropolises, representing and governing their respective regions."
  STATIC_MODIFIER_NAME_modifier_ara_protection_of_the_little_folk: "Protect the Smallfolk"
  STATIC_MODIFIER_DESC_modifier_ara_protection_of_the_little_folk: "Our soldiers would want their loved ones to be looked after in the event they perish in battle. $ARA$ will do its duty and ensure that this is done through establishing a system of workhouses for orphans of the fallen."
  STATIC_MODIFIER_NAME_modifier_ara_gunpowder_souls: "Gunpowder Souls"
  STATIC_MODIFIER_DESC_modifier_ara_gunpowder_souls: "The #italic Fallas#! celebration has acted as a catalyst within the Crown of $ARA$, spurring advancements in artillery techniques through the practical expertise gained from handling gunpowder for firecrackers and fireworks. This festive tradition has fueled a spirit of innovation, resulting in the development of new strategies and knowledge about artillery."
  STATIC_MODIFIER_NAME_modifier_ara_mossos_esquadra: "Mossos d'Esquadra"
  STATIC_MODIFIER_DESC_modifier_ara_mossos_esquadra: "The #italic Escuadras de Paisanos#!, known as #italic Esquadres de Catalunya#! or #italic Mossos d'Esquadra#!, are a local militia dedicated to safeguarding trade routes and fairs, making the most of their intimate familiarity with the terrain. Inspired by their success, we aim to establish similar militias in our other territories, composed of local inhabitants. This should foster a harmonious coexistence and ensure peace in these regions."
  STATIC_MODIFIER_NAME_modifier_ayu_prestigious_cavalry: "Prestigious Cavalry"
  STATIC_MODIFIER_DESC_modifier_ayu_prestigious_cavalry: "Whether on horseback or atop an elephant, we can boast of an impressive cavalry, usually made up of descendants from the most prestigious families. Their contributions through supporting our infantry are invaluable."
  STATIC_MODIFIER_NAME_modifier_ayu_white_elephant: "White Elephant"
  STATIC_MODIFIER_DESC_modifier_ayu_white_elephant: "The white elephant symbolizes sacred kingship in $buddhist$ tradition, and is also the emblem of our ruler. Possessing a white elephant legitimizes our authority, proving to our subjects that we rule with the blessing of the divine."
  STATIC_MODIFIER_NAME_modifier_ayu_ayutthaya_literature: "$AYU_ADJ$ Literature"
  STATIC_MODIFIER_DESC_modifier_ayu_ayutthaya_literature: "Our country has a rich and complex literary tradition, from the epic #italic Lilit#! poems narrating famous military conflicts, to the #italic Nirat#! poetry of travels and lost lovers; from folk legend of local heroes to panegyrics praising the feats of our most glorious rulers."
  STATIC_MODIFIER_NAME_modifier_ayu_phrai_luang: "Phrai Luang"
  STATIC_MODIFIER_DESC_modifier_ayu_phrai_luang: "All freemen subject to #italic phrai#! service not only serve in war — the #italic $ayu_phrai_thaan$#! — but also assist in the construction of public works, at the discretion of local governors."
  STATIC_MODIFIER_NAME_modifier_ayu_phrai_thaan: "Phrai Thaan"
  STATIC_MODIFIER_DESC_modifier_ayu_phrai_thaan: "All males at the age of eighteen are to be registered with the military, and their information passed on to the government bureaucracy. Every male citizen is eligible to be conscripted and made to serve in the army in war, and we will make sure that they do so if needed."
  STATIC_MODIFIER_NAME_modifier_ayu_floating_rice: "Floating Rice"
  STATIC_MODIFIER_DESC_modifier_ayu_floating_rice: "Rice has been grown in our country for centuries, but the constant flooding of our rivers has always been an issue for its proper cultivation. This new variety of rice, used to growing in flooded conditions, will provide us with a stable source of food even when the rivers overflow."
  STATIC_MODIFIER_NAME_modifier_ayu_sakdina: "Sakdina"
  STATIC_MODIFIER_DESC_modifier_ayu_sakdina: "Our society is strictly organized along the $ayu_sakdina$ system. Each person knows their proper place in society and how much wealth and property they are entitled to have. This organization makes it much more efficient to extract taxes from them."
  STATIC_MODIFIER_NAME_modifier_ayu_cosmopolitan_trade: "Cosmopolitan Trade"
  STATIC_MODIFIER_DESC_modifier_ayu_cosmopolitan_trade: "Our country is home to many people from afar, who came here hoping to profit from the richness of our land. Having so many people and goods flowing through our borders is something we derive numerous benefits from."
  STATIC_MODIFIER_NAME_modifier_expansion_merchant_guilds: "Expansion of Merchant Guilds"
  STATIC_MODIFIER_DESC_modifier_expansion_merchant_guilds: "Pochtēcah merchants extend their routes far beyond our lands, enriching every marketplace loyal to the Mexihcah."
  STATIC_MODIFIER_NAME_modifier_centralized_city_governance: "Centralized City Governance"
  STATIC_MODIFIER_DESC_modifier_centralized_city_governance: "The refomation of our government, in an attempt to support the sprawl of our newly-attained urban territories, shall be united under firm oversight, creating a more orderly and dependable administration."
  STATIC_MODIFIER_NAME_modifier_wealth_of_mesoamerica: "Wealth of Mesoamerica"
  STATIC_MODIFIER_DESC_modifier_wealth_of_mesoamerica: "The fertile soils, forests, and mines of Ānāhuac yield immense riches, sustaining our growth and imperial ambitions. Properly utilizing these resources will bolster our affluence."
  STATIC_MODIFIER_NAME_modifier_study_european_colonizers: "Study the European Colonizers"
  STATIC_MODIFIER_DESC_modifier_study_european_colonizers: "Strangers have made contact with our people. Their unfamiliar ships and weapons instill awe and fear. Understanding their methods may be the key to survival."
  STATIC_MODIFIER_NAME_modifier_new_fire_ceremonies: "New Fire Ceremonies"
  STATIC_MODIFIER_DESC_modifier_new_fire_ceremonies: "Once every fifty-two years, the world is renewed by flame, uniting the people in faith and cosmic balance."
  STATIC_MODIFIER_NAME_modifier_sun_must_rise: "The Sun Must Rise"
  STATIC_MODIFIER_DESC_modifier_sun_must_rise: "Through devotion and ritual, we keep the sun's journey alive, easing the hearts and strengthening the spirit of our people. The preservation of equilibrium, and even the world, rests upon our shoulders."
  STATIC_MODIFIER_NAME_modifier_bohemian_imperial_standing: "$BOH_ADJ$ $HRE_ADJ$ Standing"
  STATIC_MODIFIER_DESC_modifier_bohemian_imperial_standing: "Our place within the $hre$ is one of prestige, grandeur, and authority. Few members wield as much soft power as us, due to our capable diplomats and alliance networks."
  STATIC_MODIFIER_NAME_modifier_urbanization_decrees: "Urbanization Decrees"
  STATIC_MODIFIER_DESC_modifier_urbanization_decrees: "As part of our efforts to modernize $prague$, we will issue grants encouraging prominent figures to relocate their business to the capital while offering privileges to attract skilled and wealthy foreign immigrants. This influx of talent and capital will transform our $prague$ into a thriving, cosmopolitan metropolis."
  STATIC_MODIFIER_NAME_modifier_bohemian_crystal: "$BOH_ADJ$ Crystal"
  STATIC_MODIFIER_DESC_modifier_bohemian_crystal: "There are very few workshops in the known world with the capacity to craft glass and crystal with the same quality and clarity as ours, let alone rival our superior production techniques."
  STATIC_MODIFIER_NAME_modifier_fortified_towns: "Fortified Towns"
  STATIC_MODIFIER_DESC_modifier_fortified_towns: "Through the ravages of the $hussite_wars$, and in an effort to safeguard our faith and people, we funded many fortified towns. Since then, we have gained great expertise in erecting fortifications and engineering impenetrable defenses."
  STATIC_MODIFIER_NAME_modifier_hussite_traditions: "$hussite_ADJ$ Traditions"
  STATIC_MODIFIER_DESC_modifier_hussite_traditions: "Through struggle and brotherhood, the adherents of our faith withstand all external conversion pressures. Our unshaken religious roots, stemming from ancient teachings, ring true to the hearts of all those who seek to protect their beliefs and live in peace alongside their fellow $christian_ADJ$ faithful."
  STATIC_MODIFIER_NAME_modifier_kutnohorian_deal: "The Kutnohorian Deal"
  STATIC_MODIFIER_DESC_modifier_kutnohorian_deal: "The nobility will always be rather sensitive about protecting their privileges. It would go far towards winning their loyalty if said privileges were to be guaranteed forever."
  STATIC_MODIFIER_NAME_modifier_bohemian_thaler: "$BOH_ADJ$ Thaler"
  STATIC_MODIFIER_DESC_modifier_bohemian_thaler: "For years, the standard currency in our country has been the #italic groschen#!, a coin made of silver and used all throughout the $hre$. The discovery of new sources of silver allows us to create another kind of bigger coin, the #italic thaler#!, also called 'toler' or 'daler', which will become strong and influential enough to dominate all trade and become a new standard."
  STATIC_MODIFIER_NAME_modifier_bos_katun_communities: "Vlach Katuns"
  STATIC_MODIFIER_DESC_modifier_bos_katun_communities: "Parts of our population are organized into self-governing, pastoralist communities. Instead of bending them to a central government's will, we should cooperate with them, and in doing so try to extract more resources from our more remote areas."
  STATIC_MODIFIER_NAME_modifier_bos_influence_of_the_stanak: "Stanak Meetings"
  STATIC_MODIFIER_DESC_modifier_bos_influence_of_the_stanak: "Our nobility regularly gathers together to discuss the most pressing issues for our country. These meetings ensure our noble lords are aligned in their policies and show unity during our parliament sessions."
  STATIC_MODIFIER_NAME_modifier_bos_defiant_terrain: "Defiant Terrain"
  STATIC_MODIFIER_DESC_modifier_bos_defiant_terrain: "$bosnia_area$ is a land of forested hills and mountains, cut through by river valleys. This terrain lends itself naturally to delaying and tiring invading armies, and we should use this to our advantage. Engaging our enemy only when it benefits us and letting the hostile terrain itself claim both their supplies and troops will preserve our strength."
  STATIC_MODIFIER_NAME_modifier_bos_kingly_ambitions: "Kingly Ambitions"
  STATIC_MODIFIER_DESC_modifier_bos_kingly_ambitions: "The achievements and hard work of our people deserve recognition and protection. We will establish a prestigious title for ourselves and thereby secure that recognition from neighboring rulers, formalizing our status through diplomatic bonds."
  STATIC_MODIFIER_NAME_modifier_bosnian_bosancica: "Bosančica"
  STATIC_MODIFIER_DESC_modifier_bosnian_bosancica: "The Bosnian people have unified around #italic Bosančica#!, a unique, cursive Cyrillic script used for everything from diplomatic treaties to private merchant ledgers. This national script serves as a powerful cultural gatekeeper; it is difficult for foreigners to read but universal among the Bosnian literate class, regardless of their specific confession. By maintaining this distinct script, the people ensure that their legal and historical records remain a 'closed book' to imperial administrators, preserving the secret nuances of Bosnian property law and lineage in a format that reinforces their unique Slavic heritage."
  STATIC_MODIFIER_NAME_modifier_bos_the_srebrenica_mint_office: "The Srebrenica Mint Office"
  STATIC_MODIFIER_DESC_modifier_bos_the_srebrenica_mint_office: "As the mines of $srebrenica$ become the premier source of bullion in the Balkans, the realm has moved beyond the mere export of raw ore. We have established a Royal Mint and an Assay Office to regulate the purity of Bosnian silver, producing a coin which rivals those of Venice in reliability. By mandating that all silver extracted by Ragusan or Saxon miners be processed through state-controlled refineries, we capture a massive share of the value-added profit. This liquid wealth allows us to make Bosnia the most financially solvent power in the Dinaric Alps."
  STATIC_MODIFIER_NAME_modifier_bosnian_people_from_the_hills: "People from the Hills"
  STATIC_MODIFIER_DESC_modifier_bosnian_people_from_the_hills: "The geography of the Bosnian heartland is a vertical maze of limestone ridges and valleys that defy conventional mapping. Our people have adapted to this logic, mastering the secrets of the subterranean cavern networks and the logistics of the mule-train."
  STATIC_MODIFIER_NAME_modifier_bos_bosnian_ljekaruse: "Bosnian Ljekaruše"
  STATIC_MODIFIER_DESC_modifier_bos_bosnian_ljekaruse: "In the secluded valleys of our nation, monks of our monasteries have compiled the #italic Ljekaruše#! — extensive medicinal codices written in the native #italic Bosančica#! script. By synthesizing ancient Greco-Byzantine theory with the high-altitude herbalism of the Dinaric Alps, these manuals provide a sophisticated system of community healthcare in an era where professional physicians are a rarity. This mastery of folk-medicine and surgery ensures our population remains resilient against the plagues that devastate the lowlands, fostering a cultural identity defined by intellectual self-reliance and the preservation of Slavic scientific knowledge."
  STATIC_MODIFIER_NAME_modifier_bosnian_susjedsvto_of_bosnia: "Susjedstvo of Bosnia"
  STATIC_MODIFIER_DESC_modifier_bosnian_susjedsvto_of_bosnia: "The ancient cultural concept of #italic Susjedstvo#! — the sacred social obligation to protect and honor one's neighbor — has evolved into a sophisticated civic philosophy that transcends religious divides. In the face of external pressures, this unwritten code mandates that a neighbor's safety and property are as sacred as one's own. This practice prevents the 'Divide and Rule' tactics often used by foreign powers to incite internal strife. By prioritizing local solidarity and the 'Law of the Neighborhood', we maintain a level of social harmony and internal stability that allows the nation to present a single, unbreakable front against any attempt to dismantle our shared homeland."
  STATIC_MODIFIER_NAME_modifier_bos_the_filigree_guilds: "The Filigree Guilds"
  STATIC_MODIFIER_DESC_modifier_bos_the_filigree_guilds: "Drawing on the inexhaustible silver veins of the central mountains, our urban craftsmen have perfected the art of Filigran — intricate silver wire-work that has become the hallmark of Bosnian luxury. These guilds operate as a powerful economic estate, exporting ceremonial daggers and fine jewelry to the markets of Venice and Vienna. By turning our raw mineral wealth into high-value artistic exports, we have created a prosperous urban middle class that is fiercely loyal to the Crown. This industrial refinement elevates the prestige of our nation in every foreign court, proving that the 'Iron Heart' of the Balkans possesses a sophisticated cultural edge that rivals the great capitals of the West."
  STATIC_MODIFIER_NAME_modifier_divide_estates: "Divide the Estates"
  STATIC_MODIFIER_DESC_modifier_divide_estates: "United, the three estates form an effective block against the power of the ruler. To consolidate our control, we must systematically leverage the nobility against the other estates."
  STATIC_MODIFIER_NAME_modifier_soldiers_fortune: "Soldiers of Fortune"
  STATIC_MODIFIER_DESC_modifier_soldiers_fortune: "Our lands are sparsely populated, for the most part, and surrounded by enemies. The necessity for more robust defenses has prompted us to hire soldiers from foreign lands, who will fight under our banner for a price."
  STATIC_MODIFIER_NAME_modifier_iron_tooth: "Iron Tooth"
  STATIC_MODIFIER_DESC_modifier_iron_tooth: "Enhancing our court's control over the Margraviate's lands will earn our ruler the moniker #italic Iron Tooth#!, as if we bit it like an attack dog. Our rule will leave a mark on our nation, a mark which will instill a sense of pride and loyalty in even the lowliest peasant in $brandenburg_area$."
  STATIC_MODIFIER_NAME_modifier_kammergericht: "Found the Kammergericht"
  STATIC_MODIFIER_DESC_modifier_kammergericht: "In order to regularize control of the Mark of Brandenburg, we will replace local common law with Roman law. We will further regulate justice by moving the Supreme Court from the court of the Elector, who is prone to moving around, to a fixed central location. This will simultaneously improve justice and curb the power of local magnates."
  STATIC_MODIFIER_NAME_modifier_margrave_council: "Geheimer Rat für die Kurmark"
  STATIC_MODIFIER_DESC_modifier_margrave_council: "The authority of the Margrave is greatly threatened by the ever-increasing power of our Estates. The Estates are of great benefit to our nation, but the threat they represent to our base of power necessitates the creation of a new council, one which reduces the very real power that the estates hold over our nation into more of an advisory position for the Margrave. This way, we may continue to enjoy the benefits of our Estates while having fewer concerns about their needs."
  STATIC_MODIFIER_NAME_modifier_religious_toleration: "Religious Toleration"
  STATIC_MODIFIER_DESC_modifier_religious_toleration: "Stability in our home regions is the key to our success elsewhere. Expanding outwards while fostering religious tolerance, we not only improve stability at home, but we also make our realm a haven for those fleeing persecution elsewhere."
  STATIC_MODIFIER_NAME_modifier_army_professionalism: "Army Professionalism"
  STATIC_MODIFIER_DESC_modifier_army_professionalism: "As we learned from the Persian invasion of Greece so long ago, a small army can defeat a larger one — as long as they have iron discipline and the proper training. We must elevate our own army to meet these extraordinary standards."
  STATIC_MODIFIER_NAME_modifier_auftragstaktik: "Auftragstaktik"
  STATIC_MODIFIER_DESC_modifier_auftragstaktik: "#italic Auftragstaktik#!, or 'Mission Tactics'. is a system by which our subordinate leaders are informed about the objectives of the battle or the war by their commanders, and then are allowed to act on their personal initiative. This system allows our battalions to develop a tighter relationship with their leaders, yielding better results."
  STATIC_MODIFIER_NAME_modifier_goose_step: "The Goose Step"
  STATIC_MODIFIER_DESC_modifier_goose_step: "Although it looks rather odd, the 'goose step' is specifically designed to facilitate our men holding their line as they advance towards the enemy. This provides our armies with a tangible advantage on the battlefield."
  STATIC_MODIFIER_NAME_modifier_legacy_of_breton_independence: "Legacy of $breton$ Independence"
  STATIC_MODIFIER_DESC_modifier_legacy_of_breton_independence: "$brittany_area$ has never truly been part of $FRA$ Though we have been ravaged by Franks, Vikings, and the $ENG_ADJ$ in the past, we have, thus far, maintained our unique identity as a people. Let all of our neighbors be aware that $BRI$ shall remain forever free, the last bastion of true Gallic traditions!"
  STATIC_MODIFIER_NAME_modifier_estates_of_brittany: "The Estates of $BRI$"
  STATIC_MODIFIER_DESC_modifier_estates_of_brittany: "First called in the 14th century, the Estates of $BRI$ allowed free men from all rungs of society, even the Third Estate, to share their grievances and petition the ruler for redress. By calling in the Estates, we can mitigate some of the tension felt throughout our domain."
  STATIC_MODIFIER_NAME_modifier_reformation_of_the_bulgarian_patriarchate: "Reformation of the Patriarchate"
  STATIC_MODIFIER_DESC_modifier_reformation_of_the_bulgarian_patriarchate: "The spiritual heart of the Bulgarian world will undergo a rigorous and profound transformation under the iron-willed guidance of our Patriarch. Recognizing that the survival of the nation depends upon the purity of its faith and the precision of its holy texts, the Patriarchate will initiate a sweeping linguistic and liturgical reform centered at the Holy Trinity Monastery of Tarnovo. By purging the Church Slavonic manuscripts of centuries of scribal errors and corrupt localisms, we will establish a new, standardized orthography that will become the gold standard for the entire Orthodox Slavic world, from the Danube to the Volga."
  STATIC_MODIFIER_NAME_modifier_revival_of_the_literary_schools: "The Tarnovo Artistic Schools"
  STATIC_MODIFIER_DESC_modifier_revival_of_the_literary_schools: "Under the direct patronage of the Shishman Dynasty, the nation has undergone a spectacular cultural growth, positioning itself as a true #italic Third Rome#! and the primary guardian of Orthodox high culture. By funding the reconstruction of the Patriarchal Cathedral and the royal palaces of Tsarevets, the state has gathered a new generation of master iconographers, hagiographers, and architects who blend traditional Byzantine aesthetics with a unique, emotive Bulgarian realism. This school of thought does not merely produce religious icons; it serves as a powerful instrument of imperial propaganda, codifying the Bulgarian recension of Church Slavonic and producing the Manasses Chronicle to legitimize the Tsar's claim to the Byzantine heritage."
  STATIC_MODIFIER_NAME_modifier_bul_the_chancery_of_the_asens: "The Chancery of the Asens"
  STATIC_MODIFIER_DESC_modifier_bul_the_chancery_of_the_asens: "At its peak, the chancellery in Tarnovo was the most sophisticated diplomatic hub in the Orthodox world, producing intricate Slavic charters that influenced the courts of Serbia and Russia. By professionalizing the class of #italic Logothetes#! and scribes, the Tsars will ensure that every land grant and international treaty is meticulously recorded and legally binding. This administrative rigor will allow the state to extract taxes more efficiently and manage its complex network of vassalage with a degree of central control that is rare in the late medieval period."
  STATIC_MODIFIER_NAME_modifier_kvn_looking_for_friends: "Looking for Friends"
  STATIC_MODIFIER_DESC_modifier_kvn_looking_for_friends: "Given our small land area, our rulers understand the need for powerful friends and trade partners. By granting these allies exclusive trading rights in ports like Varna, the Despotate will gain access to modern Western naval technology and financial credit, as well as potentially powerful naval protection against our enemies. This alliance will transform Dobruja into a cosmopolitan trade hub, where the wealth of the Silk Road will be exchanged for the grain and furs of the north."
  STATIC_MODIFIER_NAME_modifier_vid_the_western_connection: "The Western Connection"
  STATIC_MODIFIER_DESC_modifier_vid_the_western_connection: "Positioned at the crossroads of cultures, the Tsars of Vidin have maintained closer ties with the Catholic West than any other Bulgarian rulers, often marrying into Hungarian and Wallachian nobility. This diplomatic flexibility allows Vidin to survive as an independent state, utilizing Western military technology and courtly traditions to distinguish itself from the rest of $BUL$. By acting as a bridge between the Orthodox and Catholic worlds, Vidin becomes a center of trade and intellectual exchange that enriches the local treasury and the army."
  STATIC_MODIFIER_NAME_modifier_bulgarian_the_danubian_river_merchants: "The Danubian River Merchants"
  STATIC_MODIFIER_DESC_modifier_bulgarian_the_danubian_river_merchants: "Leveraging their position as the gatekeepers of the Lower Danube, Bulgarian merchant families have established a sophisticated trade network connecting the Black Sea to Central Europe. By utilizing shallow-draft barges and fortified river ports, they have managed to bypass the expensive and dangerous overland routes, controlling the flow of salt, grain, and timber across the Balkans. This riverine expertise has turned the Danube into a Bulgarian artery of wealth, funding the rise of a new urban elite that we can tax so they keep their privileges."
  STATIC_MODIFIER_NAME_modifier_bul_the_boyar_council: "The Boyar Council"
  STATIC_MODIFIER_DESC_modifier_bul_the_boyar_council: "To prevent the internal strife that plagued the 14th century, we will evolve into a 'Consultative Autocracy' where the most powerful Boyars are integrated into a permanent State Council. This body will serve as a high court and a military planning board, ensuring that the interests of the landed nobility are aligned with those of the crown. This political stability will allow us to maintain a large standing army and avoid the devastating civil wars that have historically left the empire vulnerable to its neighbors."
  STATIC_MODIFIER_NAME_modifier_bul_the_hesychast_state_philosophy: "The Hesychast State Philosophy"
  STATIC_MODIFIER_DESC_modifier_bul_the_hesychast_state_philosophy: "The spiritual teachings of Grēgórios Sinaítēs have moved from the hermit's cell to the halls of power. By adopting Hesychasm — a philosophy of inner stillness and divine light — as the unofficial state ideology, we foster a populace that is deeply pious and resilient. This shared spiritual identity acts as a powerful deterrent against the influences from our enemies, making the Bulgarian subjects immune to foreign conversion or subversion."
  STATIC_MODIFIER_NAME_modifier_kvn_the_condotta_of_varna: "The Condotta of Varna"
  STATIC_MODIFIER_DESC_modifier_kvn_the_condotta_of_varna: "As a maritime state with a relatively small land population, Karvuna has refined the art of 'contract warfare' by formalizing a permanent Condotta with the Italian maritime powers. Under this arrangement, we provide them with fortified warehouses and naval bases in the Black Sea, and in return, the Italians provide a professional corps of heavy crossbowmen and expert siege engineers for the Despotate's defense. This symbiotic relationship allows Karvuna to punch far above its weight in land battles, utilizing Western tactical innovations and professional discipline to defend its coastal strip while the native Bulgarian sailors dominate the waves, effectively outsourcing its land defense to the most skilled mercenaries in the Mediterranean."
  STATIC_MODIFIER_NAME_modifier_vid_the_order_of_the_danubian_dragon: "The Order of the Danubian Dragon"
  STATIC_MODIFIER_DESC_modifier_vid_the_order_of_the_danubian_dragon: "To ensure the loyalty of the border nobility and create a professional officer corps, the Tsars of Vidin will establish a local knightly order modeled after the Western European #italic Societas Draconistrarum#!. Members of this order will be granted estates along the Timok and Danube rivers in exchange for maintaining a state of perpetual readiness and providing a heavy cavalry core for the Tsardom's defense. This institution will hopefully bridge the gap between the old Bulgarian Boyar traditions and the chivalric standards of the West, fostering a high level of military discipline and personal loyalty to the crown and prevent internal fragmentation."
  STATIC_MODIFIER_NAME_modifier_fortress_of_the_balkans: "Fortress of the Balkans"
  STATIC_MODIFIER_DESC_modifier_fortress_of_the_balkans: "We have recognized that spiritual purity alone cannot halt the encroaching craze of the world. To survive, the state has pivoted toward a doctrine of total territorial fortification, transforming the Balkan Mountains into an impassable granite wall. By reinforcing our lands with tiered stone redoubts and permanent garrisons, the nation has created a strategic depth that forces any invader into a lethal war of attrition. This policy ensures that the Bulgarian heartland remains a sanctuary of Orthodox stability, where the flame of our people's heart is shielded behind a ring of iron and stone that no storm can easily douse."
  STATIC_MODIFIER_NAME_modifier_bul_the_silk_and_rose_guilds: "The Silk and Rose Guilds"
  STATIC_MODIFIER_DESC_modifier_bul_the_silk_and_rose_guilds: "Utilizing the fertile Thracian plains and the unique climate of the Rose Valley, we have established state-protected guilds for the production of luxury oils and silk. These high-value, low-weight goods are perfect for overland export to the courts of Europe and Asia. The wealth generated by these guilds allows the state to build a massive gold reserve, making our economy one of the most stable and credit-worthy in the entire Mediterranean basin."
  STATIC_MODIFIER_NAME_modifier_bul_the_bulgarian_gunpowder_foundries: "The Bulgarian Gunpowder Foundries"
  STATIC_MODIFIER_DESC_modifier_bul_the_bulgarian_gunpowder_foundries: "Drawing on the iron mines of the Balkan mountains and the expertise of Saxon miners, we will establish the first major domestic gunpowder industry in the region. These foundries will produce heavy siege cannons and early handguns, allowing the Bulgarian army to transition away from purely feudal cavalry toward a more modern, infantry-heavy force. By controlling the production of saltpeter and iron, we will ensure that our walls remain the most dangerous obstacle for any would-be conqueror in the Balkans."
  STATIC_MODIFIER_NAME_modifier_kvn_the_cosmopolitan_code_of_karvuna: "The Cosmopolitan Code of Karvuna"
  STATIC_MODIFIER_DESC_modifier_kvn_the_cosmopolitan_code_of_karvuna: "To maintain its status as the premier trade hub of the Black Sea, we will promulgate a revolutionary legal framework known as the 'Code of Karvuna', which will grant extraterritorial rights and religious freedom to recognized merchant nations. Regardless of their faith or origin, any merchant operating within our ports will be judged by a commercial court of his peers rather than by local feudal lords. This atmosphere of legal predictability and tolerance will attract a massive influx of capital and expertise, turning Karvuna into a huge hub where the wealth of the silk and spice roads will be reinvested into the state's infrastructure and military-industrial complex."
  STATIC_MODIFIER_NAME_modifier_vid_the_mining_grants: "The Mining Grants"
  STATIC_MODIFIER_DESC_modifier_vid_the_mining_grants: "Vidin needs to expand its influence into the mineral-rich Timok valley, granting charters to Saxon and Ragusan miners to extract silver, lead, and copper. This industrial base will provide the Tsardom with the metal needed for modern currency and the production of high-quality firearms, making Vidin a self-sufficient military power. The wealth from these mines will also allow the Tsars to maintain a professional army."
  STATIC_MODIFIER_NAME_modifier_bulgarian_the_bulgarian_cloth_industry: "The Bulgarian Cloth Industry"
  STATIC_MODIFIER_DESC_modifier_bulgarian_the_bulgarian_cloth_industry: "The Bulgarian towns will be transformed into the industrial heartland of the peninsula through the specialized production of #italic Aba#! (a durable, thick woolen cloth) and #italic Gaitan#! (decorative braid). By organizing the local weavers and shepherds into powerful, self-governing guilds, the Bulgarian merchants will be able to secure massive state contracts for the outfitting of the regional armies and the growing urban middle classes of the Mediterranean. This economic surge creates a merchant aristocracy that will signal the transition of the Bulgarian people from a rural peasantry to a sophisticated, proto-industrial society with the financial power to dictate terms to their neighbors."
  STATIC_MODIFIER_NAME_modifier_bul_the_grand_academy_of_the_yantra: "The Grand Academy of the Yantra"
  STATIC_MODIFIER_DESC_modifier_bul_the_grand_academy_of_the_yantra: "The intellectual legacy of the 14th-century Tarnovo Literary School is revived in the 17th century through the creation of a modern state university. This institution focuses on civil law, engineering, and the translation of Western scientific texts into the Bulgarian vernacular, creating a class of bureaucrats who are as capable as any in Paris or Vienna. This modernization of the elite will ensure that we can manage a complex, multi-ethnic empire while maintaining the cultural purity of its Bulgarian core."
  STATIC_MODIFIER_NAME_modifier_bul_the_standing_drilled_infantry: "The Standing Drilled Infantry"
  STATIC_MODIFIER_DESC_modifier_bul_the_standing_drilled_infantry: "Moving away from seasonal levies, we have established the first permanent 'Regiments of the Lion'. These infantrymen are trained year-round in the use of firearms, following a rigorous drill based on the successes of neighbor models but adapted for Balkan terrain. This professional infantry core give us a reliable tool for offensive warfare, capable of out-marching and out-shooting the traditional armies of our neighbors."
  STATIC_MODIFIER_NAME_modifier_kvn_the_black_sea_admiralty: "The Black Sea Admiralty"
  STATIC_MODIFIER_DESC_modifier_kvn_the_black_sea_admiralty: "Karvuna will establish a permanent, state-run Admiralty to oversee the construction of modern deep-water warships and the training of a professional officer corps. Shifting away from small galleys, we will begin building frigates and small ships-of-the-line capable of projecting power as far as the Aegean and the Sea of Azov. This naval modernization will ensure that we remain a major maritime player, capable of defending our trade interests against our enemies."
  STATIC_MODIFIER_NAME_modifier_vid_vidins_custom_houses: "Vidin's Custom Houses"
  STATIC_MODIFIER_DESC_modifier_vid_vidins_custom_houses: "As the trade between the upper Danube and the Black Sea grows, Vidin has become one of the most important custom houses on the Lower Danube, regulating the flow of European luxury goods into the Balkans. By implementing a sophisticated system of tariffs and warehouse laws, the state will be able to fill its coffers without placing a heavy burden on its own agricultural population. This trade-heavy economy will allow Vidin to modernize its infrastructure, building paved roads and stone bridges that connect the Danube to the interior of the Balkan Peninsula."
  STATIC_MODIFIER_NAME_modifier_bulgarian_the_bulgarian_national_awakening: "The Bulgarian National Awakening"
  STATIC_MODIFIER_DESC_modifier_bulgarian_the_bulgarian_national_awakening: "Driven by the writings of monks like Paisius of Hilendar, the Bulgarian people have rediscovered their imperial history and linguistic pride, sparking a massive educational and political rebirth. This movement has moved beyond local grievances to demand a centralized, modern state that can take its place among the great powers of Europe. The result is a highly motivated and literate populace, ready to serve in a modern bureaucracy or a national army, fueled by the conviction that the glory of the Tsars is not a memory, but a future."
  STATIC_MODIFIER_NAME_modifier_bul_the_imperial_restoration_doctrine: "The Imperial Restoration Doctrine"
  STATIC_MODIFIER_DESC_modifier_bul_the_imperial_restoration_doctrine: "We have fully embraced our role as the natural leader of the Balkan peoples, articulating a formal doctrine for the reunification of all former Bulgarian lands. This fate is backed by a modern, professionalized army and a sophisticated diplomatic corps that seek to play the Great Powers against one another. The belief in a 'Greater Bulgaria' becomes the central pillar of the state, driving a policy of aggressive expansion and cultural assimilation that seeks to restore the empire of Simeon the Great."
  STATIC_MODIFIER_NAME_modifier_bul_the_bulgarian_census_bureau: "The Bulgarian Census Bureau"
  STATIC_MODIFIER_DESC_modifier_bul_the_bulgarian_census_bureau: "Knowledge is power. We have instituted a decennial census that records every person, unit of livestock, and hearth in the empire. This precise data allows for the most efficient taxation and conscription system in the Balkans. By knowing exactly what the nation can provide, we can plan long-term campaigns with a level of logistical certainty that ensures our armies are always well-fed and our coffers never empty."
  STATIC_MODIFIER_NAME_modifier_kvn_the_free_port_of_varna: "The Free Port of Varna"
  STATIC_MODIFIER_DESC_modifier_kvn_the_free_port_of_varna: "To cement our position as the premier commercial hub of the Balkans, we will declare Varna a free port, exempting international merchants from most traditional duties in exchange for a flat transit fee. This policy will attract a massive diaspora of merchants, bankers, and insurers, making Varna the 'Venice of the Black Sea' and the financial capital of the Bulgarian world. The resulting wealth will allow us to maintain a professional army and a world-class navy, ensuring that our coastal state remains a wealthy and independent power in an age of giants."
  STATIC_MODIFIER_NAME_modifier_vid_the_codex_shishman: "The Codex Shishman"
  STATIC_MODIFIER_DESC_modifier_vid_the_codex_shishman: "To finalize the transition from a medieval feudal state to a modern, centralized monarchy, the Tsardom will promulgate the #italic Societas Codex Shishman#!, a comprehensive legal reform that unifies the disparate local customs of the Western Balkans. This code will establish a professional judiciary independent of the local landowners and standardize the weights, measures, and currencies used throughout Vidin's trade network. By providing a predictable and fair legal environment, we will ensure the growth of a loyal urban middle class and the stability of the state's tax revenue. This administrative modernization will make Vidin a beacon of 'Enlightened Despotism' in the East, where the rule of law is as ironclad as the walls of Baba Vida itself."
  STATIC_MODIFIER_NAME_modifier_golden_fleece: "The Order of the Golden Fleece"
  STATIC_MODIFIER_DESC_modifier_golden_fleece: "One of $europe$'s foremost chivalric orders. Being a Knight of the Golden Fleece is a mark of great status, and reflects well upon us."
  STATIC_MODIFIER_NAME_modifier_promote_estates_general: "Promote the États Généraux"
  STATIC_MODIFIER_DESC_modifier_promote_estates_general: "$BUR$ is a feudal creation with various parts conjoined under different conditions, which has created strong local identities. By promoting a central assembly, we give a forum for these interests, promoting a smooth and uncontested rule."
  STATIC_MODIFIER_NAME_modifier_reform_the_feudal_army: "Reform the Feudal Army"
  STATIC_MODIFIER_DESC_modifier_reform_the_feudal_army: "The feudal levy system has proven slow and unreliable in this new age of professional warfare. Inspired by the $FRA_ADJ$ model, we will replace our scattered vassal hosts with salaried companies, skilled officers, and integrated armies. A disciplined core of professional soldiers will form the backbone of a modern and adaptable army."
  STATIC_MODIFIER_NAME_modifier_compagnie_d_ordonnance: "Compagnies d'Ordonnance"
  STATIC_MODIFIER_DESC_modifier_compagnie_d_ordonnance: "Our reliance on feudal levies has proven inadequate for the demands of modern warfare. The creation of permanently contracted cavalry units, the #italic $compagnie_d_ordonnance$#!, provides us with a reliable and professional military force directly loyal to the Crown."
  STATIC_MODIFIER_NAME_modifier_influence_of_the_burgundian_towns: "Influence of the $BUR_ADJ$ Towns"
  STATIC_MODIFIER_DESC_modifier_influence_of_the_burgundian_towns: "The traditional Estates General favors the clergy and nobility, but the rising wealth and political importance of towns can no longer be ignored. By refining its structure to reflect the growing strength of the merchant class, we ensure more balanced governance while preserving the privileges of the other estates. A stronger urban voice will also enhance our administrative capacities and speed up the rate of urbanization."
  STATIC_MODIFIER_NAME_modifier_create_the_regimental_system: "Create the Regimental System"
  STATIC_MODIFIER_DESC_modifier_create_the_regimental_system: "To ensure consistent recruitment and sufficient supply of fighters, we must establish a formal regimental system. This reform will allow us to organize manpower more effectively, centralize command structures, and reduce dependence on local nobles and foreign mercenaries."
  STATIC_MODIFIER_NAME_modifier_bur_rich_soil_of_burgundy: "Foster Agriculture"
  STATIC_MODIFIER_DESC_modifier_bur_rich_soil_of_burgundy: "The lands of $BUR$ are well-suited to growing plants and herding animals. Grapes are particularly apt for local growing conditions. With skilled cultivation, it should be easy to foster an agricultural industry."
  STATIC_MODIFIER_NAME_modifier_men_of_letters_advance: "Men of Letters"
  STATIC_MODIFIER_DESC_modifier_men_of_letters_advance: "It is no secret that other nations envy our literary accomplishments and enlightened past. They seek to hire tutors from our court, eager to sink their claws into the knowledge that gave rise to powerful empires and carved the cultural landscape of the entire continent. It is through these men of letters that our neighbors will come to fall in love with our history and become educated in our ways."
  STATIC_MODIFIER_NAME_modifier_byz_shield_of_the_west: "Shield of the West"
  STATIC_MODIFIER_DESC_modifier_byz_shield_of_the_west: "We stand between $europe$ and a sea of heathens, a shield against foreign threats. Our sword will forever be raised against those who seek to eradicate our faith, ready to strike against any who disrespect our traditions."
  STATIC_MODIFIER_NAME_modifier_byz_court_of_languages: "Court of Languages"
  STATIC_MODIFIER_DESC_modifier_byz_court_of_languages: "The court of $constantinople$ attracts diplomats and dignitaries from every corner of the known world. As a result, we ensure all languages receive equal respect and accommodation — a practical necessity for an empire at the crossroads of civilizations."
  STATIC_MODIFIER_NAME_modifier_byz_poikilia: "Poikilia"
  STATIC_MODIFIER_DESC_modifier_byz_poikilia: "Byzantine culture has taken $europe$ by storm, particularly #italic poikilia#! — our unique aesthetic. Emphasizing visual variety and a dizzying array of vibrant hues, poikilia creates a symphony of colors and elements in our art and architecture alike."
  STATIC_MODIFIER_NAME_modifier_expand_varangian_guard_advance: "Expand the Varangian Guard"
  STATIC_MODIFIER_DESC_modifier_expand_varangian_guard_advance: "The Varangians have served our country for centuries with distinguished honor and unwavering faith. By expanding their ranks, we will further secure the stability and protection of $BYZ$."
  STATIC_MODIFIER_NAME_modifier_byz_crossroads_of_continents: "Intercontinental Crossroads"
  STATIC_MODIFIER_DESC_modifier_byz_crossroads_of_continents: "$BYZ$ is located between $europe$ and $asia$, making it in many ways the connection between East and West. Our advantageous position is highly lucrative, and has also allowed us to significantly expand our maritime influence."
  STATIC_MODIFIER_NAME_modifier_byz_reaffirm_synod_powers: "Reformed Synod Proceedings"
  STATIC_MODIFIER_DESC_modifier_byz_reaffirm_synod_powers: "Bureaucracy is a nightmarish endeavor for a country our size. To better refine the religious proceedings required every time we call the $orthodox_synod$, we will cut down on the red tape, and revisit the associated legislation."
  STATIC_MODIFIER_NAME_modifier_byz_byzantine_inquisition: "$BYZ_ADJ$ Inquisition"
  STATIC_MODIFIER_DESC_modifier_byz_byzantine_inquisition: "$europe$ is engulfed in religious turmoil. We must be prepared to rip up noxious weeds of heresy that appear in the garden of our Empire, lest it become overgrown with heathens. Our pious defense against heretic incursion will prevent us from sinking into instability."
  STATIC_MODIFIER_NAME_modifier_byz_autokratoria_rhomaion: "Autokratoría Rhōmaíōn"
  STATIC_MODIFIER_DESC_modifier_byz_autokratoria_rhomaion: "Our great nation is the undisputed heir to the splendor and prestige of Rome, and reclaiming that long-lost territory is our primary motivation."
  STATIC_MODIFIER_NAME_modifier_byz_modernized_strategikon: "Modernized Stratēgikon"
  STATIC_MODIFIER_DESC_modifier_byz_modernized_strategikon: "The #italic Strategikon#! — the ancient manual of cavalry tactics, logistics, and battlefield doctrine — has served us well in times of war. However, as war changes, so must we. Our tactics and regiments have adapted to modern combat, employing weapons of such destruction that Maurice himself could never have anticipated their devastation."
  STATIC_MODIFIER_NAME_modifier_byz_ancient_greek_studies: "Ancient $greek_culture$ Studies"
  STATIC_MODIFIER_DESC_modifier_byz_ancient_greek_studies: "The rediscovery and revival of ancient $greek_culture$ arts has provided us with a wonderful opportunity to better educate the masses and to preserve our lofty scientific and cultural ideals. We shall make a diligent study of the wisdom of our ancestors."
  STATIC_MODIFIER_NAME_modifier_byz_the_new_imperial_army: "The New Imperial Army"
  STATIC_MODIFIER_DESC_modifier_byz_the_new_imperial_army: "Our army has lagged behind others in $europe$ for far too long. By enacting sweeping military reform and expanding our conscription efforts, we hope to build a modern army befitting the resurgent and resplendent phoenix that symbolizes our empire."
  STATIC_MODIFIER_NAME_modifier_cas_castilian_navy: "$CAS_ADJ$ Navy"
  STATIC_MODIFIER_DESC_modifier_cas_castilian_navy: "Situated as we are on a peninsula, surrounded by sea on three out of four sides, and with the valuable $strait_of_gibraltar$ bitterly fought over by different powers, dominating the seas has become a matter of life and death. From our hundreds of kilometers of coastline, our ancestors started taming the waves, evolving our nation into a fearless naval power."
  STATIC_MODIFIER_NAME_modifier_cas_cronicas_reales: "Crónicas Reales"
  STATIC_MODIFIER_DESC_modifier_cas_cronicas_reales: "By compiling the chronicles written by previous rulers, we are able to create a compendium that details every past event in our realm and the origins of all our rulers. This knowledge will help us not only to create better cultural foundations, but will also help present and future rulers to correctly assess present events through comparisons to past ones."
  STATIC_MODIFIER_NAME_modifier_cas_masters_of_the_orders: "Masters of the Orders"
  STATIC_MODIFIER_DESC_modifier_cas_masters_of_the_orders: "As the Reconquista is no longer our main focus, we can no longer justify the independence of Holy Orders. By having our ruler assume the position of Master in every Order, they will not only gain significant power, but they will also have access to the military knowledge of these crusaders."
  STATIC_MODIFIER_NAME_modifier_cas_new_world: "The New World"
  STATIC_MODIFIER_DESC_modifier_cas_new_world: "Newly-discovered lands can be claimed and settled by enterprising colonists, and will send valuable trade goods back to our realm. We will send a few loyal colonists to the New World, have them stake their claims and find ways to harness the treasures of nature, and thereby form the backbone of our colonial endeavors."
  STATIC_MODIFIER_NAME_modifier_cas_reform_of_millones: "Reform of the Millions"
  STATIC_MODIFIER_DESC_modifier_cas_reform_of_millones: "With the approval of the Reform of the #italic Millones#!, we might be able to tax our populace more efficiently. This will be an indirect extraction of revenue, done through a levy on food products."
  STATIC_MODIFIER_NAME_modifier_cas_marine_infantry: "$CAS_ADJ$ Marine Infantry"
  STATIC_MODIFIER_DESC_modifier_cas_marine_infantry: "With a strong navy comes the need for crew members adept at combat in any situation, including having to fight outside their vessels. In order to overcome this challenge, we will regulate our marine infantry so they become a powerful weapon no matter where they fight."
  STATIC_MODIFIER_NAME_modifier_cas_pasos: "$CAS_ADJ$ Pasos"
  STATIC_MODIFIER_DESC_modifier_cas_pasos: "While the #italic Pasos#! of the Holy Week are an old tradition in $CAS$, the sculpted artworks that accompany them have recently reached a stunning new peak. Artists such as Juan de Juni and Gregorio Fernández have started down the path of making $CAS_ADJ$ #italic Pasos#! the most impressive on the Peninsula."
  STATIC_MODIFIER_NAME_modifier_cas_real_academia_espanola: "Real Academia Española"
  STATIC_MODIFIER_DESC_modifier_cas_real_academia_espanola: "As our language evolves and spreads across the world, the need to regulate and preserve it becomes obvious. To preserve the essential character and defining traits of our mother tongue, the #italic Real Academia Española#! will be established to set standards for how to properly speak our language."
  STATIC_MODIFIER_NAME_modifier_cas_canal_de_castilla: "Canal de Castilla"
  STATIC_MODIFIER_DESC_modifier_cas_canal_de_castilla: "Inspired by other water systems across $europe$, which are used for both commercial purposes and irrigation, the #italic Canal de Castilla#! will bring water from the mountains in the north of the #italic Meseta#! and irrigate the cereal fields of Old Castile. This feat of engineering will increase our yield, create a surplus with which we can trade, and be the way to transport it for export."
  STATIC_MODIFIER_NAME_modifier_cas_royal_factories: "Royal Factories"
  STATIC_MODIFIER_DESC_modifier_cas_royal_factories: "To combat the export of raw materials instead of more valuable manufactured goods, we will develop a system of government-backed factories that will industrialize our nation. More robust domestic manufacturing will lead to a stronger national economy."
  STATIC_MODIFIER_NAME_modifier_chg_the_mountain_khanate: "The Mountain Khanate"
  STATIC_MODIFIER_DESC_modifier_chg_the_mountain_khanate: "We lie sheltered between $balkhash_lake$ and the Tiānshān Mountains. It is a harsh and unforgiving land, one which our people know how to use as a weapon against would-be invaders."
  STATIC_MODIFIER_NAME_modifier_chg_border_wars: "Ceaseless Border Wars"
  STATIC_MODIFIER_DESC_modifier_chg_border_wars: "Surrounded by people that would oppose us, we face a constant struggle to maintain our borders. Our ever-vigilant soldiers have plentiful opportunities to hone their skills in battle, giving birth to a combat-hardened warrior people ready to reclaim the legacy of the Great $rank_kingdom_horde_ruler_suffix_male$."
  STATIC_MODIFIER_NAME_modifier_chg_sons_of_chagatai: "Sons of Chagatai $rank_kingdom_horde_ruler_suffix_male$"
  STATIC_MODIFIER_DESC_modifier_chg_sons_of_chagatai: "We can trace our line back to Chagatai $rank_kingdom_horde_ruler_suffix_male$, the second son of $genghis_khan_name_no_tooltip$, who once ruled these lands and established a powerful Mongolian successor state. Although a long time has passed since then, we can still claim considerable legitimacy by appealing to the legacy of our fierce ancestor."
  STATIC_MODIFIER_NAME_modifier_chg_tradition_of_conquest: "Tradition of Conquest"
  STATIC_MODIFIER_DESC_modifier_chg_tradition_of_conquest: "Conquering people can be a tricky business; not everyone is ready to accept our enlightened government. Still, we have discovered that there are easier ways to bring people into our empire than building a mountain of skulls — something that our ancestors never learned."
  STATIC_MODIFIER_NAME_modifier_chg_scheming_court: "Scheming Court"
  STATIC_MODIFIER_DESC_modifier_chg_scheming_court: "The constant power struggles between the various princes, nobles, cities, and tribes in the Chagatai Khanate have produced a nation of highly adept schemers. If we can put aside our quarrels and channel this energy towards outsmarting our enemies, it would be a great boon to our people."
  STATIC_MODIFIER_NAME_modifier_chg_glory_of_conquest: "The Glory of Conquest"
  STATIC_MODIFIER_DESC_modifier_chg_glory_of_conquest: "Let it be known that boy cannot be a man unless he has ridden first with our invincible host, that he can take no wife until he has taken another man's wife, that he is not worthy of a hut until he has burnt down someone else's. Let service in our armies be the only route to manhood."
  STATIC_MODIFIER_NAME_modifier_chg_unrelenting_horde: "Unrelenting Horde"
  STATIC_MODIFIER_DESC_modifier_chg_unrelenting_horde: "Our armies shall march like the great hordes of $genghis_khan_name_no_tooltip$. Our troops shall trample our enemies under our hooves like blades of grass of our native steppes. All shall fear the power of our armies!"
  STATIC_MODIFIER_NAME_modifier_extensive_canal_works: "Extensive Canal Works"
  STATIC_MODIFIER_DESC_modifier_extensive_canal_works: "The many rivers that cross our domain have tremendous economic potential. By constructing extensive canal networks, we can connect waterways to inland settlements, making transportation easier while also providing a reliable water supply to our people."
  STATIC_MODIFIER_NAME_modifier_tributary_system: "Tributary System"
  STATIC_MODIFIER_DESC_modifier_tributary_system: "A system of subjugated local warlords and other rulers who send us regular gifts of allegiance in recognition of our overlordship. To refine and centralize this system would help us tighten our grip and squeeze more out of them."
  STATIC_MODIFIER_NAME_modifier_zhongshu_sheng: "Zhōngshū Shěng"
  STATIC_MODIFIER_DESC_modifier_zhongshu_sheng: "One of the most vital branches of the #italic Three Departments and Six Ministries#!, the central secretariat is responsible for the drafting and codification of many Imperial reforms and decrees."
  STATIC_MODIFIER_NAME_modifier_lijia_system: "Lǐ Jiǎ System"
  STATIC_MODIFIER_DESC_modifier_lijia_system: "Under the #italic Lǐ Jiǎ#! system, we are able to exercise control over our borderlands through the allocation of settled armies. By granting land and agricultural rights to our stationed troops, our borders will be safer and our authority shall be affirmed."
  STATIC_MODIFIER_NAME_modifier_yulin_tuce: "Yúlín Túcè"
  STATIC_MODIFIER_DESC_modifier_yulin_tuce: "Tax evasion is a timeless problem that even plagued our ancestors, but we may have found a solution: By compiling registers for districts and provinces, we will keep better track of the taxes owed to the central government by every plot. This taxation is largely determined based on the grain yield of every plot that undergoes survey."
  STATIC_MODIFIER_NAME_modifier_weisuo_system: "Wèi Suǒ"
  STATIC_MODIFIER_DESC_modifier_weisuo_system: "Many would-be conquerors eye our lands with covetous intent. If we are to defend our territory, we must set up a garrison system, aimed at rapidly responding to hostile invasions. Through the recruitment of local troops, our defensive prowess will be supplemented through supplies and more efficient logistics."
  STATIC_MODIFIER_NAME_modifier_grand_coordinators: "Grand Coordinators"
  STATIC_MODIFIER_DESC_modifier_grand_coordinators: "Maintaining control over our territories, policymaking, and military operations is vital for the continuation of our dynasty. Through the creation of Grand Coordinators, a body of high-ranking officials who can coordinate governance across our vast empire, we will succeed in cementing our position through effective stabilization of internal and external matters."
  STATIC_MODIFIER_NAME_modifier_the_censorate: "The Censorate"
  STATIC_MODIFIER_DESC_modifier_the_censorate: "Parallel to other institutes within our administration, this branch of our government is in charge of preventing corruption. The censors are tasked with keeping palatial intrigues and malfeasance in check, often seen as the eyes and ears of the Emperor."
  STATIC_MODIFIER_NAME_modifier_the_tea_trade: "The $tea$ Trade"
  STATIC_MODIFIER_DESC_modifier_the_tea_trade: "A staple beverage of our society, $tea$ has come to dominate social gatherings, becoming the choice drink of many. This will undoubtedly lead to not only new varieties being cultivated, but a production boom as well."
  STATIC_MODIFIER_NAME_modifier_tu_bing: "Tǔ Bīng"
  STATIC_MODIFIER_DESC_modifier_tu_bing: "In our quest to shore up our border defenses, it has become apparent that we must create a system of recruitment centered around local soldiers and stalwarts. These fighters will be a valuable addition to our military capabilities, and shall be kept separate from the #italic Wèi Suǒ#! system."
  STATIC_MODIFIER_NAME_modifier_tusi_titles: "Tǔsī Titles"
  STATIC_MODIFIER_DESC_modifier_tusi_titles: "Titles granted to warlords and local strongmen, these administrative positions are used to quell unrest and keep the rural populace under central control."
  STATIC_MODIFIER_NAME_modifier_salt_monopoly: "Restore the $salt$ Monopoly"
  STATIC_MODIFIER_DESC_modifier_salt_monopoly: "The $salt$ monopoly was once our most important revenue source, but previous Emperors abolished it to encourage free trade. It is time to return the $salt$ trade to state control."
  STATIC_MODIFIER_NAME_modifier_reform_the_grand_secretariat: "Reform the Grand Secretariat"
  STATIC_MODIFIER_DESC_modifier_reform_the_grand_secretariat: "Considered the #italic de facto#! highest institution in our nation, the #italic Grand Secretariat#! has served our rulers for centuries. Wielding immense influence over administrative affairs, this body of cabinet ministers must undergo a reform to further increase its effectiveness."
  STATIC_MODIFIER_NAME_modifier_grand_military_parades: "Grand Military Parades"
  STATIC_MODIFIER_DESC_modifier_grand_military_parades: "Our illustrious military history of our people is a great source of inspiration and pride for our people. By conducting elaborate parades to showcase our armies, we will decisively demonstrate our martial experience and unparalleled strength."
  STATIC_MODIFIER_NAME_modifier_silver_standard: "Silver Standard"
  STATIC_MODIFIER_DESC_modifier_silver_standard: "By turning most obligations towards the central government - from poll taxes to the labor obligations of the peasants or the tributes of local officials - into a single silver payment, the amount of which is based on the population and cultivated land in each prefecture, tax collection will become easier and our income will increase."
  STATIC_MODIFIER_NAME_modifier_nine_garrisons_of_the_great_wall: "Nine Garrisons of the Great Wall"
  STATIC_MODIFIER_DESC_modifier_nine_garrisons_of_the_great_wall: "In order to defend against the vicious barbarian onslaught, we must do more than simply repair the Great Wall. The Nine Garrisons are militarized garrison towns along the Wall that will not only help to defend the most important passes, but also improve the overall logistical situation on our northern border."
  STATIC_MODIFIER_NAME_modifier_woodblock_printing: "Woodblock Printing"
  STATIC_MODIFIER_DESC_modifier_woodblock_printing: "The production of elegant illustrations, artworks, and books using this printing method has captivated our people's attention, and our master printers constantly strive to perfect their techniques. Woodblock printing has become part of our culture and, with recent improvements to and expansion of our literary production, will further elevate our prestige."
  STATIC_MODIFIER_NAME_modifier_green_standard_army: "Green Standard Army"
  STATIC_MODIFIER_DESC_modifier_green_standard_army: "The Green Standard Army, a military force mainly composed of ethnic Hàn soldiers, coexists with our Eight Banner armies. Originally formed by surrendered troops and recruited on a voluntary, long-term basis, they attract individuals from socially disadvantaged backgrounds. Used as a police force post-consolidation, they will play a crucial role in local military governance, while Bannermen will be reserved for emergencies and sustained resistance."
  STATIC_MODIFIER_NAME_modifier_great_tax_reform: "Great Tax Reform"
  STATIC_MODIFIER_DESC_modifier_great_tax_reform: "Our wealthy nation has ample coin and bounteous, fertile fields, but all this abundance requires comprehensive taxation. The Great Tax Reform enables more efficient revenue management, which should guarantee a healthier budget for our realm."
  STATIC_MODIFIER_NAME_modifier_junji_chu: "Jūnjī Chù"
  STATIC_MODIFIER_DESC_modifier_junji_chu: "Also known as the Grand Council, the #italic Jūnjī Chù#! is tasked with overseeing military affairs. As the most important privy council, it has come to overshadow the Grand Secretariat that held sway over previous dynasties. Despite its crucial role, this council will retain an informal nature within the inner court, with its members holding other official roles besides their councilorship."
  STATIC_MODIFIER_NAME_modifier_jingdezhen_porcelain: "Jǐngdézhèn $porcelain$"
  STATIC_MODIFIER_DESC_modifier_jingdezhen_porcelain: "Our $porcelain$ industry is emblematic of the prosperity and tradition of artisanal excellence alive in our Empire. By perfecting the already-superior $porcelain$ production techniques of Jǐngdézhèn, we will spread our cultural influence far and wide."
  STATIC_MODIFIER_NAME_modifier_sanxitang: "Sānxītáng"
  STATIC_MODIFIER_DESC_modifier_sanxitang: "The Hall of Three Rarities is our most splendid repository of rare, valuable objects and works of art. Through the generous patronage of our ruler, it has flowered into a venue for academic discussions, lectures, and even cultural events, promoting intellectual exchange and scholarly pursuits."
  STATIC_MODIFIER_NAME_modifier_monuments_to_greatness: "Monuments of Greatness"
  STATIC_MODIFIER_DESC_modifier_monuments_to_greatness: "In our people's many millennia of existence on this planet, they have endured thousands of catastrophes through sheer tenacity. This innate steely strength has come to be recognized as a defining feature of our society. We showcase our resilience in the strength of our army and the divine beauty of our art."
  STATIC_MODIFIER_NAME_modifier_ten_great_campaigns: "Ten Grand Campaigns"
  STATIC_MODIFIER_DESC_modifier_ten_great_campaigns: "The Ten Great Campaigns are aimed at expanding our influence both inside and outside our borders. To achieve that, we will draft a huge army to crush any resistance that we might find in our way. We shall choke the life out of any rebellion before it has the chance to raise its head, and our glory will be eternal."
  STATIC_MODIFIER_NAME_modifier_cir_horsemen_of_the_steppe: "Skilled Horsemen"
  STATIC_MODIFIER_DESC_modifier_cir_horsemen_of_the_steppe: "Our position at the edge of the steppes has resulted in multiple mounted invasions of our homelands. If we want to ensure our independence, we will need to raise a great host ourselves, and expand our influence over the steppes, securing our heartland."
  STATIC_MODIFIER_NAME_modifier_cir_city_and_fortress: "Fortified Towns"
  STATIC_MODIFIER_DESC_modifier_cir_city_and_fortress: "Our settlements lie unprotected, and are easy prey to any invader. As these settlements grow, however, we can directly incorporate the hilly terrain into our defensive lines, enhancing their protection. If necessary, we can even create the elevated terrain required ourselves."
  STATIC_MODIFIER_NAME_modifier_cir_grand_prince_of_circassia: "Grand Princedom"
  STATIC_MODIFIER_DESC_modifier_cir_grand_prince_of_circassia: "To unify our people, we shall elect the greatest of our lords as the Grand Prince, who will serve as an inspiring leader for our troops."
  STATIC_MODIFIER_NAME_modifier_cir_multireligious_society: "Religious Coexistence"
  STATIC_MODIFIER_DESC_modifier_cir_multireligious_society: "Our lands are frequented by many $catholic_ADJ$, $muslim_ADJ$, and $orthodox_ADJ$ people, who frequently engage in trade with our population. We should foster a collective tolerance between all our subjects, to promote peace and stability."
  STATIC_MODIFIER_NAME_modifier_cri_slavers: "Slavers of the Steppe"
  STATIC_MODIFIER_DESC_modifier_cri_slavers: "There is a fortune to be made from the $slaves_goods$ trade; unwitting $christian_ADJ$ believers who fall into our grasp fetch a high price in $turkish_culture$, $AIA_ADJ$, and $ITA_ADJ$ markets."
  STATIC_MODIFIER_NAME_modifier_cri_steppe_commanders: "Steppe Commanders"
  STATIC_MODIFIER_DESC_modifier_cri_steppe_commanders: "$CRI_ADJ$ cavalry commanders have mastered the art of mobility in steppes warfare, using speed, flanking, and ambush to outmatch slower European armies."
  STATIC_MODIFIER_NAME_modifier_cri_free_cattle_grazing: "Free Cattle Grazing"
  STATIC_MODIFIER_DESC_modifier_cri_free_cattle_grazing: "We place no restrictions on pastoral farmers for the grazing of their great herds of horses and cattle. Herders are free to go about their business as they wish, able to traverse the steppe safely and trade freely."
  STATIC_MODIFIER_NAME_modifier_cri_devshirme_of_the_steppes: "The Devshirme of the Steppes"
  STATIC_MODIFIER_DESC_modifier_cri_devshirme_of_the_steppes: "$CRI_ADJ$ elites mimicked aspects of $TUR_ADJ$ military-administrative practices, blending $turkic_group$ and $muslim_ADJ$ systems to manage manpower and military efficiency."
  STATIC_MODIFIER_NAME_modifier_cro_influx_of_foreign_knowledge: "Influx of Foreign Knowledge"
  STATIC_MODIFIER_DESC_modifier_cro_influx_of_foreign_knowledge: "The coastal cities have become vibrant centers of the Renaissance, where scholars and artists blend classical Italian influences with a distinct Slavic sensibility. This intellectual movement produces great thinkers who contribute to European science, poetry, and philosophy, proving that Croatian culture is at the forefront of the modern era. The patronage of wealthy merchant families allows for the construction of magnificent cathedrals and palaces, turning our coast into a beacon of high culture that attracts the finest minds of the age."
  STATIC_MODIFIER_NAME_modifier_cro_legacy_of_the_trpimirovic: "Legacy of the Trpimirović"
  STATIC_MODIFIER_DESC_modifier_cro_legacy_of_the_trpimirovic: "We look back to the glorious age of our native kings, such as Tomislav and Zvonimir, to inspire a sense of independent destiny and national pride. By tracing our lineage and institutions back to these sovereign rulers, we bolster our diplomatic standing among the courts of Europe and assert our right to a crown that is older than many of our neighbors'. This historical prestige commands respect from the Holy See and serves as a powerful unifying mythos that rallies the disparate regions of the kingdom under a single, storied banner of Romanic-Slavic royalty."
  STATIC_MODIFIER_NAME_modifier_cro_the_banovac_silver_denar: "The Banovac Silver Denar"
  STATIC_MODIFIER_DESC_modifier_cro_the_banovac_silver_denar: "We have asserted the right of #italic Monetaria#!, establishing a sovereign mint to produce the Banovac silver denar. By maintaining a higher silver content than neighboring currencies, our coin has become the primary medium of exchange in the northern Adriatic and the Drava basin. This fiscal independence allows us to fund its administration without relying on external subsidies, turning our court into a regional financial hub that attracts Ragusan and Venetian capital."
  STATIC_MODIFIER_NAME_modifier_svn_the_slavonian_sabor: "The Slavonian Sabor"
  STATIC_MODIFIER_DESC_modifier_svn_the_slavonian_sabor: "Our people are governed under the scrutiny of the Slavonian #italic Sabor#!. This legislative independence allows the Slavonian nobility to address the specific needs of the inter-river plains, such as drainage projects and the regulation of grain markets. By having a dedicated assembly, the Banate can react quickly to regional crises and negotiate directly for tax exemptions, ensuring that Slavonia's agricultural wealth is used primarily for Slavonia's own defense and improvement."
  STATIC_MODIFIER_NAME_modifier_cro_trade_posts: "The Marulić Epic Tradition"
  STATIC_MODIFIER_DESC_modifier_cro_trade_posts: "The cultural soul of Croatia has reached a literary peak with works like #italic Judita#! by Marko Marulić, the 'Father of Croatian Literature'. By using biblical allegory to describe the contemporary defense of our lands, Marulić has provided the nation with a high-culture blueprint for survival. This literature creates a bridge between the Renaissance urbanite and the frontier soldier, unifying all classes under a shared heroic mission and ensuring the preservation of the Croatian tongue as a language of high art and theological debate."
  STATIC_MODIFIER_NAME_modifier_cro_antemurale_christianitatis: "Antemurale Christianitatis"
  STATIC_MODIFIER_DESC_modifier_cro_antemurale_christianitatis: "Our cultural identity has been forged in the fire of the 'Century of Martyrs'. We have embraced the role of the #italic Antemurale Christianitatis#! (Shield of Christendom), transforming our military struggle into a sacred religious mission. This mythos instills a deep, unshakable sense of historical duty in the population, viewing the defense of our nation as the defense of civilization itself. This 'Heroic Spirit' ensures that the national fire remains alive even in our darkest hours."
  STATIC_MODIFIER_NAME_modifier_cro_the_croatian_press: "The Croatian Press"
  STATIC_MODIFIER_DESC_modifier_cro_the_croatian_press: "We have established one of the earliest and most daring printing houses in the Slavic world. By moving our technological heart to the 'impassable' valley of Kosinj, we ensure that the production of our sacred Glagolitic texts remains shielded from the maritime raids and border skirmishes that plague the littoral. This press is not merely a tool for literacy; it is a laboratory of cultural survival where we forge the first printed missals in our native tongue. By standardizing our ancient script through the modern press, we provide every parish in the Kingdom with a unified, incorruptible source of our laws and liturgy. This ensures that the Croatian identity remains intellectually fortified and spiritually independent, as it reaches the hands of every shepherd and noble, anchoring the soul of the nation in an unshakeable, home-grown tradition."
  STATIC_MODIFIER_NAME_modifier_svn_the_alluvial_grant_lands: "The Alluvial Land Grants"
  STATIC_MODIFIER_DESC_modifier_svn_the_alluvial_grant_lands: "The fertile silt between the Sava and Drava is our greatest asset. By granting tax-free plots in exchange for clearing the heavy riverine brush, we are turning the flooded plains into the primary grain basin of the North. This agricultural intensification provides the logistics needed to support a massive standing army, ensuring the Kingdom can feed its defenders even during the most grueling winter blockades."
  STATIC_MODIFIER_NAME_modifier_croatian_the_peasants_revolts: "The Peasants' Revolts"
  STATIC_MODIFIER_DESC_modifier_croatian_the_peasants_revolts: "The crushing weight of feudal obligations in the face of constant war caused peasant revolts in the past. The peasantry rose not against us, but against the 'unjust' nobility who failed to protect them while demanding excessive tithes. Though these revolts have been usually brutally suppressed, they have left a lasting legacy of social consciousness and have transformed the relationship between the classes, forcing the state to eventually moderate its tax demands to maintain internal stability."
  STATIC_MODIFIER_NAME_modifier_cro_reliance_on_adriatic: "The Lessons from the Uskoks"
  STATIC_MODIFIER_DESC_modifier_cro_reliance_on_adriatic: "To counter the advance of our enemies, we have transformed our coastal fortresses into a sanctuary for the Uskoks — refugee warriors who wage a permanent war. These light-infantry units use small, fast boats to conduct lightning raids against enemy supply lines, surviving in the rugged karst where regular armies cannot follow. This policy turns our coast into a lethal 'no-man's-land' for our enemies, providing us with a cheap and fiercely motivated frontier guard that requires no support from the central treasury and keeps our enemies constantly on the defensive."
  STATIC_MODIFIER_NAME_modifier_cro_the_jesuit_academy: "The Jesuit Academy"
  STATIC_MODIFIER_DESC_modifier_cro_the_jesuit_academy: "Founded by the invited Jesuit Order, this academy has evolved from a local gymnasium into the intellectual heart of our nation. By establishing a rigorous curriculum of Aristotelian philosophy, mathematics, and rhetoric, the academy has created a home-grown elite of 'Enlightened Croats' who are as comfortable in the salons of Vienna as they are in the Sabor. This institutional modernization ensures that our bureaucracy is led by a technocratic class capable of navigating the complex legal and scientific shifts of our century."
  STATIC_MODIFIER_NAME_modifier_svn_the_oak_staple_rights: "The Oak Staple Rights"
  STATIC_MODIFIER_DESC_modifier_svn_the_oak_staple_rights: "Slavonian Oak is now the most sought-after timber in the Mediterranean for its iron-like resistance to water rot. By establishing a royal monopoly on the export of mature oak to the Venetian shipyards, we have secured a strategic economic lever over the maritime republics. This trade does not just fill our coffers; it ensures that the very foundations of Venice's palaces and the hulls of their galleys are physically composed of Croatian soil, giving us a unique diplomatic influence over the 'Queen of the Adriatic'."
  STATIC_MODIFIER_NAME_modifier_croatian_the_cravats: "The Cravats"
  STATIC_MODIFIER_DESC_modifier_croatian_the_cravats: "During these convulsed years, the world has taken notice of the distinct, elite light-cavalry regiments from the Croatian Military. Beyond their legendary mobility and ferocity, these horsemen have introduced a unique sartorial innovation: a functional, knotted cloth worn around the neck to secure their shirt collars and provide protection from the chafing of breastplates. This #italic cravat#! — a name derived from the French mispronunciation of #italic Croate#! — has rapidly transcended the battlefield to become the height of Parisian and European fashion. By transforming a rugged military necessity into a hallmark of fashionable dressing, our culture has achieved a subtle but permanent victory. This sartorial dominance ensures that the image of the Croatian officer is one of both tactical lethality and unparalleled gallantry."
  STATIC_MODIFIER_NAME_modifier_cro_baroque_pietas: "The Baroque Pietas"
  STATIC_MODIFIER_DESC_modifier_cro_baroque_pietas: "Our culture has embraced a dramatic and intense Baroque Catholicism, characterized by massive religious processions and the construction of grand, ornate churches. This 'Visual Piety' serves as a powerful unifying force, bridging the gap between the urban nobility and the rural peasantry through shared ritual and spectacle. This intense religious identity acts as a cultural shield against both Protestant and Eastern influences, ensuring that the Croatian soul remains firmly anchored in the Catholic-Mediterranean world, even while defending the central European plains."
  STATIC_MODIFIER_NAME_modifier_cro_the_national_garrison_system: "The National Garrison System"
  STATIC_MODIFIER_DESC_modifier_cro_the_national_garrison_system: "To combat the sudden amphibious raids of enemy fleets or border transgressions, we will establish a sophisticated visual system using smoke and fire signals atop the highest Velebit crags. This 'Mountain Watch' will allow our forts to communicate across the jagged terrain in minutes, bypassing the slow mountain trails. By coordinating these signals with the inland garrisons, we will be able to mobilize our nation and reinforce our walls before any action happens. This high-altitude surveillance will turn the impassable peaks into a centralized command tower, ensuring that no enemy can approach without our immediate knowledge."
  STATIC_MODIFIER_NAME_modifier_svn_swamp_drainage_projects: "Swamp Drainage Projects"
  STATIC_MODIFIER_DESC_modifier_svn_swamp_drainage_projects: "By investing in large-scale hydraulic engineering projects to drain the vast marshlands of the riverine areas, we unlock thousands of acres of new, fertile farmland. These reclaimed lands will be soon settled, increasing the population density and tax base of the province while eliminating the vectors for disease. This transformation of the landscape not only strengthens our economy but also creates a more navigable and defensible terrain, removing the natural barriers that once hindered our own internal communications."
  STATIC_MODIFIER_NAME_modifier_croatian_the_illyrian_movement: "The Illyrian Movement"
  STATIC_MODIFIER_DESC_modifier_croatian_the_illyrian_movement: "Over the last few years, our nation has witnessed the explosion of the #italic Illyrian Movement#!, a cultural and political revolution that seeks to unify all Croats under a single banner. This movement effectively aims to unify the disparate regions of our nation into a single, cohesive political and cultural national body. By standardizing the grammar and orthography, we will transform our medieval nation into a modern one, ensuring that the Croatian name, language, and statehood will never again be forgotten or suppressed."
  STATIC_MODIFIER_NAME_modifier_cro_the_royal_council_of_croatia: "The Royal Council of Croatia"
  STATIC_MODIFIER_DESC_modifier_cro_the_royal_council_of_croatia: "We have established the #italic Consilium Regium#! in our capital, creating a dedicated executive government for the Croatian Nation. This body will act as a proto-ministry, handling the economy, education, and internal security of the #italic Triune Kingdom#!. This era of 'Government by Council' will foster a professional class of Croatian civil servants who view the state as a rational, modern machine rather than a collection of feudal privileges. The experience gained in these halls of power will provide the administrative expertise necessary for the Croatian people to navigate the transition from a medieval kingdom to a modern European nation-state."
  STATIC_MODIFIER_NAME_modifier_cro_uniting_the_coast_and_the_inner_lands: "Uniting the Coast and the Inner Lands"
  STATIC_MODIFIER_DESC_modifier_cro_uniting_the_coast_and_the_inner_lands: "To break the isolation of our coast, we will oversee the monumental construction of numerous roads, linking the inland to our ports. This engineered highway will be carved through the limestone heart of the Velebit mountains, featuring advanced stone bridges and serpentine curves to accommodate heavy wagons. The road will transform our littoral from a desolate frontier into a vital economic artery, allowing the timber and grain of the interior to reach international markets. By physically binding the mountain hinterland to the Adriatic, we will complete the territorial integration of the nation, fostering a new age of trans-Velebit commerce."
  STATIC_MODIFIER_NAME_modifier_svn_the_slavonian_grenadier_regiments: "The Slavonian Grenadier Regiments"
  STATIC_MODIFIER_DESC_modifier_svn_the_slavonian_grenadier_regiments: "Our infantry units are reorganized into elite grenadier regiments that are renowned across the continent for their physical stature, rigorous discipline, and unwavering bravery under fire. These specialized shock troops are trained to lead the charge into the heaviest enemy fire, using their grenades and bayonets to break the lines of even the most formidable opponents. The presence of these 'Slavonian Giants' on the battlefield serves as a powerful psychological weapon, boosting the morale of our own troops while striking terror into the hearts of those who face them."
  STATIC_MODIFIER_NAME_modifier_cth_mercenary_army: "Army of Mercenaries"
  STATIC_MODIFIER_DESC_modifier_cth_mercenary_army: "Our ancestral empire did not have a massive population, so for centuries, we relied on mercenaries during war. Since the reformation of $CTH$ we have continued that tradition to save our population from dangers of the battlefield."
  STATIC_MODIFIER_NAME_modifier_cth_cothons: "Cothon"
  STATIC_MODIFIER_DESC_modifier_cth_cothons: "The ancient Carthaginian #italic cothon#! was a technological marvel that helped facilitate efficient ship construction. Now, this great legacy will serve as a blueprint for our whole country. Studying ancient shipbuilding techniques allows us to excel in this area once again, and the $CTH_ADJ$ navy will soon dominate the Mediterranean."
  STATIC_MODIFIER_NAME_modifier_cth_phoenician_sailors: "Phoenician Sailors"
  STATIC_MODIFIER_DESC_modifier_cth_phoenician_sailors: "After restoring our ancient kingdom, we started reaching out to our Phoenician brothers in Libya. As a result, we have a steady influx of volunteers that want to join the restoration of the ancient Phoenician kingdom of $CTH$. It seems we can maintain a much bigger navy now..."
  STATIC_MODIFIER_NAME_modifier_cth_legacy_of_hannon: "Legacy of Hannon"
  STATIC_MODIFIER_DESC_modifier_cth_legacy_of_hannon: "Hannon the Sailor was a legendary ancient explorer who ventured far into the south of the African coast. We shall follow his example, and mount exploration voyages in order to restore our lost trading empire. This time, we will push our expeditions even further, seeking out fresh trading opportunities across the entire world."
  STATIC_MODIFIER_NAME_modifier_cth_beyond_the_pillars: "Beyond the Pillars"
  STATIC_MODIFIER_DESC_modifier_cth_beyond_the_pillars: "It is time for our trade factories to reach beyond the mythical pillars of Hercules. Combining ancient colonization knowledge with modern discoveries allows us to settle more efficiently than other younger nations, those who are fairly new to this experience. $CTH_ADJ$ colonies shall soon be found all around the world!"
  STATIC_MODIFIER_NAME_modifier_cth_wine_traders: "Punic $wine$ Trade"
  STATIC_MODIFIER_DESC_modifier_cth_wine_traders: "In ancient times, we created a $wine$ trading pipeline by producing large amounts of low-quality $wine$ to trade, and importing the good stuff for ourselves. Building on that tradition, we are looking into expanding our $wine$ production capabilities — we #italic will#! dominate the $wine$ trade in the Mediterranean!"
  STATIC_MODIFIER_NAME_modifier_cth_punic_global_trade: "Punic Global Trade"
  STATIC_MODIFIER_DESC_modifier_cth_punic_global_trade: "For centuries, our nation dominated the Mediterranean trade. Now, with all the new discoveries made in the centuries since, we stand poised to dominate the globe. Soon, there will be a $CTH_ADJ$ trading vessel in every port in this world!"
  STATIC_MODIFIER_NAME_modifier_cth_sufet_rule: "Rule of Šūfeṭ"
  STATIC_MODIFIER_DESC_modifier_cth_sufet_rule: "Our ancient kingdom was headed by an elected head of state called the #italic Šūfeṭ#!. In this new modern age, we shall reorganize our government, taking experience from antiquity and combining it with modern theories to create a powerful Republican system, one that will outshine every Republic created up to this date!"
  STATIC_MODIFIER_NAME_modifier_dah_migan_mehu: "Migan and Mehu"
  STATIC_MODIFIER_DESC_modifier_dah_migan_mehu: "The Migan and the Mehu are the ruler's two chief ministers. One oversees the north, the other the south; one oversees justice, the other commerce. Together, they bring stability and prosperity."
  STATIC_MODIFIER_NAME_modifier_dah_slave_hunts: "Slave Hunts"
  STATIC_MODIFIER_DESC_modifier_dah_slave_hunts: "While raiding the surrounding territories, we obtain slaves who cannot only be employed economically or bartered to our neighbors, but who can serve in our armies. In this way, we will increase the number of fighters that can be called to arms."
  STATIC_MODIFIER_NAME_modifier_dah_lagredis: "Lagredis"
  STATIC_MODIFIER_DESC_modifier_dah_lagredis: "By secretly placing male courtiers disguised as royal wives in the harem, they will be able to act unseen as the king's eyes and ears, especially in matters of palace intrigue."
  STATIC_MODIFIER_NAME_modifier_dah_yovogan: "The Yovogan"
  STATIC_MODIFIER_DESC_modifier_dah_yovogan: "As more and more foreigners are coming to our shores, we should establish a new office in our government to study and learn from their ways, so that we may benefit from this exchange of cultures."
  STATIC_MODIFIER_NAME_modifier_dah_dahomey_palaces: "Palaces of Abomey"
  STATIC_MODIFIER_DESC_modifier_dah_dahomey_palaces: "Building a sprawling palace complex in our capital would be an elegant, yet imposing demonstration of our power. Any who may consider taking up arms against us will surely be deterred by the sight of our sumptuous palaces."
  STATIC_MODIFIER_NAME_modifier_nghia_quan: "The Nghĩa Quân"
  STATIC_MODIFIER_DESC_modifier_nghia_quan: "Throughout our history, the #italic Nghĩa Quân#! — 'righteous militias' — have risen in defense of our land during times of great peril. Composed of farmers, scholars, and local patriots, they stood against foreign invaders and internal tyranny alike. Though irregular in nature, their valor and devotion to the country have made them a formidable force when mobilized."
  STATIC_MODIFIER_NAME_modifier_dan_rulers_of_the_north: "True Rulers of the North"
  STATIC_MODIFIER_DESC_modifier_dan_rulers_of_the_north: "The rulers of $DAN$ have claimed overlordship over the Nordic regions for centuries. Embellishing the legacy of Kings like Canute 'the Great' will grant us the internal and external legitimacy needed to support our assertions."
  STATIC_MODIFIER_NAME_modifier_dan_reliance_mercenaries: "Reliance on Mercenaries"
  STATIC_MODIFIER_DESC_modifier_dan_reliance_mercenaries: "$DAN$ cannot rely on a vast population to supply their armies. Therefore, we need to ensure that mercenary companies are willing to serve our state, while guaranteeing their loyalty with solid contracts."
  STATIC_MODIFIER_NAME_modifier_dan_rentekammer_advance: "Rentekammeret"
  STATIC_MODIFIER_DESC_modifier_dan_rentekammer_advance: "By establishing a separate department for our Treasury, the #italic Rentekammeret#!, we will have better control over our finances and be able to run the government more efficiently. With the documentation of all our financial records, we will be able to estimate our future expenditures more easily, stabilizing our finances."
  STATIC_MODIFIER_NAME_modifier_dan_royal_danish_navy: "$DAN_ADJ$ State Navy"
  STATIC_MODIFIER_DESC_modifier_dan_royal_danish_navy: "Our country is surrounded by water, and therefore vulnerable to domination by any power with a large enough fleet. To ensure this will never happen, we must fund a navy capable of protecting our coastline and projecting our power over the north of $europe$."
  STATIC_MODIFIER_NAME_modifier_dan_danish_orthodoxy: "Religious Uniformity"
  STATIC_MODIFIER_DESC_modifier_dan_danish_orthodoxy: "In the tumultuous religious landscape of $europe$, we must set $DAN$ on the path to righteousness, and remain true to the doctrines of our church."
  STATIC_MODIFIER_NAME_modifier_dan_expanded_dockyards: "The $kobenhavn$ Dockyard"
  STATIC_MODIFIER_DESC_modifier_dan_expanded_dockyards: "Our country has a long and proud history of shipbuilding. Our experienced shipwrights need a modern and spacious dock in which to construct a navy worthy of calling itself $DAN_ADJ$. The waters around $kobenhavn$ are the perfect place to construct such a dockyard."
  STATIC_MODIFIER_NAME_modifier_dan_danish_legislation: "$DAN_ADJ$ Legislation"
  STATIC_MODIFIER_DESC_modifier_dan_danish_legislation: "The regional laws of Jutland, Zealand and Scania formed the basis of our legal code for centuries. For the benefit of our realm, we should compile and unify these laws into a single comprehensive legal system, which will be known as the #italic Danske Lov#!."
  STATIC_MODIFIER_NAME_modifier_dan_danish_agriculture: "Agricultural Focus"
  STATIC_MODIFIER_DESC_modifier_dan_danish_agriculture: "While the $DAN_ADJ$ terrain is relatively poor in terms of rare materials available to exploit, they make up for it with agricultural abundance. We shall focus on optimizing our farming and food production, safeguarding our people against future periods of famine."
  STATIC_MODIFIER_NAME_modifier_dan_royal_life_guards: "Royal Life Guards"
  STATIC_MODIFIER_DESC_modifier_dan_royal_life_guards: "The Royal Life Guards are an elite $DAN_ADJ$ regiment that also serve as the ruler's personal guard and perform ceremonial duties."
  STATIC_MODIFIER_NAME_modifier_dan_scanian_regiment: "Scanian Regiment"
  STATIC_MODIFIER_DESC_modifier_dan_scanian_regiment: "The Scanian Regiment is a military unit composed of drafted peasants, established to reduce reliance on mercenary forces and build a more organized standing army under direct royal authority."
  STATIC_MODIFIER_NAME_modifier_dan_admiralty_college: "College of the Admiralty"
  STATIC_MODIFIER_DESC_modifier_dan_admiralty_college: "With the establishment of a centralized college to train our naval commanders, we will be able to produce skilled leaders familiar with our coastal waters. This will improve our marine defense strategy, and ultimately better safeguard $DAN_ADJ$ sovereignty."
  STATIC_MODIFIER_NAME_modifier_dan_trading_economy: "A Maritime Nation"
  STATIC_MODIFIER_DESC_modifier_dan_trading_economy: "We cannot produce everything we need to maintain economic stability on our own. We must instead rely on a stable trade network to export our goods and import everything that we ourselves are not able to produce."
  STATIC_MODIFIER_NAME_modifier_dlh_revert_ghiyath_reforms: "Revert Ghiyath's Reforms"
  STATIC_MODIFIER_DESC_modifier_dlh_revert_ghiyath_reforms: "The foolish economic decisions of Ghiyath al-Din have brought nothing but financial ruin to the state of $DLH$. We must revert his madness and restore the usage of gold and silver for our coins."
  STATIC_MODIFIER_NAME_modifier_dlh_restore_the_delhi_empire: "Restore the Greatness of $DLH$"
  STATIC_MODIFIER_DESC_modifier_dlh_restore_the_delhi_empire: "The $DLH_ADJ$ Sultanate once encompassed nearly all of $india$. It must rise again!"
  STATIC_MODIFIER_NAME_modifier_dlh_reintegrate_former_provinces: "Re-integrate Former Provinces"
  STATIC_MODIFIER_DESC_modifier_dlh_reintegrate_former_provinces: "The once vast $DLH_ADJ$ Sultanate has lost most of its former possessions, but we have not forgotten the means of administering them. As we work towards restoring our past glory, we will remind local rulers of their duties to the Sultan."
  STATIC_MODIFIER_NAME_modifier_dlh_textile_innovation: "Innovative Textile Production"
  STATIC_MODIFIER_DESC_modifier_dlh_textile_innovation: "The thriving textile industry in $DLH$ makes our nation a hotspot for related technological innovations. As early adopters of the cotton gin and worm gear roller, we know the importance of staying ahead of the curve in these matters. We must now ensure that the spinning wheel is adopted as widely as possible."
  STATIC_MODIFIER_NAME_modifier_dlh_afghan_nobility: "$afghan_culture$ Nobility"
  STATIC_MODIFIER_DESC_modifier_dlh_afghan_nobility: "Much of the $DLH_ADJ$ nobility is drawn from the ranks of the $afghan_culture$ community, a people with a long history of conquest and rule in northern $india$. Though at times a political hindrance, their martial skills are beyond question."
  STATIC_MODIFIER_NAME_modifier_dlh_grand_trunk: "Protect the Grand Trunk Road"
  STATIC_MODIFIER_DESC_modifier_dlh_grand_trunk: "The Grand Trunk Road runs from $kabul$ in Afghanistan to the coast of $bengal_area$. Many of the most important trading cities along its route are part of our empire, and so it falls to us to ensure that the road is well maintained and free of banditry."
  STATIC_MODIFIER_NAME_modifier_dlh_cosmopolitan_religions: "Cosmopolitan Religions"
  STATIC_MODIFIER_DESC_modifier_dlh_cosmopolitan_religions: "$india$ is a massive subcontinent with several religions present. In order to ensure stability within our realm, we should expand the rights of the different faiths, and secure the loyalty of their worshippers."
  STATIC_MODIFIER_NAME_modifier_dlh_revive_the_tughlaq_architecture: "Tughlaq Architectural Revival"
  STATIC_MODIFIER_DESC_modifier_dlh_revive_the_tughlaq_architecture: "During the height of the $tughlaq$ dynasty and the most stable period of our state, great architects and artists of grand vision constructed mosques and tombs in the unique Tughlaq style. As the decades went on and our power was challenged by internal issues, the resources for maintaining this architecture faded. It is time to revive it, and re-establish $DLH$ as an empire of art and wonders."
  STATIC_MODIFIER_NAME_modifier_dlh_throne_of_india: "Indian Throne"
  STATIC_MODIFIER_DESC_modifier_dlh_throne_of_india: "For centuries, every great Indian empire has been ruled from $delhi$. It is the seat of conquerors and our birthright. All must know that $delhi$ is once again home to the rightful ruler of all $india$!"
  STATIC_MODIFIER_NAME_modifier_dlh_hindustani_identity: "$HIN_ADJ$ Identity"
  STATIC_MODIFIER_DESC_modifier_dlh_hindustani_identity: "Foreign ideas of nationalism and cultural identity have reached $india$. While the cultural diversity of $india$ will remain high, it is clear that our geography, as well as the values of $muslim$, give us all a sense of unity in the form of a $HIN_ADJ$ identity."
  STATIC_MODIFIER_NAME_modifier_royal_navy: "A Royal Navy"
  STATIC_MODIFIER_DESC_modifier_royal_navy: "Beginning around 1495, the $tudor_dynasty$ monarchy invested heavily in not just ships, but extensive infrastructure to maintain and otherwise support them. This for many marked the official founding of the Royal Navy."
  STATIC_MODIFIER_NAME_modifier_secretaries_of_state: "Secretaries of State"
  STATIC_MODIFIER_DESC_modifier_secretaries_of_state: "The monarch has always had a secretary responsible for their royal correspondence. This position eventually evolved into that of the Secretary of State, a powerful minister who not only transmits royal decrees, but also has a high level of administrative authority."
  STATIC_MODIFIER_NAME_modifier_eltham_ordinance: "The Eltham Ordinance"
  STATIC_MODIFIER_DESC_modifier_eltham_ordinance: "The Eltham Ordinances represented $ENG$'s first attempt to streamline royal bureaucracy and make it more adaptable and cost-effective. The Ordinances attempted reform through reducing royal household expenditures and consolidating certain bureaucratic functions."
  STATIC_MODIFIER_NAME_modifier_sick_and_hurt_board: "The Sick and Hurt Board"
  STATIC_MODIFIER_DESC_modifier_sick_and_hurt_board: "This institution looked after the welfare of ordinary enlisted seamen in the Navy. It brought about a series of reforms that greatly improved the health of sailors on duty."
  STATIC_MODIFIER_NAME_modifier_british_bill_of_rights: "$ENG_ADJ$ Bill of Rights"
  STATIC_MODIFIER_DESC_modifier_british_bill_of_rights: "A sweeping series of reforms limiting royal power, particularly in judicial matters. Among other stipulations, they state that the monarch may not unilaterally raise armies, prescribe cruel and unusual punishment, or interfere with the free election of members of Parliament."
  STATIC_MODIFIER_NAME_modifier_navigation_acts: "The Navigation Acts"
  STATIC_MODIFIER_DESC_modifier_navigation_acts: "These acts represent the apex of mercantilism. Trade must be conducted with our ships and pass through our ports first, where we will collect customs duties and any other applicable taxes."
  STATIC_MODIFIER_NAME_modifier_inigo_architecture: "Palladian Architecture"
  STATIC_MODIFIER_DESC_modifier_inigo_architecture: "The architectural innovations made by Inigo Jones will undoubtedly have a significant impact on future generations of architects. His promotion of classical architecture and his priority on proportion and harmony are considered hallmarks of the neoclassical movement in $ENG$."
  STATIC_MODIFIER_NAME_modifier_sailing_and_fighting_instructions: "Blake's Sailing and Fighting Instructions"
  STATIC_MODIFIER_DESC_modifier_sailing_and_fighting_instructions: "Robert Blake has written several sets of rules and regulations that resulted in sweeping naval reforms. These include new tactics for blockades and landings, as well as adoption of the single line ahead battle formation."
  STATIC_MODIFIER_NAME_modifier_coke_smelting: "Coke Smelting"
  STATIC_MODIFIER_DESC_modifier_coke_smelting: "The invention of coke smelting, specifically its application in $iron$ and $steel$ production, is closely tied to the Industrial Revolution. $iron$ and $steel$ are currently produced using traditional methods like charcoal smelting, whereas this new method will result in improved output and reduced maintenance costs."
  STATIC_MODIFIER_NAME_modifier_english_ambition: "Rulers of the Waves"
  STATIC_MODIFIER_DESC_modifier_english_ambition: "A massive sea presence is required for any nation attempting to rule the waters. Our fleet will be so imposing that the shores of our enemies will always be surrounded by our vessels."
  STATIC_MODIFIER_NAME_modifier_water_frame: "Water Frame"
  STATIC_MODIFIER_DESC_modifier_water_frame: "The water frame is a spinning frame used in the textile industry to produce cotton thread. This innovation will contribute to the establishment of large textile factories powered by water wheels."
  STATIC_MODIFIER_NAME_modifier_solomonid_claim: "$solomonid_dynasty$ Dynastic Claim"
  STATIC_MODIFIER_DESC_modifier_solomonid_claim: "Our rulers' forefathers are descended from the monarchs of Aksum; from the bloodlines of King Solomon and the Queen of Sheba. We have deposed the $zagwe_dynasty$ monarchs in order to legitimize our rule and firmly establish the kingdom being restored to its rightful dynasty."
  STATIC_MODIFIER_NAME_modifier_nagusa_negast: "Nəgusä Nägäst"
  STATIC_MODIFIER_DESC_modifier_nagusa_negast: "Our ruler is the king of all kings; the heir to the pedigree of the kings of Aksum along with that of the first ruler, Menelik I, the son of King Solomon and the Queen of Sheba. All of our kings are descended from the $solomonid_dynasty$ dynasty, and the line of inheritance need not be from father to son."
  STATIC_MODIFIER_NAME_modifier_a_permanent_capital: "A Permanent Capital"
  STATIC_MODIFIER_DESC_modifier_a_permanent_capital: "For centuries, our nation has lacked a permanent capital, with the court following the rulers wherever they desired. While this approach has its advantages, in order to effectively govern our vast nation we need to establish a strong central authority in a proper permanent location."
  STATIC_MODIFIER_NAME_modifier_external_friends: "External Friends"
  STATIC_MODIFIER_DESC_modifier_external_friends: "Our envoys to $rome$ and $iberia_region$, looking for military support, were quite successful — in fact, they put us on the map. These endeavors to find allies should continue."
  STATIC_MODIFIER_NAME_modifier_eternal_crusade: "An Eternal Crusade"
  STATIC_MODIFIER_DESC_modifier_eternal_crusade: "As a $christian_ADJ$ nation, we find ourselves surrounded by $muslim_ADJ$ adversaries who seize every opportunity to attack us. To ensure our survival, we must be prepared to fight back immediately."
  STATIC_MODIFIER_NAME_modifier_prester_john: "Prester John"
  STATIC_MODIFIER_DESC_modifier_prester_john: "People from $europe$ have been looking for Prester John for centuries, and are convinced that our ruler has to be him, somehow, as we are fellow $christian_ADJ$ worshippers. There is no reason to point out that they are wrong, however, as they are now happy to share their ideas with us."
  STATIC_MODIFIER_NAME_modifier_an_iron_fist: "An Iron Fist"
  STATIC_MODIFIER_DESC_modifier_an_iron_fist: "Our region is diverse in cultures and religions, and the only thing that keeps it united is not compassion, but a powerful ruler, capable of dealing swiftly and decisively with any attempt at revolt."
  STATIC_MODIFIER_NAME_modifier_a_true_ethiopian_church: "A True $ETH_ADJ$ Church"
  STATIC_MODIFIER_DESC_modifier_a_true_ethiopian_church: "External influences have their uses, but exposure to them can alter the nature of our beliefs. In order to maintain our identity, we must secure the domestic primacy of our own Tewahedo Church."
  STATIC_MODIFIER_NAME_modifier_origin_of_coffee: "Origin of $coffee$"
  STATIC_MODIFIER_DESC_modifier_origin_of_coffee: "It is from our lands that $coffee$ comes, as we have the perfect growing conditions. While it can be cultivated in other places, ours is revered for its quality and exported by the ton. We have to make this a way to channel wealth into our nation."
  STATIC_MODIFIER_NAME_modifier_a_modern_nation: "A Modern Nation"
  STATIC_MODIFIER_DESC_modifier_a_modern_nation: "Despite our apparent isolation, we are well aware of the innovations happening around the world, and we waste no time in implementing these modernizations in order to maintain a competitive advantage over our rivals."
  STATIC_MODIFIER_NAME_modifier_a_land_of_banks: "A Land of Banks"
  STATIC_MODIFIER_DESC_modifier_a_land_of_banks: "$TUS$ is the center of banking in $europe$, with many powerful financial institutions headquartered in their major cities. From these bases, their influence extends across $italy_region$ and into northern $europe$ through extensive trade networks and lucrative partnerships."
  STATIC_MODIFIER_NAME_modifier_florentine_citizen_militia: "$FLO_ADJ$ Citizen Militia"
  STATIC_MODIFIER_DESC_modifier_florentine_citizen_militia: "If our people are to flourish well into the future, they must be ready to mobilize and defend our ideals and homeland! Forming a citizen militia, equal in experience and ferocity to other armies in $europe$, will greatly aid us in protecting our domain."
  STATIC_MODIFIER_NAME_modifier_birthplace_of_renaissance: "Birthplace of the $renaissance$"
  STATIC_MODIFIER_DESC_modifier_birthplace_of_renaissance: "Our dedication to fine arts, cultivating artistic talent, and innovative thought have led us to be regarded as one of the foremost leaders of cultural, philosophical, and scientific advancements worldwide!"
  STATIC_MODIFIER_NAME_modifier_florentine_school: "$FLO_ADJ$ School"
  STATIC_MODIFIER_DESC_modifier_florentine_school: "As one of the most influential contemporary schools of art, $FLO_ADJ$ techniques and fine details have established us as the cultural leader of $europe$, producing masterworks that define the $renaissance$."
  STATIC_MODIFIER_NAME_modifier_porto_franco: "Porto Franco"
  STATIC_MODIFIER_DESC_modifier_porto_franco: "By opening our ports for business with foreign merchants and eliminating import dues, we are sure to accumulate more capital gains from our mercantile ventures."
  STATIC_MODIFIER_NAME_modifier_accademia_cimento: "Accademia del Cimento"
  STATIC_MODIFIER_DESC_modifier_accademia_cimento: "The #italic Accademia del Cimento#! is a scientific society established in $FLO$ by students of Galileo. The first institution of its kind, this groundbreaking incubator of scientific development was devoted to the principles of experimentation. The society had the motto 'Try and try again' and published the #Italic Saggi#!, a book that would set contemporary standards for laboratory practice and procedure."
  STATIC_MODIFIER_NAME_modifier_medici_porcelain: "Medici $porcelain$"
  STATIC_MODIFIER_DESC_modifier_medici_porcelain: "Many attempts have been made during the last few decades to replicate the properties of true $porcelain$, an exotic good from the Far East. With the help of experienced alchemists and thorough scientific knowledge, we will surely be able to produce $porcelain$ of great quality."
  STATIC_MODIFIER_NAME_modifier_tuscan_municipal_reforms: "$TUS_ADJ$ Municipal Reforms"
  STATIC_MODIFIER_DESC_modifier_tuscan_municipal_reforms: "As we enter the era of absolutism and supreme centralized authority, we must reform local administration accordingly by establishing uniform procedures and transforming  local systems into instruments of central power."
  STATIC_MODIFIER_NAME_modifier_tuscan_physiocratic_reforms: "$TUS_ADJ$ Physiocratic Reforms"
  STATIC_MODIFIER_DESC_modifier_tuscan_physiocratic_reforms: "By strengthening our agricultural sectors and taking better care of our people, we will undoubtedly secure a strong foundation for our newly modernized economic systems."
  STATIC_MODIFIER_NAME_modifier_tuscan_new_trade_system: "New $TUS_ADJ$ Trade System"
  STATIC_MODIFIER_DESC_modifier_tuscan_new_trade_system: "The era of trade guild supremacy is slowly coming to an end as their influence wanes in the face of absolute centralized power. By reforming their administration and shifting much of their control to our heads of state, we are sure to increase profits."
  STATIC_MODIFIER_NAME_modifier_french_language_in_all_courts: "$french_language$ Language in All Courts"
  STATIC_MODIFIER_DESC_modifier_french_language_in_all_courts: "For a long time, $latin_language$ has been the language of cultural exchange in $europe$... but to be honest, that language is nearly as dead as the ancient Romans who spoke it. We need to find a new #italic lingua franca#!, and nothing says 'lingua franca' like $french_language$."
  STATIC_MODIFIER_NAME_modifier_elan: "Élan!"
  STATIC_MODIFIER_DESC_modifier_elan: "Cultivating the doctrine of attack is the hallmark of our army. Our men must fight with #italic élan#! — spirit and vigor — giving us a clear edge on the battlefield."
  STATIC_MODIFIER_NAME_modifier_estates_general: "Estates-General"
  STATIC_MODIFIER_DESC_modifier_estates_general: "According to some, the Estates-General have existed since 1303. Over time, its form has shifted from being a council of royalty appointees to one of elected representatives. This change in structure has given the Estates-General, and the taxes levied by them, greater legitimacy."
  STATIC_MODIFIER_NAME_modifier_fra_gendarmes: "Gendarme Companies"
  STATIC_MODIFIER_DESC_modifier_fra_gendarmes: "Reliance on a levy system has exposed our government to great risks, and has proved to be severely limiting. We should recruit heavily armed cavalrymen and pay them a fixed salary in order to create a standing army."
  STATIC_MODIFIER_NAME_modifier_fra_integration_of_new_territories: "Consolidation of the Country"
  STATIC_MODIFIER_DESC_modifier_fra_integration_of_new_territories: "Our influence over other states is undeniable. Why not use this persuasive power to incorporate them directly into our country?"
  STATIC_MODIFIER_NAME_modifier_fra_reliance_on_privateers: "Reliance on Privateers"
  STATIC_MODIFIER_DESC_modifier_fra_reliance_on_privateers: "Direct competition with other maritime powers could be detrimental to our finances. We should empower our mercantile fleet to plunder and seize the merchant ships of our enemies. This will not only ensure a healthy income for our state, but also disrupt the maritime economies of our rivals."
  STATIC_MODIFIER_NAME_modifier_fra_reformation_of_taxation: "Establishment of Recettes Générales"
  STATIC_MODIFIER_DESC_modifier_fra_reformation_of_taxation: "The intendants responsible for collecting the taxes of the people shall not be appointed by the estates, but by our ruler directly. This way, we will ensure these officers will be loyal to the ruler alone, and gather all of the rightful tribute owed."
  STATIC_MODIFIER_NAME_modifier_fra_school_of_fontainebleau: "Northern Mannerism"
  STATIC_MODIFIER_DESC_modifier_fra_school_of_fontainebleau: "As a nation much enriched by the $renaissance$, we should invest in the creation of a unique, distinctively $FRA_ADJ$ aesthetic. By inviting foreign artists to our realm and sponsoring a school for artist training directly, we will be able to brand any artistic works produced as identifiably $FRA_ADJ$."
  STATIC_MODIFIER_NAME_modifier_vauban_fortifications: "Innovative Fortifications"
  STATIC_MODIFIER_DESC_modifier_vauban_fortifications: "Our genius in fortification does not represent a radical departure in their design; rather, the innovation comes from the placement of the fortresses. By taking maximum advantage of local terrain, even the most basic fort requires more effort and supplies to take."
  STATIC_MODIFIER_NAME_modifier_the_philosophes: "The Philosophes"
  STATIC_MODIFIER_DESC_modifier_the_philosophes: "We are proud to be the home of so many of the most renowned philosophers of these enlightened times. These thinkers produce a constant stream of groundbreaking ideas, which are stimulating advances in all fields, from the most trifling to the most vital."
  STATIC_MODIFIER_NAME_modifier_fra_expansion_of_france: "Historic Claims"
  STATIC_MODIFIER_DESC_modifier_fra_expansion_of_france: "We trace our nation's lineage back to the empire of Charlemagne, and can therefore claim all those lands to be part of our rightful territory. With the support of dedicated courts, we will be able to identify and re-claim all of this long territory."
  STATIC_MODIFIER_NAME_modifier_liberty_egalite_fraternity: "Liberté, Egalité, Fraternité"
  STATIC_MODIFIER_DESC_modifier_liberty_egalite_fraternity: "With all men declared to be equal under our new laws, adherents of other beliefs are finally allowed full participation in our government, and may thus now contribute to our national progress."
  STATIC_MODIFIER_NAME_modifier_fra_code_civil: "Code Civil"
  STATIC_MODIFIER_DESC_modifier_fra_code_civil: "We must replace the chaotic patchwork of laws governing our state with a single, unified legal code that applies to our entire population. This #italic Code Civil#! will serve as the foundation of our government and establish a just system for everyone in our realm."
  STATIC_MODIFIER_NAME_modifier_french_ambition: "Grande Armée"
  STATIC_MODIFIER_DESC_modifier_french_ambition: "When measured against our adversaries, our need for military reform becomes painfully apparent. By introducing modern drilling techniques, we can transform our troops into a disciplined force capable of destroying any foe in combat."
  STATIC_MODIFIER_NAME_modifier_genoese_crossbowmen: "$a_genoese_crossbowmen$"
  STATIC_MODIFIER_DESC_modifier_genoese_crossbowmen: "$a_genoese_crossbowmen_desc$"
  STATIC_MODIFIER_NAME_modifier_bank_of_saint_george: "Bank of Saint George"
  STATIC_MODIFIER_DESC_modifier_bank_of_saint_george: "The Bank of Saint George is a financial institution founded to consolidate all the debts of $GEN$, with the aim of becoming the credit arm of the country and financing its enterprises overseas."
  STATIC_MODIFIER_NAME_modifier_the_age_of_the_genoese: "The Age of the $GEN_ADJ$"
  STATIC_MODIFIER_DESC_modifier_the_age_of_the_genoese: "The financial development of $GEN$ in recent decades has led $GEN_ADJ$ bankers to becoming among the most sought-after, stimulating the splendor of our country by becoming patrons of renowned artists for their villas and palaces."
  STATIC_MODIFIER_NAME_modifier_genoese_flexibility: "$GEN_ADJ$ Flexibility"
  STATIC_MODIFIER_DESC_modifier_genoese_flexibility: "Our state navy can serve multiple purposes instead of just being a weapon for war. With our knowledge and experience, we can repurpose our war galleys to merchant galleys — and vice-versa, if need be — in no time."
  STATIC_MODIFIER_NAME_modifier_genoese_school: "$GEN_ADJ$ School"
  STATIC_MODIFIER_DESC_modifier_genoese_school: "Painting, and the visual arts in general, has flourished in $ITA$ since the $renaissance$. It is therefore hardly surprising that a rich and esteemed state such as $GEN$ opens its own $GEN_ADJ$ School of Art."
  STATIC_MODIFIER_NAME_modifier_geo_georgian_golden_age: "$GEO_ADJ$ Golden Age"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_golden_age: "$GEO$ enjoyed a cultural and religious Golden Age that was brought to a sudden stop, due to the $MGE_ADJ$ invasions. That period witnessed the peak of our cultural achievements, but we will now return to it, and achieve even greater heights."
  STATIC_MODIFIER_NAME_modifier_geo_legacy_of_tamar: "Legacy of Tamar"
  STATIC_MODIFIER_DESC_modifier_geo_legacy_of_tamar: "Tamar was one of the greatest rulers our nation ever had. Her military and cultural successes are legendary, and the mere utterance of her name still stirs reverence in all $GEO_ADJ$ hearts."
  STATIC_MODIFIER_NAME_modifier_geo_david_the_builder: "Davit the Builder"
  STATIC_MODIFIER_DESC_modifier_geo_david_the_builder: "Considered the greatest ruler in the history of our country, King Davit the Builder brought $GEO$ to its pinnacle. He built a powerful, culturally influential kingdom, and a beacon for $christian$ and the $GEO_ADJ$ people."
  STATIC_MODIFIER_NAME_modifier_geo_georgian_titles: "$GEO_ADJ$ Titles"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_titles: "'King of Kings, strong and invincible, majestic and protector of the holy kingdom of the Abkhazians, Iberians, Ranis, Kakhetians, Armenians, Shahanshah and Shirvanshah, of the East and the West, of the South and the North, of both countries, of two thrones and crowns, the godlike Suzerain and the Sovereign of the Throne.' The titles of our ruler are numerous, and all at court shall respect them!"
  STATIC_MODIFIER_NAME_modifier_geo_georgian_numismatics: "$GEO_ADJ$ Numismatics"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_numismatics: "Our country has a rich tradition of minting coins, inscribing them not only in $georgian_language$ but also in $arabic_language$ and $persian_language$, as they serve as currency for trade through our country and those that neighbor us."
  STATIC_MODIFIER_NAME_modifier_geo_beacon_of_christianity: "Beacon of $christian$"
  STATIC_MODIFIER_DESC_modifier_geo_beacon_of_christianity: "$GEO$ has been a haven for $christian$ in the Caucasus for centuries, even after being surrounded and isolated by followers of $muslim$. The ardent faith of our people is a source of inspiration for all our religious brethren."
  STATIC_MODIFIER_NAME_modifier_geo_georgian_principalities: "$GEO_ADJ$ Principalities"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_principalities: "Our regional administration is divided into many different principalities and territories. Delegating authority this way allows us to exert our rule more effectively."
  STATIC_MODIFIER_NAME_modifier_geo_georgian_resilience: "$GEO_ADJ$ Resilience"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_resilience: "Our country has been torn apart, by external and internal influences, more than once in its long history. However, like the phoenix of legend, it has risen from the ashes and established itself as a presence to reckon with each time. The resilience of our people is commendable."
  STATIC_MODIFIER_NAME_modifier_glh_legacy_of_the_golden_horde: "Legacy of the Golden Horde"
  STATIC_MODIFIER_DESC_modifier_glh_legacy_of_the_golden_horde: "We were one of the main constituent parts of $genghis_khan_name_no_tooltip$'s empire, and we represent the main political force in $eastern_europe$ and the Steppes. The world shall tremble before us!"
  STATIC_MODIFIER_NAME_modifier_glh_perso_mongol_administration: "Perso-$MGE_ADJ$ Administration"
  STATIC_MODIFIER_DESC_modifier_glh_perso_mongol_administration: "Our ancestors refined our administrative system over the centuries, and they were not shy about incorporating the ideas and methods of the cultures they subdued. Our current system of administration is in part based on traditions dating back to the Great $genghis_khan_name_no_tooltip$ himself, and in part on what we have adopted from $IRA_ADJ$ and $muslim_ADJ$ bureaucrats in the lands conquered."
  STATIC_MODIFIER_NAME_modifier_glh_tatar_traditions: "Tatar Traditions"
  STATIC_MODIFIER_DESC_modifier_glh_tatar_traditions: "Our empire may no longer be ruled from horseback, but our armies remain masters of the mount. Over the centuries, we have stayed true to our origins, ensuring that few can match the skill of our riders. As we go forward and adopt new technology and tactics when needed, we build on the strong organization and martial traditions of the $MGE_ADJ$ Empire."
  STATIC_MODIFIER_NAME_modifier_glh_secure_the_trade_routes: "Secure the Trade Routes"
  STATIC_MODIFIER_DESC_modifier_glh_secure_the_trade_routes: "Not all riches in this world originate in our territory. Trade is the source of all wealth, and the Golden Horde has always protected merchants. By ensuring the safety of anyone who wishes to move goods through our country, we can ensure a steady stream of furs, silk, spices, and other necessities to our cities. Whether they choose to sell their goods to us or not, their mere presence will generate wealth for our people."
  STATIC_MODIFIER_NAME_modifier_glh_religious_pragmatism: "Religious Pragmatism"
  STATIC_MODIFIER_DESC_modifier_glh_religious_pragmatism: "Constraining, inflexible doctrine has never won many admirers among the Tatar hordes. When the Great $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ adopted $muslim$, it was the faith of a Sufi Shaykh or a zealous Qāḍī that he invited into his lands.\n\nCenturies of tradition and loyalty are what we would rather build our state upon. Religion has a part to play, but we would prefer to see our country thrive than to fall apart in the chaos of forced religious homogeneity."
  STATIC_MODIFIER_NAME_modifier_glh_modernization_of_steppes: "Modernization of the Steppes"
  STATIC_MODIFIER_DESC_modifier_glh_modernization_of_steppes: "It was long ago that $genghis_khan_name_no_tooltip$'s armies first seized control of the steppes. Our country has since surpassed our ancestor's every expectation, and now we stand as a global power on our own merit. We shall now begin the process of modernizing our territories, so that one day we shall be the beacon of all the world."
  STATIC_MODIFIER_NAME_modifier_gra_skillful_envoys: "Skillful Envoys"
  STATIC_MODIFIER_DESC_modifier_gra_skillful_envoys: "Our skillful use of diplomacy has been the deciding factor between life or death many times before. But we must not let ourselves be lulled into complacency; we must train our envoys even more to ensure their success."
  STATIC_MODIFIER_NAME_modifier_gra_razzias: "Nasrid Razzias"
  STATIC_MODIFIER_DESC_modifier_gra_razzias: "The borders of our enemies are tantalizing opportunities for us. Should we boldly strike with lightning attacks, we can catch the enemy off-guard and inflict lasting damage."
  STATIC_MODIFIER_NAME_modifier_gra_muttavia_armies: "Mutawwi'a Armies"
  STATIC_MODIFIER_DESC_modifier_gra_muttavia_armies: "$GRA$ has a limited number of people, and we cannot draft enough soldiers to defend our nation effectively. However, where we lack people, we do not lack gold, and that can be used to bring mercenary swords under our banners."
  STATIC_MODIFIER_NAME_modifier_gra_expand_qanahs: "Expand the Qanāh"
  STATIC_MODIFIER_DESC_modifier_gra_expand_qanahs: "The lands of $GRA$ are fertile, but expanding our irrigation canals would allow us to make better use of our water supply, and grow better-quality crops as a result."
  STATIC_MODIFIER_NAME_modifier_gra_adaptative_trade: "Adaptive Trade"
  STATIC_MODIFIER_DESC_modifier_gra_adaptative_trade: "Our privileged position as middlemen between $christian_ADJ$ and $muslim_ADJ$ nations is being challenged. This threat could be an opportunity to modernize our trade methods and recover our position as a link between more distant markets and $europe$."
  STATIC_MODIFIER_NAME_modifier_gra_expand_the_frontier: "Expand the Frontier"
  STATIC_MODIFIER_DESC_modifier_gra_expand_the_frontier: "Since the foundation of our dynasty, our territorial holdings have been shrinking. However, we are now in a stronger position, capable of not only recovering every piece of lost land, but enlarging our realm even beyond those original borders."
  STATIC_MODIFIER_NAME_modifier_gra_a_strong_rule: "A Strong Rule"
  STATIC_MODIFIER_DESC_modifier_gra_a_strong_rule: "For decades, generations of our ruling family have fought incessantly with each other, destabilizing our nation. It is about time a powerful ruler decisively asserted their authority, proving they are the only one who can keep the peace and bring prosperity to our nation."
  STATIC_MODIFIER_NAME_modifier_gra_modernized_economy: "Modernized Economy"
  STATIC_MODIFIER_DESC_modifier_gra_modernized_economy: "Modern times demand a modern economy, capable of thriving in a highly competitive environment. By upgrading our infrastructure and making our production methods and processes more efficient, we will maximize production using the same amount of resources."
  STATIC_MODIFIER_NAME_modifier_gra_ghazawat: "Nasrid Ghazawat"
  STATIC_MODIFIER_DESC_modifier_gra_ghazawat: "As the descendants of the warriors who fought under the Prophet, we must defend our realm with similar bravery. Every battle for $GRA$ is a #italic ghazawat#! — a holy struggle to preserve $muslim$ against the onslaught of $christian$."
  STATIC_MODIFIER_NAME_modifier_gra_a_new_golden_era: "A New Golden Era"
  STATIC_MODIFIER_DESC_modifier_gra_a_new_golden_era: "Al-'Andalus was once a center for learning, home to exceptional scholars like 'Aḥmad Ibn Rušd, 'Abū al-Qāsim, and Muḥammad bin Ṭufayl. We should endeavor to continue this long-standing intellectual tradition."
  STATIC_MODIFIER_NAME_modifier_hab_expert_mountaineers: "Land of Mountains and Rivers"
  STATIC_MODIFIER_DESC_modifier_hab_expert_mountaineers: "Our people are highly adapted to traverse the obstacles of our country, from the high peaks and passes of our mountains to the wide rivers of our valleys."
  STATIC_MODIFIER_NAME_modifier_austrian_marriage_policy: "'Tu Felix Austria Nube'"
  STATIC_MODIFIER_DESC_modifier_austrian_marriage_policy: "'Let others wage war; you, happy $HAB$, marry! For what Mars gives to others, Venus gives to you — kingdoms.'"
  STATIC_MODIFIER_NAME_modifier_habsburg_dominance: "$HAB_ADJ$ Diplomatic Expertise"
  STATIC_MODIFIER_DESC_modifier_habsburg_dominance: "Given our location at the center of all $europe$, we must adopt a highly flexible attitude towards external diplomacy. Alliances and rivals can shatter as easily as they are formed, and our diplomats must be trained to cover every possible position."
  STATIC_MODIFIER_NAME_modifier_austrian_military_flexibility: "Landsknecht Tactics"
  STATIC_MODIFIER_DESC_modifier_austrian_military_flexibility: "Only well-rounded tactics of artillery shock, cavalry charges, and unyielding infantry recruited from the $landknechte$ can lead us to victory."
  STATIC_MODIFIER_NAME_modifier_edict_of_restitution: "Edict of Restitution"
  STATIC_MODIFIER_DESC_modifier_edict_of_restitution: "A bit of bookkeeping will help us to weather any religious strife that could befall our realm. This harmless edict will surely not spark any further conflict."
  STATIC_MODIFIER_NAME_modifier_austrian_court: "$HAB_ADJ$ Court"
  STATIC_MODIFIER_DESC_modifier_austrian_court: "Maintaining our diplomatic relations requires time and effort, and committing too many people to diplomatic missions could negatively affect our efficiency and damage our reputation. The $HAB_ADJ$ Court's streamlined approach ensures we deploy the right envoys at the right times and still gather the information we need without overextending our diplomatic resources."
  STATIC_MODIFIER_NAME_modifier_geheimrat: "Geheimer Rat"
  STATIC_MODIFIER_DESC_modifier_geheimrat: "The #italic Geheimer Rat#! is an elite advisory body composed of high-ranking nobles and officials, serving as the central institution for guiding our political, military, and administrative decisions."
  STATIC_MODIFIER_NAME_modifier_hofkriegsrat: "Hofkriegsrat"
  STATIC_MODIFIER_DESC_modifier_hofkriegsrat: "Our war council can only function with a proper bureaucratic structure. Only when we know every detail about our troops and logistics can we defend our realm from hostile intruders."
  STATIC_MODIFIER_NAME_modifier_military_border: "Military Frontier"
  STATIC_MODIFIER_DESC_modifier_military_border: "Defending our frontiers is a serious issue, and puts significant financial pressure on the state. The solution we have hit upon is to make generous grants of frontier lands in order to build up a professional military class. This will ensure more discipline overall and facilitate migration to the underpopulated regions of our realm."
  STATIC_MODIFIER_NAME_modifier_austrian_ambition: "Enlightenment Through Education"
  STATIC_MODIFIER_DESC_modifier_austrian_ambition: "Our rulers must receive the best education possible to live up to the ideal of the enlightened monarch."
  STATIC_MODIFIER_NAME_modifier_austrian_state_industrialization: "State Industrialization"
  STATIC_MODIFIER_DESC_modifier_austrian_state_industrialization: "Industrial modernization must always be a priority for our administration. Only through modern manufacturing can we compete with our rivals on a global stage."
  STATIC_MODIFIER_NAME_modifier_wiener_klassik: "Wiener Klassik"
  STATIC_MODIFIER_DESC_modifier_wiener_klassik: "Viennese Classicism is a transformative force in music. Our best composers' works shall revolutionize Western musical tradition through bold, trend-setting innovation of symphonic, operatic, and chamber arrangements."
  STATIC_MODIFIER_NAME_modifier_multicultural_empire: "Multicultural Empire"
  STATIC_MODIFIER_DESC_modifier_multicultural_empire: "$HAB$ is a diverse and multicultural realm, committed to embracing and accommodating its numerous ethnic minorities to maintain unity and stability amidst growing nationalist tensions."
  STATIC_MODIFIER_NAME_modifier_imperial_artillery: "Imperial Artillery"
  STATIC_MODIFIER_DESC_modifier_imperial_artillery: "The rapidly changing nature of warfare urges us to modernize our troops and tactics. In order to stay ahead of our foes, we shall make our artillery the pride of the Imperial army."
  STATIC_MODIFIER_NAME_modifier_hes_form_the_militia_army: "Professional Army Core"
  STATIC_MODIFIER_DESC_modifier_hes_form_the_militia_army: "Our strategic position within the Empire makes us an attractive staging ground for other princes' armies whenever outside threats arise. However, hosting foreign troops hurts our finances. To prevent this costly burden, we must raise our own troops and put them into service of the Empire."
  STATIC_MODIFIER_NAME_modifier_hin_sepahi: "Sipâhi"
  STATIC_MODIFIER_DESC_modifier_hin_sepahi: "Neglecting the importance of the infantry has been the downfall of many would-be conquerors. We must ensure that our troops are equipped with the most effective firearms and drilled in tactics that can adapt to any foe."
  STATIC_MODIFIER_NAME_modifier_hin_united_india: "United $india$"
  STATIC_MODIFIER_DESC_modifier_hin_united_india: "The many people, cultures, languages, and nations that make up $india$ shall be finally united under a single banner. Only with common understanding and a carefully fostered unity among all our people can we strive towards greater ambitions."
  STATIC_MODIFIER_NAME_modifier_hin_ganga: "Gaṅgā"
  STATIC_MODIFIER_DESC_modifier_hin_ganga: "Many $hindu_ADJ$ faithful worship the river Ganges as a goddess that brings purity and redemption to the faithful. We implore pilgrims to visit the river banks to bathe in the sacred waters. Through Gaṅgā, our nation is made pure."
  STATIC_MODIFIER_NAME_modifier_hin_persianate_court: "Persianate Courtly Culture"
  STATIC_MODIFIER_DESC_modifier_hin_persianate_court: "Foreign languages and noble customs have richly influenced the courts of $india$ for a long time. We should utilize these connections to invite the most capable advisors to serve under our guidance."
  STATIC_MODIFIER_NAME_modifier_hin_gunpowder_empire: "Gunpowder Empire"
  STATIC_MODIFIER_DESC_modifier_hin_gunpowder_empire: "Our mastery of gunpowder warfare has brought us glory and helped us found our great state. This dominance would be impossible without fostering firearms production for our troops."
  STATIC_MODIFIER_NAME_modifier_hin_sufism: "Attract Sufi Missionaries"
  STATIC_MODIFIER_DESC_modifier_hin_sufism: "$muslim_ADJ$ princes across the world compete to attract the wisest Sufi teachers. As our renown has grown, more of these Sufis have joined us. Towns are founded wherever they settle, often in previously inhospitable regions, and the local people are inspired to convert through the wisdom of the Sufis."
  STATIC_MODIFIER_NAME_modifier_hin_administration_of_india: "Indian Administration"
  STATIC_MODIFIER_DESC_modifier_hin_administration_of_india: "Governing a state as large as an entire subcontinent is no easy task. We will need to develop a robust system of administration in cooperation with local princes to get the most out of our production and to ensure widespread stability."
  STATIC_MODIFIER_NAME_modifier_hin_indian_empire: "Imperial $india$"
  STATIC_MODIFIER_DESC_modifier_hin_indian_empire: "No ruler, be they $muslim_ADJ$, $hindu_ADJ$, $buddhist_ADJ$, or $jain_ADJ$, has ever succeeded in conquering the entirety of the subcontinent. We shall be the first universal rulers of $india$!"
  STATIC_MODIFIER_NAME_modifier_hin_rocketry: "Develop Rocket Technology"
  STATIC_MODIFIER_DESC_modifier_hin_rocketry: "Iron-cased rockets have yet to be widely adapted for military purposes, yet their explosive power surely has tactical applications. We should experiment with this technology and test it on the battlefield."
  STATIC_MODIFIER_NAME_modifier_hin_industrialization: "Industrialization of $india$"
  STATIC_MODIFIER_DESC_modifier_hin_industrialization: "Conditions in our economy are ideal for rapid industrial growth. With new technology we can ensure better conditions for our local production, particularly in the textile industry. Our focus on new methods means that our state can ensure steady industrial expansion."
  STATIC_MODIFIER_NAME_modifier_hsa_hanseatic_ties: "$HSA_ADJ$ Ties"
  STATIC_MODIFIER_DESC_modifier_hsa_hanseatic_ties: "Our League is home to a great many cities and merchant guilds, all with their own agendas and endeavors. In order to maintain our prosperity and expand our reach, we must take a keen interest in diplomatic efforts."
  STATIC_MODIFIER_NAME_modifier_hsa_seal_of_the_hansa: "Seal of the $HSA$"
  STATIC_MODIFIER_DESC_modifier_hsa_seal_of_the_hansa: "In markets across $europe$, from $london$ to $novgorod$, our merchants are famed for their affluence. Our ability to mobilize great trade fleets and bring dozens of cities into a perfect symphony of profit and exchange of commodities is second to none."
  STATIC_MODIFIER_NAME_modifier_hsa_hanseatic_shipwrights: "$HSA_ADJ$ Shipwrights"
  STATIC_MODIFIER_DESC_modifier_hsa_hanseatic_shipwrights: "At a time when $europe$ is enveloped in war, with rulers desperate for expansion pressing claims in all directions, they look to us to build grand fleets that will allow them to fulfill their ambitions. Armed with centuries of accumulated shipwrighting knowledge, and some of the best timber on the continent, our ship-building process is unparalleled!"
  STATIC_MODIFIER_NAME_modifier_hsa_draft_merchant_privileges: "Draft Merchant Privileges"
  STATIC_MODIFIER_DESC_modifier_hsa_draft_merchant_privileges: "The merchants who conduct business under our seal carry with them tremendous influence and purses brimming with coin. As such, solidifying their privileges in foreign and domestic markets will only further increase our capacity for profitable business."
  STATIC_MODIFIER_NAME_modifier_hsa_mastery_of_the_sea: "Mastery of the Sea"
  STATIC_MODIFIER_DESC_modifier_hsa_mastery_of_the_sea: "Our maritime traditions have linked our fortunes to the mighty sea. To reap all the benefits we possibly can from our marine resources, we must learn to harness the awesome power of the sea — and to treat it with the proper deference. This will have tremendous effects on our trade activities."
  STATIC_MODIFIER_NAME_modifier_hsa_exchange_of_ideas: "Exchange of Ideas"
  STATIC_MODIFIER_DESC_modifier_hsa_exchange_of_ideas: "Our traveling merchants who carry our business abroad are excellent resources of foreign knowledge. Whenever they return to our shores, they bring innovation and inspiration in their wake."
  STATIC_MODIFIER_NAME_modifier_hsa_global_reach: "Global Reach"
  STATIC_MODIFIER_DESC_modifier_hsa_global_reach: "The widespread adoption of trade on a global scale has shaken the mercantile world to its core. It is now customary to do regular business with foreign traders from all corners of the world, and our treasury has benefited as a result."
  STATIC_MODIFIER_NAME_modifier_hsa_hanseatic_treasury: "$HSA_ADJ$ Treasury"
  STATIC_MODIFIER_DESC_modifier_hsa_hanseatic_treasury: "A strong economy is but one result of our prosperity. With ample coin and overflowing coffers, we have established ourselves as robust and dependable creditors."
  STATIC_MODIFIER_NAME_modifier_hsa_regularized_contributions: "Standardized Contributions"
  STATIC_MODIFIER_DESC_modifier_hsa_regularized_contributions: "The many entities within our League must be brought under our firm control in a bid to standardize their monthly and annual contributions to our treasury."
  STATIC_MODIFIER_NAME_modifier_the_hansa_bank: "The $HSA$ Bank"
  STATIC_MODIFIER_DESC_modifier_the_hansa_bank: "Following our new system of contributions, we can underwrite a bank for members to use. Backed by the resources of the League, a letter of credit from the bank will be as good as cash. This, as well as other financial instruments, will give our merchants an edge over those in other countries."
  STATIC_MODIFIER_NAME_modifier_hsa_reform_the_hanstag: "Reform the Hanstag"
  STATIC_MODIFIER_DESC_modifier_hsa_reform_the_hanstag: "In times of troubles and evolving thought, our central institutions for assembly and deliberation must adapt to deal with emerging challenges and new paradigms."
  STATIC_MODIFIER_NAME_modifier_hsa_concept_of_mercantilism: "Concept of Mercantilism"
  STATIC_MODIFIER_DESC_modifier_hsa_concept_of_mercantilism: "Over the past centuries, we have worked tirelessly to integrate our dealings into the global scale of trade. Now, more than ever, we must protect our own merchants, lest we fall victim to factionalism and external competition."
  STATIC_MODIFIER_NAME_modifier_hun_multi_culturalism: "Realm of Many Cultures"
  STATIC_MODIFIER_DESC_modifier_hun_multi_culturalism: "The Carpathian Basin is home to more than just $HUN_ADJ$ people. $slovak$, $ruthenian$,$cuman_culture$, and $german_carpathian$ people, among many other different minorities, call our realm their home. Given this diversity, it is only natural that our government proficiently absorbs and adopts these different cultures into our state."
  STATIC_MODIFIER_NAME_modifier_hun_renaissance_knowledge: "A $renaissance$ Prince"
  STATIC_MODIFIER_DESC_modifier_hun_renaissance_knowledge: "The peasants consider their ruler a just one because they are officially protected from having excessive demands and other abuses heaped upon them by magnates. The ruler of $HUN$ is a true $renaissance$ prince — a successful military leader and administrator, an outstanding linguist, and an enlightened patron of the arts."
  STATIC_MODIFIER_NAME_modifier_hun_reformed_coinage: "Reformed Coinage"
  STATIC_MODIFIER_DESC_modifier_hun_reformed_coinage: "To pay for our new professional army, we will need a steady stream of revenue. Reforming the coinage to standardize weights will make this much easier, because we shall know exactly how much people need to pay."
  STATIC_MODIFIER_NAME_modifier_hun_bulwark_of_christianity: "Bulwark of $christian$"
  STATIC_MODIFIER_DESC_modifier_hun_bulwark_of_christianity: "With $turkish_culture$ power rising in the south, it falls to the people of $HUN$ to defend faithful kingdoms from the $turkish_culture$ threat. Let it be known that we will not flinch from our sacred duty!"
  STATIC_MODIFIER_NAME_modifier_hun_hungarian_reformation: "$HUN_ADJ$ Reformation"
  STATIC_MODIFIER_DESC_modifier_hun_hungarian_reformation: "$hun_hungarian_reformation_intro$ Our realm has been threatened by outside powers for long enough. By joining the Reformation and abandoning the duty of following the Pope like a lapdog, we can break at least one of the shackles oppressing us!"
  STATIC_MODIFIER_NAME_modifier_hun_the_catholic_shield: "The $catholic_ADJ$ Shield"
  STATIC_MODIFIER_DESC_modifier_hun_the_catholic_shield: "$hun_hungarian_reformation_intro$ Yet, the hearts of the faithful remain strong. God and his loyal servants will withstand this heretical madness."
  STATIC_MODIFIER_NAME_modifier_hun_realm_of_many_religions: "Realm of Many Religions"
  STATIC_MODIFIER_DESC_modifier_hun_realm_of_many_religions: "$hun_hungarian_reformation_intro$ Alas, the Reformation has split families apart, made former friends into enemies, and threatened the very stability of many nations. However, our realm knows better than to fall victim to this theological quarreling. We are a people and a realm of many religions, after all."
  STATIC_MODIFIER_NAME_modifier_hun_curtailed_peasantry: "Curtail Peasant Liberties"
  STATIC_MODIFIER_DESC_modifier_hun_curtailed_peasantry: "$HUN$ is not blessed with protective natural frontiers. The wild plains that first brought our ancestors here were perfect for launching raids into the West, not for defense. If $HUN$ is to defend itself, we will need resources. The best solution is to allow our magnates to bind the peasants more closely to the land, ensuring greater productivity."
  STATIC_MODIFIER_NAME_modifier_hun_revolutionized_military_tactics: "Revolutionary Military Tactics"
  STATIC_MODIFIER_DESC_modifier_hun_revolutionized_military_tactics: "As military technology advances, so do battlefield tactics. It is imperative to the survival of our state that we keep pace with the ever-evolving nature of land warfare."
  STATIC_MODIFIER_NAME_modifier_hun_strengthened_towns: "Strengthen the Towns"
  STATIC_MODIFIER_DESC_modifier_hun_strengthened_towns: "Towns are key factors in producing the wealth $HUN$ needs to grow and prosper. If we ensure the operations of our townships are protected from the power-hungry machinations of the nobility, they will continue to bring in trade, which we can tax."
  STATIC_MODIFIER_NAME_modifier_hun_hungarian_unity: "$HUN_ADJ$ Unity"
  STATIC_MODIFIER_DESC_modifier_hun_hungarian_unity: "Although our subjects have faced many external threats over the years, the spirit and will of the $HUN_ADJ$ people remains unbroken. Unifying $HUN_ADJ$ hearts is greatly inspiring to our patriotic soldiers, who will defend our homelands to the last man."
  STATIC_MODIFIER_NAME_modifier_ilk_restore_yam: "Restore the Yäm"
  STATIC_MODIFIER_DESC_modifier_ilk_restore_yam: "The Yäm, our ancient system of relay stations and messengers, once connected the furthest corners of the $MGE_ADJ$ world. By restoring this vast network across $persia_region$ and beyond, we ensure that our orders are swift, our envoys safe, and our dominion responsive, just as it was in the golden days of the Khans."
  STATIC_MODIFIER_NAME_modifier_ilk_ilkhanate_resurgent: "$ILK$ Resurgent"
  STATIC_MODIFIER_DESC_modifier_ilk_ilkhanate_resurgent: "What was once broken is now reborn. Our banners fly once more across $persia_region$, invoking awe and fear in equal measure. As word of our rising power spreads, the world will remember what it means to be ruled by a true $ILKHANATE_LEADER_MALE$."
  STATIC_MODIFIER_NAME_modifier_ilk_persian_arts_and_architecture: "Persian Arts and Architecture"
  STATIC_MODIFIER_DESC_modifier_ilk_persian_arts_and_architecture: "Our ancestors ruled with the sword, but their greatness was measured in palaces, libraries, and minarets. Let us follow their example and fund not only walls and roads, but mosques, gardens, and schools as testaments to $ilkhanate$ grandeur."
  STATIC_MODIFIER_NAME_modifier_ilk_descendants_of_genghis_khan: "Descendants of $genghis_khan_name_no_tooltip$"
  STATIC_MODIFIER_DESC_modifier_ilk_descendants_of_genghis_khan: "The blood of the $rank_empire_horde_ruler_suffix_male$ runs through our veins. Let no man forget that our rule was ordained on the steppes and sealed by conquest. Our horsemen remain unmatched, and our banners bear not just a name, but a birthright."
  STATIC_MODIFIER_NAME_modifier_ilk_new_roots: "New Roots"
  STATIC_MODIFIER_DESC_modifier_ilk_new_roots: "The days of pure steppe conquest lie behind us. We have sown ourselves into the soil of progress and reformation. From that soil, a more stable, sophisticated state shall grow. Though our hearts may still beat to the rhythm of the open fields, our future lies in lasting institutions, not fleeting raids."
  STATIC_MODIFIER_NAME_modifier_quipu: "Quipu"
  STATIC_MODIFIER_DESC_modifier_quipu: "A system which uses knots on a string to store information, do accounting, and perform other informational tasks. Each knot represents a number from zero to nine. The knots can also be used to refer to logograms on the same string. The knots show which syllable in the logogram to use, and by combining more strings, sentences can be formed."
  STATIC_MODIFIER_NAME_modifier_llama_michis: "Llama Michis"
  STATIC_MODIFIER_DESC_modifier_llama_michis: "Llamas have many functions in our society. They act as beasts of burden, as sacrifices, provide meat and wool, and even give us fertilizer for our crops with their dung. Controlling the breeding and use of llamas through government #italic michis#!, or herders, we ensure that the llama population is strictly monitored. This will provide an opportunity for the llama population to increase"
  STATIC_MODIFIER_NAME_modifier_drafted_hatun_runas: "Drafted Hatun Runas"
  STATIC_MODIFIER_DESC_modifier_drafted_hatun_runas: "The #italic Hatun Runas#! are the peasant class of our empire. One in fifty men are chosen for military service on their twenty-fifth birthdays, and conscripted for the next seven years. This conscription system helps us maintain a substantial professional army with superior discipline than the troops of our adversaries."
  STATIC_MODIFIER_NAME_modifier_adapted_incan_army: "Adaptable Incan Army"
  STATIC_MODIFIER_DESC_modifier_adapted_incan_army: "Invaders from strange lands have set foot in our territory, and threaten our very existence. But our armies are adaptive; they adjust to new enemy tactics, learn to wield their very own weapons against them, and fight with an unbreakable resolve inspired by their foes."
  STATIC_MODIFIER_NAME_modifier_ira_restoration_of_cities: "Restoration of Cities"
  STATIC_MODIFIER_DESC_modifier_ira_restoration_of_cities: "The Mongol invasion of $IRA$ was catastrophic for the entire region. Population centers of magnificent size were reduced to mere rubble. But it is finally time to rebuild what was once destroyed, and restore the awe-inspiring empire of $IRA$."
  STATIC_MODIFIER_NAME_modifier_ira_improved_silk_road: "Improve the Silk Road"
  STATIC_MODIFIER_DESC_modifier_ira_improved_silk_road: "A system of upgrades to roads and bridges, a system of guards to protect the roads — for a small fee — and a chain of $caravanserai$ for rest and refreshment. All these improvements will help the merchants as they traverse the Silk Road, and also provide revenue for the state."
  STATIC_MODIFIER_NAME_modifier_ira_promotion_of_irrigation: "Promotion of Irrigation"
  STATIC_MODIFIER_DESC_modifier_ira_promotion_of_irrigation: "As a consequence of the Mongol invasion of the past, $IRA$ is somewhat depopulated compared to the earlier empires which claimed these lands as their own. Promoting the practice of irrigation should help our people develop the agriculture needed to boost the local population and help us recover from the death toll of past conflicts."
  STATIC_MODIFIER_NAME_modifier_ira_persian_horses: "$IRA_ADJ$ Horses"
  STATIC_MODIFIER_DESC_modifier_ira_persian_horses: "Horses play a fundamental role in our society. Many of our people are raised alongside their steeds, which is reflected in both the care our horse breeders take and the durability of our cavalry."
  STATIC_MODIFIER_NAME_modifier_ira_spread_of_persian_influence: "$IRA_ADJ$ Influence"
  STATIC_MODIFIER_DESC_modifier_ira_spread_of_persian_influence: "$persian_language$ is an ancient language with a history longer than the lifespan of many empires. Even the $muslim_ADJ$ conquest could not diminish the core of the $IRA_ADJ$ identity, and many other states try to imitate our culture."
  STATIC_MODIFIER_NAME_modifier_ira_persian_rug_production: "$IRA_ADJ$ Rug Production"
  STATIC_MODIFIER_DESC_modifier_ira_persian_rug_production: "$IRA$ has long been famous for its beautiful carpets and rugs. However, when the Mongols devastated the empire, much of this cultural heritage was lost. For $IRA$ to fully recover its tumbled glory, we must regain our economic strength, and restoring this legendary ancient industry is the first step in that direction."
  STATIC_MODIFIER_NAME_modifier_ira_the_qizilbash: "The $qizilbash$"
  STATIC_MODIFIER_DESC_modifier_ira_the_qizilbash: "The #italic $qizilbash$#! - the Red Heads - are a Shia military movement founded by the Ṣafawiyya. Guided by their religious convictions and deep ties to Sufism, these warriors are primed to fight for our state and to form the core of our army."
  STATIC_MODIFIER_NAME_modifier_ira_the_qurchi: "The Qurchi"
  STATIC_MODIFIER_DESC_modifier_ira_the_qurchi: "While the $qizilbash$ are the backbone of the $IRA_ADJ$ military, the #italic Qurchi#! are the royal bodyguards enlisted from their ranks. Instead of being given land, these soldiers are paid from the royal treasury."
  STATIC_MODIFIER_NAME_modifier_ira_religious_state: "Religious State"
  STATIC_MODIFIER_DESC_modifier_ira_religious_state: "No matter what the official faith of our state is, $IRA$ will always be an inherently religious country. Every aspect of our life is guided by religious principles, and even the government itself acts with our core beliefs in mind when dealing with matters of morality and justice."
  STATIC_MODIFIER_NAME_modifier_ira_encouraged_art: "Encourage Art"
  STATIC_MODIFIER_DESC_modifier_ira_encouraged_art: "$IRA_ADJ$ art is highly in demand. Collectors from near and far travel here in droves to purchase our exquisite creations. We should offer state support for our talented artists, as this trade in aesthetic goods is extremely lucrative."
  STATIC_MODIFIER_NAME_modifier_ira_nazir: "Court Nāẓir"
  STATIC_MODIFIER_DESC_modifier_ira_nazir: "The #italic Nāẓir#!, or overseers, are territorial administrators, and represent the eyes and ears of the Šâhanšâh. All actions of the court are supervised by the Nāẓir, and courtiers are promoted on their command. Even the Grand Vizier must work in association with the Nāẓir."
  STATIC_MODIFIER_NAME_modifier_ira_religious_unity_policy: "Religious Unity Policy"
  STATIC_MODIFIER_DESC_modifier_ira_religious_unity_policy: "The time of great religious divides has come to its end. In these turbulent times, $muslim$ cannot afford any more in-fighting. We shall advocate for a policy of internal and external religious unity, and come to peace with what we used to consider heresy."
  STATIC_MODIFIER_NAME_modifier_ira_afsharid_navy: "$persian_gulf$ Coastal Defense"
  STATIC_MODIFIER_DESC_modifier_ira_afsharid_navy: "Although our lands are located mostly in the highlands of the Zagros Mountains, $IRA$ does have coastal possessions. While past dynasties might have paid little attention to the maritime protection of the empire, our people are more aware of the sea, and our sailors are eager to defend our coasts."
  STATIC_MODIFIER_NAME_modifier_ita_birthplace_of_the_renaissance: "Continuation of the Renaissance"
  STATIC_MODIFIER_DESC_modifier_ita_birthplace_of_the_renaissance: "$italy_region$ has seen a great influx of bright minds. Be it traveling artists coming here to make their fortunes, or our own people inspired to participate in this great rebirth of the arts, our cities seem to be bursting with capable intellects. With our sponsorship, we will surely continue attracting talented people to our culture."
  STATIC_MODIFIER_NAME_modifier_ita_connect_the_interior: "Connect the Interior"
  STATIC_MODIFIER_DESC_modifier_ita_connect_the_interior: "While the terrain of our lands allows for swift transportation and travel along the coastline, the interior of the Italian peninsula is much harder to traverse in many places. Connecting not only interior locales, but also coast with coast, will ensure easier mercantile operations and improved maneuverability of our troops."
  STATIC_MODIFIER_NAME_modifier_ita_increased_recruitment: "A Prized Possession"
  STATIC_MODIFIER_DESC_modifier_ita_increased_recruitment: "$italy_region$ is a desired possession for many foreign rulers. If we want to defend our country, we must expand recruitment for both our land and sea forces. Since $italy_region$ is vulnerable to invasions both from across the alpine passes and our vast coastline, we must ensure the army and navy are well-prepared to face any conqueror looking to disrupt the peace of the peninsula."
  STATIC_MODIFIER_NAME_modifier_ita_influence_over_the_clergy: "Influential Clergy"
  STATIC_MODIFIER_DESC_modifier_ita_influence_over_the_clergy: "With its close proximity to the $papacy_reform$, $italy_region$ has a long tradition of powerful and talented clergy in the service of the faith. Regardless where our religious matters will take us, we should maintain good relations with our clergy."
  STATIC_MODIFIER_NAME_modifier_ita_enduring_hardship: "Hardships of War"
  STATIC_MODIFIER_DESC_modifier_ita_enduring_hardship: "The foreign interests in $italy_region$ have many times turned our lands into the battlefield of stronger countries. Sustaining our people during these times of need is a difficult task. Establishing secure locations to shelter our population during conflict will ensure their support during even the most dire wars."
  STATIC_MODIFIER_NAME_modifier_ita_flourishing_urban_centers: "Flourishing Cities"
  STATIC_MODIFIER_DESC_modifier_ita_flourishing_urban_centers: "Our lands are blessed with many highly urbanized areas. This not only offers us ample opportunity to manufacture goods, but their mercantile connections also enable us to ship them to foreign markets for our profit. Clearing any obstruction to expanding these industries will guarantee their continued success."
  STATIC_MODIFIER_NAME_modifier_ita_attractive_migration: "Appealing Landscape"
  STATIC_MODIFIER_DESC_modifier_ita_attractive_migration: "The fertile, mild land of our peninsula is a popular place for people from bordering countries to seek their fortunes. While many of our cities already rely on labor from seasonal migrants, we should increase our efforts to settle these people into our lands permanently."
  STATIC_MODIFIER_NAME_modifier_kbo_fixed_military_camps: "Fixed Military Camps"
  STATIC_MODIFIER_DESC_modifier_kbo_fixed_military_camps: "By establishing permanent military camps at strategic locations throughout our domain, we will ensure our army suffers fewer casualties from attrition and can be mobilized quickly when needed."
  STATIC_MODIFIER_NAME_modifier_kbo_permanent_sieges: "Kanem Siege Tactics"
  STATIC_MODIFIER_DESC_modifier_kbo_permanent_sieges: "Our armies are experienced with siege machinery, but adopting mobile artillery that can maintain sustained fire would secure our victory whenever we attack an enemy's walls!"
  STATIC_MODIFIER_NAME_modifier_khm_great_builders: "Hydraulic Cities"
  STATIC_MODIFIER_DESC_modifier_khm_great_builders: "Our great cities are home to many #italic barays#! and canals, primed to store and disperse water throughout the area. Constructing and maintaining this network of waterways with skill will ensure our population will thrive even during the unstable monsoon seasons."
  STATIC_MODIFIER_NAME_modifier_khm_recruitment_of_peasants: "Recruit the Peasantry"
  STATIC_MODIFIER_DESC_modifier_khm_recruitment_of_peasants: "We will need to reinforce our army with new recruits, which are easily found among the peasant class. With some training, we will be able to ensure the ranks can be refilled at any time by capable soldiers."
  STATIC_MODIFIER_NAME_modifier_khm_foreign_production_skills: "Invite Foreign Experts"
  STATIC_MODIFIER_DESC_modifier_khm_foreign_production_skills: "While our own people are not familiar with silk-weaving and prefer other fabrics, we are lucky that foreign artisans have settled in our cities and established their own weaving workshops. We should adopt this approach for other industries by directly inviting foreign artisans to bring their skills here, and thereby universally expand our production."
  STATIC_MODIFIER_NAME_modifier_khm_utilize_the_rivers: "The Lifeblood of $KHM$"
  STATIC_MODIFIER_DESC_modifier_khm_utilize_the_rivers: "Our rivers provide an excellent way to transport goods harvested and produced in our inland territories to our harbors, which are connected to foreign trade routes. Utilizing this transport network will also connect our cities and make communication between them faster."
  STATIC_MODIFIER_NAME_modifier_khm_champa_mercenaries: "Mercenary Leaders of $CHA$"
  STATIC_MODIFIER_DESC_modifier_khm_champa_mercenaries: "In the past, we both fought with and alongside the fierce warriors of $CHA$. If we can secure the service of their most capable leaders in times of conflict, we can ensure our own forces are trained and well-rested, ready to leap into battle as fresh reinforcements."
  STATIC_MODIFIER_NAME_modifier_khm_restore_angkor: "Restoration of $angkor$"
  STATIC_MODIFIER_DESC_modifier_khm_restore_angkor: "The great city of $angkor$ was once a brilliant example of our architectural genius. Due to external pressures, we had to abandon our construction efforts, but we should connect to the roots of our society and start constructing new monuments to our splendor again."
  STATIC_MODIFIER_NAME_modifier_khm_modern_navy: "A Modern Navy for $KHM$"
  STATIC_MODIFIER_DESC_modifier_khm_modern_navy: "We cannot allow others to dominate the seas and control the trade our state depends on. Let us create a new, modern naval force capable of taking on any pirate or rival navy in $south_east_asia$."
  STATIC_MODIFIER_NAME_modifier_khm_invest_in_irrigation: "Expand the Barays"
  STATIC_MODIFIER_DESC_modifier_khm_invest_in_irrigation: "While our existing water reservoirs meet our current agricultural demands, we could easily support more people if we were to dig new #italic barays#! in other parts of our country, creating the foundations for new urban hubs."
  STATIC_MODIFIER_NAME_modifier_khm_protection_from_raids: "Secure the Borders"
  STATIC_MODIFIER_DESC_modifier_khm_protection_from_raids: "Our lands are frequently threatened by invasion, and our precious $angkor$ lies especially vulnerable to siege. We must invest into a comprehensive system of fortifications, with sufficient garrisons to withstand any invading force, so that we can protect our people and national treasures from foreign conquest."
  STATIC_MODIFIER_NAME_modifier_khm_old_grudges: "Guided by Rivalry"
  STATIC_MODIFIER_DESC_modifier_khm_old_grudges: "Our people were humiliated in the past by being forced to bow to foreign invaders. While not every defeat can be avoided, we use these old rivalries to spur our people to fight harder and longer on the battlefield, burning to erase the shame of these ancient humiliations."
  STATIC_MODIFIER_NAME_modifier_reconquista_of_the_sea: "Reconquista of the Sea"
  STATIC_MODIFIER_DESC_modifier_reconquista_of_the_sea: "In our frequent clashes with fierce foreign corsairs, the thought has occurred to us that these scurvy dogs might have the right idea about looting and pillaging the coast, but they are preying on the wrong targets. Piracy may be a vile sin in peacetime, but in times of war, it is known as 'privateering,' and that is another thing altogether."
  STATIC_MODIFIER_NAME_modifier_friends_in_need: "Friends in Need"
  STATIC_MODIFIER_DESC_modifier_friends_in_need: "Our Order was formed by faithful souls from every nation in Christendom. This fact, combined with our need for external support to fulfill our missions, have made us adept at recruiting helping hands for our cause. We will take advantage of our omnipresence in $europe$ to reach the ears of powerful $catholic_adj$ rulers, and sway them to our side."
  STATIC_MODIFIER_NAME_modifier_scourge_of_the_corsairs: "Scourge of the Corsairs"
  STATIC_MODIFIER_DESC_modifier_scourge_of_the_corsairs: "The famed $turkish_culture$ privateer Hayreddin Barbarossa fought many legendary encounters against the Knights, but he was hardly the only corsair we have encountered. $turkish_culture$ raiding and looting of all of Southern $europe$, tolerated by the Barbary states and funded by the Turks, must end. The Knights will do their job protecting innocent sailors at any cost."
  STATIC_MODIFIER_NAME_modifier_crusader_tradition: "Crusader Tradition"
  STATIC_MODIFIER_DESC_modifier_crusader_tradition: "Knights of our Order were present in the wars against Saladin and defended the last Outremer Crusader outpost, $acre$. If any among us needs inspiration to do heroic deeds, they need to look only at what the Knights of the Order of the Hospital of St. John have accomplished in the past. The name Knights Hospitaller is truly eternal, as is our famed courage in battle."
  STATIC_MODIFIER_NAME_modifier_ecumenical_defenders_of_christendom: "Ecumenical Defenders of Christendom"
  STATIC_MODIFIER_DESC_modifier_ecumenical_defenders_of_christendom: "The Reformation has harmed our cause as knights from $GER$ and $scandinavian_region$ have started murmuring questions about the nature of the Communion Host, but the always-present $turkic_group$ threat has a way of making such disputes seem minor. Perhaps we should focus on defending the realm, and debate theology once the Saracen threat is safely at bay?"
  STATIC_MODIFIER_NAME_modifier_a_neverending_crusade: "A Never-Ending Crusade"
  STATIC_MODIFIER_DESC_modifier_a_neverending_crusade: "As long as any faithful $catholic_ADJ$ is in danger of religious persecution, our mission is not over! Be it during a pilgrimage to the Tomb of our Lord and Savior, or while crossing the seas and fending off corsairs, we will never stop training and never rest, ready to leap into combat at a moment's notice."
  STATIC_MODIFIER_NAME_modifier_inspired_builders: "Inspired Builders"
  STATIC_MODIFIER_DESC_modifier_inspired_builders: "While our Order's principal duty is to fight, we serve our people in other ways as well. Over the centuries, we have developed the art of rapid construction, erecting buildings and fortifications with remarkable speed. We will use this expertise to make our capital into both an impregnable fortress, and a dynamic center of culture."
  STATIC_MODIFIER_NAME_modifier_the_right_hand_pope: "The Right Hand of the Pope"
  STATIC_MODIFIER_DESC_modifier_the_right_hand_pope: "As time goes on, and the Crusades start to fade from the memory of our people, the importance of having the Pope's ear increases. We ingratiate ourselves until we are the closest confidantes to the Supreme Pontiff. Naturally, our devotion to his service will benefit us enormously — and why not enjoy our hard-won privileges?"
  STATIC_MODIFIER_NAME_modifier_a_brand_new_world: "A Brand New World"
  STATIC_MODIFIER_DESC_modifier_a_brand_new_world: "The world evolves, and those who fail to adapt are forgotten by history. Our Order has endured for over half a millennium, and we will not fade away now! Our mortal bodies will eventually join the Creator, but our Order must first become immortal. We will transform ourselves into the most modern nation of our age, strengthening ourselves from the very core."
  STATIC_MODIFIER_NAME_modifier_an_order_with_state: "An Order with a State"
  STATIC_MODIFIER_DESC_modifier_an_order_with_state: "While some nations are often described as an #italic Army with a State#!, we, on the other hand, have always been an Order with a nation, ever since our acquisition of Rhodes from the Greeks. Nevertheless, we cannot help but admire how efficiently they have harnessed their resources to become a formidable nation. Inspired by their success, we will implement reforms to ensure our military can confront any adversary with confidence."
  STATIC_MODIFIER_NAME_modifier_symbol_of_catholicism: "Symbol of $catholic$"
  STATIC_MODIFIER_DESC_modifier_symbol_of_catholicism: "$jerusalem$ is the holiest city in Christendom, the very place of Christ's Passion and Resurrection. By asserting $catholic_ADJ$ supremacy over these sacred grounds, we become the spiritual beacon of the Latin world and a pillar of the true faith."
  STATIC_MODIFIER_NAME_modifier_protectors_of_jerusalem: "Protectors of $KOJ$"
  STATIC_MODIFIER_DESC_modifier_protectors_of_jerusalem: "We stand on the frontlines of Christendom, surrounded by unbelief. It is our sacred duty to shield the Holy City and strike fear into the hearts of heathens who would dare usurp it."
  STATIC_MODIFIER_NAME_modifier_rites_holy_sepulchre: "Rites of the Holy Sepulchre"
  STATIC_MODIFIER_DESC_modifier_rites_holy_sepulchre: "In the Church of the Holy Sepulchre, the ancient Latin rites are once more performed in full splendor. These solemn rituals, honoring the death and resurrection of Christ, reinforce our divine mandate to rule this land and spread the teachings of our faith."
  STATIC_MODIFIER_NAME_modifier_latin_patriarch: "Latin Patriarch"
  STATIC_MODIFIER_DESC_modifier_latin_patriarch: "$PAP$ has reinstated the Latin Patriarch of $KOJ$, once exiled and forgotten. Now restored, the Patriarch shall strengthen our influence in $rome$ and reinforce our role as guardian of the Church's interests in the East."
  STATIC_MODIFIER_NAME_modifier_latinate_integration: "Latinate Integration"
  STATIC_MODIFIER_DESC_modifier_latinate_integration: "Our realm is a crucible of noble blood from around $europe$, zealous pilgrims, and old Levantine stock. Through careful governance, we shall weave together this diverse heritage into a Latin $christian_ADJ$ society, where faith and culture go hand in hand."
  STATIC_MODIFIER_NAME_modifier_kol_peace_in_the_city: "Peace in the City"
  STATIC_MODIFIER_DESC_modifier_kol_peace_in_the_city: "Not so long ago, our city was nearly torn apart in the struggle between our burghers and our clergy. We must ensure that this conflict cannot repeat itself, and that every member of both our court and the city council cooperate in preserving Cologne as a central hub on the Rhine."
  STATIC_MODIFIER_NAME_modifier_kol_school_of_painting: "Cologne School of Painting"
  STATIC_MODIFIER_DESC_modifier_kol_school_of_painting: "Our city is home to many capable painters and craftsmen skilled in the art of bringing images to life through the media of wood, stone, and especially glass. With the support of a strongly established artists' guild, they will thrive under our sponsorship and illuminate our city to new glory."
  STATIC_MODIFIER_NAME_modifier_kon_lineage_lukeni_lua_nimi: "Lineage of Lukeni lua Nimi"
  STATIC_MODIFIER_DESC_modifier_kon_lineage_lukeni_lua_nimi: "All things must begin somewhere, and for our kingdom, that beginning lies with Lukeni lua Nimi. He was more than a conqueror. Indeed, he was a founder, the father of our realm. His bloodline commanded respect, not just for its ancestry, but because it reminds the people who first dared to dream of a unified $KON$."
  STATIC_MODIFIER_NAME_modifier_kon_european_contact: "Contact with $europe$"
  STATIC_MODIFIER_DESC_modifier_kon_european_contact: "The strangers came from the sea with beards, books, and barrels of wine. They brought with them strange gods, stranger languages, and an entire ocean of opportunity. Our emissaries have learned their customs, their intentions, and — most importantly — how to turn their need for allies into our advantage."
  STATIC_MODIFIER_NAME_modifier_kon_cultural_syncreticism: "Cultural Syncretism"
  STATIC_MODIFIER_DESC_modifier_kon_cultural_syncreticism: "The influx of foreigners and cultural exchanges have made an impact on our society. However, we have not abandoned our own ways. We call upon deities by Kikongo names, we proudly wear our religious insignia, and our ceremonies echo with both drums and hymns. This is a vibrant example of our clarity, and the gods seem to agree."
  STATIC_MODIFIER_NAME_modifier_kon_study_european_firearms: "Study European Firearms"
  STATIC_MODIFIER_DESC_modifier_kon_study_european_firearms: "The musket may not make a man brave, but it certainly makes him fearsome. Let those in $europe$ boast of their superiority; we will buy their weapons, master their drills, and soon enough the only thing distinguishing our soldiers from theirs will be the color of their flags."
  STATIC_MODIFIER_NAME_modifier_kon_transatlantic_slave_trade: "Transatlantic $slaves_goods$ Trade"
  STATIC_MODIFIER_DESC_modifier_kon_transatlantic_slave_trade: "Prisoners and laborers are needed overseas to operate our many worksites, plantations, and mines. While this is far from a noble endeavor, none can deny the profitable nature of these exploits."
  STATIC_MODIFIER_NAME_modifier_kor_metal_movable_type: "Metal Movable Type"
  STATIC_MODIFIER_DESC_modifier_kor_metal_movable_type: "Movable type is an ancient printing technology first used by the $CHI_ADJ$ people many centuries ago. But it is the Goryeo dynasty who developed the metal form of movable type, streamlining the printing process. We can now print books with unparalleled efficiency."
  STATIC_MODIFIER_NAME_modifier_kor_court_poetry: "Court Poetry"
  STATIC_MODIFIER_DESC_modifier_kor_court_poetry: "Our aristocracy puts great emphasis on the cultural development of their spirit and mind. Literature, such as poetry in $classical_chinese_language$, is seen as greatly valuable by the court. The nobility and ruling class alike are enthusiastic about the cultural impact of the written word."
  STATIC_MODIFIER_NAME_modifier_kor_gunpowder_engines: "Gunpowder Engines"
  STATIC_MODIFIER_DESC_modifier_kor_gunpowder_engines: "Our forces have been aware of gunpowder's tactical value for centuries. Through reverse-engineering $CHI_ADJ$ designs and the innovations of Choe Museon, we have mastered both gunpowder production and the construction of machines that employ it for military use."
  STATIC_MODIFIER_NAME_modifier_kor_grand_code: "Grand Code for State Administration "
  STATIC_MODIFIER_DESC_modifier_kor_grand_code: "To ensure proper, stable governance, we must first codify exactly how the government will work. This will be the basis for our nation's first written constitution."
  STATIC_MODIFIER_NAME_modifier_kor_hangeul_alphabet: "The Hangeul Alphabet"
  STATIC_MODIFIER_DESC_modifier_kor_hangeul_alphabet: "The $korean_language$ language is so fundamentally different from any form of $chinese_language_family$ that the use of $chinese_language_family$ characters renders all except the most highly educated people illiterate. Our new alphabet is more scientific, and will allow all our people to be able to read and write in their own language."
  STATIC_MODIFIER_NAME_modifier_hyanyak_system: "Hyangyak System"
  STATIC_MODIFIER_DESC_modifier_hyanyak_system: "Agriculture is the bedrock of our economy, and therefore efficient village management is paramount. To this end, we will implement the #italic hyangyak#! system, which establishes self-governance for villages. These agreements establish behavioral standards, dispute resolution regulations, and other civil procedures aimed at creating stable, self-reliant communities."
  STATIC_MODIFIER_NAME_modifier_kor_border_defense_council: "Border Defense Council"
  STATIC_MODIFIER_DESC_modifier_kor_border_defense_council: "Our borders are constantly threatened, both by barbarians from the north and pirates from beyond the seas. To ensure our armies are always ready to meet every threat with swiftness, we will establish a council of officers dedicated to controlling and securing our borders."
  STATIC_MODIFIER_NAME_modifier_kor_geobukseon: "Geobukseon"
  STATIC_MODIFIER_DESC_modifier_kor_geobukseon: "Defending our coastlines is vital to our survival, and as a result of this vigilance, we have developed the ingenious 'turtle ship'. These heavily armored behemoths will ensure that no enemy ship penetrates our coastal holdings."
  STATIC_MODIFIER_NAME_modifier_kor_hopae_system: "The Hopae System"
  STATIC_MODIFIER_DESC_modifier_kor_hopae_system: "The #italic hopae#! is an identity tag system requiring all $korean_culture$ people to carry proof of their name, birthplace, status, and residence. This allows authorities to quickly verify identities, and to track a person's movement, if needed."
  STATIC_MODIFIER_NAME_modifier_kor_korean_cannon: "The $korean_culture$ Cannon"
  STATIC_MODIFIER_DESC_modifier_kor_korean_cannon: "Although we are already quite experienced at using gunpowder and cannon, we should not stop making technological advancements. By developing smaller, but more durable cannons, as well as inventing more efficient methods of reloading, we will revolutionize our artillery and greatly benefit both our army and our navy."
  STATIC_MODIFIER_NAME_modifier_kor_daedongbeop: "Daedongbeop"
  STATIC_MODIFIER_DESC_modifier_kor_daedongbeop: "A new set of reforms that will gradually introduce previously ignored improvements into the tax system. The tribute tax levied against households will be replaced with a unified tax on arable land, and the tax on goods will be limited to a quota which lets enterprising peasants and wholesalers make and sell surplus goods. This will result in lower taxes for the peasantry, increased revenues for the state, and an overall rise in commerce."
  STATIC_MODIFIER_NAME_modifier_krs_kurdish_tribes: "Tribal Loyalty"
  STATIC_MODIFIER_DESC_modifier_krs_kurdish_tribes: "Having asserted our authority over all $kurdish_culture$ tribes, we will be able to call upon their experienced, hardened warriors to defend our country."
  STATIC_MODIFIER_NAME_modifier_krs_legacy_of_the_kurdish_dynasties: "Legacy of the $kurdish_culture$ Dynasties"
  STATIC_MODIFIER_DESC_modifier_krs_legacy_of_the_kurdish_dynasties: "Our people have established several great dynasties, ruling territories from $egypt_region$ to Iran. Tying our own state to the glory of past rulers will allow us to be a unifying symbol for the $kurdish_culture$ people, and make our rule seem more legitimate in the eyes of our subjects."
  STATIC_MODIFIER_NAME_modifier_krs_kurdish_quarters: "Prospering $kurdish_culture$ Quarters"
  STATIC_MODIFIER_DESC_modifier_krs_kurdish_quarters: "In the times of foreign rule, many of our people established predominantly $kurdish_culture$ quarters in cities. While these areas prospered even under distant rulers, we can now utilize their wealth directly, and better guarantee a prosperous future for our people."
  STATIC_MODIFIER_NAME_modifier_krs_kurdish_horses: "Adaptable Cavalry"
  STATIC_MODIFIER_DESC_modifier_krs_kurdish_horses: "Our homelands are surrounded by many would-be conquerors, hungry to subjugate our people. While our native terrain can slow down hostile armies, it also makes it difficult for our own troops to respond to threats swiftly. A strong cavalry, however, will allow us to quickly react to any threats, no matter how many there might be."
  STATIC_MODIFIER_NAME_modifier_krs_kurdish_mercenaries: "Mercenary Experience"
  STATIC_MODIFIER_DESC_modifier_krs_kurdish_mercenaries: "Our people have long served as hired swords for foreign lords, gaining valuable combat experience in their service. With our own country now established, it is time to call those experienced fighters under our banner."
  STATIC_MODIFIER_NAME_modifier_krs_kurdish_warrior_poets: "Warrior Poets"
  STATIC_MODIFIER_DESC_modifier_krs_kurdish_warrior_poets: "Our rulers must not just be capable warriors; they must also be educated in the matters of fine art and effective administration. By writing texts and documenting their reigns, our leaders will pass the knowledge and history of our people down through generations, ensuring no valuable insight is lost."
  STATIC_MODIFIER_NAME_modifier_warlord_dukes: "Warlord Dukes"
  STATIC_MODIFIER_DESC_modifier_warlord_dukes: "Over two remarkable centuries of warfare, $LIT_ADJ$ warlord dukes transformed a loose federation of tribes into a unified warrior state. They mounted fierce resistance against the aggression of $catholic_ADJ$ holy orders, while simultaneously conquering vast territories in the East. These legendary achievements continue to inspire our military leaders today."
  STATIC_MODIFIER_NAME_modifier_two_realms: "Two Realms"
  STATIC_MODIFIER_DESC_modifier_two_realms: "Due to the size of our realm, our jurisdiction falls under two distinct frameworks: To the north lies the core of our territories, proudly embracing our cultural traditions and social mores. However, our southern and eastern regions often diverge to a certain degree from our central norms. To respect such diversity will strengthen our nation as well as our position on the geopolitical stage."
  STATIC_MODIFIER_NAME_modifier_chacery_slavonic: "Chancery Slavonic"
  STATIC_MODIFIER_DESC_modifier_chacery_slavonic: "To help connect our people across our vast realm, we need a unified language, and require many literate members of the clergy to spread it. The development of such a language to record our history and maintain our administrative apparatus is not only a sign of national pride and prestige, but also a means of creating a distinct government, separating us linguistically and culturally from our neighbors to the east."
  STATIC_MODIFIER_NAME_modifier_supremus_dux_lithuaniae: "'Supremus Dux Lithuaniae'"
  STATIC_MODIFIER_DESC_modifier_supremus_dux_lithuaniae: "If we are to defend ourselves against our aggressive $polish$ and $russian_group$ foes, we must project strength! Establishing the title of #italic Supreme Duke of Lithuania#! will decisively assert our authority, especially against the growing power of our nobility and others who seek to violate our sovereignty."
  STATIC_MODIFIER_NAME_modifier_ties_with_the_holy_see: "Holy See Ties"
  STATIC_MODIFIER_DESC_modifier_ties_with_the_holy_see: "Years of negotiations with the Holy Father have resulted in our embracing $catholic$, with the blessing of our $polish$ neighbors and the Pope himself, during a turbulent and unique Christianization process. After our struggle to seek our spiritual identity subsided, it is clear that we have become a beacon of $catholic$, a shield against the heathens and heretics that threaten our society."
  STATIC_MODIFIER_NAME_modifier_patriarchate_of_lithuania: "Patriarchate of $LIT$"
  STATIC_MODIFIER_DESC_modifier_patriarchate_of_lithuania: "The abolition of $romuva$, a faith embraced by our ancestors, has shaken the very foundations of $LIT_ADJ$ society. Yet, in order to secure a brighter future, we have chosen the path of $orthodox$ and fully celebrate our new identity. But if we are to be successful in that, the religious authorities of our newfound $orthodox_ADJ$ faith must maintain autonomy from foreign patriarchates in order to avoid external interference."
  STATIC_MODIFIER_NAME_modifier_lithuanian_renaissance: "$LIT_ADJ$ $renaissance$"
  STATIC_MODIFIER_DESC_modifier_lithuanian_renaissance: "$LIT$ experienced a $renaissance$ in the late 15th and early 16th centuries. Inspired by the ideas of the Reformation and influenced by the $ITA_ADJ$ $renaissance$, there was a prolific flourishing of education, arts, architecture, and literature during this era. This period will also see the creation of a written form of $lithuanian_dialect$ and, subsequently, the first works of $lithuanian_dialect$ literature."
  STATIC_MODIFIER_NAME_modifier_columns_of_gediminids: "Columns of $gediminid_dynasty$s"
  STATIC_MODIFIER_DESC_modifier_columns_of_gediminids: "The coat of arms that hangs on our banners originates from one of our most celebrated dynasties, the $gediminid_dynasty$ family. Many of their brightest have led our nation through turbulent times into ample prosperity with careful statesmanship and capable guidance. The columns of such great leaders symbolize the strong foundation and tenacity of our country and our fellow men and women."
  STATIC_MODIFIER_NAME_modifier_lva_baltic_forestry: "Baltic Forestry"
  STATIC_MODIFIER_DESC_modifier_lva_baltic_forestry: "Our forests are a vital resource, providing timber for construction and fuel for our fires. We must manage them wisely to ensure their continued abundance."
  STATIC_MODIFIER_NAME_modifier_lva_baltic_forts: "Baltic Forts"
  STATIC_MODIFIER_DESC_modifier_lva_baltic_forts: "Our network of forts and castles scattered across the landscape provides a first line of defense against invaders. These strongholds allow us to monitor and control key routes through the Baltic."
  STATIC_MODIFIER_NAME_modifier_lor_three_bishoprics: "Land of Bishops"
  STATIC_MODIFIER_DESC_modifier_lor_three_bishoprics: "$LOR$ is home to many bishops with powerful supporters abroad and within the Church itself. Cooperating with them will be useful when making our voice heard within the broader Church. Having the support of the bishops will also help us to pacify the population more easily."
  STATIC_MODIFIER_NAME_modifier_lor_between_great_powers: "Legacy of Old Kings"
  STATIC_MODIFIER_DESC_modifier_lor_between_great_powers: "Our lands were once an important part of Lotharingia, one of the Frankish kingdoms. If we do not want to fall into irrelevance, we will need to secure our diplomatic position and establish lasting alliances."
  STATIC_MODIFIER_NAME_modifier_lor_fortified_cities: "Fortified Cities of $LOR$"
  STATIC_MODIFIER_DESC_modifier_lor_fortified_cities: "We occupy vital crossing points on several rivers, which we must defend at all costs if we want to secure our independence. To this effect, we must modernize the large bridge castles of our cities, and construct large citadels at strategic points."
  STATIC_MODIFIER_NAME_modifier_mai_leader_rheinish_league: "Rheinish League"
  STATIC_MODIFIER_DESC_modifier_mai_leader_rheinish_league: "When the Rheinish League was active, we naturally assumed a position of leadership and guidance for the other members. Although the League itself has disbanded, we must do everything we can to maintain our influence over our former associates."
  STATIC_MODIFIER_NAME_modifier_mai_zealous_fight_against_heretics: "Protect Our Faith"
  STATIC_MODIFIER_DESC_modifier_mai_zealous_fight_against_heretics: "Our country's religious unity must be defended against any threat. If we provide our armies with moral guidance in the form of military chaplains, they will be much more motivated to defend our beliefs."
  STATIC_MODIFIER_NAME_modifier_mai_vicar_of_mainz: "Governance of the Vicar"
  STATIC_MODIFIER_DESC_modifier_mai_vicar_of_mainz: "To ensure our lands are governed reliably, even in the absence of our ruler, we should instate a vicar. Empowered with extensive rights, the vicar can rule with our best intentions and remind the common folk of our presence at all times."
  STATIC_MODIFIER_NAME_modifier_mai_mainz_kingdom: "Mainzer Königreich"
  STATIC_MODIFIER_DESC_modifier_mai_mainz_kingdom: "While celebrations on Ash Wednesday are a common occurrence, they hold especially deep roots in our country. While the public celebrates the #italic Fastnacht#!, or carnival, with masquerade and excessive feasts, our court will engage in a special event. During the carnival celebrations, we will redistribute the roles of our court per lottery, with even the ruler having to participate. This custom of swapping roles, called #italic Mainzer Königreich#!, will spread far beyond our borders and help expand our cultural legacy."
  STATIC_MODIFIER_NAME_modifier_mai_center_of_printing: "Printing Shops of $mainz$"
  STATIC_MODIFIER_DESC_modifier_mai_center_of_printing: "By expanding our already-growing printing industry, we can become the leading producer of books in $europe$."
  STATIC_MODIFIER_NAME_modifier_mai_garrison_of_the_rhine: "Garrison of the Rhine"
  STATIC_MODIFIER_DESC_modifier_mai_garrison_of_the_rhine: "Defending our borders can be a difficult task, especially considering the river splitting our land in two. We must build an extensive network of garrisons and fortifications that can withstand our enemies."
  STATIC_MODIFIER_NAME_modifier_foreign_architectural_influence: "Foreign Architectural Influence"
  STATIC_MODIFIER_DESC_modifier_foreign_architectural_influence: "In our many conquests across $indonesia_region$, we have encountered many new and incredible forms of art, all of which could be adopted and refined by our people to further our legacy. By introducing new techniques and sponsoring artists, our culture will come to exemplify the artistic achievements of our region."
  STATIC_MODIFIER_NAME_modifier_maj_sumpah_palapa: "Sumpah Palapa"
  STATIC_MODIFIER_DESC_modifier_maj_sumpah_palapa: "The head of our military directly answers to our ruler, and holds enough influence and power to shape the future of our realm. To ensure they understand what an important role they have been given, they are required to swear a special oath, one that underlines our dreams of conquest and bolsters our spirits."
  STATIC_MODIFIER_NAME_modifier_maj_the_magic_arrow: "The Magic Arrow"
  STATIC_MODIFIER_DESC_modifier_maj_the_magic_arrow: "$a_cetbang_cannon_desc$"
  STATIC_MODIFIER_NAME_modifier_maj_maritime_silk_road: "Maritime Silk Road"
  STATIC_MODIFIER_DESC_modifier_maj_maritime_silk_road: "Our geographical position, complemented by our growing influence, has led to us presiding over the extensive and profitable trade network that carries $silk$ and $spices$ from East to West."
  STATIC_MODIFIER_NAME_modifier_maj_restore_candi_shrines: "Restore Candi Shrines"
  STATIC_MODIFIER_DESC_modifier_maj_restore_candi_shrines: "Scattered throughout Nusantara are a series of temples known as #italic candi#!. We should restore these temples wherever we find them to renew our people's faith."
  STATIC_MODIFIER_NAME_modifier_maj_island_colonies: "Island Colonies"
  STATIC_MODIFIER_DESC_modifier_maj_island_colonies: "Contact with our neighbors in the archipelago has shown us clearly that the raw resources and unclaimed lands are ripe for the taking, promising to become secure and prosperous under our control."
  STATIC_MODIFIER_NAME_modifier_maj_preservation_of_javanese_history: "Preservation of $javanese_culture$ History"
  STATIC_MODIFIER_DESC_modifier_maj_preservation_of_javanese_history: "The history of the $javanese_culture$ people is an integral part of our cultural identity. To protect this identity, we must preserve the traditions upon which we built our great country."
  STATIC_MODIFIER_NAME_modifier_gold_of_bure: "Gold of Bure"
  STATIC_MODIFIER_DESC_modifier_gold_of_bure: "The twin gold fields at Bambuk and Bure are renowned as the largest gold deposits anyone has ever heard of, and they belong to us! Bure's gold mines in particular produced fantastic wealth that famously destabilized the entire Egyptian economy through inflation when Mansa Mūsā visited there. Our economy, though, is used to a constant influx of gold, and is more difficult to inflate."
  STATIC_MODIFIER_NAME_modifier_reclamation_of_land: "Reclamation of Land"
  STATIC_MODIFIER_DESC_modifier_reclamation_of_land: "The Sahara is not static. It can wax and wane depending on rainfall, and the habitable belt known as the $sahel_region$, where we reside, can grow or shrink accordingly. A major drought could render much of our kingdom useless desert, an addition to the Sahara where no one reigns but death. However, in good years, we might reclaim some of the marginal lands from the Sahara and make it productive again."
  STATIC_MODIFIER_NAME_modifier_accounts_of_the_atlantic_voyage: "Accounts of the Atlantic Voyage"
  STATIC_MODIFIER_DESC_modifier_accounts_of_the_atlantic_voyage: "According to the legendary Mansa Mūsā, his predecessor started a journey across the $atlantic_ocean_continent$ in hopes of discovering the furthest limits of the ocean. While some among the ruling class consider this endeavor a shameful abdication of duty, others see this as inspiration to explore corners of the world previously unknown to man."
  STATIC_MODIFIER_NAME_modifier_mandinka_warrior_spirit: "Mandinka Warrior Spirit"
  STATIC_MODIFIER_DESC_modifier_mandinka_warrior_spirit: "Whether pagan or $muslim_ADJ$, Mandinka men have been the greatest fighters the $sahel_region$ has ever seen. The courage of our troops is admirable, as is their pride. When the Mansa raises an army, not only is it the largest in all the $sahel_region$, it is the best!"
  STATIC_MODIFIER_NAME_modifier_markets_for_salt: "Markets for $salt$"
  STATIC_MODIFIER_DESC_modifier_markets_for_salt: "In our kingdom, $salt$ is worth its cost in gold. But south of us, in the great forests of the Ashanti and the Yoruba, salt is worth considerably #italic more#! than gold. Luckily for us, we have our own supply of $salt$, and enough gold to obtain as much as we could ever want. Perhaps we could find yet more markets of people for whom $salt$ is more valuable than gold?"
  STATIC_MODIFIER_NAME_modifier_west_african_slave_trade: "West African Slave Trade"
  STATIC_MODIFIER_DESC_modifier_west_african_slave_trade: "Even before our Empire existed, the great Wagadou, the Ghana Empire that preceded us, sold $slaves_goods$ across the desert to the Arabs. We have followed suit all these years, supplying the Arab world with a vast number of $slaves_goods$. Now the Europeans clamor for even more $slaves_goods$ to work their holdings in the so-called New World. We have had little report, but the amount of $slaves_goods$ they demand is truly stunning, and they keep coming back, sometimes even raiding our shores and abducting our subjects. The time has come to impose order on this trade and restrict the Europeans to select commercial ports where they will purchase, not steal, $slaves_goods$."
  STATIC_MODIFIER_NAME_modifier_kashif: "Kāshif"
  STATIC_MODIFIER_DESC_modifier_kashif: "Our Sultanate is enormous, and therefore we must make wise, careful choices about its administration. To employ particularly learned individuals as local governors is a brilliant move, one that should eventually tip the geopolitical scales in our favor."
  STATIC_MODIFIER_NAME_modifier_royal_mamluks: "The Royal Mamluks"
  STATIC_MODIFIER_DESC_modifier_royal_mamluks: "The Royal Mamluks are the elite core of the Mamluk army, serving as the Sultan's personal guard. Handpicked and rigorously trained, they are renowned for their loyalty, exceptional combat skills, and unwavering dedication."
  STATIC_MODIFIER_NAME_modifier_red_sea_trade: "Red Sea Trade"
  STATIC_MODIFIER_DESC_modifier_red_sea_trade: "The spice trade flowing through the Red Sea is a key source of our wealth, and we must seize full control of it. By threatening to burn down any Red Sea ports outside our authority that accept spice traders, we can capture the lion's share of this lucrative commerce. We may not win many friendships with our aggression, but we shall have gold enough to comfort us."
  STATIC_MODIFIER_NAME_modifier_masters_of_the_nile: "Masters of the Nile"
  STATIC_MODIFIER_DESC_modifier_masters_of_the_nile: "The heart-vein of our Sultanate is the river Nile. Traversing our nation, its touch creates our most fertile lands, and its life-bringing waters of the river channel prosperity and ample wealth throughout our domain."
  STATIC_MODIFIER_NAME_modifier_indian_networks: "Indian Networks"
  STATIC_MODIFIER_DESC_modifier_indian_networks: "Our merchants deal in goods from the markets of $alexandria$, to the shores of Aden, and as far away as $india$ itself. These extensive networks of contacts, business, and capital have positioned us at the forefront of maritime commerce."
  STATIC_MODIFIER_NAME_modifier_study_foreign_gunpowder_techniques: "Foreign Gunpowder"
  STATIC_MODIFIER_DESC_modifier_study_foreign_gunpowder_techniques: "The great empires of $europe$ and the East have made groundbreaking advances in the use of gunpowder and its military applications. To study their ways and make the according improvements to our own armaments would greatly strengthen our own military."
  STATIC_MODIFIER_NAME_modifier_port_customs: "Port Customs"
  STATIC_MODIFIER_DESC_modifier_port_customs: "Designating our ports as official merchant zones for incoming cargo is a move that will certainly increase the mercantile significance of our territory, albeit at the expense of our neighbors and foes alike."
  STATIC_MODIFIER_NAME_modifier_secure_mediterranean_ports: "Secure Mediterranean Ports"
  STATIC_MODIFIER_DESC_modifier_secure_mediterranean_ports: "Our ports across the Mediterranean Sea are some of the most affluent in the entire region. Merchants from every corner of the known world travel to $alexandria$ and Cairo to deal in spices, $silk$, and precious stones. The creation of a merchant navy to facilitate and protect our maritime avenues would therefore be a wise idea."
  STATIC_MODIFIER_NAME_modifier_shadow_of_ambition: "Shadow of Ambition"
  STATIC_MODIFIER_DESC_modifier_shadow_of_ambition: "The unification of the Jurchen tribes is but the first step in our ambitious rise to power. Soon, our name will strike fear and awe across the entire continent."
  STATIC_MODIFIER_NAME_modifier_niyamniyan: "Niyamniyan"
  STATIC_MODIFIER_DESC_modifier_niyamniyan: "The tradition of the Five Noble Talents involves riding, archery, military command, loyalty, and discipline. These aspects of our martial society form the backbone of our proud culture."
  STATIC_MODIFIER_NAME_modifier_southern_campaigns: "Southern Campaigns"
  STATIC_MODIFIER_DESC_modifier_southern_campaigns: "$CHI$ is home to immeasurable wealth, prestige, and knowledge. Under the rule of a weak dynasty, it falls upon our shoulders to seize power and return the prosperity and splendor of these lands."
  STATIC_MODIFIER_NAME_modifier_foreign_learning: "Foreign Learning"
  STATIC_MODIFIER_DESC_modifier_foreign_learning: "From foreign scholars and texts, we shall adopt new administrative, military, and scholarly practices, accelerating the pace of our technological development."
  STATIC_MODIFIER_NAME_modifier_meissner_groschen: "Meißner Groschen"
  STATIC_MODIFIER_DESC_modifier_meissner_groschen: "The #italic Meißner groschen#! will serve as our national currency. This coin is based on the #italic Prague groschen#!, which we will replace. This new large groschen will mark the beginning of a new era in the history of our coinage and will let us better control its influxes."
  STATIC_MODIFIER_NAME_modifier_a_resilient_soul: "A Resilient Soul"
  STATIC_MODIFIER_DESC_modifier_a_resilient_soul: "Our people are truly resilient, embodying unwavering determination in the face of challenges. They weather adversity with unwavering spirit, finding strength in unity and a steadfast commitment to their shared values. Their indomitable resilience propels us forward, enabling us to overcome any obstacle that comes our way. We will always emerge stronger and more determined than ever before."
  STATIC_MODIFIER_NAME_modifier_saxon_court: "The $SAX_ADJ$ Court"
  STATIC_MODIFIER_DESC_modifier_saxon_court: "The $SAX_ADJ$ Court is a pillar of Electoral $SAX$'s government, alongside civil and military administration. Court regulations define the responsibilities and daily routines of officials, while the court itself is composed of both nobles and peasants serving the ruling family in governance and administration. Traditionally, each adult member of the ruling family maintained their own household court, but we will now create a single, permanent court in our capital, attracting the finest minds in the realm."
  STATIC_MODIFIER_NAME_modifier_a_tolerant_society: "A Tolerant Society"
  STATIC_MODIFIER_DESC_modifier_a_tolerant_society: "Religious infighting and intolerance plagues other lands, but we stand firm against allowing such strife to fester in our realm. Regardless of the diverse faiths our subjects hold, this nation shall be built on the strong pillars of tolerance and brotherhood, fostering a harmonious coexistence among all communities. United by a common vision, we will be forging a nation where respect and understanding flourish, paving the way for a prosperous future."
  STATIC_MODIFIER_NAME_modifier_furstenschule: "Fürstenschule"
  STATIC_MODIFIER_DESC_modifier_furstenschule: "As the Reformation takes hold and the state assumes control over religious administration, a new responsibility arises for the emerging state: education, which was previously the duty of the Church. We will found princely schools at Pforta, $grimma$, and $meissen$ using former monastic properties. Thus, the state will take on a significant role in shaping the educational landscape, fostering knowledge and intellectual growth for the future leaders of $SAX$."
  STATIC_MODIFIER_NAME_modifier_bonded_by_loyalty: "Bonded by Loyalty"
  STATIC_MODIFIER_DESC_modifier_bonded_by_loyalty: "Our valiant armies never waver! They demonstrate exceptional morale and loyalty, standing firm whether defending our realm or supporting allies. With indomitable spirits, they will press forward even in desperate circumstances, refusing defeat until physically unable to continue."
  STATIC_MODIFIER_NAME_modifier_meissner_porcelain: "Meissner $porcelain$"
  STATIC_MODIFIER_DESC_modifier_meissner_porcelain: "$SAX$ is the first country in $europe$ to produce $porcelain$, which will bring wealth and prestige to the $wettin_dynasty$ court."
  STATIC_MODIFIER_NAME_modifier_saxon_baroque: "$SAX_ADJ$ Baroque"
  STATIC_MODIFIER_DESC_modifier_saxon_baroque: "$dresden$ and $leipzig$, among other locales, have gained international recognition for being centers of $SAX_ADJ$ Baroque culture. Magnificent architecture, like the Dresdner Hof, epitomize the grandeur of $SAX$, while Johann Sebastian Bach's work has transformed $leipzig$ into a city of music and thriving highbrow culture. The region boasts unique expressions of culture, including handicrafts from the Ore Mountains and culinary traditions like the #italic Dresdner Christstollen#!."
  STATIC_MODIFIER_NAME_modifier_retablissement: "Rétablissement"
  STATIC_MODIFIER_DESC_modifier_retablissement: "After tumultuous wars, a new era dawns upon $SAX$ — the remarkable $SAX_ADJ$ #italic Rétablissement#!. Amidst the ruins of our past, our nation will rise like a phoenix, rebuilding its shattered economy and charting a path toward prosperity. Driven by a blend of visionary state reforms and disciplined spending, our nation will emerge as a commercial hub.\n\nWith unparalleled administrative prowess and a strategic focus on economic growth, this resolute transformation will mark a pivotal moment in history, shaping the destiny of $SAX$ well into the future."
  STATIC_MODIFIER_NAME_modifier_saxon_industrialization: "$SAX_ADJ$ Industrialization"
  STATIC_MODIFIER_DESC_modifier_saxon_industrialization: "$SAX$'s successful early industrialization is evident, with a highly developed industrial sector compared to other regions. The manufactory system, producing mainly for export, has flourished and will make $SAX$ a leading state in $GER$'s industrialization process. The emergence of smaller commercial landscapes and trade will be instrumental in promoting the region's economic growth and connections to other markets in $europe$."
  STATIC_MODIFIER_NAME_modifier_mge_pax_mongolica: "Pax Mongolica"
  STATIC_MODIFIER_DESC_modifier_mge_pax_mongolica: "Having unified all $mongolian_culture$ territories under our banner, the stability and prosperity our people will be able to enjoy has not been seen since the times of the great $genghis_khan_name_no_tooltip$."
  STATIC_MODIFIER_NAME_modifier_mge_all_under_a_khan: "All Under a $rank_kingdom_horde_ruler_suffix_male$"
  STATIC_MODIFIER_DESC_modifier_mge_all_under_a_khan: "$genghis_khan_name_no_tooltip$ unified great swathes of territory under his banner. Having unified those territories again under the authority of a single $rank_kingdom_horde_ruler_suffix_male$, all people in our empire shall swear allegiance to us."
  STATIC_MODIFIER_NAME_modifier_mge_ghostly_horses_of_the_plain: "Ghostly Horses of the Plain"
  STATIC_MODIFIER_DESC_modifier_mge_ghostly_horses_of_the_plain: "The prowess of $mongolian_culture$ horsemen is renowned across the entire world. Our enemies shake in terror at the sight of a dust cloud in the distance, fearing that it might signify our cavalry's approach!"
  STATIC_MODIFIER_NAME_modifier_mge_yeke_mongol_ulus: "Yeke Mongol Ulus"
  STATIC_MODIFIER_DESC_modifier_mge_yeke_mongol_ulus: "As the original Mongols, we restored the #italic Yeke Mongol Ulus#!, the Great Mongolian State, resurrecting the glory of $genghis_khan_name_no_tooltip$'s great empire. Given the slightest chance, our people will emulate the exploits of the Great $rank_kingdom_horde_ruler_suffix_male$ and reclaim his legacy, reuniting the once-vast territories of the $MGE_ADJ$ Khanate."
  STATIC_MODIFIER_NAME_modifier_mge_life_of_steppe_warrior: "The Life of a Steppe Warrior"
  STATIC_MODIFIER_DESC_modifier_mge_life_of_steppe_warrior: "The steppe is a foreboding and unforgiving place for the unprepared. We are accustomed to living in this harsh environment, and as such our people are sturdy and have a knack for survival. We will ensure that all of our soldiers share these skills, and are thus able to more easily survive extreme situations."
  STATIC_MODIFIER_NAME_modifier_mge_multicultural_empire: "Multicultural Empire"
  STATIC_MODIFIER_DESC_modifier_mge_multicultural_empire: "The territories of the great $MGE_ADJ$ Empire are home to many different peoples, all unified under the glory of the mighty $rank_kingdom_horde_ruler_suffix_male$."
  STATIC_MODIFIER_NAME_modifier_mge_improved_yam_system: "Improved Yam System"
  STATIC_MODIFIER_DESC_modifier_mge_improved_yam_system: "The system of #italic yam#! posts all over our empire have facilitated communication and logistics since the times of the great $genghis_khan_name_no_tooltip$. After re-establishing and improving this system, our messengers can cross the massive expanse of our empire at speeds that were not even thought possible before."
  STATIC_MODIFIER_NAME_modifier_mge_mongolian_mobility: "Mongolian Mobility"
  STATIC_MODIFIER_DESC_modifier_mge_mongolian_mobility: "Each of our soldiers typically maintains three or four horses, allowing them to change each time their mount becomes tired, and thereby travel at high speed for days without stopping. Furthermore, their extra mounts provide them with food reserves through mare's milk as well as horse meat, making our armies far less vulnerable to starvation than other, so-called civilized nations' armies. This allows us to outmaneuver our enemies with ease, covering a staggering amount of territory in shorter periods than they had believed to be possible."
  STATIC_MODIFIER_NAME_modifier_mge_kheshig: "The Kheshig"
  STATIC_MODIFIER_DESC_modifier_mge_kheshig: "The #italic Kheshig#! once formed the formidable bodyguard of the Great $MGE_ADJ$ $rank_kingdom_horde_ruler_suffix_male$. Their descendants will continue to protect the $rank_kingdom_horde_ruler_suffix_male$ of $MGE$ as they ride into battle."
  STATIC_MODIFIER_NAME_modifier_mge_glory_of_the_khan: "Glory of the $rank_kingdom_horde_ruler_suffix_male$"
  STATIC_MODIFIER_DESC_modifier_mge_glory_of_the_khan: "The extraordinary $genghis_khan_name_no_tooltip$ amassed a huge army like never before seen. We are heirs to his glory, and therefore our army will outstrip even the greatest $MGE_ADJ$ hordes of the past."
  STATIC_MODIFIER_NAME_modifier_congregation_of_merchants: "Congregation of Merchants"
  STATIC_MODIFIER_DESC_modifier_congregation_of_merchants: "From $arabia_region$ to China and the coasts of $south_asia$, merchants of every shore converge upon $malacca$. Drawn by fair laws, secure waters, and bustling markets, they will form a great congregation that enriches our ports and carries our name across the seas."
  STATIC_MODIFIER_NAME_modifier_connections_with_china: "Connections with China"
  STATIC_MODIFIER_DESC_modifier_connections_with_china: "Our envoys have secured recognition from China's most prestigious sovereigns. Tribute and goodwill flow between us, granting us prestige, protection, and a privileged place in the vast network of their trade."
  STATIC_MODIFIER_NAME_modifier_control_the_malacca_strait: "Control the Malacca Strait"
  STATIC_MODIFIER_DESC_modifier_control_the_malacca_strait: "The narrow $inner_strait_malacca$ is the backbone of our maritime commerce. By controlling this vital strait, we channel the wealth of nations into our harbors and establish ourselves as the unrivaled gatekeepers of the east-west trade."
  STATIC_MODIFIER_NAME_modifier_renaissance_prince: "$renaissance$ Prince"
  STATIC_MODIFIER_DESC_modifier_renaissance_prince: "Other rulers in $italy_region$ may pay lip service to their support of the cultural rebirth that manifests itself before us; let $MLO$ emerge as its heart under our patronage."
  STATIC_MODIFIER_NAME_modifier_patron_of_music: "Patron of Music"
  STATIC_MODIFIER_DESC_modifier_patron_of_music: "The musical arts have been sadly neglected by other princes. We, by contrast, shall patronize music for the glory of God and ourselves, and $MLO$ will shine as a result."
  STATIC_MODIFIER_NAME_modifier_lowered_power_of_barons: "Lowered Baronial Power"
  STATIC_MODIFIER_DESC_modifier_lowered_power_of_barons: "Art and culture are valuable things, but if we wish to remain independent, what we really need is #italic money#!. To acquire what we need, we must diminish the power of regional nobility, and ensure that more money flows into the center of our state."
  STATIC_MODIFIER_NAME_modifier_age_of_condottieri: "The Age of the Condottieri"
  STATIC_MODIFIER_DESC_modifier_age_of_condottieri: "With mercenaries forming the mainstay of so many armies, we would be wise to ensure that we too have soldiers of fortune at our disposal. Let us ensure that passing mercenary captains are warmly welcomed in $MLO$, so they remember us fondly when our need for them arises."
  STATIC_MODIFIER_NAME_modifier_encouragement_of_philosophers: "Encouragement of Philosophers"
  STATIC_MODIFIER_DESC_modifier_encouragement_of_philosophers: "We in $MLO$ have long been supporters of $renaissance$ thought. We should continue this tradition by extending patronage to and building facilities for the finest thinkers in all of $europe$. Hopefully, that will draw them here."
  STATIC_MODIFIER_NAME_modifier_merchant_princes: "Merchant Princes"
  STATIC_MODIFIER_DESC_modifier_merchant_princes: "The great coastal cities of $ITA$ have long benefited from great trade networks bringing wealth and power to their shores. Our country may not be on the coast, but it does not mean that $MLO$ cannot get its own share of the maritime trade. Let it be known that any wealthy trades who go forth and bring back the riches of the world will be looked upon with favor at the court of $MLO$."
  STATIC_MODIFIER_NAME_modifier_rulership_of_enlightened_principals: "Rulership Through Enlightened Principals"
  STATIC_MODIFIER_DESC_modifier_rulership_of_enlightened_principals: "Enlightenment philosophers have inspired new theories of governance. By structuring our government along those principles of merit, justice, and efficiency, we will enjoy greater support. At least, among those who actually matter..."
  STATIC_MODIFIER_NAME_modifier_milanese_ambition: "A New $lombard$ Kingdom"
  STATIC_MODIFIER_DESC_modifier_milanese_ambition: "The glory of the previous $lombard$ Kingdom pales in comparison to what the people of $MLO$ have managed to achieve, and what they are still entitled to receive. All shall bow before us!"
  STATIC_MODIFIER_NAME_modifier_mor_marabouts: "Ṣūfī Marabouts"
  STATIC_MODIFIER_DESC_modifier_mor_marabouts: "Several groups of Ṣūfī teachers have made Morocco their home. We must make sure that we accommodate these holy men, and take their teachings to heart."
  STATIC_MODIFIER_NAME_modifier_trans_saharan_trade: "Trans-Saharan Trade"
  STATIC_MODIFIER_DESC_modifier_trans_saharan_trade: "The caravans of the great Saharan routes trade $salt$ and other goods from $north_africa$ for $slaves_goods$ and $goods_gold$ from the Sub-Saharan kingdoms. Through these valuable avenues of coin, we will build our great legacy."
  STATIC_MODIFIER_NAME_modifier_first_fleet_of_the_med: "First Fleet of the Mediterranean"
  STATIC_MODIFIER_DESC_modifier_first_fleet_of_the_med: "The great al-Muwaḥḥidūn once prided themselves upon owning one of the most formidable navies in the entire Mediterranean Sea. Our people today still possess the traditions and expertise to reignite that passion and restore our greatness across the oceans."
  STATIC_MODIFIER_NAME_modifier_slave_soldiers: "Slave Soldiers"
  STATIC_MODIFIER_DESC_modifier_slave_soldiers: "To ensure a loyal corps of well-trained standing troops, we will employ disciplined slave soldiers from within our society."
  STATIC_MODIFIER_NAME_modifier_desert_power: "Desert Power"
  STATIC_MODIFIER_DESC_modifier_desert_power: "Our region is inhabited by many peasants and tribal groups, who represent the lower classes of our society. Despite their relative poverty, they command great influence over trade routes that cross the barren deserts between our cities. Bringing these people under our jurisdiction, and ensuring their allegiance, will help us establish ourselves as powerful scions of the desert."
  STATIC_MODIFIER_NAME_modifier_atlantic_trade_routes: "Atlantic Trade Routes"
  STATIC_MODIFIER_DESC_modifier_atlantic_trade_routes: "Successfully navigated by sailors starting from $europe$, these new maritime routes have opened the floodgates to goods and coin from both the New World and the Far East."
  STATIC_MODIFIER_NAME_modifier_foreign_politics: "Foreign Politics"
  STATIC_MODIFIER_DESC_modifier_foreign_politics: "To prevail over our foes, we must establish proper diplomatic channels and official cooperation with countries that share our animosity towards them."
  STATIC_MODIFIER_NAME_modifier_saharan_gold_trade: "Saharan $goods_gold$ Trade"
  STATIC_MODIFIER_DESC_modifier_saharan_gold_trade: "The $goods_gold$ mined within our territory is of superior quality, and an excellent tool with which to further spread our influence over trade routes with foreign ports."
  STATIC_MODIFIER_NAME_modifier_shurfa_status: "Shurfā' Status"
  STATIC_MODIFIER_DESC_modifier_shurfa_status: "The most revered and prestigious amongst all those who inhabit the $muslim_ADJ$ world, there are not many who can proclaim themselves descendants of the Great Prophet. We, of course, are among these blessed few."
  STATIC_MODIFIER_NAME_modifier_maghrebi_administration: "Maghrebi Administration"
  STATIC_MODIFIER_DESC_modifier_maghrebi_administration: "Centuries of autonomy and our harsh environment have bred separatist tendencies among regional tribes within our borders. Maghrebi administration addresses this through creating a network of regional governors, who enforce central authority and the ruler's will while respecting local customs."
  STATIC_MODIFIER_NAME_modifier_seat_of_metropolitan_bishop: "Seat of the Metropolitan Bishop"
  STATIC_MODIFIER_DESC_modifier_seat_of_metropolitan_bishop: "The $RUS_ADJ$ people need firm religious guidance. We have historically cooperated well with the Church, and expanding this relationship would benefit us all. If we can move the seat of the Metropolitan Bishop to $moscow$, we will be able to strengthen the bonds between our faith and our state."
  STATIC_MODIFIER_NAME_modifier_pomestnoe_voisko: "Pomestnoe Voisko"
  STATIC_MODIFIER_DESC_modifier_pomestnoe_voisko: "By redistributing plots of confiscated lands to noble cavalrymen, we can build a new class of soldiers to defend our principality."
  STATIC_MODIFIER_NAME_modifier_strength_of_the_boyars: "Strength of the Boyars"
  STATIC_MODIFIER_DESC_modifier_strength_of_the_boyars: "The Boyar class is in many ways the foundation of $RUS$, but just as we need to strengthen the Boyars, we also need to control them. We must protect seats for the Boyars in the Duma, but also to make sure that they are dependent on us to further their influence."
  STATIC_MODIFIER_NAME_modifier_zasechnaya_cherta: "Zasechnaya Cherta"
  STATIC_MODIFIER_DESC_modifier_zasechnaya_cherta: "In order to withstand the constant threat of Tatar raids, our ancestors have built a line of tightly positioned and well-defended forts. As our state grows larger, we should keep expanding this 'Abatis Line' to ensure our people are always protected from foreign attacks."
  STATIC_MODIFIER_NAME_modifier_hurricane_hardy: "Hurricane Hardy"
  STATIC_MODIFIER_DESC_modifier_hurricane_hardy: "The designs of Feodor Apraksin are robust and resilient, enabling ships to weather most storms that Mother Nature is able to conjure. The innovative construction greatly contributes to any burgeoning maritime ambitions."
  STATIC_MODIFIER_NAME_modifier_preobrazhensky_semyonovsky_imperial_guard: "Preobrazhensky Semyonovsky Imperial Guard"
  STATIC_MODIFIER_DESC_modifier_preobrazhensky_semyonovsky_imperial_guard: "The 'Toy Army' is organized into elite companies, forming the Imperial Guard which protects the interests of the monarchy. They are frequently involved in court ceremonies, parades, and other significant events, showcasing their importance beyond their military duties."
  STATIC_MODIFIER_NAME_modifier_mos_patrol_the_territories: "Organized Levies"
  STATIC_MODIFIER_DESC_modifier_mos_patrol_the_territories: "Governing the vast expanse of $russian_region$ is no easy task. We should establish local recruitment centers to make drafting levies into our armies easier."
  STATIC_MODIFIER_NAME_modifier_imperatorskiy_moskovskiy_universitet: "Imperatorskiy Moskovskiy Universitet"
  STATIC_MODIFIER_DESC_modifier_imperatorskiy_moskovskiy_universitet: "The Imperial University is dedicated to the study of philosophy, medicine, and law, and plays a significant role in $RUS_ADJ$ education and research. It is established as part of educational reforms conceived by polymath Mikhail Lomonosov, emphasizing the importance of scientific inquiry and innovation."
  STATIC_MODIFIER_NAME_modifier_malay_merchants_in_every_port: "Malay Merchants in Every Port"
  STATIC_MODIFIER_DESC_modifier_malay_merchants_in_every_port: "From the bazaars of $arabia_region$ to the harbors of $east_asia$, our merchants are a familiar sight. Their presence forms a vast network of cooperation, easing the establishment of our enclaves abroad and extending our reach into every great entrepôt of the world."
  STATIC_MODIFIER_NAME_modifier_expert_hagglers: "Expert Hagglers"
  STATIC_MODIFIER_DESC_modifier_expert_hagglers: "Wherever our traders land, be it the coasts of $south_asia$ or the markets of distant China, they are respected for their sharp tongues and keen judgement. Navigating both seas and bargains with equal finesse, they ensure that our trades are never at a disadvantage."
  STATIC_MODIFIER_NAME_modifier_agreements_sea_nomads: "Agreements with the Sea Nomads"
  STATIC_MODIFIER_DESC_modifier_agreements_sea_nomads: "The $sama_culture$ and other sea-wandering peoples have long lived upon the water itself, drifting between islands with unmatched skill. Through knowledge-sharing or agreements of mutual respect and shared opportunity, we shall ensure safe passage and swift repairs."
  STATIC_MODIFIER_NAME_modifier_masters_of_spice: "Masters of Spice"
  STATIC_MODIFIER_DESC_modifier_masters_of_spice: "Trading in cloves holds much wealth for us and our people. By securing the lands and seas from which these spices flow, we stand at the center of a trade that spans the world, and no merchant can ignore the allure of these goods."
  STATIC_MODIFIER_NAME_modifier_mug_zamindar_system: "Zamindar System"
  STATIC_MODIFIER_DESC_modifier_mug_zamindar_system: "The Zamindar are feudal rulers who govern our territories autonomously or semi-autonomously. While they are owners of the land they administrate and part of our nobility, in the end, they serve as internal vassals to the Crown itself."
  STATIC_MODIFIER_NAME_modifier_mug_mughal_architecture: "$MUG_ADJ$ Architecture"
  STATIC_MODIFIER_DESC_modifier_mug_mughal_architecture: "A great empire demands equally monumental buildings. In our cosmopolitan realm, architects are already creating marvelous edifices that will awe generations to come. Our dynasty should be at the forefront of this movement, creating great architectural works such as the world has never seen."
  STATIC_MODIFIER_NAME_modifier_mug_fatawa_e_alamgiri: "Fatawa-i-Alamgiri"
  STATIC_MODIFIER_DESC_modifier_mug_fatawa_e_alamgiri: "The $mug_fatawa_e_alamgiri$ is a sharia-based compilation, serving as the primary legal code regulating various aspects of life in our empire. It is one of the most comprehensive collections of $muslim_ADJ$ laws, ethics, military strategies, economic policies, justice, and principles."
  STATIC_MODIFIER_NAME_modifier_mug_an_indian_padshah: "Indian Padishah"
  STATIC_MODIFIER_DESC_modifier_mug_an_indian_padshah: "Though we came to $india$ as foreigners, we now rule as Indian Padishah, embracing local traditions while transcending divisions of caste and creed. As our realm is one of many faiths and cultures, our administration will draw talent from all communities, giving everyone — regardless of caste, religion, or culture — an equal opportunity to serve our great house and glorious realm."
  STATIC_MODIFIER_NAME_modifier_consolidate_the_royal_domain: "The Royal Domain"
  STATIC_MODIFIER_DESC_modifier_consolidate_the_royal_domain: "We have inherited a wealthy realm, but we have been stymied from achieving true prosperity by the constraints of archaic laws and customs. Previous rulers balanced noble privilege with economic power, but we must bring attitude and regulations into the modern era. By strengthening courts of the nobility and consolidating their landholdings, we will create a clearer legal hierarchy. Simultaneously, we will empower cities as centers of royal authority and encourage the proliferation of urban trade and craftsmanship."
  STATIC_MODIFIER_NAME_modifier_academia_pontaniana: "Accademia Pontaniana"
  STATIC_MODIFIER_DESC_modifier_academia_pontaniana: "For a long time, $NAP$ has striven to be a center of modern learning, attracting the great minds of the age and spreading the light of the $renaissance$. Under the leadership of Giovanni Pontano, these discussion circles have been given structure and organization. It is only fitting that we name the academy after its industrious leader."
  STATIC_MODIFIER_NAME_modifier_encouraged_city_living: "Encouraged City Living"
  STATIC_MODIFIER_DESC_modifier_encouraged_city_living: "We have inherited an exquisite city from our predecessors. We must continue to beautify and improve this metropolis of the Mediterranean so that it can continue to grow and prosper. No longer can we content ourselves with merely repairing and maintaining the port and buildings; we shall make holistic improvements that better sustain our people by also building aqueducts, draining wetlands, and paving more roads."
  STATIC_MODIFIER_NAME_modifier_crush_the_barons: "Crushed Power of the Barons"
  STATIC_MODIFIER_DESC_modifier_crush_the_barons: "Local barons still exert a large degree of power over the $NAP$ countryside. If we wish to continue centralizing our kingdom, we must crush the power of these barons, or risk them conspiring against us."
  STATIC_MODIFIER_NAME_modifier_expanded_arsenale: "Expanded Arsenale"
  STATIC_MODIFIER_DESC_modifier_expanded_arsenale: "For centuries, the Arsenale of $NAP$ has been the center of our ship production and our main naval installation. However, it needs to be expanded and modernized to remain effective against hostile Mediterranean fleets. Let us expand both the commercial and military capabilities of our port, building a more efficient Arsenale to maintain a larger, more powerful fleet."
  STATIC_MODIFIER_NAME_modifier_city_of_artists: "City of Artists"
  STATIC_MODIFIER_DESC_modifier_city_of_artists: "Through patronage of the world's greatest artists, the glory of our city will become known throughout the world. All will marvel at the greatness of our painters, poets, singers, and actors. Let $NAP_ADJ$ culture be the mark by which other centers of art are measured!"
  STATIC_MODIFIER_NAME_modifier_institutional_reorganization: "Institutional Reorganization"
  STATIC_MODIFIER_DESC_modifier_institutional_reorganization: "By abolishing the Collateral Council and establishing the #italic Real Camera di Santa Chiara#!, we will implement important legal reforms in $NAP$. Ongoing projects will aim to reorganize the legislative complex, consolidate laws into the #italic Codice Carolino#!, and implement the #italic Onciario Cadastre#! for tax reform."
  STATIC_MODIFIER_NAME_modifier_a_central_power: "A Central Mediterranean Power"
  STATIC_MODIFIER_DESC_modifier_a_central_power: "Our advantageous central position in the Mediterranean enables effortless access to any shore. We should capitalize on this asset to seek alliances, forge new friendships, and expand our borders. With the sea as our gateway, opportunities abound for growth and prosperity in our quest for greater influence and security."
  STATIC_MODIFIER_NAME_modifier_neapolitan_industrialization: "$NAP_ADJ$ Industrialization"
  STATIC_MODIFIER_DESC_modifier_neapolitan_industrialization: "$NAP$ has witnessed a gradual industrialization process over the past decades. Key sectors such as textiles, shipbuilding, and ironworks have experienced significant growth, fueled by investments and technological advancements. This shift towards industrialization will play a significant role in transforming $NAP$ into a major economic center."
  STATIC_MODIFIER_NAME_modifier_neapolitan_army_reforms: "$NAP_ADJ$ Army Reforms"
  STATIC_MODIFIER_DESC_modifier_neapolitan_army_reforms: "Our nation needs to undergo sweeping military reforms, modernizing its armed forces to meet the challenges of the changing battlefield. These reforms will bolster tactical capabilities, streamline command structures, and enhance training programs, positioning us as a formidable force in our region."
  STATIC_MODIFIER_NAME_modifier_nav_a_renaissance_realm: "A $renaissance$ Realm"
  STATIC_MODIFIER_DESC_modifier_nav_a_renaissance_realm: "Though our realm originates in the mountain valleys of the Pyrenees, our people have been heavily influenced by humanistic ideas coming from both north and south. By embracing this new way of thinking, the people of $NAV$ are not abandoning their traditions, but merging them into their overall identity."
  STATIC_MODIFIER_NAME_modifier_nav_fearless_seamen: "Fearless Seafarers"
  STATIC_MODIFIER_DESC_modifier_nav_fearless_seamen: "Our people have always looked to the sea with awe and fear, well aware of both the rewards and dangers to be found in its briny embrace. Our brave forefathers founded communities that would live not only by the sea but from it, developing impressive skills on the water. Sailors from our shores are well known all across the Atlantic Coast."
  STATIC_MODIFIER_NAME_modifier_nav_always_ready: "Always Ready"
  STATIC_MODIFIER_DESC_modifier_nav_always_ready: "We were born as a small realm, encircled by formidable adversaries from every direction. This has profoundly influenced the development of our national character and our approach to engaging with the world. Consequently, we remain ever-watchful, poised to respond to the slightest indication of a threat."
  STATIC_MODIFIER_NAME_modifier_nav_chartered_councils: "Chartered Councils"
  STATIC_MODIFIER_DESC_modifier_nav_chartered_councils: "Each historical territory will form a council, dependent on the ruler and elected by the locals, which will guarantee the respect of their traditional laws or #italic Fueros#!. This intermediate step will give us better and more efficient administrative power over our lands, without meddling in local interests."
  STATIC_MODIFIER_NAME_modifier_nav_people_of_the_sea: "People of the Sea"
  STATIC_MODIFIER_DESC_modifier_nav_people_of_the_sea: "Our people are expert mariners, and all the world knows it. Our expertise will be an obvious advantage in maritime battles to come."
  STATIC_MODIFIER_NAME_modifier_nav_basque_ferocity: "$basque$ Ferocity"
  STATIC_MODIFIER_DESC_modifier_nav_basque_ferocity: "Even before the Battle of $roncesvalles$, for which the $FRA_ADJ$ still weep, or the campaigns of the $NAV_ADJ$ Company, our people have always been considered ferocious fighters. We should never let our enemies forget it."
  STATIC_MODIFIER_NAME_modifier_nav_an_industrious_folk: "An Industrious Folk"
  STATIC_MODIFIER_DESC_modifier_nav_an_industrious_folk: "The land we live in might not be the richest, but the $basque$ people are industrious individuals, working hard to obtain what they need. Be it by smelting $iron$ in our ironworks, converting wood from our forests into charcoal, or building the finest ships, our realm is bountiful thanks to the efforts and expertise of our community."
  STATIC_MODIFIER_NAME_modifier_nav_mercantile_expansion: "Mercantile Expansion"
  STATIC_MODIFIER_DESC_modifier_nav_mercantile_expansion: "For centuries, our society has traded not only with our neighbors, but with faraway lands. This has had the effect not only of making our merchants particularly skilled in the art of trade, but has disseminated innovations from many nations farther and wider than they would have been able to otherwise."
  STATIC_MODIFIER_NAME_modifier_nav_navarrese_defense_force: "$NAV_ADJ$ Defense Force"
  STATIC_MODIFIER_DESC_modifier_nav_navarrese_defense_force: "Over time, our neighbors have gained significant strength, posing an increasing threat to our nation's survival. To address this, we will establish a military department aimed at bolstering our forces with a higher number of soldiers without compromising on the quality of recruits."
  STATIC_MODIFIER_NAME_modifier_nav_shipyards_ironworks: "Shipyards and Ironworks"
  STATIC_MODIFIER_DESC_modifier_nav_shipyards_ironworks: "The traditions of shipbuilding, steelmaking, and ironworking have been common activities in our lands for centuries. But as new techniques develop, we must obviously update our processes correspondingly. Even the most ancient traditions must embrace modernity in order to remain valuable in the modern world."
  STATIC_MODIFIER_NAME_modifier_nav_adept_traders: "Adept Traders"
  STATIC_MODIFIER_DESC_modifier_nav_adept_traders: "The quality of our ships, the proficiency of our merchants, and the efficacy of our production processes have made our trade incredibly lucrative. The influx of wealth into our nation will make us stronger than ever before."
  STATIC_MODIFIER_NAME_modifier_nav_the_national_military_academy: "The National Military Academy"
  STATIC_MODIFIER_DESC_modifier_nav_the_national_military_academy: "With the professionalization of our army, the necessity of a training center for our recruits becomes apparent. We will form a corps of experienced soldiers to teach the fundamentals of war and to forge our recruits into the spearhead of our army."
  STATIC_MODIFIER_NAME_modifier_nav_royal_basque_society: "Royal $basque$ Society"
  STATIC_MODIFIER_DESC_modifier_nav_royal_basque_society: "#italic Euskalerriaren Adiskideen Elkartea#!, the Royal $basque$ Society of Friends of the Country, has been founded to encourage the development of $basque$ economy, culture, and science. It will benefit the country greatly in the coming years."
  STATIC_MODIFIER_NAME_modifier_nav_efficient_bureaucracy: "Efficient Bureaucracy"
  STATIC_MODIFIER_DESC_modifier_nav_efficient_bureaucracy: "Our nation has maintained bureaucratic traditions since the realm's establishment, but changing times demand new approaches. $NAV$ has drawn particular admiration for pioneering certain administrative innovations."
  STATIC_MODIFIER_NAME_modifier_nav_riflemen_march: "Riflemen March"
  STATIC_MODIFIER_DESC_modifier_nav_riflemen_march: "The introduction of rifles to our armies has required new approaches to military training and discipline. Our commanders have developed innovative marching formations that have become famous as proof of our military competence and focus."
  STATIC_MODIFIER_NAME_modifier_a_dynamic_society: "A Dynamic Society"
  STATIC_MODIFIER_DESC_modifier_a_dynamic_society: "Our lands are a haven for the bold. Those looking to better their lives will find opportunity here, and we will in turn capitalize on the talents of these ambitious individuals to strengthen our nation."
  STATIC_MODIFIER_NAME_modifier_brb_brabantine_rights: "$BRB_ADJ$ Rights"
  STATIC_MODIFIER_DESC_modifier_brb_brabantine_rights: "As other nations have, it is time to codify the liberties of our subjects, in order to identify and safeguard their rights and motivate them to continue working towards a better future for our country."
  STATIC_MODIFIER_NAME_modifier_fla_flemish_renaissance: "$FLA_ADJ$ $renaissance$"
  STATIC_MODIFIER_DESC_modifier_fla_flemish_renaissance: "As one of the most prosperous regions on the continents, much of the wealth we have created naturally flows toward artistic patronage. $FLA_ADJ$ merchants commission master painters to create art that, while perhaps not practical, casts light over even the cloudiest of days. With dozens of our merchants actively hiring artists and commissioning new pieces, we are creating a distinctive $renaissance$ of our own."
  STATIC_MODIFIER_NAME_modifier_frisian_resisting_invader: "Resisting the Invader"
  STATIC_MODIFIER_DESC_modifier_frisian_resisting_invader: "Surrounded as we are by enemies, our people are accustomed to aggressively defending their lands, fighting so fiercely that many would-be invaders turn tail and never return. Those who cannot escape us can take comfort in the thought that their blood shall nurture the $FRI$ soil."
  STATIC_MODIFIER_NAME_modifier_gel_healthy_economy: "A Healthy Economy"
  STATIC_MODIFIER_DESC_modifier_gel_healthy_economy: "We have expanded our borders not only by the sword, but through careful financial planning, which allowed us to purchase influence over desirable territories — or to buy them outright. With continued wise budget management, this economic trend should be sustainable."
  STATIC_MODIFIER_NAME_modifier_hai_frontier_march: "A Frontier March"
  STATIC_MODIFIER_DESC_modifier_hai_frontier_march: "As a border province of the $hre$, $HAI$ has developed a rough-and-ready spirit, born from centuries of frontier conflict. This spirit makes our people naturally inclined towards taking defensive action, which we can exploit to our benefit."
  STATIC_MODIFIER_NAME_modifier_hol_maritime_warfare: "Maritime Warfare"
  STATIC_MODIFIER_DESC_modifier_hol_maritime_warfare: "As a maritime nation, our sailors are accustomed to naval combat, whether against members of rival nations or pirates attempting to plunder our trading vessels. In any case, our navy must be prepared to face any enemy at any time."
  STATIC_MODIFIER_NAME_modifier_lie_devoted_land: "A Devoted Land"
  STATIC_MODIFIER_DESC_modifier_lie_devoted_land: "As part of one of the biggest dioceses in the area, there is no doubt as to the depth of devotion our people hold. We will show the world that our faith in God is as strong as our faith in our nation."
  STATIC_MODIFIER_NAME_modifier_lux_fortress_europe: "The Fortress of $europe$"
  STATIC_MODIFIER_DESC_modifier_lux_fortress_europe: "The impregnable position of $LUX$, with the formation of the Bock acting as a natural fortress, is incredibly strong. Our enemies would perish in any attempt to usurp our holdings. We shall learn from nature, and construct all our fortresses so as to use the local terrain to their advantage."
  STATIC_MODIFIER_NAME_modifier_utr_blessed_land: "A Blessed Land"
  STATIC_MODIFIER_DESC_modifier_utr_blessed_land: "The Pope himself influences the election of our Prince-Bishop, challenging the traditional five-chapter election format that we had before. This is clear proof that our land has been divinely blessed!"
  STATIC_MODIFIER_NAME_modifier_an_early_urbanization: "Early Urbanization"
  STATIC_MODIFIER_DESC_modifier_an_early_urbanization: "The Low Countries have traditionally had a high rate of urbanization, which has allowed us to achieve power beyond what most might expect. We should accelerate this trend by creating a robust network of prosperous settlements that can help us create a wealthier future."
  STATIC_MODIFIER_NAME_modifier_brb_land_culture: "A Land of Culture"
  STATIC_MODIFIER_DESC_modifier_brb_land_culture: "With the foundation of the University of $leuven$, $BRB$ has placed itself firmly at the center of culture in $common_string_prefix_article$ $NED$. Students from all over $europe$ come to our lands to study and share their knowledge."
  STATIC_MODIFIER_NAME_modifier_fla_prospering_agriculture: "Prospering Agriculture"
  STATIC_MODIFIER_DESC_modifier_fla_prospering_agriculture: "As our cloth, luxury goods, and financial industries face growing competition, it is becoming obvious that we need to manage our land use better. By creating regional granaries, we further diversify our economy, and bolster our food stores against famine or poor harvests."
  STATIC_MODIFIER_NAME_modifier_frisian_legend_grutte_pier: "The Legend of Grutte Pier"
  STATIC_MODIFIER_DESC_modifier_frisian_legend_grutte_pier: "There are stories in our lands about a pirate who was seven feet tall and strong as an ox. These tales inspire many to take to the seas and do what our ancestors did best: loot unguarded coasts."
  STATIC_MODIFIER_NAME_modifier_gel_expand_kwarteers: "Expand the Kwarteers"
  STATIC_MODIFIER_DESC_modifier_gel_expand_kwarteers: "As in the case of $BRB$, $GEL$ has traditionally been divided into four quarters. This system of provinces arranged around a strong central city has proven to be an efficient way to govern our nation, and we should apply this system to new regions that join our realm in the future."
  STATIC_MODIFIER_NAME_modifier_hai_bustling_towns: "Bustling Towns"
  STATIC_MODIFIER_DESC_modifier_hai_bustling_towns: "Our lively urban settlements are full of potential. With just a little effort, we can make them and their hinterlands incredibly wealthy, allowing us to thoroughly tax them."
  STATIC_MODIFIER_NAME_modifier_hol_trading_spirit: "Trading Spirit"
  STATIC_MODIFIER_DESC_modifier_hol_trading_spirit: "Our country is surrounded by the sea, so it is only natural that we would brave the roiling waves in search of trading ports and enriching goods to bring back."
  STATIC_MODIFIER_NAME_modifier_lie_inspiring_mecenas: "An Inspiring Maecenas"
  STATIC_MODIFIER_DESC_modifier_lie_inspiring_mecenas: "Our nation inspires artists from across $europe$, who come here to create their masterworks. We will spare no expense to support these artists and attract new talent, establishing ourselves as a hub of arts and culture."
  STATIC_MODIFIER_NAME_modifier_lux_heirs_john_blind: "Heirs of John the Blind"
  STATIC_MODIFIER_DESC_modifier_lux_heirs_john_blind: "John the Blind, the heroic King of $BOH$ and Count of $LUX$, was born in our humble realm. He died in the Battle of Crécy at fifty, having charged headlong into combat despite his blindness. His brave, honorable death will inspire our soldiers for centuries."
  STATIC_MODIFIER_NAME_modifier_utr_skilled_diplomats: "Skilled Diplomats"
  STATIC_MODIFIER_DESC_modifier_utr_skilled_diplomats: "Given the growing influence of our neighbors, our nation's survival depends on our ability to find loyal, powerful allies who will support us in our times of need."
  STATIC_MODIFIER_NAME_modifier_dutch_education: "Dutch Education"
  STATIC_MODIFIER_DESC_modifier_dutch_education: "While our people always enjoyed superior literacy rates at all levels of society, this advantage is becoming more apparent in the world taking shape before us. Only those with a limited understanding would not take advantage of and increase this edge."
  STATIC_MODIFIER_NAME_modifier_platoon_fire: "Platoon Fire"
  STATIC_MODIFIER_DESC_modifier_platoon_fire: "Standard volley fire involved each rank delivering its volley in one go to maximize firepower. But we have developed a different system of firing by platoon, with the idea being that one part of the regiment would always be firing at the enemy while others reloaded and got ready for the next volley. This removed time between attacks that the enemy could use to recover or otherwise gain an advantage."
  STATIC_MODIFIER_NAME_modifier_dutch_golden_age_art: "Dutch Art"
  STATIC_MODIFIER_DESC_modifier_dutch_golden_age_art: "$common_string_prefix_article$ $NED$ has historically been at the forefront of technological and cultural advancements. We must continue to patronize inventors, artists, and writers to maintain our edge over other nations."
  STATIC_MODIFIER_NAME_modifier_a_trading_hub: "A Trading Hub"
  STATIC_MODIFIER_DESC_modifier_a_trading_hub: "Our nation is blessed with a well-established hub of cities focused on trade, and adventurous sailors willing to bring riches from all over the world back home. These seafarers will be an excellent way for us to trade with other nations and make significant profits."
  STATIC_MODIFIER_NAME_modifier_concentration_power: "Concentration of Power"
  STATIC_MODIFIER_DESC_modifier_concentration_power: "For too long, our nation has been unevenly governed by multiple #italic stadtholders#! across different provinces, with the most powerful acting as #italic primus inter pares#! among their peers. It is time to make the position hereditary and concentrate authority in a single ruler."
  STATIC_MODIFIER_NAME_modifier_a_fortified_border: "A Fortified Border"
  STATIC_MODIFIER_DESC_modifier_a_fortified_border: "Our borders are not well-defended by natural features, as is the case in some other nations. However, we have wit and wisdom in abundance, enough to construct the mightiest fortifications possible to deter our enemies and protect our families."
  STATIC_MODIFIER_NAME_modifier_natural_seamanship: "Natural Seamanship"
  STATIC_MODIFIER_DESC_modifier_natural_seamanship: "With the growth of our fishing industry, we have also seen a corresponding expansion in the number of sailors in our realm. We should take advantage of this and recruit some of them to our navy, as seamanship is just as important as the ship itself."
  STATIC_MODIFIER_NAME_modifier_call_of_our_forefathers: "The Call of our Forefathers"
  STATIC_MODIFIER_DESC_modifier_call_of_our_forefathers: "Long ago, our illustrious forefathers sailed forth and established colonies in the North. Our sagas even tell us that they reached a new world and established Vinland. We must follow in their footsteps."
  STATIC_MODIFIER_NAME_modifier_pioneer_spirit: "Pioneer Spirit"
  STATIC_MODIFIER_DESC_modifier_pioneer_spirit: "In days gone by, our people would brave the high seas to establish colonies on distant shores. Let us rekindle this adventurous spirit in our people so that they sail forth again!"
  STATIC_MODIFIER_NAME_modifier_nor_shipbuilding: "Military Shipbuilding"
  STATIC_MODIFIER_DESC_modifier_nor_shipbuilding: "The expansion of our fishing industry has also led to an expansion in shipbuilding. We have a ready pool of trained shipwrights at hand to expand our own production process."
  STATIC_MODIFIER_NAME_modifier_write_new_sagas: "Write New Sagas"
  STATIC_MODIFIER_DESC_modifier_write_new_sagas: "Keen minds preserve knowledge\nKnown from ages past\nSung in the sundown\nSagas are our inheritance\nEncouraged by the establishment\nEach country will have its own"
  STATIC_MODIFIER_NAME_modifier_nor_merchant_tradition: "$NOR_ADJ$ Merchants"
  STATIC_MODIFIER_DESC_modifier_nor_merchant_tradition: "The ports of $NOR$ have long been a desirable destination for merchants from all around $europe$. It is time that we not only host foreign merchants in our ports, but benefit from the trades of northern $europe$ ourselves."
  STATIC_MODIFIER_NAME_modifier_ushkuiniks: "The Ushkuyniks"
  STATIC_MODIFIER_DESC_modifier_ushkuiniks: "The Viking-like #italic Ushkuynik#! pirates were once a useful tool to suppress our competitors. Unfortunately, we were forced to stop using them due to foreign intervention, mainly from Moscow. We should begin funding them again, and send these pirates to plunder farther shores — that will show everyone who the true masters of the North are!"
  STATIC_MODIFIER_NAME_modifier_northern_center_of_arts: "Northern Center of Arts"
  STATIC_MODIFIER_DESC_modifier_northern_center_of_arts: "$novgorod$ is an important cultural center in $europe$. Epic tales are told of our's literate and intellectual population, intricate religious art, and grand architecture, increasing the prestige of our flourishing city and indeed the whole nation."
  STATIC_MODIFIER_NAME_modifier_city_of_churches: "City of Churches"
  STATIC_MODIFIER_DESC_modifier_city_of_churches: "There are over eighty $orthodox_ADJ$ churches in $novgorod$, and some are the largest landholders in the principality. Their wealth and religious prestige allows the Church to significantly influence the population in many areas, and our citizens are more pious as a result — in a good way."
  STATIC_MODIFIER_NAME_modifier_novgorodian_fur_trade: "Novgorodian Fur Trade"
  STATIC_MODIFIER_DESC_modifier_novgorodian_fur_trade: "$fur$, the silken gold of $RUS$! While other states gain their wealth from trading in $goods_gold$ and other rare metals, our source of income comes from the high-quality $fur$ the motherland provides us with."
  STATIC_MODIFIER_NAME_modifier_grand_dukes_army: "Grand Duke's Army"
  STATIC_MODIFIER_DESC_modifier_grand_dukes_army: "Leading troops is the most important duty for the Grand Duke, who is appointed to rule over the Veche Republic. Under such strong and experienced leadership, our armies will become far more deadly in battle."
  STATIC_MODIFIER_NAME_modifier_baltic_shipyard: "Baltic Shipyard"
  STATIC_MODIFIER_DESC_modifier_baltic_shipyard: "We shall build a grand shipyard on the eastern coast of the Baltic Sea, and dominate overseas trade!"
  STATIC_MODIFIER_NAME_modifier_defenses_of_novgorod: "Defenses of $NOV$"
  STATIC_MODIFIER_DESC_modifier_defenses_of_novgorod: "The Republic of $NOV$ is the target of many external threats. But be it the western heretics from $scandinavian_region$, the rampaging Germans to our southwest, or even other $RUS_ADJ$ powers to our south; they all shall all crumble at the feet of our unbreakable fortifications."
  STATIC_MODIFIER_NAME_modifier_trade_ports_in_the_channel: "Channel Trade Ports"
  STATIC_MODIFIER_DESC_modifier_trade_ports_in_the_channel: "Our position along the English Channel allows us to flourish as a commercial gateway. By investing in our port towns and merchant infrastructure, we can dominate regional trade while minimizing the cost of overseas operations."
  STATIC_MODIFIER_NAME_modifier_the_exchequer: "The Exchequer"
  STATIC_MODIFIER_DESC_modifier_the_exchequer: "Our legislative body must remain distinct from any outside influences, in an effort to preserve our cultural identity and independence. Inspired by Anglo-Norman fiscal institutions, our parliamentary procedures will surely bolster crown revenue and improve administrative oversight."
  STATIC_MODIFIER_NAME_modifier_frontline_in_the_caroline_war: "Frontline of the Caroline War"
  STATIC_MODIFIER_DESC_modifier_frontline_in_the_caroline_war: "During the long conflicts between $FRA$ and $ENG$, we stood as a strategic battleground. The pressures of war forged a hardened officer corps and traditions of battlefield excellence that endure to this day."
  STATIC_MODIFIER_NAME_modifier_local_merchant_preference: "Local Merchant Preference"
  STATIC_MODIFIER_DESC_modifier_local_merchant_preference: "Theoretically a merchant can be a citizen of the world, sailing to and from whichever port he pleases. We are going to give advantages to home merchants, for example, priority for loading and unloading of cargo, to ensure that our merchants have every incentive to bring their products home."
  STATIC_MODIFIER_NAME_modifier_association_with_unbelievers: "Association With Unbelievers"
  STATIC_MODIFIER_DESC_modifier_association_with_unbelievers: "There are those who feel that we should not associate with unbelievers at all. We have done much to quash this, as only through association with heathen nations will we be able to trade with them."
  STATIC_MODIFIER_NAME_modifier_port_security_improvement: "Port Security Improvements"
  STATIC_MODIFIER_DESC_modifier_port_security_improvement: "To reap the full financial potential from trade, we need ships and any cargo they carry to be safe when docked in our ports. We must ensure that any areas that merchants consort in are free from petty crime."
  STATIC_MODIFIER_NAME_modifier_end_of_shipbuilding_guilds: "End of the Shipbuilding Guilds"
  STATIC_MODIFIER_DESC_modifier_end_of_shipbuilding_guilds: "As long as ships have been built in $arabia_region$, there have been guilds who control the production. Although they may have performed a valuable service in keeping shipbuilding traditions alive, they now stand in the way of progress. We must open up the shipbuilding industry to all with talent."
  STATIC_MODIFIER_NAME_modifier_skilled_captains: "Skilled Captains"
  STATIC_MODIFIER_DESC_modifier_skilled_captains: "We must ensure that our captains meet the highest standards of seamanship and nautical knowledge, ensuring that they will be able to use every advantage in all situations."
  STATIC_MODIFIER_NAME_modifier_expansion_of_trade_contacts: "Expansion of Trade Contacts"
  STATIC_MODIFIER_DESC_modifier_expansion_of_trade_contacts: "We must ensure that our merchants are always welcome wherever they go. Thus, we will use any means possible to make sure that all rulers we know about welcome our merchants."
  STATIC_MODIFIER_NAME_modifier_omani_ambition: "Land Isolation"
  STATIC_MODIFIER_DESC_modifier_omani_ambition: "Despite not being an island, our land is factually isolated from the rest of $arabia_region$ due to the surrounding deserts. As such, we have learned how crucial it is to have access to the sea, and how useful it will be for us if we take that option away from our enemies."
  STATIC_MODIFIER_NAME_modifier_ori_servitor_of_jagganath: "Servitor of Jagannath"
  STATIC_MODIFIER_DESC_modifier_ori_servitor_of_jagganath: "Worship of Jagannath, the Lord of the Universe, is what unites our people. Previous rulers of $ORI$ were even considered to be the scions of Jagannath. Our current ruler might not be one of his descendants, but we must imprint on all that our leader is the servitor of Jagannath, and that any disobedience to them equals treason against Lord Jagannath himself."
  STATIC_MODIFIER_NAME_modifier_ori_parikshas: "Parikshas"
  STATIC_MODIFIER_DESC_modifier_ori_parikshas: "$ORI$ has long been divided among many different princes, but their time is over! We will take control of these lands, and appoint regional governors — #italic parikshas#! — instead of allowing these petty princelings to dilute our imperial authority."
  STATIC_MODIFIER_NAME_modifier_ori_odia_militarization: "Odia Militarization"
  STATIC_MODIFIER_DESC_modifier_ori_odia_militarization: "The $muslim_ADJ$ threat never ceases, nor does it ever rest. We must ensure our military is ready to face and combat invaders at any and all times."
  STATIC_MODIFIER_NAME_modifier_ori_patronize_temple_construction: "Patronized Temple Construction"
  STATIC_MODIFIER_DESC_modifier_ori_patronize_temple_construction: "The glory of past dynasties is reflected by the grandeur of the temples they left behind. We should improve our many magnificent temple complexes, and construct new ones to further the development of Kalinga architecture."
  STATIC_MODIFIER_NAME_modifier_ori_refined_cloth_production: "Refined $cloth$ Production"
  STATIC_MODIFIER_DESC_modifier_ori_refined_cloth_production: "$ORI$ has been famous for its high-quality textiles since ancient times. Let us further encourage the textile guilds of $ORI$ to refine their methods of producing their fine Kalinga $cloth$."
  STATIC_MODIFIER_NAME_modifier_ori_encourage_salt_trade: "$salt$ Trade"
  STATIC_MODIFIER_DESC_modifier_ori_encourage_salt_trade: "The high-quality $salt$ of $ORI$ is in demand all over $india$. Let us do whatever we can to encourage the $salt$ trade so that we may grow rich from it."
  STATIC_MODIFIER_NAME_modifier_ori_expansion_of_infrastructure: "Expansion of Infrastructure"
  STATIC_MODIFIER_DESC_modifier_ori_expansion_of_infrastructure: "As technology advances, so does the number of people in our realm. Industrialization has driven significant population growth, and as such, we must expand our infrastructure to accommodate these growing communities."
  STATIC_MODIFIER_NAME_modifier_moqarrariya: "Institutionalize the Moqarrariya"
  STATIC_MODIFIER_DESC_modifier_moqarrariya: "For generations, our realm maintained peace with the mainland through the ancient tribute system known as #italic Moqarrariya#!. Rather than depending on custom and negotiation, let us codify these tributes into formal pacts — securing fresh water, overland safety, and long-term stability through reliable diplomacy."
  STATIC_MODIFIER_NAME_modifier_develop_qeshm_and_ormuz: "Invest in Qeshm and $ORM$"
  STATIC_MODIFIER_DESC_modifier_develop_qeshm_and_ormuz: "Though dry and rocky, the islands of Qeshm and $ORM$ have sustained urban life thanks to careful provisioning and rich trade. With proper investment, their ports and workshops can flourish further, turning them from logistical hubs into centers of innovation and productivity."
  STATIC_MODIFIER_NAME_modifier_ormuzi_navy: "The $ORM_ADJ$ Navy"
  STATIC_MODIFIER_DESC_modifier_ormuzi_navy: "The $persian_gulf$ is crossed daily by our fleets — be they traders, patrols, or armed escorts. But to match the ambitions of those who envy our position, we must expand and modernize. Let $ORM$ become more than just a trading post: a maritime arsenal."
  STATIC_MODIFIER_NAME_modifier_mint_of_the_gulf: "Mint of the Gulf"
  STATIC_MODIFIER_DESC_modifier_mint_of_the_gulf: "Ormuzi coinage circulates from $basra_al_hamra$ to $bengal_area$, trusted for its purity and weight. By institutionalizing our mint and expanding our issuance, we reinforce our financial sovereignty — and claim fiscal supremacy over the $indian_ocean_region$."
  STATIC_MODIFIER_NAME_modifier_pal_cultivate_vineyards: "Vineyards and Orchards of the Rhine"
  STATIC_MODIFIER_DESC_modifier_pal_cultivate_vineyards: "Although our territory is small, the sunny banks of the Rhine are perfectly suited to cultivate vineyards and orchards. With some effort, these could sustain our local economy by producing wine."
  STATIC_MODIFIER_NAME_modifier_pal_protection_of_exclaves: "Local Fortification"
  STATIC_MODIFIER_DESC_modifier_pal_protection_of_exclaves: "By virtue of having our territories disperse, we are vunerable to attacks from several foreign powers. Constructing many fortified outposts within our lands will buy us time to raise an army and repel any attempt to take over one of our many disconnected territories."
  STATIC_MODIFIER_NAME_modifier_pal_fractured_territory: "Consolidate the Territories"
  STATIC_MODIFIER_DESC_modifier_pal_fractured_territory: "Our administration is skilled in handling multiple disconnected territories without losing our grasp on them. With that, we can build a strong bureaucracy capable of handling even the most difficult tasks."
  STATIC_MODIFIER_NAME_modifier_pal_a_just_ruler: "A Mild and Calm Ruler"
  STATIC_MODIFIER_DESC_modifier_pal_a_just_ruler: "The only effect of bloodshed is to cause further bloodshed. Therefore, we need to be a forgiving ruler, and reconcile with our enemies to establish a lasting peace in our territories."
  STATIC_MODIFIER_NAME_modifier_pal_heaven_of_tolerance: "Palatinate Tolerance"
  STATIC_MODIFIER_DESC_modifier_pal_heaven_of_tolerance: "No matter their denominations, all $christian_ADJ$ people must be welcomed in the towns and cities of our lands. While others may decide to suppress their religious minorities, our tolerance will ensure a steady stream of immigrants into our territory, and we shall benefit from their presence."
  STATIC_MODIFIER_NAME_modifier_pal_mildness_to_the_commoners: "Forgiveness for Peasants"
  STATIC_MODIFIER_DESC_modifier_pal_mildness_to_the_commoners: "When our peasantry rises up against our nobility, they unmistakably rise up against our own rule. However, we should not excessively punish those who revolt. With mild consequences, everyone will be more in alignment with our authority."
  STATIC_MODIFIER_NAME_modifier_pal_humanist_court: "Humanist Education"
  STATIC_MODIFIER_DESC_modifier_pal_humanist_court: "To govern well, our rulers must receive a comprehensive education in humanist ideas. To this effect, we must hire renowned humanists for the education of our rulers and heirs, while also focusing our court on these principles."
  STATIC_MODIFIER_NAME_modifier_pal_heidelberg_catechism: "Heidelberg Catechism"
  STATIC_MODIFIER_DESC_modifier_pal_heidelberg_catechism: "The Reformation has created many discussions around the nature of our faith. We should invest into a comprehensive catechism, to which our people will be able to adhere."
  STATIC_MODIFIER_NAME_modifier_pal_bilbiotheca_palatina: "Protect the #italic Bibliotheca Palatina#!"
  STATIC_MODIFIER_DESC_modifier_pal_bilbiotheca_palatina: "Rich in theological scriptures of several $christian_ADJ$ denominations, the #italic Bibliotheca Palatina#! is one of our most prized possessions. Protection of the knowledge and the cultural value contained within must be a high priority, so that we are able to keep relying on its documents."
  STATIC_MODIFIER_NAME_modifier_palatinate_romanticism: "Support the Romantic Movement"
  STATIC_MODIFIER_DESC_modifier_palatinate_romanticism: "A significant part of the Romantic movement is centered around $heidelberg$. We should capitalize on this phenomenon, and support these and other artists in order to bolster our global recognition."
  STATIC_MODIFIER_NAME_modifier_ecclesiastical_primacy: "Ecclesiastical Primacy"
  STATIC_MODIFIER_DESC_modifier_ecclesiastical_primacy: "The $game_concept_pope$ has the sovereign authority to establish religious canon and law in the $catholic_ADJ$ Church. The State shares a special relationship with those who conform to the will of the $catholic_ADJ$ authority."
  STATIC_MODIFIER_NAME_modifier_papal_investiture_and_tithes: "$PAP_ADJ$ Investiture and Tithes"
  STATIC_MODIFIER_DESC_modifier_papal_investiture_and_tithes: "Into $rome$ flows the riches of $christian_ADJ$ $europe$."
  STATIC_MODIFIER_NAME_modifier_glory_of_rome: "Glory of $rome$"
  STATIC_MODIFIER_DESC_modifier_glory_of_rome: "We control the great city and the ancient capital of the Romans. We are the sole keepers of their marvelous tradition!"
  STATIC_MODIFIER_NAME_modifier_donation_of_constantine: "Donation of Constantine"
  STATIC_MODIFIER_DESC_modifier_donation_of_constantine: "The Donation of Constantine demonstrates our authority to bestow the title of the Emperor of the Romans upon whomsoever we choose. It may also prove that we are rather good at forging documents."
  STATIC_MODIFIER_NAME_modifier_centralize_the_states: "Centralize the States"
  STATIC_MODIFIER_DESC_modifier_centralize_the_states: "We will consolidate our power in $PAP_ADJ$ provinces by seizing authority from the local princes."
  STATIC_MODIFIER_NAME_modifier_holy_father: "The Holy Father"
  STATIC_MODIFIER_DESC_modifier_holy_father: "Being the Vicar of God to the Roman $catholic_ADJ$ faithful gives us a certain amount of political leeway. The Papal Bull, documents carrying the $game_concept_pope$'s official seal, carry the weight of the very word of God. With these, rulers have been cursed and entire continents divided."
  STATIC_MODIFIER_NAME_modifier_pap_legacy_of_the_military_orders: "Legacy of the Military Orders"
  STATIC_MODIFIER_DESC_modifier_pap_legacy_of_the_military_orders: "Although the era of Holy Orders has long come to its end, its legacy still remains a major inspiration for the soldiers of God who pledge to defend the Holy See from heathens and heresy."
  STATIC_MODIFIER_NAME_modifier_corona_regni_poloniae: "Corona Regni Poloniae"
  STATIC_MODIFIER_DESC_modifier_corona_regni_poloniae: "This legislation establishes the kingdom as an indivisible, collective entity, owned not by any single dynasty or monarch but by the entire noble class. Rulers serve the realm, they do not #italic own#! it. This concept of collectivity is deeply entrenched in our society."
  STATIC_MODIFIER_NAME_modifier_krakow_grosz: "Grosz Krakowski"
  STATIC_MODIFIER_DESC_modifier_krakow_grosz: "In an attempt to reform our monetary system, we will introduce a new currency, the #italic Kraków Grosz#!. Minted from silver, these coins are destined to challenge the power of the $BOH_ADJ$ #italic Prague Groschen#! and help establish our realm as pioneers of centralized taxation."
  STATIC_MODIFIER_NAME_modifier_stone_and_brick: "Stone and Brick"
  STATIC_MODIFIER_DESC_modifier_stone_and_brick: "For centuries, we have used wood to build our towns and defenses, but we will now  systematically upgrade our infrastructure by replacing more vulnerable wooden structures with stronger ones. We have inherited wooden towns, but we shall leave them fortified with stone and brick."
  STATIC_MODIFIER_NAME_modifier_folwark_system: "Folwark System"
  STATIC_MODIFIER_DESC_modifier_folwark_system: "The Folwark System was a system of production that emphasized creating agricultural surpluses. Peasants were encouraged to work through either the use of rents or through compulsion. This system formed the bedrock of our economy."
  STATIC_MODIFIER_NAME_modifier_council_of_three_lands_advance: "Council of Three Lands"
  STATIC_MODIFIER_DESC_modifier_council_of_three_lands_advance: "Our country has a long-standing history of accepting destitute, persecuted $judaism_ADJ$ people. To that end, a council that will look after their needs and advocate for their rights will benefit the stability and spiritual strength of this realm."
  STATIC_MODIFIER_NAME_modifier_polish_renaissance: "$polish_group$ $renaissance$"
  STATIC_MODIFIER_DESC_modifier_polish_renaissance: "Inspired by the ideals of the $ITA_ADJ$ $renaissance$, we are experiencing a cultural golden age. Our literary achievements, architectural splendors, and cultivated atmosphere of religious tolerance have all led to a blossoming of culture across our land."
  STATIC_MODIFIER_NAME_modifier_granary_of_europe: "Granary of $europe$"
  STATIC_MODIFIER_DESC_modifier_granary_of_europe: "The fertile fields of our domain are home to $europe$'s richest grain crops, in part thanks to the $folwark_system$. Through our grace, we supply the markets beyond our borders, ensuring our people continue to prosper and never go hungry."
  STATIC_MODIFIER_NAME_modifier_wojsko_komputoe: "Wojsko Komputowe"
  STATIC_MODIFIER_DESC_modifier_wojsko_komputoe: "The 'Compute Army' was based around an annual budget calculated and approved by the Sejm. The idea behind this was to provide the Commonwealth with a stable standing army for defense."
  STATIC_MODIFIER_NAME_modifier_komisja_edukacji_narodowej: "Komisja Edukacji Narodowej"
  STATIC_MODIFIER_DESC_modifier_komisja_edukacji_narodowej: "Our government's need for capable administrators has led to systematic education reform. We will establish the first education ministry in $europe$, devoted to spreading literacy throughout our population, which will hopefully lead to an increase in qualified candidates to staff our expanding administration."
  STATIC_MODIFIER_NAME_modifier_szkola_rycerska: "Szkoła Rycerska"
  STATIC_MODIFIER_DESC_modifier_szkola_rycerska: "By establishing the 'Knight's School' to train noble youth in military science and their patriotic duty, we will forge generations of capable, dedicated military and civil personnel."
  STATIC_MODIFIER_NAME_modifier_great_sejm_reforms: "Great Sejm Reforms"
  STATIC_MODIFIER_DESC_modifier_great_sejm_reforms: "If we are to survive and continue to prosper, our governmental mechanism must run efficiently and be based on robust foundations. The parliament shall adopt modernized procedures and strengthen its authority. The goals of this evolution are to curtail the power of the nobility and mitigate the escalating abuses of serfdom."
  STATIC_MODIFIER_NAME_modifier_por_estimulate_rural_areas: "Stimulate Rural Areas"
  STATIC_MODIFIER_DESC_modifier_por_estimulate_rural_areas: "Many places across our country, mainly in rural and remote regions, are becoming depopulated, with fields, forests, and mines falling into disuse. By reforming relevant aspects of our legal system, we will encourage people to remain in the countryside and restore its productivity."
  STATIC_MODIFIER_NAME_modifier_por_pursuing_waves: "Pursuing the Waves"
  STATIC_MODIFIER_DESC_modifier_por_pursuing_waves: "It seems the land is not enough for part of our populace. Some people look at the sea and feel #italic saudade#!, as if it was a long-lost lover. The ports and docks bustle with eager sailors, all enrolling in expeditions as if they were drunk with a desire to explore the world. We will make great use of these eager seafarers."
  STATIC_MODIFIER_NAME_modifier_por_bombardeiros: "Bombardeiros"
  STATIC_MODIFIER_DESC_modifier_por_bombardeiros: "Technological advancements have helped us develop much more powerful cannon, but most ships' decks cannot support their weight. By reinforcing our ships, we will be able to carry more munitions, and our navies will be feared for their awesome firepower."
  STATIC_MODIFIER_NAME_modifier_por_feitorias: "Feitorias"
  STATIC_MODIFIER_DESC_modifier_por_feitorias: "Let us send forth our #italic feitors#! to all corners of the East, and establish our country as the dominant trading force in the $indian_ocean_region$. By creating a network of strong fortified trading posts along the coasts of $africa$ and $india$, we can dominate local trade without expending too many resources."
  STATIC_MODIFIER_NAME_modifier_por_ordenancas: "Ordenanças"
  STATIC_MODIFIER_DESC_modifier_por_ordenancas: "Our nation needs a professional army to guard the sacred borders of our glorious nation. We will reform the conscription system and train our young recruits to fulfill that duty with honor."
  STATIC_MODIFIER_NAME_modifier_por_the_bandeirantes: "Encourage the Bandeirantes"
  STATIC_MODIFIER_DESC_modifier_por_the_bandeirantes: "Sometimes, members of slave-raiding expeditions stumble across gold and other precious metals or stones. Spreading word of these valuable discoveries should pique the interest of hardy souls who might be willing to emigrate to our colonies in search of their fortunes."
  STATIC_MODIFIER_NAME_modifier_por_colonial_governors: "Colonial Governors"
  STATIC_MODIFIER_DESC_modifier_por_colonial_governors: "By sending our most capable administrators to govern our colonies and outposts, we will ensure that these settlements remain peaceful and loyal to their mother nation, while we sit back and watch the profits roll in."
  STATIC_MODIFIER_NAME_modifier_por_royal_absolutism: "Royal Absolutism"
  STATIC_MODIFIER_DESC_modifier_por_royal_absolutism: "For too long, our royal authority has been hindered by hapless meddling from the nobility, whose narrow local interests threaten the greater good of the realm. We will ignore the Cortes entirely, and rule without their interference."
  STATIC_MODIFIER_NAME_modifier_por_royal_military_academy: "Royal Academy of Fortification, Artillery, and Drawing"
  STATIC_MODIFIER_DESC_modifier_por_royal_military_academy: "Our artillery corps and fortifications have long been the key to defending our land, making our small country a tougher nut to crack for enemy armies. We shall establish a military academy — the #italic Academia Real de Fortificação, Artilharia e Desenho#! — to train our officers in these fields, so that they, in turn, may fashion our forts and our artillery corps into the finest in the world!"
  STATIC_MODIFIER_NAME_modifier_por_vinho_porto: "Vinho do $porto$"
  STATIC_MODIFIER_DESC_modifier_por_vinho_porto: "On the banks of the Douro river, in the north of the country, grapes are cultivated to create a unique $wine$ fortified with spirits, which is famously known as #italic Port Wine#!. As we are the only nation producing this delightful intoxicant, we must not miss our chance to make scads of money from its export."
  STATIC_MODIFIER_NAME_modifier_le_livre_des_tournois: "Le Livre des Tournois"
  STATIC_MODIFIER_DESC_modifier_le_livre_des_tournois: "Penned by royalty, the 'Book of Tournaments' is more than a manual — it is a statement of courtly pride and chivalric identity. Our nobility trains not only for war but for spectacle, and in doing so preserves martial discipline and prestige across the realm."
  STATIC_MODIFIER_NAME_modifier_statutes_of_aix: "Statutes of Aix"
  STATIC_MODIFIER_DESC_modifier_statutes_of_aix: "A series of loosely consolidated laws and statutes form the legal backbone of our governance. These statutes blend Roman jurisprudence with local customs and Angevin tradition, allowing us to manage a patchwork of regions as one cohesive domain: a true composite monarchy, where the parts are diverse, but the crown is indivisible."
  STATIC_MODIFIER_NAME_modifier_rade_of_toulon: "Rade of $toulon$"
  STATIC_MODIFIER_DESC_modifier_rade_of_toulon: "$toulon$'s natural harbor offers the ideal staging ground for our naval ambitions. While $marseille$ thrives as our commercial jewel, $toulon$ shall be the armory of $PRO$, and the launching point of a future maritime power."
  STATIC_MODIFIER_NAME_modifier_piqure_de_marseilles: "Piqûre de $marseille$"
  STATIC_MODIFIER_DESC_modifier_piqure_de_marseilles: "Across the workshops of $marseille$, artisans stitch delicate #italic boutis#! quilts in the $PRO_ADJ$ style — treasured across $europe$ for their quality and charm. Much like our duchy, works of art created in our realm are composed of many parts stitched into a unified whole: a quilted land, rich in texture and culture."
  STATIC_MODIFIER_NAME_modifier_rom_restore_the_legions: "Restore the Legions"
  STATIC_MODIFIER_DESC_modifier_rom_restore_the_legions: "The Legions were once the pride of Rome, feared and respected across the world. To restore them is to also revive the discipline, organization, and indomitable spirit that our great empire is built upon."
  STATIC_MODIFIER_NAME_modifier_rom_revival_of_arts_and_culture: "Revival of Arts and Culture"
  STATIC_MODIFIER_DESC_modifier_rom_revival_of_arts_and_culture: "Rome was as much a center of culture as it was an Empire of conquest. By sponsoring poets, scholars, and architects, we will rekindle the creative flame that once illuminated the ancient world."
  STATIC_MODIFIER_NAME_modifier_rom_bread_and_circuses: "Panem et Circenses"
  STATIC_MODIFIER_DESC_modifier_rom_bread_and_circuses: "The people must be kept happy and sated, for discontent breeds revolt. By putting grain on their tables and providing diverting activities such as games and public festivals, we shall win their loyalty and strengthen the state through their patriotism."
  STATIC_MODIFIER_NAME_modifier_rom_citizenship: "Roman Citizenship"
  STATIC_MODIFIER_DESC_modifier_rom_citizenship: "Citizenship is the lifeblood of Rome, binding peoples of every province into a single political body. Extending these rights ensures integration and the promise of advancement for all who serve the empire."
  STATIC_MODIFIER_NAME_modifier_rom_all_roads_lead_to_rome: "All Roads Lead to Rome"
  STATIC_MODIFIER_DESC_modifier_rom_all_roads_lead_to_rome: "The Roman road system is the envy of the world. It binds our empire together, speeding merchants, messengers, and soldiers alike, with all paths converging in the Eternal City."
  STATIC_MODIFIER_NAME_modifier_rom_provincial_governors: "Provincial Governors"
  STATIC_MODIFIER_DESC_modifier_rom_provincial_governors: "Our more remote provinces cannot effectively be ruled from Rome only. By placing competent governors in the outlying regions, we will guarantee that our laws are followed and taxes paid promptly in even the most distant lands of the empire."
  STATIC_MODIFIER_NAME_modifier_rom_imperium_sine_fine: "Imperium Sine Fine"
  STATIC_MODIFIER_DESC_modifier_rom_imperium_sine_fine: "Rome's destiny knows no bounds. From the Pillars of Hercules to the edges of the earth, we will expand our dominion without end, bringing civilization wherever the Imperial Eagle soars."
  STATIC_MODIFIER_NAME_modifier_rom_triumphs: "Roman Triumphs"
  STATIC_MODIFIER_DESC_modifier_rom_triumphs: "A triumph is more than a mere procession. Indeed, it is the living memory of conquest, paraded through the streets of our greatest cities. Such ceremonies inspire loyalty, awe, fear, and ambition in equal measure."
  STATIC_MODIFIER_NAME_modifier_rom_roman_architecture: "Roman Architecture"
  STATIC_MODIFIER_DESC_modifier_rom_roman_architecture: "From aqueducts to amphitheaters, Roman engineering leaves behind monuments that endure for centuries. Our mastery of stone and arch will show the entire world that Rome's greatness is eternal."
  STATIC_MODIFIER_NAME_modifier_sav_the_shroud_of_turin: "Holy Shroud Pilgrimage"
  STATIC_MODIFIER_DESC_modifier_sav_the_shroud_of_turin: "Our realm is in the possession of a most holy artifact, a piece of cloth that bears the face of Jesus of Nazareth. Naturally, it has attracted numerous pilgrims, all clamoring to see and venerate this extraordinary relic. This constant stream of pilgrimage brings a great deal of wealth into our territory — which is all very much to our advantage."
  STATIC_MODIFIER_NAME_modifier_sav_alpine_pass_control: "Control Over the Passes"
  STATIC_MODIFIER_DESC_modifier_sav_alpine_pass_control: "The passage over the Alps is troublesome at the best of times, and can be outright impossible with carriages or a larger entourage. By maintaining good pathways, shelters, and waystations, we will be able to dominate the difficult terrain and ensure a steady exchange of merchants throughout our territory."
  STATIC_MODIFIER_NAME_modifier_sav_fight_the_vaudois: "Stand against Heresy"
  STATIC_MODIFIER_DESC_modifier_sav_fight_the_vaudois: "Our lands have long suffered under the heretical preaching of the Waldensians. By the force of our will and with the support of the divine, we have been able to contain their influence, and we shall continue to defend the one true faith from these dangerous ideas."
  STATIC_MODIFIER_NAME_modifier_sav_embrace_the_vaudois: "A Light in the Darkness"
  STATIC_MODIFIER_DESC_modifier_sav_embrace_the_vaudois: "We have embraced the teachings of the Waldensian movement and are dedicated to protecting this faith from the vicious $catholic_ADJ$ Church, which seeks to eradicate its ideas."
  STATIC_MODIFIER_NAME_modifier_sav_repopulate_the_valleys: "Populate Alpine Valleys"
  STATIC_MODIFIER_DESC_modifier_sav_repopulate_the_valleys: "Many people in our realm leave the alpine valleys they were born into to settle in the urban areas on either side of the mountain range. This depopulation leaves the small villages of lesser valleys in a precarious, politically unstable position. We must ensure that the valley lands are sufficiently populated and can be adequately maintained."
  STATIC_MODIFIER_NAME_modifier_sca_legacy_kalmar_union: "Legacy of the Kalmar Union"
  STATIC_MODIFIER_DESC_modifier_sca_legacy_kalmar_union: "Though the Kalmar Union dissolved in conflict, it established a precedent for shared Nordic sovereignty. Drawing upon this legacy, we reaffirm our authority and remind our subjects that unity brings strength, not subjugation."
  STATIC_MODIFIER_NAME_modifier_sca_sound_toll: "The Sound Toll"
  STATIC_MODIFIER_DESC_modifier_sca_sound_toll: "Control over the Øresund grants us the right to impose the Sound Toll on all foreign ships passing through the $DAN_ADJ$ straits. This ancient privilege turns geographic advantage into tangible wealth, strengthening our dominance over northern trade."
  STATIC_MODIFIER_NAME_modifier_norwegian_heritage: "$NOR_ADJ$ Maritime Heritage"
  STATIC_MODIFIER_DESC_modifier_norwegian_heritage: "$NOR$'s rugged coastlines and maritime traditions have shaped a people skilled in seafaring, fishing, and navigation. The legacy of $NOR_ADJ$ fishermen and shipbuilders fuels our naval endeavors and bolsters the lifeblood of our coastal communities."
  STATIC_MODIFIER_NAME_modifier_danish_heritage: "$DAN_ADJ$ Dockyard Legacy"
  STATIC_MODIFIER_DESC_modifier_danish_heritage: "$DAN$'s long naval traditions and its mastery of maritime logistics culminated in major dockyards like those in $kobenhavn$. As $SCA$, we inherit these powerful infrastructures and traditions, boosting our diplomatic standing and naval readiness."
  STATIC_MODIFIER_NAME_modifier_finnish_heritage: "$FIN_ADJ$ Frontier Cavalry"
  STATIC_MODIFIER_DESC_modifier_finnish_heritage: "The $FIN_ADJ$ cavalry — #italic Hakkapeliitta#! — gained a fearsome reputation in wars in $europe$ These riders, raised in the wild forests and plains of $finland_area$, bring experience, adaptability, and toughness to our ranks. By formalizing their role, we will create a permanent elite force within our armies."
  STATIC_MODIFIER_NAME_modifier_swedish_roots: "$SWE_ADJ$ Military Roots"
  STATIC_MODIFIER_DESC_modifier_swedish_roots: "From the disciplined Carolean ranks to the strong freeholding peasantry, $SWE$'s military prowess is an essential pillar of Scandinavia. By integrating $SWE_ADJ$ institutions and recruitment systems, we reinforce the manpower and strength of our empire."
  STATIC_MODIFIER_NAME_modifier_scottish_tenacity: "Tenacious Land"
  STATIC_MODIFIER_DESC_modifier_scottish_tenacity: "War can be a long and tiring affair. If we are to defend our independence, we need to be prepared to endure hard times. Luckily, our people are as tenacious as the land they call their home, and resist foreign invaders to their last breaths."
  STATIC_MODIFIER_NAME_modifier_influx_of_english_nobles: "$ENG_ADJ$ Administrators"
  STATIC_MODIFIER_DESC_modifier_influx_of_english_nobles: "Securing peace with our southern neighbor has led to a steady influx of $ENG_ADJ$ aristocrats entering our administration. This makes it possible to exert our control over our country more effectively."
  STATIC_MODIFIER_NAME_modifier_scottish_trade_connections: "$north_sea_area$ Trade Connections"
  STATIC_MODIFIER_DESC_modifier_scottish_trade_connections: "Our country is situated at the far edge of $western_europe$ and is sparse in resources. If we are to thrive economically, we need to invest and expand our trade connections to further regions. The $north_sea_area$ can connect us to rich markets and business opportunities, provided we learn to harness its potential."
  STATIC_MODIFIER_NAME_modifier_comets: "Comets?"
  STATIC_MODIFIER_DESC_modifier_comets: "We have recently received a rather curious new tome. It is called #italic On the True Significance of Comets against the Vanity of Astrologers#!, and it is positively filled with vital information on these highly suspicious entities. We have decreed that all in the realm should be aware of its contents."
  STATIC_MODIFIER_NAME_modifier_modernized_royal_scots_navy: "Royal Scots Navy"
  STATIC_MODIFIER_DESC_modifier_modernized_royal_scots_navy: "Since the Wars of Independence, we have been looking at reinforcing and updating our navy. Previously, we had used feudal obligations to bulk out our fleets with crew and ships, but we will now create a modern fleet, owned by the King and based in our port of Newhaven."
  STATIC_MODIFIER_NAME_modifier_royal_revenue: "Assert the Royal Revenue"
  STATIC_MODIFIER_DESC_modifier_royal_revenue: "If $SCO$ is to continue its independent existence, we must secure stable sources of income. By tightening our control over the obligations owed to us by royal estates and feudal properties, we can increase our rightfully received taxes. Through these methods, we can ensure the Crown has sufficient funds to enact their will without relying on other sources of money."
  STATIC_MODIFIER_NAME_modifier_scottish_education: "$SCO_ADJ$ Universities"
  STATIC_MODIFIER_DESC_modifier_scottish_education: "Having sent our brightest scholars to be educated in foreign universities for many years, it is time to improve our domestic education, and provide a place here in $SCO$ where the greatest minds of our nation can learn and grow. Our people should strive to acquire valuable knowledge and skills in their home country rather than wasting their money on expensive travel and their time on foreign institutions."
  STATIC_MODIFIER_NAME_modifier_act_of_revocation: "Act of Revocation"
  STATIC_MODIFIER_DESC_modifier_act_of_revocation: "It has long been the custom to gift parts of the Royal Domain to our nobility as a reward for their services, but this system cannot be sustained if we want to ensure the integrity of our domain. From now on, we will insist on renting these lands instead of outright giving them away."
  STATIC_MODIFIER_NAME_modifier_scottish_diplomacy: "Reliable Alliance"
  STATIC_MODIFIER_DESC_modifier_scottish_diplomacy: "For centuries, we relied on diplomacy and contact with foreign powers on the continent to ensure our independence. It is time to formalize this practice, and secure the endurance of our bonds for centuries to come."
  STATIC_MODIFIER_NAME_modifier_scottish_whisky: "Scotch Whisky"
  STATIC_MODIFIER_DESC_modifier_scottish_whisky: "While distilleries have existed in $SCO$ for a long time, we should ensure these industries are finally put under the purview of the state. This supervision will allow us to establish ourselves at the forefront of liquor production, and expand our exports industry."
  STATIC_MODIFIER_NAME_modifier_scottish_enlightenment: "$SCO_ADJ$ Enlightenment"
  STATIC_MODIFIER_DESC_modifier_scottish_enlightenment: "Rapid advancements in philosophy, political economy, and medicine have led to a plethora of accomplishments by our fellow countrymen that will propel $SCO$ to the forefront of global innovation. This period of $SCO_ADJ$ Enlightenment can be a very powerful tool for us on the world stage."
  STATIC_MODIFIER_NAME_modifier_home_of_hussars: "Home of the Hussars"
  STATIC_MODIFIER_DESC_modifier_home_of_hussars: "Although light cavalry formations are an old concept, the first Balkan hussars — or #italic gusars#! — appeared as auxiliary units of $BYZ$, recruited mainly from $BYZ_ADJ$-held $serbia_area$ in the 10th and 11th centuries. Even after $BYZ_ADJ$ power dwindled, this tradition remained, and was further refined over the following centuries."
  STATIC_MODIFIER_NAME_modifier_hum_the_kosaca_iron_fist: "The Kosača Iron Fist"
  STATIC_MODIFIER_DESC_modifier_hum_the_kosaca_iron_fist: "Inspired by the Kosača dynasty, the Principality has started centralizing the military under a single dynastic banner, the state has moved away from fragmented feudal levies toward a professionalized core of heavy infantry and mercenary crossbowmen. This military consolidation allows us to defy our enemies, turning the rugged landscape of our lands into a power-broker in the southern Dinaric Alps."
  STATIC_MODIFIER_NAME_modifier_ser_vitestvo: "Viteštvo"
  STATIC_MODIFIER_DESC_modifier_ser_vitestvo: "We will encourage #italic Viteštvo#!, a unique Serbian chivalric code, that will blend the heavy-armored traditions of the West with the stoic warrior-ethos of the East. This culture of knighthood will not be restricted to the highest nobility but trickle down into the lower classes of free soldiers. It will emphasize personal bravery, loyalty to the True Faith, and a specialized mastery of both the lance and the saber. This military culture will produce a population that is naturally predisposed to warfare, viewing military service as the highest form of social and spiritual achievement."
  STATIC_MODIFIER_NAME_modifier_rallying_the_troops: "Rallying the Troops"
  STATIC_MODIFIER_DESC_modifier_rallying_the_troops: "Our realm has developed various methods for swiftly amassing troops, so no enemy can catch us unprepared. This edge has helped us stand tall, despite all odds being against us, and we are prepared for battle. United, we march forward, resolute in purpose and ready to defend our honor and homeland!"
  STATIC_MODIFIER_NAME_modifier_zta_the_italian_condottieri: "The Italian Condottieri"
  STATIC_MODIFIER_DESC_modifier_zta_the_italian_condottieri: "We have mastered the lucrative and dangerous art of the international mercenary contract. By providing elite Zetan mountain infantry and veteran sailors to the italians for their various overseas wars, we secure access to modern Western armaments, gunpowder, and a powerful naval ally in the Adriatic. This connection ensures that our realm's independence is protected by powerful friends, while we simultaneously maintain and sharpen our ancient warrior traditions at home. It provides us with a professional military edge that few other Balkan states can hope to match."
  STATIC_MODIFIER_NAME_modifier_serbian_serbian_epic_poetry: "Serbian Epic Poetry"
  STATIC_MODIFIER_DESC_modifier_serbian_serbian_epic_poetry: "Serbian people have developed a 'living history' through epic poetry. The #italic Guslar#! — a wandering bard — is the primary guardian of the national soul. The #italic Guslar#! recites thousands of verses accompanied by the #italic gusle#!. These songs preserve genealogies, legal precedents, and moral imperatives. Serbian culture ensures that even the most illiterate shepherd has an understanding of ancestral rights and a shared identity. Every village gathering becomes a session of historical indoctrination."
  STATIC_MODIFIER_NAME_modifier_hum_the_viticulture_of_the_sunny_scree: "The Viticulture of the Sunny Scree"
  STATIC_MODIFIER_DESC_modifier_hum_the_viticulture_of_the_sunny_scree: "The limestone-rich, sun-drenched slopes of the Herzegovinian valleys produce a distinct, high-sugar grape that is the envy of the Adriatic. By establishing a royal monopoly on the export of Žilavka and Blatina wines, we can create a luxury trade that bypasses the volatility of the grain markets. This 'Liquid Diplomacy' allows our court to maintain a lifestyle that rivals the Italian city-states, using high-end wine exports as a diplomatic lubricant to secure favorable treaties with the Republic of Venice and the Kingdom of Naples."
  STATIC_MODIFIER_NAME_modifier_ser_the_transcribers_of_resava: "The Transcribers of Resava"
  STATIC_MODIFIER_DESC_modifier_ser_the_transcribers_of_resava: "In an era of conflict, the Serbian people turns to the pen to preserve what the sword can not. The #italic Resava School#! of orthography will standardize the Serbian-Slavonic language, creating a cultural 'republic of letters'. This obsession with linguistic purity and the preservation of chronicles will ensure that Serbian history is never lost to the fog of war. It creates a highly literate elite who acts as the memory of the nation, keeping the records of our dynasties alive in every monastery scriptorium from the Danube to the Adriatic."
  STATIC_MODIFIER_NAME_modifier_keepers_of_the_gate: "Keepers of the Gate"
  STATIC_MODIFIER_DESC_modifier_keepers_of_the_gate: "$SER$'s rugged terrain has birthed a formidable network of defenses, epitomized by the imposing Smederevo Fortress. These enduring fortifications safeguard our nation, making invasion a daunting prospect. From the sprawling mountain ranges to the strategic river valleys, $SER$'s defenses stand as a testament to our resilience and indomitable spirit."
  STATIC_MODIFIER_NAME_modifier_zta_the_retreat_to_the_karst: "The Retreat to the Karst"
  STATIC_MODIFIER_DESC_modifier_zta_the_retreat_to_the_karst: "The coast may be temporarily lost to the shifting sands of imperial power, but the karst mountains remain our eternal and impregnable fortress. Our monastery-stronghold of Cetinje, nestled high in the Lovćen mountains where the air is thin and the slopes are steep, is the core of our nation. This city embodies a long-term national strategy of 'Mountain Isolation', where we deliberately trade the wealth and vulnerability of the ports for the absolute security of the high peaks. By entrenching ourselves in the rock, we effectively make the Zetan state impossible for any imperial power to fully annex or govern."
  STATIC_MODIFIER_NAME_modifier_serbian_the_icon_of_saint_sava: "The Icon of Saint Sava"
  STATIC_MODIFIER_DESC_modifier_serbian_the_icon_of_saint_sava: "The cultural foundation of the Serbian people is defined by Saint Sava. By blending Byzantine spirituality with local Slavic customs and a fierce commitment to the Serbian language in liturgy, Sava created a national church that is inseparable from the people's identity. This cultural anchor resurfaces again among our people and ensures that all Serbians, whether nobles or peasants, view themselves as part of a distinct, sacred community that remains unified even when political borders shift or collapse, providing an internal stability that resists foreign cultural assimilation."
  STATIC_MODIFIER_NAME_modifier_hum_the_humite_chancery_records: "The Humite Chancery Records"
  STATIC_MODIFIER_DESC_modifier_hum_the_humite_chancery_records: "To manage our state, we have centralized our administration into a mobile but highly organized Chancery. By maintaining precise records of land ownership, clan lineages, and tax obligations even during wartime, we prevent the social disintegration that often follows foreign occupation. This bureaucratic resilience ensures that the state can resume full operations the moment an invader is repelled, maintaining a clear and unbroken chain of command that stretches from the ruler's palace to the smallest mountain hamlet in the high karsts."
  STATIC_MODIFIER_NAME_modifier_the_rebirth_of_the_patriarchate: "The Rebirth of the Patriarchate"
  STATIC_MODIFIER_DESC_modifier_the_rebirth_of_the_patriarchate: "Through incredible savvy and political maneuvering within the complex imperial administrative systems of our neighbors, we have successfully negotiated the restoration of our national Patriarchate. This diplomatic victory grants us spiritual and legal jurisdiction over all Serbian populations stretching from the Adriatic coast to the middle Danube, effectively allowing the Church to act as a 'Guardian of all Serbs'. It enables the maintenance of a shadow administration that collects tithes, manages local education, and keeps the flame of our traditions alive among a population that remains unified by a single, powerful faith."
  STATIC_MODIFIER_NAME_modifier_reform_the_ecclesiastical_authorities: "The Morava Trade Guilds"
  STATIC_MODIFIER_DESC_modifier_reform_the_ecclesiastical_authorities: "We will issue royal charters to the guilds of the Morava Valley, and encourage the development of large-scale leather-working, weaving, and metal-finishing workshops along the river's transit points. By exempting these guilds from certain internal tolls in exchange for providing standardized equipment to the royal armies — such as saddlery for the cavalry and uniforms for the infantry — the state will create a self-sustaining domestic industry. This move will reduce the realm's dependence on expensive foreign imports from outside and create a prosperous, urban middle class that serves as a loyal counter-weight to the rural power of the nobility, significantly broadening the state's taxable economic base."
  STATIC_MODIFIER_NAME_modifier_zta_the_vladika_sovereignty: "The Vladika Sovereignty"
  STATIC_MODIFIER_DESC_modifier_zta_the_vladika_sovereignty: "As the secular noble dynasties fade under the pressure of continuous war, the Prince-Bishops (Vladikas) of Cetinje have taken up the heavy mantle of national leadership. This unique #italic Theocratic Monarchy#! unites spiritual authority and temporal power in a single, celibate office, effectively preventing the dangerous fragmentation of our lands among rival feudal heirs. It turns the struggle for mountain independence into a perpetual holy war that every clan member is religiously bound to fight. The #italic Vladika#! is not just a ruler; he is the living symbol of our resistance, ensuring that the cross and the sword are never separated in the defense of the #italic Black Mountain#!."
  STATIC_MODIFIER_NAME_modifier_serbian_seobe: "Seobe"
  STATIC_MODIFIER_DESC_modifier_serbian_seobe: "The Serbian people have mastered the art of 'mobile identity'. This is characterized by the ability to move entire communities to new lands without losing cultural cohesion. This cultural mobility ensures that the 'Serbian Hearth' is not a fixed geographic point, but a portable and indestructible social contract; wherever the Serbian community strikes its staff, the old laws and the traditions of the #italic Slava#! are immediately re-established. This resilience makes the Serbian culture functionally impossible to decapitate, as the nation can abandon scorched valleys only to reappear as a fully formed, military society on a new frontier, waiting for the opportune moment to strike back at the heart of their ancestral lands."
  STATIC_MODIFIER_NAME_modifier_hum_the_ponor_storage_system: "The Ponor Storage System"
  STATIC_MODIFIER_DESC_modifier_hum_the_ponor_storage_system: "We have mastered the climate-controlled secrets of the Trebišnjica river system, the world's longest losing stream. By utilizing the stable temperatures and dry upper galleries of the #italic ponors#! (sinkholes) during the summer, we have established a national network of subterranean granaries. This 'Hidden Reserve' ensures that our grain supplies are immune to the scorching Herzegovinian heat and, more importantly, invisible to the foraging parties of invading armies. While our enemies starve in a scorched valley, our forces remain well-fed by tapping into the earth's own cool depths, allowing us to maintain a high-morale standing army even during multi-year blockades."
  STATIC_MODIFIER_NAME_modifier_ser_serbian_national_militia: "Serbian National Militia"
  STATIC_MODIFIER_DESC_modifier_ser_serbian_national_militia: "Drawing from the hard-won experience of our veteran units of the previous decades, we have established a permanent, professional standing National Militia. This force represents a decisive move away from the disorganized peasant levy, utilizing rigorous Western drill, uniform equipment, and a modernized chain of command while retaining the fierce, high-morale fighting style of our Balkan predecessors. This ensures that our independence is not a fragile diplomatic gift, but is instead backed by a credible, modern military machine that can defend our borders against any encroaching imperial power."
  STATIC_MODIFIER_NAME_modifier_foreign_relations_bureau: "Foreign Relations Bureau"
  STATIC_MODIFIER_DESC_modifier_foreign_relations_bureau: "Our realm has recognized the importance of fostering friendly relations and alliances with neighboring countries. To facilitate this, we will establish a specialized bureau dedicated to foreign affairs. By maintaining a dedicated focus on diplomacy, we are better positioned to navigate the complex web of international relations and secure our nation's prosperity."
  STATIC_MODIFIER_NAME_modifier_zta_guerillas_of_the_scrub: "Guerillas of the Scrub"
  STATIC_MODIFIER_DESC_modifier_zta_guerillas_of_the_scrub: "The #italic Gola Brda#! (Naked Hills) of the karst offer absolutely no cover for a traditional invading army, but they provide infinite hideouts and ambush points for our nimble warriors. We have developed a sophisticated tactical doctrine of 'Night-Raiding', where our clansmen descend silently from the peaks under the total cover of darkness to butcher enemy camps, spike their cannons, and vanish back into the mist before the first light of dawn. This psychological warfare ensures that any occupying force in the lowlands is driven to the brink of madness by constant fear and physical exhaustion, making our territory a nightmare they eventually choose to abandon, while adapting our armies to any hostile territory."
  STATIC_MODIFIER_NAME_modifier_serbian_enlightenment: "$SER_ADJ$ Enlightenment"
  STATIC_MODIFIER_DESC_modifier_serbian_enlightenment: "Inspired by other nations of the Enlightenment, our national heroes, such as Dositej Obradović, have sought to elevate our vernacular language and literature. Touched by the dearth of secular works accessible to the common folk, Dositej Obradović has taken the lead in bridging the gap between written and spoken $serbian_dialect$. By diligently crafting grammar books and dictionaries, authoring new tomes, and translating foreign works, our nation is fostering a literary revival thanks to the work of these visionaries."
  STATIC_MODIFIER_NAME_modifier_hum_modernized_national_redoubt: "Modernized National Redoubt"
  STATIC_MODIFIER_DESC_modifier_hum_modernized_national_redoubt: "Refining centuries of mountain warfare, we have implemented the 'National Redoubt' doctrine, where every major city and pass is integrated into a single, cohesive defensive plan. Using modern Western ballistics and cartography, we have pre-positioned batteries and supplies in hidden mountain caches. This doctrine ensures that even if the valleys are lost, the state can continue to function as a sovereign military entity from the high peaks, mocking any occupier with a permanent, active resistance that makes the cost of holding Hum prohibitively expensive for any empire."
  STATIC_MODIFIER_NAME_modifier_military_modernization: "Military Modernization"
  STATIC_MODIFIER_DESC_modifier_military_modernization: "Our people remember the birth of our nation: surrounded by formidable powers that pose permanent, looming threats to our security. This enduring vigilance has forged a culture of unwavering readiness, ensuring our armed forces stand as a shield against adversity. Fearless and respected, our soldiers have transformed us from potential prey to a mighty adversary, deterring any who dare encroach upon our sovereignty."
  STATIC_MODIFIER_NAME_modifier_ser_the_sumadija_agrarian_revolution: "The Šumadija Agrarian Revolution"
  STATIC_MODIFIER_DESC_modifier_ser_the_sumadija_agrarian_revolution: "The Serbian peasantry has led its own cultural-economic revolution by adopting agrarian techniques learned from the West. This has turned the dense forests of $sumadija_province$ into a highly productive agricultural heartland. This surplus of food does not just feed the people; it fuels a demographic explosion. A well-fed Serbian population is a growing and ambitious one, providing a massive pool of young, healthy recruits for the army and a robust internal market that makes Serbia the dominant economic engine of the Central Balkans."
  STATIC_MODIFIER_NAME_modifier_zta_the_code_of_the_black_mountain: "The Code of the Black Mountain"
  STATIC_MODIFIER_DESC_modifier_zta_the_code_of_the_black_mountain: "To finally transition from a loose tribal federation to a modern, centralized state, we have introduced a rigorous and uncompromising new legal code that strictly suppresses the destructive tradition of blood feuds and centralizes the power of the #italic Vladika#!. By replacing ancient tribal law with a uniform system of state justice and taxation, we unify the competing clans into a single, cohesive national body. This reform turns the disparate and often chaotic energy of the mountains into a focused, disciplined national force capable of reclaiming our ancestral coastlines and expanding our borders with the efficiency of a modern European power."
  STATIC_MODIFIER_NAME_modifier_sia_experienced_ambassadors: "Experienced Ambassadors"
  STATIC_MODIFIER_DESC_modifier_sia_experienced_ambassadors: "We have extensive political experience. The birth of our country was something achieved not only with the power of our military, after all. Surely our diplomatic reputation will prove to be a source of our influence on the world stage."
  STATIC_MODIFIER_NAME_modifier_sia_rise_to_equal_heights: "Rise to Equal Heights"
  STATIC_MODIFIER_DESC_modifier_sia_rise_to_equal_heights: "There are many parts of our country with very low population. We should improve conditions in these regions to ensure that no part of our country is seen as lackluster, and all of it shines equally."
  STATIC_MODIFIER_NAME_modifier_sia_consolidation_of_state: "Consolidation of the State"
  STATIC_MODIFIER_DESC_modifier_sia_consolidation_of_state: "A decentralized system may cause us to lose control over our more distant provinces. If we are to be the true unifying realm for the $thai_culture$ people, our provinces must be unified as well."
  STATIC_MODIFIER_NAME_modifier_sia_education_reform: "Education Reforms"
  STATIC_MODIFIER_DESC_modifier_sia_education_reform: "As our Lord Buddha said, we shall not accept something because it is often said, but we need to experience it ourselves. Education is the basis of knowledge, and if we want to excel at technology, we need to excel at education first."
  STATIC_MODIFIER_NAME_modifier_sia_royal_absolutism: "Royal Absolutism"
  STATIC_MODIFIER_DESC_modifier_sia_royal_absolutism: "Second only to Heaven — that is what a ruler should be. Honored and worshipped, our leaders rule over the Earth as the Gods rule over Heaven."
  STATIC_MODIFIER_NAME_modifier_sia_thai_unity: "$thai_culture$ Unity"
  STATIC_MODIFIER_DESC_modifier_sia_thai_unity: "We are undoubtedly the leaders of all $thai_culture$ people. Our troops are proud to serve as defenders of our culture and identity itself, and they fight fiercely for the privilege."
  STATIC_MODIFIER_NAME_modifier_sic_studium_generale: "Studium Generale"
  STATIC_MODIFIER_DESC_modifier_sic_studium_generale: "Founded by King Alfonso V of $ARA$, the University of $catania$ was the oldest in $SIC$ and one of the few southern institutions granted full #italic Studium Generale#! status. Unique for its royal charter and blend of scholastic and legal education, it produced jurists, theologians, and scientists who served both Church and Crown in a culturally diverse region."
  STATIC_MODIFIER_NAME_modifier_sic_naval_vigilance: "Naval Vigilance"
  STATIC_MODIFIER_DESC_modifier_sic_naval_vigilance: "Constant raids from Barbary pirates and $TUR_ADJ$ ships have forced $SIC$ to maintain a vigilant coastal defense. Its galleys and forts became critical for protecting southern $europe$."
  STATIC_MODIFIER_NAME_modifier_sic_sicilian_silk: "$SIC_ADJ$ $silk$"
  STATIC_MODIFIER_DESC_modifier_sic_sicilian_silk: "In the time of Frederick II, $silk$ was $SIC$'s major export. Although our $silk$ industry has declined in the intervening centuries, $SIC$'s productions having been outstripped by that of the northern $ITA_ADJ$ states, there is no reason why it should not rise again. By investing in our $silk$ production, we can see our weavers and craftsmen flourish anew."
  STATIC_MODIFIER_NAME_modifier_sic_sicilian_enlightenment: "$SIC_ADJ$ Enlightenment"
  STATIC_MODIFIER_DESC_modifier_sic_sicilian_enlightenment: "Though distant from the great salons of $paris$ or $vienna$, $SIC$ has fostered its own Enlightenment. Intellectuals challenged feudal privileges, promoted science, and advocated legal reforms, often within the framework of $catholic_ADJ$ humanism. These ideas laid the groundwork for modernity in the shadow of monarchy and tradition."
  STATIC_MODIFIER_NAME_modifier_sic_sicilian_reforms: "$SIC_ADJ$ Reforms"
  STATIC_MODIFIER_DESC_modifier_sic_sicilian_reforms: "As time passes, our institutions become obsolete or just inefficient. Reforms are necessary if we want our nation to prosper and thrive. Our best minds will work hard to ensure that no waste happens, and that our processes are as efficient as possible."
  STATIC_MODIFIER_NAME_modifier_sko_fulani_expansion: "Expansion of Sokoto"
  STATIC_MODIFIER_DESC_modifier_sko_fulani_expansion: "For too long the people of $west_africa$ have labored under rulers that, while professing to be righteous, indulged in syncretism. No more! Our flag shall always fly above that of worldly kingdoms!"
  STATIC_MODIFIER_NAME_modifier_sko_recruit_the_faithful: "Recruit the Faithful"
  STATIC_MODIFIER_DESC_modifier_sko_recruit_the_faithful: "Everyone who is ready to serve under our righteous leaders must be welcome, regardless of their heritage."
  STATIC_MODIFIER_NAME_modifier_sko_education_for_all: "Learned Scholars"
  STATIC_MODIFIER_DESC_modifier_sko_education_for_all: "By encouraging the spread of literacy and scholarship among men and women alike, we can advance our society and further our hold over our lands. The family of our rulers must have a special place in these efforts, serving as an ideal to emulate."
  STATIC_MODIFIER_NAME_modifier_sko_religious_court: "Most Religious Court"
  STATIC_MODIFIER_DESC_modifier_sko_religious_court: "Instead of displaying the worldly pomp of our rule, our court should focus on spiritual matters. By inviting learned religious figures to teach in our capital, we can show our true commitment to our faith."
  STATIC_MODIFIER_NAME_modifier_sko_recruit_fulani_generals: "Recruit $fulbe$ Commanders"
  STATIC_MODIFIER_DESC_modifier_sko_recruit_fulani_generals: "The $fulbe$ people are distinguished warriors, serving as leaders in all corners of $west_africa$. We should establish ourselves as a permanent employer for their most capable commanders."
  STATIC_MODIFIER_NAME_modifier_sko_one_people_in_faith: "Unification in Faith"
  STATIC_MODIFIER_DESC_modifier_sko_one_people_in_faith: "Our lands are home to many people of different cultures and languages. We must emphasize our faith as the unifying force, joining all people under one banner."
  STATIC_MODIFIER_NAME_modifier_sme_atabegs_of_samtskhe: "Atabegs of $SME$"
  STATIC_MODIFIER_DESC_modifier_sme_atabegs_of_samtskhe: "We are not just one part of the Kingdom of $GEO$, as a long time ago we received royal recognition and, with it, the title of Atabeg. This title had previously been granted only to the Armenian vassals, and therefore its conveyance is a sign of distinction and of the respect that the $GEO_ADJ$ monarch has for us."
  STATIC_MODIFIER_NAME_modifier_sme_proactive_diplomacy: "Proactive Diplomacy"
  STATIC_MODIFIER_DESC_modifier_sme_proactive_diplomacy: "While still a part of $GEO$, $SME$ operates with substantial independence. This privileged position requires constant diplomatic awareness and a policy of active diplomacy, ensuring that we always have a direct channel to those in power. We do all this while actively engaging in our internal politics, meddling with the succession and forging dynastic alliances as best benefits us. The survival of our relatively small state depends on upholding these diplomatic traditions. Let it never be said that we have done too little or acted without sufficient wisdom!"
  STATIC_MODIFIER_NAME_modifier_sme_fortresses_of_samtskhe: "Fortresses of $SME$"
  STATIC_MODIFIER_DESC_modifier_sme_fortresses_of_samtskhe: "Our mountainous terrain has acted as a shield against foreign invaders many times. Because of this, we learned to build strong fortresses and to always be prepared for defensive warfare. This legacy of strength and readiness is one we must strive at all costs to uphold — the fortresses of $SME$ must be perpetually well maintained, manned, and supplied, as foreign invaders are not a possibility but a certainty."
  STATIC_MODIFIER_NAME_modifier_sme_independent_ambitions: "Independent Ambitions"
  STATIC_MODIFIER_DESC_modifier_sme_independent_ambitions: "$SME$ has often been obligated to bow to foreign rulers, be they $muslim_ADJ$ or $christian_ADJ$; $georgian_culture$, $turkic_group$, or $iranian_group$. To build an enduring state that survives as an independent entity and can stand against covetous outsiders, we must establish independent institutions: issuing our own coinage, creating our own laws, and patronizing our own theologians and writers."
  STATIC_MODIFIER_NAME_modifier_sme_protect_trade_routes: "Protect the Trade Routes"
  STATIC_MODIFIER_DESC_modifier_sme_protect_trade_routes: "Our position at the crossroads of $georgia_area$, $anatolia_region$, $armenia_area$, and $azerbaijan_area$ also means that a great number of traders seek to cross our lands. However, the constant threat of being raided by nomadic tribesmen means that some have come to doubt the safety of traveling on our roads. We must properly defend all roads and merchant inns in our nation so that trade revenue can flow into our state treasury unhindered."
  STATIC_MODIFIER_NAME_modifier_sme_frontier_warriors: "Frontier Warriors"
  STATIC_MODIFIER_DESC_modifier_sme_frontier_warriors: "The Caucasus have been shaped by nomadic emperors since time immemorial, but the lush pastures of $SME$ have convinced many tribesmen to settle. We must not let this affect the stability of our kingdom, but instead make arrangements with these settling tribes so that they contribute to our military ambitions in exchange for the lands they claim."
  STATIC_MODIFIER_NAME_modifier_sme_sacred_land: "A Sacred Land"
  STATIC_MODIFIER_DESC_modifier_sme_sacred_land: "The lands of $SME$ are home to places both sacred and revered among the $georgian_culture$ people. The cave monastery of Vardzia, the ancient church of Atskuri with its miraculous icon of the Virgin Mary, and the Monastery of Ancha with its Anchiskhati icon, are some of the most significant holy places in our realm. By protecting and curating the $SME$ church, setting it apart as distinct from that of $GEO$, we ensure that our people stand united even in the face of adversity."
  STATIC_MODIFIER_NAME_modifier_sme_bridge_between_worlds: "Bridge Between Worlds"
  STATIC_MODIFIER_DESC_modifier_sme_bridge_between_worlds: "Our country has always served as a bridge between the $christian_ADJ$ and $muslim_ADJ$ worlds. As such, people of both faiths within our borders have become accustomed to interacting with each other."
  STATIC_MODIFIER_NAME_modifier_smolenskian_resolve: "$SMO_ADJ$ Resolve"
  STATIC_MODIFIER_DESC_modifier_smolenskian_resolve: "For centuries, $SMO$ has been a land carved up by outsiders — $LIT_ADJ$ dukes, $POL_ADJ$ kings, and $MOS_ADJ$ princes. To survive, we clung to what united us: our faith and our fortitude. If we are ever to rise again, we must cast off divisions and rally around the sacred idea that, above all, there is only $SMO$."
  STATIC_MODIFIER_NAME_modifier_link_the_steppes_trade: "Link the Steppes Trade"
  STATIC_MODIFIER_DESC_modifier_link_the_steppes_trade: "Positioned between forest and steppe, $SMO$ has long been a crossroads of war and commerce. By improving overland infrastructure and securing the arteries of caravan travel, we can reforge our role as the vital hinge between northern Rus', the Baltic, and the southern trade routes of the steppes."
  STATIC_MODIFIER_NAME_modifier_hub_of_militarism: "Hub of Militarism"
  STATIC_MODIFIER_DESC_modifier_hub_of_militarism: "Long has war defined our fate, but now it shall define our strength. From the ruinous embrace of warfare and siege, $SMO$ rises as a center of military production — cannons, firearms, powder and doctrine flow outward from our armories. Let the world see us not as a prize to be taken, but as a hammer to be feared, ready to strike the anvil of foreign conquerors."
  STATIC_MODIFIER_NAME_modifier_armories_of_smolensk: "The Armories of $SMO$"
  STATIC_MODIFIER_DESC_modifier_armories_of_smolensk: "After decades of warfare on every border, we learned to fight with weapons of both east and west. Blending $MOS_ADJ$ grit with western precision, our armories now produce elite artillery and tactics unmatched by our rivals. From our forges comes firepower — and from firepower, domination and perseverance."
  STATIC_MODIFIER_NAME_modifier_gold_to_salt_trade: "$goods_gold$ to $salt$ Trade"
  STATIC_MODIFIER_DESC_modifier_gold_to_salt_trade: "Some say that $salt$ is worth its weight in $goods_gold$... perhaps it would be more accurate to say that $goods_gold$ is worth its weight in $salt$. Either way, by exchanging these two commodities, we have established thriving trade networks."
  STATIC_MODIFIER_NAME_modifier_independence_from_mali: "Independence from $MAL$"
  STATIC_MODIFIER_DESC_modifier_independence_from_mali: "For many years, we were a subject of $MAL$. As $MAL$'s power has weakened, ours has grown, and we can now claim to be fully independent of $MAL_ADJ$ overlordship. Let us take steps to make sure we remain so."
  STATIC_MODIFIER_NAME_modifier_jihad_against_the_pagans: "$jihad$ Against the Pagans"
  STATIC_MODIFIER_DESC_modifier_jihad_against_the_pagans: "Despite the best efforts of centuries of Sunni sultanates, $west_africa$ is still plagued by the menace of Animistic pagans. By lifting the banner of $jihad$, we can cleanse our lands of the unbelievers and expand our frontiers at the same time."
  STATIC_MODIFIER_NAME_modifier_sankore_madrassah: "Sankoré Madrasah"
  STATIC_MODIFIER_DESC_modifier_sankore_madrassah: "We have been told that the Sankoré Mosque's school is the greatest center for learning in the entirety of $africa$. Who could be surprised if this were true, given how many wise men from distant $arabia_region$ and the $maghreb_region$ are here right now, arguing the finer points of philosophy and religion?"
  STATIC_MODIFIER_NAME_modifier_the_hajj: "The Ḥajj"
  STATIC_MODIFIER_DESC_modifier_the_hajj: "Like Mansa Mūsā of $MAL$ once did, our rulers can travel to $mecca$ on pilgrimage, fulfilling the fifth pillar of $muslim$ and bearing gold as a symbol of our wealth and power. Like the $MAL_ADJ$ pilgrims of old, the world will gasp in wonder at the wealth and grandeur of $SON$."
  STATIC_MODIFIER_NAME_modifier_sharia: "Sharī'ah"
  STATIC_MODIFIER_DESC_modifier_sharia: "The Holy Law that the Prophet followed when ruling $medina$ should be the unshakable foundation of the laws we use to run our society. By reforming our criminal code to reflect the teachings of the Prophet, we will bring harmony and justice to our people."
  STATIC_MODIFIER_NAME_modifier_trans_sahara_trade: "Trans-Sahara Trade"
  STATIC_MODIFIER_DESC_modifier_trans_sahara_trade: "Our traders frequently bring back fascinating things from the courts of $north_africa$. Perhaps they could find and bring back yet more fascinating trinkets?"
  STATIC_MODIFIER_NAME_modifier_modernization_of_the_military: "Modernization of the Military"
  STATIC_MODIFIER_DESC_modifier_modernization_of_the_military: "Our state lives and dies by the capabilities of our army. Our military not only ensures our survival, but is also what has set us on the path to greatness. We cannot allow ourselves to fall behind in progress!"
  STATIC_MODIFIER_NAME_modifier_spa_school_salamanca: "School of $salamanca$"
  STATIC_MODIFIER_DESC_modifier_spa_school_salamanca: "Based in the University of $salamanca$, the School's interests lie in fields as diverse as theology, economics, and political philosophy. As one of the leading schools of thought in the $catholic_ADJ$ world, its entrenched presence in $SPA$ ensures that our nation always remains at the forefront of intellectual affairs."
  STATIC_MODIFIER_NAME_modifier_spa_viceroyalties: "$SPA_ADJ$ Viceroyalties"
  STATIC_MODIFIER_DESC_modifier_spa_viceroyalties: "New lands across the ocean are waiting for us to claim them. We will divide this territory and have each section ruled by representatives of our government, who will establish orderly settlements. The aim there is for our people to find these new lands an attractive destination, and will settle there and secure our presence."
  STATIC_MODIFIER_NAME_modifier_spa_siglo_de_oro: "Siglo de Oro"
  STATIC_MODIFIER_DESC_modifier_spa_siglo_de_oro: "Our realm bustles with cultural and artistic achievements of all kinds. Should we channel that creativity to the proper places, feeding it when needed through wealthy benefactors, we will start a truly Golden Century of $SPA_ADJ$ art."
  STATIC_MODIFIER_NAME_modifier_spa_revival_of_ecclesiastical_discipline: "Revival of Ecclesiastical Discipline"
  STATIC_MODIFIER_DESC_modifier_spa_revival_of_ecclesiastical_discipline: "Religious laxity has become widespread among our people, turning us away from God. We will sign treaties with our religious leaders to encourage a stronger bond between them and our government, and return to being a devout nation."
  STATIC_MODIFIER_NAME_modifier_spa_naval_reforms: "$SPA_ADJ$ Naval Reforms"
  STATIC_MODIFIER_DESC_modifier_spa_naval_reforms: "We have not made our navy a priority, and as a result, we have fallen behind our competitors in terms of naval quality and performance. A reform is in order, which will re-elevate us to our rightful position of maritime supremacy."
  STATIC_MODIFIER_NAME_modifier_spa_spanish_enlightenment: "$SPA_ADJ$ Enlightenment"
  STATIC_MODIFIER_DESC_modifier_spa_spanish_enlightenment: "Radical new ideas have permeated the minds of $SPA$'s leading figures, inspiring them to develop ambitious plans that will make us stand out among all the other nations of the world."
  STATIC_MODIFIER_NAME_modifier_suk_birthplace_of_a_culture: "Birthplace of a Culture"
  STATIC_MODIFIER_DESC_modifier_suk_birthplace_of_a_culture: "We are called the first independent $thai_culture$ kingdom, as we were the first ones to rebel against $KHM_ADJ$ authority and establish ourselves as free from their influence. As such, all $thai_culture$ people look at us in admiration."
  STATIC_MODIFIER_NAME_modifier_suk_ram_khamhaeng_stele: "$name_ram_khamhaeng$ Stele"
  STATIC_MODIFIER_DESC_modifier_suk_ram_khamhaeng_stele: "Most of the history of the early $SUK_ADJ$ kingdom comes from inscriptions on the $suk_ram_khamhaeng_stele$, commissioned by the great king to give a record of his glorious reign. The $suk_ram_khamhaeng_stele$ is a sacred piece of heritage and one that surely proves our place in history."
  STATIC_MODIFIER_NAME_modifier_suk_wat_si_sawai: "Wat Si Sawai"
  STATIC_MODIFIER_DESC_modifier_suk_wat_si_sawai: "We are known for our many gorgeous temples, such as the $suk_wat_si_sawai$, one of the oldest in $sukhothai$. Built under the $KHM_ADJ$ authority as a $hindu_ADJ$ temple, its ensuing repurposing has turned it into a symbol of our identity. The faith of our people is strong."
  STATIC_MODIFIER_NAME_modifier_suk_sukhothai_ceramics: "$SUK$ Ceramics"
  STATIC_MODIFIER_DESC_modifier_suk_sukhothai_ceramics: "Ceramics have been created by the $thai_culture$ people since antiquity, influenced by $chinese_group$ ceramics but always retaining their own distinct style. However, the ceramics produced in our country are most valued, and they are often traded at great distances overseas."
  STATIC_MODIFIER_NAME_modifier_suk_military_history: "Military History"
  STATIC_MODIFIER_DESC_modifier_suk_military_history: "Our armies have a long history of victory in combat. As a result, a position in our military is seen as a post of honor and prestige, and there are many willing to serve."
  STATIC_MODIFIER_NAME_modifier_suk_unstoppable_army: "Unstoppable Army"
  STATIC_MODIFIER_DESC_modifier_suk_unstoppable_army: "Many have tried in the past to stop our progress and expansion, but all have failed in the face of our army. It has proved to be an unstoppable force, one that readily crushes any obstacles in our way."
  STATIC_MODIFIER_NAME_modifier_extend_kampung_kampung: "Extend the Kampung-Kampung"
  STATIC_MODIFIER_DESC_modifier_extend_kampung_kampung: "The foundation of $SUN_ADJ$ society lies in every #italic kampung#!, rural communities that dot the landscape. Investing in the infrastructure of these villages ensures sustainable growth, strong local leadership, and resilience against both famine and invasion."
  STATIC_MODIFIER_NAME_modifier_kung_och_riksdag: "Kung och Riksdag"
  STATIC_MODIFIER_DESC_modifier_kung_och_riksdag: "$SWE_ADJ$ rulers often depended on cooperation with the estates, especially with such a large peasant class compared to that of the nobility. During the reign of Gustavus Adolphus, however, a historic compromise was made with the aristocrats, who loyally pledged their resources to the disposal of the nation in return for new privileges."
  STATIC_MODIFIER_NAME_modifier_swedish_steel: "$SWE_ADJ$ Steel"
  STATIC_MODIFIER_DESC_modifier_swedish_steel: "While other armies may be content to wildly fire inaccurate volleys at their enemies, we shall march at them in disciplined ranks, deliver a single volley at close range, and then feed them cold steel."
  STATIC_MODIFIER_NAME_modifier_mulltimmer_masugn: "Mulltimmer Masugn"
  STATIC_MODIFIER_DESC_modifier_mulltimmer_masugn: "$SWE_ADJ$ $iron$, prized for its purity and strength, supplies not only our domestic needs but also the foundries and armories of nations across the continent. The #italic Mulltimmer Masugn#! was not built just with stone, but also with wood isolated with sand, gravel and dirt."
  STATIC_MODIFIER_NAME_modifier_swedish_royal_post_office: "Kungliga Postverket"
  STATIC_MODIFIER_DESC_modifier_swedish_royal_post_office: "The #italic Kungliga Postverket#!, or Royal Postal Agency, was created to improve state administration and communication across the expanse of $SWE$. It establishes a reliable network of couriers and waystations, and has become crucial for our military coordination, diplomacy, and governance."
  STATIC_MODIFIER_NAME_modifier_indelningsverket: "Indelningsverket"
  STATIC_MODIFIER_DESC_modifier_indelningsverket: "The $SWE_ADJ$ allotment system divides the peasantry into groups of ten for recruitment purposes. This system made it easier to find people to serve in the army and organize them into units."
  STATIC_MODIFIER_NAME_modifier_swedish_absolutism: "$SWE_ADJ$ Absolutism"
  STATIC_MODIFIER_DESC_modifier_swedish_absolutism: "Absolutism is the theory that one person should be in charge, that this person is the monarch, and that said monarch shall run the government unfettered by the Privy Council."
  STATIC_MODIFIER_NAME_modifier_polhem_machina_nova: "Machina Nova"
  STATIC_MODIFIER_DESC_modifier_polhem_machina_nova: "Christopher Polhem, dubbed the 'father of $SWE_ADJ$ engineering, has transformed $SWE_ADJ$ industry with his #italic Machina Nova#!, an innovative array of mechanical systems designed to streamline and boost production. Using intricate systems of gears, cams, and water power, Polhem has developed several machines capable of performing tasks previously done by hand, from ore-crushing in mines to textile weaving and sawmilling."
  STATIC_MODIFIER_NAME_modifier_produktplakatet: "Produktplakatet"
  STATIC_MODIFIER_DESC_modifier_produktplakatet: "The decree forbids foreign ships arriving in $SWE$ to bring goods from countries other than their own or their colonies."
  STATIC_MODIFIER_NAME_modifier_teu_reformed_order_army: "Reformed Order Army"
  STATIC_MODIFIER_DESC_modifier_teu_reformed_order_army: "The $GER_ADJ$ knights, and veterans of the Crusades and other wars are simply not numerous enough to remain the base of our armies. We must reorganize the army to incorporate domestic levies, regiments capable of replacing the knights on the battlefield."
  STATIC_MODIFIER_NAME_modifier_teu_peasants_recruitment: "Peasant Recruitment"
  STATIC_MODIFIER_DESC_modifier_teu_peasants_recruitment: "It has become clear to us that we can no longer rely on foreign volunteers to fill up our army ranks, no matter how experienced and valuable they might be. Instead, we will develop a system that would allow us to levy our subjects, both $GER_ADJ$ and non-$GER_ADJ$ folk alike."
  STATIC_MODIFIER_NAME_modifier_teu_infantry_tactics: "Infantry Tactics"
  STATIC_MODIFIER_DESC_modifier_teu_infantry_tactics: "Contemporary battles in $europe$ have proven that the age of infantry is about to begin. It is now time to develop new tactics, adopt use of the pike, and reform our medieval concept of auxiliary infantry into the main fighting force of our future armies."
  STATIC_MODIFIER_NAME_modifier_teu_teutonic_religious_authority: "Teutonic Religious Authority"
  STATIC_MODIFIER_DESC_modifier_teu_teutonic_religious_authority: "We will put an end to the loose religious autonomy local bishops hold within our realm. All religious matters, from taxation to converting the populace, will be state matters from now on."
  STATIC_MODIFIER_NAME_modifier_teu_expanded_marches: "Expanded Marches"
  STATIC_MODIFIER_DESC_modifier_teu_expanded_marches: "Grant autonomy to the local governors of our border regions, and reform their holdings into marches. These special zones will pay fewer taxes to the state in return for an obligation to maintain the highest combat readiness during times of war as well as peace. This should provide us with substantial military flexibility at little cost."
  STATIC_MODIFIER_NAME_modifier_teu_prussian_bishops: "$prussian$ Bishops"
  STATIC_MODIFIER_DESC_modifier_teu_prussian_bishops: "We shall grant further rights and privileges to our $prussian$ bishops, ensuring their loyalty in all matters."
  STATIC_MODIFIER_NAME_modifier_teu_one_state_one_religion: "One State, One Religion"
  STATIC_MODIFIER_DESC_modifier_teu_one_state_one_religion: "Reserve all state offices only for those who follow our religion. Heretics and heathens are no longer welcome in our realm."
  STATIC_MODIFIER_NAME_modifier_teu_absolute_order: "Absolute Order"
  STATIC_MODIFIER_DESC_modifier_teu_absolute_order: "All powers of the state are consolidated in our order. Every action taken and every decision made goes through the hierarchy of the Teutonic Order first before it gets executed. Of course, this bureaucracy is not in everyone's favor, but it ensures the absolute power of the #italic Hochmeister#!."
  STATIC_MODIFIER_NAME_modifier_tibetan_monastic_education: "Monastic Education System"
  STATIC_MODIFIER_DESC_modifier_tibetan_monastic_education: "Our monastic institutions have long served as centers of learning, debate, and spiritual discipline. Through rigorous training and a structured approach to education, our clerics maintain a high standard of intellectual and moral integrity. These foundations will support wise governance and cultural flourishing across our enlightened realm."
  STATIC_MODIFIER_NAME_modifier_tanye_guanxi: "Tányuè Guānxì"
  STATIC_MODIFIER_DESC_modifier_tanye_guanxi: "For centuries, our spiritual influence in $CHI$ has formed the bedrock of our diplomatic relations. Imperial patronage, tribute exchanges, and sacred rituals like #italic Tányuè#! secure both respect and material gain."
  STATIC_MODIFIER_NAME_modifier_great_three: "The Three Great Seats"
  STATIC_MODIFIER_DESC_modifier_great_three: "Sera, Ganden, and Drepung, these towering monastic universities form the intellectual heart of $TIB$. Their scholars train one generation after another of monks, diplomats, and rulers. With their rise, our realm became not only a bastion of faith but a cradle of rigorous thought and institutional progress."
  STATIC_MODIFIER_NAME_modifier_timurid_architecture: "$TIM_ADJ$ Architecture"
  STATIC_MODIFIER_DESC_modifier_timurid_architecture: "The architecture of $persia_region$ has been the envy of the known world for centuries. We must promote a new form of architecture, one that surpasses anything seen before, so that we may claim our birthright as the master of this art."
  STATIC_MODIFIER_NAME_modifier_the_mantle_of_the_great_khan: "The Mantle of the Great $rank_kingdom_horde_ruler_suffix_male$"
  STATIC_MODIFIER_DESC_modifier_the_mantle_of_the_great_khan: "The death of $genghis_khan_name_no_tooltip$ created a power vacuum that led to people who should have known better vying to replace him. However, through strategic marriages, we have consolidated our claim to descent from the Great $rank_kingdom_horde_ruler_suffix_male$ himself, and the warriors of the steppes will declare their loyalty to us accordingly."
  STATIC_MODIFIER_NAME_modifier_turco_persian_tradition: "Turco-Persian Tradition"
  STATIC_MODIFIER_DESC_modifier_turco_persian_tradition: "$IRA$ has always been the undeniable center of culture and language in the region, influencing the different $turkic_group$ peoples that have been around for centuries. We will embrace this blend of cultures to create our own unique tradition."
  STATIC_MODIFIER_NAME_modifier_tamerlane_chess: "Tamerlane Chess"
  STATIC_MODIFIER_DESC_modifier_tamerlane_chess: "This new variety of chess, invented by our great eponymous founder, improves upon previous versions. Using it will help our generals to improve their strategic and tactical skills."
  STATIC_MODIFIER_NAME_modifier_chagatai_literature: "$karluk_language$ Literature"
  STATIC_MODIFIER_DESC_modifier_chagatai_literature: "The $karluk_language$ language of the eastern steppes is far more worthy to carry the thoughts and ideas of our great lineage than $persian_language$ or $arabic_language$ ever could be. We must promote the use of our ancestral language, and create a new literary tradition."
  STATIC_MODIFIER_NAME_modifier_nambardar_levy: "Nambardar Levy"
  STATIC_MODIFIER_DESC_modifier_nambardar_levy: "The $nambardar_levy$, or #italic čerig-i nambardar#!, refers to our troops that do not come from $mongolian_culture$ or $turkic_group$ origins, but instead come from the native $iranian_group$ population. Thanks to them, we can build larger armies than would have been possible before."
  STATIC_MODIFIER_NAME_modifier_timurid_renaissance: "$TIM_ADJ$ $renaissance$"
  STATIC_MODIFIER_DESC_modifier_timurid_renaissance: "Ever since the initial $TIM_ADJ$ expansion, our realm has attracted the greatest artisans and wise men of the age. Through our continued patronage of art, science, and literature, we have made the cities of $herat$ and $samarkand$ the brightest jewels in the world."
  STATIC_MODIFIER_NAME_modifier_riches_of_the_silk_road: "Control of the Silk Road"
  STATIC_MODIFIER_DESC_modifier_riches_of_the_silk_road: "As long as our merchants control the trade through the lands of $transoxiana_area$ and $samarkand$, the trade of the Silk Road shall flow unhindered and the wealth of our dynasty will continue to grow."
  STATIC_MODIFIER_NAME_modifier_reform_the_diwan: "Reform the Dīwān"
  STATIC_MODIFIER_DESC_modifier_reform_the_diwan: "We are fortunate to be served by loyal and well-educated $farsi_culture$ administrators, who have perfected the art of governance for generations. Sadly, however, a hereditary office is one that over time might stagnate and lack innovation. By reducing the number of inherited offices with each generation, we can make sure that we reward not only loyalty, but also ability. Able administrators must rise to high positions regardless of which family they come from."
  STATIC_MODIFIER_NAME_modifier_conquerors_legacy: "Conqueror's Legacy"
  STATIC_MODIFIER_DESC_modifier_conquerors_legacy: "Our glorious empire emerged from the legacy of great conquerors. It was the ferocity of $genghis_khan_name_no_tooltip$'s troops that allowed him to conquer from $europe$ to $china$. As his successors, our troops will be as fearsome as the ones in his army."
  STATIC_MODIFIER_NAME_modifier_hispano_moresque_style: "Hispano-Moresque Style"
  STATIC_MODIFIER_DESC_modifier_hispano_moresque_style: "Our cities reflect a unique blend of Andalusian elegance and Maghrebi architecture. The Hispano-Moresque style, passed down from foreign artisans and nobles, inspires a new cultural flowering and elevates the prestige of our court."
  STATIC_MODIFIER_NAME_modifier_city_of_scholars: "City of Scholars"
  STATIC_MODIFIER_DESC_modifier_city_of_scholars: "$TLE$ has long been a center of Islamic learning and intellectual exchange. Our madrasas attract scholars from across the $maghreb_region$ and Al-'Andalus, fostering scientific and theological progress for generations to come."
  STATIC_MODIFIER_NAME_modifier_entrepot_connections: "Entrepôt Connections"
  STATIC_MODIFIER_DESC_modifier_entrepot_connections: "To thrive as a trade hub, our cities must be connected by solid infrastructure. By empowering the noble class to build and maintain strategic roads, we improve internal trade and strengthen the arteries of our realm."
  STATIC_MODIFIER_NAME_modifier_chinampas: "Chinampas"
  STATIC_MODIFIER_DESC_modifier_chinampas: "Proficient in terracing hills for cultivation and skilled in crafting arable land on shallow lake portions through ingenious #italic chinampas#!, our populace's remarkable agricultural abilities will significantly benefit our society."
  STATIC_MODIFIER_NAME_modifier_people_of_war: "People of War"
  STATIC_MODIFIER_DESC_modifier_people_of_war: "Whether we take up arms on a search for prestige, to instill fear in our foes, to take captives for sacrifice,  or simply to acquire wealth, our people are accustomed to a continuous state of warfare, enduring its hardships with more resilience than members of other nations."
  STATIC_MODIFIER_NAME_modifier_tlahtocayotl: "Tlahtohcāyōtl"
  STATIC_MODIFIER_DESC_modifier_tlahtocayotl: "We will create a system of provinces for the city-states that are integrated into our realm in an effort to centralize our power."
  STATIC_MODIFIER_NAME_modifier_calpixcayotl: "Calpixcāyōtl"
  STATIC_MODIFIER_DESC_modifier_calpixcayotl: "Our tributary regions will receive appointed tribute collectors, called #italic calpixqueh#!, who will be in charge of ensuring the flow of tribute never stops. There will be a #italic calpixqui#! in the region, and another in the capital of our nation, for each tributary state."
  STATIC_MODIFIER_NAME_modifier_reformed_telpochcalli: "Reformed Tēlpōchcalli"
  STATIC_MODIFIER_DESC_modifier_reformed_telpochcalli: "As we face new enemies, new military tactics have to be developed or learned. This invaluable knowledge will be taught in our #italic Tēlpōchcalli#!."
  STATIC_MODIFIER_NAME_modifier_nahuatl_domination: "$nahua_culture$ Domination"
  STATIC_MODIFIER_DESC_modifier_nahuatl_domination: "The superiority of $nahua_culture$ culture is very clear, as neighboring peoples increasingly adopt it as their own. This cultural diffusion and spread of influence creates opportunities for us to extend our political control well beyond our borders."
  STATIC_MODIFIER_NAME_modifier_the_return_of_quetzalcoatl: "The Return of Quetzalcōātl"
  STATIC_MODIFIER_DESC_modifier_the_return_of_quetzalcoatl: "Contact with foreigners from other continents has given us interesting new ideas about our gods. The #italic Quetzalcōātl#! prophecy unveils a reality beyond myth — a glimpse of truth. #italic Quetzalcōātl#!, 'the Feathered Serpent', will soon return and herald a transformative era, vanquishing darkness for enlightenment. Symbolizing cosmic fusion, he will bridge matter and spirit, restoring balance and elevating human consciousness."
  STATIC_MODIFIER_NAME_modifier_brave_as_hummingbird: "Brave as a Hummingbird"
  STATIC_MODIFIER_DESC_modifier_brave_as_hummingbird: "The hummingbird holds a crucial role in our mythology. Linked to the god of war, Huītzilōpōchtli, it embodies fallen warriors' reincarnation and is honored for its bravery. The hummingbird will be made a new symbol for our banners, one that will inspire our soldiers to fight unto their deaths!"
  STATIC_MODIFIER_NAME_modifier_new_trade_opportunities: "New Trade Opportunities"
  STATIC_MODIFIER_DESC_modifier_new_trade_opportunities: "The needs of our people have been adapting to the new markets that have opened to our traders, and we have been training our merchants in methods to maximize our earnings."
  STATIC_MODIFIER_NAME_modifier_aztec_chargers: "$AZT_ADJ$ Chargers"
  STATIC_MODIFIER_DESC_modifier_aztec_chargers: "The aggressive nature of our warriors is known — and feared — beyond our borders. When battle starts, our enemies shiver in fear at the sight of our combatants charging at them with frenzy, as if they were about to be run down by the heralds of Death itself."
  STATIC_MODIFIER_NAME_modifier_tnk_pearls_of_india: "Pearl-Diving Expertise"
  STATIC_MODIFIER_DESC_modifier_tnk_pearls_of_india: "Our people have developed an outstanding skill for diving for and harvesting pearls along our coasts. While this has clear economic benefits, the natural affinity our people have for water makes them excellent and easily-trained sailors, granting us an edge against our seafaring foes."
  STATIC_MODIFIER_NAME_modifier_tnk_expertise_in_conflicts: "Hardened by War"
  STATIC_MODIFIER_DESC_modifier_tnk_expertise_in_conflicts: "Throughout our turbulent history, we never wavered in the face of conflict and insurmountable odds. We need to weaponize this determination, and use it to instill a sense of fervor into our people that will inspire them to fight harder than ever."
  STATIC_MODIFIER_NAME_modifier_tnk_imperial_legacy: "Imperial Pandyan Legacy"
  STATIC_MODIFIER_DESC_modifier_tnk_imperial_legacy: "The lands of southern $india$ have long endured the incursions of foreign invaders and upstart warlords looking to establish their own domains. We must use the grand history of our ancient dynasty to lay claim to this land, as only we can bring stability and peace back to our rightful territory."
  STATIC_MODIFIER_NAME_modifier_tre_princes_of_the_lazes: "Princes of the $laz_culture$"
  STATIC_MODIFIER_DESC_modifier_tre_princes_of_the_lazes: "The $laz_culture$ have inhabited these lands for centuries. While our Empire was forged by $greek_culture$ people, many $laz_culture$ nonetheless remain within our borders. This has led to some of our enemies calling us $tre_princes_of_the_lazes$ in mockery, regarding us as inferiors. However, no matter what they say, it does not diminish our heritage, and we shall wear the title proudly."
  STATIC_MODIFIER_NAME_modifier_tre_strategic_marriages: "Strategic Marriages"
  STATIC_MODIFIER_DESC_modifier_tre_strategic_marriages: "Kingdoms are conquered not only by the sword. By forging marriage alliances with surrounding nations, we create opportunities to inherit their thrones — and, at the very least, extend stronger influence over them."
  STATIC_MODIFIER_NAME_modifier_tre_grand_komnenoi: "Grand Komnenoi"
  STATIC_MODIFIER_DESC_modifier_tre_grand_komnenoi: "The $komnenos_dynasty$ dynasty may have been expelled from the $BYZ_ADJ$ throne long ago, but its glory never faded. Members of our lineage are still shown the appropriate deference, and this respect and admiration stretches far beyond our borders."
  STATIC_MODIFIER_NAME_modifier_tre_pontic_mountains: "$pontic_greek_culture$ Mountains"
  STATIC_MODIFIER_DESC_modifier_tre_pontic_mountains: "Much as the Alps separate the $french_group$ and $italian_group$, the $pontic_greek_culture$ Mountains separate our last $greek_culture$ holdout in $anatolia_region$ from the $turkic_group$ invaders who have seized the Anatolian Plateau. Pontus has always been more $greek_culture$ than the rest of $anatolia_region$; perhaps the legacy of the great Mithridates will inspire our warriors and strike as much fear into the Turks as he did the Romans?"
  STATIC_MODIFIER_NAME_modifier_tre_byzantine_birthright: "$BYZ_ADJ$ Birthright"
  STATIC_MODIFIER_DESC_modifier_tre_byzantine_birthright: "The great $BYZ_ADJ$ Empire, under the rule of our forefathers, was truly something to behold. Deceit and treachery may have toppled their regime, but $BYZ$ has risen like the phoenix to reclaim its former glory, and now no one shall doubt our authority!"
  STATIC_MODIFIER_NAME_modifier_tre_trapezuntine_monasteries: "$TRE_ADJ$ Monasteries"
  STATIC_MODIFIER_DESC_modifier_tre_trapezuntine_monasteries: "It is our faith that saves the souls of our people, and our clergy are the ones who ensure their salvation. What,  then, are our monasteries, if not the source and origin of such salvation?"
  STATIC_MODIFIER_NAME_modifier_tre_greek_stronghold: "$greek_language$ Stronghold"
  STATIC_MODIFIER_DESC_modifier_tre_greek_stronghold: "Since ancient times, $greek_language$ has been the language of education and science. When our ancestors came here, they not only brought their determination, but also their culture and native tongue. As such, the $greek_language$ tradition of learning is very much alive in our country."
  STATIC_MODIFIER_NAME_modifier_tre_komnenoi_princesses: "Komnenoi Princesses"
  STATIC_MODIFIER_DESC_modifier_tre_komnenoi_princesses: "Some remarkable women have emerged from along the $komnenos_dynasty$, and many among the rulers of $europe$ and even the infidels have sought their hands in matrimony. Our line is well-respected, and our princesses doubly so, for they are what allow foreign countries to claim legitimacy through our line, and us to maintain influence in foreign courts."
  STATIC_MODIFIER_NAME_modifier_tre_terminus_of_the_silk_road: "Terminus of the Silk Road"
  STATIC_MODIFIER_DESC_modifier_tre_terminus_of_the_silk_road: "Even when it was called Trapezous in the mists of antiquity, our nation was the point where the land route across $asia$ meets the sea route leading to the Mediterranean. We grew famous as the terminal point for the great Silk Road, the wealth of $china$ and $india$ passing through our lands on its way to $europe$. Since our nation still lies in this crucial location, there is no reason for us not to continue and encourage this steady flow of intercontinental trade."
  STATIC_MODIFIER_NAME_modifier_tre_lessons_of_the_fourth_crusade: "Lessons of the Fourth Crusade"
  STATIC_MODIFIER_DESC_modifier_tre_lessons_of_the_fourth_crusade: "Isaakios Angelos, who deposed our line centuries ago, was himself deposed and blinded. On the pretense of putting the blind old fool back on the throne, the $VEN_ADJ$ troops then sacked $constantinople$. If there is something to learn from this incident, it is that treason and deceit are ubiquitous in the struggle for power, but they can also safeguard victory."
  STATIC_MODIFIER_NAME_modifier_tre_trapezuntine_endurance: "$TRE_ADJ$ Endurance"
  STATIC_MODIFIER_DESC_modifier_tre_trapezuntine_endurance: "Banished from our country, and yet our line survived. Forced to live in a mountainous wasteland surrounded by enemies, and yet our people thrived. We are a resourceful people, determined to make the most of what we have and to best whatever situation we encounter."
  STATIC_MODIFIER_NAME_modifier_tri_balance_the_landstande: "Balance the Landstände"
  STATIC_MODIFIER_DESC_modifier_tri_balance_the_landstande: "Our territory is both home to many urban areas and castles of many imperial knights. Balancing them and their often opposing interests is no easy task. Only if they cooperate with us and the cathedral chapter, we can ensure the functionality of our government."
  STATIC_MODIFIER_NAME_modifier_saharan_trade: "Saharan Trade"
  STATIC_MODIFIER_DESC_modifier_saharan_trade: "From the oases of $ghadames$ to the caravans of the $sahel_region$, our merchants secure and collect revenue from the trans-Saharan routes that connect us to the riches of the interior. $goods_gold$, $salt$, and $slaves_goods$ flow northward under our protection and oversight."
  STATIC_MODIFIER_NAME_modifier_al_caid: "Al-Qā'id"
  STATIC_MODIFIER_DESC_modifier_al_caid: "By appointing a loyal #italic Qā'id#! to oversee provinces and regulate trade on behalf of the state, we empower urban merchants while ensuring provincial governance. Ensuring fair dealings and regulated markets will greatly strengthen our economic base."
  STATIC_MODIFIER_NAME_modifier_connections_with_the_christian_world: "Connections with the $christian_ADJ$ World"
  STATIC_MODIFIER_DESC_modifier_connections_with_the_christian_world: "Treaties and trade agreements with $christian_ADJ$ states ensure that diplomacy and pragmatism serve our long-term interests. Though our faith differs from theirs, we should not close the door to opportunity."
  STATIC_MODIFIER_NAME_modifier_attract_foreign_pirates: "Attract Foreign Pirates"
  STATIC_MODIFIER_DESC_modifier_attract_foreign_pirates: "Our ports have long been a haven for those who seek fortune on the high seas. By welcoming these skilled seamen regardless of their faith or origins, we may further strengthen our corsair fleets and expand our maritime manpower."
  STATIC_MODIFIER_NAME_modifier_rais_of_the_navy: "Ra'īs of the Navy"
  STATIC_MODIFIER_DESC_modifier_rais_of_the_navy: "Our corsair captains, the #italic Ra'īs#!, are more than just pirates. Truly, they are seasoned naval commanders, and their experience at sea feeds a deep well of maritime tradition that strengthens our navy's proud heritage."
  STATIC_MODIFIER_NAME_modifier_export_monopolies: "Export Monopolies"
  STATIC_MODIFIER_DESC_modifier_export_monopolies: "By controlling key exports such as olive oil, textiles, and $dyes$, we ensure both domestic prosperity and leverage abroad. Such protectionist practices allow us to project power through commerce as much as conquest, ensuring our own merchants maintain dominance over foreigners in our markets."
  STATIC_MODIFIER_NAME_modifier_millets: "Kanunnames"
  STATIC_MODIFIER_DESC_modifier_millets: "By establishing unique codes of law in each of our empire's provinces, we can ensure that our rule will be viewed as equitable and just. These law books, known as #italic Kanunname#!, will take into consideration the local circumstances and traditions of each of our diverse and far-flung provinces."
  STATIC_MODIFIER_NAME_modifier_bashi_bazouks: "Bashi-bazouks"
  STATIC_MODIFIER_DESC_modifier_bashi_bazouks: "Unruly irregulars recruited from disenfranchised segments of the population, and sometimes outright vagabonds, the #italic bashi-bazouks#! provide an affordable way of garrisoning forts and outposts. With their proclivity for brigandage and wanton killing, they can always be relied upon to disturb the enemy's frontier."
  STATIC_MODIFIER_NAME_modifier_ottoman_bureaucracy: "Birûn"
  STATIC_MODIFIER_DESC_modifier_ottoman_bureaucracy: "The #italic Birûn#!, or the Exterior Service, comprises the group of administrators, military officers and religious scholars just outside the ruler's personal inner circle. Together, they make up an efficient bureaucracy inherited from $IRA$ and the Great Seljuks, but adapted further by elements from $BYZ$, making it uniquely $TUR_ADJ$ indeed."
  STATIC_MODIFIER_NAME_modifier_autonomous_pashas: "Autonomous Pashas"
  STATIC_MODIFIER_DESC_modifier_autonomous_pashas: "Balancing local needs versus national interests is one of the most difficult aspects of government. Given the slow pace of communications, it can take a long time for the most basic directives to reach even relatively close provinces. We must encourage local governors towards more autonomy to ensure that local interests are served in a timely manner."
  STATIC_MODIFIER_NAME_modifier_dragomans: "Dragomans"
  STATIC_MODIFIER_DESC_modifier_dragomans: "Interpreters, translators, and guides in one, the $dragomans$ are skilled officials who work to enhance our diplomatic and commercial efforts with different communities and countries. Most dragomans are of $greek_culture$ ancestry, though some hail from $judaism_ADJ$, $armenian_culture$, or other multilingual backgrounds."
  STATIC_MODIFIER_NAME_modifier_ahdnames: "Ahidnâme"
  STATIC_MODIFIER_DESC_modifier_ahdnames: "Also called capitulations, the $ahdnames$ are contractual agreements with other nations, drawing upon both $muslim_ADJ$ and secular law. $ahdnames$ are most often used for guaranteeing the protection and rights of foreign merchants and clergy within our lands, ensuring that justice is upheld and trade can flow unhampered."
  STATIC_MODIFIER_NAME_modifier_kafes: "Kafes"
  STATIC_MODIFIER_DESC_modifier_kafes: "By keeping our unruly princes confined to a special part of the harem, the $kafes$, we can prevent wanton rebellions and the rivalry between brothers that used to plague our regime."
  STATIC_MODIFIER_NAME_modifier_ottoman_waystations: "Menzil"
  STATIC_MODIFIER_DESC_modifier_ottoman_waystations: "A complex system of supply depots and lodgings for use by soldiers and officials, #italic menzil#! waystations allow our armies to rely less on plunder, and remain well-supplied on every frontier."
  STATIC_MODIFIER_NAME_modifier_late_ottoman_bureaucracy: "Mālīye"
  STATIC_MODIFIER_DESC_modifier_late_ottoman_bureaucracy: "A vast, diverse, and highly organized bureaucracy staffed by the most skilled of scribes, the $late_ottoman_bureaucracy$ aspires to be a fundamental and incorruptible institution of the state."
  STATIC_MODIFIER_NAME_modifier_ottoman_tax_farming: "Muqāta'ah"
  STATIC_MODIFIER_DESC_modifier_ottoman_tax_farming: "A system of tax farming where nobles purchase the right to collect revenue from parcels of land owned by the state. $ottoman_tax_farming$ balances the distribution of wealth across the empire, and turns the nobility away from corruption, giving them a vested interest in supporting the state."
  STATIC_MODIFIER_NAME_modifier_tulip_period: "Tulip Period"
  STATIC_MODIFIER_DESC_modifier_tulip_period: "We will reform old and stagnant traditions, plant tulips in all gardens, and usher in a new golden age of commerce and connection."
  STATIC_MODIFIER_NAME_modifier_imperial_school_of_naval_engineering: "Imperial School of Naval Engineering"
  STATIC_MODIFIER_DESC_modifier_imperial_school_of_naval_engineering: "This new school, #italic Mühendishane-i Bahr-i Hümâyûn#!, will help us train shipwrights, naval officers, and sailors for both the navy and the merchant fleet."
  STATIC_MODIFIER_NAME_modifier_khedivates: "Khedivates"
  STATIC_MODIFIER_DESC_modifier_khedivates: "Large empires are usually formed around a core territory, and otherwise surrounded by subject nations of somewhat dubious loyalty. We should take the necessary measures to keep these nations under our surveillance."
  STATIC_MODIFIER_NAME_modifier_ayans: "Âyan"
  STATIC_MODIFIER_DESC_modifier_ayans: "$ayans$ are provincial magnates of diverse backgrounds that wield significant local autonomy, but still provide a ready source of tax farming income and military forces for the state."
  STATIC_MODIFIER_NAME_modifier_tws_unified_legal_code: "Unified Legal Code"
  STATIC_MODIFIER_DESC_modifier_tws_unified_legal_code: "The territories which constitute our land have suffered revolts due to unjust applications of laws. In order to prevent these occurrences in the future, we should standardize our legal code and ensure our laws are applied fairly. This will surely prevent any uprising from spiraling into chaos."
  STATIC_MODIFIER_NAME_modifier_tws_ensure_loyal_families: "Loyalty of the Noble Families"
  STATIC_MODIFIER_DESC_modifier_tws_ensure_loyal_families: "The Noble Families of both Sicilies exert much power in our stead. By granting them prestigious yet meaningless roles at court, we will ensure their loyalty and guarantee stable rule over our countryside."
  STATIC_MODIFIER_NAME_modifier_tws_revitalize_the_lands: "Attract new People"
  STATIC_MODIFIER_DESC_modifier_tws_revitalize_the_lands: "Previous rulers put too much focus on particular areas of our country. If we want to retain control of both Sicilies, we will have to invest equally and fairly in both parts. One step towards this goal is attracting people to settle in previously neglected areas."
  STATIC_MODIFIER_NAME_modifier_tws_capable_vicars: "Capable Vicars"
  STATIC_MODIFIER_DESC_modifier_tws_capable_vicars: "A particular struggle of our unified country is governing both sides of the Strait of Messina. Since our ruler can only be present on one side at a time, the other will have to be given to a vicar, ruling in our name. We must be sure to appoint only the most capable and trustworthy people to this vital role to prevent corruption."
  STATIC_MODIFIER_NAME_modifier_tws_oversea_ambitions: "Overseas Ambitions"
  STATIC_MODIFIER_DESC_modifier_tws_oversea_ambitions: "Expanding our territories within Italy is a difficult task, navigating a treacherous web of alliances and risking the anger of the Pope himself. Therefore, we should look overseas, where potential riches await us in the lands of northern Africa and Greece."
  STATIC_MODIFIER_NAME_modifier_tws_protect_the_coastline: "Increase Maritime Patrols"
  STATIC_MODIFIER_DESC_modifier_tws_protect_the_coastline: "Our coastline is vast, and vulnerable to raids by pirates hunting for slaves. We need to establish a navy to patrol, protect, and eventually defeat this vile threat to our people."
  STATIC_MODIFIER_NAME_modifier_exploit_the_alpine_trade: "Trading Hubs of $BAV$"
  STATIC_MODIFIER_DESC_modifier_exploit_the_alpine_trade: "Our lands are frequently crossed by merchants wishing to trade $salt$, $silver$, and $livestock$ in the rich lands to our south. We would be foolish not to take advantage of their presence, and therefore will establish bustling trade hubs in our own lands to attract their business."
  STATIC_MODIFIER_NAME_modifier_bavarian_culture_buildings: "$BAV_ADJ$ Cultural Institutions"
  STATIC_MODIFIER_DESC_modifier_bavarian_culture_buildings: "With our homeland at the feet of the beautiful Alps, we are a destination for artists from all over $europe$, who seek inspiration in our incredible landscape. If we were to construct and support the appropriate cultural institutions, we could refine our court into a center of refinement and elegance, one that could rival even the most prestigious powers of $europe$."
  STATIC_MODIFIER_NAME_modifier_bavarian_stem_duchy: "Dreams of Unification"
  STATIC_MODIFIER_DESC_modifier_bavarian_stem_duchy: "We once were ruled by $BAV$, unified in culture and allied under a single banner. We must ensure that the new $BAV_ADJ$ state is equally mighty, a home worthy of its strong and proud people."
  STATIC_MODIFIER_NAME_modifier_bavarian_zelousness: "One Faith for $BAV$"
  STATIC_MODIFIER_DESC_modifier_bavarian_zelousness: "We must ensure our people remain united in their faith, and that they will not be divided by heretical thoughts."
  STATIC_MODIFIER_NAME_modifier_bavarian_hofkriegsrat: "$BAV_ADJ$ Hofkriegsrat"
  STATIC_MODIFIER_DESC_modifier_bavarian_hofkriegsrat: "Establishing a council with the sole duty of advising our ruler during times of conflict will help us develop a more capable fighting force."
  STATIC_MODIFIER_NAME_modifier_bavarian_flexible_diplomats: "Practical Diplomacy"
  STATIC_MODIFIER_DESC_modifier_bavarian_flexible_diplomats: "No matter if we are answering to an Imperial overlord or cozying up to a potential foreign ally, our diplomats must be prepared for everything. But only if they keep $BAV_ADJ$ interests first and foremost in their efforts will we be able to claim true success in our diplomatic maneuverings."
  STATIC_MODIFIER_NAME_modifier_foundation_of_bavarian_army: "An Army for $BAV$"
  STATIC_MODIFIER_DESC_modifier_foundation_of_bavarian_army: "Only with a formidable standing army will we have the military might necessary to match our ambitions. With careful focus, we can expand it without having a ruinous impact on our state's finances."
  STATIC_MODIFIER_NAME_modifier_bavarian_coinage: "$BAV$ Coin"
  STATIC_MODIFIER_DESC_modifier_bavarian_coinage: "Our realm needs a new standardized coin to serve as our national unified currency. Establishing a state-owned mint in our capital would ensure our total control over this new coinage."
  STATIC_MODIFIER_NAME_modifier_bavarian_purity_law: "$BAV_ADJ$ Purity Law"
  STATIC_MODIFIER_DESC_modifier_bavarian_purity_law: "The excellent quality of our beer has been celebrated for centuries, but for our brews to achieve legendary status, we must ensure their continued prestige and superiority for all time. Several rulers in the past have created regulations and standards for the brewing of this wonderful substance; and we could use this fact as a stamp of our breweries' quality."
  STATIC_MODIFIER_NAME_modifier_usa_mayflower_compact: "Mayflower Compact"
  STATIC_MODIFIER_DESC_modifier_usa_mayflower_compact: "Bound together by shared peril and purpose, the early settlers drafted a pact of self-governance. Even in the wilderness, the seeds of society and compromise found soil."
  STATIC_MODIFIER_NAME_modifier_usa_empowered_assemblies: "Empowered Assemblies"
  STATIC_MODIFIER_DESC_modifier_usa_empowered_assemblies: "Elected assemblies emerged throughout the colonies, empowering landowners to govern themselves. The humble origins of liberty lie in the halls of these institutions."
  STATIC_MODIFIER_NAME_modifier_usa_great_awakening: "Great Awakening"
  STATIC_MODIFIER_DESC_modifier_usa_great_awakening: "A wave of religious revival sweeps the land, challenging old authorities and stirring the moral conscience of a rising people."
  STATIC_MODIFIER_NAME_modifier_usa_declaration_of_independence: "Declaration of Independence"
  STATIC_MODIFIER_DESC_modifier_usa_declaration_of_independence: "#italic We hold these truths to be self-evident, that all men are created equal.#!\n\nWith this bold declaration, we shall break the chains of subjugation, and embraced our shared destiny!"
  STATIC_MODIFIER_NAME_modifier_usa_bill_of_rights: "Bill of Rights"
  STATIC_MODIFIER_DESC_modifier_usa_bill_of_rights: "#italic ...or abridging the freedom of speech, or of the press; or the right of the people peaceably to assemble, and to petition the Government for a redress of grievances.#!"
  STATIC_MODIFIER_NAME_modifier_usa_recognized_sovereignty: "Recognized Sovereignty"
  STATIC_MODIFIER_DESC_modifier_usa_recognized_sovereignty: "Treaties and diplomacy affirmed what our struggles have earned. Our place on the stage of diplomacy is no longer questioned, but respected."
  STATIC_MODIFIER_NAME_modifier_usa_era_good_feelings: "Era of Good Feelings"
  STATIC_MODIFIER_DESC_modifier_usa_era_good_feelings: "In the wake of hardship, peace and unity have brought a rare moment of national harmony. The people flourish with optimism and order."
  STATIC_MODIFIER_NAME_modifier_ven_stato_da_mar: "Stato da Mar"
  STATIC_MODIFIER_DESC_modifier_ven_stato_da_mar: "Trade is the lifeblood of $VEN$, and competent management of our overseas trade stations is vital to our trading interests. By centralizing the administration of these lands into a single unit, we will enhance our trade."
  STATIC_MODIFIER_NAME_modifier_ven_gothic_architecture: "Gothic Architecture"
  STATIC_MODIFIER_DESC_modifier_ven_gothic_architecture: "Influenced by $BYZ_ADJ$ architecture and with nods to Islamic aesthetics, the unique $ven_gothic_architecture$ is a core element of $VEN_ADJ$ identity and highly beloved by the upper class. Many aristocrats and prosperous merchants show their support for proliferating this style of architecture with their gold."
  STATIC_MODIFIER_NAME_modifier_ven_ship_mounted_gunpowder_weapons: "Ship-Mounted Gunpowder Weapons"
  STATIC_MODIFIER_DESC_modifier_ven_ship_mounted_gunpowder_weapons: "Naval combat has been more like fighting a land battle on floating planks than actual ship-to-ship combat for millennia. With the introduction of gunpowder weapons on our ships, we are able to break away from old-fashioned warfare and annihilate enemy ships before they come even close to boarding our galleys."
  STATIC_MODIFIER_NAME_modifier_ven_printing_industry: "Printing Industry"
  STATIC_MODIFIER_DESC_modifier_ven_printing_industry: "Since the invention of the printing press, the people of $VEN$ have shown an aptitude for its use. We should encourage further development of our printing industry, as the potential benefits are manifold."
  STATIC_MODIFIER_NAME_modifier_ven_state_inquisition: "Found the State Inquisition"
  STATIC_MODIFIER_DESC_modifier_ven_state_inquisition: "The State Inquisition is a panel of three judges that was set up to handle threats to internal security. The panel's small size means they can deal quickly with threats, and it will not take them long to establish a network of agents both at home and abroad to root out the traitors."
  STATIC_MODIFIER_NAME_modifier_ven_magistrato_alla_sanita: "Magistrato alla Sanità"
  STATIC_MODIFIER_DESC_modifier_ven_magistrato_alla_sanita: "The #italic $ven_magistrato_alla_sanita$#! — Magistracy of Health — is a crucial office in our state which oversees the prevention of diseases and epidemics."
  STATIC_MODIFIER_NAME_modifier_ven_venetian_painting: "$VEN_ADJ$ Painting"
  STATIC_MODIFIER_DESC_modifier_ven_venetian_painting: "$ITA$ as a whole is famous for its cultural achievements, and $VEN_ADJ$ painting is one of its greatest contributions. Artists come from far away to experience our magnificent galleries and witness our cultural rebirth firsthand."
  STATIC_MODIFIER_NAME_modifier_ven_naval_conscription: "Naval Conscription"
  STATIC_MODIFIER_DESC_modifier_ven_naval_conscription: "For as long as $VEN$ has stood, our galleys have been rowed by free men who worked for a wage, but an acute manpower shortage is making it harder to find qualified oarsmen. We have no choice but to resort to conscription to staff our galleys."
  STATIC_MODIFIER_NAME_modifier_ven_venetian_school_of_music: "$VEN_ADJ$ School of Music"
  STATIC_MODIFIER_DESC_modifier_ven_venetian_school_of_music: "While our paintings attract enthusiasts of visual art, $VEN_ADJ$ music travels far and beyond, beloved by those who seek melodic enlightenment. Many great composers graduate from our conservatories and go on to find great success throughout $europe$, spreading our culture with every golden note."
  STATIC_MODIFIER_NAME_modifier_ven_mixed_naval_tactics: "Mixed Naval Tactics"
  STATIC_MODIFIER_DESC_modifier_ven_mixed_naval_tactics: "Oar-propelled vessels have been standard since the inception of the $VEN_ADJ$ navy. However, sailing ships now play an increasingly dominant role in Mediterranean naval combat. Our navy will adapt by adopting the mighty galleass, a hybrid ship that can use both oars and sails."
  STATIC_MODIFIER_NAME_modifier_ven_provveditori_ai_beni_inculti: "'Provveditori ai Beni Inculti'"
  STATIC_MODIFIER_DESC_modifier_ven_provveditori_ai_beni_inculti: "This department for uncultivated natural resources was set up to facilitate the draining of marshes and the irrigation of arid land. The ultimate goal is to improve the supply of food to $VEN$."
  STATIC_MODIFIER_NAME_modifier_court_of_great_refugees: "Court of Great Refugees"
  STATIC_MODIFIER_DESC_modifier_court_of_great_refugees: "Our great capital has become a haven for artists, exiles, and thinkers — displaced by war, faith, or politics elsewhere in $ITA$. These refugees are destined to enrich the city's courts with new techniques, bold ideas, and cultural crosscurrents, making $VER$ a rare sanctuary of innovation in turbulent times."
  STATIC_MODIFIER_NAME_modifier_consolidate_italian_holdings: "Consolidate $ITA_ADJ$ Holdings"
  STATIC_MODIFIER_DESC_modifier_consolidate_italian_holdings: "The Scaligeri ruled not just $VER$, but a growing web of cities across northern $italy_region$. Holding such a realm together demands careful diplomacy, clever delegation, and well-paid professional armies. Only through consolidation can $VER$ stand as a true rival to the other great powers of the peninsula."
  STATIC_MODIFIER_NAME_modifier_the_adige: "The Adige"
  STATIC_MODIFIER_DESC_modifier_the_adige: "The Adige River is $VER$'s lifeline — a channel for trade, agriculture, and prosperity. As its waters flow from the Alps to the Adriatic, so too does wealth flow through our markets and fields, nourishing both town and countryside alike."
  STATIC_MODIFIER_NAME_modifier_marmorina: "Marmorina"
  STATIC_MODIFIER_DESC_modifier_marmorina: "In these times of peace, $VER$ has flourished under rulers who value beauty as much as power. The city shall earn the name 'Marmorina' for its abundance of Roman marble, statues, and graceful architecture. A new bridge over the Adige, the Ponte Navi, stands as a feat of engineering, while the Gardello tower — the first water-driven clock in $ITA$ — marked the hours in quiet ascendancy. This legacy of refinement will undoubtedly shape not only our skyline, but how we shall be remembered in the annals of history."
  STATIC_MODIFIER_NAME_modifier_vij_arab_horses: "Arabian Horses"
  STATIC_MODIFIER_DESC_modifier_vij_arab_horses: "Horses from $arabia_region$ are far superior to our local breeds. We will use our trade connections to ensure that we have a steady supply for our military."
  STATIC_MODIFIER_NAME_modifier_vij_first_indian_artillery: "First Indian Artillery"
  STATIC_MODIFIER_DESC_modifier_vij_first_indian_artillery: "The military application of gunpowder is not yet widespread, but it has the potential to mold the future of warfare. We must explore the utility and benefits of gunpowder."
  STATIC_MODIFIER_NAME_modifier_vij_the_bunds: "The Bunds"
  STATIC_MODIFIER_DESC_modifier_vij_the_bunds: "Our society is built on agriculture in the rather arid $karnakassala_area$ area. The #italic bunds#!, also called #italic anecut#!, provide our cities and fields alike with much-needed fresh water."
  STATIC_MODIFIER_NAME_modifier_vij_adroit_diplomacy: "Adroit Diplomacy"
  STATIC_MODIFIER_DESC_modifier_vij_adroit_diplomacy: "The numerous invaders of our $hindu_ADJ$ people have shown time and time again the same weakness: the tendency to fight amongst themselves. We must be ready at all times to exploit this to our own ends."
  STATIC_MODIFIER_NAME_modifier_vij_promotion_of_trade: "Promotion of Trade"
  STATIC_MODIFIER_DESC_modifier_vij_promotion_of_trade: "Our territory is situated on one of the key trade routes from East to West. We must ensure that our ports are safe and secure so that visiting captains will land there... giving us the opportunity to tax them."
  STATIC_MODIFIER_NAME_modifier_vij_carnatic_music: "Carnatic Music"
  STATIC_MODIFIER_DESC_modifier_vij_carnatic_music: "We must resist the $muslim_ADJ$ invasion on all fronts. The musical traditions of the Northern States are already showing signs of foreign influence. This is blasphemy, because we all know that music is a divine art form that originated with the Devas and Devis themselves. We will show the $hindu_ADJ$ people that we are committed to defending this holy art form."
  STATIC_MODIFIER_NAME_modifier_vij_cultural_integration: "Cultural Integration"
  STATIC_MODIFIER_DESC_modifier_vij_cultural_integration: "The cultural diversity of $india$ is one of our defining traits. By allowing our various settlements to rule by their own customs, we will assure their loyalty and integration into our society."
  STATIC_MODIFIER_NAME_modifier_vij_rule_in_accord_with_dharma: "Rule According to Dharma"
  STATIC_MODIFIER_DESC_modifier_vij_rule_in_accord_with_dharma: "#Italic Dharma#! is a major pillar of our religious and social values. Our state can only be just and virtuous if our rulers themselves embody and live in accord with dharma."
  STATIC_MODIFIER_NAME_modifier_vij_harsh_penal_code: "Harsh Penal Code"
  STATIC_MODIFIER_DESC_modifier_vij_harsh_penal_code: "Harsh punishments — including being put to death — are how we uphold law and order in this society. By establishing and strictly enforcing a harsh penal code, we ensure criminals fear the consequences of their actions, creating stability through the certainty of punishment."
  STATIC_MODIFIER_NAME_modifier_vij_decentralized_rule: "Decentralized Rule"
  STATIC_MODIFIER_DESC_modifier_vij_decentralized_rule: "As our state grows, so do our administrative burdens on the government and the risk of revolt. To counteract this, we shall establish a system of decentralized rule, where settlements can manage their own minor issues, only seeking intervention from the central court for severe matters."
  STATIC_MODIFIER_NAME_modifier_vij_indian_throne: "Indian Throne"
  STATIC_MODIFIER_DESC_modifier_vij_indian_throne: "$india$ has been subject to $muslim_ADJ$ threats for far too long. Heathen empires claim their rule from $delhi$ in the north, yet their beliefs and government are in direct opposition to what our people want. No, a new seat of power must be established — and $vijayanagar$ shall be the new Throne of $india$!"
  STATIC_MODIFIER_NAME_modifier_control_of_the_red_sea: "Red Sea Control"
  STATIC_MODIFIER_DESC_modifier_control_of_the_red_sea: "Any and all trade from $india$ and $africa$ must pass through the strait called Gate of Grief. Let us enforce our dominion over this maritime chokepoint and turn every passing ship into an opportunity."
  STATIC_MODIFIER_NAME_modifier_yem_unite_the_tribes: "Unite the $YEM_ADJ$ Tribes"
  STATIC_MODIFIER_DESC_modifier_yem_unite_the_tribes: "From the Tihāmah coast to the Ḥarāz mountains, our realm is home to countless fiercely independent tribes. While they have long resisted centralized authority, they are also our strength. By uniting them under a single cause, we can better utilize them as a workforce."
  STATIC_MODIFIER_NAME_modifier_port_of_aden: "Port of Aden"
  STATIC_MODIFIER_DESC_modifier_port_of_aden: "The port of Aden has been a nexus of trade for millennia — its natural harbor welcoming ships from $india$, $egypt_region$, and $east_africa$. If properly supported, it can once again become the cornerstone of our maritime economy and the pride of the Red Sea."
  STATIC_MODIFIER_NAME_modifier_zanj_taxation: "Zanj Taxation"
  STATIC_MODIFIER_DESC_modifier_zanj_taxation: "Originally a term to describe the inhabitants of inner $africa$, particularly those of $bantu_language_family$ origin, these folk make up a substantial portion of our demographics. While they have many liberties and responsibilities, they are taxed accordingly in order to preserve these privileges. Their peaceful, relatively autonomous  place within our legal framework has led to the organic development of linguistic phenomena and new cultural traditions."
  STATIC_MODIFIER_NAME_modifier_zan_food_imports: "Food Imports"
  STATIC_MODIFIER_DESC_modifier_zan_food_imports: "The dawn of a new age in seafaring has given us new opportunities to seek sustenance for our people. Whereas once we would only trade with the interior of $africa$ to procure crucial supplies of $millet$, $livestock$, and $rice$, we can now access new ports where food may be cheaper and more readily available."
  STATIC_MODIFIER_NAME_modifier_zan_kilwan_latitude_staves: "Latitude Staves"
  STATIC_MODIFIER_DESC_modifier_zan_kilwan_latitude_staves: "Our superior ship technology allows us to sail further and for longer than any of our competitors, giving us a significant edge in any seafaring activity."
  STATIC_MODIFIER_NAME_modifier_shirazi_legacy: "Shirazi's Legacy"
  STATIC_MODIFIER_DESC_modifier_shirazi_legacy: "Our ancestral founder came from $shiraz$, son of the 'Amīr of $persia_region$, which makes our right to rule undeniable."
  STATIC_MODIFIER_NAME_modifier_zan_gold_trade_of_africa: "$goods_gold$ Trade of $africa$"
  STATIC_MODIFIER_DESC_modifier_zan_gold_trade_of_africa: "Our abundant reserve of $goods_gold$ from many sources across $east_africa$ is the cornerstone of our economy. We must take full advantage of our reserves, and use our wealth to support and disseminate a strong currency. This will help us develop as a trading hub."
  STATIC_MODIFIER_NAME_modifier_zan_diplomacy_through_trade: "Diplomacy Through Trade"
  STATIC_MODIFIER_DESC_modifier_zan_diplomacy_through_trade: "We are uniquely positioned at the confluence of wealth coming from $china$, $india$, and $europe$. This not only benefits us financially, but it gives us great influence in the diplomatic game between Empires and foreign powers..."
  STATIC_MODIFIER_NAME_modifier_zmw_encourage_new_settlements: "New Grounds for Resources"
  STATIC_MODIFIER_DESC_modifier_zmw_encourage_new_settlements: "Beyond our borders lie vast expanses of land, studded with resources and herding grounds waiting eagerly to be claimed by our people. We must encourage settlement in these territories, and establish new towns."
  STATIC_MODIFIER_NAME_modifier_zmw_rekindling_the_royal_fires: "Rekindling the Royal Fires"
  STATIC_MODIFIER_DESC_modifier_zmw_rekindling_the_royal_fires: "Our subordinate chiefs must prove their loyalty to us and the gods by traveling to the capital once a year, and using our flames to rekindle their own local fire. Once a year has passed, our army will extinguish their fire, and they will have to make a new journey."
  STATIC_MODIFIER_NAME_modifier_zmw_strict_gold_regulations: "$goods_gold$ Trade Restrictions"
  STATIC_MODIFIER_DESC_modifier_zmw_strict_gold_regulations: "The land provides us with plenty of goods that foreign merchants have a keen interest in, but our abundant reserves of $goods_gold$ shine brighter than any other. While such riches are a blessing, the state must tightly regulate all trade and ownership of $goods_gold$ in order to help prevent the destructive effects of human greed and skullduggery from affecting  our bottom line."
  STATIC_MODIFIER_NAME_modifier_zmw_spokesman_before_the_dead: "Spokesman Before the Dead"
  STATIC_MODIFIER_DESC_modifier_zmw_spokesman_before_the_dead: "Our ruler is not only our leader in the temporal sense, but is also expected to speak on our behalf before the spirits of the dead. Prior to any campaign or harvest, he will communicate our respect and needs to the spirits of our ancestors through ceremonies or dances. Without a diligent ruler to maintain the royal graves and keep in close contact with our dead, things might go awry very quickly."
  STATIC_MODIFIER_NAME_modifier_zmw_elected_administrators: "Provincial Administrators"
  STATIC_MODIFIER_DESC_modifier_zmw_elected_administrators: "Traditionally, all of our administrators, even on the local level, have been direct relatives of our ruler. As our empire has grown and matured, however, it is time we show deference to the local knowledge of our subjects, and allow them to select their own administrators."
  STATIC_MODIFIER_NAME_modifier_zmw_discipline_and_traning: "Regular Training"
  STATIC_MODIFIER_DESC_modifier_zmw_discipline_and_traning: "Discipline, preparation, and training are the factors that win battles. With this in mind, our commanders have successfully pioneered elaborate new tactics and organizational improvements. Let us make good use of these innovations by dividing our warriors into regiments and having them train regularly with their bows, assegais, daggers, and axes. Practice will also allow them to fight in formation without fear, defeating many more numerous enemies."
  STATIC_MODIFIER_NAME_modifier_zmw_merchant_taxes: "Mercantile Fees"
  STATIC_MODIFIER_DESC_modifier_zmw_merchant_taxes: "With the arrival of new traders in the Zambezi area, the need has arisen to assert our authority. Anyone who wishes to trade here, and carry our precious $goods_gold$ and $ivory$ to other shores, must first be approved by our ruler and pay a tax in order to be granted access. Should payments lapse, all foreign merchandise will be confiscated by our state."
  STATIC_MODIFIER_NAME_modifier_zmw_controlling_the_mutapan_riches: "Controlling the Riches"
  STATIC_MODIFIER_DESC_modifier_zmw_controlling_the_mutapan_riches: "Western travelers have named our land 'Ophir', and the riches of our gold mines and the Zambezi trade have made many visitors envious of us over the centuries. Let us leverage our control over these riches, and build permanent trade posts which can grow into sprawling cities."
  STATIC_MODIFIER_NAME_modifier_zmw_empowering_the_rozwi: "Empowering the Rozwi"
  STATIC_MODIFIER_DESC_modifier_zmw_empowering_the_rozwi: "Our lands are home to many skilled warriors. Among them are the Rozwi, disciplined fighters who stand ready to defend our people against any who would dare try to take our rightful lands from us."
  STATIC_MODIFIER_NAME_modifier_zmw_cow_horn_tactics: "Cow-Horn Formations"
  STATIC_MODIFIER_DESC_modifier_zmw_cow_horn_tactics: "Adapting to the ever-changing tactics of war is no easy task. Against potentially superior enemies, we should rely on our own mobility over everything else. If we are able to pin our foes into a melee fight and send a regiment to flank and encircle their troops, we will be able to inflict devastating casualties."
  STATIC_MODIFIER_NAME_modifier_army_country_casus_belli_advance: "Pretexts"
  STATIC_MODIFIER_DESC_modifier_army_country_casus_belli_advance: "Our professional diplomats and spies excel at fabricating credible pretexts to justify almost any action we might take on the international stage."
  STATIC_MODIFIER_NAME_modifier_army_country_integration_speed_advance: "Respect Local Government"
  STATIC_MODIFIER_DESC_modifier_army_country_integration_speed_advance: "Our people are fearsome warlords who wish to spread their legacy to every corner of the world. As a means of integrating and managing our ever-growing domain, we have decided to mostly respect the way conquered locals conduct themselves, and not to interfere excessively."
  STATIC_MODIFIER_NAME_modifier_army_country_looting_advance: "Raider Troops"
  STATIC_MODIFIER_DESC_modifier_army_country_looting_advance: "Raiding and looting is fundamentally how our army sustains itself. Everywhere our troops go, they pillage as much as they can."
  STATIC_MODIFIER_NAME_modifier_army_country_diplo_range_advance: "Armed Envoys"
  STATIC_MODIFIER_DESC_modifier_army_country_diplo_range_advance: "Our army is feared far and wide. Despite our reputation, we should still establish diplomatic relations with nations that have the same goal as ourselves: the destruction of our common enemies. By sending well-armed and escorted envoys to foreign courts, we can ensure our diplomatic reach will not suffer under outbreaks of violence."
  STATIC_MODIFIER_NAME_modifier_minting_income_factor_building: "Currency Ownership"
  STATIC_MODIFIER_DESC_modifier_minting_income_factor_building: "There are many types of currency in circulation, but the one that bears our seal is the most widely accepted as trustworthy."
  STATIC_MODIFIER_NAME_modifier_trade_center_building_country_advance: "Emporiums"
  STATIC_MODIFIER_DESC_modifier_trade_center_building_country_advance: "With clever techniques, we can easily make our controlled markets more attractive to foreign merchants, increasing the amount of money we earn in the process."
  STATIC_MODIFIER_NAME_modifier_minting_trade_range_disc_building: "Expanded Trade Depots"
  STATIC_MODIFIER_DESC_modifier_minting_trade_range_disc_building: "The growing demands of international trade will need to be accounted for in the planning of our trading endeavors. With this expansion of our trade depots, we can reach new shores without risking our valuable cargo."
  STATIC_MODIFIER_NAME_modifier_export_building_country_advance: "Agile Exportation"
  STATIC_MODIFIER_DESC_modifier_export_building_country_advance: "Costs to export valuable goods from our controlled markets can be quite high, making our products less attractive. By performing these export actions quicker, we can make our trade more dynamic."
  STATIC_MODIFIER_NAME_modifier_counter_espionage_building_country_advance: "Secret Codes"
  STATIC_MODIFIER_DESC_modifier_counter_espionage_building_country_advance: "It is well known that our activities attract unwelcome attention. If we wish to keep our plans hidden from these curious gazes, we should encrypt our communications."
  STATIC_MODIFIER_NAME_modifier_rgo_build_time_advance: "$renaissance$ Building Methods"
  STATIC_MODIFIER_DESC_modifier_rgo_build_time_advance: "The great edifices and grand statues erected in the past still stand proudly. It is undeniable that the construction techniques used to design and erect them were sophisticated and well-developed. There is still much we can learn from studying them."
  STATIC_MODIFIER_NAME_modifier_albanian_the_stradioti_tradition: "The Stradioti Tradition"
  STATIC_MODIFIER_DESC_modifier_albanian_the_stradioti_tradition: "The poverty of our mountains has turned our men into the finest light cavalry in Christendom. These Stratioti are sought after by every major power from Venice to France for their unparalleled skills in skirmishing and reconnaissance. By exporting our martial prowess, we bring wealth back to our hills and ensure our soldiers are the most experienced in Europe."
  STATIC_MODIFIER_NAME_modifier_alb_eastern_and_western_heritage: "Eastern and Western Heritage"
  STATIC_MODIFIER_DESC_modifier_alb_eastern_and_western_heritage: "Our urban centers continue to operate under both the sophisticated principles of Byzantine Law and the modern bureaucracies of the West. This legal continuity provides a stable framework for contracts, property rights, and inheritance that attracts foreign merchants and scholars to our courts. A predictable legal system is the foundation of our growing administrative strength."
  STATIC_MODIFIER_NAME_modifier_alb_the_national_arsenal: "The National Arsenal"
  STATIC_MODIFIER_DESC_modifier_alb_the_national_arsenal: "As the primary port for Western intervention, we have modernized the shipyards of Durrës to maintain a permanent fleet of galleys. This infrastructure allows us to project power across the Adriatic, ensuring that the sea lanes between Naples and Albania remain open for reinforcements and trade. Our control of the harbor makes us the undisputed masters of the western Balkan coastline."
  STATIC_MODIFIER_NAME_modifier_ant_the_iron_mines_of_the_interior: "The Iron Mines of the Interior"
  STATIC_MODIFIER_DESC_modifier_ant_the_iron_mines_of_the_interior: "The rugged mountains of central Albania under our control are rich in high-quality iron ore essential for the tools of war. We have established state-sponsored smelters to provide our clans with a constant supply of superior steel blades and armor plates, ensuring we are never dependent on foreign imports to equip our growing armies."
  STATIC_MODIFIER_NAME_modifier_mtr_lagoon_fisheries: "The Lagoon Fisheries"
  STATIC_MODIFIER_DESC_modifier_mtr_lagoon_fisheries: "The biological wealth of our coastal waters provides a stable food supply that supports a larger standing militia even during regional famines. By monopolizing the harvest of the lagoons, we ensure that our population remains healthy and our granaries full, fueling our state's survival."
  STATIC_MODIFIER_NAME_modifier_mzk_the_despots_of_berat: "The Despots of Berat"
  STATIC_MODIFIER_DESC_modifier_mzk_the_despots_of_berat: "Ruling from the Castle of Berat, the 'City of a Thousand Windows', we represent the peak of Albanian urban sophistication and Byzantine-style administration. Our court serves as a magnet for scholars and artisans, turning our capital into a beacon of culture that rivals the grand cities of the East."
  STATIC_MODIFIER_NAME_modifier_thp_the_lion_of_thopia: "The Lion of Thopia"
  STATIC_MODIFIER_DESC_modifier_thp_the_lion_of_thopia: "Our house has risen to preeminence by masterfully navigating the clashes among the clans, positioning the Thopia family as the arbiters of Albanian sovereignty. By weaving together a complex web of alliances, we will secure the first true #italic Princeps Albaniae#! title recognized by both the East and the West. With the lion of our crest flying over the ramparts of the coast, we have established a professionalized administrative core that outpaces the primitive feudalism of our rivals, ensuring our house remains the apex predator of the Adriatic shore."
  STATIC_MODIFIER_NAME_modifier_albanian_the_sacred_oath: "The Sacred Oath"
  STATIC_MODIFIER_DESC_modifier_albanian_the_sacred_oath: "The concept of #italic Besa#! has evolved into a national institution of trust and hospitality. An Albanian's word is his bond, and this reputation for unwavering loyalty makes us the most trusted guards and mercenaries in the Mediterranean. In a world of shifting alliances, our word is our most valuable currency."
  STATIC_MODIFIER_NAME_modifier_alb_the_champion_of_christ: "The Champion of Christ"
  STATIC_MODIFIER_DESC_modifier_alb_the_champion_of_christ: "Despite our communities being divided by faith, our nation is devoted to Christ, earning us the title of #italic Athleta Christi#!. Our relentless faith has drawn the eyes of the Papacy and the Patriarchs, securing us financial subsidies and military volunteers. We fight not just for our land, but for the very survival of the 'Word of Christ'."
  STATIC_MODIFIER_NAME_modifier_alb_the_catholic_bulwark: "The Catholic Bulwark"
  STATIC_MODIFIER_DESC_modifier_alb_the_catholic_bulwark: "Positioned as the easternmost outpost of the Roman Church, we have become the primary shield against both Orthodox schismatics and Turkish heathens. This sacred duty gives us an inner peace that infuses the entire realm, transforming our struggle into a crusade for our soul."
  STATIC_MODIFIER_NAME_modifier_ant_arianitis_defiance: "Arianiti's Defiance"
  STATIC_MODIFIER_DESC_modifier_ant_arianitis_defiance: "Following the heroic example of our leaders, our house is known as the first to rise and the last to surrender against our foes. This legacy of unyielding resistance has forged our people into a nation of warriors who see struggle as a sacred duty rather than a burden."
  STATIC_MODIFIER_NAME_modifier_mtr_marshland_guerillas: "Marshland Guerillas"
  STATIC_MODIFIER_DESC_modifier_mtr_marshland_guerillas: "We specifically train our levies to lure enemy units into the deep bogs where their armor becomes a liability. In these environments, our light, unarmored infantry reigns supreme through ambush tactics, turning the very earth into a weapon. Our ability to adapt to any terrain and move fast in the worst conditions makes us a dangerous foe."
  STATIC_MODIFIER_NAME_modifier_mzk_the_muzaka_chronicle: "The Muzaka Chronicle"
  STATIC_MODIFIER_DESC_modifier_mzk_the_muzaka_chronicle: "Our family keeps meticulous and grand records of our history and territorial rights, ensuring our ancient claims are never forgotten. This literary tradition preserves our high Byzantine titles, overawing local rivals with our imperial dignity and historical depth."
  STATIC_MODIFIER_NAME_modifier_thp_a_centralized_levy_system: "A Centralized Levy System"
  STATIC_MODIFIER_DESC_modifier_thp_a_centralized_levy_system: "We have moved away from loose clan associations toward a semi-professional core of infantry based in our central urban axis. This modernization allows us to respond to threats with a speed and discipline that traditional tribal levies cannot match."
  STATIC_MODIFIER_NAME_modifier_albanian_the_transhumance_networks: "The Transhumance Networks"
  STATIC_MODIFIER_DESC_modifier_albanian_the_transhumance_networks: "The seasonal movement of livestock — Transhumance — allows our people to utilize the high summer pastures and the warm winter plains of the coast. This mobile lifestyle makes our population difficult to pin down and provides a resilient food supply that cannot be easily burned by a scorched-earth campaign. Our wealth walks on four legs, always ready to move to safer ground."
  STATIC_MODIFIER_NAME_modifier_alb_the_arbereshe_diaspora: "The Arbëreshë Diaspora"
  STATIC_MODIFIER_DESC_modifier_alb_the_arbereshe_diaspora: "Over time, a good number of our people have emigrated abroad and formed #italic Arbëreshë#! communities. These 'Albanians across the sea' maintain our language and traditions while gaining influence in their new homes. They serve as permanent diplomatic envoys there, constantly lobbying for support for the homeland."
  STATIC_MODIFIER_NAME_modifier_alb_diplomacy_of_the_two_shores: "Diplomacy of the Two Shores"
  STATIC_MODIFIER_DESC_modifier_alb_diplomacy_of_the_two_shores: "Our position allows us to act as the essential bridge between the Italian city-states and the rugged Balkan interior. Our diplomats are trained to navigate both the Venetian Senate and tribal councils, making our mediation indispensable for trade and war."
  STATIC_MODIFIER_NAME_modifier_ant_patronage_of_the_faith: "Patronage of the Faith"
  STATIC_MODIFIER_DESC_modifier_ant_patronage_of_the_faith: "By providing significant land grants and funds to our monasteries, we maintain the spiritual loyalty of the nobility and the peasantry. These sacred sites serve as the cultural heart of our principality, where our victories are celebrated."
  STATIC_MODIFIER_NAME_modifier_mtr_the_trade_monopolies: "The Trade Monopolies"
  STATIC_MODIFIER_DESC_modifier_mtr_the_trade_monopolies: "By controlling the river mouths and coasts, we can successfully dictate the flow of timber and grain from the interior to Venetian galleys. We have positioned ourselves as the indispensable middlemen of the Adriatic trade, ensuring no merchant can bypass our tolls."
  STATIC_MODIFIER_NAME_modifier_mzk_silk_road_waystations: "Silk Road Waystations"
  STATIC_MODIFIER_DESC_modifier_mzk_silk_road_waystations: "Our land sits on the primary trade routes from the interior; by taxing the silk caravans, we maintain a full and prosperous treasury. This revenue allows us to patronize the finest calligraphers and icon painters, turning our domain into the cultural capital of southern Albania."
  STATIC_MODIFIER_NAME_modifier_thp_mecenas_of_the_arts: "Mecenas of the Arts"
  STATIC_MODIFIER_DESC_modifier_thp_mecenas_of_the_arts: "We have funded the construction of grand cathedrals and fortifications, blending Gothic and Byzantine styles to showcase our wealth and piety. This architectural splendor serves to legitimize our rule in the eyes of the Church and our subjects, turning our cities into symbols of permanence."
  STATIC_MODIFIER_NAME_modifier_albanian_the_fortified_kulla_houses: "The Fortified Kulla Houses"
  STATIC_MODIFIER_DESC_modifier_albanian_the_fortified_kulla_houses: "Throughout the countryside, the nobility and wealthy farmers have constructed #italic Kulla#! — fortified stone tower houses. These structures serve as miniature citadels, protecting families from both blood feuds and enemy raids. They represent a society that is permanently mobilized for defense."
  STATIC_MODIFIER_NAME_modifier_alb_the_albanian_merchant_class: "The Albanian Merchant Class"
  STATIC_MODIFIER_DESC_modifier_alb_the_albanian_merchant_class: "The merchants of our coast have become the primary carriers of trade between the Balkans and the West. By utilizing the Greek language for commerce and Albanian for loyalty, they dominate the markets from Venice to Constantinople. These merchant marined are the lifeblood of our modernizing economy."
  STATIC_MODIFIER_NAME_modifier_alb_the_expansion_of_the_regnum: "The Expansion of the Regnum"
  STATIC_MODIFIER_DESC_modifier_alb_the_expansion_of_the_regnum: "We will not rest until the borders of the ancient Kingdom are restored to their greatest extent and beyond, reclaiming our place as masters of the Balkans. This centralizing mission allows us to integrate newly conquered territories with minimal friction as we restore 'rightful' rule."
  STATIC_MODIFIER_NAME_modifier_ant_the_eternal_resistance: "The Eternal Resistance"
  STATIC_MODIFIER_DESC_modifier_ant_the_eternal_resistance: "We have sworn an eternal oath that so long as we breathe, the heart of the rebellion will continue to beat. Our troops are drilled with a fanatical devotion to our ruling house, ensuring they maintain discipline even in the face of overwhelming imperial numbers."
  STATIC_MODIFIER_NAME_modifier_mtr_reclamation_engineering: "Reclamation Engineering"
  STATIC_MODIFIER_DESC_modifier_mtr_reclamation_engineering: "We have begun the process of draining parts of the Myzeqe marshes to create even more fertile farmland. This engineering feat not only increases our tax base but allows us to construct permanent roads through what was once impassable bog."
  STATIC_MODIFIER_NAME_modifier_mzk_literary_patronage: "Literary Patronage"
  STATIC_MODIFIER_DESC_modifier_mzk_literary_patronage: "We have turned our capital into a center of culture, preserving the wisdom of the East and the West for future generations. This intellectual prestige makes our court the destination for the finest minds of the Orthodox and Latin worlds alike."
  STATIC_MODIFIER_NAME_modifier_thp_princeps_albaniae: "Princeps Albaniae"
  STATIC_MODIFIER_DESC_modifier_thp_princeps_albaniae: "Our name has become synonymous with the state itself, allowing us to integrate various ethnic groups under a single banner. By promoting the most talented individuals regardless of their origins, we have created a meritocratic bureaucracy that outshines our feudal rivals."
  STATIC_MODIFIER_NAME_modifier_albanian_the_albanian_alphabet_commission: "The Albanian Alphabet Commission"
  STATIC_MODIFIER_DESC_modifier_albanian_the_albanian_alphabet_commission: "Scholars and patriots are working tirelessly to standardize the Albanian language using a unified Latin alphabet. By establishing national schools and printing newspapers in the vernacular, we are breaking the cultural hegemony of foreign tongues. Literacy in Albanian is the first step toward true independence."
  STATIC_MODIFIER_NAME_modifier_alb_the_spirit_of_the_rilindja: "The Spirit of the Rilindja"
  STATIC_MODIFIER_DESC_modifier_alb_the_spirit_of_the_rilindja: "Our 'National Rebirth' or #italic Rilindja#! has ignited a fire in the hearts of Albanians everywhere, from the mountains of the north to the diaspora in Italy and Egypt. This cultural and political movement has unified all Albanians under the common banner of 'Albanianism'. We are a nation reborn, ready to take our place among the sovereign states of Europe."
  STATIC_MODIFIER_NAME_modifier_alb_enlightened_albanian_absolutism: "Enlightened Albanian Absolutism"
  STATIC_MODIFIER_DESC_modifier_alb_enlightened_albanian_absolutism: "Following the European trend, our monarchs have centralized power, stripping the old clans of their feudal privileges in favor of a modern state. This move has allowed us to implement universal taxation and a national judicial system, turning the kingdom into a streamlined machine of war."
  STATIC_MODIFIER_NAME_modifier_ant_the_professional_highland_grenadiers: "The Professional Highland Grenadiers"
  STATIC_MODIFIER_DESC_modifier_ant_the_professional_highland_grenadiers: "We have evolved our traditional skirmishers into elite mountain grenadier units, specialized in heavy assault and siege warfare. These troops combine their ancestral mountain agility with the devastating firepower of modern explosives, making them the terror of any fortress garrison."
  STATIC_MODIFIER_NAME_modifier_mtr_the_mataranga_port_authority: "The Mataranga Port Authority"
  STATIC_MODIFIER_DESC_modifier_mtr_the_mataranga_port_authority: "We have unified all coastal harbors under a single administrative authority, streamlining the collection of dues and customs. This centralization has made us the most efficient trade administrators in the Adriatic, attracting foreign investment."
  STATIC_MODIFIER_NAME_modifier_mzk_the_muzakan_industrialization: "The Muzakan Industrialization"
  STATIC_MODIFIER_DESC_modifier_mzk_the_muzakan_industrialization: "We have introduced the large-scale cultivation of cash crops in our most fertile valleys, fueling a new domestic industry. By processing our own raw materials into high-value products, we have created an industrial base that supports a wealthy and loyal urban population."
  STATIC_MODIFIER_NAME_modifier_thp_the_thopia_merchant_marine: "The Thopia Merchant Marine"
  STATIC_MODIFIER_DESC_modifier_thp_the_thopia_merchant_marine: "We have expanded our commercial influence by offering state protection to all merchant vessels flying the Thopia banner. This naval security has turned our ports into the preferred hubs for Levant trade, siphoning wealth away from the decaying ports of our rivals."
  STATIC_MODIFIER_NAME_modifier_arm_apostolic_church: "$ARM_ADJ$ Apostolic Church"
  STATIC_MODIFIER_DESC_modifier_arm_apostolic_church: "$ARM$ was the first nation to declare $christian$ as its state religion. As such, our religious traditions, especially those of our clergy, are a major component of our identity."
  STATIC_MODIFIER_NAME_modifier_arm_land_reclamation: "Reclaimed Territory"
  STATIC_MODIFIER_DESC_modifier_arm_land_reclamation: "$ARM$ has been ravaged by war for centuries. By reclaiming the lands lost in these struggles, making them suitable for inhabitation, and restoring ruined churches and fortresses, we can improve the lives of our people and take firmer control over our territory."
  STATIC_MODIFIER_NAME_modifier_arm_border_nation: "Border Nation"
  STATIC_MODIFIER_DESC_modifier_arm_border_nation: "Since ancient times, $ARM$ has been the reluctant battleground between larger nations. Even after regaining our sovereignty, remaining neutral is extremely difficult — it is not impossible to appease everyone, but it is not easy, either."
  STATIC_MODIFIER_NAME_modifier_arm_melikdom_organization: "Melikdom Organization"
  STATIC_MODIFIER_DESC_modifier_arm_melikdom_organization: "As one of the few bastions of an independent $ARM_ADJ$ state, $ARM$ is governed by feudal suzerains called #italic meliks#!, as the old system of $arm_nakharar_titles$ collapsed after the $MGE_ADJ$ invasions. The relationship between meliks and their subordinates is that of a military commanding officer and junior officer, and not of feudal lord and a serf."
  STATIC_MODIFIER_NAME_modifier_arm_mountain_armies: "Mountain Armies"
  STATIC_MODIFIER_DESC_modifier_arm_mountain_armies: "$ARM$ is a mountainous land. Our people have adapted to this terrain over the centuries, and we have developed many ways to use those mountains to our advantage. Our armies will gather readily when called, confident in the additional protection our unique environment provides."
  STATIC_MODIFIER_NAME_modifier_arm_nakharar_titles: "Nakharar Titles"
  STATIC_MODIFIER_DESC_modifier_arm_nakharar_titles: "The #italic Nakharar#! system of titles was in continuous use in $ARM$ from its inception until the times of the $MGE_ADJ$ invasions, when it collapsed. Although the titles themselves are no longer in use, certain characteristics of that system persist, enhancing the abilities of both our nobles and armies."
  STATIC_MODIFIER_NAME_modifier_arm_greater_armenia: "Greater $ARM$"
  STATIC_MODIFIER_DESC_modifier_arm_greater_armenia: "In our long and illustrious history, $ARM_ADJ$ kingdoms spread over a large territory, and so did our $armenian_culture$ people. By emulating these bygone realms, we become a beacon of all $armenian_culture$ people, who will happily unite under our leadership."
  STATIC_MODIFIER_NAME_modifier_arm_highland_fortresses: "Highland Fortresses"
  STATIC_MODIFIER_DESC_modifier_arm_highland_fortresses: "Our fortresses are a brilliant emblem of our resilience and fortitude, built to endure not only the difficult local climate, but also any foreign invader foolish enough to mount an attack into our unforgiving territory."
  STATIC_MODIFIER_NAME_modifier_bng_habshi_generals: "Habshi Generals"
  STATIC_MODIFIER_DESC_modifier_bng_habshi_generals: "Abyssinian slave-soldiers play a significant role in our military as elite infantry. Those who excel as leaders shall be given greater levels of command, while those who demonstrate exceptional loyalty shall make up the palace guard."
  STATIC_MODIFIER_NAME_modifier_bng_rupees: "Minting of Rupees"
  STATIC_MODIFIER_DESC_modifier_bng_rupees: "The lack of a widely adopted standardized currency is stunting our commercial development. As one of the foremost economic powers on the subcontinent, we are in a good position to begin minting a new silver coinage with standard weights, which we shall call the #italic rupee#!."
  STATIC_MODIFIER_NAME_modifier_bng_bengali_traders: "$BNG_ADJ$ Traders"
  STATIC_MODIFIER_DESC_modifier_bng_bengali_traders: "The $indian_ocean_region$ connects our local markets with those of $south_east_asia$ and $china$. We shall therefore greatly emphasize maximizing our presence in these markets via sea routes, and through this increase our trade profits."
  STATIC_MODIFIER_NAME_modifier_bng_bengali_poetry: "$bengali$ Poetry"
  STATIC_MODIFIER_DESC_modifier_bng_bengali_poetry: "The written word is one of the most influential and enduring forms of art. $bengali$ poetry shall tell the tales of epic conquerors, relatable dramas, and engaging philosophical questions, all of which shall further the spread and reputation of $bengali$ culture."
  STATIC_MODIFIER_NAME_modifier_bng_religious_pluralism: "Religious Pluralism"
  STATIC_MODIFIER_DESC_modifier_bng_religious_pluralism: "$india$ is home to many religions: $hindu$ for the majority, $muslim$ as the preferred faith of the ruling classes, and a few remarkable minor religions such as $buddhist$ and $jain$ amongst the working minorities. Promoting one religion over another will cause inevitable chaos and unrest. Thus, we should aim for religious pluralism, and neither favor nor discriminate against any religion in our state."
  STATIC_MODIFIER_NAME_modifier_bng_artillery_corps: "Artillery Corps"
  STATIC_MODIFIER_DESC_modifier_bng_artillery_corps: "Cannons are an impactful asset to military campaigns. We must ensure an efficient artillery corps that specializes in dealing damage to the enemy's rows before they even start to clash with our soldiers on the field."
  STATIC_MODIFIER_NAME_modifier_bng_bengali_trade_fleet: "$BNG_ADJ$ Trade Fleet"
  STATIC_MODIFIER_DESC_modifier_bng_bengali_trade_fleet: "The $bengali$ trade fleet brings exotic goods from foreign lands, as well as precious $goods_gold$ and $silver$, to the markets of the Ganges Delta. Our merchants are well renowned in far-flung parts of the world, thanks to our impressive trade fleet."
  STATIC_MODIFIER_NAME_modifier_bng_shipbuilding_industry: "Shipbuilding Industry"
  STATIC_MODIFIER_DESC_modifier_bng_shipbuilding_industry: "Maritime trade is vital to our state. Our trade and our warships are some of the most important aspects of our economy, and therefore we focus heavily on supporting the shipbuilding industry."
  STATIC_MODIFIER_NAME_modifier_bng_bengali_industrialization: "Industrialized Muslin Production"
  STATIC_MODIFIER_DESC_modifier_bng_bengali_industrialization: "$BNG$ is uniquely situated in $india$ to start a revolution unlike any seen before. Muslin — the special cotton fabric $bengali$ spinners are famous for — is a prime trade good for industrialization. We stand poised to exploit new developments in our already world-class textile industry. Let us begin an industrial revolution!"
  STATIC_MODIFIER_NAME_modifier_cha_dharmic_presence: "$dharmic_ADJ$ Presence"
  STATIC_MODIFIER_DESC_modifier_cha_dharmic_presence: "The $dharmic_ADJ$ gods bless us with their presence. May their strength guide us through the most difficult of times."
  STATIC_MODIFIER_NAME_modifier_cha_kshatriya: "Kṣatriya"
  STATIC_MODIFIER_DESC_modifier_cha_kshatriya: "The $cha_kshatriya$ is a term adopted from $hindu_ADJ$ societies, and describes the elite nobles of our state. Given the origin of this term, it follows that our nobility take  similar roles in military and court affairs as their counterparts in $india$."
  STATIC_MODIFIER_NAME_modifier_cha_veteran_shipbuilders: "Veteran Shipbuilders"
  STATIC_MODIFIER_DESC_modifier_cha_veteran_shipbuilders: "Our state relies on maritime dominance to secure its political, military, and economical presence in $indochina_region$. As such, being able to build ships swiftly is of great importance to our survival."
  STATIC_MODIFIER_NAME_modifier_cha_haluwbilau: "Haluwbilau"
  STATIC_MODIFIER_DESC_modifier_cha_haluwbilau: "The $cha_haluwbilau$ are elite warriors who occupy key positions in both our land and naval forces. Selected for their talents and bravery, these men lead armies and ships into battle against external threats, and also mediate disputes in local communities."
  STATIC_MODIFIER_NAME_modifier_cha_commercial_state: "Commercial State"
  STATIC_MODIFIER_DESC_modifier_cha_commercial_state: "Much of our wealth comes from trade. We should concentrate on expanding and refining our exchange practices, with the ultimate goal of creating a commercial state in the process."
  STATIC_MODIFIER_NAME_modifier_cha_boarding_tactics: "Boarding Tactics"
  STATIC_MODIFIER_DESC_modifier_cha_boarding_tactics: "Due to our challenging native terrain, would-be conquerors must rely on their naval capabilities when attempting to invade us. Decades of piracy in the surrounding seas have taught us valuable boarding tactics, which allow us to use an opponent's own ships against them."
  STATIC_MODIFIER_NAME_modifier_cha_towers_on_water: "Towers on Water"
  STATIC_MODIFIER_DESC_modifier_cha_towers_on_water: "As a maritime power, much of our wealth and power comes from the sea and our dominance over it. In order to secure this supremacy, our shipwrights have designed special large warships which are known as #italic Towers on the Water#!, hybrid creations between a heavy ship and a galley."
  STATIC_MODIFIER_NAME_modifier_cha_cham_cultural_influence: "$cham_culture$ Cultural Influence"
  STATIC_MODIFIER_DESC_modifier_cha_cham_cultural_influence: "Although some of our neighbors see our culture as inferior, they are just in denial, as many of our cultural aspects make their way into their self-proclaimed 'civilized' courts. $cham_culture$ drumming, songs, dances, poetry... all of these art forms have left a clear and lasting mark on what other nations consider artistic achievement!"
  STATIC_MODIFIER_NAME_modifier_dalmatian_the_cult_of_the_local_patron_saint: "The Cult of the Local Patron Saint"
  STATIC_MODIFIER_DESC_modifier_dalmatian_the_cult_of_the_local_patron_saint: "Every Dalmatian city is anchored by the intense veneration of its own unique patron — Saint Chrysogonus in Zadar, Saint Domnius in Split, Saint Tryphon in Kotor. These saints are not just religious figures; they are the 'Foundational Sovereigns' of the city. Their feast days are the primary social and political events of the year, uniting all classes in a shared ritual that reinforces the city's independent identity. This intense localism ensures that Dalmatian culture is a mosaic of fiercely independent urban identities, making it impossible for any foreign power to culturally dominate the entire coast at once."
  STATIC_MODIFIER_NAME_modifier_dal_the_union_of_the_two_souls: "The Union of the Two Souls"
  STATIC_MODIFIER_DESC_modifier_dal_the_union_of_the_two_souls: "The Dalmatian culture has matured into a truly bilingual society where Latin is the language of the law and Slavic is the language of the heart. This linguistic flexibility allows our people to navigate the complex social strata of the Renaissance Adriatic with ease. By mastering both tongues, our merchants and sailors become the indispensable intermediaries for all trade between the Italian city-states and the Slavic interior. This bilingualism creates a 'Dalmatian Bridge' culture that is uniquely adapted to international trade and diplomacy, ensuring that our people are always at the center of Mediterranean commerce."
  STATIC_MODIFIER_NAME_modifier_rag_the_lazzaretto_system: "The Lazzaretto System"
  STATIC_MODIFIER_DESC_modifier_rag_the_lazzaretto_system: "Facing the recurring devastation of the Black Death, Ragusa has pioneered the world's first mandatory maritime quarantine system on the islands of Mrkan and Bobara. By isolating incoming crews and goods for forty days (quaranta), we protect our urban population while maintaining the functionality of our port when other Mediterranean hubs are paralyzed by plague. This scientific approach to public health ensures that the Republic remains a reliable and clean port of call, preserving our manpower and mercantile networks during even the most lethal periods of European history."
  STATIC_MODIFIER_NAME_modifier_dalmatian_the_guild_of_the_stone_master: "The Guild of the Stone-Master"
  STATIC_MODIFIER_DESC_modifier_dalmatian_the_guild_of_the_stone_master: "The abundant, bone-white limestone of the coast has birthed a culture of master stone-cutters who view the karst as a canvas. Our craftsmen have developed a 'Gothic-Renaissance' style that is world-renowned for its structural innovation and delicate carving. This is not merely art; it is a physical statement of our permanence. By building every church, palace, and city wall from local stone, our people create a landscape that is both beautiful and indestructible, fostering a national pride that views the Dalmatian town as a sacred, eternal monument to our skill that no sea-borne empire can truly erase."
  STATIC_MODIFIER_NAME_modifier_dal_the_soldato_dalmantine: "The Soldato Dalmantine"
  STATIC_MODIFIER_DESC_modifier_dal_the_soldato_dalmantine: "As we consolidate our rule, we have turned our population into the 'Sword of the Nation'. Our men are recruited into elite #italic Schiavoni#! (Slavic) regiments, serving as the frontline heavy infantry for our wars. This military service provides our people with professional training and exposure to the latest European warfare techniques, creating a culture of career soldiers. While our cities may lose their mercantile edge, our people become the most respected warriors in the Mediterranean, ensuring that our military tradition remains unbroken even under foreign administration."
  STATIC_MODIFIER_NAME_modifier_rag_the_arsenal_expansion: "The Arsenal Expansion"
  STATIC_MODIFIER_DESC_modifier_rag_the_arsenal_expansion: "Our shipyards have become famous for producing the #italic argosy#!, massive carracks capable of surviving the Atlantic and the Indian Oceans. By standardizing our shipbuilding techniques and securing high-quality oak from the Bosnian forests, we ensure that the Ragusan merchant marine is the most technologically advanced in the Adriatic. These vessels are designed for maximum cargo capacity and defensive firepower, allowing our merchants to dominate the spice and silk routes while flying the flag of Saint Blaise in every major port from London to Goa."
  STATIC_MODIFIER_NAME_modifier_dalmatian_the_high_chancery_style: "The High Chancery Style"
  STATIC_MODIFIER_DESC_modifier_dalmatian_the_high_chancery_style: "The Dalmatian patriciate has adopted the 'High Dalmatian' literary standard for their private correspondence and diplomatic registries, emulating their Italian Peninsula counterparts. This cultural pivot away from the medieval Latin towards the refined vernacular aligns the coastal cities with the heart of the Italian Renaissance. This shared linguistic aesthetic creates a seamless intellectual bridge with the Venetian #italic Studio#!, allowing Dalmatian poets and lawyers to participate in the most exclusive humanist circles of Italy. This 'Linguistic Refinement' ensures that our diplomats are regarded as cultural peers in any Western court, providing a diplomatic shield based on shared civilization rather than raw military force."
  STATIC_MODIFIER_NAME_modifier_dal_adriatic_oak_galleys: "Adriatic Oak Galleys"
  STATIC_MODIFIER_DESC_modifier_dal_adriatic_oak_galleys: "Recognizing that the Mediterranean is becoming a sea of fire, we have commissioned a new class of heavy, oak-reinforced oared vessels built in our best shipyards. By utilizing the iron-hard timber of the coastal mountains, these ships can withstand heavier broadsides and are designed to navigate the shallow, rocky karst inlets where large Venetian galleys founder. This superiority allows us to police our own waters and defend our coasts from any enemy."
  STATIC_MODIFIER_NAME_modifier_rag_the_collegium_ragusinum: "The Collegium Ragusinum"
  STATIC_MODIFIER_DESC_modifier_rag_the_collegium_ragusinum: "To maintain our status as a center of refinement, we have established the #italic Collegium Ragusinum#!, a Jesuit-led institution of higher learning that attracts the sons of Balkan and Italian nobility. By producing a class of highly educated diplomats, scientists, and poets, we ensure that Ragusa's leadership is never outmatched in the courtrooms of Europe. This intellectual investment turns our small city into a center of culture, where the fusion of Latin logic and Slavic spirit produces the scholars who will define the cultural awakening of the entire Adriatic littoral."
  STATIC_MODIFIER_NAME_modifier_dalmatian_the_accademia_degli_oziosi: "The Accademia degli Oziosi"
  STATIC_MODIFIER_DESC_modifier_dalmatian_the_accademia_degli_oziosi: "Modeled after the Italian literary academies, the intellectuals of our cities have founded societies like the #italic Accademia degli Oziosi#! to discuss physics, astronomy, and classical poetry. These 'Idle' scholars are anything but — they serve as the scientific advisors to the naval admiralties, applying the new Baroque rationalism to cartography and ballistics. This cultural institutionalization of curiosity ensures that the Dalmatian urban centers remain the 'Scientific Watchtowers' of the Adriatic, preserving the coast as a hub of European Enlightenment even as the interior of the Balkans remains locked in traditionalist cycles."
  STATIC_MODIFIER_NAME_modifier_dal_morlach_frontier_levies: "Morlach Frontier Levies"
  STATIC_MODIFIER_DESC_modifier_dal_morlach_frontier_levies: "We have integrated the Morlachs — the fierce Vlach and Slavic shepherds of the interior — into a permanent military reserve. These irregulars are granted land rights in exchange for constant readiness, serving as the eyes and ears of the nation. Their intimate knowledge of the karst geography allows us to conduct deep-strike ambushes and night raids that paralyze the enemy's logistics. This creates a 'Nation in Arms' culture in the Dalmatian hinterland, where the boundary between civilian and soldier is entirely erased in the name of our defense."
  STATIC_MODIFIER_NAME_modifier_rag_the_ragusan_porto_franco: "The Ragusan Porto Franco"
  STATIC_MODIFIER_DESC_modifier_rag_the_ragusan_porto_franco: "As the wars between our neighbors intensify, we have declared our city a strictly neutral #italic Porto Franco#! (Free Port). By refusing to host foreign warships while offering high-quality repairs and storage to all merchant vessels, we ensure that the conflict only serves to increase our profits. This 'Economic Non-Alignment' makes Ragusa the only safe harbor in a burning sea, allowing us to capture the trade routes that our rivals have abandoned in their pursuit of military glory."
  STATIC_MODIFIER_NAME_modifier_dalmatian_mediterranean_cosmopolitanism: "Mediterranean Cosmopolitanism"
  STATIC_MODIFIER_DESC_modifier_dalmatian_mediterranean_cosmopolitanism: "Centuries of maritime trade and bilingualism have produced a culture of Cosmopolitanism, where our people are at home in any port from Venice to the Levant. This cultural openness allows us to absorb and adapt the best ideas from across the globe, creating a society that is uniquely flexible and resilient. Our people are the 'citizens of the sea', possessing a world-view that is far broader than that of the landlocked interior. This cosmopolitan spirit ensures that the Dalmatian culture remains vibrant and commercially successful, serving as the 'window to the world' for the entire Balkan Peninsula."
  STATIC_MODIFIER_NAME_modifier_dal_dalmatian_olive_pacts: "Dalmatian Olive Pacts"
  STATIC_MODIFIER_DESC_modifier_dal_dalmatian_olive_pacts: "We have pivoted our economy toward intensive agriculture, taking advantage of the climate of the Dalmatian coast. By establishing state-monitored 'Agricultural Pacts', we have reclaimed the coastal hills for large-scale production, turning our rugged land into a green garden of exports. This economic diversification reduces our reliance on the maritime trade and provides a new source of wealth for the coastal nobility, funding the construction of grand summer villas and urban theaters that rival those of the Italian mainland."
  STATIC_MODIFIER_NAME_modifier_rag_the_ragusan_maritime_insurance_code: "The Ragusan Maritime Insurance Code"
  STATIC_MODIFIER_DESC_modifier_rag_the_ragusan_maritime_insurance_code: "We have moved beyond mere shipping to the world of high finance by formalizing one of the first sophisticated systems of maritime insurance. By pooling the risks of our merchant families through the #italic Monte di Pietà#!, we allow our captains to undertake daring new voyages to the Americas and the Far East with minimal personal risk. This financial innovation ensures that Ragusan capital is always in motion, creating a self-sustaining cycle of wealth that keeps our city wealthy and relevant even as the traditional Mediterranean trade routes begin to fade in importance."
  STATIC_MODIFIER_NAME_modifier_geo_georgian_isolation: "$GEO_ADJ$ Isolation"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_isolation: "Surrounded by powerful countries with vastly different religions and cultures from ours, we are forced to use opportunistic diplomacy, and often change allegiances in order to appease everyone and preserve peace for as long as possible."
  STATIC_MODIFIER_NAME_modifier_geo_legacy_of_saint_nino: "Legacy of Saint Nino"
  STATIC_MODIFIER_DESC_modifier_geo_legacy_of_saint_nino: "$GEO$ has one of the oldest $christian_ADJ$ churches in the world, tracing its roots back to the conversion of the region by Saint Nino over a millennium ago. Through the centuries, the $GEO_ADJ$ Church has served as an increasingly unifying force in all $GEO_ADJ$ states, and has served as a central element in $GEO_ADJ$ culture in the face of $BYZ_ADJ$, $MGE_ADJ$, and $muslim_ADJ$ influence. With few other $christian_ADJ$ kingdoms left in this region, and given the splintered loyalties within $GEO$, the Church still plays an important role as a unifying force against outsiders."
  STATIC_MODIFIER_NAME_modifier_geo_restoration_of_fortresses_and_churches: "Restoration of Fortresses and Churches"
  STATIC_MODIFIER_DESC_modifier_geo_restoration_of_fortresses_and_churches: "Our many fortresses and churches have helped our country to resist and continue to survive among encroaching foreign influences. Our fortresses protect the land while our churches protect our spirit, and we must keep both in prime condition if we are to thrive."
  STATIC_MODIFIER_NAME_modifier_geo_sadrosho_districts: "Sadrosho Districts"
  STATIC_MODIFIER_DESC_modifier_geo_sadrosho_districts: "#italic Sadrosho#!, banners, are special military districts used for mobilization purposes. By dividing our territory into several sadrosho, each under the command of their own dedicated military official, we can better organize the recruitment and distribution of all our troops."
  STATIC_MODIFIER_NAME_modifier_geo_dasturlamali: "Dasturlamali"
  STATIC_MODIFIER_DESC_modifier_geo_dasturlamali: "$GEO$ has experienced tumultuous centuries since the $MGE_ADJ$ invasion, marked by periodic division, shifting external pressures, and the rising influence of the local nobility. The old $GEO_ADJ$ feudal system has been made obsolete, or at least partially discarded. The $geo_dasturlamali$, a comprehensive set of rules and guidelines detailing the obligations of subjects and nobles toward king and state, strengthens internal order and serves as the foundation for our kingdom's legal framework."
  STATIC_MODIFIER_NAME_modifier_geo_georgian_embassies: "$GEO_ADJ$ Embassies"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_embassies: "We have a tradition of establishing strong diplomatic ties with all nations around us, regardless of our possible differences. As a result, our diplomats are always well received and respected."
  STATIC_MODIFIER_NAME_modifier_geo_georgian_unification: "$GEO_ADJ$ Unification"
  STATIC_MODIFIER_DESC_modifier_geo_georgian_unification: "$GEO$ has been divided in the past, both by foreign influences and internal causes. But the patriotic $GEO_ADJ$ people are more than willing to fight to ensure that $GEO$ is never divided again."
  STATIC_MODIFIER_NAME_modifier_arabian_desert_warfare: "Strength of the Desert"
  STATIC_MODIFIER_DESC_modifier_arabian_desert_warfare: "The inhospitable deserts of $AIA$ have made our warriors stronger, able to wear down the enemy before moving in for the killing blow."
  STATIC_MODIFIER_NAME_modifier_arabia_cradle_of_islam: "Cradle of $muslim$"
  STATIC_MODIFIER_DESC_modifier_arabia_cradle_of_islam: "Our lands are host to some of the most holy sites in our faith. This divine proximity makes our people connect deeply with their beliefs, inspiring them to further and further greatness."
  STATIC_MODIFIER_NAME_modifier_arabia_red_sea_trade: "Red Sea Trade"
  STATIC_MODIFIER_DESC_modifier_arabia_red_sea_trade: "There are many trade outposts along our coastline, dealing in precious goods both from our own lands and foreign shores. It is time that we claim our fair share of this wealth."
  STATIC_MODIFIER_NAME_modifier_chi_legitimate_claimant: "Claim to the Mandate"
  STATIC_MODIFIER_DESC_modifier_chi_legitimate_claimant: "Our origins may be humble, but we have proven our ability to lead, and have inspired and won the loyalty of many faithful subjects. We are now seen as worthy claimants to the Mandate of Heaven and the Middle Kingdom."
  STATIC_MODIFIER_NAME_modifier_chi_great_rivers_of_china: "Fertile Rivers"
  STATIC_MODIFIER_DESC_modifier_chi_great_rivers_of_china: "While the great rivers flowing through our lands do have some associated risks for nearby settlements, they are also an invaluable tool for crop production."
  STATIC_MODIFIER_NAME_modifier_german_baltic_sailors: "Baltic Sailors"
  STATIC_MODIFIER_DESC_modifier_german_baltic_sailors: "Harsh climates breed hardy people. Traversing the cold Baltic Sea has certainly left its mark on our sailors, making them mentally resilient and particularly skilled at their profession. This is for their ultimate benefit, as the sea can be a merciless mistress."
  STATIC_MODIFIER_NAME_modifier_franconian_proud_knights: "Knights of the Empire"
  STATIC_MODIFIER_DESC_modifier_franconian_proud_knights: "Our people have committed a long line of proud knights to Imperial service. They embody knightly ideals that have become less common over time, but remain an essential part of our identity. We have a long history to look at for proper education in both chivalric conduct and military matters. This tradition of Imperial knights naturally increases the willingness of our noble class to contribute levies in hopes of winning glory in honorable combat."
  STATIC_MODIFIER_NAME_modifier_saiger_process: "Saiger Process"
  STATIC_MODIFIER_DESC_modifier_saiger_process: "A new and revolutionary smelting process, enriching silver-containing copper with lead, will allow us to increase the productivity of our mining operations."
  STATIC_MODIFIER_NAME_modifier_german_populating_the_countryside: "Attracting the Right People"
  STATIC_MODIFIER_DESC_modifier_german_populating_the_countryside: "By encouraging settlement in rural areas and giving the people land to work there will be a great foundation to slowly but surely increase the wealth and productivity of our more sparsely populated territories."
  STATIC_MODIFIER_NAME_modifier_german_imperial_roads: "Imperial Road Network"
  STATIC_MODIFIER_DESC_modifier_german_imperial_roads: "Since Roman times, road networks have connected places across $GER$, making trade and travel easier and more accessible. These roads also provide critical logistical advantages, particularly when moving troops."
  STATIC_MODIFIER_NAME_modifier_swabian_frugal_people: "Frugal Finances"
  STATIC_MODIFIER_DESC_modifier_swabian_frugal_people: "Many have accused our people of stinginess, and laughed at our good sense of economic caution. Fortunately, we cannot hear their mockery over the sound of all these ducats jingling in our purse."
  STATIC_MODIFIER_NAME_modifier_franconian_wine_bottles: "Silvaner and Bocksbeutel"
  STATIC_MODIFIER_DESC_modifier_franconian_wine_bottles: "The #italic bocksbeutel#! is a major part of our winemaking traditions. Being easily recognizable, the shape of this bottle serves as a sort of ambassador for the beautiful wines produced in our region, such as the Silvaner or Riesling. The exemplary talents of our glassmakers and winemakers will surely bring us economic advantages."
  STATIC_MODIFIER_NAME_modifier_german_fair_towns: "Reichsmessestädte"
  STATIC_MODIFIER_DESC_modifier_german_fair_towns: "Imperial fairs are a rare privilege granted to only a few select cities, creating some of the largest marketplaces in $europe$ and making these cities the commercial heart of the $hre$. The centralized nature of these markets allows merchants to plan and negotiate effectively in a setting where they can benefit from freedom and access to a diverse variety of goods."
  STATIC_MODIFIER_NAME_modifier_german_biedermeier: "Biedermeier"
  STATIC_MODIFIER_DESC_modifier_german_biedermeier: "The Biedermeier period marks a shift in social conservatism stemming from the upper classes and their nostalgia for the time when they held the most influence and power in our country. This social change has led our more free-thinking citizens to shroud their creative and intellectual pursuits in relative secrecy, well out of the public's disapproving gaze. While this inadvertently strengthens the development of a cultural identity amongst our merchants, it has also forced many valuable minds to leave our nation, seeking their lost freedoms — and taking their talents — elsewhere."
  STATIC_MODIFIER_NAME_modifier_greek_group_hesychast_traditions_advance: "Hesychast Traditions"
  STATIC_MODIFIER_DESC_modifier_greek_group_hesychast_traditions_advance: "In an era of political decay, the spiritual movement of Hesychasm, championed by Grēgórios Palamâs, provides a profound inner strength. By focusing on the 'uncreated light' through silent prayer, our people find a unity that transcends failing borders and imperial intrigue. The monasteries of Mount Athos become the spiritual nerve centers of the Greek world, ensuring that neither the Pope's emissaries nor the Sultan's janissaries can break the religious cohesion of our populace."
  STATIC_MODIFIER_NAME_modifier_epi_balkan_marriages_advance: "Balkan Marriages"
  STATIC_MODIFIER_DESC_modifier_epi_balkan_marriages_advance: "Epirus sits at the crossroads of the Greek, Slavic, and Latin worlds, and we have turned our royal daughters into our most effective diplomats. Through a complex web of strategic marriages with Serbian Kings, Albanian Chieftains, and even Italian Counts, we have made the House of Doukas-Komnenos the indispensable arbiter of Balkan politics. These blood-ties ensure that when we go to war, we are never without powerful allies willing to strike from our enemies' flanks."
  STATIC_MODIFIER_NAME_modifier_feo_the_bastion_of_mangup_advance: "The Bastion of Mangup"
  STATIC_MODIFIER_DESC_modifier_feo_the_bastion_of_mangup_advance: "Our capital, Mangup-Kale, is a literal mountain carved into a fortress, surrounded by sheer cliffs that defy any siege engine. We have expanded these natural defenses with a series of sophisticated tunnels, cisterns, and hidden sally ports, allowing the city to hold out for years if necessary. This impregnable base ensures that even if our lands are ravaged by the Golden Horde, the heart of our Principality remains safe, serving as a beacon of hope for all Christians in the North."
  STATIC_MODIFIER_NAME_modifier_gre_rebuilding_the_theme_system_advance: "Rebuilding the Theme System"
  STATIC_MODIFIER_DESC_modifier_gre_rebuilding_the_theme_system_advance: "We have looked to the golden age of the Middle Byzantine period to solve our manpower crisis. By granting hereditary land plots to #italic Akritai#! (border guards) in exchange for perpetual military service, we create a self-sustaining defense force deeply rooted in the soil they protect. This system reduces our reliance on expensive mercenaries and ensures that every province has a dedicated militia capable of holding the line until the main imperial army arrives."
  STATIC_MODIFIER_NAME_modifier_moe_reclaiming_the_peloponnese_advance: "Reclaiming the Peloponnese"
  STATIC_MODIFIER_DESC_modifier_moe_reclaiming_the_peloponnese_advance: "Following the Byzantine recovery of the forts of Monemvasia, Maina, and Mystras, the Despotate of the Morea has dedicated itself to a long 'reconquista' of the peninsula from the Frankish Principalities. This campaign is not merely one of siegecraft, but of cultural subversion, as the Greek administration encourages the local population to rise against their Latin lords in favor of the 'rightful ruler'. Through a combination of strategic marriages, persistent skirmishing, and the gradual absorption of feudal fiefs, the Morea slowly knits together a fractured land into a cohesive province."
  STATIC_MODIFIER_NAME_modifier_ths_meteora_sanctuaries_advance: "Meteora Sanctuaries"
  STATIC_MODIFIER_DESC_modifier_ths_meteora_sanctuaries_advance: "As the Balkans face increasing instability, the Despots of Thessaly patronize the construction of monastic complexes atop the inaccessible sandstone pillars of Meteora. These 'monasteries in the sky' serve a dual purpose: They function as spiritual beacons for the Orthodox faith and as high-altitude treasuries where the state's wealth and holy relics can be protected from marauding mercenaries. By centralizing the spiritual authority of the region in such defensible positions, the Despotate ensures that the local identity remains anchored in Orthodoxy even when the central government is under duress."
  STATIC_MODIFIER_NAME_modifier_greek_group_stratioti_levies_advance: "Stratioti Levies"
  STATIC_MODIFIER_DESC_modifier_greek_group_stratioti_levies_advance: "The rugged landscape of the Balkans has birthed a unique class of warrior: the Stratioti. These light cavalrymen, often wearing a mix of Byzantine armor and local attire, are masters of the 'hit and run' tactics necessary to harass larger, slower Western or Ottoman armies. Their reputation for ferocity and scouting excellence makes them indispensable, turning the tide of mountain battles where heavy knights flounder. They are the vanguard of a Greek military resurgence."
  STATIC_MODIFIER_NAME_modifier_epi_arvanite_communities_advance: "Arvanite Communities"
  STATIC_MODIFIER_DESC_modifier_epi_arvanite_communities_advance: "To bolster our dwindling numbers, we have invited the fierce Arvanite clans to settle in the fertile valleys of Epirus and Acarnania. In exchange for land and autonomy, these warriors provide us with a tireless light infantry force that excels in the brutal, close-quarters combat of the Balkan frontier. Their unique martial culture, blended with our Roman military tradition, creates a hybrid force that is both exceptionally loyal and terrifyingly aggressive in the shock of battle."
  STATIC_MODIFIER_NAME_modifier_feo_black_sea_fur_trade_advance: "Black Sea Fur Trade"
  STATIC_MODIFIER_DESC_modifier_feo_black_sea_fur_trade_advance: "Despite our small size, we control the vital ports that connect the vast fur-producing forests of Russia to the markets of the Mediterranean. We have negotiated exclusive rights with the local Tatar Khans to be the sole shippers of these furs across the Black Sea. This lucrative monopoly provides us with the wealth necessary to pay for Genoese engineers and Byzantine scholars, ensuring our tiny principality remains a center of wealth and sophistication amidst the steppe."
  STATIC_MODIFIER_NAME_modifier_gre_greek_viticulture_advance: "Greek Viticulture"
  STATIC_MODIFIER_DESC_modifier_gre_greek_viticulture_advance: "We have revolutionized the agriculture of Greece, moving away from subsistence farming toward high-value export crops, specifically the famous #italic Malvasia#! wine and sun-dried currants. By investing in modern irrigation and processing techniques, we have made our agricultural products a staple of the European luxury market. The resulting economic boom funds a professional standing army and allows us to maintain a courtly splendor that rivals the great kings of the West."
  STATIC_MODIFIER_NAME_modifier_moe_plethons_vision_advance: "Plethon's Vision"
  STATIC_MODIFIER_DESC_modifier_moe_plethons_vision_advance: "The arrival of the philosopher Georgios Gemistus Plethon at the court of Mystras has signaled a radical shift in the Morean identity, as he has proposed a return to the laws and social structures of ancient Sparta. Plethon advocates for a national army of native Greeks rather than unreliable mercenaries, and a social order based on Hellenic heritage rather than just Christian confession. This proto-nationalist awakening will provide the Despotate with a powerful ideological weapon, transforming the defense of the Morea into a crusade for the survival of the Greek nation itself, which will bolster the prestige of our ruling house even if we stick to Christianity."
  STATIC_MODIFIER_NAME_modifier_ths_thessalian_horse_breeding_advance: "Thessalian Horse-Breeding"
  STATIC_MODIFIER_DESC_modifier_ths_thessalian_horse_breeding_advance: "The vast, fertile plains surrounding Larisa and Trikala offer a unique geographical advantage in a region dominated by mountains: the capacity for large-scale horse-rearing. Drawing upon the ancient legacy of the Thessalian cavalry, the Despots have established state-run stud farms to produce hardy, swift mounts capable of carrying armored riders across diverse terrains. This investment will transform the Despotate's military, allowing it to field a professional cavalry corps that could compete with enemy knights, providing the state with a decisive offensive tool on the open field."
  STATIC_MODIFIER_NAME_modifier_greek_group_the_phanariote_network_advance: "The Phanariote Network"
  STATIC_MODIFIER_DESC_modifier_greek_group_the_phanariote_network_advance: "Within the narrow streets of the Phanar district, a new class of Greek merchant-diplomats has risen to prominence. Leveraging their literacy and linguistic skills, these families have made themselves indispensable to the administrative machinery of the Mediterranean powers. They serve as dragomans, governors, and financiers, creating a shadow empire of influence that spans from the Danube to the Nile. Their secret correspondence provides our state with unparalleled intelligence and diplomatic leverage."
  STATIC_MODIFIER_NAME_modifier_epi_adriatic_gatekeepers_advance: "Adriatic Gatekeepers"
  STATIC_MODIFIER_DESC_modifier_epi_adriatic_gatekeepers_advance: "By securing the ports of Valona and Butrint, Epirus sits as the warden of the Adriatic Sea. We have leveraged this position to negotiate favorable trade treaties with Venice and the Italian city-states, who must pass through our sphere of influence to reach the Levant. By levying precise tariffs and providing 'protection' services against corsairs, we have transformed our once-isolated despotate into a wealthy commercial hub that bridges the gap between East and West."
  STATIC_MODIFIER_NAME_modifier_feo_the_northern_star_of_greece_advance: "The Northern Star of Greece"
  STATIC_MODIFIER_DESC_modifier_feo_the_northern_star_of_greece_advance: "As the main Greek-speaking state in the North, Theodoro has become a symbol of religious resistance and cultural survival. We have established our Prince as the #italic Protector of the Pontic Greeks#!, drawing immigrants and scholars from distant places. This religious prestige gives us a moral authority that transcends our borders, making us a key player in the grand religious struggles as the #italic Northern Star#! of the Greek Orthodox faith."
  STATIC_MODIFIER_NAME_modifier_gre_the_new_stratikon_advance: "The New Stratikon"
  STATIC_MODIFIER_DESC_modifier_gre_the_new_stratikon_advance: "As gunpowder reshapes the battlefields of Europe, we have synthesized Western musket drills with our traditional tactical manuals. Our infantry, the #italic New Stratikon#!, are trained to maintain rigid discipline under fire, mimicking the legendary resilience of the ancient phalanx but armed with modern harquebuses and pikes. This professionalization of the rank-and-file ensures that we are no longer a medieval relic, but a modern military powerhouse capable of standing toe-to-toe with any empire."
  STATIC_MODIFIER_NAME_modifier_moe_the_hexamilion_modernization_advance: "The Hexamilion Modernization"
  STATIC_MODIFIER_DESC_modifier_moe_the_hexamilion_modernization_advance: "Recognizing that the Isthmus of Corinth is the gateway to the peninsula, the Morean state will invest heavily in the reconstruction and modernization of the Hexamilion wall. Utilizing new developments in gunpowder fortification, the ancient barrier will be transformed into a sophisticated line of bastions, redoubts, and artillery batteries designed to withstand a modern imperial siege and, then, replicated across our nation. This 'Great Wall of Greece' will serve as the cornerstone of a defensive strategy that will allow the Despotate to project power safely behind an impenetrable line, forcing any invader to commit to a long and costly naval blockade."
  STATIC_MODIFIER_NAME_modifier_ths_raiders_of_the_pindus_advance: "Raiders of the Pindus"
  STATIC_MODIFIER_DESC_modifier_ths_raiders_of_the_pindus_advance: "Survival in Northern Greece requires a departure from traditional Byzantine field tactics in favor of a sophisticated system of partisan warfare. The Thessalian military doctrine will evolve to focus on #italic Klephthic#! tactics, utilizing the deep ravines and dense forests of the Pindus mountains to bleed enemy supply lines dry through constant harassment. This cultural shift toward guerilla resistance meant that any occupying force will face a landscape where every shepherd is a scout and every mountain path a potential ambush site, making the conquest of Thessaly a logistical nightmare for foreign empires."
  STATIC_MODIFIER_NAME_modifier_greek_group_aegean_coastal_defence_advance: "Aegean Coastal Defense"
  STATIC_MODIFIER_DESC_modifier_greek_group_aegean_coastal_defence_advance: "The jagged coastlines and thousands of islands of the Aegean are our natural fortifications. We have transformed our maritime culture into a defensive doctrine, where every merchant vessel is armed and every fisherman is a potential marine. By patrolling the narrow straits and hidden coves, we ensure that any hostile fleet attempting to move through our waters is subjected to constant harassment. This decentralized naval power makes our maritime heartland nearly impossible to occupy."
  STATIC_MODIFIER_NAME_modifier_epi_fortresses_of_ioannina_advance: "Fortresses of Ioannina"
  STATIC_MODIFIER_DESC_modifier_epi_fortresses_of_ioannina_advance: "The city of Ioannina has been transformed into a true stronghold. Utilizing the latest in Italian military engineering, we have surrounded our capital and its lake with a series of interlocking bastions and water-forts that can withstand months of sustained bombardment. This defensive network serves as the anchor for our entire national strategy, allowing us to retreat into an impregnable core whenever the tides of war turn against us in the open field."
  STATIC_MODIFIER_NAME_modifier_feo_the_gothic_red_guard_advance: "The Gothic Red Guard"
  STATIC_MODIFIER_DESC_modifier_feo_the_gothic_red_guard_advance: "Drawing upon the ancient, grim traditions of our Gothic ancestors and the disciplined military manuals of the Romans, we have formed the #italic Red Guard#!. These elite shock troops are recruited exclusively from the highest mountain villages of the Crimea, trained to fight in the pitch-black tunnels of our fortresses and the claustrophobic ravines of the coast. Armed with heavy polearms and the latest flintlock pistols, they are masters of the sudden, devastating raids. Their reputation for never taking prisoners and never retreating makes them the most feared infantry in the Euxine basin, capable of breaking the morale of even the most hardened regiments."
  STATIC_MODIFIER_NAME_modifier_gre_the_hellenic_admiralty_advance: "The Hellenic Admiralty"
  STATIC_MODIFIER_DESC_modifier_gre_the_hellenic_admiralty_advance: "A unified Greece must be the master of the 'Inner Sea' if it is to survive between the giants of East and West. We have established a centralized Admiralty in Piraeus, standardizing ship construction and training a professional officer corps in the latest navigational sciences. By merging the speed of the galley with the firepower of the galleon, we create a fleet that is both agile in the Aegean winds and formidable in the open Mediterranean."
  STATIC_MODIFIER_NAME_modifier_moe_the_silk_road_of_morea_advance: "The Silk Road of Morea"
  STATIC_MODIFIER_DESC_modifier_moe_the_silk_road_of_morea_advance: "The Peloponnesian silk industry, long a staple of the local economy, has underwent a massive state-led expansion during the 17th century to fund the Despotate's growing military ambitions. By inviting Venetian master-weavers and Genoese dyers to settle in the capital of Mystras, the Despots have broken the foreign monopoly on luxury textile processing, ensuring that the entire value chain — from mulberry cultivation to finished brocade — remained within Greek borders. This economic protectionism will turn the Morea into a vital 'Silk Hub' that will link the luxury demands of the European Enlightenment with the raw materials of the East. The resulting surge in custom duties and trade tolls will provide the treasury with the gold necessary to maintain a modern bureaucracy and a standing army without overtaxing the peasantry."
  STATIC_MODIFIER_NAME_modifier_ths_armatole_administration_advance: "Armatole Administration"
  STATIC_MODIFIER_DESC_modifier_ths_armatole_administration_advance: "To combat the lawlessness of the borderlands and the rise of banditry, the Thessalian state institutionalized the #italic Armatoloi#!, a system where local leaders are given official military jurisdiction over specific districts. This administrative layer bridges the gap between the central Despot and the rural peasantry, creating a disciplined paramilitary class responsible for collecting taxes and maintaining internal security. By turning former outlaws into state-sanctioned peacekeepers, the despotate will achieve a level of domestic stability that will allow for renewed economic growth and a more centralized form of governance."
  STATIC_MODIFIER_NAME_modifier_greek_group_the_modern_greek_enlightenment_advance: "The Modern Greek Enlightenment"
  STATIC_MODIFIER_DESC_modifier_greek_group_the_modern_greek_enlightenment_advance: "The #italic Diafotismós#! brings the fire of Western scientific inquiry back to the lands where philosophy was born. Greek intellectuals ship thousands of books back to the homeland, sparking a massive educational reform. This movement replaces old superstitions with the ideals of liberty, equality, and a renewed Hellenic identity. The resulting national awakening transforms our subjects into citizens, ready to fight for a modern, enlightened state."
  STATIC_MODIFIER_NAME_modifier_epi_the_sublime_diplomacy_advance: "Sublime Diplomacy"
  STATIC_MODIFIER_DESC_modifier_epi_the_sublime_diplomacy_advance: "Centuries of survival between powerful enemies have made our diplomatic corps the most sophisticated in the world. We have developed a 'neutrality-of-strength' doctrine, playing the great powers against one another so skillfully that they compete for our favor rather than seeking our conquest. Our ambassadors are renowned for their ability to weave peace treaties that always seem to leave Epirus with more territory and influence than when the conflict began."
  STATIC_MODIFIER_NAME_modifier_feo_the_iron_harvest_advance: "The Iron Harvest"
  STATIC_MODIFIER_DESC_modifier_feo_the_iron_harvest_advance: "The Gothic-Greek hybrid culture of Theodoro has fully shed its defensive shell, transforming into a 'War Machine'. No longer content with mere cliffside survival, we have industrialized our mountain strongholds into massive foundries and barracks, producing a professional officer corps and a conscript army trained in the brutal school of steppe warfare. Every citizen of the Principality is now a soldier first, viewing the surrounding plains not as a threat, but as a harvest field for Gothic glory and Roman reclamation. This 'Total War' footing allows us to strike with a ferocity that terrifies our larger neighbors, as we field a military machine that is disproportionately powerful relative to our small territorial size."
  STATIC_MODIFIER_NAME_modifier_gre_megali_idea_realized_advance: "Megali Idea Realized"
  STATIC_MODIFIER_DESC_modifier_gre_megali_idea_realized_advance: "The dream of a restored Hellenic world, stretching from the Ionian to the Anatolian coast, has become the guiding star of our national policy. We have developed a legal and historical framework that justifies our expansion into all lands once held by our ancestors, framing our conquests as 'liberations'. This ideological fervor drives our administration to integrate new territories with unprecedented speed, as the populace welcomes their return to the Hellenic fold."
  STATIC_MODIFIER_NAME_modifier_moe_the_constitution_of_morea_advance: "The Constitution of Morea"
  STATIC_MODIFIER_DESC_modifier_moe_the_constitution_of_morea_advance: "As the wave of Enlightenment sweeps across the Mediterranean, the despots of the Morea have taken the radical step of formalizing the relationship between the throne and the people through a written charter. This document, heavily influenced by the social theories of the Mystras Academy, dismantles the last vestiges of Byzantine courtly favoritism in favor of a meritocratic civil service and protects property rights for the burgeoning merchant class. By granting the citizenry a stake in the governance of the state, the Despotate fosters an intense national loyalty that makes the population far more resistant to foreign subversion. This political modernization will transform the Morea from a traditional autocracy into a sophisticated 'National Monarchy', capable of mobilizing the full psychological and financial resources of its people for the glory of the state."
  STATIC_MODIFIER_NAME_modifier_ths_thessalian_grain_exchange_advance: "The Thessalian Grain Exchange"
  STATIC_MODIFIER_DESC_modifier_ths_thessalian_grain_exchange_advance: "The transformation of the Thessalian plains into a modernized agricultural breadbasket will be completed through the establishment of the Thessalian Grain Exchange. Moving away from medieval sharecropping, the state will encourage the use of the most modern techniques, while the Exchange will standardize prices and quality for the international market. This economic centralization will allow Thessaly to leverage its food surplus as a diplomatic tool, supplying the hungry armies of Europe during conflicts in exchange for political concessions and modern technology. The wealth generated by these exports will fund infrastructure that will link the mountain mines directly to the coastal ports, creating a truly integrated national economy."
  STATIC_MODIFIER_NAME_modifier_romanian_the_foundation_of_the_voivodeship_tradition: "The Foundation of the Voivodeship Tradition"
  STATIC_MODIFIER_DESC_modifier_romanian_the_foundation_of_the_voivodeship_tradition: "The transition from tribal knezes to the centralized office of the Voivode signals the maturation of Romanian political culture into a sophisticated medieval system. This #italic Dux#! or military leader model is adapted from both Slavic and Byzantine influences but is uniquely Romanian in its execution, blending elective monarchy with dynastic continuity. It will provide the community with a clear military hierarchy capable of negotiating with the neighboring crowns as sovereign equals."
  STATIC_MODIFIER_NAME_modifier_mol_the_banner_of_the_golden_bull: "The Banner of the Golden Bull"
  STATIC_MODIFIER_DESC_modifier_mol_the_banner_of_the_golden_bull: "Under the banner of the Golden Bull, representing our nation, Moldavia will become the 'Bulwark of the East', successfully defending against enemy incursions. We will start a tradition of building a monastery for every military victory that will create a landscape of religious sites. This fusion of religious zeal and military discipline ensures our soldiers fight with the conviction of crusaders."
  STATIC_MODIFIER_NAME_modifier_rmn_the_foundation_of_the_metropolises: "The Foundation of the Metropolises"
  STATIC_MODIFIER_DESC_modifier_rmn_the_foundation_of_the_metropolises: "By securing the establishment of the Metropolises in our lands, we achieve spiritual and political independence from foreign ecclesiastical influence. This religious autonomy allows the Romanian crown to use the Church as an administrative arm, ensuring the loyalty of the boyars through divine sanction. The Church becomes the primary sponsor of Romanian literacy and law."
  STATIC_MODIFIER_NAME_modifier_tra_unio_trium_nationum: "Unio Trium Nationum"
  STATIC_MODIFIER_DESC_modifier_tra_unio_trium_nationum: "In response to threats of peasant revolts, our higher classes have formed the 'Union of the Three Nations'. This complex and rigid legal framework largely excludes the commoner majority, but creates a highly stable, fortified, and loyal administrative core for the region. This internal unity provides the crown with a reliable base of professional urban and feudal soldiers."
  STATIC_MODIFIER_NAME_modifier_boyar_regime: "The Establishment of the Chancellery"
  STATIC_MODIFIER_DESC_modifier_boyar_regime: "The formalization of the Princely Chancellery allows for the systematic recording of land grants and diplomatic treaties in Church Slavonic and, eventually, Romanian. This bureaucratic evolution will enable the Voivodes to more efficiently tax the rural peasantry and maintain a permanent corps of diplomatic envoys at the courts of Europe. It will mark the transition from a tribal military society to a sophisticated medieval state."
  STATIC_MODIFIER_NAME_modifier_romanian_the_letter_of_neacsu: "The Letter of Neacșu"
  STATIC_MODIFIER_DESC_modifier_romanian_the_letter_of_neacsu: "The Letter of Neacșu of Câmpulung represents the earliest surviving document in the Romanian language. This shift from Slavonic to the vernacular in private and administrative correspondence signals a growing national self-awareness among the elites and merchants. It provides the foundation for a unified Romanian literary culture that will eventually bridge our lands."
  STATIC_MODIFIER_NAME_modifier_mol_the_great_military_reforms: "The Great Military Reforms"
  STATIC_MODIFIER_DESC_modifier_mol_the_great_military_reforms: "To counter the numbers of our enemies, we have reorganized our army into the #italic Oastea Mare#! (The Great Army). By granting land to the #italic Răzeși#! — free-holding peasants who owe service directly to the Voivode — we have created a loyal, self-equipped infantry core that fights with the ferocity of landowners defending their own soil. This system ensures that even when the boyars waver, the Prince has a reliable and massive pool of battle-hardened soldiers."
  STATIC_MODIFIER_NAME_modifier_rmn_the_byzantine_heirs: "The Byzantine Heirs"
  STATIC_MODIFIER_DESC_modifier_rmn_the_byzantine_heirs: "Inspired by the glory of Constantinople, the Romanian princes have bound themselves to be the primary patrons of Mount Athos and the Orthodox East. By positioning ourselves as heirs to the Byzantine cultural legacy, we attract scholars and artists from across the Balkans. Romania is now 'more Byzantium than Byzantium', the faith capital of the Orthodox world."
  STATIC_MODIFIER_NAME_modifier_tra_the_transylvanian_trade_guilds: "The Transylvanian Trade Guilds"
  STATIC_MODIFIER_DESC_modifier_tra_the_transylvanian_trade_guilds: "In the bustling cities of the Carpathian arc, merchants from our main cultural groups have begun to organize themselves into trade guilds and fraternities, often in competition or cooperation with the others. This is urbanizing a segment of the population, creating a middle class who funds schools and prints books. This economic rise will allow our nation to move beyond the village and into the marketplace of ideas and global commerce."
  STATIC_MODIFIER_NAME_modifier_wal_the_order_of_the_dragon_influence: "The Order of the Dragon Influence"
  STATIC_MODIFIER_DESC_modifier_wal_the_order_of_the_dragon_influence: "We will introduce a culture of brutal psychological warfare and absolute law and order in Wallachia. By purging the corrupt boyars and imposing strict legal codes, we will consolidate princely power and transform the military into a centralized force loyal only to the Voivode. This ruthless reputation will serve as a primary deterrent for the forces of our enemies."
  STATIC_MODIFIER_NAME_modifier_romanian_the_postelnic_bureaucracy: "The Postelnic Bureaucracy"
  STATIC_MODIFIER_DESC_modifier_romanian_the_postelnic_bureaucracy: "We have modernized our central administration by expanding the role of the Postelnic (Great Chamberlain) to oversee a professionalized corps of diplomatic and financial scribes. By adopting Western-style chancery practices and keeping rigorous records of state revenues and foreign treaties, we have moved beyond simple feudal governance. This bureaucratic efficiency allows the Voivode to squeeze every ducat out of the Danubian trade while maintaining a complex network of spies in our enemies' capitals."
  STATIC_MODIFIER_NAME_modifier_mol_the_chronicles_of_grigore_ureche: "The Chronicles of Grigore Ureche"
  STATIC_MODIFIER_DESC_modifier_mol_the_chronicles_of_grigore_ureche: "A transformative era of intellectual self-awareness has dawned! Our high boyars have begun to systematically document the history of our people in our native Romanian for the first time. By scientifically documenting the Latin origins and linguistic heritage we share with our Romanian brothers, we shift the state's foundation from a purely religious identity to a modern linguistic and historical one. This cultural awakening strengthens the internal legitimacy of the Prince and provides our diplomats with the historical arguments needed to assert our sovereignty among the European courts. History has become a weapon of the state."
  STATIC_MODIFIER_NAME_modifier_rmn_cartea_romaneasca_de_invetatura: "Carte Românească de Învățătură"
  STATIC_MODIFIER_DESC_modifier_rmn_cartea_romaneasca_de_invetatura: "We have issued the first printed collection of laws in our nation, the #italic Carte Românească de Învățătură#!. This monumental work seeks to unify the legal practices of our realm and align them with broader European jurisprudence. By professionalizing the courts and standardizing punishments, we have reduced the arbitrary power of the local boyars and strengthened the central authority of the throne, making our state a model of Eastern Orthodox legalism and order."
  STATIC_MODIFIER_NAME_modifier_tra_the_edict_of_torda: "The Edict of Torda"
  STATIC_MODIFIER_DESC_modifier_tra_the_edict_of_torda: "In a Europe increasingly torn apart by bloody and fanatical religious wars, Transylvania has bravely issued the Edict of Torda, the first law of universal religious tolerance in the Western world. By allowing Catholics, Lutherans, Calvinists, and Unitarians to coexist within a single legal framework, we have prevented the internal social collapse and civil strife seen throughout the Holy Roman Empire. This unprecedented religious peace makes our principality a safe haven for displaced scholars, scientists, and merchants, rapidly accelerating our adoption of modern administrative reforms and diverse cultural influences. Tolerance has become our greatest strategic asset."
  STATIC_MODIFIER_NAME_modifier_cunning_diplomacy: "Cunning Diplomacy"
  STATIC_MODIFIER_DESC_modifier_cunning_diplomacy: "Under the visionary leadership of our rulers, we will achieve the geopolitical impossible: the unification of all Romanian lands under a single banner. This 'Great Idea' will ignite a latent national consciousness that will transcend ancient feudal borders, proving to the world that a unified #italic Dacia#! can stand as a European Great Power in its own right. This vision will set the legal, military, and symbolic precedents that will provide us with a permanent, historical claim to regional hegemony and the eventual gathering of all Romanians."
  STATIC_MODIFIER_NAME_modifier_romanian_the_romanian_renaissance: "The Romanian Renaissance"
  STATIC_MODIFIER_DESC_modifier_romanian_the_romanian_renaissance: "Due to the influence of our wealthiest families, our lands are undergoing a cultural blossoming known as the Brâncovenesc style, which we must support. This period of high culture will lead to the construction of grand palaces and the patronage of humanist scholars who will emphasize the Roman origins of the Romanian people. This intellectual movement will solidify our identity as the 'Latin island' in a sea of Slavic and Magyar influences, boosting our diplomatic standing in Western Europe."
  STATIC_MODIFIER_NAME_modifier_mol_the_moldovan_enlightment: "The Moldovan Enlightenment"
  STATIC_MODIFIER_DESC_modifier_mol_the_moldovan_enlightment: "Dimitrie Cantemir has ascended to become a polymath of European renown, bringing the radical principles of the early Enlightenment directly into our court. By mapping the intricate history, music, and geography of our region for a Western audience, we have gained a profound strategic advantage in the shifting sands of Eastern European politics. We have transitioned from a medieval frontier march into a scientifically managed state that looks increasingly toward the modernized reforms of the West for its political and military inspiration. Knowledge is the new currency of the Moldavian throne."
  STATIC_MODIFIER_NAME_modifier_rmn_the_bible_of_bucharest: "The Bible of Bucharest"
  STATIC_MODIFIER_DESC_modifier_rmn_the_bible_of_bucharest: "The publication of the first complete Bible in the Romanian language has fundamentally shifted our cultural identity from the liturgical Church Slavonic to the living vernacular. This monumental work acts as a linguistic unifier, standardizing the dialects of Wallachia, Moldavia, and Transylvania into a single literary tongue. By making the sacred texts accessible to the common man, we have laid the foundation for a unified national consciousness that transcends the political borders of the three separate principalities."
  STATIC_MODIFIER_NAME_modifier_tra_the_vauban_transylvanian_bastion_synthesis: "The Bastion Synthesis"
  STATIC_MODIFIER_DESC_modifier_tra_the_vauban_transylvanian_bastion_synthesis: "As the age of gunpowder reaches its peak, we have adopted a unique school of military architecture that adapts the latest Italian and French #italic trace italienne#! designs to the rugged, limestone geography of the Carpathian interior. Our major administrative centers have been refortified with low-profile, angled bastions capable of absorbing heavy siege artillery fire. Unlike the massive stone walls of the past, these modern earth-and-brick works are designed for active defense, featuring interlocking fields of fire for the principality's growing artillery corps. This defensive doctrine ensures that any invading army is bled dry in a series of prolonged, costly sieges before they can ever threaten the state's heartland."
  STATIC_MODIFIER_NAME_modifier_wal_the_diplomat_schools: "The Diplomat Schools"
  STATIC_MODIFIER_DESC_modifier_wal_the_diplomat_schools: "Under the patronage of high officials, we have established the Princely Academy of Saint Sabbas, bringing Italian and Greek professors to our capital. This investment in high education has created a generation of 'Philosopher-Diplomats' who are as comfortable discussing Latin rhetoric as they are negotiating secret treaties with our neighbors. By turning our capital into an intellectual beacon, we have ensured that our administrative elite remains the most sophisticated in the Balkans, capable of outmaneuvering anyone at every turn."
  STATIC_MODIFIER_NAME_modifier_romanian_the_scoala_ardeleana: "The Școala Ardeleană"
  STATIC_MODIFIER_DESC_modifier_romanian_the_scoala_ardeleana: "This intellectual movement born in Transylvania has successfully combined Enlightenment rationalism with a fierce national pride, proving the Latin origins of our people through rigorous cultural and linguistic studies. By creating the first modern Romanian grammar and history books, we have provided the ideological fuel for a true nationalistic spirit. The school has convinced the Romanian people across all provinces that they are a single, Western-descended nation destined for sovereignty, effectively ending the era of medieval provincialism."
  STATIC_MODIFIER_NAME_modifier_mol_the_cotnari_and_odobesti_wines: "The Cotnari & Odobești Wines"
  STATIC_MODIFIER_DESC_modifier_mol_the_cotnari_and_odobesti_wines: "Vineyards have remained Moldavia's greatest treasure, with the sweet white wines of Cotnari rivaling Tokay in the courts of Europe. We have already codified the first wine classifications, establishing a state interest in the export of 'Perle de la Moldavie'; now it is time to pass to action. This luxury trade will provide the Princely court with significant hard currency from neighboring markets, funding the lavish palaces in our capital."
  STATIC_MODIFIER_NAME_modifier_rmn_the_pandur_militias: "The Pandur Militias"
  STATIC_MODIFIER_DESC_modifier_rmn_the_pandur_militias: "Our nation has seen the rise of the #italic Panduri#!, a highly motivated irregular infantry force drawn from among our free peasantry and petty gentry. These soldiers specialize in guerrilla warfare and rapid movement through the Danubian marshes, proving that a native, ideologically driven force could challenge both enemy and Boyar retinues. The Pandur tradition will become the blueprint for the first professional and modern native Romanian national army."
  STATIC_MODIFIER_NAME_modifier_tra_the_national_mining_academy: "The National Mining Academy"
  STATIC_MODIFIER_DESC_modifier_tra_the_national_mining_academy: "We have established world-class scientific institutions to oversee the intensive extraction of gold, silver, and salt from the multiple mountain ranges of our nation. By applying the latest mineralogical and chemical techniques, we have turned Transylvania into the primary treasury of the region. This industrial focus has created a new class of professional engineers and technocrats who manage the state's resources with scientific precision, ensuring long-term economic stability."
  STATIC_MODIFIER_NAME_modifier_wal_the_abolition_of_serfdom: "The Abolition of Serfdom"
  STATIC_MODIFIER_DESC_modifier_wal_the_abolition_of_serfdom: "Under the reformists in our nation, we have taken the radical step of legally abolishing serfdom, before many of our neighbors. By transforming the peasantry from 'chattel' into 'taxable subjects', we have centralized the state's fiscal power and broken the absolute control of the rural boyars. This social revolution provides the Voivode with a more direct relationship with the people, creating a more mobile and economically active population capable of supporting a modernizing central administration."
  STATIC_MODIFIER_NAME_modifier_guj_hub_of_the_indian_ocean_trade: "Hub of the $indian_ocean_region$ Trade"
  STATIC_MODIFIER_DESC_modifier_guj_hub_of_the_indian_ocean_trade: "Due to the nature of the monsoon tradewinds and its specific location, $GUJ$ has long served as the hub of the East-West trade in the $indian_ocean_region$, connecting the $red_sea_area$, $egypt_region$, and Malacca. Due to this, $GUJ$ merchants were important middlemen bringing such precious goods as spices from the Maluku Islands and $silk$ from $CHI$, and then selling them to the merchants coming from the west."
  STATIC_MODIFIER_NAME_modifier_guj_garba: "Garba!"
  STATIC_MODIFIER_DESC_modifier_guj_garba: "Originating out of the worship dances done by women in praise of the $hindu_ADJ$ goddess Ambaji, our people have refined a new and very graceful form of dance called the Garba. The basics of the dance are singing and clapping rhythmically in a circular formation. Today, our men and women use this dance to celebrate any occasion with great fervor, coming together as a community and wearing exquisitely embroidered outfits. All of us together, young and old, peasant and prince, $muslim_ADJ$ and $hindu_ADJ$, dancing in an ever-growing circle."
  STATIC_MODIFIER_NAME_modifier_guj_jain_routes: "$jain_ADJ$ Connections"
  STATIC_MODIFIER_DESC_modifier_guj_jain_routes: "$jain$ is an ancient way of life, shaped into its current form by Mahavira. For a thousand years, $GUJ$ has been the stronghold of the $jain_ADJ$ community and faith, with many holy sites and temples. Royal dynasties have patronized the religion, forming a community with the $hindu_ADJ$ people. $muslim_ADJ$ invasions from the west by Mahmud Ghazni and Mohammad Ghori, oppressed the $jain_ADJ$ community, vandalizing temples or converting them into mosques, as well as burning $jain_ADJ$ libraries. However, the $jain_ADJ$ people of $GUJ$ have survived, adapted, and prospered, using their connections with $jain_ADJ$ communities across the world to serve as a hub for both faith and commerce."
  STATIC_MODIFIER_NAME_modifier_guj_gujarati_lipi: "$GUJ_ADJ$ Lipi"
  STATIC_MODIFIER_DESC_modifier_guj_gujarati_lipi: "The $GUJ_ADJ$ Lipi is a new script and writing system developed by mercantile interests. Also known as the #italic saraphi#! (bankers), #italic vaniasai#! (merchants), or #italic mahajani#! (traders) script due to its association with commerce, its use has rapidly become widespread throughout $GUJ$, $KUT$, and $SND$ for writing regional languages and studying $sanskrit_language$. The $zoroastrian$ community has also adopted it as a writing system for Avestan. This common writing system unites diverse communities, facilitating both practical communication and a common identity."
  STATIC_MODIFIER_NAME_modifier_guj_gujarati_merchant_diaspora: "$GUJ_ADJ$ Merchant Diaspora"
  STATIC_MODIFIER_DESC_modifier_guj_gujarati_merchant_diaspora: "Our people trade on every shore, pursuing commerce and following the trade winds. Our fleets sail constantly in pursuit of new opportunities, and our merchants understand both the craft of shipbuilding and the value of building good, hardy ships on a limited budget."
  STATIC_MODIFIER_NAME_modifier_kainerekowa: "Kaianere'kó:wa"
  STATIC_MODIFIER_DESC_modifier_kainerekowa: "We must always honor the work of Hiawatha and the Great Peacemaker, the Great Law of Peace, which united our five nations under a single purpose, and gave us our rules of governance."
  STATIC_MODIFIER_NAME_modifier_mourning_wars: "Mourning Wars"
  STATIC_MODIFIER_DESC_modifier_mourning_wars: "It is a long-established tradition of our people to adopt captured warriors into our tribe. But to replenish our numbers and ensure our defensive and offensive strength, we should seek to adopt entire tribes into the $IRO$, not just individual fighters."
  STATIC_MODIFIER_NAME_modifier_haudenosaunee_present_giving: "$IRO_ADJ$ Gift-Giving"
  STATIC_MODIFIER_DESC_modifier_haudenosaunee_present_giving: "The basis of our trade interactions is represented in the form of gift exchanges. As our people come together and work for the benefit of the whole, the act of gifting is guaranteed to be followed by another gift in return."
  STATIC_MODIFIER_NAME_modifier_warriors_unity: "Warriors Unity"
  STATIC_MODIFIER_DESC_modifier_warriors_unity: "We may not be the largest tribe in terms of sheer number, but our tribal nature gives us something that others lack: unity! Our warriors fight as brothers and stand together on the field of battle. So long as we maintain this tradition, we cannot lose!"
  STATIC_MODIFIER_NAME_modifier_captives_in_war: "Captives in War"
  STATIC_MODIFIER_DESC_modifier_captives_in_war: "We fight wars mainly to take captives, which replace our own losses. However, not all those captives need to be adopted into our tribe, and some can be used for labor instead."
  STATIC_MODIFIER_NAME_modifier_haudenosaunee_ambition: "Model Confederacy"
  STATIC_MODIFIER_DESC_modifier_haudenosaunee_ambition: "The $IRO$ Confederacy has become a model for success. All nations around us are awestruck by our excellent rulership!"
  STATIC_MODIFIER_NAME_modifier_swiss_mercenaries: "$SWI_ADJ$ Mercenaries"
  STATIC_MODIFIER_DESC_modifier_swiss_mercenaries: "Our troops are widely recognized as exceptional combatants. Fortunately for us, we are not permanently in need of their services, which allows us to rent them out to foreign powers, earning extra revenue and providing them with valuable combat experience."
  STATIC_MODIFIER_NAME_modifier_the_swiss_confederation: "Principles of the Confederation"
  STATIC_MODIFIER_DESC_modifier_the_swiss_confederation: "Every member of our confederation contributes valuable resources to our cause. Our decentralized approach to governing this alliance of states serves a greater purpose, so we cannot break into civil war when disagreements arise between towns, cities, or our cantons."
  STATIC_MODIFIER_NAME_modifier_swiss_recovery_and_prosperity: "A Tormented Realm"
  STATIC_MODIFIER_DESC_modifier_swiss_recovery_and_prosperity: "Past conflicts have shown that repelling invaders is not our only concern. The valleys of our cantons are devastated with each battle; careful steps must be taken to bring prosperity back to our land."
  STATIC_MODIFIER_NAME_modifier_alpine_defensiveness: "Alpine Defense"
  STATIC_MODIFIER_DESC_modifier_alpine_defensiveness: "The $SWI_ADJ$ landscape is dominated by rough terrain, mountains, and valleys. We must find a way to overcome the challenges our environment presents, and to find a way to use it as a weapon against any potential invaders."
  STATIC_MODIFIER_NAME_modifier_swiss_religious_refuge: "Haven for Refugees"
  STATIC_MODIFIER_DESC_modifier_swiss_religious_refuge: "While others exile religious minorities and disruptive figures, we will gladly offer them a home. In $SWI$, they will be able to establish a new life for themselves, and as a result will be inclined to praise our rule."
  STATIC_MODIFIER_NAME_modifier_swiss_tolerance: "$SWI_ADJ$ Tolerance"
  STATIC_MODIFIER_DESC_modifier_swiss_tolerance: "Why must we kill each other over obscure issues of transubstantiation and predestination, when we could spend that energy turning our mountain home into a realm united once more?\n\nFor that reason, every Canton of $SWI$ will have the ultimate jurisdiction over religious matters in their region. While this will not eliminate all religious strife in our country, it will at least ensure that no matter what someone believes, our people will be able to find a place where they are not persecuted."
  STATIC_MODIFIER_NAME_modifier_swiss_clockwork: "Masters of Clockwork"
  STATIC_MODIFIER_DESC_modifier_swiss_clockwork: "Some fools think that clockwork is for timekeeping alone, but when one witnesses the power of rotating gears, it is obvious that clockwork can do just about anything one wants it to do. Maybe the Creator of the Universe Himself wound up existence like a clock and let the gears spin on their own, ticking away the centuries. Be that as it may, $SWI_ADJ$ clockmakers are the greatest masters of the art — barring God Himself, of course."
  STATIC_MODIFIER_NAME_modifier_swiss_ambition: "$SWI_ADJ$ Enlightenment"
  STATIC_MODIFIER_DESC_modifier_swiss_ambition: "We do not need to construct a unique identity for our country, since our people readily rally around the banners of their cantons and the ideals of our confederacy. But by funding our most enlightened scholars of our time, we will be able to shape a new age for the $SWI_ADJ$ people, and solidify the unique traits of our #italic Eidgenossenschaft#!. This Helvetism forms the foundation of our Enlightenment."
  STATIC_MODIFIER_NAME_modifier_swiss_banking: "$SWI_ADJ$ Banking"
  STATIC_MODIFIER_DESC_modifier_swiss_banking: "We are a sanctuary, not only for persecuted people from other countries, but also for their wealth. In large vaults, hidden away behind strong walls and protected by our most trustworthy soldiers, we will be the best place for every citizen of the poor, war-torn countries of the world to stash their valuables."
  STATIC_MODIFIER_NAME_modifier_paik_regiments_advance: "$a_paik_infantry$"
  STATIC_MODIFIER_DESC_modifier_paik_regiments_advance: "$a_paik_desc$"
  STATIC_MODIFIER_NAME_modifier_advanced_paik_system_advance: "Advanced Paiks"
  STATIC_MODIFIER_DESC_modifier_advanced_paik_system_advance: "$a_late_paik_infantry_desc$"
  STATIC_MODIFIER_NAME_modifier_ire_grand_jury_system: "Grand Jury System"
  STATIC_MODIFIER_DESC_modifier_ire_grand_jury_system: "County grand juries levy the cess for roads, bridges, and courthouses. With judges riding the assizes, oversight tightens in every county."
  STATIC_MODIFIER_NAME_modifier_ire_irish_establishment: "$IRE_ADJ$ Establishment"
  STATIC_MODIFIER_DESC_modifier_ire_irish_establishment: "A permanent army in $IRE$ — and controlled #italic from#! Ireland — keeps garrisons ready and costs down. For our regular soldiery, this means regular pay. For our logisticians and quartermasters, it means a growing network of barracks that keeps the costs in hand."
  STATIC_MODIFIER_NAME_modifier_ire_irish_volunteers: "$IRE_ADJ$ Volunteers"
  STATIC_MODIFIER_DESC_modifier_ire_irish_volunteers: "Citizen corps are raised for home defense and coastal watch. Drilling at their own expense, they rouse public spirit and stiffen the line."
  STATIC_MODIFIER_NAME_modifier_cel_western_shore: "The Western Shore"
  STATIC_MODIFIER_DESC_modifier_cel_western_shore: "For millennia we have fished, traded, and fought along the wild Atlantic coasts. From these harsh waters, we have learned seamanship unmatched by any rival."
  STATIC_MODIFIER_NAME_modifier_cel_the_wests_awake: "The West's Awake"
  STATIC_MODIFIER_DESC_modifier_cel_the_wests_awake: "After long centuries of silence, the ancient spirit of the Celtic peoples stirs once more, ready to reclaim its place amongst the great civilizations of the world."
  STATIC_MODIFIER_NAME_modifier_cel_celtic_nations: "Celtic Nations"
  STATIC_MODIFIER_DESC_modifier_cel_celtic_nations: "Our union is founded on the ideal of uniting the diverse peoples of the Celtic world under a shared banner. Through cooperation, we aim to preserve our heritage, promote our values, and ensure that the Celtic nations thrive together in the face of external pressures and changing times."
  STATIC_MODIFIER_NAME_modifier_cel_celtic_diaspora: "Celtic Diaspora"
  STATIC_MODIFIER_DESC_modifier_cel_celtic_diaspora: "From crofter to chieftain, many have left our shores through hardship or hope, weaving a far-flung web of kinship that carries our language, customs, and pride to distant lands."
  STATIC_MODIFIER_NAME_modifier_cel_pan_celtic_nationalism: "Pan-Celticism"
  STATIC_MODIFIER_DESC_modifier_cel_pan_celtic_nationalism: "Our vision of a united Celtic world is more than an ideal - it is a rallying call to all who share our heritage. Together, we forge bonds that reach beyond borders, making our identity as enduring as the hills and seas we call home."
  STATIC_MODIFIER_NAME_modifier_jap_shinobi: "Shinobi no Mono"
  STATIC_MODIFIER_DESC_modifier_jap_shinobi: "Information is key to gaining the advantage in any situation. To that effect, we have long since used spies and infiltrators to gather reconnaissance. These $jap_shinobi$ are usually from the samurai class, although they can also be recruited from the local peasant population, and are sent into enemy territory, where they blend in and establish networks of informants."
  STATIC_MODIFIER_NAME_modifier_jap_head_hunting: "Head-Hunting"
  STATIC_MODIFIER_DESC_modifier_jap_head_hunting: "The achievements of a warrior in battle are only truly noteworthy if they can be proven. To that end, samurai will collect the decapitated heads of enemies they have slain to present them later to their general. The more numerous and more important the heads that a samurai takes, the better the rewards he will receive."
  STATIC_MODIFIER_NAME_modifier_jap_ichiban_yari: "Ichiban Yari"
  STATIC_MODIFIER_DESC_modifier_jap_ichiban_yari: "Drawing first blood in battle is an honor and a good omen, and thus our warriors are eager to land the first strike whenever they have the opportunity to do so."
  STATIC_MODIFIER_NAME_modifier_jap_ashigaru: "Ashigaru"
  STATIC_MODIFIER_DESC_modifier_jap_ashigaru: "Warfare has always been the domain of the mighty samurai. Recent developments, however, have proved the need for more substantial reinforcements, and thus our battlefields now also include peasant troops. These #italic ashigaru#! will not be just common rabble, however, as their rigorous training and ample battle experience makes them formidable fighters, on equal footing with the samurai."
  STATIC_MODIFIER_NAME_modifier_jap_daiku_construction: "Daiku Construction"
  STATIC_MODIFIER_DESC_modifier_jap_daiku_construction: "Traditional carpentry techniques, or #italic daiku#! have been used in $japan_region$ since the earliest days of our history. Our wooden buildings are resilient yet flexible, and admired by many for their beauty and skillful construction. From the lowliest hut to the most elaborate palace, wood is our most universal building resource."
  STATIC_MODIFIER_NAME_modifier_jap_wandering_ronin: "Wandering Rōnin"
  STATIC_MODIFIER_DESC_modifier_jap_wandering_ronin: "It is fairly common for samurai to wander the country in search of the best employment opportunities, switching their allegiance to whoever pays them the most. These warriors come and go like the errant waves, but we can always make use of them."
  STATIC_MODIFIER_NAME_modifier_jap_reformed_land_holding: "Reformed Land Holding"
  STATIC_MODIFIER_DESC_modifier_jap_reformed_land_holding: "Traditionally, we assessed land value based on size, but this failed to take into account that not all land is the same. From now on, it will be valued according to how much $rice$ can be grown there. This will streamline related economic actions and make it easier to get the best outcomes from our agricultural ventures."
  STATIC_MODIFIER_NAME_modifier_jap_jokamachi: "Jōkamachi"
  STATIC_MODIFIER_DESC_modifier_jap_jokamachi: "Turbulent times are gravely dangerous for our people, so for safety, they tend to settle around the security of fortified places. These huddles eventually turn into cities, which of course provide commercial and cultural assets in addition to physical protection for those who huddle behind the walls."
  STATIC_MODIFIER_NAME_modifier_jap_terakoya: "Terakoya"
  STATIC_MODIFIER_DESC_modifier_jap_terakoya: "These private schools provide basic education to commoners, promoting literacy, numeracy, and moral values. #italic Terakoya#! play a vital role in fostering a more educated and socially aware populace, contributing to national stability and progress."
  STATIC_MODIFIER_NAME_modifier_jap_codified_bushido: "Codified Bushidō"
  STATIC_MODIFIER_DESC_modifier_jap_codified_bushido: "The expected behavior of a warrior is becoming increasingly idealized, with values such as honor and loyalty being given more importance than their actual utility in real battle. This romanticized and codified version of #italic Bushidō#!, however, will improve how our armies are perceived, even if it is not how they actually behave."
  STATIC_MODIFIER_NAME_modifier_rich_lands: "Rich Lands"
  STATIC_MODIFIER_DESC_modifier_rich_lands: "Our lands are rich with fertile soil and abundant resources from the prairies to the dense forests, ready to be transformed by our hardy men and women. We will use every tool at our disposal to wisely manage the land we have been gifted, and thereby bring prosperity to every household."
  STATIC_MODIFIER_NAME_modifier_jurchen_honor: "Jurchen Honor"
  STATIC_MODIFIER_DESC_modifier_jurchen_honor: "Our people are enthusiastic about feats of strength and other demonstrations of skill, as each Jurchen feels that by showing off their abilities they earn the respect of their peers. This well-earned self-respect makes our warriors immensely brave, ready to fight anyone."
  STATIC_MODIFIER_NAME_modifier_unite_the_tribes: "Unite the Tribes"
  STATIC_MODIFIER_DESC_modifier_unite_the_tribes: "Since the birth of our nation, the Jurchen people have been unified and divided into multiple tribes and alliances, and not always friendly ones. This dynamic has been constant for as long as we can remember — as has the urge to unify all our tribes under a single banner. The time has come to satisfy this long-cherished desire!"
  STATIC_MODIFIER_NAME_modifier_leader_under_sky: "A Leader under the Sky"
  STATIC_MODIFIER_DESC_modifier_leader_under_sky: "Our people have been divided for too long, and we need someone strong enough to unite them and make the world tremble at our feet. The Sky will direct the acts and thoughts of this leader, and guide us to a bright future."
  STATIC_MODIFIER_NAME_modifier_foraging_our_way: "Foraging our Way"
  STATIC_MODIFIER_DESC_modifier_foraging_our_way: "We are hunters and live in communion with nature, even those of us dwelling in cities. It is in our blood to find the correct path in a dark forest; to know which of Nature's gifts to take with us. This wisdom lets us survive everywhere without difficulty."
  STATIC_MODIFIER_NAME_modifier_deliberative_council: "Deliberative Council of Princes and Ministers"
  STATIC_MODIFIER_DESC_modifier_deliberative_council: "Originally called the 'Council of Deliberation', this body evolved from informal institutions that promoted collaborative governance among the leaders of the realm. The Council's structure has been transformed, focusing on collective aristocratic governance and policy deliberations, mainly in foreign and military affairs. Membership is restricted to military leaders from outside the imperial clan, ensuring elite participation while maintaining the ultimate authority of the ruler."
  STATIC_MODIFIER_NAME_modifier_manchu_script: "Manchu Script"
  STATIC_MODIFIER_DESC_modifier_manchu_script: "The Manchu alphabet has emerged, combining Classical $mongolian_language$ characters with Jurchen phonetics. This unique writing system facilitates left-to-right vertical column writing. With diverse letter forms and contextual adaptability for initial, medial, final, and isolated positions, it preserves the most subtle nuances of our language."
  STATIC_MODIFIER_NAME_modifier_a_new_dawn: "A New Dawn"
  STATIC_MODIFIER_DESC_modifier_a_new_dawn: "Our nation has been reborn. The old ways of living are gone, like dreams melting into the morning light. It is time for us to face the world as a fully modernized nation."
  STATIC_MODIFIER_NAME_modifier_manchu_reborn: "Manchu Reborn"
  STATIC_MODIFIER_DESC_modifier_manchu_reborn: "As our nation has undergone fundamental transformations, so will our army. The world has opened itself to us, and new challenges will appear on the horizon. If we want to survive in this new paradigm, we have to be ready to act."
  STATIC_MODIFIER_NAME_modifier_bah_arabian_horses: "Arabian Horses"
  STATIC_MODIFIER_DESC_modifier_bah_arabian_horses: "The climate of $india$ is suboptimal at best for breeding and raising horses. The horses of $arabia_region$, however, are superb mounts that outclass our local breeds. We will use our trade connections to ensure that we have a steady supply of these horses for our troops."
  STATIC_MODIFIER_NAME_modifier_bah_amir_rebellion: "Amir Rebellion"
  STATIC_MODIFIER_DESC_modifier_bah_amir_rebellion: "Our state was born from the rebellion of Amir Hasan Gangu against the pathetic rule of $DLH$. The victory against the $DLH_ADJ$ Sultanate still lives on in the minds of our own nobility and military to this day."
  STATIC_MODIFIER_NAME_modifier_bah_nobility_hindu_expansion: "Hindu Elite Integration"
  STATIC_MODIFIER_DESC_modifier_bah_nobility_hindu_expansion: "Although at times a challenge to the sovereignty of the ruler, the noble class is nonetheless useful to our government, as they are crucial in administrating our vast properties. With winning our independence from $DLH$, we gained rulership over almost exclusively $hindu_ADJ$ subjects, while our $muslim_ADJ$ nobles are a small minority, unable to manage the masses. We must expand and stabilize our aristocracy by promoting promising $hindu_ADJ$ candidates into their ranks."
  STATIC_MODIFIER_NAME_modifier_bah_gharbians: "Gharbians"
  STATIC_MODIFIER_DESC_modifier_bah_gharbians: "Cutting ties with $DLH$ to found our own kingdom has loosened our connection with the $muslim_ADJ$-dominated northern parts of $india$. As our state lacks any form of entrenched $muslim_ADJ$ aristocracy, we are in a precarious situation, and we could end up entirely at the mercy of local $hindu_ADJ$ nobles.\nFortunately, our reputation precedes us. Tales of the riches of the $deccan_region$ are told and retold all over the $muslim_ADJ$ world, and many ambitious fortune-seekers make the sea voyage to our ports. By using the vast riches of $india$ to attract talented westerners, or #italic Gharbians#!, to our court, we can ensure that our country shall never lack able minds to lead our armies, collect our taxes, and rule our subjects."
  STATIC_MODIFIER_NAME_modifier_bah_legacy_of_gisu_daraz: "Legacy of Gisu Daraz"
  STATIC_MODIFIER_DESC_modifier_bah_legacy_of_gisu_daraz: "$india$ in general, and our state in particular, has a history as a center of Sufi teachings. The efforts of our rulers to attract and patronize Sufi sheiks from all over the world are a testament to the piety and the great spiritual strength of our monarchs and our court.\nThe state adopting the Sufi concepts of spiritual sovereignty and the inclusive nature of the Sufi teachings themselves will help create an environment where the diverse religious faiths of $bah_gharbians$ and the natives of $deccan_region$ alike can mix and thrive without clashes or unproductive quarrels."
  STATIC_MODIFIER_NAME_modifier_bah_meltpot_of_languages: "Linguistic Melting Pot"
  STATIC_MODIFIER_DESC_modifier_bah_meltpot_of_languages: "$deccan_region$ is a region of many languages and cultures; the great influx of people of $iranian_group$, $turkic_group$, $afghan_culture$, and $arabian_group$ descent into these lands has accentuated the cosmopolitan nature of our state. While historically the $persian_language$ language fulfilled the needs of our predecessors, a new mix of local languages — as well as $persian_language$ and $arabic_language$ — has grown increasingly common. This mixture of languages has even become a source of cultural inspiration for emerging artists."
  STATIC_MODIFIER_NAME_modifier_bah_karimis: "Kārimī"
  STATIC_MODIFIER_DESC_modifier_bah_karimis: "For centuries, the Indo-Egyptian trade has been dominated by $egypt_region$-based groups of traders and captains known as the $bah_karimis$. Instrumental in the day-to-day business of $indian_ocean_region$ trade, this merchant organization is now both wealthy and powerful. From the $tamil$ coasts and the ports of the $swahili_culture$ trading cities to the $lower_egyptian_culture$ port cities past the $gulf_aden_province$, sultans, nobles, and commoners alike come to buy exotic goods or borrow money for their projects from the $bah_karimis$.\nThis organization has lately taken a very active interest in our state, and we only stand to gain from cultivating our relationship with them further."
  STATIC_MODIFIER_NAME_modifier_bah_takht_e_firoza: "Takht-e-Fīrozā"
  STATIC_MODIFIER_DESC_modifier_bah_takht_e_firoza: "The first thing any guest in our royal audience chamber notices is the Turquoise Throne of our dynasty. This unique piece of royal furniture was originally donated to us by the defeated $telugu$ Raja Kapaya, and it is in many ways the ultimate symbol of our dynasty. Exquisite and splendidly unique, it embodies the riches of the $deccan_region$ and the unusual combination of styles that is the hallmark of our cosmopolitan state."
  STATIC_MODIFIER_NAME_modifier_bah_bahmani_primogeniture: "Bahmani Primogeniture"
  STATIC_MODIFIER_DESC_modifier_bah_bahmani_primogeniture: "Our unusual practice of always passing the throne to the eldest son of the current ruler has at times created some instability in our realm, as power-hungry regents and opportunistic nobles initially showed little hesitation in trying to take advantage of a child ruler or in supporting an envious relative's claim to the throne. By now, however, the practice has become firmly institutionalized, and when the time for succession comes there are very few who would oppose the true heir of our dynasty."
  STATIC_MODIFIER_NAME_modifier_bah_madrasa_of_mahmud_gawan: "Great Madrasa of the $deccan_region$"
  STATIC_MODIFIER_DESC_modifier_bah_madrasa_of_mahmud_gawan: "For many years now, our state has drained able men from the greater $muslim_ADJ$ world, while also incorporating the best of the states that came before us. This has created a rich cosmopolitan culture that is not entirely $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$, nor $kannadiga$ in nature. Creating a major madrasa in our capital would serve to further the development of learning this multitude of cultures and also allow the world to see the greatness of our state."
  STATIC_MODIFIER_NAME_modifier_nair_military_advance: "Nair Military"
  STATIC_MODIFIER_DESC_modifier_nair_military_advance: "The Nairs are a diverse group of $hindu_ADJ$ castes from $malabar_area$ and have a long history of involvement with the military. Their experience, as well as their role for the $kalari$, will be of great value in our current conflicts."
  STATIC_MODIFIER_NAME_modifier_mhr_tradition_of_military_service: "Tradition of Military Service"
  STATIC_MODIFIER_DESC_modifier_mhr_tradition_of_military_service: "$marathi_culture$ cavalrymen have a long tradition of service as 'Bargirs' for the Deccan sultanates. The increased militarization of the Deccan due to the many wars fought in the area has made our cavalry one of the most dangerous forces in $india$."
  STATIC_MODIFIER_NAME_modifier_mhr_peasant_soldiers: "Peasant Soldiers"
  STATIC_MODIFIER_DESC_modifier_mhr_peasant_soldiers: "The villages of the Desh are full of able men who would be more than willing to serve in our armies. Let us recruit the $marathi_language$-speaking members of our population into our military."
  STATIC_MODIFIER_NAME_modifier_mhr_office_of_the_peshwa: "Office of the Peshwa"
  STATIC_MODIFIER_DESC_modifier_mhr_office_of_the_peshwa: "The #italic Peshwa#! Shall be our chief minister, entirely devoted to both civil administration and overseeing military operations. This consolidation of power will make us versatile enough to expand quickly and efficiently."
  STATIC_MODIFIER_NAME_modifier_mhr_forts_of_maharashtra: "Forts of Maharashtra"
  STATIC_MODIFIER_DESC_modifier_mhr_forts_of_maharashtra: "In these hilly and densely forested lands, maintaining a series of forts is an offensive necessity as well as a defensive one. Meticulous maintenance of our fortifications should therefore be a top priority."
  STATIC_MODIFIER_NAME_modifier_mhr_encourage_brahmin_ties: "Encourage Brāhmaṇa Ties"
  STATIC_MODIFIER_DESC_modifier_mhr_encourage_brahmin_ties: "Our financial sector is dominated by Brāhmaṇa banking families. Let us integrate them further in our administration by hiring them as tax collectors, and creating regulations to strengthen their rights and protect their traditions. We will have gained the favor of our financiers as well as access to learned and able administrators."
  STATIC_MODIFIER_NAME_modifier_npl_the_divya_upadesh: "The Divya Upadesh"
  STATIC_MODIFIER_DESC_modifier_npl_the_divya_upadesh: "The #italic Divya Upadesh#! lays out nine principles that form the core of political and national life in $nepal_area$, as well as guidelines for successful foreign policy. It encapsulates centuries of $nepali_group$ thought on governance, war, and peace. Following these principles, $nepal_area$ shall be able to avoid the subversion of nearby empires and marauding foreigners."
  STATIC_MODIFIER_NAME_modifier_pun_breadbasket_of_india: "Breadbasket of $india$"
  STATIC_MODIFIER_DESC_modifier_pun_breadbasket_of_india: "The five great rivers — Indus, Jhelum, Chenab, Ravi, and Sutley — penetrate the lands of the $punjab_area$ area, granting the soil the blessing of unmatched fertility. Apart from allowing us to export food and cotton to our neighbors, this also allows our many cities to grow and encourages all sorts of specialized production. We must do our utmost to encourage the growth of agriculture and to defend our farmers from the bandits and brigands in the adjoining areas."
  STATIC_MODIFIER_NAME_modifier_pun_encourage_indo_persian_trade: "Encourage Indo-Persian Trade"
  STATIC_MODIFIER_DESC_modifier_pun_encourage_indo_persian_trade: "Situated on the westernmost border of $india$, the $PUN$ has always been at the crossroads of economic and cultural exchange between $india$ and $persia_region$. The ancient Grand Trunk Road, which connects eastern $india$ to the $farsi_culture$ world, runs right through our lands before heading up into the Afghan mountain passes. These passes are, however, plagued by tribal raiders and bandits. We should encourage the traffic along this ancient and vibrant route and do everything in our power to look after the wellbeing of these traders by constructing caravanserais and policing these roads."
  STATIC_MODIFIER_NAME_modifier_pun_gurmukhi_script: "Gurmukhī Script"
  STATIC_MODIFIER_DESC_modifier_pun_gurmukhi_script: "The Gurmukhī script is an #italic abugida#! developed in the lands of $PUN$, and is highly favored by our $sikhism_ADJ$ gurus. Our clergy is using this script in order to record $sikhism_ADJ$ texts."
  STATIC_MODIFIER_NAME_modifier_pun_foundation_of_the_khalsa: "The Khalsa"
  STATIC_MODIFIER_DESC_modifier_pun_foundation_of_the_khalsa: "$sikhism$, a religion native to the $PUN$, is spreading rapidly in our lands. Members of this faith come from all castes and backgrounds, and will defend their state regardless of their former professions."
  STATIC_MODIFIER_NAME_modifier_pun_punjabi_textile_industry: "$PUN_ADJ$ Textile Industry"
  STATIC_MODIFIER_DESC_modifier_pun_punjabi_textile_industry: "The $PUN$ is a major center for textile production. $cloth$ from our weavers is specially made for markets all over $asia$ and $europe$, and our weavers are among the most productive in $india$."
  STATIC_MODIFIER_NAME_modifier_pun_strength_of_the_misls: "Strength of the Misls"
  STATIC_MODIFIER_DESC_modifier_pun_strength_of_the_misls: "The administrative system of the Misl states of $PUN$ allows them to field impressive cavalry forces. In times of need, we may call upon these forces to fight a common enemy."
  STATIC_MODIFIER_NAME_modifier_pun_reforming_the_punjabi_army: "Reforming the $PUN_ADJ$ Army"
  STATIC_MODIFIER_DESC_modifier_pun_reforming_the_punjabi_army: "The ways of our forefathers were sound, and have served us well over the years. But in order for our armies to continue to triumph on the battlefields, we must create a more professional military. By studying the way other countries organize their armies and adapting their methods when prudent, we may create a more efficient $PUN_ADJ$ army while still retaining the unique qualities of our current military system."
  STATIC_MODIFIER_NAME_modifier_raj_clan_loyalties: "Clan Loyalties"
  STATIC_MODIFIER_DESC_modifier_raj_clan_loyalties: "The influence of our clan extends far beyond our own borders. We are able to draw from other Rajput groups from all over northern $india$ when filling the ranks of our armies."
  STATIC_MODIFIER_NAME_modifier_raj_monumental_architecture: "Monumental Architecture"
  STATIC_MODIFIER_DESC_modifier_raj_monumental_architecture: "What purpose does victory serve if there is nothing to immortalize our achievements? Monuments, such as an awe-inspiring Tower of Victory, shall be erected, so future generations will know of our greatest battles and be appropriately inspired."
  STATIC_MODIFIER_NAME_modifier_raj_marwari_horses: "Marwari Horses"
  STATIC_MODIFIER_DESC_modifier_raj_marwari_horses: "Like their masters, Rajput cavalry horses are meticulously trained to perform on the field of battle. It is said that a Marwari horse will only leave the battlefield under one of three conditions - victory, death, or when carrying a wounded master to safety. By taking good care of these divine beings, we will ensure the everlasting dominance of our horsemen on the battlefields of $india$."
  STATIC_MODIFIER_NAME_modifier_raj_reorganized_rajput_regiments: "Reorganized Rajput Regiments"
  STATIC_MODIFIER_DESC_modifier_raj_reorganized_rajput_regiments: "Traditional clan structures are an excellent foundation for a modernized regimental system. Existing hierarchies based on kinship and unconditional loyalty can be easily translated into an organized and formal chain of command."
  STATIC_MODIFIER_NAME_modifier_raj_martial_smiths: "Martial Smiths"
  STATIC_MODIFIER_DESC_modifier_raj_martial_smiths: "Wars are not only won through tactics and bravery, but also through weaponry. Our blacksmiths shall forge the finest martial weapons for our warriors to wield in defense of the Rajput people."
  STATIC_MODIFIER_NAME_modifier_raj_fortress_architecture: "Fortress Architecture"
  STATIC_MODIFIER_DESC_modifier_raj_fortress_architecture: "The rise of $DLH$, and the invading $muslim_ADJ$ warriors of the past, were wake-up calls. We must always be prepared for foreign invaders, and thus, we must hire the most skilled architects to design impregnable forts throughout our realm. The immensely long walls that will be needed to protect our land make this an ambitious project, but our determination to defend our people shall ensure that it is done."
  STATIC_MODIFIER_NAME_modifier_raj_expanded_artillery_arm: "Expanded Artillery Arm"
  STATIC_MODIFIER_DESC_modifier_raj_expanded_artillery_arm: "Sieges are what win wars. We must experiment with ways of creating bigger and better cannons to bring down the many forts of our enemies, both within $india$ and outside it."
  STATIC_MODIFIER_NAME_modifier_raj_the_purbias: "The Purbias"
  STATIC_MODIFIER_DESC_modifier_raj_the_purbias: "The Rajputs have spread themselves throughout northern $india$ in their pursuit of glory. The #italic Purbias#!, elite Rajput soldiers who venture as mercenaries, are renowned for their combat ability, and as such spread our fearsome reputation."
  STATIC_MODIFIER_NAME_modifier_raj_mandatory_firearm_drilling: "Mandatory Firearm Drills"
  STATIC_MODIFIER_DESC_modifier_raj_mandatory_firearm_drilling: "Many Rajput soldiers are experts in the use of personal firearms. We should put these hardened veterans to work training the next generation of soldiers, rather than risking the loss of their expertise in battle. All of our soldiers must be drilled in firearms tactics before they are expected to meet our enemies on the front line."
  STATIC_MODIFIER_NAME_modifier_raj_painting_school: "Rajput Painting School"
  STATIC_MODIFIER_DESC_modifier_raj_painting_school: "Rajput painters already have an excellent reputation, but it could be even better. We must encourage our artists to develop their skills and add to the glory of our dynasty by creating a school of painting particular to our state."
  STATIC_MODIFIER_NAME_modifier_raj_rajput_resistance: "Rajput Resistance"
  STATIC_MODIFIER_DESC_modifier_raj_rajput_resistance: "Rajput poet-musicians tell stories of our people's many battles against foreign invaders, and how our ancestors would rather die than admit themselves defeated. We must encourage this spirit of unity, and give our musicians reason to write new ballads of bravery in the face of death."
  STATIC_MODIFIER_NAME_modifier_raj_martial_ethos: "Martial Ethos"
  STATIC_MODIFIER_DESC_modifier_raj_martial_ethos: "The upbringing and traditions of Rajput warriors ensure a wide base for recruiting officers to lead our armies. In order to capitalize on this, we should formalize career opportunities and advancement paths to encourage these promising young fighters to serve as officers in our forces."
  STATIC_MODIFIER_NAME_modifier_land_of_the_rus: "Land of the Rus'"
  STATIC_MODIFIER_DESC_modifier_land_of_the_rus: "Reunification of the Rus' is a common goal among the $russian_group$ rulers, and aspiring conquerors can use this as a justification of conquest."
  STATIC_MODIFIER_NAME_modifier_siberian_frontier: "Siberian Frontier"
  STATIC_MODIFIER_DESC_modifier_siberian_frontier: "The distant wastes of Siberia call to us. We must clear a path to its frozen heart, and let our Cossacks go forth and claim land for the $RUS_ADJ$ people."
  STATIC_MODIFIER_NAME_modifier_russian_artillery_yard: "$RUS_ADJ$ Artillery Yard"
  STATIC_MODIFIER_DESC_modifier_russian_artillery_yard: "Superior firepower is what determines who wins the sieges of today as well as the pitched battles of tomorrow. We must build a state-of-the-art artillery yard in the heart of our country, to ensure our armies are never without cannons nor ammunition."
  STATIC_MODIFIER_NAME_modifier_table_of_ranks: "The Table of Ranks"
  STATIC_MODIFIER_DESC_modifier_table_of_ranks: "The abolishment of the Mestnichestvo was the first step toward creating a more meritocratic state bureaucracy. The Table of Ranks further codified this principle, making military advancement conditional on performance rather than noble birth."
  STATIC_MODIFIER_NAME_modifier_russian_legitimization: "Common Legitimacy"
  STATIC_MODIFIER_DESC_modifier_russian_legitimization: "The $russian_group$ people have occupied and ruled these lands for centuries. It is only natural that a $russian_group$ ruler should govern their own people. The more $russian_group$ we present ourselves to be, the easier the people will accept our leadership."
  STATIC_MODIFIER_NAME_modifier_mother_of_russian_cities: "The Mother of Rus' States"
  STATIC_MODIFIER_DESC_modifier_mother_of_russian_cities: "$kyiv$ was once the shining capital of a great empire spanning from the northern forests of $novgorod$ to the southern shores of the Black Sea. After suffering the dissolution of the Rus' and the invasions of the Mongols, little remained of it. But the time has come for our revival, and no matter what our cities have endured, we vow that they will recover and prosper for centuries to come!"
  STATIC_MODIFIER_NAME_modifier_international_influences: "Foreign Influences"
  STATIC_MODIFIER_DESC_modifier_international_influences: "Many foreign merchants and travelers frequent our roads, bringing vast wealth to our land. We could convince some of these avid traders to permanently settle in our towns and cities, if we assure them they will not face persecution for their beliefs."
  STATIC_MODIFIER_NAME_modifier_reuniting_rus: "Reuniting the Rus'"
  STATIC_MODIFIER_DESC_modifier_reuniting_rus: "We are the true heir of the Kievan Rus', and those lands must be reunited under our banner!"
  STATIC_MODIFIER_NAME_modifier_united_faith: "A United Faith"
  STATIC_MODIFIER_DESC_modifier_united_faith: "No matter our situation, we must ensure the unity of our faith. Only if our clergy is aligned, and no discord exists between factions of the faithful, will they be able to focus on their primary function of guiding and aiding our population."
  STATIC_MODIFIER_NAME_modifier_east_and_west: "East and West"
  STATIC_MODIFIER_DESC_modifier_east_and_west: "Our strategic position between eastern and western empires has given our merchants the opportunity to act as essential middlemen for lucrative regional trade routes."
  STATIC_MODIFIER_NAME_modifier_ruthenian_state_advance: "A $UKR_ADJ$ State"
  STATIC_MODIFIER_DESC_modifier_ruthenian_state_advance: "In the past, we bowed to foreign influences, and were obliged to adapt to their customs to ensure friendly relations. But times have changed, and now we must affirm our own customs, or risk falling into the sphere of foreign influences again."
  STATIC_MODIFIER_NAME_modifier_ruthenian_rural_buildings: "$UKR_ADJ$ Villages"
  STATIC_MODIFIER_DESC_modifier_ruthenian_rural_buildings: "Much of $ruthenia_region$ is rural, empty land. While our great cities like $kyiv$ serve many important purposes, we cannot neglect the remote lands or small villages that provide us with crucial supplies of food and raw materials."
  STATIC_MODIFIER_NAME_modifier_ruthenia_commoner_education: "Education for All $UKR_ADJ$ People"
  STATIC_MODIFIER_DESC_modifier_ruthenia_commoner_education: "By establishing local schools, we will ensure that our population is well-educated at all levels of society."
  STATIC_MODIFIER_NAME_modifier_slovene_the_dukes_chair_tradition: "The Duke's Chair Tradition"
  STATIC_MODIFIER_DESC_modifier_slovene_the_dukes_chair_tradition: "The ancient ritual of installing the Dukes of Carinthia in the Slovenian language symbolizes a unique contractual relationship between the ruler and the ruled. This custom reinforces the idea of a free peasantry with specific legal rights, preventing the total disenfranchisement of the rural population. This social contract fosters a stable and productive agricultural base across our domains."
  STATIC_MODIFIER_NAME_modifier_cli_the_sanneck_condottieri: "The Sanneck Condottieri"
  STATIC_MODIFIER_DESC_modifier_cli_the_sanneck_condottieri: "Before we were Princes of the Empire, the House of Cilli was defined by the sharp blades of the Sanneck knights. By leading elite mercenary companies for the Hungarian and Imperial crowns in the fields of Dalmatia and Italy, we have turned the 'contract of war' into a tool for dynastic elevation. This tradition of professional military service allows us to field superior sellswords at a fraction of the cost."
  STATIC_MODIFIER_NAME_modifier_slovene_the_tabor_defense_system: "The Tabor Defense System"
  STATIC_MODIFIER_DESC_modifier_slovene_the_tabor_defense_system: "As a border nation, we have always been in a dangerous position against our enemies, so our people have developed the #italic Tabor#! — fortified church enclosures where villagers can retreat with their livestock and valuables. This decentralized defense system turns every village into a minor fortress, forcing any invader into a grueling war of attrition they cannot win."
  STATIC_MODIFIER_NAME_modifier_cli_the_last_counts_legacy: "The Last Count's Legacy"
  STATIC_MODIFIER_DESC_modifier_cli_the_last_counts_legacy: "Following our deep involvement in the successions of our neighbors, we formalize our legal claims to oversee the southern frontier of the Empire as the primary protectors of the realm. Even as our rivals attempt to absorb our lands, the administrative structures and 'Imperial Immediate' status we have secured ensure that our territory remains a privileged hub of regional governance."
  STATIC_MODIFIER_NAME_modifier_slovene_the_catechismus_and_abecedarium: "The Catechismus and Abecedarium"
  STATIC_MODIFIER_DESC_modifier_slovene_the_catechismus_and_abecedarium: "The soul of our people has found its voice through the printing presses. Primož Trubar has published the #italic Catechismus and Abecedarium#!, the first books ever printed in the Slovenian language. This is far more than a religious act; it is a political earthquake that standardizes our various dialects into a single literary tongue. By giving the common folk the tools of literacy in their own language, we have forged a unified national consciousness that transcends the borders of old feudal duchies. This intellectual awakening accelerates the adoption of modern administrative institutions and allows the light of new ideas to spread rapidly from the pulpit to the plow."
  STATIC_MODIFIER_NAME_modifier_cli_the_windic_march_arsenal: "The Windic March Arsenal"
  STATIC_MODIFIER_DESC_modifier_cli_the_windic_march_arsenal: "As the primary lords of the southern frontier, we have transformed our estates into a permanent military supply chain. By patronizing the ironworks of the Savinja Valley, we ensure our heavy cavalry and border guards are equipped with the finest plate and firearms forged in Inner Austria. This localized military industry reduces our reliance on foreign armaments and keeps our regiments battle-ready at all times."
  STATIC_MODIFIER_NAME_modifier_slovene_the_glory_of_carniola: "The Glory of Carniola"
  STATIC_MODIFIER_DESC_modifier_slovene_the_glory_of_carniola: "Following the lead of Janez Vajkard Valvasor, we have undertaken a monumental effort to map the geography, history, and customs of our lands. This scientific survey provides the state with an unparalleled understanding of its resources and people, allowing for more efficient taxation and the rapid application of technological innovations."
  STATIC_MODIFIER_NAME_modifier_cli_the_marble_palaces_of_celje: "The Marble Palaces of Celje"
  STATIC_MODIFIER_DESC_modifier_cli_the_marble_palaces_of_celje: "To reflect our status as Princes of the Empire, we have invited Italian architects to redesign our urban centers in the grand Baroque style. These sprawling palaces and public squares are not merely for show; they serve as centralized administrative hubs where the state's bureaucracy is professionalized. The sheer splendor of our capital serves to overawe foreign diplomats and domestic rivals alike, cementing our legitimate right to rule."
  STATIC_MODIFIER_NAME_modifier_slovene_the_zois_circle: "The Zois Circle"
  STATIC_MODIFIER_DESC_modifier_slovene_the_zois_circle: "Baron Sigmund Zois, a wealthy mineralogist and patron of the arts, has started organizing a circle of intellectuals who spearheaded the Slovenian National Awakening (Preporod). This group promotes the use of Slovenian in high culture, science, and politics, effectively transforming a 'peasant tongue' into a language of modern statehood."
  STATIC_MODIFIER_NAME_modifier_cli_the_modernization_of_a_nation: "The Modernization of a Nation"
  STATIC_MODIFIER_DESC_modifier_cli_the_modernization_of_a_nation: "Our ancestral valleys have been transformed from a feudal pastoral land into the industrial heartbeat of our realm. We have seized this momentum by establishing massive industries, alongside modern steam-powered mills that process the raw timber and iron of the surrounding mountains. This rapid modernization has created a new class of skilled laborers and engineers, turning our capital into a center of technological innovation that propels the entire state into the industrial age."
  STATIC_MODIFIER_NAME_modifier_father_governs_children: "Father Governs Children"
  STATIC_MODIFIER_DESC_modifier_father_governs_children: "Our rulers are famed for their close connection to the common man. May our people always live free and happily under the guiding light of their majestic, heavenly rulers!"
  STATIC_MODIFIER_NAME_modifier_thai_royal_poets: "Royal Poets"
  STATIC_MODIFIER_DESC_modifier_thai_royal_poets: "What is the point of winning wars if no songs are sung about our victories? Our court shall be a haven for poets, and our history shall be their source of inspiration."
  STATIC_MODIFIER_NAME_modifier_trading_links: "Trading Links"
  STATIC_MODIFIER_DESC_modifier_trading_links: "Our country has been a crossroads of trade since ancient times. Our proximity to $india$ and $china$ has allowed trade to flow through our lands, and with it relationships and interactions with the many different countries around us."
  STATIC_MODIFIER_NAME_modifier_foreign_mercenaries: "Foreign Mercenaries"
  STATIC_MODIFIER_DESC_modifier_foreign_mercenaries: "We have recently received an influx of barbarians from foreign lands. Some are merchants but some are fighting men. Let us make use of them in our armies."
  STATIC_MODIFIER_NAME_modifier_toi_muay: "Toi Muay"
  STATIC_MODIFIER_DESC_modifier_toi_muay: "Taught to our soldiers for use in combat, it is an unarmed martial art featuring punches, grappling, and ground-fighting techniques. Proficiency in this art allows our troops to remain deadly in battle even if they lose their weapons."
  STATIC_MODIFIER_NAME_modifier_trading_embassies: "Trading Embassies"
  STATIC_MODIFIER_DESC_modifier_trading_embassies: "The numerous trade ships coming in and out of our waters have familiarized us with many distant realms. By establishing permanent trading embassies with these far-off places, we can transform casual commerce into formal relationships."
  STATIC_MODIFIER_NAME_modifier_photduang: "Photduang"
  STATIC_MODIFIER_DESC_modifier_photduang: "Our currency may feel strange to outsiders, but #italic $photduang$#! have served us well for centuries. Roundish balls of silver and stamped with official marks, they serve as the basis of our economy."
  STATIC_MODIFIER_NAME_modifier_personal_executions: "Personal Executions"
  STATIC_MODIFIER_DESC_modifier_personal_executions: "From now on, the most heinous criminals will be executed personally by the ruler. With this, people will know that we are an orderly nation committed to justice, and they will show the appropriate obedience to the law."
  STATIC_MODIFIER_NAME_modifier_close_subjects: "Close Subjects"
  STATIC_MODIFIER_DESC_modifier_close_subjects: "For us, our subjects are not something separate from the nation, but rather an integral part of it. We keep close ties with them, and they are fully integrated into our bureaucracy and administration."
  STATIC_MODIFIER_NAME_modifier_dai_nha_nhac: "Nhã Nhạc"
  STATIC_MODIFIER_DESC_modifier_dai_nha_nhac: "The $dai_nha_nhac$ is the traditional music played at our courts and performed at annual ceremonies. It is a prominent aspect of our culture, and a pillar of our traditions."
  STATIC_MODIFIER_NAME_modifier_dai_confucian_administration: "Confucian Administration"
  STATIC_MODIFIER_DESC_modifier_dai_confucian_administration: "Our state bureaucracy is obviously of the utmost importance, and as such, we select only the most capable administrators to hold government office. Learned in the Confucian texts of $CHI$, these bureaucrats ensure smooth and stable bureaucratic operations."
  STATIC_MODIFIER_NAME_modifier_dai_giao_chi_arquebus: "Giao Chỉ Arquebus"
  STATIC_MODIFIER_DESC_modifier_dai_giao_chi_arquebus: "The $dai_giao_chi_arquebus$ is a staple of our military. Self-produced and adapted to the specific needs of our troops, this type of arquebus gains praise from not only $chinese_group$ people, but also Western observers."
  STATIC_MODIFIER_NAME_modifier_dai_ca_tru: "Ca Trù"
  STATIC_MODIFIER_DESC_modifier_dai_ca_tru: "The $dai_ca_tru$ is a $vietnamese_culture$ genre of musical storytelling which serves both entertainment and religious purposes."
  STATIC_MODIFIER_NAME_modifier_dai_trade_advance: "Trading Contracts"
  STATIC_MODIFIER_DESC_modifier_dai_trade_advance: "Our existence has been shaped by $CHI$ for too long. To leave our own mark on the world, we must expand our reach beyond the $chinese_group$ sphere of influence."
  STATIC_MODIFIER_NAME_modifier_dai_literary_reform: "Literary Reform"
  STATIC_MODIFIER_DESC_modifier_dai_literary_reform: "For centuries, we used $classical_chinese_language$ to write our documents. However, the script used to write our language is Chữ Nôm, a native script based on Chữ Hán, the script of $classical_chinese_language$. Chữ Nôm was non-standardized and not used often enough compared to $classical_chinese_language$, so there has been some pressure to reform the script and make it more suitable for our administrative purposes."
  STATIC_MODIFIER_NAME_modifier_dai_don_dien: "Đôn Điên"
  STATIC_MODIFIER_DESC_modifier_dai_don_dien: "The $dai_don_dien$ is a system which utilizes military colonies, in which soldiers and landless peasants clear the area for the establishment of new villages. These villages are then incorporated into our administrative system after three years, and the people who cleared the land may then claim and work it."
  STATIC_MODIFIER_NAME_modifier_dai_thuan_thien: "Thuận Thiên"
  STATIC_MODIFIER_DESC_modifier_dai_thuan_thien: "$dai_thuan_thien$, or Heaven's Will, is the name of the legendary sword wielded by our liberator, Lê Lợi. According to the tales, the sword gave him the strength of a thousand men, enough to finally throw off the yoke of $CHI_ADJ$ rule. Many in our country look upon Lê Lợi as the perfect embodiment of the ideal leader."
  STATIC_MODIFIER_NAME_modifier_sudano_sahelian_architecture_advance: "Sudano-Sahelian Architecture"
  STATIC_MODIFIER_DESC_modifier_sudano_sahelian_architecture_advance: "The grasslands, savannas, and deserts of $west_africa$ provide few resources suitable for construction projects, so we have made the best of what we can get. The usage of mudbricks and adobe plaster reduces the cost of buildings significantly while also giving them a distinct style that is pleasing to the eye."
  STATIC_MODIFIER_NAME_modifier_cossacks_recruitment: "Cossack Recruitment"
  STATIC_MODIFIER_DESC_modifier_cossacks_recruitment: "The Cossacks are fearsome warriors, and their skill in surviving in the unforgiving wilderness of the steppes is almost unmatched. There is a place for them in our state as well as our military, as an elite force that will enforce our lordship over the steppes."
  STATIC_MODIFIER_NAME_modifier_cossacks_escaped_serfs: "Escaped Serfs"
  STATIC_MODIFIER_DESC_modifier_cossacks_escaped_serfs: "Many Cossacks were born into serfdom. Tired of feudal oppression, they fled their masters, and sought lives of freedom on the steppes. We must continue to welcome these escaped serfs into our society."
  STATIC_MODIFIER_NAME_modifier_cossacks_hetmanate: "Cossack Hetmanate"
  STATIC_MODIFIER_DESC_modifier_cossacks_hetmanate: "There are no kings or khans among the Cossacks. They are led by the #italic ataman#!, who is their highest military commander, but in matters of state and society simply the first among equals. Political power lies in the Rada, the legislative and military assembly, in which all Cossacks can have their say."
  STATIC_MODIFIER_NAME_modifier_cossack_administration: "Cossack Administration"
  STATIC_MODIFIER_DESC_modifier_cossack_administration: "By granting our Cossack leaders dual roles as both generals and administrators, we will be able to streamline army recruitment, and ensure a high training standard."
  STATIC_MODIFIER_NAME_modifier_steppe_riders: "Steppe Riders"
  STATIC_MODIFIER_DESC_modifier_steppe_riders: "The steppes are a peculiar and treacherous place to live. When you enter the Endless Sea of Grass, your horse stops being an animal or piece of property, and truly becomes a part of you. Just as your body cannot survive without a heart or a liver, in the steppes it certainly will not survive without a horse. But the good news is that those who find themselves in that situation will find countless interesting ways to perish..."
  STATIC_MODIFIER_NAME_modifier_cossacks_military_society: "Military Society"
  STATIC_MODIFIER_DESC_modifier_cossacks_military_society: "There is almost no division between civil and military society among the Cossacks. They are a host, defined by their people rather than by the land they control, and their people are warriors. We must ensure that military divisions properly meet our administrative needs as the host expands."
  STATIC_MODIFIER_NAME_modifier_cossacks_serf_autonomy: "Cossack Serf Autonomy"
  STATIC_MODIFIER_DESC_modifier_cossacks_serf_autonomy: "No man should suffer tyranny among the Cossacks. When we conquer new territories, the serfs, peasants, and slaves there will be treated as equals to our own people."
  STATIC_MODIFIER_NAME_modifier_cossack_reputation: "Fearsome Reputation"
  STATIC_MODIFIER_DESC_modifier_cossack_reputation: "Our Cossacks have already built for themselves a reputation of fierce warriors. That in itself is enough to instill fear in the hearts of our enemies when they have to face them in battle."
  STATIC_MODIFIER_NAME_modifier_frankokratia_synthesized_levies_advance: "Synthesized Levies"
  STATIC_MODIFIER_DESC_modifier_frankokratia_synthesized_levies_advance: "To maintain power against overwhelming odds, we have integrated the local Prónoia system — granting land in exchange for military service — with the Western tradition of knightly tenure. This creates a hybrid martial class of #italic Latinikon#! who are loyal to the Latin Crown, but intimately familiar with the rugged Greek terrain and Eastern tactics. These soldiers combine the heavy shock of the Frankish charge with the endurance and skirmishing capabilities required to hold the Balkan frontiers."
  STATIC_MODIFIER_NAME_modifier_ach_morean_silk_advance: "Morean Silk"
  STATIC_MODIFIER_DESC_modifier_ach_morean_silk_advance: "The Peloponnese remains the heart of European silk production, a legacy of the Byzantine era that the Frankish Princes have expanded through state-sponsored mulberry groves. By controlling strategic ports, we can undercut the high prices of Persian and Chinese imports, making Achaea the primary supplier for the garment makers of Florence and Lyon. This monopoly provides a steady stream of #italic soft gold#! that funds our mercenaries and the fortification of our mountain passes."
  STATIC_MODIFIER_NAME_modifier_arg_the_heraldry_of_the_brienne_advance: "The Heraldry of the Brienne"
  STATIC_MODIFIER_DESC_modifier_arg_the_heraldry_of_the_brienne_advance: "As the House of Brienne maintains claims to Jerusalem and Cyprus, Argos has become a center for 'Chivalric Genealogy'. Knights from across the West come here to prove their lineage or seek titles in the 'crusader fringe'. This constant influx of high-born adventurers provides a rotating pool of talented officers for our local levies."
  STATIC_MODIFIER_NAME_modifier_ath_thebes_textiles_advance: "Thebes' Textiles"
  STATIC_MODIFIER_DESC_modifier_ath_thebes_textiles_advance: "The workshops of Thebes, already renowned in Byzantine times for their silk-weaving, have flourished anew under Frankish rule as the dukes of Athens encourage Italian merchants to invest in looms, dyeworks, and export networks that carry Theban samites and velvets to markets from Bruges to Alexandria; this revival of luxury textile production, combined with the fertile plains of Boeotia that supply raw materials, generate substantial wealth that funds castle-building, knightly retinues, and the lavish lifestyle of the Athenian court, ensuring that the duchy remains one of the richest and most economically sophisticated territories of the entire Frankokratia."
  STATIC_MODIFIER_NAME_modifier_bod_the_curia_of_the_three_keys_advance: "The Curia of the Three Keys"
  STATIC_MODIFIER_DESC_modifier_bod_the_curia_of_the_three_keys_advance: "To manage the wealth generated by the resurgence of the northern trade routes, the Marquisate has established the #italic Curia of the Three Keys#!. The state treasury and the legal archives are locked in the citadel of Bodonitsa, requiring three separate keys held by the Marquis, the Latin Bishop, and a representative of the local Greek burgesses. This primitive but effective system of 'Checks and Balances' prevents the embezzlement that often plagues small feudal states, ensuring that the heavy tolls collected at Thermopylae are actually spent on the fortress walls."
  STATIC_MODIFIER_NAME_modifier_cep_ionian_sea_wall_advance: "Ionian Sea-Wall"
  STATIC_MODIFIER_DESC_modifier_cep_ionian_sea_wall_advance: "As the lords of Cephalonia, Zante, and Ithaca, we sit at the crossroads of the Adriatic and the Mediterranean, acting as the first line of defense for Italy. Our naval strategy focuses on 'Anti-Access' warfare, using heavy fortifications and fast scouting vessels to deny the enemy the ability to harbor in the Ionian Isles. We are the gatekeepers of the West, and no fleet enters the Adriatic without our silent consent."
  STATIC_MODIFIER_NAME_modifier_crt_the_galley_assembly_line_of_suda_advance: "The Galley Assembly Line of Suda"
  STATIC_MODIFIER_DESC_modifier_crt_the_galley_assembly_line_of_suda_advance: "By standardizing the parts used in the construction of light galleys at Suda Bay, we have pioneered an early form of modular shipbuilding. This allows us to replace lost vessels at a fraction of the time and cost of other Mediterranean powers. A ship built in Candia is recognized for its speed and its ability to navigate the treacherous currents of the Cretan Sea."
  STATIC_MODIFIER_NAME_modifier_lat_hegemony_over_the_bosphorus_advance: "Hegemony over the Bosphorus"
  STATIC_MODIFIER_DESC_modifier_lat_hegemony_over_the_bosphorus_advance: "Dominating the narrow gates of the Black Sea allows us to levy heavy tolls on the Italian merchant republics that once dictated our fate through debt and naval blockade. The wealth of the Pontic grain trade and the Silk Road's northern terminus now flows directly into the Imperial coffers rather than Venice or Genoa, funding our restoration. We have turned the Golden Horn from a den of foreign merchants into the beating heart of a centralized, sovereign economic powerhouse."
  STATIC_MODIFIER_NAME_modifier_nax_archipelagic_vigil_advance: "Achipelagic Vigil"
  STATIC_MODIFIER_DESC_modifier_nax_archipelagic_vigil_advance: "The scattered islands of the Aegean demand constant vigilance from their Latin rulers, who maintain fleets of light galleys to patrol against pirates, raiders, and rival Italian maritime powers. The dukes of Naxos and their vassals have developed a sophisticated system of island garrisons, signal fires, and swift courier vessels that allow them to respond rapidly to threats across the archipelago, while the wealth extracted from trade protection and harbor dues enables the construction of sturdy coastal fortresses that make the Cyclades one of the most secure regions of the Frankokratia, a maritime bulwark."
  STATIC_MODIFIER_NAME_modifier_neg_the_three_fold_defense_advance: "The Three Fold-Defense"
  STATIC_MODIFIER_DESC_modifier_neg_the_three_fold_defense_advance: "The island of Euboea is divided among three #italic Terzieri#!, or Triarchs, creating a competitive yet unified defensive structure that prevents any single lord from becoming weak. This tripartite system ensures that if one fortress falls, the other two mobilize instantly, creating a redundant and resilient military administration. This internal rivalry keeps our garrisons at peak readiness, as no Triarch wishes to be outdone by his peers."
  STATIC_MODIFIER_NAME_modifier_neo_the_consulate_of_the_sea_advance: "The Consulate of the Sea"
  STATIC_MODIFIER_DESC_modifier_neo_the_consulate_of_the_sea_advance: "Using our connections to the Crown of Aragon and the merchants of Barcelona, Neopatras has become the primary entry point for Iberian goods into the Levant. We operate a #italic Consulate of the Sea#! that provides legal protection and standardized weights for all Catalan and Spanish traders. This special relationship makes Neopatras the wealthiest outpost of the Western Mediterranean in the heart of Greece."
  STATIC_MODIFIER_NAME_modifier_pat_the_pilgrimage_tolls_advance: "The Pilgrimage Tolls"
  STATIC_MODIFIER_DESC_modifier_pat_the_pilgrimage_tolls_advance: "The purported relics of Saint Andrew attract thousands of Catholic pilgrims who seek safety in the East, and we have established a network of fortified 'Hospices' to protect them. By charging a modest 'Protection Fee' for passage and lodging, the Archbishopric funds the maintenance of a standing army of Crusader-Monks. These funds are also used to beautify the city, making Patras the 'Rome of the East' and a beacon of Latin architecture."
  STATIC_MODIFIER_NAME_modifier_sao_the_parnassus_mines_advance: "The Parnassus Mines"
  STATIC_MODIFIER_DESC_modifier_sao_the_parnassus_mines_advance: "Deep within the rugged mountains of our lordship lie veins of metals that were forgotten since the days of the Delphic Oracle. By bringing in Saxon mining experts and applying Western smelting technology, we have turned the #italic Mount of the Muses#! into a center of heavy industry. The wealth extracted from these mines allows the Lords of Salona to maintain a court that rivals the Dukes of Athens in elegance and power."
  STATIC_MODIFIER_NAME_modifier_the_the_fair_of_saint_demetrios: "The Fair of Saint Demetrios"
  STATIC_MODIFIER_DESC_modifier_the_the_fair_of_saint_demetrios: "We have expanded the ancient religious fair into a massive international trade expo that links the Balkan hinterland with the Mediterranean maritime routes. By granting safe passage to merchants, Thessalonica has become the premier marketplace for fur, grain, and Western textiles. This economic vitality allows the King to bypass the local nobility by funding his administration through sales taxes and customs duties."
  STATIC_MODIFIER_NAME_modifier_frankokratia_union_of_the_soul_advance: "Union of the Soul"
  STATIC_MODIFIER_DESC_modifier_frankokratia_union_of_the_soul_advance: "By installing a Latin Patriarch who respects the ancient Greek liturgy and the Julian calendar while acknowledging Papal supremacy, we bridge the Great Schism within our borders. This #italic Uniate#! compromise stabilizes the realm by allowing the Greek peasantry to keep their ancestral rites while ensuring the urban elite remains tied to Rome. It effectively neutralizes the threat of religious revolt and provides a theological justification for our continued rule over the Orthodox heartlands."
  STATIC_MODIFIER_NAME_modifier_ach_knights_of_the_peloponnese_advance: "Knights of the Peloponnese"
  STATIC_MODIFIER_DESC_modifier_ach_knights_of_the_peloponnese_advance: "Our nobility has spent centuries in constant border skirmishes against our enemies, creating a unique tradition of highly mobile cavalry. These knights have discarded the cumbersome barding of their French ancestors in favor of lighter armor and tactics adapted for the steep, treacherous Greek mountains. This allows our forces to outmaneuver traditional heavy cavalry and strike at the enemy's flanks with devastating speed and precision."
  STATIC_MODIFIER_NAME_modifier_arg_the_gibraltar_of_the_levant_advance: "The Gibraltar of the Levant"
  STATIC_MODIFIER_DESC_modifier_arg_the_gibraltar_of_the_levant_advance: "The Palamidi fortress, perched high above the Gulf of Argos, has been expanded into a complex system of seven interlocking forts that command the entire Argolid. By controlling this 'Gibraltar', we dictate the movement of any fleet attempting to supply an army in the Morea, effectively making the lordship unconquerable by land or sea. This strategic dominance allows us to play the role of kingmaker between our neighbours."
  STATIC_MODIFIER_NAME_modifier_ath_the_parthenon_dukes_advance: "The Parthenon Dukes"
  STATIC_MODIFIER_DESC_modifier_ath_the_parthenon_dukes_advance: "Otto de la Roche, first Duke of Athens, established his court amid the ruins of the Acropolis, converting the ancient Parthenon into a Catholic cathedral dedicated to Our Lady while ruling over a duchy that stretched from Attica to Boeotia. Under his successors, the duchy became a surprising center of cultural exchange where Frankish knights patronized Greek scribes, Italian merchants traded in Piraeus, and scholars debated philosophy in sight of marble temples. All this produced a distinctive aristocratic society that prized both the martial virtues of chivalry and an appreciation for the Hellenic past that had so long been ignored by Western conquerors. We must reinstate this court to its past glory."
  STATIC_MODIFIER_NAME_modifier_bod_the_alpine_skirmishers_advance: "The Alpine Skirmishers"
  STATIC_MODIFIER_DESC_modifier_bod_the_alpine_skirmishers_advance: "Living among the crags of Mount Kallidromos, our people have developed a form of light infantry combat that emphasizes vertical mobility and the use of the crossbow. These 'Mountaineers of the Pass' can disappear into the rocks after a volley, making them impossible for traditional heavy infantry to engage. They serve as the eyes and ears of the southern states, providing early warning of any movement from the north."
  STATIC_MODIFIER_NAME_modifier_cep_the_currant_trade_advance: "The Currant Trade"
  STATIC_MODIFIER_DESC_modifier_cep_the_currant_trade_advance: "The unique climate of the Ionian Islands allows for the mass cultivation of the #italic Zante Currant#!, a luxury dried fruit that has become a staple of European diets. By dominating the production and export of this niche crop, we have created a specialized economic engine that generates vast wealth for a relatively small territory. The 'Currant Lords' of Cephalonia are among the wealthiest nobles in the Latin East."
  STATIC_MODIFIER_NAME_modifier_crt_the_malvasia_wine_export_advance: "The Malvasia Wine Export"
  STATIC_MODIFIER_DESC_modifier_crt_the_malvasia_wine_export_advance: "The sun-drenched slopes of Mount Ida produce the famed Malvasia grape, which has become the most coveted dessert wine in the royal courts of Northern Europe. By strictly regulating the quality and the #italic Seal of Saint Mark#! on every barrel exported, we have created a high-value trade monopoly that funds our naval defense. This liquid gold ensures that even as a colony, Candia remains the most profitable jewel in the Venetian maritime empire."
  STATIC_MODIFIER_NAME_modifier_lat_the_new_praetorian_guard_advance: "The New Praetorian Guard"
  STATIC_MODIFIER_DESC_modifier_lat_the_new_praetorian_guard_advance: "Evolving from the old Varangian tradition, our modern guard consists of professional Catholic mercenaries from across Europe, primarily French veterans and Swiss pikemen. These men are bound to the Emperor not by land or title, but by gold and a shared Crusader identity, serving as an iron fist against disloyal feudal barons. This standing force ensures that the Emperor's will is absolute, providing a stable core for the army that is immune to the whims of the high nobility."
  STATIC_MODIFIER_NAME_modifier_nax_the_marble_trade_of_paros_advance: "The Marble Trade of Paros"
  STATIC_MODIFIER_DESC_modifier_nax_the_marble_trade_of_paros_advance: "As the demand for fine art rises, the demand for high-quality Parian marble has returned to levels not seen since the days of Augustus. By reopening the ancient quarries and employing modern engineering techniques, we have turned a geologic quirk into a fountain of wealth that funds our Aegean hegemony. The palaces of Rome and Paris are increasingly built with stone hewn from our sovereign islands."
  STATIC_MODIFIER_NAME_modifier_neg_bridgehead_of_the_euripus_advance: "Bridgehead of the Euripus"
  STATIC_MODIFIER_DESC_modifier_neg_bridgehead_of_the_euripus_advance: "The narrow channel separating our island from the mainland is the most strategic chokepoint in Central Greece, controlled by our massive swing-bridge and fortified towers. By taxing the flow of goods between Boetia and the Aegean, we have transformed a geographic oddity into a permanent source of toll revenue. We hold the key to the movement of armies in the Balkans, and we charge a heavy price for its use."
  STATIC_MODIFIER_NAME_modifier_neo_the_great_companys_code_advance: "The Great Company's Code"
  STATIC_MODIFIER_DESC_modifier_neo_the_great_companys_code_advance: "The nation remains governed by the democratic-military traditions of the Catalan Company, where officers are elected and the spoils of war are shared. This egalitarian structure creates an army with incredibly high morale, as every soldier feels they have a personal stake in the survival of the state. While the rest of Europe moves toward absolutism, our 'Soldier's Republic' remains a fiercely loyal and cohesive fighting force."
  STATIC_MODIFIER_NAME_modifier_pat_uniate_liturgical_printing_advance: "Uniate Liturgical Printing"
  STATIC_MODIFIER_DESC_modifier_pat_uniate_liturgical_printing_advance: "To counter the influence of the Orthodox world, the Archbishop has established the first Greek-language Catholic printing press in the Peloponnese. We produce bibles and liturgical texts that use the Greek language but adhere to Latin dogma, slowly winning the 'War of the Word' among the literate Greek classes. This cultural offensive reduces the risk of rebellion and integrates the Greek population into the Latin social hierarchy without stripping them of their linguistic heritage."
  STATIC_MODIFIER_NAME_modifier_sao_the_asceticism_of_the_crissaean_crags_advance: "The Asceticism of the Crissaean Crags"
  STATIC_MODIFIER_DESC_modifier_sao_the_asceticism_of_the_crissaean_crags_advance: "The soil of Salona is a miserly host, offering little food besides mountain herbs to those who dwell in the shadow of the peaks. Life in this jagged landscape have bred a peasantry and a knightly class alike who are famously indifferent to hunger and hardship. Our soldiers require half the rations of a Frankish man-at-arms, possessing a lean, wolf-like endurance that allows them to out-march and out-climb any adversary. In the high passes of Phocis, the belly is light, but the resolve is as unyielding as the mountain itself."
  STATIC_MODIFIER_NAME_modifier_the_the_lombard_guard_advance: "The Lombard Guard"
  STATIC_MODIFIER_DESC_modifier_the_the_lombard_guard_advance: "Restored as a bulwark in Macedonia, the Kingdom has revived its heritage by inviting Lombard and northern Italian military engineers to modernize its defenses. These #italic Lombard Guards#! serve as the professional core of the army, utilizing advanced pike-and-shot formations to hold the Vardar valley against the encroaching enemy armies. Their presence ensures that our nation remains a bastion of Western military theory in the heart of the Balkans."
  STATIC_MODIFIER_NAME_modifier_frankokratia_levantine_trades_advance: "Levantine Trades"
  STATIC_MODIFIER_DESC_modifier_frankokratia_levantine_trades_advance: "Centuries of living at the crossroads of East and West have taught our merchant class to navigate the most complex trade networks, from the silk routes to the spice markets of the Levant. We act as the essential middlemen between the resource-rich Black Sea and the manufacturing hubs of Western Europe, profiting from every transaction that passes through our ports. Our merchants are as comfortable negotiating with Egyptians as they are with Flemish weavers, ensuring our ports are never empty."
  STATIC_MODIFIER_NAME_modifier_ach_a_system_of_forts_advance: "A System of Forts"
  STATIC_MODIFIER_DESC_modifier_ach_a_system_of_forts_advance: "Our coastal defenses are unmatched, utilizing Italian #italic trace italienne#! design to repel enemy naval raids and incursions into our sovereign territory. We have transformed the old Crusader castles into modern artillery forts, capable of withstanding months of siege while projecting power over the Ionian and Aegean seas. No invader shall take the Morea by sea so long as our stone sentinels stand watch over the rocky capes and fertile valleys."
  STATIC_MODIFIER_NAME_modifier_arg_the_artillery_school_of_argos_advance: "The Artillery School of Argos"
  STATIC_MODIFIER_DESC_modifier_arg_the_artillery_school_of_argos_advance: "Recognizing that the future of warfare is determined by the cannon, we have turned our high-altitude forts into laboratories for ballistics and gunnery. Our officers are trained to calculate firing arcs from extreme heights, allowing our batteries to hit enemy ships with pinpoint accuracy. The #italic Argos School of Gunnery#! is respected across Europe for its mathematical precision and tactical innovation."
  STATIC_MODIFIER_NAME_modifier_ath_the_piraeus_arsenal_advance: "The Piraeus Arsenal"
  STATIC_MODIFIER_DESC_modifier_ath_the_piraeus_arsenal_advance: "Modeled after the Venetian Arsenal but utilizing modern assembly-line techniques, our new dockyards at Piraeus can produce a fully equipped war galley in a matter of weeks. This industrialization of naval warfare allows the small Duchy to punch far above its weight class, maintaining a professional navy that dominates the Saronic Gulf. The Piraeus is no longer a ruin, but the most modern naval base in the Eastern Mediterranean."
  STATIC_MODIFIER_NAME_modifier_bod_the_maritime_consulates_advance: "The Maritime Consulates"
  STATIC_MODIFIER_DESC_modifier_bod_the_maritime_consulates_advance: "Reflecting our Venetian heritage, we have established consulates in the major ports of Euboea and Attica to represent the interests of Bodonitsan merchants. These offices act as intelligence hubs, funneling information about naval movements directly to the Marquis. We may be a mountain state, but our eyes are always fixed on the horizon of the sea."
  STATIC_MODIFIER_NAME_modifier_cep_the_chancery_of_the_three_tongues_advance: "The Chancery of the Three Tongues"
  STATIC_MODIFIER_DESC_modifier_cep_the_chancery_of_the_three_tongues_advance: "Our administration has evolved to issue all decrees in Latin, Greek, and Italian, reflecting the diverse merchant and noble classes of the Ionian Isles. This linguistic inclusivity attracts high-value migrants from the mainland and the Italian peninsula who seek a stable, multi-cultural legal environment. It effectively reduces the friction of governance in a sea of diverse identities."
  STATIC_MODIFIER_NAME_modifier_crt_the_cretan_labyrinth_of_fortifications_advance: "The Cretan Labyrinth of Fortifications"
  STATIC_MODIFIER_DESC_modifier_crt_the_cretan_labyrinth_of_fortifications_advance: "As new threats loom larger, the engineers of the nation have transformed the entire island into a maritime bastion of the #italic Trace Italienne#! style. By reinforcing the walls of Candia, Rethymno, and Chania with earthworks capable of absorbing heavy cannon fire, we ensure that every siege becomes a multi-decade ordeal for the invader. This infrastructure allows a small garrison to hold out indefinitely against a numerically superior foe while awaiting relief from the sea."
  STATIC_MODIFIER_NAME_modifier_lat_the_golden_gate_customs_house_advance: "The Golden Gate Customs House"
  STATIC_MODIFIER_DESC_modifier_lat_the_golden_gate_customs_house_advance: "The Latin Emperors have moved beyond feudal levies and now rely on a sophisticated system of maritime tariffs and transit duties. Every ship passing through the Dardanelles or the Bosporus must stop at the Imperial Customs House, where the 'Tenth of the Emperor' is collected in hard coin. This massive revenue stream allows the Empire to maintain a professional, standing army that does not rely on the whims of the nobility."
  STATIC_MODIFIER_NAME_modifier_nax_naxian_sea_knights_advance: "The Naxian Sea-Knights"
  STATIC_MODIFIER_DESC_modifier_nax_naxian_sea_knights_advance: "Our nobility is unique in the Western world; they are knights who have traded the horse for the galley and the lance for the boarding pike. These 'Sea-Knights' roam the Eastern Mediterranean under the Ducal banner, enforcing a 'Latin Peace'. This aggressive stance keeps our sailors sharp and our rivals' trade in constant peril."
  STATIC_MODIFIER_NAME_modifier_neg_the_eubean_tidal_mills_advance: "The Eubean Tidal Mills"
  STATIC_MODIFIER_DESC_modifier_neg_the_eubean_tidal_mills_advance: "The unique, reversing tides of the Euripus Strait have been harnessed by our engineers to power a series of massive tidal mills. These machines provide consistent energy for milling grain, sawing ship-timber, and powering forge-bellows regardless of the wind. This technological advantage makes Euboea the most industrially advanced island in the Mediterranean, capable of out-producing its maritime rivals."
  STATIC_MODIFIER_NAME_modifier_neo_the_neopatras_horse_breeding_program_advance: "The Neopatras Horse-Breeding Program"
  STATIC_MODIFIER_DESC_modifier_neo_the_neopatras_horse_breeding_program_advance: "In the fertile Spercheios valley, the Dukes have established royal stables to breed a new strain of warhorse, crossing Catalan stallions with local Balkan mares. The resulting #italic Neopatras Charger#! is famed for its endurance in mountainous terrain and its shock power in the charge. This cavalry advantage allows us to dominate the open plains of Thessaly and strike fear into our rivals."
  STATIC_MODIFIER_NAME_modifier_pat_the_patrine_mint_advance: "The Patrine Mint"
  STATIC_MODIFIER_DESC_modifier_pat_the_patrine_mint_advance: "Patras has secured the right to mint its own coinage, the #italic Patrine Soldo#!, which is recognized for its stable value across the Aegean. By acting as the central bank for the Frankish Morea, the Archbishop exerts a powerful economic influence over secular lords. We control the pulse of trade through the purity of our silver."
  STATIC_MODIFIER_NAME_modifier_sao_the_phocian_mule_chancery_advance: "The Phocian Mule-Chancery"
  STATIC_MODIFIER_DESC_modifier_sao_the_phocian_mule_chancery_advance: "Wheeled transport is pretty much impossible in most of our domain; thus, we have established a state-run Chancery to nationalize the logistics of the mountains. This allows us to move supply trains at a pace that leaves conventional imperial armies starving in the crags."
  STATIC_MODIFIER_NAME_modifier_the_the_via_egnatia_restoration_advance: "The Via Egnatia Restoration"
  STATIC_MODIFIER_DESC_modifier_the_the_via_egnatia_restoration_advance: "The King has commissioned the total resurfacing and fortification of the ancient Via Egnatia, the vital artery connecting the Adriatic to the Bosporus. By establishing permanent garrisons along this road, we have eliminated banditry and drastically reduced the travel time for both merchants and armies. This logistical masterpiece cements Thessalonica as the indispensable bridge between the Latin Empire and the Western European powers."
  STATIC_MODIFIER_NAME_modifier_frankokratia_the_frankish_greek_symbiosis_advance: "The Frankish-Greek Symbiosis"
  STATIC_MODIFIER_DESC_modifier_frankokratia_the_frankish_greek_symbiosis_advance: "The final evolution of our states sees the emergence of a ruling class that is culturally #italic Latin#! in its chivalry and faith, but linguistically and socially integrated with the Greek population. By encouraging intermarriage and the adoption of local customs by the lesser nobility, we have ended the era of foreign rule and created a unified national identity. This #italic Greco-Latin#! culture is fiercely loyal to its own soil, blending the best of Western feudalism with the resilience of the Greek spirit."
  STATIC_MODIFIER_NAME_modifier_ach_achaean_enlightenment_advance: "Achaean Enlightenment"
  STATIC_MODIFIER_DESC_modifier_ach_achaean_enlightenment_advance: "As scholars flee the crumbling peripheries of the East, many find refuge in our courts, leading to a unique synthesis of Latin philosophy and Greek classical knowledge. Under the enlightened patronage of the Princes, we have established academies where the works of the great sages of both East and West are studied side-by-side, sparking a cultural rebirth. This intellectual flowering attracts the best minds of Europe, ensuring our state remains at the cutting edge of administrative and scientific progress."
  STATIC_MODIFIER_NAME_modifier_arg_argive_maritime_insurance_advance: "Argive Maritime Insurance"
  STATIC_MODIFIER_DESC_modifier_arg_argive_maritime_insurance_advance: "Capitalizing on our position as a safe harbor, the merchant houses of Nauplia have developed a sophisticated system of maritime insurance and risk-sharing for Aegean trade. By guaranteeing the safety of Latin cargoes against piracy and storm, we have turned our port into the financial safe haven of the Peloponnese. This early form of financial capitalism draws capital away from the larger Italian republics and concentrates it in our own local banks."
  STATIC_MODIFIER_NAME_modifier_ath_the_athenian_bureaucracy_advance: "The Athenian Bureaucracy"
  STATIC_MODIFIER_DESC_modifier_ath_the_athenian_bureaucracy_advance: "As our rulers transitioned toward absolute rule, they replaced the fractious feudal lords with a meritocratic civil service drawn from the urban bourgeoisie. This centralized administration ensures that taxes are collected efficiently and the ruler's law is enforced uniformly from Marathon to Megara. By breaking the power of the old baronial families, our nation has become a streamlined, modern state capable of rapid mobilization."
  STATIC_MODIFIER_NAME_modifier_bod_the_spercheios_civil_chancellery_advance: "The Spercheios Civil Chancellery"
  STATIC_MODIFIER_DESC_modifier_bod_the_spercheios_civil_chancellery_advance: "The Marquisate of Bodonitsa had evolved from a mere frontier watchtower into the administrative nerve center of Central Greece, necessitating a transition from feudal whim to a professionalized civil service. The establishment of the Great Chancellery overlooking the Spercheios valley signals a move toward a centralized, modern state where the old Frankish baronial privileges are replaced by a cadre of legally trained 'Civil Knights' who manage the complex tolls and land registries of the Phocian heartland."
  STATIC_MODIFIER_NAME_modifier_cep_the_arsenal_of_argostoli_advance: "The Arsenal of Argostoli"
  STATIC_MODIFIER_DESC_modifier_cep_the_arsenal_of_argostoli_advance: "We have transformed the natural deep-water bay of Argostoli into a premier naval refitting station. Unlike the massive Arsenals of Venice, ours specializes in the rapid repair of small-tonnage vessels like brigantines and galiots used for Aegean raiding. This specialized infrastructure keeps our fleet at sea longer than our rivals, ensuring local naval superiority."
  STATIC_MODIFIER_NAME_modifier_crt_the_council_of_the_two_peoples_advance: "The Council of the Two Peoples"
  STATIC_MODIFIER_DESC_modifier_crt_the_council_of_the_two_peoples_advance: "The constant threat of external invasion and internal revolt led the Latin Kings of Candia to abandon the strict segregation of the early conquest. We have established a 'Great Council' where the ancient Venetian-descended nobility sits alongside the #italic Archontes#! (the Greek Orthodox landowning elite). This shared governance allows for a unified administrative front, where the military traditions of the West are funded by the deep roots of the local Greek bureaucracy, ensuring the island remains a stable and indigestible bastion for any would-be conqueror."
  STATIC_MODIFIER_NAME_modifier_lat_codex_latinus_advance: "Codex Latinus"
  STATIC_MODIFIER_DESC_modifier_lat_codex_latinus_advance: "The Emperor has ordered the complete overhaul of the legal system, merging the Justinian Code with the Frankish-style #italic Assizes of Romania#! into a single, unified legal body. This #italic Codex Latinus#! removes the legal distinctions between Frankish and Greek subjects, creating a single class of Imperial Citizens under the Emperor's law. This legal unification is the final nail in the coffin of the old feudal order, paving the way for a truly centralized, absolute monarchy."
  STATIC_MODIFIER_NAME_modifier_nax_aegean_waystation_networks_advance: "Aegean Waystation Networks"
  STATIC_MODIFIER_DESC_modifier_nax_aegean_waystation_networks_advance: "In an era of global trade, our islands have become the indispensable waystations of the Mediterranean, providing fresh water, ship timber, and salted meats to long-haul vessels. By standardizing the port facilities across our twenty-odd islands, we ensure that any merchant ship must pay for the privilege of our hospitality. This logistics network makes us the undisputed masters of the Aegean's internal economy."
  STATIC_MODIFIER_NAME_modifier_neg_the_triarchic_naval_academy_advance: "The Triarchic Naval Academy"
  STATIC_MODIFIER_DESC_modifier_neg_the_triarchic_naval_academy_advance: "To ensure the quality of our fleet, the three lords of the island have co-founded an academy for the training of naval officers and navigators. Students are taught the latest in astronomical navigation and maritime law, ensuring that every Euboean captain is a professional of the highest caliber. This focus on naval education keeps our fleet at the cutting edge of maritime warfare and exploration."
  STATIC_MODIFIER_NAME_modifier_neo_the_ordinance_of_the_viles_noves_advance: "The Ordinance of the Viles Noves"
  STATIC_MODIFIER_DESC_modifier_neo_the_ordinance_of_the_viles_noves_advance: "The realm has moved to centralize its scattered mountain population into 'New Towns' (Viles Noves in the Catalan language) modeled after the planned fortified villages of Catalonia. The governance of these towns is handed to a 'Consul of the Hearth', an official tasked with managing communal wood-fuel and grain storage for the harsh winters. By controlling the heat and the bread of the highlands, our rule effectively ends the age of independent mountain-warlords, replacing them with a streamlined, urbanized bureaucracy."
  STATIC_MODIFIER_NAME_modifier_pat_the_seminary_of_diplomats_advance: "The Seminary of Diplomats"
  STATIC_MODIFIER_DESC_modifier_pat_the_seminary_of_diplomats_advance: "The Archbishop has established a school to train clergy in the art of international negotiation and secret correspondence. Our 'Black-Robed Diplomats' serve in the courts of Europe as the eyes and ears of the Latin East. This clerical intelligence network gives Patras a level of geopolitical influence that rival kingdoms envy."
  STATIC_MODIFIER_NAME_modifier_sao_the_parnassian_wolf_pacts_advance: "The Parnassian Wolf-Pacts"
  STATIC_MODIFIER_DESC_modifier_sao_the_parnassian_wolf_pacts_advance: "In the shifting power dynamics, Salona has moved beyond simple feudal oaths to a predatory legal doctrine known as the 'Wolf-Pacts'. By legally defining our neighbors as 'client-prey' that require Salona's 'alpha' protection to survive, we create a permanent diplomatic justification for intervention and annexation. This predatory diplomacy allows us to absorb smaller lordships and border-fiefs under the guise of 'Defensive Consolidation', ensuring that the Latin presence in the Balkans is led by a single, sharp-toothed power rather than a scattered, vulnerable pack."
  STATIC_MODIFIER_NAME_modifier_the_the_macedonian_fur_trade_advance: "The Macedonian Fur Trade"
  STATIC_MODIFIER_DESC_modifier_the_the_macedonian_fur_trade_advance: "Our hunters have tapped into the vast wilderness of the northern mountains, establishing a lucrative trade in high-quality pelts for the luxury markets of Italy and France. By regulating the trapping seasons and protecting the trade routes to the Danube, we have secured a consistent source of 'furry gold' for the royal treasury. This industry funds the modernization of our northern fortifications against the rising power of the northern principalities."
  STATIC_MODIFIER_NAME_modifier_frankokratia_the_latin_enlightenment_advance: "The Latin Enlightenment"
  STATIC_MODIFIER_DESC_modifier_frankokratia_the_latin_enlightenment_advance: "The centuries of struggle have culminated in a unique Eastern European Enlightenment, where the crusading spirit has been replaced by a rationalist, imperialist drive for order. The Frankokratia states are no longer 'crusader outposts' but are now a sophisticated, unified block of powers that blend Western technology with Eastern strategic depth. We have become the definitive bridge between civilizations, a 'Third Way' that is neither purely Western nor purely Byzantine, but something entirely new."
  STATIC_MODIFIER_NAME_modifier_ach_villehardouins_valor_advance: "Villehardouin's Valor"
  STATIC_MODIFIER_DESC_modifier_ach_villehardouins_valor_advance: "Geoffrey of Villehardouin, marshal of Champagne and eyewitness chronicler of the Fourth Crusade, composed one of the earliest vernacular histories in Old French, immortalizing the deeds of his companions and the astonishing capture of Constantinople in vivid, heroic prose that circulated widely among the nobility of Western Europe. His chronicle served not only as a record but as propaganda and inspiration, rallying fresh knights and pilgrims to reinforce the beleaguered Latin states, while fostering a shared sense of chivalric brotherhood among the scattered Frankish lords who continued to view themselves as crusaders holding God's frontier against schismatic and infidel alike long after the original host had dispersed. It is time to recover that spirit for the challenges of our army."
  STATIC_MODIFIER_NAME_modifier_arg_the_curia_of_the_two_benches_advance: "The Curia of the Two Benches"
  STATIC_MODIFIER_DESC_modifier_arg_the_curia_of_the_two_benches_advance: "In a daring move toward social stability, the Lordship has reformed the high court of Nauplia into the Curia of the Two Benches. This judicial body requires that every civil case involving land or inheritance be heard by a panel consisting of one Frankish judge and one Greek Demogeron (Elder). By institutionalizing this 'Shared Justice', we have effectively ended the centuries-old legal friction between the Latin and Orthodox populations. This governance model has created a unique 'Argive Identity' that is fiercely loyal to the Lordship, protecting the state from the revolutionary fervors sweeping through the rest of Europe."
  STATIC_MODIFIER_NAME_modifier_ath_the_attican_gunpowder_mills_advance: "The Attican Gunpowder Mills"
  STATIC_MODIFIER_DESC_modifier_ath_the_attican_gunpowder_mills_advance: "Our artillery is now the finest in the world, benefiting from the metallurgical secrets of the World's renowned master-smiths and the chemical innovations of our local alchemists. The 'Thunder of Athens' is heard across the Balkans, as our cannons are prized for their range and reliability."
  STATIC_MODIFIER_NAME_modifier_bod_the_oeta_riflemen_advance: "The Oeta Riflemen"
  STATIC_MODIFIER_DESC_modifier_bod_the_oeta_riflemen_advance: "In the age of gunpowder, the rugged woodsmen of the Oeta mountains have been organized into specialized light-infantry corps. These riflemen excel in hit-and-run tactics, using the steep terrain to harass invading columns with lethal precision. They are the nightmare of any general attempting to force the northern passes of Greece."
  STATIC_MODIFIER_NAME_modifier_cep_the_ionian_merchant_experts_advance: "The Ionian Merchant Experts"
  STATIC_MODIFIER_DESC_modifier_cep_the_ionian_merchant_experts_advance: "We have granted extensive privileges to our local merchants, allowing them to form self-governing trade companies that manage the most lucrative exports and imports. This mercantile autonomy has fostered a wealthy urban class that bankrolls the County's modern administrative reforms."
  STATIC_MODIFIER_NAME_modifier_crt_academy_of_the_stratioti_advance: "Academy of the Stratioti"
  STATIC_MODIFIER_DESC_modifier_crt_academy_of_the_stratioti_advance: "The fierce Cretan mountain dwellers have been integrated into a professional light cavalry corps, blending Western discipline with the hit-and-run tactics of the Balkan frontier. We have established permanent training grounds where the sons of the local nobility and the Latin settlers learn the art of the #italic Saber and Carbine#! to protect the island's interior. These units are now exported as elite mercenaries to many states, providing a steady stream of military prestige and revenue."
  STATIC_MODIFIER_NAME_modifier_lat_the_order_of_the_star_of_the_east_advance: "The Order of the Star of the East"
  STATIC_MODIFIER_DESC_modifier_lat_the_order_of_the_star_of_the_east_advance: "The Emperor has established a high-tier order of merit that replaces hereditary titles with service-based nobility, ensuring that the Empire's leaders are chosen for their talent. Membership in the Order is the highest honor in the land, granted to generals, diplomats, and scholars who have expanded the glory of the Latin Throne. This system creates a loyalist elite that is entirely dependent on the Emperor's favor, cementing the monarch's control over the state."
  STATIC_MODIFIER_NAME_modifier_nax_the_aegean_hydrographic_bureau_advance: "The Aegean Hydrographic Bureau"
  STATIC_MODIFIER_DESC_modifier_nax_the_aegean_hydrographic_bureau_advance: "In an age of global exploration and precision, the Dukes of Naxos have established the premier center for Mediterranean cartography and maritime science. By employing the finest astronomers and clockmakers to map every reef, current, and wind pattern of the Cyclades, we have made our navigational charts the most sought-after tools in the world. This scientific mastery ensures that Naxiot captains can navigate the treacherous Aegean at night or in storm, granting our merchant and war fleets a decisive advantage in speed and safety over any foreign interloper."
  STATIC_MODIFIER_NAME_modifier_neg_the_glassworks_of_chalkis_advance: "The Glassworks of Chalkis"
  STATIC_MODIFIER_DESC_modifier_neg_the_glassworks_of_chalkis_advance: "Using the high-quality silica sands of our beaches and the soda ash from our coastal plants, we have established a glass-making industry that rivals Murano. Our mirrors and stained glass are exported to the great palaces of the Latin Empire and the West, bringing immense wealth to the island. This luxury industry provides the tax revenue needed to maintain our massive coastal walls in an age of gunpowder."
  STATIC_MODIFIER_NAME_modifier_neo_the_academy_of_administration_advance: "The Academy of Administration "
  STATIC_MODIFIER_DESC_modifier_neo_the_academy_of_administration_advance: "Neopatras needs to replace its hereditary 'Captain-Governors' with graduates of a dedicated Administrative Lyceum. Candidates are tested on their knowledge of our civil law and the latest techniques, ensuring that the nation's officials are as comfortable with a quill as they are with a sword. This shift from 'Birthright to Merit' has turned Neopatras into the most efficiently governed territory in Central Greece, capable of precise census-taking and rapid tax-levying."
  STATIC_MODIFIER_NAME_modifier_pat_the_port_of_sanctuary_advance: "The Port of Sanctuary"
  STATIC_MODIFIER_DESC_modifier_pat_the_port_of_sanctuary_advance: "Our ports have been declared 'Neutral Holy Ports', where merchants of all nations — Catholic, Orthodox, or otherwise — may trade in safety. This sanctuary status has turned our ports into the primary neutral ground for Mediterranean commerce. Even in times of total war, the trade of Patras continues to flow, protected by the Archbishop's ban."
  STATIC_MODIFIER_NAME_modifier_sao_the_legacy_of_the_alpha_protector_advance: "The Legacy of the Alpha Protector"
  STATIC_MODIFIER_DESC_modifier_sao_the_legacy_of_the_alpha_protector_advance: "The 'Wolf-Pacts' have reached their logical conclusion: the Hegemony is the recognized 'Alpha' of the Eastern Mediterranean. We no longer justify aggression. We simply exercise our natural mandate to 'police' the Levant. This projection of power ensures that the Greek seas remain a private lake for the merchants of Salona."
  STATIC_MODIFIER_NAME_modifier_the_the_university_of_thessalonica_advance: "The University of Thessalonica"
  STATIC_MODIFIER_DESC_modifier_the_the_university_of_thessalonica_advance: "Thessalonica has founded a royal university dedicated to the study of a diverse array of matters, blending Italian theory with local Balkan experience. This institution produces the finest students in the Frankokratia, capable of marvels. Our graduates are in high demand across the Latin world, making the Kingdom the intellectual center of innovation."
  STATIC_MODIFIER_NAME_modifier_local_nobility: "Local Nobility"
  STATIC_MODIFIER_DESC_modifier_local_nobility: "The nobles know they are simply better than other people, and will only give their loyalty to those they deem worthy. If we affirm their privileges, they will of course remember our generosity, and be more resistant to the temptations of foreign powers."
  STATIC_MODIFIER_NAME_modifier_military_traditions: "Military Traditions"
  STATIC_MODIFIER_DESC_modifier_military_traditions: "The nature of war is constantly evolving, and we must ensure that perceptions of our military evolve with it. By encouraging a tradition of service amongst our nobility, we shall entrench the idea that high social status is earned through glory on the battlefield. While bravery and combat skill remain important, true military excellence now lies in professional expertise rather than nebulous things like personal valor."
  STATIC_MODIFIER_NAME_modifier_noble_officers: "Noble Officers"
  STATIC_MODIFIER_DESC_modifier_noble_officers: "The choice of who leads our troops is a crucial one, and our nobles wish to ensure that preference is given to them when it comes to filling these roles. It will give them a chance to show their valor by giving the enemy cold steel, and we will allow them to do this."
  STATIC_MODIFIER_NAME_modifier_noble_resilience: "Noble Connections"
  STATIC_MODIFIER_DESC_modifier_noble_resilience: "The various mercenary groups on this continent are often headed by lesser nobles. By befriending the aristocracy, we can use their network of contacts to seek out more — and larger — groups of mercenary soldiers."
  STATIC_MODIFIER_NAME_modifier_international_nobility: "International Nobility"
  STATIC_MODIFIER_DESC_modifier_international_nobility: "International relations is a tricky business. Some say that the merchant class, who are used to dealing with foreigners, are best suited for this. Those who say so, however, ignore the kindred ties that our noble families have established through the years. We should take advantage of these ties to help our cause diplomatically."
  STATIC_MODIFIER_NAME_modifier_plutocracy: "The Power of Coin"
  STATIC_MODIFIER_DESC_modifier_plutocracy: "Wealth and power are not synonyms, but they are certainly related: Not only can power make someone wealthy, but wealth can also grant someone power. We understand that well, as our wealthiest members of the population are also the ones who occupy the seats of power in our country."
  STATIC_MODIFIER_NAME_modifier_abolished_serfdom: "Abolished Serfdom"
  STATIC_MODIFIER_DESC_modifier_abolished_serfdom: "We know from reading ancient Roman accounts that a citizen army of free men is far more willing to fight than those who are forced. We should give our peasants a relative amount of freedom; they will then fight more fervently to defend their homeland — and those privileges."
  STATIC_MODIFIER_NAME_modifier_tradition_of_payment: "Tradition of Payment"
  STATIC_MODIFIER_DESC_modifier_tradition_of_payment: "It is always tempting to be a little late paying soldiers of fortune — after all, you never know what sudden expenses might come along. But we will #italic not do that#!; we shall pay our mercenaries exactly on time, and mercenary captains will know this and remember this."
  STATIC_MODIFIER_NAME_modifier_free_merchants: "Free Merchants"
  STATIC_MODIFIER_DESC_modifier_free_merchants: "In more reactionary and hidebound societies, merchants are looked down upon as somehow being less than those who own land. Well, this foolish attitude is not for us; we know that wealth is power regardless of where it comes from."
  STATIC_MODIFIER_NAME_modifier_free_cities: "Free Cities"
  STATIC_MODIFIER_DESC_modifier_free_cities: "Giving our cities self-governance in matters of trade will allow us to open new, profitable trade routes."
  STATIC_MODIFIER_NAME_modifier_free_subjects: "Free Subjects"
  STATIC_MODIFIER_DESC_modifier_free_subjects: "Although giving a servant a damn good thrashing might be satisfying, it is surprisingly not the best way to make them work harder. Some natural philosopher has stumbled upon the idea of making profit the prime motivation for working people. If we replace monetary rents with payment in kind, our peasant laborers will be incentivized to produce more."
  STATIC_MODIFIER_NAME_modifier_emancipation: "Emancipation"
  STATIC_MODIFIER_DESC_modifier_emancipation: "For a long time, we have restricted land ownership to only those we felt were trustworthy enough. If we were to lift these restrictions, then land holdings could be consolidated. This in turn would create a pool of seasonal labor for whom the army life might be worth pursuing."
  STATIC_MODIFIER_NAME_modifier_mandate_of_the_khan: "Mandate of the $rank_kingdom_horde_ruler_suffix_male$"
  STATIC_MODIFIER_DESC_modifier_mandate_of_the_khan: "As the $rank_kingdom_horde_ruler_suffix_male$ commands, gods do. The unity of our people comes from their loyalty to our great leader. Only someone capable of bending the will of those loyal to the ruler is worthy of our devotion."
  STATIC_MODIFIER_NAME_modifier_there_shall_be_no_grass: "There Shall Be No Grass"
  STATIC_MODIFIER_DESC_modifier_there_shall_be_no_grass: "Where our horde has passed, the grass will never grow again; the land will no longer feed our enemies. Day and night will pass, and the ground will stay silent, no crops to be collected. Some hungers you cannot escape."
  STATIC_MODIFIER_NAME_modifier_slavery_before_death: "Slavery Before Death"
  STATIC_MODIFIER_DESC_modifier_slavery_before_death: "Razing and the destruction of cities are part of warfare. In the past, our warriors would go on a rampage, destroying and looting every item they could find, and killing those who stood in their way. While it strengthened their morale, their actions were far from economical. With this new approach, we can ensure to at least enslave those capable of work instead of blindly beheading them for the skull throne."
  STATIC_MODIFIER_NAME_modifier_horde_loyalty: "Horde Loyalty"
  STATIC_MODIFIER_DESC_modifier_horde_loyalty: "The loyalty of our people is unquestionable. No soul who has lived under the thriving rule of the $rank_kingdom_horde_ruler_suffix_male$ would think of ever leaving it."
  STATIC_MODIFIER_NAME_modifier_horde_loot_discovery_advance: "Raid Profits"
  STATIC_MODIFIER_DESC_modifier_horde_loot_discovery_advance: "Raiding has always been part of our identity. Pillaging and plundering are how our people learn to fight and obtain much of their personal fortune. There is no harm in fomenting even more raids — at least, no harm for us."
  STATIC_MODIFIER_NAME_modifier_trampling_horde: "Trampling Horde"
  STATIC_MODIFIER_DESC_modifier_trampling_horde: "$genghis_khan_name_no_tooltip$ made the world tremble with his conquests, and we will do the same. The world will learn to fear the sound of galloping hoofbeats as our riders approach!"
  STATIC_MODIFIER_NAME_modifier_watchers_of_the_silk_road: "Watchers of the Silk Road"
  STATIC_MODIFIER_DESC_modifier_watchers_of_the_silk_road: "We do not build, we do not trade. We take what we need... and sometimes more. Our warriors have kept an attentive watch upon foreign merchants and their passage, and we now know the safest paths for transporting our goods."
  STATIC_MODIFIER_NAME_modifier_logistics_of_khan: "Logistics of the $rank_kingdom_horde_ruler_suffix_male$"
  STATIC_MODIFIER_DESC_modifier_logistics_of_khan: "People forget that the conquests of the Great $rank_kingdom_horde_ruler_suffix_male$ were as much due to superior logistics as military strength. We must emulate the techniques of the Great $rank_kingdom_horde_ruler_suffix_male$ while updating them with modern knowledge. This will give us greater scope for conquest."
  STATIC_MODIFIER_NAME_modifier_populating_the_steppes: "Populating the Steppes"
  STATIC_MODIFIER_DESC_modifier_populating_the_steppes: "Just as we bring destruction to our enemies, we must bring peace to the many who reside within our borders. By upholding internal stability and encouraging talented men and women from all over our empire to plan and populate new and great cities, we will tame the steppes."
  STATIC_MODIFIER_NAME_modifier_a_magnanimous_empire: "A Magnanimous Empire"
  STATIC_MODIFIER_DESC_modifier_a_magnanimous_empire: "The Great $rank_kingdom_horde_ruler_suffix_male$ was not only known for his fearsome sword, but also for the exceptional generosity towards those who wisely bent the knee to him. Those who welcome the rule of our tolerant empire shall be treated as part of it."
  STATIC_MODIFIER_NAME_modifier_horde_ardor: "Horde Ardor"
  STATIC_MODIFIER_DESC_modifier_horde_ardor: "Our horses are almost as fierce and terrifying to our enemies as their riders are. The sight of our cavalry marching to war is like watching an unstoppable force of demons from hell."
  STATIC_MODIFIER_NAME_modifier_friends_in_high_places: "Friends in High Places"
  STATIC_MODIFIER_DESC_modifier_friends_in_high_places: "There is only one path that will lead us to undying, everlasting happiness. To know the divine is to also know its sacred agents on this Earth, who will help us find that path."
  STATIC_MODIFIER_NAME_modifier_flesh_is_weak: "Flesh is Weak"
  STATIC_MODIFIER_DESC_modifier_flesh_is_weak: "The flesh may be weak and corruptible, but the soul is not. Our armies have learned to fight as if they shared the same soul, and thus their morale can never be broken."
  STATIC_MODIFIER_NAME_modifier_alpha_and_omega: "Alpha and Omega"
  STATIC_MODIFIER_DESC_modifier_alpha_and_omega: "Our faith is the beginning and end of all things. The voice of our god shall be the only sound that our enemies hear above the screams of the battle; the words of our faith shall lead them to the truth."
  STATIC_MODIFIER_NAME_modifier_printing_of_religious_texts: "Religious Text Printing"
  STATIC_MODIFIER_DESC_modifier_printing_of_religious_texts: "Establishing procedures to print, commercialize, and distribute religious texts are the necessary next steps towards increasing our piety and literacy!\n\nUnlocks the [ShowEstatePrivilegeName('sponsor_printing_of_religious_texts')] privilege."
  STATIC_MODIFIER_NAME_modifier_conviction_of_sin: "Conviction of Sin"
  STATIC_MODIFIER_DESC_modifier_conviction_of_sin: "Those who have done wrong will fall to their knees under the heavy weight of their own wickedness! Their evil deeds shall haunt them forevermore, and they will not sleep until they have atoned for the devious nightmares they themselves have caused."
  STATIC_MODIFIER_NAME_modifier_martyrs: "Martyrs"
  STATIC_MODIFIER_DESC_modifier_martyrs: "A martyr is someone who understands that dying on behalf of their faith is the highest of honors. The people of our land keep their faith close to their hearts, and are always keen to join our cause. If they die as martyrs, it is an honor and not a tragedy."
  STATIC_MODIFIER_NAME_modifier_divine_passion: "Divine Passion"
  STATIC_MODIFIER_DESC_modifier_divine_passion: "Times are changing. Faith was once the most important thing in our lives, but now, ideas once seen as blasphemous are spreading among the common folk. In the face of an evolving world, our clergy finds solace in their unshaken dedication to our cause."
  STATIC_MODIFIER_NAME_modifier_kgk_emerging_clan: "Emerging Clan"
  STATIC_MODIFIER_DESC_modifier_kgk_emerging_clan: "Despite our impressive ancestry, our clan is very new, as our split from the Sasaki clan is relatively recent. Our people are eager to prove their worth as scions of an independent name."
  STATIC_MODIFIER_NAME_modifier_akt_ezo_kanrei: "$ezo_area$ Kanrei"
  STATIC_MODIFIER_DESC_modifier_akt_ezo_kanrei: "The position of the $ezo_area$ #italic Kanrei#!, or administrator of $ezo_area$, has been assigned to our clan since the time of the $kamakura$ Shogunate. We are in charge of managing the island as a place of exile for criminals, necessitating constant communication across the strait."
  STATIC_MODIFIER_NAME_modifier_asa_control_of_buddhist_sects: "Control of $buddhist_ADJ$ Sects"
  STATIC_MODIFIER_DESC_modifier_asa_control_of_buddhist_sects: "$echizen_province$ is home to many important temples representing different sects, such as the Eiheiji of the Sōtō tradition and the Heisenji of the Tendai tradition, among others. If we could bring all of them under our control and establish religious peace throughout the province, it would be the foundation of an ideal religious policy for our entire nation."
  STATIC_MODIFIER_NAME_modifier_cba_dream_of_masakado: "Dream of Masakado"
  STATIC_MODIFIER_DESC_modifier_cba_dream_of_masakado: "$taira_dynasty$ no Masakado, a great warrior and close kinsman of our clan, once tried to become the Emperor of Eastern $japan_region$. Sadly, Masakado could not fulfill his ambition, but his dream of founding a new nation of samurai should be our guiding star."
  STATIC_MODIFIER_NAME_modifier_csk_god_of_arts: "God of the Arts"
  STATIC_MODIFIER_DESC_modifier_csk_god_of_arts: "The ancestral founder of our clan, Hata no Kawakatsu, was highly admired as the patron god of all art, from traditional dances to theater. Our clan must live up to his legacy if we are to earn the respect we deserve."
  STATIC_MODIFIER_NAME_modifier_dte_oshu_shugo: "Ōshū Shugo"
  STATIC_MODIFIER_DESC_modifier_dte_oshu_shugo: "As an honorable clan dating back to the early $kamakura$ period, we have a strong claim to rule over the entire Ōshū province. Fortunately for us, what land Ōshū exactly covers is not well-defined."
  STATIC_MODIFIER_NAME_modifier_htk_shogunate_ties: "Shogunate Ties"
  STATIC_MODIFIER_DESC_modifier_htk_shogunate_ties: "As a clan descending from one of the branches of the $ashikaga_dynasty$, we have particularly strong ties to the authority of the Shogunate. As long as we maintain this association, our clan will continue to be held in high regard."
  STATIC_MODIFIER_NAME_modifier_hsk_branches_and_retainers: "Branches and Retainers"
  STATIC_MODIFIER_DESC_modifier_hsk_branches_and_retainers: "Our widespread clan controls rich territories through a network of loyal kinsmen and retainers. By maintaining internal harmony in our dynasty, our clan will become one of the most powerful in $JAP$."
  STATIC_MODIFIER_NAME_modifier_img_claim_to_shogunate: "Claim to the Shogunate"
  STATIC_MODIFIER_DESC_modifier_img_claim_to_shogunate: "As our clan is descended from the $ashikaga_dynasty$ family, we have a strong claim on the position of $JAPANESE_SHOGUNATE_LEADER_MALE$, should the main line perish. Even if the Bakufu is not threatened, it would still be in our best interests to remind everyone of our legitimacy. Just in case it ever becomes relevant..."
  STATIC_MODIFIER_NAME_modifier_isk_minister_of_samurai_dokoro: "Minister of Samurai-Dokoro"
  STATIC_MODIFIER_DESC_modifier_isk_minister_of_samurai_dokoro: "We are one of four powerful clans traditionally appointed to be the chief of military and police in the Samurai-Dokoro. It is thus our responsibility, and our privilege, to keep the peace in the capital and other important places."
  STATIC_MODIFIER_NAME_modifier_kkc_resistance_against_foreign_intervention: "Resistance Against Invasions"
  STATIC_MODIFIER_DESC_modifier_kkc_resistance_against_foreign_intervention: "Our contributions to defending the country against the $MGE_ADJ$ invasions are well known. Kikuchi Takefusa's achievements in repelling the invaders are widely lauded, and all our troops aim to fight as bravely as him."
  STATIC_MODIFIER_NAME_modifier_ktb_control_of_ise: "Control of $ise_province$"
  STATIC_MODIFIER_DESC_modifier_ktb_control_of_ise: "From the wealthy south to the densely populated urban north, we have extended our control over the entire province of $ise_province$. This will allow us to fully exploit provincial resources to further the growth of our clan's influence."
  STATIC_MODIFIER_NAME_modifier_ktb_blessing_of_amaterasu: "Blessing of Amaterasu"
  STATIC_MODIFIER_DESC_modifier_ktb_blessing_of_amaterasu: "As the keepers of the holiest of $japan_region$'s shrines at $ise_province$, we are blessed by Amaterasu, goddess of the sun and the universe. We must rise to be worthy of the task of maintaining and caring for this national treasure, which will earn us the respect of the $japanese_group$ people."
  STATIC_MODIFIER_NAME_modifier_kno_ruler_of_inland_sea: "Rule Over the Inland Sea"
  STATIC_MODIFIER_DESC_modifier_kno_ruler_of_inland_sea: "The Seto Inland Sea has a special importance for trade routes of $japan_region$, and maintaining naval dominance here could make or break our clan. We must ensure that we always have a strong navy with which to control maritime trade."
  STATIC_MODIFIER_NAME_modifier_nbu_fight_against_famines: "Fighting Famine"
  STATIC_MODIFIER_DESC_modifier_nbu_fight_against_famines: "Due to cold winds in the late autumn and heavy snows until the early spring, our people often suffer from severe famines and hunger. We must build reserves of food and look into how we can improve the lands under our control to counter future catastrophes."
  STATIC_MODIFIER_NAME_modifier_ogs_shinano_shugo: "$shinano_province$ Shugo"
  STATIC_MODIFIER_DESC_modifier_ogs_shinano_shugo: "Our clan belongs to a sub-branch of the Minamoto, and rules $shinano_province$ Province as its #italic Shugo#!. Our land is mountainous and unwelcoming to many. For our people, however, it has for a long time been an integrated part of our defenses against outsiders. Let us take this experience with us wherever our armies go, and make sure to always obtain thorough information about the terrain in any region where we do battle."
  STATIC_MODIFIER_NAME_modifier_suw_suwa_taisha: "Suwa Taisha"
  STATIC_MODIFIER_DESC_modifier_suw_suwa_taisha: "Suwa Taisha at Lake Suwa is one of the oldest shrines in $japan_region$, and highly adored throughout the country. Its most important festival, #italic Onbashira-matsuri#!, proves the bravery of our people as they carry the sacred logs from the mountain to the shrine."
  STATIC_MODIFIER_NAME_modifier_otm_domination_of_kyushu: "Domination of Kyūshū"
  STATIC_MODIFIER_DESC_modifier_otm_domination_of_kyushu: "We have been designated #italic Shugo#! of $bungo_province$, $hizen_province$, and $hyuuga_province$. This positions us perfectly to claim all of Kyūshū for ourselves!"
  STATIC_MODIFIER_NAME_modifier_ouc_korea_trade: "Trade with $korea_region$"
  STATIC_MODIFIER_DESC_modifier_ouc_korea_trade: "Due to our location, we are the clan trading most actively with $korea_region$, and as a result we have a near-monopoly on many exotic goods. We must do what we can to retain this favorable position, and leverage it to out-compete any upstart that might challenge us."
  STATIC_MODIFIER_NAME_modifier_stk_kashima_jingu: "$kashima_shrine$"
  STATIC_MODIFIER_DESC_modifier_stk_kashima_jingu: "$kashima_shrine$ is one of three most important shrines in the Kantō region. This shrine is dedicated to Takemikazuchi-no-O-no-Kami, who is the god of thunder and swords, and also the patron god of $sumo$ wrestling. Our custodianship of this shrine strengthens the resolve of our armies."
  STATIC_MODIFIER_NAME_modifier_sba_access_to_northern_japan: "Ōshū Ties"
  STATIC_MODIFIER_DESC_modifier_sba_access_to_northern_japan: "Ōshū Province is our second home and where our clan originated. We must make use of our ties to Ōshū to procure some of the strong war horses native to that region."
  STATIC_MODIFIER_NAME_modifier_shn_defender_against_mongols: "Defender of $JAP$"
  STATIC_MODIFIER_DESC_modifier_shn_defender_against_mongols: "As a prominent samurai family from Northern Kyūshū, we have bravely fought against both $MGE_ADJ$ invasions. Should the need arise, we will once again rise to defend both Kyūshū and the realm at large from outside invaders."
  STATIC_MODIFIER_NAME_modifier_soo_fight_for_tsushima: "Fight for Tsushima"
  STATIC_MODIFIER_DESC_modifier_soo_fight_for_tsushima: "Lying between $asia$ and the islands of $japan_region$, our homeland of $tsushima_province$ and its surrounding waters are where countries clash and fight hard. May our own fleets be strong, so that we can not only defend our country, but also expand it!"
  STATIC_MODIFIER_NAME_modifier_tkd_takeda_ryu: "Takeda-Ryū"
  STATIC_MODIFIER_DESC_modifier_tkd_takeda_ryu: "Traditional forms of martial arts have been practiced in our family for generations. Among them, there is particular emphasis on horse riding and mounted archery, making our mounted troops much more effective soldiers than those from other clans."
  STATIC_MODIFIER_NAME_modifier_tki_banner_of_bellflower: "Bellflower Banner"
  STATIC_MODIFIER_DESC_modifier_tki_banner_of_bellflower: "Having been its Shugo for generations, our emblem is already synonymous with $mino_province$. All who live there will fight under our banner."
  STATIC_MODIFIER_NAME_modifier_ues_double_shugo: "Double Shugo"
  STATIC_MODIFIER_DESC_modifier_ues_double_shugo: "We have been appointed #italic Shugo#! of both $kouzuke_province$ and $tango_province$ Provinces. Their plentiful lands are the perfect starting point for our expansion."
  STATIC_MODIFIER_NAME_modifier_utn_legacy_of_nasu_no_yoichi: "Legacy of Nasu no Yoichi"
  STATIC_MODIFIER_DESC_modifier_utn_legacy_of_nasu_no_yoichi: "$shimotsuke_province$ was once the home of Nasu no Yoichi, who was famous for his abilities as an archer during the Genpei War. To this day, the warriors of $shimotsuke_province$ hold him in high regard; we are proud to be called 'the best archers in Kantō' and to carry on Nasu no Yoichi's legacy."
  STATIC_MODIFIER_NAME_modifier_ymn_mediate_succession_disputes: "Succession Dispute Mediation"
  STATIC_MODIFIER_DESC_modifier_ymn_mediate_succession_disputes: "As many of the other clans squabble within themselves over who is the rightful heir to whom, they turn to us to mediate their disputes. Doing so puts us in a unique position of power and trust, making it easy for us to make new allies and contacts — and to destabilize our rivals."
  STATIC_MODIFIER_NAME_modifier_akt_ainu_trade: "$ainu_culture$ Trade"
  STATIC_MODIFIER_DESC_modifier_akt_ainu_trade: "We are among the first $japanese_group$ to have established permanent trade with the $ainu_culture$. Our ships go back and forth between their lands and ours, greatly benefiting both communities."
  STATIC_MODIFIER_NAME_modifier_csk_unification_of_shikoku: "Unification of Shikoku"
  STATIC_MODIFIER_DESC_modifier_csk_unification_of_shikoku: "Shikoku is seen as a poor, isolated land by the rest of $japan_region$, where nothing of importance happens. Let them continue thinking that and overlook our unification of the island until it is too late."
  STATIC_MODIFIER_NAME_modifier_hsk_control_of_izumi_sea: "Control of the $izumi$ Sea"
  STATIC_MODIFIER_DESC_modifier_hsk_control_of_izumi_sea: "Our clan's territory has traditionally been situated around the Kii Channel. Taking control of trade entering the mainland through that point will bring us massive profits, and we shall flourish immensely."
  STATIC_MODIFIER_NAME_modifier_img_supreme_ruler_of_tokaido: "Control of the Tōkaidō"
  STATIC_MODIFIER_DESC_modifier_img_supreme_ruler_of_tokaido: "The Tōkaidō is the most important trade route between Central and Eastern $japan_region$. As our ancestral lands are in the middle of all this trade, it would behoove us to take control over the entire region, so as to reap the most benefits from local commercial activity."
  STATIC_MODIFIER_NAME_modifier_ktb_the_march_of_kitabatake_akiee: "March of Kitabatake Akiie"
  STATIC_MODIFIER_DESC_modifier_ktb_the_march_of_kitabatake_akiee: "Our honorable ancestor Kitabatake Akiie proved that even the long march from $ou_area$ to central $japan_region$ can be undertaken rapidly if one has enough determination. We must learn from this feat and train our armies in swift maneuvering, so that we can quickly move from one front to another as needed."
  STATIC_MODIFIER_NAME_modifier_nbu_northern_horses: "Northern Horses"
  STATIC_MODIFIER_DESC_modifier_nbu_northern_horses: "Mutsu has ranches, from which horses were sent to $kyoto$ in ancient times. The tradition of horse farming continues until today, and is one we should cultivate, as it allows us to raise cavalry more easily than many of our neighbors."
  STATIC_MODIFIER_NAME_modifier_oda_generals: "$ODA$ Generals"
  STATIC_MODIFIER_DESC_modifier_oda_generals: "Obsession with birth and privilege has made this country weak, and the rise of self-made powerful clans throughout the realm has clearly proven how useless such notions can be. Let us take this lesson to heart, and allow success and skill be the guiding principles for who should rise to command our armies. Strong leadership is a requirement for rapid expansion."
  STATIC_MODIFIER_NAME_modifier_ogs_kiso_uma: "Kiso-Uma"
  STATIC_MODIFIER_DESC_modifier_ogs_kiso_uma: "Horses from the Kiso area are our preferred breed. They are not as high nor as fast as other types, but they make up for it with high stamina, and are sturdy enough to survive in the mountains."
  STATIC_MODIFIER_NAME_modifier_otm_nanban_trade: "Welcoming the Nanban Trade"
  STATIC_MODIFIER_DESC_modifier_otm_nanban_trade: "Others may denounce foreigners as barbarians, but we recognize the benefits and advantages of trading with them. Let it be known that they will always be welcome in our ports — and we will be able to expand our trade network further than our rivals."
  STATIC_MODIFIER_NAME_modifier_ouc_fight_against_wokou: "Countering Piracy"
  STATIC_MODIFIER_DESC_modifier_ouc_fight_against_wokou: "In order to retain good relations with nations on the continent for the sake of our traders, we must mount constant sea patrols. As long as pirates and smugglers are common in our waters, foreigners will not trust us, and may even act against us."
  STATIC_MODIFIER_NAME_modifier_sba_shiba_retainers: "$SBA$ Retainers"
  STATIC_MODIFIER_DESC_modifier_sba_shiba_retainers: "We have talented, but ambitious vassals in our clan. They are a frequent cause of familial friction, and we would be wise to rein them in. Then again, close supervision and lavish, yet strategic rewards could turn these powerful families into the greatest assets of our rule."
  STATIC_MODIFIER_NAME_modifier_smz_tsurinobuse: "Tsurinobuse"
  STATIC_MODIFIER_DESC_modifier_smz_tsurinobuse: "#italic Tsurinobuse#!, 'lure and ambush', is our most effective tactic. This strategy enables us to beat enemies when we are vastly outnumbered, which is of course a very valuable skill. We must make this a central tactic of our armies, and give the dull-witted commanders of rival clans a little surprise."
  STATIC_MODIFIER_NAME_modifier_shn_diplomacy_through_tsushima: "Diplomacy Through Tsushima"
  STATIC_MODIFIER_DESC_modifier_shn_diplomacy_through_tsushima: "Thanks to our presence in $tsushima_province$, we have a wealth of experience in negotiating with $korea_region$. This way, we have always been able to keep a channel open to the outside world, even during times when official relations were forbidden."
  STATIC_MODIFIER_NAME_modifier_soo_bahan_ship: "Bahan Ship"
  STATIC_MODIFIER_DESC_modifier_soo_bahan_ship: "Our privateer ships fly the flag of Hachiman, spreading terror wherever they go. No one would dare attack a fleet protected by the god of war himself!"
  STATIC_MODIFIER_NAME_modifier_tki_flood_control_of_three_rivers: "Flood Control"
  STATIC_MODIFIER_DESC_modifier_tki_flood_control_of_three_rivers: "In our home province, the three big rivers of Kiso, Nagara, and Ibi often cause serious flooding in our rice fields. We should control this overflow, and use it to increase the yield in all provinces under our rule."
  STATIC_MODIFIER_NAME_modifier_ues_eastern_power: "Eastern Power"
  STATIC_MODIFIER_DESC_modifier_ues_eastern_power: "Although we have been granted territory in both eastern and western $japan_region$, it is in the east where we will truly be able to flourish. Our territories there are rich, and we can attract many skilled local warriors to fight for our cause."
  STATIC_MODIFIER_NAME_modifier_utn_mediator_of_kanto: "Mediator of Kantō"
  STATIC_MODIFIER_DESC_modifier_utn_mediator_of_kanto: "As one of the oldest clans in Kantō, we have a keen insight into regional politics, and have worked as a mediator between different factions on many occasions. This same comprehensive understanding of our home region allows us to expand our territory effectively without provoking others."
  STATIC_MODIFIER_NAME_modifier_ymn_leader_of_western_army: "The Western Army"
  STATIC_MODIFIER_DESC_modifier_ymn_leader_of_western_army: "Let us forge a great western army to unite the squabbling states of $japan_region$. Skillful generals, well-trained soldiers, and ironclad bravery will easily force the Easterners to their knees!"
  STATIC_MODIFIER_NAME_modifier_ask_defender_of_the_imperial_court: "Defenders of the Imperial Court"
  STATIC_MODIFIER_DESC_modifier_ask_defender_of_the_imperial_court: "When the $kamakura$ Shogunate fell, we were the ones who protected the Emperor and the Imperial Court. This has afforded us a position at the forefront of all clans in $JAP$, as the true protector of the Empire and its courtly traditions."
  STATIC_MODIFIER_NAME_modifier_ask_bugyoshu_and_hokushu: "Bugyōshū and Hōkōshū"
  STATIC_MODIFIER_DESC_modifier_ask_bugyoshu_and_hokushu: "We must strengthen the authority of our administrative officials, such as the Bugyōshū magistrates and the Hōkōshū commanders. A strong bureaucracy can sometimes be the only thing that stands between us and an open civil war."
  STATIC_MODIFIER_NAME_modifier_ask_higashiyama_culture: "Higashiyama Culture"
  STATIC_MODIFIER_DESC_modifier_ask_higashiyama_culture: "Built around the ascetics of Zen $buddhism$, Higashiyama culture sees beauty in simplicity. It has promoted development of the formal tea ceremony, #italic ikebana#! flower arrangements, theater, and art. This blossoming of culture has brought great prestige to those who practice the arts, and will reflect well upon our realm."
  STATIC_MODIFIER_NAME_modifier_cba_irrigation_of_southern_kanto: "Irrigation of Southern Kantō"
  STATIC_MODIFIER_DESC_modifier_cba_irrigation_of_southern_kanto: "Large parts of our domain is marshland that cannot support intensive agriculture. Recent developments in irrigation technology, however, make it possible to drain marshes and cultivate new arable lands. Let us undertake a grand project of developing these otherwise useless lands; we stand to profit enormously."
  STATIC_MODIFIER_NAME_modifier_csk_expand_the_navy: "Expand the Navy"
  STATIC_MODIFIER_DESC_modifier_csk_expand_the_navy: "$japan_region$ is a nation of islands, and as a result, a strong navy is an absolute necessity. $tosa_province$ is an ideal place to begin building an armada of our own."
  STATIC_MODIFIER_NAME_modifier_dte_dragon_of_oshu: "Dragon of Ōshū"
  STATIC_MODIFIER_DESC_modifier_dte_dragon_of_oshu: "Our might and power will be the envy of our enemies. Our name will forever be associated with the Dragon of Ōshū."
  STATIC_MODIFIER_NAME_modifier_htk_clan_spread: "Clan Spread"
  STATIC_MODIFIER_DESC_modifier_htk_clan_spread: "Our clan is not content to occupy a single location, and we do our utmost to project our influence all over the country. No matter how far it may spread, our clan authority must be unquestionable in all our holdings."
  STATIC_MODIFIER_NAME_modifier_img_unlikely_alliances: "Unlikely Alliances"
  STATIC_MODIFIER_DESC_modifier_img_unlikely_alliances: "Sometimes, the best way to defeat an enemy is to make them your friend. Securing our rule through strategic marriages will not only pacify our foes and gain us new allies, but will also ensure that we can ultimately dominate our rivals through blood."
  STATIC_MODIFIER_NAME_modifier_ito_sympathy_to_foreign_faiths: "Sympathy for New Faiths"
  STATIC_MODIFIER_DESC_modifier_ito_sympathy_to_foreign_faiths: "Foreigners coming to our land bring with them foreign beliefs. We must of course make sure that this is harmless to our traditional belief systems, but as long as there is no risk to us, we see no reason to disallow people from choosing their own faith."
  STATIC_MODIFIER_NAME_modifier_kno_murakami_suigun: "Murakami Suigun"
  STATIC_MODIFIER_DESC_modifier_kno_murakami_suigun: "The Murakami clan is well-known for committing piracy in the Seto Inland Sea. Let us integrate them fully in our own clan, and send these fearsome privateers after our enemies!"
  STATIC_MODIFIER_NAME_modifier_mri_munakata_three_goddesses: "Munakata Three Goddesses"
  STATIC_MODIFIER_DESC_modifier_mri_munakata_three_goddesses: "The three daughters of Susanoo-no-Mikoto are patron goddesses of the sea and navigation. Their blessings will make our navies unstoppable."
  STATIC_MODIFIER_NAME_modifier_oda_tenka_fubu: "Tenka Fubu"
  STATIC_MODIFIER_DESC_modifier_oda_tenka_fubu: "It is clearly our destiny to hold all the country within our grasp. None shall resist our authority, and all under Heaven will bend to our military might."
  STATIC_MODIFIER_NAME_modifier_oda_triple_firing: "Triple Firing"
  STATIC_MODIFIER_DESC_modifier_oda_triple_firing: "The advent of firearms has and will continue to revolutionize warfare in $japan_region$, and through mastering these new weapons, we can dominate any battlefield. In order to increase the rate of their fire, our arquebusiers will form ranks, allowing one line to fire while two others reload."
  STATIC_MODIFIER_NAME_modifier_ogs_improvment_of_nakasendo: "Improving the Nakasendō"
  STATIC_MODIFIER_DESC_modifier_ogs_improvment_of_nakasendo: "The Nakasendō is one of the most important routes between central and eastern $japan_region$. Controlling it also means controlling the trade that flows through it."
  STATIC_MODIFIER_NAME_modifier_otm_christian_conversion: "$christian_ADJ$ Converts"
  STATIC_MODIFIER_DESC_modifier_otm_christian_conversion: "Our increasing interactions with foreigners have sparked an interest in $christian$ for many in our clan. The $christian_ADJ$ people have many powerful advocates among our lords and vassals, and few are as zealous as recent converts. Let us make good use of these $christian_ADJ$ converts, regardless of which route our own clan takes, and use their influence and zeal to further our own agenda."
  STATIC_MODIFIER_NAME_modifier_ouc_welcome_missionaries: "Welcome the Westerners"
  STATIC_MODIFIER_DESC_modifier_ouc_welcome_missionaries: "As our trade network expands, we come in more frequent contact with foreigners and their strange habits and faiths. Regardless of what they believe, their coin is good enough; we should appear to be open to their ideas as we are to their business if we wish to secure repeat commerce."
  STATIC_MODIFIER_NAME_modifier_stk_eastern_coalitions: "Eastern Coalitions"
  STATIC_MODIFIER_DESC_modifier_stk_eastern_coalitions: "Regardless of the hostile clans around us, we have always presented ourselves as a reasonable third party for other clans to attach themselves to for protection against invaders. This tradition of eastern coalitions will serve us well, as long as we make sure that the clans who rely on us never have to worry about protection."
  STATIC_MODIFIER_NAME_modifier_smz_shimazu_charge: "$SMZ$ Charge"
  STATIC_MODIFIER_DESC_modifier_smz_shimazu_charge: "Even when surrounded and outnumbered, our soldiers will keep marching forward until they reach the other side of the enemy lines. The charge of our troops will be legendary!"
  STATIC_MODIFIER_NAME_modifier_smz_tanegashima: "Tanegashima Teppō"
  STATIC_MODIFIER_DESC_modifier_smz_tanegashima: "The Westerners who first landed on Tanegashima brought with them new and interesting weapons. These arquebuses are becoming an increasingly common sight all over $japan_region$, but nowhere have they been available for as long as here."
  STATIC_MODIFIER_NAME_modifier_tkd_tiger_of_kai: "Tiger of Kai"
  STATIC_MODIFIER_DESC_modifier_tkd_tiger_of_kai: "Strong leaders are better at safeguarding their domains than any number of imposing castles. Our generals must train hard, and earn the right to be called the 'Tiger of Kai'."
  STATIC_MODIFIER_NAME_modifier_tkd_fuurinkazan: "Fūrinkazan"
  STATIC_MODIFIER_DESC_modifier_tkd_fuurinkazan: "'Swift like the wind, gentle like the forest, aggressive like fire, immovable like a mountain.' The words of the great war master Sun Tzu shall be permanently etched into our family's history, and shall serve as our motto."
  STATIC_MODIFIER_NAME_modifier_ues_dragon_of_echigo: "Dragon of Echigo"
  STATIC_MODIFIER_DESC_modifier_ues_dragon_of_echigo: "Our clan has fostered such an extraordinary spirit of courage and justice that it intimidates our opponents on the battlefield. We will declare the strength of our leaders to all the world, and everyone will quake with terror at the thought of the Dragon of Echigo!"
  STATIC_MODIFIER_NAME_modifier_ymn_isolated_heartland: "Isolated Heartland"
  STATIC_MODIFIER_DESC_modifier_ymn_isolated_heartland: "Our homeland is mountainous and isolated. Fortunately, this also means that any potential conquerors would find our territory almost impossible to reach! Let us build our defenses so that they complement the natural protective strength of our geography — any invader will bitterly regret the day they turned their greedy eyes to our possessions."
  STATIC_MODIFIER_NAME_modifier_ask_shugo_system: "Shugo System"
  STATIC_MODIFIER_DESC_modifier_ask_shugo_system: "#italic Shugo#! are important vassals for the Shogunate, administrating the lands in name of the $JAPANESE_SHOGUNATE_LEADER_MALE$. Thanks to them, we can administer our lands better and more efficiently."
  STATIC_MODIFIER_NAME_modifier_dte_intensive_domain_development: "Intensive Domain Development"
  STATIC_MODIFIER_DESC_modifier_dte_intensive_domain_development: "Many dismiss $ou_area$ as poor due to its harsh weather and mountains, yet the region holds great potential. Through infrastructure investment — new towns, waterways, expanded cultivation — and by abolishing stifling tolls and taxes, we can substantially improve our heartland and make our subjects wealthy."
  STATIC_MODIFIER_NAME_modifier_img_march_to_kyoto: "March to $kyoto$"
  STATIC_MODIFIER_DESC_modifier_img_march_to_kyoto: "In these dangerous times when $japan_region$ and $kyoto$ are mired in political chaos, anyone could march into the capital and seize power. As close kinsmen of the $ashikaga_dynasty$, it is our obligation — and our right — to ensure the stability of the country."
  STATIC_MODIFIER_NAME_modifier_oda_influential_strongholds: "Influential Strongholds"
  STATIC_MODIFIER_DESC_modifier_oda_influential_strongholds: "$japan_region$ is a land of castles and fortifications. It is through the construction of strong defensive positions that one can assert influence both over the political realm and the routes vital to military campaigns. This learning is one we must take to heart. It is also through our castles that we impose our presence and power upon the common people. At all times, we must prioritize the reduction of enemy fortifications and the erection of our own in strategic locations."
  STATIC_MODIFIER_NAME_modifier_oda_patronization_of_the_west: "Patronization of the West"
  STATIC_MODIFIER_DESC_modifier_oda_patronization_of_the_west: "Western missionaries brought many ideas and techniques to our land, and unlike the $buddhist_ADJ$ sects of old, they have no previous ties to corrupt landowners or rebellious cities. We should welcome these foreigners into our cities, and see what benefits they could bring to our court."
  STATIC_MODIFIER_NAME_modifier_smz_early_westernization: "Early Westernization"
  STATIC_MODIFIER_DESC_modifier_smz_early_westernization: "Thanks to frequent early contact with Western countries, we have learned a lot about foreign technology and other innovations. Using this knowledge, we can carry out reforms in economy, industry, and education that will help gain an edge over other clans."
  STATIC_MODIFIER_NAME_modifier_expanded_slave_trade: "Control the Slave Trade"
  STATIC_MODIFIER_DESC_modifier_expanded_slave_trade: "The demand for $slaves_goods$ from external traders grows greater by the day. Our position in $africa$ makes us the ideal middlemen for this trade. Let us encourage those that seek slave markets to do so in our lands, and to make their business in our marketplaces."
  STATIC_MODIFIER_NAME_modifier_gifts_and_hostages: "Gifts and Hostages"
  STATIC_MODIFIER_DESC_modifier_gifts_and_hostages: "While our people are now united, the act of bending the knee to a common overlord has not come easy to them. By summoning all subjugated rulers to the capital, we can employ them as prestigious royal envoys. Some would call this a policy of hostage-taking; we simply see it as a way to remind our more independent-minded subjects of their loyalties."
  STATIC_MODIFIER_NAME_modifier_people_of_ornaments: "People of Ornamentation"
  STATIC_MODIFIER_DESC_modifier_people_of_ornaments: "Our artisans are renowned far and wide, and it is said that they cannot leave a surface undecorated. Let us make the most of this reputation, and promote their creations as much as possible."
  STATIC_MODIFIER_NAME_modifier_courtly_competition: "Courtly Competition"
  STATIC_MODIFIER_DESC_modifier_courtly_competition: "A preoccupied noble is a well-behaved noble. There are so many courtly titles in our realms that some say half of our men have one. Let us make sure our courtiers spend their time competing with one another for attention and visibility; they will be too busy to plot against our rule."
  STATIC_MODIFIER_NAME_modifier_overnight_army: "An Army Overnight"
  STATIC_MODIFIER_DESC_modifier_overnight_army: "Our capital and other cities are built using army camps as a model. They have wings, vanguards, and fronts. In ensuring that military thinking permeates daily life, we will improve our overall combat readiness."
  STATIC_MODIFIER_NAME_modifier_mining_tradition: "Mining Tradition"
  STATIC_MODIFIER_DESC_modifier_mining_tradition: "Our land is rich in rare materials, ready to be ripped from the earth and sold to foreign merchants for large profits. We would be foolish not to exploit this."
  STATIC_MODIFIER_NAME_modifier_intercontinental_trade: "Far-Reaching Trade"
  STATIC_MODIFIER_DESC_modifier_intercontinental_trade: "Our merchants frequently bring back fascinating things from the courts of faraway countries. Perhaps it would be possible to reach even further shores?"
  STATIC_MODIFIER_NAME_modifier_expanded_grazing_grounds: "Expanded Grazing Grounds"
  STATIC_MODIFIER_DESC_modifier_expanded_grazing_grounds: "Our territory has plenty of land which is well-suited for grazing animal herds, making it easy for us to expand our output of $livestock$."
  STATIC_MODIFIER_NAME_modifier_african_sturdy_grains_advance: "Sturdy Grains Agriculture"
  STATIC_MODIFIER_DESC_modifier_african_sturdy_grains_advance: "A stronger focus on agricultural production will help our people thrive. Thankfully, we have the ample space and fertile soil necessary to grow a number of crops."
  STATIC_MODIFIER_NAME_modifier_riches_of_asia: "Riches of $asia$"
  STATIC_MODIFIER_DESC_modifier_riches_of_asia: "$asia$ is famous around the world for its riches. From the bountiful cities of $persia_region$ and $india$, to the highly-sought luxury items produced in $china$, to the almost mythical Spice Islands in $indonesia_region$, the luxurious goods coming from $asia$ are highly prized worldwide."
  STATIC_MODIFIER_NAME_modifier_silk_road: "Silk Road"
  STATIC_MODIFIER_DESC_modifier_silk_road: "Be it the land route crossing the Gobi Desert and $persia_region$, or its ocean counterpart through the $indian_ocean_region$ and $indonesia_region$, the lands of $asia$ have been for centuries traversed by merchants seeking profit on the famous Silk Road."
  STATIC_MODIFIER_NAME_modifier_exchange_of_ideas: "Exchange of Ideas"
  STATIC_MODIFIER_DESC_modifier_exchange_of_ideas: "Not only do coin and profit move along the $silk_road$, but ideas and knowledge also follow the ebb and flow of the merchants traveling along its path."
  STATIC_MODIFIER_NAME_modifier_legacy_of_great_empires: "Legacy of Great Empires"
  STATIC_MODIFIER_DESC_modifier_legacy_of_great_empires: "From the Dragon Throne of $china$, to the various empires of $persia_region$, to the powerful $hindu_ADJ$ and $buddhist_ADJ$ dynasties of $india$ and $south_east_asia$, $asia$ has been home to many mighty empires throughout history."
  STATIC_MODIFIER_NAME_modifier_arduous_terrain: "Arduous Terrain"
  STATIC_MODIFIER_DESC_modifier_arduous_terrain: "$asia$ is home to some very inhospitable lands, from the high peaks of the Himalaya, to the arid span of the Gobi Desert, to the dense jungles of $india$ and $south_east_asia$. And that does not even include the monsoon and typhoon seasons, and the almost constant present of earthquakes! Its people have learned to live in such an unwelcoming environment, but invaders will not find it so easy."
  STATIC_MODIFIER_NAME_modifier_fertile_lands: "Fertile Lands"
  STATIC_MODIFIER_DESC_modifier_fertile_lands: "In general, the lands of $asia$ are blessed with plentiful rain, and many rivers cross its territories even in areas with less precipitation. Except for some of the most arid areas of the desert, our land provides ample food to our population. Even in those regions where it does not, the people living there are able to do much with what they have."
  STATIC_MODIFIER_NAME_modifier_crossroads_of_religions: "Crossroads of Religions"
  STATIC_MODIFIER_DESC_modifier_crossroads_of_religions: "$hindu$, $buddhist$, $muslim$, and even $tengri$ are religions that have expanded into parts of the world very far from their places of origin. $asia$ has witnessed this exchange of beliefs for centuries, and in many cases the blending and syncretism that has happened among them."
  STATIC_MODIFIER_NAME_modifier_religious_syncretism: "Religious Syncretism"
  STATIC_MODIFIER_DESC_modifier_religious_syncretism: "Interaction between beliefs sometimes results in synthesis rather than rejection. Foreign thoughts and practices should therefore not be seen as hostile threats, but opportunities to learn, and possibly incorporate valuable elements into our own traditions."
  STATIC_MODIFIER_NAME_modifier_source_of_knowledge: "Source of Knowledge"
  STATIC_MODIFIER_DESC_modifier_source_of_knowledge: "While foreign nations pride themselves on being at the forefront of knowledge and development, some of their recent 'inventions' have been known in $asia$ for centuries. From the technological prowess of $china$ to the ancient literature of $india$, there is nothing for the East to envy from the West."
  STATIC_MODIFIER_NAME_modifier_structured_society: "Structured Society"
  STATIC_MODIFIER_DESC_modifier_structured_society: "Religious and philosophical traditions, particularly those of $hindu$ and $SECT_CONFUCIANISM_NAME$, have historically influenced social organization in parts of $asia$, emphasizing proscribed role fulfillments within social hierarchies. The rigidity of living within these systems is offset by the relative ease with which social order is maintained."
  STATIC_MODIFIER_NAME_modifier_incense_preeminence: "$incense$ Preeminence"
  STATIC_MODIFIER_DESC_modifier_incense_preeminence: "$incense$ has been a staple of life in $asia$ for centuries, maybe more so than anywhere in the world. Although other religions also use it for their rituals, its near-ubiquity in $hindu_ADJ$ and $buddhist_ADJ$ ceremonies, as well as its everyday use by $muslim$ people, give it a constant presence anywhere in $asia$."
  STATIC_MODIFIER_NAME_modifier_incense_trade_route: "$incense$ Trade Route"
  STATIC_MODIFIER_DESC_modifier_incense_trade_route: "The high demand for $incense$, not only in $asia$ but also beyond it, requires the establishment of many trade routes dedicated to its commerce. Akin to the more famous $silk_road$, this trade of $incense$ links the East with the West."
  STATIC_MODIFIER_NAME_modifier_wake_of_the_mongol_horde: "Wake of the $MGE_ADJ$ Horde"
  STATIC_MODIFIER_DESC_modifier_wake_of_the_mongol_horde: "There is almost no place in $asia$ that has not felt the influence of the $MGE_ADJ$ conquests. After the fall of the once-great empire forged by $genghis_khan_name_no_tooltip$, the land is finally recovering from being trampled by his horses."
  STATIC_MODIFIER_NAME_modifier_cultural_melting_pot: "Cultural Melting Pot"
  STATIC_MODIFIER_DESC_modifier_cultural_melting_pot: "$asia$ is a highly diverse region, home to a wide variety of cultures. This diversity, and the cultural exchange and blended influences that result from it, has empowered our countries and allowed them to flourish in every domain from architecture to music to horticulture, and beyond."
  STATIC_MODIFIER_NAME_modifier_rise_of_great_individuals: "Rise of Great Individuals"
  STATIC_MODIFIER_DESC_modifier_rise_of_great_individuals: "History proves that the most extraordinary individuals are the ones who rise to prominence and achieve great things. Time and again, empires have been forged or destroyed by the hand of a single ruler, and such achievements are to be respected and admired."
  STATIC_MODIFIER_NAME_modifier_sepak_takraw: "Sepak Takraw"
  STATIC_MODIFIER_DESC_modifier_sepak_takraw: "Having been practiced all over $south_east_asia$ for a long time since its adaptation from the ancient $chinese_group$ #italic Cùjū#!, and also known as #italic Sepak Raga#!, #italic Takraw#!, #italic Chinlone#!, or #italic Sipa#! depending on the country, #italic $sepak_takraw$#! is not just a game. Although the objective is to kick a ball between players and keep it in the air, it is also a way to have regular physical exercise, and thus played not only for entertainment but as military training for the army."
  STATIC_MODIFIER_NAME_modifier_three_teachings: "Three Teachings"
  STATIC_MODIFIER_DESC_modifier_three_teachings: "The $three_teachings$ are a philosophy originating from $CHI$ which combines the teachings of $SECT_CONFUCIANISM_NAME$, $SECT_DAOISM_NAME$ and $buddhist$ into a harmonious, singular teaching. $SECT_CONFUCIANISM_NAME$ represents the ideology of the law while $SECT_DAOISM_NAME$ is the worldview of the radical intellectuals. These two opposite ends of the philosophical spectrum would then be connected with the philosophies of $buddhist$."
  STATIC_MODIFIER_NAME_modifier_expansionist_ambitions: "Expansionist Ambitions"
  STATIC_MODIFIER_DESC_modifier_expansionist_ambitions: "As the Balkans fractured, many rising powers looked outward. Ambitious rulers pursued integration of diverse lands under a single, stronger crown, taking advantage of $BYZ_ADJ$ weakness."
  STATIC_MODIFIER_NAME_modifier_poklisars: "Poklisars"
  STATIC_MODIFIER_DESC_modifier_poklisars: "Since the earliest days of our nation, we have often cast our gaze beyond our borders, be it to establish profitable trade routes, placate formidable neighbors and build alliances, or even to forge robust partnerships against common adversaries. #italic Poklisars#! are the ambassadors who carry out these missions in our name."
  STATIC_MODIFIER_NAME_modifier_ukrainian_farmlands: "Ukrainian Farmlands"
  STATIC_MODIFIER_DESC_modifier_ukrainian_farmlands: "Ukraine, or the 'borderlands' in $slavic$ language, is one of the most fertile regions in $europe$. The lands along both banks of the great rivers are renowned for their rich black soil, yielding abundant harvests of grain, legumes, and fiber crops. Whoever holds these territories commands a significant agricultural advantage, supplying their realm's granaries and the markets of $europe$."
  STATIC_MODIFIER_NAME_modifier_indonesia_naval_supremacy: "Naval Prowess"
  STATIC_MODIFIER_DESC_modifier_indonesia_naval_supremacy: "Our political relevance within the archipelago almost solely relies on the strength of our naval forces. By improving our shipwrighting techniques and crew training, we will ensure our domination over the lesser states of $indonesia_region$."
  STATIC_MODIFIER_NAME_modifier_indonesia_trading_hub_of_the_east: "Trade Hub of the East"
  STATIC_MODIFIER_DESC_modifier_indonesia_trading_hub_of_the_east: "No matter their origin or destination, every trader in $asia$ will eventually have to cross our lands, bringing both precious goods and tales of their travels with them."
  STATIC_MODIFIER_NAME_modifier_indonesia_archipelago_of_many_faiths: "Land of Many People"
  STATIC_MODIFIER_DESC_modifier_indonesia_archipelago_of_many_faiths: "Our islands are home to many different people, speaking different languages and believing in many different gods. Only if we establish a common understanding and tolerance between them can we secure a prosperous country."
  STATIC_MODIFIER_NAME_modifier_italy_great_families: "Great Families of $ITA$"
  STATIC_MODIFIER_DESC_modifier_italy_great_families: "After the foundation of our unified $ITA_ADJ$ state, we have absorbed many great noble families into our country. We should utilize their prestige and reputation to improve our own, while keeping those capable people busy."
  STATIC_MODIFIER_NAME_modifier_italian_innovativeness: "$ITA_ADJ$ Adaptiveness"
  STATIC_MODIFIER_DESC_modifier_italian_innovativeness: "With the flourishing of the $renaissance$ came a deeper understanding of what great strides human achievement can take. If we wish to truly be a nation of progress, we must adapt to these new ideas without fear, and never allow innovation to be obstructed."
  STATIC_MODIFIER_NAME_modifier_italian_condottieri: "Great Condottieri Captains"
  STATIC_MODIFIER_DESC_modifier_italian_condottieri: "Our nation is renowned for producing great military minds, whether they serve their own interests or are sworn in loyalty to the state. We should ensure that these adept intellects are willing to serve us first and foremost."
  STATIC_MODIFIER_NAME_modifier_maple_syrup: "Maple Syrup"
  STATIC_MODIFIER_DESC_modifier_maple_syrup: "The many maple trees in our country produce great quantities of sap, which can be collected and boiled to create a delicious sweet syrup and other confections."
  STATIC_MODIFIER_NAME_modifier_stickball_game: "Stickball Game"
  STATIC_MODIFIER_DESC_modifier_stickball_game: "The ancient tradition of playing the stickball game has been part of our culture for ages. Used for ritual purposes or to settle disputes, hundreds of warriors gather in a field with wooden sticks and a single ball, which must be directed towards a marked goal. This practice not only brings our people together, but keeps our warriors in prime condition."
  STATIC_MODIFIER_NAME_modifier_bison_hunters: "Bison Hunters"
  STATIC_MODIFIER_DESC_modifier_bison_hunters: "Bison are a crucial resource for our people. We use every part of the animal as a tribute to its sacrifice. We feed our people with its flesh, we use its bones for tools; we use its fur to protect ourselves against the cold and its hides for our clothes. Even the animal's soul has symbolic meaning for us. Such is the importance of the bison to our culture that we would feel lost without them."
  STATIC_MODIFIER_NAME_modifier_federal_constitution: "Federation Builders"
  STATIC_MODIFIER_DESC_modifier_federal_constitution: "We should unite with other groups of our kin to form a federation, which will put mutual trust and development as its first priority."
  STATIC_MODIFIER_NAME_modifier_shared_knowledge: "Shared Knowledge"
  STATIC_MODIFIER_DESC_modifier_shared_knowledge: "Innovation can come in many forms and if we want to stay ahead of rival tribes, we will need to explore every advantage we can get."
  STATIC_MODIFIER_NAME_modifier_slash_and_burn: "Slash and Burn Agriculture"
  STATIC_MODIFIER_DESC_modifier_slash_and_burn: "An agricultural technique that involves strategically cutting and burning the vegetation to obtain a nutrient-rich layer of ash that fertilizes underlying soil, making it excellent land for planting crops. We have learned that the land becomes stronger after this method, as a bone becomes stronger after being broken."
  STATIC_MODIFIER_NAME_modifier_council_of_elders: "Council of Elders"
  STATIC_MODIFIER_DESC_modifier_council_of_elders: "Our tribal government ensures that everyone in it has a voice and an equal say in crucial decisions. This collaborative administration encourages us to consider new perspectives."
  STATIC_MODIFIER_NAME_modifier_experienced_fur_hunters: "$fur$ Trade"
  STATIC_MODIFIER_DESC_modifier_experienced_fur_hunters: "Trading $fur$ with other tribes and foreigners is an essential part of our economy. We take great pride in our hunting abilities, and therefore are able to provide the best quality pelts."
  STATIC_MODIFIER_NAME_modifier_wampum: "Wampum"
  STATIC_MODIFIER_DESC_modifier_wampum: "A mix of white and purple beads made from different kinds of shells, wampum are used for many purposes, such as recording treaties and oral histories, facilitating diplomacy, and functioning as a system of exchange in trade. Wampum appears wherever our people tread."
  STATIC_MODIFIER_NAME_modifier_precious_stones_art: "Precious Stone Carving"
  STATIC_MODIFIER_DESC_modifier_precious_stones_art: "Our area is rich in precious stones, which are excellent for adding color, detail, and sparkle to artistic pieces and mundanities alike. Our craftsmen will immortalize themselves through these glittering jewels, and create great monuments to our culture."
  STATIC_MODIFIER_NAME_modifier_cultivate_the_land: "Cultivate the Land"
  STATIC_MODIFIER_DESC_modifier_cultivate_the_land: "The jungle is a harsh environment in which to live, especially for farming cultures. Clearing portions of the jungle to create arable land is therefore one of our most vital tasks. We must organize our people in such a way that we can employ large labor forces to carry out these works whenever the need arises."
  STATIC_MODIFIER_NAME_modifier_feathered_serpent: "The Feathered Serpent"
  STATIC_MODIFIER_DESC_modifier_feathered_serpent: "The legend of the Feathered Serpent is well-known across our lands. Although this figure represents many things to many people, such as Quetzalcōātl among the $nahua_group$, K'uk'ulkan among the $maya_language$ or Q'uq'umatz among the $kiche_culture$, he is a unifying figure for all of them."
  STATIC_MODIFIER_NAME_modifier_ritual_bloodletting: "Ritual Bloodletting"
  STATIC_MODIFIER_DESC_modifier_ritual_bloodletting: "Many cultures in this region consider ritual sacrifice and bloodletting by the ruler as a way of paying homage to the gods. Maintaining this tradition pleases the gods and affirms our right to rule through divine tribute."
  STATIC_MODIFIER_NAME_modifier_tears_of_the_sun: "Tears of the Sun"
  STATIC_MODIFIER_DESC_modifier_tears_of_the_sun: "Though adventurers from far-off lands dream of finding secret gold on mountain trails high in the Andes, to us the yellow metal has more artistic and sacred importance than simple economic value."
  STATIC_MODIFIER_NAME_modifier_hidden_cities: "Hidden Cities"
  STATIC_MODIFIER_DESC_modifier_hidden_cities: "In a land of immense peaks and impenetrable rainforests, many of our cities are nearly inaccessible to outsiders. They could easily remain hidden for centuries, forgotten by the world."
  STATIC_MODIFIER_NAME_modifier_potato_production: "Potato Production"
  STATIC_MODIFIER_DESC_modifier_potato_production: "Since maize grows poorly in the high plateaus of our land, we have learned to rely instead on the highly nutritious roots of a local plant. With increased production, we can feed our people and our warriors with this easily maintained crop."
  STATIC_MODIFIER_NAME_modifier_head_hunters: "Head Hunters"
  STATIC_MODIFIER_DESC_modifier_head_hunters: "Conquering territory from weaker peoples is a necessary evil in our state. These circumstances have created a unique warrior code, according to which capturing and not killing the enemy is the highest display of bravery and valor. This has made our people famous for their mastery in capturing people alive."
  STATIC_MODIFIER_NAME_modifier_border_raiders: "Skilled Raiders"
  STATIC_MODIFIER_DESC_modifier_border_raiders: "Our raiders are famous for their ability to carry out lightning-fast attacks against unaware enemies. Their speed and ability to evade enemy retaliation should be studied and employed by our regular troops as well."
  STATIC_MODIFIER_NAME_modifier_sutra: "Sūtra"
  STATIC_MODIFIER_DESC_modifier_sutra: "A type of sacred text in both $dharmic_ADJ$ and $buddhist_ADJ$ religions, they vary in format and content. Regardless, they are always considered to be valid sources of knowledge, and proper study of them is required if one is to develop their spirit."
  STATIC_MODIFIER_NAME_modifier_buddhist_councils: "$buddhist_ADJ$ Councils"
  STATIC_MODIFIER_DESC_modifier_buddhist_councils: "Throughout $buddhist_ADJ$ history, monastic councils have discussed canonical texts across different schools. Although the specific form, outcomes, and records of the councils may vary from school to school, the unifying power of such councils — bringing diverse traditions into dialogue — should not be underestimated."
  STATIC_MODIFIER_NAME_modifier_buddhist_canon: "$buddhist_ADJ$ Canon"
  STATIC_MODIFIER_DESC_modifier_buddhist_canon: "Called different names and even containing different texts, depending on the branch of $buddhist$, the $buddhist_canon$ is a collection of sacred $buddhist_ADJ$ texts. Containing everything from monastic rules to #italic Sūtra#!, or teachings of the Buddha, any person dedicated to $buddhist$ should be familiar with them."
  STATIC_MODIFIER_NAME_modifier_pali_canon: "$pali_language$ Canon"
  STATIC_MODIFIER_DESC_modifier_pali_canon: "Although there are many different canons in $buddhist$, depending on the school, the $theravada_ADJ$ $pali_canon$ is the oldest and most prestigious. Other schools have created their canons from a mix of texts with various sources, but the $pali_canon$ has remained unchanged since the times of Ashoka 'the Great', and contains the words of the Buddha himself. It has also served as the foundation of many other schools."
  STATIC_MODIFIER_NAME_modifier_buddhist_universities: "$buddhist_ADJ$ Universities"
  STATIC_MODIFIER_DESC_modifier_buddhist_universities: "Since antiquity, $buddhist_ADJ$ centers have also been hubs of learning and knowledge, attracting people from all over to study in our institutions. Nālandā was the biggest of these centers in the past, but many others have followed in its footsteps since."
  STATIC_MODIFIER_NAME_modifier_xuanzang_travels: "Xuánzàng Travels"
  STATIC_MODIFIER_DESC_modifier_xuanzang_travels: "Xuánzàng, a $chinese_group$ $buddhist_ADJ$ monk who lived during the Táng dynasty in the 7th century, embarked on a seventeen-year overland trip to $india$ in order to visit it centers of learning and to gather a great number of $buddhist$ texts. Among other places he visited Nālandā, where he learned from the best masters, and on his return to $china$ he brought with him more than a thousand documents, which made a great contribution to $mahayana$. His trip and his records served as basis for the tale of #italic Journey to the West#!, in which a monk is tasked by the Buddha to travel to $india$ in search of some holy texts. accompanied among others by the Monkey King, Sūn Wùkōng."
  STATIC_MODIFIER_NAME_modifier_silk_road_transmission: "Silk Road Transmission"
  STATIC_MODIFIER_DESC_modifier_silk_road_transmission: "It is undeniable the effect that the Silk Road has had on the spread of $buddhist$. Whether via land or sea, trade has allowed $buddhist$ to spread far from its origins in $india$."
  STATIC_MODIFIER_NAME_modifier_bodhisattva: "Bodhisattva"
  STATIC_MODIFIER_DESC_modifier_bodhisattva: "Regardless of the school of $buddhist$ one adheres to, a $bodhisattva$ is an important figure, although their exact characteristics and importance vary between the different traditions. In all cases, however, they are deserving of reverence and admiration."
  STATIC_MODIFIER_NAME_modifier_avalokitesvara: "Avalokiteśvara"
  STATIC_MODIFIER_DESC_modifier_avalokitesvara: "Also known as Guānyīn or Kannon, $avalokitesvara$ is one of the most revered Bodhisattvas. Represented as a male or female depending on the school, and even in some considered to be the origin of all $hindu_ADJ$ deities, $avalokitesvara$ is the $bodhisattva$ of compassion, and is associated with the mantra #italic Oṃ maṇi padme hūm̐#!."
  STATIC_MODIFIER_NAME_modifier_maitreya: "Maitreya"
  STATIC_MODIFIER_DESC_modifier_maitreya: "$maitreya$ is currently a $bodhisattva$, prophesized to be the future and final Buddha of the current era. His destiny is to reestablish the teachings of the Dharma in the world after they have been forgotten by humanity, and as such he is the successor of Siddhārtha Gautama."
  STATIC_MODIFIER_NAME_modifier_mount_meru: "Mount Meru"
  STATIC_MODIFIER_DESC_modifier_mount_meru: "$mount_meru$ is the sacred mountain at the center of the universe in both the physical and spiritual sense for $hindu$, $buddhist$, and $jain$. As it is the center around which everything else revolves, so does our entire country revolve around our ruler."
  STATIC_MODIFIER_NAME_modifier_naraka: "Naraka"
  STATIC_MODIFIER_DESC_modifier_naraka: "Also called #italic Niraya#!, $naraka$ refers to the realms of suffering where one's bad karma is cleansed before being reincarnated. There are many $naraka$ realms, and both the time an individual must reside in them and the punishments they will receive while doing so depends on how much karma they need to gain before being reborn in one of the upper realms."
  STATIC_MODIFIER_NAME_modifier_four_heavenly_kings: "Four Heavenly Kings"
  STATIC_MODIFIER_DESC_modifier_four_heavenly_kings: "Each presiding over one of the cardinal directions, the $four_heavenly_kings$ are in charge of protecting the Deva realm from the Asuras. They are also responsible for assessing the virtue and morality of mortals."
  STATIC_MODIFIER_NAME_modifier_vegetarianism: "Vegetarianism"
  STATIC_MODIFIER_DESC_modifier_vegetarianism: "Although it depends on the school, there are some rules in the Dharma regarding abstinence from meat consumption. Each school has different views about the strictness of this abstinence, and also whether it should apply only to the monastic community or to the population in general."
  STATIC_MODIFIER_NAME_modifier_edicts_of_ashoka: "Edicts of Ashoka"
  STATIC_MODIFIER_DESC_modifier_edicts_of_ashoka: "A legal code published by Emperor Ashoka 'the Great' in the 3rd century BCE, these edicts include strictures promoting for $buddhist$. Although this code is from many centuries ago, it still deserves respect and reverence from any member of the $buddhist_ADJ$ faithful."
  STATIC_MODIFIER_NAME_modifier_five_precepts: "Five Precepts"
  STATIC_MODIFIER_DESC_modifier_five_precepts: "The foundational code of $buddhist_ADJ$ ethics and morality, the $five_precepts$ represent the most basic rules believers must follow in $buddhist$, whether part of the ordained monastic community or not. They instruct people to abstain from killing, stealing, sexual misconduct, lying, and intoxication."
  STATIC_MODIFIER_NAME_modifier_monastic_communities: "Monastic Communities"
  STATIC_MODIFIER_DESC_modifier_monastic_communities: "$buddhist_ADJ$ life is centered around its communities of monks and nuns, called the #italic Saṃgha#!. They are governed by the #italic Vinaya#!, the rules and precepts that dictate the operations of any $buddhist_ADJ$ religious community."
  STATIC_MODIFIER_NAME_modifier_prestigious_schools: "Prestigious Schools"
  STATIC_MODIFIER_DESC_modifier_prestigious_schools: "$buddhist$ has developed into a myriad of schools, each one centered around one type of monastic community and declaring a preference for certain texts. However, some of these schools have gained recognition, while others have been relegated to obscurity. Associating with the more prestigious schools gives those people a bit of prestige as well."
  STATIC_MODIFIER_NAME_modifier_offerings: "Offerings"
  STATIC_MODIFIER_DESC_modifier_offerings: "It is a precept of $buddhist$ to make offerings to the $three_jewels$ in order to accumulate merit. These offerings may be material or non-material, and some monastic communities depend completely on food donated by their followers for their survival."
  STATIC_MODIFIER_NAME_modifier_incense_burning: "Incense Burning"
  STATIC_MODIFIER_DESC_modifier_incense_burning: "The practice of burning incense is a staple of any $buddhist_ADJ$ ritual or offering. Varying in shapes and forms, it is common for both lay people and ordained monks and nuns alike to light incense before performing any ritual or meditation. As such, the smell of incense constantly permeates any $buddhist_ADJ$ temple."
  STATIC_MODIFIER_NAME_modifier_ascetic_practices: "Ascetic Practices"
  STATIC_MODIFIER_DESC_modifier_ascetic_practices: "Although the Buddha warned us about the dangers of extreme asceticism, some among the monastic community still perform these strict practices. Limiting the type of cloth they can wear, the food they can eat, or where they can live are some of the restrictions adopted by those who wish to walk this path. Although such abstemious behavior is not a requirement for obtaining merit, it has its own benefits for the practitioner."
  STATIC_MODIFIER_NAME_modifier_mindfulness: "Mindfulness"
  STATIC_MODIFIER_DESC_modifier_mindfulness: "An essential part of $buddhist_ADJ$ practice, $mindfulness$ means to be aware of the phenomena of both body and mind, while keeping the teachings of the Buddha always present in the mind. With this, one can avoid the arising of unwanted states, and develop into the wanted ones."
  STATIC_MODIFIER_NAME_modifier_dana: "Dāna"
  STATIC_MODIFIER_DESC_modifier_dana: "Denoting generosity, $dana$ is defined as the act of giving without anything in return, and is a key virtue in all religions related to the Dharma. Helping others selflessly, whereas individually or communally, is one of the key ways of accumulating karma."
  STATIC_MODIFIER_NAME_modifier_ahimsa: "Ahiṃsā"
  STATIC_MODIFIER_DESC_modifier_ahimsa: "The concept of $ahimsa$, or nonviolence, is a key virtue among all religions following the Dharma. Any conflict is encouraged to be resolved peacefully through dialogue, rather than the use of force. Unfortunately, that is not always possible, but violence should always be the last resort, and its use must be just."
  STATIC_MODIFIER_NAME_modifier_resistance_to_persecution: "Resistance to Persecution"
  STATIC_MODIFIER_DESC_modifier_resistance_to_persecution: "Although it has spread widely throughout the world, $buddhist$ has also seen its fair share of persecution across the ages. Its temples and images may have been destroyed, its followers slaughtered or forced into hiding, but nonetheless its faithful have persevered."
  STATIC_MODIFIER_NAME_modifier_buddhist_meditation: "$buddhist_ADJ$ Meditation"
  STATIC_MODIFIER_DESC_modifier_buddhist_meditation: "Meditation is a common practice among all $buddhist_ADJ$ followers, regardless of their school. The aim is to train the mind and the spirit to develop mindfulness, tranquility, and insight, and thus ultimately achieve enlightenment."
  STATIC_MODIFIER_NAME_modifier_preaching_friars: "Itinerant Preaching Friars"
  STATIC_MODIFIER_DESC_modifier_preaching_friars: "Preaching friars — members of $mendicant_orders$ like the Dominicans and Franciscans — have taken their ministry beyond the monastery walls to preach directly among the people. By supporting and praising them openly for these acts of devotion, we can strengthen religious conviction throughout the realm, even among the most remote peasants."
  STATIC_MODIFIER_NAME_modifier_devotio_moderna: "Devotio Moderna"
  STATIC_MODIFIER_DESC_modifier_devotio_moderna: "The #italic Devotio Moderna#!, or modern devotional movement, is rapidly gaining popularity among members of our faith. We should implement some of their teachings into our court, so as to make ourselves appear particularly devout."
  STATIC_MODIFIER_NAME_modifier_denounce_heretics: "Denunciation of Heretics"
  STATIC_MODIFIER_DESC_modifier_denounce_heretics: "We must ensure the supremacy of the one true faith, and denounce all criticisms of it as the bitterest of heresy."
  STATIC_MODIFIER_NAME_modifier_beguins_and_beghards: "Lay Religious Orders"
  STATIC_MODIFIER_DESC_modifier_beguins_and_beghards: "Many of the faithful have devoted themselves to a life of prayer and good works, which usually comes with taking the veil or becoming a monk. However, they have not taken formal vows, and act without official $PAP_ADJ$ approval. Nevertheless, we should support these popular efforts to do good deeds and help our people."
  STATIC_MODIFIER_NAME_modifier_conquistador_advance: "Conquistadors"
  STATIC_MODIFIER_DESC_modifier_conquistador_advance: "The discovery of the New World attracts adventurers of all stripes to risk their fortunes and lives on uncertain expeditions, with the promise of unparalleled wealth, fame, and power. These expeditions are formalized through agreements between expedition leaders and the government, legally manifested as 'capitulations of conquest'."
  STATIC_MODIFIER_NAME_modifier_grand_display_of_faith: "Grand Displays of Faith"
  STATIC_MODIFIER_DESC_modifier_grand_display_of_faith: "To honor God, we need to construct great monuments in His name. Not only will this display our devotion to our faith, but it will also demonstrate the magnificent skills of our sculptors and architects."
  STATIC_MODIFIER_NAME_modifier_monastery_productions: "Monastic Frugality"
  STATIC_MODIFIER_DESC_modifier_monastery_productions: "The holy occupants of our monasteries are bastions of sensible, frugal living. Our clergy should consider adapting their own lifestyles to more closely resemble those of these monks and nuns."
  STATIC_MODIFIER_NAME_modifier_reform_church_music: "Reformed Church Music"
  STATIC_MODIFIER_DESC_modifier_reform_church_music: "We must accept the proposed reforms to our liturgical music. The diluted, soulless tunes currently in fashion can no longer be considered acceptable ways to express the glory of the divine."
  STATIC_MODIFIER_NAME_modifier_frequent_councils: "Frequent Councils"
  STATIC_MODIFIER_DESC_modifier_frequent_councils: "It has been proposed that holding religious councils more frequently would prevent theological disputes and criticisms from festering unchecked. While we may not have full control over the curia, we can at least use our influence to encourage regular synods that address relevant issues before they can become crises."
  STATIC_MODIFIER_NAME_modifier_mendicant_orders: "Mendicant Orders"
  STATIC_MODIFIER_DESC_modifier_mendicant_orders: "The orders of our faith, who have taken vows of poverty and live itinerant lives, have brought assistance to many remote parts of our country. We should support their efforts as much as we can without disrupting their holy missions."
  STATIC_MODIFIER_NAME_modifier_exsurge_domine: "Exsurge Domine"
  STATIC_MODIFIER_DESC_modifier_exsurge_domine: "To eradicate the evil of heresy, the Lord Himself will arise and purge them from our lands!"
  STATIC_MODIFIER_NAME_modifier_confutatio_augustana: "Refute False Confessions"
  STATIC_MODIFIER_DESC_modifier_confutatio_augustana: "In these turbulent times, we must clearly define orthodox $christian_ADJ$ doctrine, while systematically refuting the false beliefs that endanger the very souls of our people."
  STATIC_MODIFIER_NAME_modifier_roman_catechism: "Roman Catechism"
  STATIC_MODIFIER_DESC_modifier_roman_catechism: "Our clergy must adopt the official Roman Catechism as their guide for instruction. This text will improve priestly education and ensure only consistent, orthodox teachings are transmitted to the populace."
  STATIC_MODIFIER_NAME_modifier_oversea_missions: "Overseas Missions"
  STATIC_MODIFIER_DESC_modifier_oversea_missions: "Our clergy is ready and willing to spread our faith into new territories overseas. With their contribution, settling new lands will be made easier and cheaper."
  STATIC_MODIFIER_NAME_modifier_baptism_books: "Baptism Records"
  STATIC_MODIFIER_DESC_modifier_baptism_books: "We must confirm baptism as an important cornerstone of our faith by keeping meticulous records of who in our population has or has not yet been baptized."
  STATIC_MODIFIER_NAME_modifier_second_scholasticism: "Second $scholasticism$"
  STATIC_MODIFIER_DESC_modifier_second_scholasticism: "We will need to revive and refine the philosophical movement of medieval scholasticism."
  STATIC_MODIFIER_NAME_modifier_catholic_sunday_schools: "$sunday_schools_advance$"
  STATIC_MODIFIER_DESC_modifier_catholic_sunday_schools: "$sunday_schools_advance_desc$"
  STATIC_MODIFIER_NAME_modifier_index_librorum_prohibitorum: "Index of Forbidden Books"
  STATIC_MODIFIER_DESC_modifier_index_librorum_prohibitorum: "The dangerous ideas of the Reformation will spread like a toxic fungus in the minds of our subjects if they have access to written works propagating these silly thoughts! We must forbid certain dangerous texts, and keep a comprehensive list of which books are not allowed."
  STATIC_MODIFIER_NAME_modifier_catholic_cuius_regio_eius_religio: "Cuius Regio, Eius Religio"
  STATIC_MODIFIER_DESC_modifier_catholic_cuius_regio_eius_religio: "#italic Whose realm, his religion.#! We will have to accept that other countries follow other faiths, and that this will sometimes be a crucial factor in diplomacy."
  STATIC_MODIFIER_NAME_modifier_embellish_baroque_art: "Promote Baroque Art"
  STATIC_MODIFIER_DESC_modifier_embellish_baroque_art: "Our faith has a long tradition of sponsoring and promoting great works of art. The development of the splendid new Baroque style reflects the pathos and glory of our theology beautifully, and should receive particular sponsorship."
  STATIC_MODIFIER_NAME_modifier_national_churches: "National Church"
  STATIC_MODIFIER_DESC_modifier_national_churches: "The State must take greater control over the Church in our land. We cannot allow foreign entities to exercise undue influence over our ecclesiastical administration; our Church must serve our realm first."
  STATIC_MODIFIER_NAME_modifier_entrenched_church: "Entrenched Church"
  STATIC_MODIFIER_DESC_modifier_entrenched_church: "No matter which people we rule over, the Church provides a way to give them a unified structure."
  STATIC_MODIFIER_NAME_modifier_catholic_enlightenment: "$catholic_ADJ$ Enlightenment"
  STATIC_MODIFIER_DESC_modifier_catholic_enlightenment: "For our faith to withstand the attacks of the Enlightenment, we must adapt, and present new perspectives in and about the Church."
  STATIC_MODIFIER_NAME_modifier_divine_church_music: "Divine Church Music"
  STATIC_MODIFIER_DESC_modifier_divine_church_music: "Many of our composers have created their greatest works thanks to the inspiration provided by their faith. We should actively seek out the most talented artists and hire them immediately so as to never let our churches and cathedrals suffer from inferior music."
  STATIC_MODIFIER_NAME_modifier_continue_missionary_works: "Missionary Works"
  STATIC_MODIFIER_DESC_modifier_continue_missionary_works: "Missionary efforts to carry our faith to the far corners of the world can never be considered finished. We need to sponsor more missions to further bring the light of $catholic$ to these unilluminated souls."
  STATIC_MODIFIER_NAME_modifier_religious_dialects_hellenic_faith_advance: "Religious Dialects"
  STATIC_MODIFIER_DESC_modifier_religious_dialects_hellenic_faith_advance: "Although our faith is shared across many communities, notable divergence exists in ritual, tradition, and local religious practice. Over time these variations develop organically, sometimes even within the same province. Much like language evolves into regional dialects, our religious customs gradually form distinct local expressions while remaining within the same sacred tradition."
  STATIC_MODIFIER_NAME_modifier_offerings_to_the_moirai_advance: "Offerings to the Moirai"
  STATIC_MODIFIER_DESC_modifier_offerings_to_the_moirai_advance: "Each year a portion of our ritual offerings is dedicated to the three Moirai, the Fates who govern destiny itself. Clotho the Spinner, Lachesis the Alloter of life's portion, and Atropos the inevitable end preside over the completion of every mortal life according to the cosmic order. In many theological traditions their authority is considered primordial, sometimes even surpassing that of the gods."
  STATIC_MODIFIER_NAME_modifier_on_hubris_and_morality_advance: "On Hubris & Morality"
  STATIC_MODIFIER_DESC_modifier_on_hubris_and_morality_advance: "The principles of our faith originate from the will of the gods and are interpreted through priests, seers, and acts of divination. Through prophecy and sacred interpretation mortals attempt to understand the divine order of the cosmos. Yet the surest path to moral virtue remains piety, reverence, and the careful avoidance of destructive hubris."
  STATIC_MODIFIER_NAME_modifier_variety_in_divine_identity_advance: "Variety in Divine Identity"
  STATIC_MODIFIER_DESC_modifier_variety_in_divine_identity_advance: "Our pantheon contains a remarkable variety of deities, each representing different virtues, crafts, and ideals. This diversity allows every individual to discover a divine patron that resonates with their life and vocation. The modest altar of a blacksmith to Hephaestus carries meaning equal to the noble devotion offered to Zeus."
  STATIC_MODIFIER_NAME_modifier_mystai_advance: "Mystery Cults"
  STATIC_MODIFIER_DESC_modifier_mystai_advance: "Hidden behind masks, symbols, and sacred ritual, influential initiates gather within secretive mystery cults. These organizations exercise considerable social and political influence, shaping events through ritual authority, wealth, and discreet alliances. Wise rulers maintain good relations with these mystai, lest their influence and intrigue turn against the state."
  STATIC_MODIFIER_NAME_modifier_preserve_theogony_advance: "The Teachings of Theogony"
  STATIC_MODIFIER_DESC_modifier_preserve_theogony_advance: "Hesiod's Theogony recounts the origins and genealogy of the gods, revealing the birth of the divine order itself. Through its verses, symbols of authority such as the scepter and the voice of rule are presented as sacred responsibilities. The work reminds rulers that true authority must be exercised through wisdom, moderation, and reason."
  STATIC_MODIFIER_NAME_modifier_unify_priestly_class_advance: "Unify the Priestly Class"
  STATIC_MODIFIER_DESC_modifier_unify_priestly_class_advance: "For much of our history the priesthood responsible for sacred lands and temple revenues has functioned in a decentralized manner. Yet recent developments in foreign religious institutions have introduced new ideas of organization and central authority. These influences now encourage the unification and coordination of our own priestly hierarchy."
  STATIC_MODIFIER_NAME_modifier_purana: "Purāṇa"
  STATIC_MODIFIER_DESC_modifier_purana: "Considered part of the $smrti$, the $purana$ are texts with a variety of content. Cosmology, divine genealogies, astronomy, grammar, love stories... almost everything can be found within them. As such, even though they are not part of the $sruti$, their influence on $hindu_ADJ$ beliefs and society is strong, as they combine diverse local beliefs and traditions into the common narrative of the $vedah$."
  STATIC_MODIFIER_NAME_modifier_atman: "Ātman"
  STATIC_MODIFIER_DESC_modifier_atman: "Referred to the true and eternal unchanging Self, it is the essence of each individual's consciousness. According to the $astika$ schools, this $atman$ is distinct from the mind and body, and it is also different from the Jivātman that persists across multiple lifetimes. In contrast, the $nastika$ schools interpret the concept differently, or reject it entirely."
  STATIC_MODIFIER_NAME_modifier_nastika_schools: "Nāstika Schools"
  STATIC_MODIFIER_DESC_modifier_nastika_schools: "Some schools of thought in $hindu$ deviate from the mainstream, rejecting the authority of the $vedah$ and the existence of $atman$. These schools, like $jain$ and $buddhist$, are thus heterodox, although they still contain many of the shared core beliefs of $hindu$."
  STATIC_MODIFIER_NAME_modifier_astika_schools: "Āstika Schools"
  STATIC_MODIFIER_DESC_modifier_astika_schools: "Called the orthodox schools of $hindu$, they accept the authority of the $vedah$ and the existence of $atman$. Although consisting of many different branches, this commonality of acceptance gives the $astika_schools$ a lot of common ground."
  STATIC_MODIFIER_NAME_modifier_diversity_of_beliefs: "Diversity of Beliefs"
  STATIC_MODIFIER_DESC_modifier_diversity_of_beliefs: "The beliefs of the people of $india$ center around the concept of Dharma and the text of the $vedah$, but they are manifested in a myriad of forms and practices. Even the gods recognized and worshiped are not the same for everyone, but a common thread of concepts is present throughout."
  STATIC_MODIFIER_NAME_modifier_ishvara: "Īśvara"
  STATIC_MODIFIER_DESC_modifier_ishvara: "Interpreted differently depending on the school or branch of $hindu$, $ishvara$ refers to the Supreme Being or God. Therefore, it can refer to $shiva_god$ for $shaivism$, to $vishnu_god$ for $vaishnavism$, or to any personal god of the individual."
  STATIC_MODIFIER_NAME_modifier_sanskritization: "Sanskritization"
  STATIC_MODIFIER_DESC_modifier_sanskritization: "$hindu$ has spread much farther than its origins in $india$, and many other cultures and countries have adopted $sanskrit_language$ concepts and titles to refer to their own identity. As such, the concepts of $hindu$ have seamlessly permeated and blended into foreign beliefs."
  STATIC_MODIFIER_NAME_modifier_bhakti_movement: "Bhakti Movement"
  STATIC_MODIFIER_DESC_modifier_bhakti_movement: "Having emerged in the 6th century, this movement promotes love and devotion to one's personal god or towards an enlightened individual. It appeals to the lay population by speaking to them directly on their own terms. A highly influential movement, it is changing how religion and belief themselves are understood by our people."
  STATIC_MODIFIER_NAME_modifier_yoga: "Yoga"
  STATIC_MODIFIER_DESC_modifier_yoga: "A prominent $hindu_ADJ$ school and philosophy, $yoga$ is a set of practices both physical and spiritual, with the purpose of controlling the mind and body. Performed for millennia, it has almost become synonymous with the path of enlightenment."
  STATIC_MODIFIER_NAME_modifier_diwali: "Diwali"
  STATIC_MODIFIER_DESC_modifier_diwali: "Called the festival of light, $diwali$ is when we celebrate the triumph of the Dharma; the victory of good over evil and light over darkness. We will light candles and lanterns to symbolize this victory, and we will honor our ancestors."
  STATIC_MODIFIER_NAME_modifier_holi: "Holi"
  STATIC_MODIFIER_DESC_modifier_holi: "Held at the beginning of spring to celebrate its arrival, $holi$ is the festival of colors and love. We commemorate agriculture and good harvests, and at the same time enjoy the myriad of colors that spring offers. It is also the time to have fun and resolve conflicts, removing one's emotional impurities."
  STATIC_MODIFIER_NAME_modifier_holy_rivers: "Holy Rivers"
  STATIC_MODIFIER_DESC_modifier_holy_rivers: "Rivers and their veneration have always been an important part of $hindu$. From the Indus to the Ganges, there are many rivers considered holy, on the shores of which many rituals are held. Their waters are considered sacred, and they are a common site for purification rituals."
  STATIC_MODIFIER_NAME_modifier_advaita_vedanta: "Advaita Vedānta"
  STATIC_MODIFIER_DESC_modifier_advaita_vedanta: "Rejecting the dualism between consciousness and matter, $advaita_vedanta$ claims that the $atman$, or the innermost self or consciousness, is one and the same as the supreme reality or consciousness of the universe, Brahman. In this sense, the physical material world is just an illusion hiding the ultimate reality of the Brahman."
  STATIC_MODIFIER_NAME_modifier_hindu_muslim_relations: "$hindu_ADJ$-$muslim_ADJ$ Relations"
  STATIC_MODIFIER_DESC_modifier_hindu_muslim_relations: "There has been a lot of interaction in the past between $hindu$ and $muslim$, and there will continue to be so. Our peoples have learned to live peacefully together and there has even been some degree of syncretism between the two faiths."
  STATIC_MODIFIER_NAME_modifier_hindu_unification: "$hindu_ADJ$ Unification"
  STATIC_MODIFIER_DESC_modifier_hindu_unification: "Despite the differences in beliefs and practices throughout $hindu$, there are more commonalities between us than differences. A common unified view of $hindu$ has started to emerge, and our people can gain a great sense of unity through it."
  STATIC_MODIFIER_NAME_modifier_hindu_architecture: "$hindu_ADJ$ Architecture"
  STATIC_MODIFIER_DESC_modifier_hindu_architecture: "Regardless of the style of construction, be it a Śikhara, Vimāna, or Prāṅg, $hindu_ADJ$ temples are recognizable everywhere for their tall, decorated towers. A representation of $mount_meru$, more or less emphasized depending on the region, these spires serve both as a signal of faith and a demonstration of power."
  STATIC_MODIFIER_NAME_modifier_varna_system: "Varṇa System"
  STATIC_MODIFIER_DESC_modifier_varna_system: "Since the times of the $vedah$, there has existed the concept of one's Dharma being classified as one of the four possibles: #italic Brāhmaṇa#!, scholars or priests; #italic Kṣatriya#!, rulers or warriors; #italic Vaiśya#!, farmers or merchants; or #italic Śūdra#!, artisans or servants. These classifications are not rigid, but instead represent the ideal of an individual's calling, and they have been very influential in $hindu_ADJ$ society."
  STATIC_MODIFIER_NAME_modifier_extreme_pacifism: "Extreme Pacifism"
  STATIC_MODIFIER_DESC_modifier_extreme_pacifism: "Based on the concept of $ahimsa$, $hindu$ always advocates for pacifism and nonviolence. However, our enemies should still be wary of provoking us, lest we end up exemplifying the complete opposite extreme when roused into war."
  STATIC_MODIFIER_NAME_modifier_hindu_empires: "$hindu_ADJ$ Empires"
  STATIC_MODIFIER_DESC_modifier_hindu_empires: "There have been many empires in the past that followed $hindu$. From the Maurya and Gupta empires in $india$, to the Śrīvijaya Empire in $indonesia_region$, and the long-lasting Chola Dynasty, $hindu$ has always been the spirital force behind the throne of powerful rulers."
  STATIC_MODIFIER_NAME_modifier_sacred_cattle: "Sacred Cattle"
  STATIC_MODIFIER_DESC_modifier_sacred_cattle: "As part of $ahimsa$, it is prohibited to slaughter cattle. They instead are respected and venerated as maternal figures, and are symbols of selfless provision and sacrifice. Having been worshiped since the time of the $vedah$, they still command enormous respect and attention."
  STATIC_MODIFIER_NAME_modifier_isolated_reaches: "Isolated Reaches"
  STATIC_MODIFIER_DESC_modifier_isolated_reaches: "$miaphysite$ has managed to spread to very distant places. Even while surrounded by enemies and heretics, our faith has remained strong."
  STATIC_MODIFIER_NAME_modifier_independent_leaders: "Independent Leaders"
  STATIC_MODIFIER_DESC_modifier_independent_leaders: "Due to the isolation of $miaphysite$, it has been difficult at times to contact other patriarchates. As such, our leaders have learned to act independently, while at the same time keeping in contact with the rest of the $christian_ADJ$ world as much as possible."
  STATIC_MODIFIER_NAME_modifier_jerusalem_focus: "$jerusalem$ Focus"
  STATIC_MODIFIER_DESC_modifier_jerusalem_focus: "We always keep the holy city of $jerusalem$ in our minds, as not only it was the place where Jesus preached and died, but also where he will return to in his Second Coming. As such, we always pray facing in the direction of $jerusalem$, no matter where we are."
  STATIC_MODIFIER_NAME_modifier_acceptance_of_old_testament: "Acceptance of the Old Testament"
  STATIC_MODIFIER_DESC_modifier_acceptance_of_old_testament: "Some $christian_ADJ$ denominations have decided to reduce the importance of the Old Testament, claiming that the arrival of Jesus completely supersedes it. We, however, maintain that it is still relevant, and that some instructions in it are as valid as they were when they were written."
  STATIC_MODIFIER_NAME_modifier_primacy_of_alexandria: "Primacy of $alexandria$"
  STATIC_MODIFIER_DESC_modifier_primacy_of_alexandria: "Although $miaphysite$ has many branches and independent leaders, we recognize $alexandria$ and its seat as our spiritual leader. However, this is a sign of respect for the Apostolic Throne and a way to honor it, rather than a bestowal of any special prerogatives."
  STATIC_MODIFIER_NAME_modifier_school_of_alexandria: "School of $alexandria$"
  STATIC_MODIFIER_DESC_modifier_school_of_alexandria: "The Catechetical $school_of_alexandria$, allegedly founded by the Apostle Mark himself, is the oldest school of catechism in the world. There, biblical and theological studies have been taught since the start of $christian$ itself. Although the school itself was destroyed when the Bishop of $rome$ was declared to be above the Patriarch of $alexandria$, its tradition has endured."
  STATIC_MODIFIER_NAME_modifier_preserving_of_local_languages: "Preservation of Local Languages"
  STATIC_MODIFIER_DESC_modifier_preserving_of_local_languages: "Despite the importance of $greek_language$ and $latin_language$ in early $christian$, $miaphysite$ has preserved its liturgy in more local vernaculars, like $coptic_language$, $aramaic_language$, and $armenian_language$. Venerable languages in their own right, each $miaphysite_ADJ$ branch preserves its own historical tongue."
  STATIC_MODIFIER_NAME_modifier_double_patriarchate: "Double Patriarchate"
  STATIC_MODIFIER_DESC_modifier_double_patriarchate: "Both $alexandria$ and $antioch$ see themselves as having two different patriarchates, one for $miaphysite$ and another for $orthodox$. Although they both may claim legitimacy, only $miaphysite$ preserves the true patriarchates."
  STATIC_MODIFIER_NAME_modifier_eastern_christianity: "Eastern $christian$"
  STATIC_MODIFIER_DESC_modifier_eastern_christianity: "We are part of the branch of so-called $eastern_christianity$, which amalgamates many different denominations with different theological and liturgical traditions, but also with many common cultural aspects."
  STATIC_MODIFIER_NAME_modifier_life_among_infidels: "Life Among Heathens"
  STATIC_MODIFIER_DESC_modifier_life_among_infidels: "The lands of the faithful have often been tainted by the presence of unbelievers, but this is why our clerics have ventured forth towards the unknown to bring the light of Jesus to distant lands. We have thus influenced these lost souls in more ways than what one might expect, even if we have not been able to make them see the error of their beliefs."
  STATIC_MODIFIER_NAME_modifier_gradual_departure: "Gradual Departure"
  STATIC_MODIFIER_DESC_modifier_gradual_departure: "Although they were quick to brand us as heretics, $miaphysite$ did not cut ties with the rest of the $christian_ADJ$ world instantly. We kept in contact with the other patriarchates, and attended the councils, but it was gradually made clear that $miaphysite$ is too different from those heretical beliefs."
  STATIC_MODIFIER_NAME_modifier_thrive_under_persecution: "Thriving Under Persecution"
  STATIC_MODIFIER_DESC_modifier_thrive_under_persecution: "Although our faithful have been persecuted by heretics for centuries, our beliefs have persevered. No matter how many times they bring us down, we will rise again!"
  STATIC_MODIFIER_NAME_modifier_preserver_of_national_identity: "Preserving National Identity"
  STATIC_MODIFIER_DESC_modifier_preserver_of_national_identity: "It is because of our history of being persecuted and oppressed that our Church became responsible for preserving our identity. It is in the bosom of the Church where our languages and traditions have been kept safe, and therefore we have unshakeable faith in this institution."
  STATIC_MODIFIER_NAME_modifier_defense_against_heretics: "Defense Against Heretics"
  STATIC_MODIFIER_DESC_modifier_defense_against_heretics: "Ever since our split from other $christian_ADJ$ faiths, the heretics have come to us with accusations and condemnations many times. They may call themselves $christian_ADJ$, but their views are obviously clouded, whereas our vision is made clear by the light of God."
  STATIC_MODIFIER_NAME_modifier_remote_patriarchates: "Remote Patriarchates"
  STATIC_MODIFIER_DESC_modifier_remote_patriarchates: "Conquest and persecution have repeatedly forced our patriarchates to relocate after their seats have fallen under control of heathen conquerors. Though we now operate from new locations, the original seats remain spiritually revered in our tradition, albeit from a distance."
  STATIC_MODIFIER_NAME_modifier_further_reaches: "Further Reaches"
  STATIC_MODIFIER_DESC_modifier_further_reaches: "Despite many attempts by nonbelievers to stop our faith from spreading, it has nevertheless made its way to many different peoples and cultures, bringing light wherever it goes."
  STATIC_MODIFIER_NAME_modifier_internal_communion: "Internal Communion"
  STATIC_MODIFIER_DESC_modifier_internal_communion: "Despite having independent patriarchs, all branches of $miaphysite$ maintain mutual communion. This helps them build relationships with each other, and promotes unity in the Church."
  STATIC_MODIFIER_NAME_modifier_cradle_of_monasticism: "Cradle of Monasticism"
  STATIC_MODIFIER_DESC_modifier_cradle_of_monasticism: "Monasticism in $christian$ was born in $egypt_region$, when the $christian_ADJ$ faithful retreated to the desert to pray and dedicate their lives to God. $miaphysite$ can therefore claim this history as their own through the Alexandrine tradition."
  STATIC_MODIFIER_NAME_modifier_unique_architecture: "Unique Architecture"
  STATIC_MODIFIER_DESC_modifier_unique_architecture: "The relative isolation of our patriarchates have resulted in the development of unique architectural styles for our holy places. Although other $christian_ADJ$ denominations may be more prominent, our captivating architecture is an inspiration to the faithful."
  STATIC_MODIFIER_NAME_modifier_muslim_lineage: "$muslim_ADJ$ Lineage"
  STATIC_MODIFIER_DESC_modifier_muslim_lineage: "Ever since the times of Muḥammad, peace be upon him, $muslim$ has been intrinsically linked to rulership structures. As such, our dynastic line is also legitimized by the faith itself."
  STATIC_MODIFIER_NAME_modifier_muslim_caravans: "$muslim_ADJ$ Caravans"
  STATIC_MODIFIER_DESC_modifier_muslim_caravans: "From the many paths of the Silk Road, to the salt routes across the Sahara, our people have a tradition of embarking on trade ventures to faraway lands, providing us and the rest of the $muslim_ADJ$ world with a wide selection of available goods."
  STATIC_MODIFIER_NAME_modifier_islamic_golden_age: "Islamic Golden Age"
  STATIC_MODIFIER_DESC_modifier_islamic_golden_age: "The impact that the $islamic_golden_age$ had on the entire world, not only in $muslim_ADJ$ countries, is absolutely undeniable. Some of these infidel nations are only now emerging from their dark ages of ignorance, making their first attempts at artistic and scientific 'discoveries' that we invented — and perfected — long ago."
  STATIC_MODIFIER_NAME_modifier_ramadan: "Ramaḍān"
  STATIC_MODIFIER_DESC_modifier_ramadan: "A commemoration of the first revelation to Prophet Muḥammad, peace be upon him, the month of $ramadan$ is the holiest month in $muslim$. During this month, all $muslim_ADJ$ faithful are expected to perform Ṣawm — fasting and abstinence — during the daylight hours, as well as prayer and reflection."
  STATIC_MODIFIER_NAME_modifier_sunnah: "Sunnah"
  STATIC_MODIFIER_DESC_modifier_sunnah: "Consisting of the traditions and practices attributed to Muḥammad, peace be upon him, the $sunnah$ dictates how every $muslim_ADJ$ faithful should behave, and is also what gives $sunni$ its name. Although the different schools of jurisprudence may vary on the details, they all have their basis in the $sunnah$."
  STATIC_MODIFIER_NAME_modifier_imamate: "Imamate"
  STATIC_MODIFIER_DESC_modifier_imamate: "The basis of $shia_ADJ$ faith is that Muḥammad, peace be upon him, designated 'Alī ibn Abī Ṭālib as his successor. As such, the figure of Imām is that of a spiritual leader coming from the line of Muḥammad, peace be upon him, to lead all $muslim_ADJ$ faithful."
  STATIC_MODIFIER_NAME_modifier_indian_sea_trade: "Indian Sea Trade"
  STATIC_MODIFIER_DESC_modifier_indian_sea_trade: "$muslim_ADJ$ traders have sailed the waters of the $indian_ocean_region$ for generations, traveling impossibly far in search of rare and valuable goods. From the eastern coasts of $africa$, to the shores of $india$, and even as far as the spice islands of $indonesia_region$, the waters are crossed by vessels of the $muslim_ADJ$ faithful."
  STATIC_MODIFIER_NAME_modifier_muslim_trade_communities: "$muslim_ADJ$ Trade Communities"
  STATIC_MODIFIER_DESC_modifier_muslim_trade_communities: "The presence of $muslim_ADJ$ traders in faraway lands puts them in contact with many different peoples and beliefs. The establishment of trade communities among them allows for a certain degree of blending and syncretism of their beliefs with the true Word of $muslim_god_name$."
  STATIC_MODIFIER_NAME_modifier_expansionist_faith: "Expansionist Faith"
  STATIC_MODIFIER_DESC_modifier_expansionist_faith: "From its origins in $arabia_region$, $muslim$ has expanded far and fast. In a few generations, its believers spanned from $iberia_region$ to $india$, the most rapid religious expansion the world has ever seen. There are new lands waiting to be touched by our light, however — perhaps it is time for a second $muslim_ADJ$ expansion."
  STATIC_MODIFIER_NAME_modifier_blend_of_influences: "Blend of Influences"
  STATIC_MODIFIER_DESC_modifier_blend_of_influences: "$muslim$ has expanded to many new places since its origins in $arabia_region$, and with this spread, it came into contact with many different peoples and ways of life. Many exchanges of influence happened during this process, to the point that many characteristics not originally part of $muslim$ have become intrinsically associated with the faith."
  STATIC_MODIFIER_NAME_modifier_islamic_schoolars: "Islamic Schools"
  STATIC_MODIFIER_DESC_modifier_islamic_schoolars: "$muslim$ has always encouraged study and analysis of its scriptures, to the point where we have developed entirely different schools of thought on how to interpret them. Our scholars are therefore extremely learned in the $common_string_quran$ and our other holy texts, capable of having the most in-depth theological discussions."
  STATIC_MODIFIER_NAME_modifier_gunpowder_empires: "Gunpowder Empires"
  STATIC_MODIFIER_DESC_modifier_gunpowder_empires: "Gunpowder may have been invented in the Far East, but it was through $muslim$ that it became widely used throughout the world. Gunpowder weapons have been a staple of our armies for generations, and its production and use is one of our defining characteristics."
  STATIC_MODIFIER_NAME_modifier_established_holy_sites: "Established Holy Sites"
  STATIC_MODIFIER_DESC_modifier_established_holy_sites: "While other religions have somewhat lax and inconsistent views towards how their holy sites are used, the rules of $muslim$ about sacred places are quite clear. Our people will undoubtedly make their pilgrimages with the appropriate reverence and dignity."
  STATIC_MODIFIER_NAME_modifier_islamic_courts: "Islamic Courts"
  STATIC_MODIFIER_DESC_modifier_islamic_courts: "The royal courts of $muslim_ADJ$ countries have always been among the most admired in the world. Praised for our refined culture and luxurious appointments, tales of the magnificence of our courts have spread far and wide, and our people take great pride in this reputation."
  STATIC_MODIFIER_NAME_modifier_schools_of_thought: "Schools of Thought"
  STATIC_MODIFIER_DESC_modifier_schools_of_thought: "$muslim$ tradition has always emphasized the pursuit of knowledge and education. From schools of jurisprudence and theology to the great libraries and institutions of learning established by various rulers, $muslim_ADJ$ scholarship has earned admiration throughout the $muslim_ADJ$ world and well beyond."
  STATIC_MODIFIER_NAME_modifier_distant_trade_ventures: "Distant Trade Ventures"
  STATIC_MODIFIER_DESC_modifier_distant_trade_ventures: "It is from the most distant places that the most lucrative trade goods come. For many years, $muslim_ADJ$ traders have traveled huge distances both on land and across the seas in search of profitable trade opportunities."
  STATIC_MODIFIER_NAME_modifier_resilient_merchants: "Resilient Traders"
  STATIC_MODIFIER_DESC_modifier_resilient_merchants: "$muslim_ADJ$ traders endure the harshest of conditions during their expeditions. From crossing the scorching sands of the Sahara and Gobi Deserts, to braving the monsoon-plagued waters of the $indian_ocean_region$, they have proved time and again that they will undergo any hardship in order to bring about successful trade."
  STATIC_MODIFIER_NAME_modifier_jewels_of_the_desert: "Jewels of the Desert"
  STATIC_MODIFIER_DESC_modifier_jewels_of_the_desert: "$muslim$ arose from the sands of $arabia_region$ and spread across a largely arid region. Yet some $muslim_ADJ$ cities became like prosperous jewels shining in the harsh desert, literal and figurative oasis made bountiful through trade, architecture, and irrigation. With wise investment and planning, any desert settlement can achieve a similar status."
  STATIC_MODIFIER_NAME_modifier_comprehensive_land_survey: "Comprehensive Land Survey"
  STATIC_MODIFIER_DESC_modifier_comprehensive_land_survey: "In order to know who should pay taxes, we must first know who owns what. A comprehensive land survey, and regularly updating it, are therefore essential. We will always get what we are due!"
  STATIC_MODIFIER_NAME_modifier_counting_the_people: "Counting the People"
  STATIC_MODIFIER_DESC_modifier_counting_the_people: "Now that we know who owns what, the logical follow-up is to get a clearer idea of who lives where. This will tell us where to look when we need fresh recruits for our armies."
  STATIC_MODIFIER_NAME_modifier_cosmopolitan_court: "Cosmopolitan Court"
  STATIC_MODIFIER_DESC_modifier_cosmopolitan_court: "People from all over admire the beauty and sophistication of our $muslim_ADJ$ court. We have therefore become an appealing destination for talented luminaries of all kinds, which only adds to our overall court vibrancy and prestige."
  STATIC_MODIFIER_NAME_modifier_caliphate: "Ḵilāfa"
  STATIC_MODIFIER_DESC_modifier_caliphate: "The #italic Ḵilāfa#!, or Caliphate, is the union of all $muslim_ADJ$ faithful under a single ruler in the form of the $rank_empire_muslim_ruler_male$, who is to be the political and spiritual successor of Muḥammad, peace be upon him. Although there are different ideas about who is eligible to be $rank_empire_muslim_ruler_male$, the idea of all $muslim$ united under a single banner has always been the primary focus of this process."
  STATIC_MODIFIER_NAME_modifier_ibadi_imamate: "$ibadi_ADJ$ Imamate"
  STATIC_MODIFIER_DESC_modifier_ibadi_imamate: "Unlike the $caliphate$ or a divinely appointed $shia_ADJ$ Imām, an $ibadi_ADJ$ Imām does not rule over the entirety of the $muslim_ADJ$ world, but instead governs locally. Every community can be ruled independently by its own Imām."
  STATIC_MODIFIER_NAME_modifier_contacts_network: "Contacts Network"
  STATIC_MODIFIER_DESC_modifier_contacts_network: "The extensive reach of $muslim$ has brought $muslim_ADJ$ countries in contact with many different foreign lands. Maintaining a rich network of international contacts such as ours is always beneficial for diplomacy."
  STATIC_MODIFIER_NAME_modifier_infiltration_tactics: "Infiltration Tactics"
  STATIC_MODIFIER_DESC_modifier_infiltration_tactics: "Although the ancient $nizari_school$ $shia_ADJ$ order of the #italic Ḥashshāshīyīn#! has been largely mythicized beyond their original scope, their tactics of subterfuge and assassination were undeniably effective. If we employ such infiltration tactics ourselves, we should benefit from the same success."
  STATIC_MODIFIER_NAME_modifier_unified_armies: "Unified Armies"
  STATIC_MODIFIER_DESC_modifier_unified_armies: "It cannot be denied that $muslim$ has spread to many different cultures and peoples since its emergence in $arabia_region$. As long as they believe in $muslim_god_name$, any person should be able to fight in His name, regardless of their origin."
  STATIC_MODIFIER_NAME_modifier_harsh_environments: "Harsh Environments"
  STATIC_MODIFIER_DESC_modifier_harsh_environments: "$muslim$ has, since its inception, found its way to civilizations in some of the harshest environments of the world. If anyone from outside our region tries to invade our territories, they will find it fiendishly difficult — as they should!"
  STATIC_MODIFIER_NAME_modifier_religious_icon_power_advance: "Religious Icons"
  STATIC_MODIFIER_DESC_modifier_religious_icon_power_advance: "Icons are the physical representation of our faith, sacred depictions of holy figures designed to inspire awe and devotion to those that contemplate them."
  STATIC_MODIFIER_NAME_modifier_church_guidance: "Church Guidance"
  STATIC_MODIFIER_DESC_modifier_church_guidance: "The Scriptures are the Word of God, but only the Church is able to interpret their correct meaning and to relate it accurately to the flock. Any independent reading or interpretation of the Scriptures outside of Church guidance would only lead to being lost in falsehoods and on the path to heresy."
  STATIC_MODIFIER_NAME_modifier_unchanging_tradition: "Unchanging Tradition"
  STATIC_MODIFIER_DESC_modifier_unchanging_tradition: "The tradition passed down to us by Jesus Christ and the apostles is consistent, without any changes, additions, or subtractions whatsoever. Our faith is undeniable in its truths, and what is fundamentally true about this world cannot be changed by mortal hands."
  STATIC_MODIFIER_NAME_modifier_church_councils: "Church Councils"
  STATIC_MODIFIER_DESC_modifier_church_councils: "As the Church must be united in its judgments, any matter too complex for a single bishop to resolve requires us to call a council, where the bishops will consult the mind of the Church itself. The council's decisions shall therefore reflect the consensus of the Church as a whole."
  STATIC_MODIFIER_NAME_modifier_greek_rite: "$greek_culture$ Rite"
  STATIC_MODIFIER_DESC_modifier_greek_rite: "Our rites and canonical practices have been for centuries well-defined following the $greek_culture$ rites of $constantinople$. Although there may be some small variations in certain places, there is remarkable homogeneity in the rites performed throughout $orthodox$."
  STATIC_MODIFIER_NAME_modifier_physical_body_of_christ: "Physical Body of Christ"
  STATIC_MODIFIER_DESC_modifier_physical_body_of_christ: "Our Church is the physical manifestation of the Body of Christ on Earth, having no difference from the one in Heaven. As such, the Church is the physical embodiment of the Lord Savior, sent for the benefit of His people."
  STATIC_MODIFIER_NAME_modifier_sight_veneration: "Icon Veneration"
  STATIC_MODIFIER_DESC_modifier_sight_veneration: "The most important aspect of veneration is the faithful be reminded of great works, miracles, and figures through their natural sense. As such, our churches are adorned with vibrant images and colors, ringing with music and sweetly scented with our holy incense, so that the presence of Christ on Earth can be immediately felt by all inside."
  STATIC_MODIFIER_NAME_modifier_theotokos: "Theotokos"
  STATIC_MODIFIER_DESC_modifier_theotokos: "The Virgin Mary is a key figure in our beliefs, as she fulfilled the Old Covenant by carrying within her the New Covenant in the figure of Christ. As such, being the bearer of Christ God-incarnate, she was literally the Mother of God, and has a place of prominence above all other saints."
  STATIC_MODIFIER_NAME_modifier_heavenly_architecture: "Heavenly Architecture"
  STATIC_MODIFIER_DESC_modifier_heavenly_architecture: "$orthodox_ADJ$ religious buildings are designed in imitation of heaven. Their construction centralized around the basilica, the central dome that serves as a roof and symbolizes the heavens. Richly decorated in beautiful images and gleaming golden icons, they are a wonder to behold."
  STATIC_MODIFIER_NAME_modifier_iconostasis: "Iconostasis"
  STATIC_MODIFIER_DESC_modifier_iconostasis: "One key feature of any $orthodox_ADJ$ church is that of the $iconostasis$, a wall of icons that separates the main body of the building from the altar. The icons it contains serve as a visualization of the link between the worshipers and the Holy of Holies, and thus the link between Heaven and the people, serving as a guide for the people towards Heaven."
  STATIC_MODIFIER_NAME_modifier_julian_calendar: "Julian Calendar"
  STATIC_MODIFIER_DESC_modifier_julian_calendar: "The time of our country and our Church has been for centuries measured by the $julian_calendar$, promulgated by Julius Caesar in 46 BC. It not only unifies all eastern $christian_ADJ$ nations, but it also serves to dictate when the important feasts and celebrations are to be held."
  STATIC_MODIFIER_NAME_modifier_paschal_cycle: "Paschal Cycle"
  STATIC_MODIFIER_DESC_modifier_paschal_cycle: "$orthodox$ contains some movable feasts around #italic Pascha#!, Easter, organized in the $paschal_cycle$. The ten weeks before Pascha are called #italic Triodion#!, while the fifty days after Pascha are called #italic Pentekostárion#!. This cycle marks the most important celebrations in the liturgical year."
  STATIC_MODIFIER_NAME_modifier_oktoechos: "Oktōēchos"
  STATIC_MODIFIER_DESC_modifier_oktoechos: "An eight-mode system of writing music, the $oktoechos$ has been the system used for writing religious chants and music for the Church for centuries. It is the foundation of $orthodox_ADJ$ chant, although with some variations between cultures."
  STATIC_MODIFIER_NAME_modifier_prestigious_monasticism: "Prestigious Monasticism"
  STATIC_MODIFIER_DESC_modifier_prestigious_monasticism: "In $orthodox$, monasticism and asceticism are highly valued and almost a requirement. Any bishop must be a monk first, and they must become a monk before being consecrated if they are not. As such, monasteries and monasticism centers have a big impact on our clerical life."
  STATIC_MODIFIER_NAME_modifier_national_rites: "National Rites"
  STATIC_MODIFIER_DESC_modifier_national_rites: "The presence of different autocephalous patriarchates in our Church allows for certain variations between the national rites of each country. However, the unity of the message remains, and the Church as a single entity is not broken."
  STATIC_MODIFIER_NAME_modifier_heirs_of_rome: "Heirs of Rome"
  STATIC_MODIFIER_DESC_modifier_heirs_of_rome: "Many have claimed to be the heirs of Rome and indeed the whole Roman Empire. However, only our religion is the true faith of the old Empire, and therefore only we can legitimately claim to be a direct descendant from it."
  STATIC_MODIFIER_NAME_modifier_legacy_of_saint_andrew: "Legacy of Saint Andrew"
  STATIC_MODIFIER_DESC_modifier_legacy_of_saint_andrew: "According to legend, Saint Andrew himself visited Scythia and the northern shores of the $black_sea_area$, prophesying a great flourishing of $christian$ once he reached the future site of $kyiv$."
  STATIC_MODIFIER_NAME_modifier_christianization_of_the_slavs: "Christianization of the Slavs"
  STATIC_MODIFIER_DESC_modifier_christianization_of_the_slavs: "The people of the Kievan Rus' were among the first of the Eastern $slavic_group$ people to accept the light of Christ and convert to $orthodox$. From there, the faith spread throughout the region."
  STATIC_MODIFIER_NAME_modifier_cyril_and_methodius: "Cyril and Methodius"
  STATIC_MODIFIER_DESC_modifier_cyril_and_methodius: "Two $BYZ_ADJ$ theologians from the 9th century, these men were instrumental to the evangelization of the Slavs. They are credited for developing the Glagolitic alphabet, the first one to ever be used to transcribe $church_slavonic_language$, and their followers later developed the Cyrillic alphabet, naming it after Cyril in his honor."
  STATIC_MODIFIER_NAME_modifier_interaction_between_church_and_state: "Interaction Between Church and State"
  STATIC_MODIFIER_DESC_modifier_interaction_between_church_and_state: "The patriarchates have absolute authority over their own jurisdictions and those who occupy them. By tying their authority to that of the ruler, we can take advantage of the resources of the Church, and use them to strengthen state authority."
  STATIC_MODIFIER_NAME_modifier_outwards_expansion: "Outwards Expansion"
  STATIC_MODIFIER_DESC_modifier_outwards_expansion: "It is the holy duty of the Church to bring the light of Christ to the pagan and the infidels. We must go beyond our borders to carry salvation to every lost soul!"
  STATIC_MODIFIER_NAME_modifier_justified_holy_wars: "Justified Holy Wars"
  STATIC_MODIFIER_DESC_modifier_justified_holy_wars: "We cannot allow heathens and heretics to dictate our actions. It is our holy duty to cleanse the land of their impurity so that the true realm of God can be manifested on Earth."
  STATIC_MODIFIER_NAME_modifier_resistance_to_the_infidels: "Resistance to the Infidels"
  STATIC_MODIFIER_DESC_modifier_resistance_to_the_infidels: "Our $orthodox_ADJ$ brethren have seen themselves at times under the yoke of foreign infidels. However, we have learned to endure such oppression, and even live in peace alongside these infidels."
  STATIC_MODIFIER_NAME_modifier_eastern_ecumenism: "Eastern Ecumenism"
  STATIC_MODIFIER_DESC_modifier_eastern_ecumenism: "$christian_ADJ$ denominations from the Oriental Orthodoxy are often confused with Eastern $orthodox$ by the uninitiated. Although they are different from us in many key issues, they are still $christian_ADJ$, and our many commonalities could be used to bring them back to the correct faith."
  STATIC_MODIFIER_NAME_modifier_structured_patriarchates: "Structured Patriarchates"
  STATIC_MODIFIER_DESC_modifier_structured_patriarchates: "Our patriarchates have always been well organized and structured, each with its own attributions and delimitations. This allows for a better-functioning Church, which leads to a better-functioning state."
  STATIC_MODIFIER_NAME_modifier_protestant_invite_persecuted: "Welcome the Unwelcome"
  STATIC_MODIFIER_DESC_modifier_protestant_invite_persecuted: "While we have seen the light of the true faith, many of our brethren suffer under the oppressive rule of misguided heathens. We should invite these people to settle in our lands, where they can process their faith without repercussions and, more importantly, contribute to our treasury."
  STATIC_MODIFIER_NAME_modifier_protestant_administration_tax: "Efficient Tax Collectors"
  STATIC_MODIFIER_DESC_modifier_protestant_administration_tax: "Previously, the clerics shouldered a significant portion of the tax burden. While some of these structures have been dismantled in the wake of the Reformation, the capable common people are still around, and thus must help make up for that missing clerical revenue."
  STATIC_MODIFIER_NAME_modifier_confessio_augustana: "A New Confession"
  STATIC_MODIFIER_DESC_modifier_confessio_augustana: "The Reformation gives us the opportunity to define a new creed for our people and, more importantly, to accept critique and make adjustments accordingly."
  STATIC_MODIFIER_NAME_modifier_devotionalism: "Devotionalism"
  STATIC_MODIFIER_DESC_modifier_devotionalism: "We must revive Augustinian theology, and recognize that our beliefs are built on the emotions and fervor of the faithful."
  STATIC_MODIFIER_NAME_modifier_protect_the_new_faith: "Shield of the Faith"
  STATIC_MODIFIER_DESC_modifier_protect_the_new_faith: "Our religion is beset on all sides by enemies. We will have to defend our rights to our own confession against the $catholic_ADJ$ oppressors."
  STATIC_MODIFIER_NAME_modifier_expulsion_of_heretics: "Expulsion of Heretics"
  STATIC_MODIFIER_DESC_modifier_expulsion_of_heretics: "The troublesome heretics in our domain could easily foment rebellion against our ruler. It would be better if we redirected them to our overseas colonies instead, where they can cause less trouble."
  STATIC_MODIFIER_NAME_modifier_repurposed_monasteries: "Repurposed Monasteries"
  STATIC_MODIFIER_DESC_modifier_repurposed_monasteries: "Former religious properties seized by the state during our national conversion process can serve us now in new ways, such as centers for production or administration."
  STATIC_MODIFIER_NAME_modifier_involved_laity: "Involved Laity"
  STATIC_MODIFIER_DESC_modifier_involved_laity: "With the increased involvement of the laity in the day-to-day administration of our Church, our people have found a more personal connection to the faith itself."
  STATIC_MODIFIER_NAME_modifier_protestant_cuius_regio_eius_religio: "$catholic_cuius_regio_eius_religio$"
  STATIC_MODIFIER_DESC_modifier_protestant_cuius_regio_eius_religio: "$catholic_cuius_regio_eius_religio_desc$"
  STATIC_MODIFIER_NAME_modifier_protestant_painters: "Protestant Art"
  STATIC_MODIFIER_DESC_modifier_protestant_painters: "The Reformation has given our artists the opportunity to explore new themes, finally freed from the obligatory glorification of God. Hiring more of these artists will reflect well on us, and give us the reputation of being a great patron of the arts."
  STATIC_MODIFIER_NAME_modifier_protestant_sunday_schools: "$sunday_schools_advance$"
  STATIC_MODIFIER_DESC_modifier_protestant_sunday_schools: "$sunday_schools_advance_desc$"
  STATIC_MODIFIER_NAME_modifier_protestant_work_ethic: "Diligent Workers"
  STATIC_MODIFIER_DESC_modifier_protestant_work_ethic: "The influence of Puritan and Pietist preachers on the Reformation is undeniable. Their emphasis on virtues like diligence and frugality will help us to foster an industrious and dedicated workforce."
  STATIC_MODIFIER_NAME_modifier_embrace_romanticism: "Embrace Romanticism"
  STATIC_MODIFIER_DESC_modifier_embrace_romanticism: "In the wake of the Enlightenment's emphasis on reason, we must not forget the power of emotion and imagination. By embracing Romanticism, which celebrates nature, folklore, and national character, our artists will produce works that stir the soul."
  STATIC_MODIFIER_NAME_modifier_wary_of_heretic_preachers: "Defense Against Heretics"
  STATIC_MODIFIER_DESC_modifier_wary_of_heretic_preachers: "We will need to be wary of forces trying to convert our people, or seduce them back to our previous faith. By publicly declaring these preachers to be malicious and hostile, we can prepare our people for these interactions and more easily reinforce religious orthodoxy."
  STATIC_MODIFIER_NAME_modifier_protestant_innovation: "Protestant Innovations"
  STATIC_MODIFIER_DESC_modifier_protestant_innovation: "Since the founding days of our faith, we have emphasized the inherent value of questioning established doctrines and beliefs. We should apply these same ethics to other fields of study."
  STATIC_MODIFIER_NAME_modifier_nanto_rokushuu: "Nanto Rokushū"
  STATIC_MODIFIER_DESC_modifier_nanto_rokushuu: "The temples of $nara$ have been influential since $buddhist$ first came from $china$. The six schools that formed around these temples are a renowned repository of knowledge, especially about the teachings of the Buddha and the various ways of achieving enlightenment. However, they also teach more mundane, but equally valuable subjects, such as how to properly administrate a monastery."
  STATIC_MODIFIER_NAME_modifier_shinbutsu_shuugou: "Shinbutsu-Shūgō"
  STATIC_MODIFIER_DESC_modifier_shinbutsu_shuugou: "Since $buddhist$ came to $japan_region$, its teachings have coexisted with the worship of local #italic Kami#!. This has led to them both blending into a single combined set of beliefs, albeit with distinct ritualistic practices."
  STATIC_MODIFIER_NAME_modifier_honji_suijaku: "Honji Suijaku"
  STATIC_MODIFIER_DESC_modifier_honji_suijaku: "One of the key practices in $shinbutsu_shuugou$ is to identify the local #italic Kami#! as manifestations of the different Buddha, and the Buddhas as manifestations of the different #italic Kami#!. In the end, they are one and the same, with core forms or #italic Honji#! taking on different aspects, or #italic suijaku#!."
  STATIC_MODIFIER_NAME_modifier_hachiman_worship: "Hachiman Worship"
  STATIC_MODIFIER_DESC_modifier_hachiman_worship: "Hachiman is one of the most venerated divinities. Originally a deification of Ōjin Tennō, after the introduction of $buddhist$ he was later also identified as a Bodhisattva. He is the protector of the Imperial line and the tutelary god of the warrior class."
  STATIC_MODIFIER_NAME_modifier_gozan_jissetsu: "Gozan Jissetsu"
  STATIC_MODIFIER_DESC_modifier_gozan_jissetsu: "The 'Five Mountains System' originated in $china$ from state-sponsored Chán $buddhist_ADJ$ monasteries, atop the holy mountains that gave the system its name. In $japan_region$, the practice continued in the $kamakura$ period by the sponsoring of the Zen temples, the Five Mountains of $kyoto$ and the Five Mountains of $kamakura$. By maintaining our sponsorship of such institutions, we can use them to help stabilize our rule."
  STATIC_MODIFIER_NAME_modifier_bodaiji: "Bodaiji"
  STATIC_MODIFIER_DESC_modifier_bodaiji: "Since antiquity, our people have venerated our ancestors. The most influential of our rulers erect entire temples, where they will be entombed and then worshiped after death, and where their deeds and words will be remembered for all time."
  STATIC_MODIFIER_NAME_modifier_kagura: "Kagura"
  STATIC_MODIFIER_DESC_modifier_kagura: "Originally sacred ritual dances performed in front of the court by the #italic miko#!, the shrine maidens, the $kagura$ also inspired the performance of popular ritual dances all around $japan_region$. These dances have evolved into a myriad of forms, but all of them preserving the tradition and ritual they come from."
  STATIC_MODIFIER_NAME_modifier_obon: "Obon"
  STATIC_MODIFIER_DESC_modifier_obon: "One of the most important festivals in our culture, $obon$ is the time to honor the dead, and our ancestors in particular. During the celebrations, offerings of food and ritual dances are performed. People also light fires and lanterns to guide the souls of the dead back home for the celebrations, and once again back to the land of the dead."
  STATIC_MODIFIER_NAME_modifier_neo_confucianism: "Neo-$SECT_CONFUCIANISM_NAME$"
  STATIC_MODIFIER_DESC_modifier_neo_confucianism: "$SECT_CONFUCIANISM_NAME$ has a millenary history, and Neo-$SECT_CONFUCIANISM_NAME$ has already existed in $japan_region$ for centuries. However, active state involvement and support of the faith will strengthen our authority."
  STATIC_MODIFIER_NAME_modifier_danka_system: "Danka System"
  STATIC_MODIFIER_DESC_modifier_danka_system: "For centuries, households in $japan_region$ have had close relationships with local $buddhist_ADJ$ temples, giving them financial patronage in exchange for the temples taking care of their spiritual needs. Formally enforcing this system will keep our people devoted to the faith, and secure the vital role our religion plays in society."
  STATIC_MODIFIER_NAME_modifier_harae: "Harae"
  STATIC_MODIFIER_DESC_modifier_harae: "In our faith, the practice of #italic $harae$#!, or ritual purification, is key to removing all #italic tsumi#!, sins, and #italic kegare#!, spiritual uncleanness. Mandating that our population performs the $harae$ rituals properly and frequently ensures that our country remains spiritually pure."
  STATIC_MODIFIER_NAME_modifier_jisha_bugyou: "Jisha-Bugyō"
  STATIC_MODIFIER_DESC_modifier_jisha_bugyou: "The administrator and supervisor of all the temples and shrines, the $jisha_bugyou$ also oversees the activities these religious institutions perform, making sure that their interests align with those of the government."
  STATIC_MODIFIER_NAME_modifier_kokugaku: "Kokugaku"
  STATIC_MODIFIER_DESC_modifier_kokugaku: "Almost since its inception as a country, $japan_region$ and $shinto$ have been influenced by foreign ideas coming from $china$ and $buddhist$. A new movement is taking root, claiming that our own national spirit is naturally pure, and that our society must be cleansed of any foreign influences."
  STATIC_MODIFIER_NAME_modifier_home_shrines: "Home Shrines"
  STATIC_MODIFIER_DESC_modifier_home_shrines: "Ritual and religious practice have been traditionally relegated to shrines and temples. However, more and more of our people are placing in their homes both local family shrines, called #italic kamidana#!, to venerate the Kami, and #italic butsudan#! as $buddhist_ADJ$ altars for their ancestors."
  STATIC_MODIFIER_NAME_modifier_fukko_shinto: "Fukko $shinto$"
  STATIC_MODIFIER_DESC_modifier_fukko_shinto: "As people are rejecting foreign influence in our culture, they are also starting to reject the teachings of $buddhist_ADJ$ and $SECT_CONFUCIANISM_NAME$ interfering in our faith. Given this emerging demand for doctrinal purity, a formal revitalization of $shinto$ might be wise."
